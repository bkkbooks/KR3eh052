body:
  text: 卷五合病並病汗下吐後等病表裡合病必下利太陽汗與陽明合病必自下利葛根湯主之不下利但嘔者葛根加半夏湯主之太陽和與少陽合病自下利者與黃芩湯若嘔者黃芩加半湯生薑湯主之陽明與少陽合病必下利脈滑而數者有宿食也當下之宜大承氣湯俱詳下利並病二陽汗並病太陽出汗不徹因轉屬陽明自汗不惡寒太陽證不罷面赤躁煩短氣者更發汗則愈二陽下並病太陽證罷潮熱譫語者下之則愈論見譫語太陽刺少陽並病項強眩冒心下硬如結胸者刺胸俞肝俞論見項強合併病合併兩經俱病並則一經證罷而並歸於一經也太陽與陽明合病有三證其邪湊有淺深之殊故用藥有汗下和解之異治見各條三陽合病有二證其一證用白虎湯其一證無治法後人用小柴胡白虎之類蓋此二證俱有三陽之候故不可汗下二陽並病有二證表未解者汗之表已解有里證者下之太陽與少陽並病有三證其一由誤下以致心下硬成結胸其一項強如柔痙狀心下硬如結胸刺肺俞肝俞慎勿發汗汗則譫語不止宜刺期門其一心下硬項強而眩者刺大椎肺俞不宜下也合病太陽汗與陽明合病胸滿而喘者不可下麻黃湯太陽解肌與陽明合病自下利葛根湯不下利但嘔者葛根加半夏或曰由太陽表未罷而陽明裡又至兩陽合病熱甚於表乘虛漸攻於裡故下也其不下利而嘔者邪氣雖攻裡未入於胃但氣逆而嘔故加半夏以止嘔逆龐氏曰外證必頭痛腰疼肌熱目疼鼻乾也脈浮大太陽受病也長者陽明也頭腰太陽也肌目鼻陽明也太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏湯或曰此表實裡虛熱入攻裡故自下利若兼痰飲則嘔也陽明少陽合病必下利脈長者為順脈眩者為負負者克賊也脈滑而數者有宿食大承氣湯或曰陽明土少陽木其脈弦者木乘土也不弦者不負也負者必死若滑而數者有宿食非負也故宜下三陽合病腹滿身重難以轉側口不仁面垢譫語遺尿不可汗下若自汗者白虎湯三陽合病脈浮大見關上但欲眠目合則汗小柴胡白虎湯或曰此二證俱有三陽之證此不可汗下並病二陽解肌並病太陽初得時汗之不徹轉屬陽明續自微汗不惡寒大柴胡湯若太陽證不罷不可下可少發汗設面色緣緣正赤陽氣怫鬱在表汗之不徹其人煩躁短氣不知痛處宜更發汗則愈葛根湯二陽下並病太陽證罷潮熱手足汗大便難譫語者大承氣湯太陽少陽並病反下之成結胸心下硬下利不止水漿不下心煩生薑瀉心湯小陷胸湯太陽刺與少陽並項強痛或眩冒時如結胸心下痞硬刺大椎第一間肺俞肝俞不可汗汗則譫語不止刺期門太陽少陽並病心下硬項強而眩者刺大椎肺俞慎勿下趙愚嘗疑合病並病之難明也久矣姑釋之蓋合病者二陽經或三經同受病之病不傳者也並病者一陽經先受病又過一經病之傳者也且如太陽陽明並病一證若並而未盡是傳未通尚有表證仲景所謂太陽證不罷面色赤陽氣怫鬱在表不得越煩躁氣短是也猶當汗之以各半湯若並之已盡是謂傳過仲景所謂太陽證罷潮熱手足汗出大便硬而譫語者是也法當下之以承氣湯是知傳則入腑不傳則不入腑所以仲景論太陽陽明合病止出三證如前太陽陽明並病則言其有傳變如此也又如陽經互相合病皆自下利仲景於太陽陽明合病則主以葛根湯太陽少陽合病主以黃芩湯少陽陽明合病主以承氣湯至於太陽少陽並病其證頭項強痛眩冒如結胸心下痞硬當刺大椎肺俞肝俞不可汗下太陽陽明並病已見上論但三陽合病仲景無背惡寒語句雖別有口燥渴心煩背微惡寒者乃屬太陽證而非三陽合病也活人言三陽合病背惡寒者非也三陽若與三陰合病即是兩感所以三陰無合病例也張夫並者乃催併督並之義非吞併相就之理然催併系去聲吞併之並乃上聲史記曰始皇初並天下即此理也夫並之理乃前病未解後病已至有逼相併之義故曰並病也經曰太陽與少陽並病頭項強痛或眩冒云云如果並作一家則仲景不具兩經之證而言也其非並字明矣又曰或云三陽合病有太陽陽明有正陽陽明有少陽陽明似乎重出予曰各有所指不過表裡之分耳夫三陽合病在表三陽陽明病在裡事在兩途即非重出在表者宜解散以痊安在裡者非攻下則不可然表裡證治迥各不同惟編目有似乎重出發汗後不解傷寒初感始以太陽故以發汗為首汗行如雨散云其病乃愈倘汗行不解者或表邪未盡或熱邪傳裡或邪氣收乘虛內客故有汗後而不解者發汗病不解反惡寒虛也芍藥甘草附子湯太陽病發熱汗不解仍發熱心下悸振振欲擗地真武湯發汗後身疼痛脈沉者桂枝加芍藥人參新加湯太陽發汗遂漏不止其人惡風小便難四肢拘急難以屈伸桂枝加附子湯大汗出熱不去內拘急四肢疼下利惡寒四逆湯發汗過多冒心心下悸欲得按桂枝甘草湯汗後腹脹滿厚朴生薑人參湯太陽病發汗後大汗出胃中乾燥不得眠欲飲水者少少與之則愈若脈浮小便不利微熱消渴者五苓散發汗已脈浮數煩渴五苓散服桂枝湯脈洪大與桂枝湯如前法若形如瘧日再發汗出必解麻黃湯發熱汗出不解心中痞硬嘔吐不和大柴胡湯服桂枝湯大汗出大煩渴不解脈洪大白虎加人參湯發汗後臍下悸欲作奔豚茯苓桂枝甘草大棗湯發汗後不惡寒但惡熱蒸蒸發熱者實也謂胃承氣湯發汗後不可更行桂枝汗出而喘無大熱者麻杏仁甘草湯下後不解去傷寒之邪不過汗吐下之三法也三法得當病勢易衰則愈矣三法失宜病勢危惡傳變不已誠可慮也況發汗吐下後邪氣乘虛而未散或壅窒而未盡則當量其虛實以治之先賢謂知邪氣之虛實發汗吐下之不瘥溫補針艾之適當則萬全之功可得矣若過經者以六日傳六經七日為一候若不愈十三日乃再傳經盡所以謂之過經也傷寒五六日大下後身熱不去心中結痛未欲解也梔子豉湯下後心煩腹滿臥起不安梔子厚朴湯陽明病下之心中懊憹而煩梔子豉湯若有燥屎者大承氣湯太陽病下後脈促胸滿桂枝去芍藥湯微惡寒者去芍藥方中加附子醫以丸藥下之身熱不去微煩梔子乾薑湯太陽病桂枝證醫反下之利遂不止脈促者表未解喘而汗出者葛根黃連黃芩湯服桂枝湯或下之仍頭痛項強無汗翕翕發熱心下滿微痛小便不利桂枝去桂加茯苓白朮湯太陽病過經十餘日二三下之嘔不止心中微煩大柴胡湯下之六七日大下後寸脈沉而遲手足厥逆下利脈不至咽喉不利吐膿血瀉利不止為難治麻黃升麻湯汗吐下後不解五六日已發汗復下胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩為未解柴胡桂薑湯太陽汗吐下解後心下痞硬噫氣不除者旋覆代赭石湯太陽先發汗不解而復下之脈浮者則知病在外當須解外桂枝湯發汗若下之病仍不解煩躁不得眠茯苓四逆湯大汗若大利而厥者四逆湯下後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱乾薑附子湯下後復發汗必振寒脈微細此內外俱虛也傷寒本寒後復吐下之食入口即吐乾薑黃連黃芩人參湯發汗吐下後虛煩不得眠劇者反復顛倒心中懊憹梔子豉湯發汗若下之煩熱胸中窒梔子豉湯吐下後不大便五六日至十餘日日晡發潮熱不惡寒獨語如見鬼狀循衣摸床脈弦者生澀者死但發熱譫語者大承氣湯吐下後腹脹滿邪熱入胃也調胃承氣湯太陽吐下後微煩小便數大便硬小承氣湯吐下後七八日不解結熱在裡表裡俱熱時時惡風大渴舌上乾躁煩欲飲水白虎加人參湯吐下後心下逆滿氣上衝胸頭眩脈沉緊發汗則動經身為振搖茯苓桂枝白朮甘草湯喘成肺主氣形寒飲冷則傷肺故其氣逆而上行沖沖而氣急喝喝而息數張口抬肩搖身滾肚是為喘也有邪在表致氣不利而喘者麻黃湯桂枝加厚朴杏子湯有水射肺而喘者小青龍湯發汗後飲水多必喘以水灌之亦喘及傷寒心下有水氣乾嘔發熱而咳或喘者小青龍去麻黃加杏仁是欲發散水寒也經曰喘而汗出者與葛根黃芩黃連湯以利之此邪氣內攻氣逆不利因喘而汗出見其邪氣在裡也雖表未解未可和之汗出而喘者與麻黃甘草石膏湯以發之此外邪壅盛使氣不利汗出而喘不已見其邪氣在表也雖經汗下亦可發之若傷寒止於邪氣在表而喘者心腹必濡而不堅設或腹滿而喘則又為可下之證經曰短腹氣滿而喘有潮熱者此外欲解可攻裡也又汗出發潤喘不休者為肺絕身汗如油喘而不休為命絕直視譫語喘滿者死是皆不治之喘也太陽病汗頭痛發熱身痛腰痛骨節痛惡風無汗而喘麻黃湯太陽與陽明合病喘而胸滿者不可下麻黃湯許有人病傷寒脈浮而長喘而胸滿身熱頭痛腰脊強鼻乾不得臥予曰太陽陽明合病仲景云中有三證下利葛根湯不下利嘔逆者加半夏喘而胸滿者麻黃湯也治以麻黃湯得解傷寒表不解心下有水氣乾嘔發熱而咳或喘者小青龍湯方見太陽病發汗後飲水多必喘以水灌之亦喘喘肺病飲水多而喘者飲冷傷肺也以冷水灌洗而喘者形寒傷肺也或用小青龍加杏仁豬苓湯傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯喘家有汗桂枝湯加厚朴杏仁佳太陽病為諸陽主氣風甚氣壅則生喘也與桂枝湯以散風加厚朴杏仁以降氣太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之下後大喘則為裡氣大虛邪氣傳裡正氣將脫也下後微喘則為裡氣上逆邪不能傳裡猶在表也與桂枝湯以解外加厚朴杏仁以下逆氣桂枝加厚朴杏仁湯方桂枝去皮芍藥生薑切各三兩厚朴炙去皮甘草炙各二兩杏仁去皮尖五十枚大棗十二枚擘上七味以水七升煮取三升去滓溫服一升發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之成發汗後喘當作桂枝加厚朴杏仁湯汗出則喘愈令汗出而喘為邪氣壅甚桂枝湯不能發散故不可更行桂枝湯汗出而喘有大熱者內熱氣甚也無大熱者表邪必甚也與麻黃杏子甘草石膏湯以散其邪張予觀仲景常言發汗後乃表邪悉解止餘一證而已故言不可更行桂枝湯今汗出而喘無大熱乃上焦餘邪未解當用麻黃杏仁甘草石膏湯以散之夫桂枝加厚朴杏仁湯乃桂枝證悉具而加喘者用之注言汗出而喘以為邪氣壅甚非桂枝所能發散此誤也況身無大熱更無證何故復言表邪必甚其後章下後不可更行桂枝湯條下注曰汗下雖殊既不當損正氣則一其言有至理存焉可見汗後所注之誤矣原其理當時因事發機前後失於照應故有此等之弊也下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏仁甘草石膏湯成上條云發汗後不可更行桂枝湯汗出而喘無大熱者為與此證治同汗下雖殊既不當損正氣則一邪氣所傳既同遂用一法治之經所謂若發汗若下若吐後是矣麻黃杏仁甘草石膏湯方麻黃四兩去節杏仁五十枚去皮尖甘草炙二兩石膏半斤碎綿裹上四味以水七升先煮麻黃減二升去上沫納諸藥煮取二升去滓溫服一升肝苦急急食甘以緩之風氣通於肝風邪外甚故以甘劑發之太陽病和解桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯方見下利陽明中風汗口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難麻黃湯陽明脈浮無汗而喘者發汗則愈宜麻黃湯陽明病和脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重白虎湯五苓散傷寒四五日脈沉而喘滿沉為正里而反發其汗津液越出大便為難表虛里實久則譫語邪氣入內之時得脈沉而喘滿里證具也則當下之反發其汗令津液越出胃中乾燥大便必難久則屎燥必發譫語也大承氣湯陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯診傷寒吐下後不大便潮熱若劇則不識人循衣摸床微喘直視脈弦者生澀者死詳循衣摸床濕家下後額汗微喘大小便利者死論見體痛少陰病息高者死詳見厥利論見欲寐厥冷無脈灸之不還反微喘者死詳見厥利直視譫語喘滿者死論見譫語脈浮洪汗出如油發潤喘不休為命絕附活陰證喘促者返陰丹主之四肢逆冷喘促入口便佳方見陰毒病人小渴與水劇飲之致停飲心下滿結者喘死甚眾當以五苓散或陷胸丸主之方見渴及結胸戴喘嗽有陰陽太陽經喘嗽略於前本經言之詳見嗽門少陽有嗽無喘有喘非少陽也其見少陽證而喘者宜小柴胡湯加北五味子六分乾薑四分陽明有喘無嗽有嗽非正陽明也其陽明證喘有潮熱者宜大承氣湯陰證喘惟少陰有之若四肢沉重疼痛小便如常大便自利而嗽者真武湯去芍藥加北五味乾薑各半錢細辛三錢此陰中之陰若四肢厥逆腹中痛泄利下重而咳四逆湯加北五味乾薑各半錢下利嘔渴身煩不得眠而咳嗽者豬苓湯此陰中之陽諸陰喘促最為危證宜用返陰丹吳凡表有寒發喘者脈浮緊惡寒身疼無汗也宜麻黃湯汗之若表有風發喘者脈浮緩惡風自汗也宜桂枝湯加厚朴杏仁主之凡陽明內實不大便腹滿短氣發潮熱而喘者大柴胡加厚朴杏仁湯或小承氣湯凡陰證厥逆脈沉細而微氣促而喘無汗者宜四逆湯加五味杏仁凡虛人脈伏若手足逆冷而喘者五味子湯凡暴冒風寒脈浮無汗而喘蘇沈九寶湯凡熱盛有痰脈弦數而喘不可汗不可下以小柴胡湯加知母貝母栝蔞仁胸滿者加枳殼桔梗心下滿者加枳實黃連舌燥飲水而喘者加知母石膏主之古人云諸喘為惡故非輕也華佗曰盛則為喘蓋非肺氣盛也乃肺中之邪火盛也所以瀉白者瀉肺中之火也非瀉肺也又為瀉心湯乃瀉心下之痞滿者也衛生寶鑑曰凡看文字有餘當認作不足者蓋受病為不足病氣為有餘也五味子湯方見厥門蘇沈九寶湯桑白皮上甘草下大腹皮下官桂下麻黃中薄荷下陳皮上紫蘇中杏仁去皮尖炒中生薑三片烏梅半個上用水二鍾煎至八分去滓通口服加減瀉白散治煩熱胸膈不利上氣喘促口乾或咳者桑白皮二錢知母橘紅栝蔞仁去殼細黃芩貝母桔梗甘草各一錢五分地骨皮一錢上煎服法同前短氣成短氣者氣急而短促似喘而非喘喘則張口抬肩短氣只是氣促不能相續似喘而不抬肩似呻吟而無痛也有責為實者經曰短氣腹滿而喘有熱潮此外欲解可攻裡此短氣之實者也有責為虛者經曰趺陽脈微而緊緊則為寒微則為虛微虛相搏則為短氣此短氣之虛也有在表者經曰短氣但坐以汗出不徹故也更發汗則愈與其風濕相搏汗出短氣小便不利惡風者甘草附子湯此邪在表而短氣也有在表者經曰乾嘔短氣汗出不惡寒此表解里未和十棗湯與太陽病醫反下之短氣煩躁懊憹心中硬成結胸大陷胸湯此邪在裡而短氣也治各有異大抵短氣為實要略曰短氣不足以息者實也又水停心下亦令短氣要略曰食少飲多水停心下微者短氣學者察諸表證短氣骨節痛不得屈伸汗出小便不利惡風身腫者為風濕宜甘草附子湯方論見體痛短氣腹滿脅痛其人若脈弦浮大外不解無汗嗜臥身黃小便難有潮熱者小柴胡湯論見胃實方見往來寒熱里證若表未解手足濈然汗出或有潮熱者宜大承氣湯方論見潮熱若表解心下痞硬幹嘔短氣者宜十棗湯方見見脅滿痛汗不徹短氣煩躁若發汗不徹續微汗出不惡寒表證不罷面赤者為並病更發汗則愈論見面赤下後若下後心中懊憹心中硬痛者用大陷胸湯論見結胸診趺陽脈微而緊緊則為寒微則為虛微緊相搏則為短氣坐而伏者短氣也附陶傷寒失於汗下或因汗下後虛令人氣逆不相接續者名短氣分虛實治之此與喘證不相類吳因汗吐下後元氣虛弱脈來微虛氣不能相接而短少者以人參益氣湯凡陰證脈弱細沉而遲手足逆冷麵上惡寒如刀刮口鼻之氣難以布息而短者宜四逆湯加人參主之又食少飲多水停心下令人氣短煩悶以茯苓甘草湯治之身重成身重之由有風濕有風寒有風濕俱見有火逆有易病有三陽合病雖所得不一然悉屬三陽非若身疼兼有三陰裡寒也壞病有矣寒則無之識者鑑焉太陽傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之詳太陽病發汗已身猶灼熱名曰風溫脈浮汗出身重多眠鼻息鼾詳風溫宜活人葳蕤湯風溫脈浮身重汗出惡風者宜防己黃耆湯防己一兩甘草半兩白朮七錢半黃耆去蘆一兩一錢上㕮咀每服五錢生薑四片大棗一枚水一盞半煎至八分溫服良久再服服後當如蟲行皮中從腰下如冰後坐被上又以一被繞腰以下溫令微汗瘥喘者加麻黃半兩胃中不和者加芍藥三分氣上衝者加桂三分下有沉寒者加細辛三分脈浮宜以汗解用火炙之邪無從出因火而盛病從腰以下必重而痹名火逆也脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出以解所以然者尺中脈微此裡虛須表裡實津液自和便自汗出愈傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之方見驚張病有身重不能轉側下後血虛津液不榮於外也身疼不能轉側者風濕相搏於經而里無邪也經曰傷寒八九日風濕相搏身疼體煩而不能自轉側不嘔不渴脈浮虛而澀者以桂枝附子湯主之此以柴胡加龍骨牡蠣湯主之以上二證言不能轉側頗相似論疼與重俱不相侔各從本法為宜也陽明病脈遲汗出不惡寒身重短三腹滿而喘或潮熱或不潮熱承氣湯證詳腹滿陽明病脈浮緊口苦咽燥腹滿而喘發熱汗出不惡寒身重忌汗忌燒針忌下詳自汗注云此證宜和解之三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之成腹滿身重難以轉側口不仁譫語者陽明也針經曰少陽病甚則面微塵此面垢者少陽也遺尿者太陽也三者以陽明證多故出陽明篇中三陽合病為表裡有邪若發汗攻表則燥熱益甚必愈譫語若下之攻裡表熱乘虛內陷必額上汗出手足逆冷其自汗出者三陽經熱甚也內經曰熱則腠理開榮衛通汗大泄與白虎湯以解內外之熱少陰病腹痛小便不利四肢沉重疼痛下利者真武湯中暍發熱惡寒身重而痛手逆遞冷小有勞身即熱小便已洒洒然毛聳其脈弦細芤遲口開前板齒燥此為太陽中暍忌汗下溫針宜白虎加人參湯詳暑病陰陽易身重少氣少腹裡急或引陰中熱上胸沖眼花者此為陰陽易宜燒裩湯方論見陰陽易難轉側三陽合病腹滿身重難轉側汗出者白虎湯論見身重下後胸滿煩驚小便不利譫語身重不可轉側者柴胡牡蠣湯論見驚風濕相搏身體煩疼不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯論詳身體痛面赤面垢目赤面青太陽病面反有熱色二陽並病面色緣緣正赤陽明面合赤色是皆表邪必發散解肌而愈少陽目赤和解而安少陰面赤色厥陰面少赤帶陽二日必四逆而後可也面赤雖由陽熱而生然各經俱無可下之證在少陰厥陰者正證有下利厥逆脈微實為陰寒之病縱面赤似陽只是兼化而已太陽病如瘧狀若脈微惡寒面反有熱色而身癢者桂枝麻黃各半湯小汗之方論見發熱脈浮而遲面熱赤而戰惕者六七日當汗出而解反發熱者瘥遲為無陽不能作汗其身必癢也二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽證不罷者不可下之下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不出出不足或陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也因發不透徹而面赤躁煩短氣者不足言陽氣怫鬱止是當汗不汗也故更發汗則愈陽明病面合赤色不可攻葛根湯少陰病下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯加蔥白詳下利厥陰下利清穀脈沉而遲其人面少赤身有微熱者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也詳下利面赤而身熱足寒而口噤及背反張者痙病也詳雜病痙門面赤而斑斑如錦紋咽喉痛唾膿血者陽毒也詳陽毒面垢三陽合病腹滿身重難轉側口不仁譫語面垢遺尿不可汗下面青太陽病汗後遂發熱惡寒復加燒針因胸痞面青膚潤者難治色微黃身足溫者易愈目赤少陽中風兩耳無聞目赤胸滿而煩者不可吐下小柴胡湯附面黃孫兆口訣云工部郎中鄭厚忠患傷寒胸腹滿面黃如金色諸翰林醫官商議略不定推讓曰胸滿可下恐脈浮虛召孫至曰諸公雖疑不用下藥鄭之福也下之必死某有一二服藥服之必瘥遂下小陷胸湯尋利其病遂良愈明日面色改白京師入稱服壞病仲太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不定與也觀其脈證知犯何逆隨證治之按逆者謂不當汗而汗不當下而下或汗下過甚皆不順於理故云逆也隨證治之者如後云汗後病不解及發汗若下之病仍不解某湯主之之類是也隨證治之一句語活而義廣王韓諸家以壞病另作一證而以羊肉湯主之誤矣本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯若以吐下發汗溫針譫語柴胡證罷此為壞病知犯何逆以法治之趙仲景論中所謂壞病者以太陽病誤汗吐下後虛煩結胸痞氣吐後內煩腹脹滿等證是也此正謂桂枝不定與小柴胡湯證罷者曷嘗指異氣之病如活人所謂異氣為壞病之說仲景又云更感異氣變為他病者即索矩所為二氣三氣雜合為病是也以其未可定名而非有名四種溫病之比故以變病名之且四經溫病仲景以為冬傷於寒至春發為溫病溫病未已重遇於邪變為溫瘧風溫溫毒溫疫病未嘗壞故以變證名之一曰壞病一曰變證名目自是不同可見異氣不為壞病也審矣假如溫瘧果為壞病則仲景不言小柴胡湯證罷也請三思焉是齋方傷寒陰陽二證不明或投藥錯誤致患人困重垂死七日以後皆可服傳者云千不失一用好人參一兩去蘆薄切水一大升於銀石器內煎至一盞以新水沉之取冷一服而盡汗不自他出只在鼻梁尖上涓涓如水是其應也妙甚蘇韜光云侍郎方丈嘗以救數十人王使君宰清流日卒車申屠行父之子婦產後病時疫一十餘日已成壞病偶見問因觀其只服人參一味遂安是時未知有此方偶然暗合耳海陽證大汗大下後亡陽於外亡血於內上而津脫下而液脫津液兩亡宜以羊肉湯補之矧陰證者豈可不溫補哉此與傷寒太陽證振搖與真武湯一例外之陽病至此尚溫況內之陰候豈得不補耶韓產脫血虛者宜用羊肉湯傷寒汗下太過亡陽失血若只用救逆效必遲矣與羊肉湯為效神速病人面色雖見陽是客熱上焦中下二焦陰氣已盛若調得下焦有陽則上焦陽氣下降丹田知所歸宿矣夫氣有高下病有遠近證有中外治有輕重各適其所乃愈故病八九日汗下太過二脈沉細無力多蜷足臥惡聽人聲皮有粟時戰如瘧宜羊肉湯主之羊肉湯方當歸白芍藥牡蠣煆赤各一兩生薑二兩桂枝七錢半龍骨煆通赤半兩黑附子炮皮去臍四錢上為粗末每服一兩羊肉四兩蔥白五寸生薑心同銼爛以水五升熬減一半以來濾絞去滓分三服服之按此方陰證宜之鱉甲散治傷寒八九日不瘥諸藥不效名壞傷寒鱉甲醋炙為末升麻前胡烏梅肉枳實犀角鎊黃芩各半兩甘草二錢半生地黃一兩每服五錢水一盞半煎至八分去滓服按此方陽證宜之振戰慄成振者聳動也戰者戰搖也慄者心戰也振輕而戰重也戰外而慄內也振者責其虛寒虛則不至於爭故止於振聳耳戰者為正與邪爭爭則股慄而戰矣戰雖重於振而慄重於戰也戰者正氣勝慄者邪氣勝也皆邪正之相爭也太陽傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之成吐下后里虛氣上逆者心下逆滿氣上衝胸表虛陽不足起則頭眩脈浮緊為邪在表當發汗脈沉緊為邪在裡則不可發汗則外動經絡損傷陽氣陽氣外虛則不能主持諸脈身為振振搖也與此湯以發汗和經益陽茯苓桂枝白朮甘草湯方桂枝去皮三兩茯苓四兩白朮甘草各二兩炙上四味以水六升煮取三升去滓分溫三服陽不足者補之以甘茯苓白朮生津液而益陽也裡氣逆者散之以辛桂枝甘草行陽散氣太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地真武湯主之方見下利孫太乙宮道士周德真患傷寒發汗出多驚悸目眩身戰掉欲倒地眾醫有欲發汗者有作風治者有用冷藥解者病皆不除召孫至曰太陽經病得汗早欲解不解者因太陽經欲解復作汗腎氣不足汗不來所以心悸目眩身轉遂作真武湯服之三服微汗自出遂解蓋真武湯附子白朮和其腎氣腎氣得行故汗得來也若但責太陽者惟能幹涸血液爾仲景云尺脈不足榮氣不足不可以汗以此知腎氣怯則難得汗也明矣許學士云鄉里有一姓高者子年三十初得病身微汗脈弱惡風醫以麻黃藥與之汗遂不止發熱心多驚悸夜不得眠譫語不識人筋惕肉瞤振振動搖醫又進鎮心藥予曰強汗之過也仲景曰脈微汗出惡風不可服青龍湯服之則筋惕肉瞤此為逆也惟真武湯可救進此三服佐以清心竹葉湯數日遂愈清心竹葉湯方未考下後復發汗必振寒脈細微所以然者以內外俱虛故也亡血家不可發汗發汗則寒慄而振太陽病火熨其背大汗出火熱入胃發譫語十餘日振慄自下利者此為解也詳譫語脈沉緊按之芤當戰而汗出解脈芤為虛是以發戰脈浮為在表故當汗出解也論見首卷太陽病脈陰陽俱停等證必戰慄汗出而解論見發熱凡柴胡證下之苟下之而仍不罷者復與柴胡湯必蒸蒸而振發熱汗出而解論見往來寒熱脈浮而遲面熱赤而戰惕者當汗出解也反發熱者脈遲不能作汗其身必癢論見面赤諸乘寒者則為厥鬱冒不仁口急不能言戰而慄也陰中於邪必內慄也表氣微虛里氣不守故邪中於陰也韓汗下後戰者與救逆湯微減與羊肉湯再投而戰解若陰氣內盛正氣大虛心慄鼓頷身不戰者遂成寒逆宜灸之或用大建中湯仲景治屍厥戰而慄者刺期門巨闕吳凡振者大抵氣血俱氣不能榮養筋骨故為之振搖而不能主持也須大補氣血則可予曾用人參養榮湯得效又一人身搖不得眠者以十味溫膽湯倍加人參遂愈內經曰寒之傷人使人毫毛畢直鼓頷戰慄而無汗按此表寒而戰慄也經言病有戰而汗出因得解其脈浮而緊按之反芤此為本虛故當戰而汗出也又曰脈陰陽俱停以三部浮沉遲數脈同等必先振慄汗出而解若脈浮數按之不芤其人本不虛者則汗出而解不發戰也若不發戰而心慄者此陰中於邪必內慄也凡正氣怯弱寒邪在內必為慄也學者宜詳究焉加味人參養榮湯治發汗過多氣血俱虛而筋惕肉瞤或身振搖者人參二錢半茯苓甘草川芎各一錢白朮麥門冬去心當歸身各一錢半五味子十五粒肉桂一錢有熱者減半生地黃一錢半有熱者用此無汗用熟地黃黃耆二錢半有自汗者用二錢生薑三片棗子二枚擘水二鍾煎至一鍾去滓溫服如陰虛相火動者加知母黃柏各一錢酒炒用若陽虛下寒脈微者加熟附子一錢肉桂倍之不得眠加遠志酸棗仁各一錢加味溫膽湯治虛煩身振不得眠人參二錢半橘紅茯苓黃連酒炒軟苗柴胡當歸身川芎白芍藥生地黃酸棗仁以上各一錢半夏七分甘草五分竹茹一團生薑三片上煎服法前同筋惕肉瞤成經雲陽氣者精則養神柔則養筋發汗津液枯少陽氣大虛筋肉失養故惕惕而跳瞤瞤然而動也直宜溫經益陽真武之類是矣又傷寒吐下後復發汗筋脈動惕者久而成痿及太陽病發汗復下之表裡俱虛復加燒針因膚瞤者難治二者逆之甚也又非若但發汗後可比發汗吐下庸可忽諸太陽病脈微弱汗出惡風者不可服大青龍湯服之則厥逆筋惕肉瞤宜真武湯太陽病已汗不解仍發熱頭眩身瞤振振欲擗地者真武湯或以人參養榮湯倍人參當歸傷寒吐下後復發汗虛煩脈甚微八九日心下痞脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿真武湯桂枝苓朮甘草湯陽明傷寒吐下後不解不大便五六日至十餘日日晡所發潮熱不惡寒獨語如見鬼狀循衣摸床惕而不安喘微直視脈弦者生澀者死但發熱譫語者大承氣湯陽明脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若加燒針必怵惕躁煩不得眠若動氣在左頭汗不止者活人用防風白朮牡蠣次服建中湯診汗下吐溫針後若膚瞤動胸煩面色青黃者難治論見痞活傷寒吐下後發汗脈微心下痞脅痛氣上衝筋脈動惕此為逆甚吳夫此證者因發汗攻表太過邪熱未解血氣虛奪筋肉失養所致或不因此由素稟血少邪熱搏於血脈之中火性動惕故也曾治一人傷寒不經發汗七八日筋脈動惕潮熱來尤甚其肉不瞤大便秘結不行小便赤澀以手按臍旁硬痛此有燥屎也以加味大柴胡湯下之而愈又一人傷寒十餘日曾三四次發汗過多遂變肉瞤身振搖筋脈動惕此汗多氣血俱虛故也以加味人參養榮湯二劑而愈又一人汗後虛煩不得眠筋惕肉瞤內有熱以加味溫膽湯治之而愈凡治此證要察虛實也叉手冒心發汗過多叉手自冒心心下悸常欲按者桂枝甘草湯見悸驚悸驚悸之別雜病中辨之甚明傷寒中有單言驚者有單言悸者理不得淆故兩分之其兼言驚悸者則少陽耳聾目赤胸滿而煩者不可吐下吐下則悸而驚一條而已海茯苓丸治傷寒後或用心勞倦四肢羸弱心忪驚悸吸吸短氣茯神麥門冬去心熟地各一兩牡丹皮人參黃耆各七錢桂枝甘草炙牛膝澤瀉各半兩上為細末煉蜜和搗三五百杵丸如梧桐子大每服二十丸食前溫酒下犀角湯治傷寒後伏熱在心怔忡驚悸不得眠睡犀角屑半兩鎊茵陳蒿七錢半茯苓二兩芍藥二兩生地黃焙二兩麥門冬去心一兩半山梔半兩上㕮咀每服五錢水一盞生薑二片竹葉三七片同煎至七分食後服麥門冬茯苓飲子治傷寒後心神恍惚不得臥麥門冬去心赤茯苓去皮知母焙芎藭炙甘草酸棗仁微炒陳皮去白炒檳榔各一兩上㕮咀每服五錢水一盞半生薑五片煎溫服日三驚夫驚壞病也由誤下火逆溫針所致仲景之法不過隨其逆而調之傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之成傷寒八九日邪氣已成熱而復傳陽經之時下之虛其里而熱不除胸滿而煩者陽熱客於胸中也驚者心惡熱而神不守也小便不利者裡虛津液不行也譫語者胃熱也一身盡重不可轉側者陽氣內行於里不營於表也與柴胡湯以除胸滿而煩加龍骨牡蠣鉛丹收斂神氣而鎮驚加茯苓以行津液利小便加大黃以逐胃熱止譫語加桂枝以行陽氣而解身重雜錯之邪斯悉愈矣柴胡加牡蠣龍骨湯方半夏湯洗二合柴胡四兩大黃二兩人參桂枝去粗皮茯苓龍骨鉛丹牡蠣熬生薑各一兩半大棗六枚上十一味以水八升煮取四升納大黃切如棋子更煮一二沸去滓溫服一升傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之成傷寒脈浮責邪在表醫以火劫發汗汗大出者亡其陽汗者心之液亡陽則心氣虛心惡熱火邪內迫則心神浮越故驚狂起臥不安與桂枝湯解未盡表邪去芍藥以芍藥益陽非亡陰所宜也火邪錯逆加熱漆之辛以散之陽氣亡脫加龍骨牡蠣之澀以固之本草云澀可去脫龍骨牡蠣之屬是也桂枝去芍藥加蜀漆龍骨牡蠣救逆湯方桂枝去粗皮生薑切蜀漆洗去腥各三兩牡蠣熬五兩龍骨四兩甘草炙二兩大棗十二枚劈上為末以水一斗二升先煎蜀漆減二升納諸藥煎取三升去滓溫服一升太陽傷寒者加溫針必驚也心屬火火先入心心主血而藏神血如水也神如魚也兩陽相熏灼水熱湯沸則魚驚躍不能安矣風溫脈浮自汗身重多眠若被火者微則發黃劇則如驚癇時瘛瘲論見風溫吳大抵傷寒汗吐下之後虛極之人或因事未決遂生驚悸者宜養血安神鎮心之劑或硃砂安神丸之類悸成悸心忪也築築惕惕然動怔怔忪忪不能自安也有氣虛而悸有停飲而悸有汗下後而悸者汗為心液汗去心虛如魚無水故悸傷寒二三日心悸而煩者小建中湯少陰病四逆或悸者四逆散加桂是氣虛而悸也陽氣內弱心下空虛故悸飲水多心下悸是停飲而悸也心為火而惡水水既內停心不自安則為悸矣太過病發汗過多叉手自冒心心下悸者太陽病若下之身重心下悸者不可發汗少陽病不可發汗汗則譫語此屬胃胃和則愈胃不和則煩而悸少陽病不可吐下吐下則悸而驚是數者皆汗下後挾邪而悸者也其治或鎮固之或化散之惟飲之為悸甚於他邪雖有餘邪必先治悸何者以水停心下無所不入侵於肺為喘嗽傳於胃為噦噎溢於皮膚為腫漬於腸者為利治不可緩也故經曰厥而心下悸宜先治水與茯苓甘草湯後治其厥病甚重猶先治水況病之淺者乎太陽傷寒二三日心中悸而煩者小建中湯方見腹痛傷寒脈結代心動悸炙甘草湯主之成結代之脈動而中止能自還者名曰結不能自還者名曰代由血氣虛衰不能相續也心中悸動知真氣內虛也與炙甘草湯益虛補血氣而脈復炙甘草湯方一名復脈湯甘草炙四兩生薑切桂枝去粗皮各三兩人參阿膠各二兩生地黃一片麥門冬去心麻子仁各半升大棗十二枚擘上九味以清酒七升水八升先煮八味取三升去滓納膠烊消盡溫服一升日三服補可以去弱人參甘草大棗之甘以補不足之氣桂枝生薑之辛以益正氣聖濟經曰津耗散為枯五臟痿弱榮衛涸流濕劑所以潤之麻仁膠阿麥門冬地黃之甘潤經益血復脈通心也太陽病小便利者以飲水多必心下悸小便少者必苦裡急也成飲水多而小便利者則水不內蓄但胸中水多令心下悸金匱要略曰食少飲多水停心下甚者則悸飲水多而小便不利則水蓄於內而不行必苦裡急也小便不利茯苓甘草湯裡急十棗湯脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裡虛須表裡實津液自和便自汗出愈詳自汗發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之成發汗過多亡陽也陽受氣於胸中胸中陽氣不足故病叉手自冒心心下悸欲得按者與桂枝甘草湯以調不足之氣桂枝甘草湯方桂枝之辛走肺而益氣甘草之甘入脾而緩中桂枝去粗皮四兩甘草炙二兩上二味以水三升煮取一升去滓頓服發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之汗者心之液發汗後臍下悸者心氣虛而腎氣發動也腎之積名曰奔豚發則從少腹上至心下為腎氣逆欲上凌心今臍下悸為腎氣發動故云欲作奔豚與茯苓桂枝甘草大棗湯以降腎氣茯苓桂枝甘草大棗湯方茯苓半斤桂枝去粗皮四兩甘草二兩炙大棗十五枚掰上四味以甘爛水一斗先煮茯苓減二升納諸藥煮取三升去滓溫服一升日三服作甘爛水法取水二斗置大盆內以杓揚之水上有珠子五六千顆相逐取用之茯苓以伐腎邪桂枝能泄奔豚甘草大棗之甘滋助脾土以平腎氣煎用甘爛水者揚之無力取不助腎氣也太陽病汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地真武湯少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚救逆小柴胡去黃芩加茯苓趙少陽經病證為不可吐下吐下則悸而驚又云尚未吐下脈沉緊者小柴胡湯又云已吐下發汗溫針後譫語為壞病蓋不可吐下者禁止之辭也未吐下者未經誤治但可和解而已已汗下者失於誤治成壞病也活人於少陽經病證中雲尚未可吐下今添一可字恐未穩傷寒五六日中風往來寒熱胸脅滿默默不欲飲食心煩喜嘔或心下悸或不渴身有微熱或咳者小柴胡湯傷寒脈弦細頭痛發熱者屬少陽不可汗汗則譫語此屬胃胃和則愈胃不和則煩而悸調胃承氣湯少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之悸者加桂五分厥陰傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也手足厥冷而悸者茯苓甘草湯手足逆而不溫者四逆散加桂枝霍亂吐利心悸者理中丸加茯苓臟結與結胸痞氣大同小異問曰病有結胸有臟結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸也何謂臟結答曰如結胸狀飲食如故時時下利寸脈浮關脈細小沉緊名曰臟結舌上白苔滑者難治成結胸者邪結在胸臟結者邪結在臟二者皆下後邪氣乘虛入里所致下後邪氣入里與陽相結者為結胸以陽氣受於胸中故爾與陰相結者為臟結以陰受之則入五臟故爾氣宜通而塞故痛邪結陽分則陰氣不得上通邪結陰分則陽氣不得下通是二者皆心下硬滿寸脈浮關脈沉知邪結在陽也寸脈浮關脈小細沉緊知邪結在陰也陰結而陽不結雖心下結痛飲食亦自如故陰氣乘陽虛而下故時時自下利陰得陽則解臟結得熱證多則易治舌上白苔滑者邪氣結胸中亦寒故云難治按本文曰如結胸狀則與結胸當有分別矣注曰是二者皆心下硬痛欠穩當如結胸狀飲食如故只是按之不痛耳既結於臟而舌白苔又為胸寒外證上下俱病故難治也王朝奉云可刺關元穴臟結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也成臟結於法當下無陽證為表無熱不往來寒熱為半表半裡無熱其人反靜為里無熱經云舌上如胎者以丹田有熱胸中有寒以表裡者皆寒故不可攻王朝奉云可刺關元穴服小柴胡湯病胸中素有痞連在臍旁引入少腹入陰筋者此名臟結死病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也張或謂成無己注云無熱而惡寒者發於陰也既無熱而惡寒為陰證安有下之之理又豈止作痞而已哉夫仲景所謂陰陽者指表裡而言也非此之謂也病在表則當汗而反下之因作結胸病雖在裡尚未入腑而輒下之因作痞所以成結胸者下之太早故也痞者下之太早故也經曰脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮又曰脈浮而緊復下之緊反入里則作痞由此推之風邪入里則結胸寒邪入里則為痞然此亦皆太陽病之所致非陰證之所為也又云病在陽應以汗解陽指表證而言也明矣況痞證諸條未有因無熱而惡寒下之而成者此成先生之誤也傷寒五六日嘔而發熱柴胡證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之若滿而不痛者此為痞柴胡不中與也宜半夏瀉心湯活人云知是痞先用桔梗湯尤妙此方行氣下膈用無不效正氣未衰里不受邪故蒸蒸而振發熱汗出然後則愈若下後邪傳裡甚心下痞而硬痛者為結胸宜大陷胸湯以下里邪痞微但滿而不痛此為柴胡不可用半夏瀉心湯無己云下後陽邪傳裡者則結於胸中以胸中為陽受邪與陷胸湯仲景於心下滿而硬痛者與結胸在心之下乎無己巧言曲喻以陽受氣於胸中陽邪傳裡則結於胸為結胸者誤也結胸心下痞結按之硬滿而痛者結胸也按之硬滿不痛者痞氣也經曰病發於陽發熱而惡寒者反下之熱入因作結胸病發於陰無熱而惡寒者反下之因作痞所以成結胸者下之太早也蓋表當汗反下之裡之正氣為下所損則表之全熱乘虛入里結於心下為結胸也里之陰分已受邪熱為病是謂發於陰也或微熱下證未全不任轉瀉而反下之則里之微熱雖除而表之熱邪又至雖不結胸亦成痞也小結胸輕於大結胸而重於此也由誤之大小非以痞為寒也經謂但結胸無大發熱證為寒實結胸誠非寒也但熱微甚爾及夫臟結者經謂熱結於臟則為病深故云難治若用涼劑而亦有生又陽結者熱結於腑則微而淺也又留飲不敗而成頭汗脈沉潛及附骨者積飲成水結胸也又有不因誤下而成結胸與痞者此又失下及夫反汗而成者也經謂熱已入里久不攻之亦至結實名曰三死一生是失下也汗後熱氣傳入心下而痞者是失汗也結胸固知當下或脈浮大者又不可下下之則死是猶帶表邪未全結實故也又結胸證悉具加之煩躁者亦不治也夫藥所以能逐邪者必待胃氣施布藥力始能溫汗吐下以逐其邪邪氣勝胃氣絕者安可為之太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之成動數皆陽脈也當責邪在表睡而汗出者謂之盜汗為邪氣在半里半表則不惡寒此頭痛發汗微盜汗出又惡寒者表未解也當發其汗醫反下之虛其胃氣表邪乘虛則陷邪在裡則見陽脈邪在裡則見陰脈邪氣內陷動數之脈所以變遲而浮脈獨不變者以邪結胸中上焦陽結脈不得而沉也客氣者外邪乘胃中空虛入里結於胸膈膈中拒痛者客氣動膈也金匱要略曰短氣不足以息者實也短氣躁煩心中懊憹皆邪熱為實陽氣內陷氣不得通於膈壅於心下為硬滿而痛成結胸也與大陷胸湯以下結熱丹謹按太陽病在表未曾解在表而攻裡可謂虛矣而況所得之脈皆浮而動數乎今得誤下動數變遲矣而又曰胃中空虛又曰短氣躁煩虛之甚矣借曰陽氣內陷心下因硬而可迅攻之乎豈大結胸之力緩於承氣況已下者不可再下寧不畏其虛乎上文曰結胸脈浮大者不可下下者死又曰結胸證悉具煩躁者死今曰脈浮又曰煩躁大陷胸果可用乎彼陽病實下後若胃中空虛客氣動膈心中懊憹者以梔子豉湯吐胸中之邪況太陽失下後明有虛證乎傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之上文既言病發於陽而反下之熱入因作結胸則下文不必贅矣上文但言所致結胸之由至此則又發明結胸之脈與證也成注謂此不云下後而云傷寒六七日則是傳裡之實熱誤矣張經言所以成結胸者以下之太早故也此不云下後則云傷寒六七日結胸熱實此亦不因下早而結胸者何也夫下早結胸事之常熱實結胸事之變其熱實傳裡為結胸乃法之關防不盡者故仲景述其證以注方於其下也於此可見古人用心曲盡其妙且如下章以水結胸脅但頭汗出者以大陷胸湯主之亦在常法之外故條例其證以彰其理也亦或其人本虛或曾吐下而裡氣弱外邪因入故自為結胸者也然所入之因不同其證治則一理而已傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之成傷寒十餘日熱結在裡是可下之證復往來寒熱為正邪分爭未全斂結與大柴胡湯下之但結胸無大熱者非熱結也是水余結於胸脅謂之水結胸周身汗出者是水飲外散則愈若但頭微汗出余處無汗是水飲不得外泄停蓄而不行也與大陷胸湯以逐其水活人云水結胸小半夏加茯苓湯以小柴胡去大棗加牡蠣湯太陽病重發汗而復下之不大便五六日舌上燥而渴日晡時小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之詳潮熱大陷胸湯方大黃六兩去皮芒硝一升甘遂一錢為末上三味以水六升先煮大黃取二升去滓納芒硝煮一二沸納甘遂末溫服一升得快利止後服結胸由邪在胸中處身之高分宜若何吐然所謂結者諸陽受氣於胸中邪氣與陽氣相結不能分辨氣不通壅於心下為硬為痛是邪正固結於胸中非虛煩膈實之所同是須攻下可也低者舉之高者陷之以平為正結胸為高邪陷下以平之故曰陷胸湯也陷胸破結非苦寒直達者不能是以甘遂為君內經曰鹹味湧泄為陰又曰咸以軟之氣堅者以咸軟熱勝者以寒消是以芒硝鹹寒為臣盪滌邪寇除去不平將軍之功也陷胸滌熱是以大黃苦寒為使利藥之中此駛劑也傷寒錯惡結胸為甚非此不能通利劑大而數少須其迅速分解邪結也丹此證經曰胃中空虛曰短氣躁煩曰脈浮此湯不可輕用小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之上文云硬滿而痛不可近者是不待按而亦痛也此云按之則痛是手按之然後作痛爾上文云至少腹是通一腹而言之此云在正心下則少腹不硬痛可知矣熱微於前故云小結胸也小陷胸湯方半夏湯洗半升黃連一兩栝蔞實大者一枚上三味以水六升先煮栝蔞取三升去滓納諸藥煮取二升去滓分溫三服一服未效再微服解下黃涎便安也苦以泄之辛以散之黃連栝蔞實之苦寒以泄熱半夏之辛以散結病在陽應以汗解之反以冷水噀之若灌之其熱被卻不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服白散方桔梗貝母各三分巴豆一分去皮心熬黑研如脂上三味為末納巴豆更於臼中杵之以白飲和服強者半錢羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯假令汗出已腹中痛與芍藥一兩如上法上熱實結胸及寒實結胸活人不拘寒熱但用陷胸湯不瘥者用枳實理中丸應手而愈結胸項亦強如柔痙狀下之則和宜大陷胸丸大陷胸丸方大黃半斤葶藶熬芒硝杏仁去皮尖熬黑各半升上四味搗篩二味納杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法海藏云大陷胸湯太陽入本藥也大陷胸丸陽明藥也小陷胸湯少陽藥也大陷胸治熱實大陷胸丸兼喘小陷胸治痞大黃芒硝之苦鹹所以下熱葶藶杏仁之苦甘所以泄滿甘遂取其直達白蜜取其潤利皆以下泄滿實物也心下滿痛如結胸狀若頭下強痛眩冒者刺大椎肝俞若汗下後頭項強痛發熱小便不利者桂枝去桂加茯苓白朮湯方論並見項強太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒也反下之若利止必作結胸未止者四日復下之此作協熱利也太陽病下之脈浮者必結胸也太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩結胸證悉具煩躁者亦死結胸脈浮大不可下下之則死張用藥如兵用知可而進知難而退此理勢之必然也夫寸淫關沉乃結胸可下之脈今脈浮大心中雖結其表邪尚多未全結也若輒下之重虛其裡外邪復聚而必死矣仲景所以言此為箴戒使無踵其弊也其脈既不可攻當以候其變而待其實假如小結胸證其脈浮滑按之則痛故知邪非深結亦不敢下無過解除心下之熱耳小陷胸湯主之或又曰結胸倘有外證大陷胸遠可用否予曰結胸無外證或有微熱或有小潮熱仲景已明言之其餘別無表證其邪亦未結實不可以結胸論也經曰傷寒六七日若有外證發熱惡寒支節煩痛微嘔心下支結外證未去者柴胡加桂枝湯主之又傷寒六七日已發汗而復下胸脅微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此未為解也柴胡桂枝幹薑湯主之以上之證雖云心下支結及言胸脅滿微結二條俱有外證所以柴胡加桂及加桂姜以和解之如無外證止有胸腹結實而痛者方為結胸病也附活若誤下之初未成結胸者急頻與理中湯自然得解更不作結胸蓋理中湯治中焦故也此古人亦說不到後人因消息得之若大叚轉損有厥證者兼與四逆湯便安胃中雖和傷寒未退者宜候日數足可下卻以承氣再下之蓋前來下之未是故也西晉崔功行雲傷寒結胸欲絕心膈高起手不得近用大陷胸湯皆不瘥者此是下後虛逆氣已不理而毒復上攻氣毒相搏結於胸者當用枳實理中丸先理其氣次療諸疾古今用之如神枳實理中丸方枳實十六斤麩炒茯苓人參白朮乾薑炮甘草炙以上各二兩上為末煉蜜丸如雞子黃大每服一丸熱湯化下連進二三服胸中豁然渴者加栝蔞根一兩自汗者加牡蠣二兩煆過下利亦加海增損理中丸王朝奉云大小陷胸湯丸不愈者宜與之人參白朮栝蔞牡蠣煆甘草炙各二兩乾薑炒白半兩枳實麩炒二十四枚黃芩去枯一兩上為末煉蜜為丸如彈子大湯一盞煎服一丸不解復與之不過五六丸胸中豁然矣藥之神速未嘗見也渴者加栝蔞根自汗加牡蠣活水結在胸脅間亦名結胸其證頭微汗出但結胸無熱者小半夏加茯苓湯小柴胡去棗加牡蠣孫俞伯道忽患微熱心下滿頭有汗不能解眾醫以為溫病用表藥有謂食在膈者治之皆不愈召孫至乃用半夏茯苓湯遂瘥眾問其故曰頭有汗心下滿非濕證乃水結胸脅也水既去其病乃愈且如濕氣心下滿自當遍身汗若有食心滿頭豈得汗若言是表身又不疼不惡寒表證何在故凡水結胸脅頭必有汗耳小半夏加茯苓湯方見嘔門穿結散大實大滿心胸高起氣塞不通者為結也蟾酥麝香輕粉巴豆另研少許上再研過至細以乳汁為丸如黍米大每服二丸用薑湯下不時服本婦人傷寒血結胸膈揉而痛不可撫海蛤散海蛤滑石甘草炙各二兩芒硝半兩上末每服二錢雞子清調下小腸通利則胸膈血散膻中血聚則小腸壅小腸壅膻中血不流行宜此方若小便血散數行更宜桂枝紅花湯發其汗則愈活人書云此方疑非仲景然其言有理姑存之戴熱實結胸如仲景法治之又有寒實結胸雖痛而無煩躁等證此因下後虛逆寒氣獨結宜理中湯加枳實半錢茯苓一錢或枳實理中湯又有水結胸無大熱證頭微汗出宜小半夏茯苓湯又有血結胸手不可近其人嗽水不欲咽喜忘如狂大便黑色小便自利宜犀角地黃湯陶結胸之證嘗見俗醫不問曾下與未下但見心胸滿悶便與桔梗湯便呼為結胸蓋本朱奉議之說也有頻頻與之反成真結胸者殊不知結胸乃下早而成未經下者非結胸也乃表邪傳至胸中未入於腑證雖滿悶尚為在表正屬少陽部分為半表半裡之間宜用小柴胡湯加枳殼如未效則以本方對小陷胸湯一服豁然其妙如神若因下早而成者方用陷胸湯丸分淺深從緩而治之不宜太峻上焦乃清道至高之分若過下則傷元氣也故陷胸湯丸宜從緩治之嘗讀仲景傷寒論結胸條云病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞滿所以成結胸者以下太早故也及成氏註釋曰發熱惡寒者發於陽也無熱惡寒發於陰也再三熟玩不能不致疑於其間蓋無熱惡寒者寒邪直中陰經之真寒證也非陽經傳至陰經之病也若誤下之不死則危矣豈可以瀉心湯寒熱相參之藥治之而愈乎豈反輕如結胸者乎詳此恐言榮衛陰陽也風屬陽陽邪傷衛頭痛發熱微汗出反惡寒者當服桂枝湯止汗散邪醫者不達而下之胃氣重傷胸中結硬經又云結胸證脈浮大者不可下下之則死結胸證悉具而煩躁者亦死蓋衛出上焦清道所傷不為不重也故用陷胸湯峻利之藥以下之寒為陰陰邪傷榮當服麻黃髮表誤下之而成痞滿宜瀉心湯以理痞蓋榮出中焦黃連能瀉心下痞邪下於膈不犯清道則元不傷故輕於結胸耳若陰經自中之寒以瀉心湯理之而愈者未之有也又云脈來沉實有力方為結胸急用大陷胸湯加枳桔下之治結胸灸法巴豆十四個黃連七寸去皮上搗細津唾和成膏填入臍中以艾灸其上腹中有聲其病去矣不拘壯數病去為度才灸後便以溫湯浸手帕拭之恐生瘡也摘傷寒結胸先使人心蔽骨下正痛處左畔揉之以毫針刺左畔支溝穴正坐側臂取之二分次刺左間使名曰雙闕次刺左行間臥取之針入六分此支溝行間穴下針至分數內捻針令病人五吸次外捻針三呼又次內捻針五吸吃長呼一口氣出針即左畔一壁結胸立效右畔依上刺之慢慢呼吸停針用針獲時而愈云傷寒結胸痞氣胸中結痞湧泉太谿中衝太陵心中結痞隱白太白少衝神門胃中結痞少商太澗大敦太衝並上下腕瀉之通玄結胸身黃湧泉摘血結胸面赤大燥口乾消渴胸中疼痛不可忍期門太陵關元妊娠不得刺關元胎死不出子母俱亡慎之集傷寒胸膈痛期門太陵活近世治結胸多用金針並用硫黃陽起石若寒實結胸或有瘥者而熱實結胸必死也痞心下滿硬而痛者為實為結胸硬滿不痛者為虛為痞氣不滿不硬但煩悶者為支結保命集云脾不能行氣於四臟結而不散則為痞大抵諸痞皆熱也故攻痞之藥皆寒劑其有一加附子者是以辛熱佐其寒涼欲令開發痞之之怫鬱結滯非攻寒也先發汗或下後陽氣虛故惡寒汗出太陽證云發汗後惡寒者虛也此加附子恐大黃黃連損其陽也非補虛也痞硬傷寒嘔而發熱者柴胡證具而以他藥下之若心滿而不痛者此為痞宜半夏瀉心湯論見結胸痞同異半夏瀉心湯方此方藥味蓋本理中人參黃芩湯方也半夏半升洗黃芩乾薑人參甘草炙以上各三兩黃連一兩大棗十二枚擘上七味以水一升煮取六斗去滓再煮取三升溫服一升日三服若加甘草即甘草瀉心湯治痞硬吐利若加生薑即生薑瀉心湯治痞硬噫氣辛入肺而散氣半夏之辛以散結氣苦入心而泄熱黃芩黃連之苦入心痞熱脾欲緩急食甘以緩之人參甘草大棗之甘以緩脾痞硬下利傷寒汗出解之後胃中不和心下痞硬幹噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之成胃為津液之主陽氣之根大汗出後外亡津液胃中空虛客氣上逆心下痞硬金匱要略曰中焦氣未和不能消穀故令噫乾噫食臭者胃虛而不殺穀也脅下有水氣腹中雷鳴土弱不能勝水也與瀉心湯以攻痞加生薑以益胃生薑瀉心湯方生薑四兩切半夏半升洗甘草炙人參黃芩各三兩黃連二兩乾薑一兩大棗十二枚擘上八味以水一斗煮取六升去滓再煎取三升溫服一升日三服傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故便硬也甘草瀉心湯主之成傷寒中風是傷寒或中風也邪氣在表醫反下之虛其腸胃而氣內陷也下利日數十行穀不化腹中雷鳴者下后里虛胃弱也心下痞硬幹嘔心煩不得安者胃中空虛客氣上逆也與瀉心湯以攻痞加甘草以補虛前以汗後胃虛是外傷陽氣故加生薑此以下後胃虛是內損陰氣故加甘草甘草瀉心湯方甘草四兩黃芩乾薑各三兩半夏湯洗半升黃連大棗十二枚擘上六味以水一斗煮取六升去滓再煎取三升溫服一升日三服成氣結而不散壅而不通為結胸陷胸湯為直達之劑塞而不通否而不泰為痞瀉心湯為分解之劑瀉心者謂瀉心下之邪也痞與結胸有高下焉邪結在胸中故曰陷胸湯痞者留邪在心下故曰瀉心湯內經曰苦先入心以苦瀉之瀉心者必以苦為主是以黃連為君黃芩為臣以降陽而升陰也內經曰辛走氣辛以散之散痞者必以辛為君故以半夏乾薑為佐以分陰而行陽也陰陽不交曰痞上下不通曰滿欲通上下交陰陽必和其中所謂中者脾胃也脾不足者以甘補之故用人參甘草大棗為使以補脾而和中中氣得和上下得通陰陽得分水升火降則痞消熱已而大汗解矣痞濡脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳濡與硬反作痞恐當作結胸心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之結言胸痞言心下結言按之石硬痞言按之濡結言寸脈浮關脈沉痞不言寸而但曰關上浮可以知二病之分矣活人云結胸與痞關脈須皆沉若關脈浮而結者三黃以瀉肝大黃黃連瀉心湯大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾絞去滓分溫再服內經曰火熱受邪心病生焉苦入心寒除熱大黃黃連之苦寒以導瀉心下之虛熱但以麻沸湯漬服者取其氣薄而瀉虛熱心下痞而復惡寒汗出者附子瀉心湯主之因惡寒汗出故加附子以溫經固陽附子瀉心湯方大黃黃連黃芩各一兩附子一枚炮去皮臍破別煮取汁上㕮咀以麻沸湯二升熱漬之一時久絞去滓納附子汁分溫再服傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯活人云大抵結胸與痞皆應下然表未解者不可攻也表證未解心下妨悶者非痞也謂之支結柴胡桂枝湯主之胸脅滿微結小柴胡加乾薑牡蠣湯主之本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓湯主之成本因下後成痞當與瀉心湯除之若服之痞不解其人渴而口燥煩小利便不者為水飲內蓄津液不行非熱痞也與五苓散發汗散水則愈一方忍之一日乃愈者不飲水者外水不入所停之水得行而痞亦愈也痞硬吐利傷寒發熱汗出不解心中痞硬嘔吐而下利者大柴胡湯主之心下痞硬嘔逆下利若表解身涼脅痛十棗湯主之方論並見脅痛活人云十棗湯大柴胡湯皆治心下痞十棗尤難用須是表證罷不惡寒身涼其人漐漐汗出發作有時頭疼心下痞滿引脅下疼乾嘔短氣者乃可用十棗湯表未解者慎不可用也下利表裡未解太陽病外證未除而數下之遂挾熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之成外證未除而數下之為重虛其里邪熱而入裡虛挾熱遂利不止而心下痞若表解而下利心下痞乘虛者可與瀉心湯若不下利表不解而心下痞者可先解表而後攻痞以表裡不解故與桂枝人參湯和里解表桂枝人參湯方桂枝去粗皮甘草炙各四兩白朮人參乾薑各三兩上五味以水九升先煮四味取五升納桂更煮取三升溫服一升日再夜一服表未解者辛以散之裡不足者甘以緩之此以裡氣大虛表裡不解故加桂枝甘草於理中湯也張或問大柴胡湯瀉也桂枝人參湯補也何為皆治下利心下痞硬予曰此非裡實乃下之早因作痞裡虛協熱而利也不觀成氏注云若表解而下利心下痞者是裡實也可與瀉心湯若不下利表不解而心下痞者可先解表而後攻痞此以表裡不解故與桂枝人參和里解表夫傷寒發熱汗出不解心下痞硬嘔吐而下利者表和而里病也以心中痞硬故為實當以大柴胡湯下之二者心下痞硬雖同而虛實之證有別故用藥有攻補之異也痞硬噫氣傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之噫氣即俗所謂噯氣也活人云有旋覆代赭石證其人或咳逆氣虛者先服四逆湯胃寒者先服理中丸次服旋覆代赭湯為良旋覆代赭石湯方旋覆花甘草各三兩炙人參二兩代赭石一兩生薑切五兩半夏湯洗半升大棗十二枚擘上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服硬則氣堅鹹味可以耎之旋覆花之咸以耎痞硬虛則氣浮重劑可以鎮之代赭石之重以鎮虛逆辛者散也生薑半夏之辛以散虛痞甘者緩也人參甘草大棗之甘以補胃弱病解後心下痞硬噫氣若不下利者此方旋覆代赭石湯也若下利者前方生薑瀉心湯也痞硬氣上衝胸中痞硬氣上衝咽不得息者瓜蒂散若心下痞硬脅痛氣上衝咽眩冒者成痿論見氣上衝心活人云下利而心下痞服生薑瀉心湯甘草瀉心湯利不止者當治其下焦赤石脂禹餘糧湯主之蓋生薑瀉心甘草瀉心皆治中焦此利在下焦若只治中焦則利益甚爾服赤石脂禹餘糧利復不止當利其小便五苓散主之又云凡痞服瀉心湯不愈然後可用陷胸丸下之不可用陷胸湯蓋太猛只用陷胸丸發熱惡寒身痛表證未解若心下支結妨悶者柴胡桂枝湯也方見太陽病若心下痞而腹滿者即前條先以桂枝湯解後用大黃黃連瀉心也心下滿似痞而手足厥冷若脈乍結乍緊心煩飢不欲食者瓜蒂散若脈細沉頭汗惡寒大便硬者小柴胡湯論見厥太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫易愈脈浮而大心下反硬有熱屬臟者攻之不令發汗屬腑者不令溲數溲數則大便硬汗多則熱愈甚汗少則便難若脈遲尚未可攻陽明痞胃實心下硬滿者不可攻之論見胃實附桔梗枳殼湯治傷寒痞氣胸滿欲絕枳殼麩炒去瓤桔梗各二兩上㕮咀以水二盞煎至一盞去滓分二服活傷寒本無痞應發汗醫反下之遂成痞枳實理中丸最良審知是痞先用桔梗枳殼湯尤妙緣桔梗枳殼行氣下膈先用之無不驗也趙活人書第七十六問中雲凡痞服瀉心湯不愈然後可用陷胸湯下之愚詳仲景論陷胸湯無治痞之例恐太猛難用又況胸與心下處所不同痛與不痛陰陽邪亦異除結胸外今將痞證以傳經之邪與內陷之邪分為二種而下治焉一者病發於陰身無熱而反下之醫反入里則作痞其脈關上沉為陰邪內陷也先宜桔梗枳殼湯次半夏瀉心諸湯隨證用之服瀉心湯後渴而口燥煩小便不利者五苓散二者身有熱不因下後而傳邪入里亦作痞其脈關上浮為陽邪隨經入里須先解表而不惡寒者宜三黃瀉心又有心下痞而汗出惡寒者以陽邪與表之正氣入里故表虛汗出而惡寒因加附子以固表也既結胸證有寒實熱實之殊則痞證亦有陰陽邪不為異也外有痞而硬者或桂枝人參湯溫之或大柴胡湯十棗湯下之亦自同一律也活人書又云關浮則結熱三黃以瀉肝蓋熱結則成結胸非痞也況心下正屬中焦關脈亦主中部故湯名瀉心豈可援雜病脈例以左關為肝部因謂之瀉肝乎張或謂痞證多有雜以別證而心下痞硬者必非半夏瀉心之所宜也予曰證候不同宜從治療以上諸痞皆雜別證非特下早而成也仲景所以各從其宜用藥以治之若下早而作痞者但滿而不痛別無外證與半夏瀉心湯以攻痞宜也吳夫痞者氣鬱不通泰也若不因下早而為痞者或痰或食或氣為之結也保命集曰治痞用瀉心主之各有冷熱之不同要在辨而治之如熱實而為痞者大黃黃連瀉心湯之類也或寒多而熱少半夏瀉心等湯之類也要之瀉心非瀉心火之熱乃瀉心下之痞滿也心下滿有不因汗下而心下滿者經曰邪結在胸心滿而煩飢不欲食當吐之又曰脈浮而大心下反硬有熱屬臟者攻之吳氏曰按此言屬臟者宿屎在臟也不令發汗二者一吐一下因其邪之高下也又有不可下者如陽明病若心下硬滿不可攻之攻之利不止者死利止者愈是邪在表裡之間留於心下未全入腑故戒之不可下也有因汗下後心下滿而微痛者及吐下後心下逆滿宜桂枝白朮茯苓湯者又有下後心下硬滿成結胸與痞者宜詳審而互考之太陽和解服桂枝或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯傷寒吐下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡加桂枝湯主之活人云不滿不硬心下煩悶謂之支結又謂飲水過多成水結者小半夏茯苓湯傷寒吐五六日大便後身熱不去心中結痛者梔子豉湯傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯太陽少陽並病刺心下硬項強而眩者當刺大椎肺俞慎勿下熨法若心胸脅下有邪氣結實滿悶硬痛用生薑一片搗爛絞去汁以渣炒微燥帶潤絹包之於患處款款熨之稍可又將渣用前汁和勻炒乾再熨許久豁然寬快此為良法傷寒五六日頭汗出微惡寒手足冷心下滿不欲食大便硬脈細者此為陽微結有表復有里也脈沉亦在裡假令純陰結不得復有外證脈雖沉緊不得為少陰病以頭汗出故知非少陰也宜小柴胡湯設不了了者得屎而解陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈或用瀉心湯陽明病腹滿者為邪氣入腑可下之心下硬滿則邪氣尚淺未全入腑不可便下之得利止者為邪氣去正氣安則愈若因下利不止者為正氣脫而死得下病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之詳胃實厥陰病人手足厥冷脈乍緊者邪結在胸中心中滿而煩飢不欲食病在胸中須吐之瓜蒂散吳凡心下滿者正在心之下胃之滿也此自滿而非下之所致若下早心下滿者此為痞氣另有治條凡心下滿者以手按之揉之則散而軟者此虛氣也不發熱者以木香和中湯若發熱者以小柴胡加枳實一錢去黃芩加姜炒黃連一錢減人參一半按之汩汩有聲者有停水也按之硬痛者有宿食也不按而痛其人喜忘者蓄血也各有本條宜詳審而治之凡少陽脈弦口苦發熱心下滿者以小柴胡加枳實黃連各一錢心痛心下痛傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之成傷寒五六日邪氣在裡之時若大下後身熱去心胸空者為欲解若大下後身熱去而心結痛者結胸也身熱不去心中結痛者虛煩也結胸為熱結胸中為實是熱氣已收斂於內則外身熱去虛煩為熱客胸中未結為實散漫為煩是以身熱不去六七日為欲解之時以熱為虛煩故云未欲解也與梔子豉湯以吐除之身熱不去四字要玩結胸而身不熱知熱不在表故可用大小陷胸湯丸以逐下之今熱仍在表故宜越之也成注未透陽明中風脈弦浮大短氣腹滿脅下心痛鼻乾無汗嗜臥身黃小便難有潮熱時時噦者小柴胡湯詳胃實少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯成少陰腎水也青肝色也自利色青為肝邪乘腎難經曰從前來者為實邪以腎蘊實邪必心下痛口乾燥也與大承氣湯以下實邪厥陰為病消渴氣上衝心心中疼熱飢不欲食食則吐蛔下之利不止桂枝茯苓白朮湯附灸傷寒飲水過多腹脹氣喘心下痛不可忍宜灸中腕氣海二穴如小腹有氣上衝者宜灸天樞氣衝三里三陰交如無此證只用前穴煩舊以煩痛亦類入之今詳煩疼者謂身體四肢疼痛煩冤與心煩不同不宜濫入故去之煩者熱也謂煩擾也與發熱若同而異也煩熱為熱所煩無時而歇非若發熱而時發時止也經有煩有微煩有煩熱復煩反煩煩滿煩痛煩渴胸中煩心中煩內煩虛煩大煩欲解皆以煩為熱也然陰寒而煩者亦不少也蓋在表而煩者則有脈浮惡風寒體強痛之證在裡而煩者則有潮熱譫語不大便腹滿小便赤澀之證在半表半裡而煩者則有往來寒熱胸脅疼痛之證其邪在胸膈以上而煩者則有胸滿懊憹可吐之證其陰寒而煩者則有惡寒而蜷及下利厥逆脈微與夫吐蛔之證大煩欲解者其脈必和但脈不應者為難治若是足冷脈沉細而微者此陰證之煩也急用人參附子熱劑溫之若內傷勞役陰虛火動而煩者其人身倦無力自汗尺脈浮虛也宜補中益氣湯加炒黃連生地黃麥門冬黃柏知母之類也若不得睡而心煩者兼服硃砂安神丸納其浮溜之火而安神明也此特其大概耳善治病者當以諸證互考之可也虛煩胸中煩心中煩三者不因汗吐下而煩則是傳經之邪不作膈實但多和解而已經用小柴胡湯黃連阿膠湯豬膚湯是也若經汗吐下而煩則是邪熱內陷以為虛煩心中嗢嗢然欲吐憒憒然無奈者是也但多湧吐而已經用梔子豉湯梔子乾薑湯梔子厚朴湯是也蓋有不因汗下吐邪結胸中則為膈實與瓜蒂散及陽明心煩與調胃承氣湯此又煩之實者也傷寒二三日悸而煩者虛也建中湯少陽之邪入腑煩而悸者熱也大抵先煩而後悸是熱先悸而後煩是虛治病必求其本者此也太陽傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯發汗身涼為已解至半日許身復熱者邪不盡也故當再汗太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈風池是少陽之經陽維之會不針天柱而取風池者陽維維於諸陽巨陽與諸陽主氣故也發汗已脈浮數煩渴者五苓散中風發熱六七日不解而煩有表裡證渴飲欲水水入則吐曰水逆五苓散病在陽應以汗解反以冷水潠之若灌之其熱不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散方見渴傷寒吐下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩者白虎加人參湯服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之垣治陰虛發熱煩渴引飢熱躁熱至夜尤甚其脈洪大按之無力者此血虛發躁當以當歸補血湯主之若以白虎湯與之則誤矣如輕手脈來浮大按之即無者乃無根蒂之脈為散脈也此虛極而元氣將脫也切不可發表攻熱如誤治之則死須用大劑人參生脈湯救之當歸補血湯方見雜病發熱門太陽病發汗若下之而煩熱胸中窒者梔子豉湯傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯發汗吐下後其人心煩不得眠若劇者必反復顛倒心中懊憹梔子豉湯若少氣者梔子甘草豉湯若嘔者梔子生薑豉湯梔子豉湯方梔子十四枚擘香豉四合綿裹上二味以水四升先煮梔子得二升半納豉煮取一升半去滓分為二服溫進一服得吐者止後服經曰其高者因而越之其下者引而竭之中滿者瀉之於內其有邪者漬形以為汗其在皮者汗而發之治傷寒之妙雖有變通終不越此數法也傷寒邪氣自表而傳裡留於胸中為邪在高分則可吐之所吐之證亦自不同如不經汗下邪氣蘊鬱於膈則謂之實也應以瓜蒂吐之瓜蒂散吐胸中之實邪也若發汗吐下後邪氣乘虛留於胸中則謂之虛煩應以梔子豉湯吐之此吐胸中虛煩者也梔子味苦寒內經曰酸苦湧泄為陰湧者吐也湧吐虛煩必以苦為主是以梔子為君煩為熱勝也湧熱者必以苦勝熱者必以寒香豉苦寒助梔子以吐虛煩故以為臣內經曰氣有高下病有遠近證有中外治有輕重各適其所果能依而行之所謂良矣梔子甘草豉湯於梔子豉湯中加甘草一兩餘依前法得吐止服梔子生薑豉湯於梔子豉湯中加生薑二兩餘依前法得吐止後服傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之成下後但腹滿而不心煩即邪氣入里為裡實但心煩而不腹滿即邪氣在胸中為虛煩既煩且滿則邪氣壅於心腹之間也滿則不能坐煩則不能臥故臥起不安與梔子厚朴湯吐煩泄滿梔子厚朴湯方酸苦湧泄梔子之苦以湧虛煩厚朴枳實之苦以泄腹滿梔子十四枚擘厚朴四兩姜炙枳實四枚水浸去蘇炒以上三味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之成丸藥不能除熱但損正氣邪氣乘虛留於胸中而未入深者則身熱不去而微煩與梔子乾薑湯吐煩正氣按丸藥所謂神丹甘遂也或作巴豆梔子乾薑湯方苦以湧之梔子之苦以吐煩辛以潤之乾薑之辛以益氣梔子十四枚擘乾薑二兩上二味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服凡用梔子湯病人舊微溏者不可與服之病人舊微溏者裡虛而寒在下也雖煩則非蘊熱故不可與梔子湯越之內經曰先泄而後生他病者治其本必且調之後乃治其他病太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之則愈上發汗吐下後心中懊憹而煩若無燥屎大便軟者梔子等湯證也若有燥屎不大便者小承氣湯證也痞結胸心煩詳二門心煩而渴詳渴傷寒二三日心中悸而煩者小建中湯主之成傷寒二三日邪氣在表未當傳裡之時心中悸而煩是非邪氣搏所致心悸者氣虛也煩者血虛也以氣血內虛與小建中湯先建其里太陽病脈浮緊無汗發熱身疼八九日表證仍在此當發汗服藥已微除其人發煩目瞑劇者必衄乃解病欲解者必當先煩乃有汗而解太陽病過經十餘日心下嗢嗢欲吐而胸中痛大便反溏微滿鬱郁微煩詳胸病傷寒脈浮自汗小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者甘草乾薑湯詳厥太陽病吐之但太陽當惡寒今反不惡寒不欲近衣此為吐之內煩也微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也吐利汗後脈平小煩者以胃虛不勝穀氣也陽明病下之其外有熱手足溫不結胸心下懊憹飢不能食但頭汗出者梔子豉湯主之陽明病脈浮緊若下之則胃中空虛客氣動膈心中懊憹舌上白苔者宜梔子豉湯論見自汗下利後煩按之心下濡者為虛煩也宜梔子豉湯陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸詳眩陽明病下之心下懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯大下後六七日不大便煩不解腹滿痛者本有宿食故也大承氣湯陽明病不吐不下心煩者可與調胃承氣湯成吐後心煩謂之內煩下後心煩謂之虛煩今陽明病不吐不下心煩則是胃有有鬱熱也與調胃承氣湯以下鬱熱陽明病本自汗更重發汗病已瘥尚微煩不了了者以亡津液胃中乾燥故令大便硬問其小便日幾行小便少津液當還胃中故知不久必大便也病人煩熱汗出則解又如瘧狀日晡發熱屬陽明也上胃實不大便心煩若吐下後者大小承氣證也若不曾吐下者調胃承氣湯證也許有人病傷寒八九日身熱無汗時時譫語時因下後大便不通三日矣非燥非煩非寒非痛終夜不得臥但心中沒曉會處或時發一聲如嘆息之狀醫者不知是何證予診之曰此懊憹怫鬱二證俱作也胃中有燥屎者服承氣湯下燥屎二十餘得利而解仲景云陽明病下之心中懊憹微煩胃中有燥屎者可攻又云小便不利大便乍難乍易時有微熱怫鬱不臥者有燥屎也承氣湯主之素問云胃不和則臥不安此夜所以不得眠也仲景云胃中燥大便硬者必譫語此所以有時發譫語也非煩非燥非寒非痛所以心中懊憹也聲如嘆息而發一聲所謂外氣怫鬱也燥屎得除大便通利胃中安和故其病悉去也少陽傷寒脈弦細頭痛發熱者屬少陽不可汗汗之則譫語此屬胃胃和則愈胃不和則煩而悸活人用調胃承氣湯胸滿而煩若不輕汗下無往來寒熱者小柴胡湯詳往來寒熱若汗下後往來寒熱者柴胡桂梗乾薑湯詳往來寒熱兼驚小便不利譫語身重不可轉側者柴胡桂枝龍骨牡蠣湯詳驚嘔時鬱郁微煩若與小柴胡湯嘔不止者大柴胡湯證也若極吐下後胸滿便溏腹痛者調胃承氣湯證也太陰傷寒脈浮而緩手足自溫者系在太陰當發身黃小便利者身不發黃至七八日雖暴煩下利十餘行必自止以脾家實腐穢當去故也成太陰病至七八日大便硬者為太陰入腑傳陽明也今至七八日暴煩下利十餘行者脾家實腐穢去也下利煩躁者死此以脾氣和逐邪下泄故雖暴煩下利日十餘行而利必自止宜梔子柏皮湯或用平胃散加穿山甲以主之少陰病但欲寐而煩若自利而渴小便白者活人用四逆湯論見欲寐若與白通湯後下利不止厥逆無脈乾嘔煩者白通湯加豬膽汁或云明知陰證附子溫之乾嘔而煩格拒不通加人尿豬膽汁妙在於此熱因寒用少陰病得之二三日心中煩不得臥黃連阿膠湯若下利六七日咳而嘔心煩不得臥者豬苓湯下利咽痛胸滿心煩者豬膚湯若惡寒而蜷時自煩欲去衣被者可治脈緊至七八日自下利脈暴微手足反溫脈緊反去為欲解雖煩下利必自止厥陰手足厥冷而煩若脈乍結乍緊及心中滿飢不欲食者宜瓜蒂散吐之蛔厥靜而復時煩詳吐蛔病六七日手足三部脈皆至大煩而噤不能言其人躁擾者欲解也若脈和其人大煩目內際黃者欲解也煩躁煩為煩擾之煩躁為憤躁之躁俗謂焦躁是也合而言之煩躁為熱也析而分之煩陽也為熱之輕躁陰也為熱之甚先煩而漸至躁者謂之煩躁先躁而後復煩者謂之躁煩有不煩而躁者此為陰盛格陽也雖大躁欲於泥水中臥但飲水不得入口者是也活人用霹靂散又有邪氣在表而躁煩者太陽中風脈浮而緊不汗出而煩躁大青龍湯是也有邪氣在裡而煩躁者病人不大便六七日繞臍痛煩躁發作有時此有躁屎是也有因火劫而煩躁者太陽病以火熏之不得汗其人必躁太陽病二三日反躁火熨其背令大汗出火熱入胃躁煩者是也有陽虛而煩躁者陽微發汗躁不得眠與下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯及發汗若下之病仍不去煩躁者茯苓四逆湯是也有陰盛而煩躁者少陽病吐利手足厥冷煩躁欲死者吳茱萸湯是也此皆證之常也又有諸不治證詳附於後不可不知太陽中風汗脈浮緊發熱惡寒身痛無汗煩躁者大青龍湯發汗不徹太陽證不罷其人面赤躁煩不知痛處更發汗則愈詳短氣太陽病和大發汗後胃中干煩躁不得眠欲飲者少與之若脈浮小便不利微熱消渴者五苓散因下之心下痞與瀉心湯痞不解渴而口躁煩小便不利者五苓散得病下二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初次硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯王注云無太陽證為無表證也無柴胡證為無半表半裡證也煩躁不大便繞臍痛發作有時者有燥屎也下之後溫復發汗晝日煩躁不得安眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯不嘔不喝里無熱也身無大熱表無熱也而脈又沉微故宜溫此當與梔子豉湯證參看蓋下後煩不得眠一也而藥有寒熱不同故爾乾薑附子湯方乾薑一兩附子一枚去皮破八片生用上二味以水三升煮取一升去滓頓服內經曰寒淫所勝平以辛熱虛寒太甚是以辛熱劑勝之也海服姜附湯有二法一法當熱服手少陰心也水包火熱服以接心火身表寒盛外火少也寒從外生熱從內消譬如凍死寒在外也一法當寒服作少陰腎也寒邪入水冷服以類腎水身表微熱內水多也熱從外生寒從內消譬如飲冷寒在內也發汗若下之病仍不解煩躁者茯苓四逆湯主之成發汗若下病宜解也若病仍不解則發汗外虛陽氣下之內虛陰氣陰陽俱虛邪獨不解故生煩躁與茯苓四逆湯以復陰陽之氣茯苓四逆湯方四逆湯以補陽加茯苓人參以益陰茯苓六兩甘草炙二兩乾薑一兩半人參一兩附子一枚生用去皮破八片上五味以水五升煮取三升去滓溫服七合日三服煩躁心下硬若未曾下者即前條無太陽柴胡證以小承氣少少微和之也若已曾下心下硬痛短氣煩躁者大陷胸也若結胸證悉具煩躁者死也方論見結胸火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之桂枝甘草龍骨牡蠣湯方桂枝去粗皮一兩甘草炙牡蠣熬龍骨各二兩上為末以水五升煮取二升半去滓服溫八合日三辛甘發散桂枝甘草之辛甘以發散經中火邪澀可去脫龍骨牡蠣之澀以收斂浮越之正氣太陽病以火熏之不得汗其人必躁到不解必清血名為火邪成此火邪迫血而血下行者也太陽病用火熏之不得汗則熱無從出陰虛被火必發躁也六日傳經盡至七日再到太陽經則熱氣當解若不解熱氣迫血下行必清血清廁也按到與倒通反也到不解者猶云反不解而加甚也本文稱太陽病則不可便注為傳經盡也止言太陽病則不傳他經可知矣況於上下文別無承接照應之詞上文言二日及十餘日下文言一二日三四日亦是論日數不言傳經到也成氏解到字不徹太陽病火熨其背大汗出火熱入胃胃中水竭躁煩必發譫語十餘日振慄下利者欲解也論見譫語活人云大抵陰氣少陽氣勝則熱而煩故太陽經傷風多煩而躁也陽明病人不大便五六日繞臍痛煩躁發作有時者此有躁屎也宜承氣湯大抵得病二三日脈弱無大柴胡證煩躁心下熱小便利心下硬以小承氣湯少少微和之然有病已瘥面赤微煩必大便硬當問其小便日幾行若小便少津液當還入胃不須攻也少陽傷寒六七日無大熱其人躁煩者此為陽去入陰也少陰病吐利手足厥冷煩躁欲死者吳茱萸湯方見吐少陰病吐利煩躁四逆者死少陰病四逆惡寒身蜷脈不至不煩而躁者死少陰病脈微沉細但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死厥陰傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者熱除也欲得食其病為愈若厥而嘔胸脅煩滿者必便血傷寒脈微而厥至七八日膚冷其人躁無暫安者為臟結死蛔厥雖厥而煩吐蛔已則靜非若臟厥躁無暫安時也傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死傷寒發熱下利厥逆躁不得臥者死傷寒得病無熱但狂者煩躁不安者五苓散服之二錢新汲水一升許則以指探喉去之隨手愈成所謂煩躁者謂先煩漸至躁也所謂躁煩者謂先發躁而迤邐復煩者也從煩至躁為熱未有不漸煩而躁者也先躁後煩謂怫怫然更作躁悶此為陰盛隔陽也雖大躁欲於泥水中臥但飲水不得入口是也此氣欲脫而爭譬如燈將滅而暴明矣蓋內熱曰煩謂心中郁煩也外熱曰躁謂氣外熱躁也內熱為有根之火故但煩不躁及先煩後躁者皆可治外熱為無根之火故但躁不煩及先躁後煩者皆不可治也附活病人身冷脈沉細疾煩躁而不飲水者陰盛隔陽也宜服霹靂散須臾躁止得睡汗出即瘥火焰散丹砂丸並主之霹靂散火焰散二方並見陰毒丹砂丸方見活人書海已寒丸此丸不僭上陽生於下治陰證服四逆輩胸中發躁而渴者或數日大便秘小便澀亦服此丸上不躁大小便自利肉桂去粗皮茯苓各五錢良薑烏頭炮各七錢附子炮乾薑炮芍藥茴香炒各一兩上為細末糊為丸如梧桐子大溫酒空心下五七十丸八九十丸亦得酒醋為糊俱可本破陰丹治陰中伏陽煩躁六脈沉伏方論見陰毒頃年鄉人李信道得疾六脈沉伏不見深按至骨則若有力頭疼身溫煩躁指末皆冷胸中滿噁心更兩醫矣皆不識止用調氣藥予診之曰此陰中伏陽也仲景法中無此證世人患此者多若用熱藥以助之則為陰所隔絕不能導引真陽反生客氣用冷藥則所伏真火愈見消爍非其治也須用破散陰氣導達真火之藥使水升火降然後得汗而解矣乃授此藥二百粒作一服冷鹽湯下不時煩躁狂熱手足躁擾其家大驚予曰俗所謂換陽也須臾稍定略睡身已中汗自昏達旦方止身涼而病除矣戴煩躁陰陽經皆有之陽明經胃有燥屎故煩此當下之太陽經已得汗而煩者五苓散少陽亦或有煩宜小柴胡湯陰煩少陰為多由陽氣傳入陰經陰得陽而煩自利而渴煩不眠者辰砂五苓散若非是陽氣傳陰陰氣犯陰經吐利手足厥冷而煩經雲陽虛陰乘之故煩又云陰盛發躁欲坐井中吳茱萸湯甚者四逆湯加蔥白二莖外有虛煩一證乃是病愈後陰陽未復時發熱煩竹葉石膏湯痰多睡不寧者溫膽湯嘔者橘皮湯懊憹憹即惱字古通用成心中鬱郁然不舒憒憒然無奈比之煩悶而甚者懊憹也由下後表之陽邪乘虛內陷結伏於心胸之間故如是也其治之法或吐之或下之苟或當下反吐療熱以寒則變證百出矣可不慎與太陽病脈浮動數頭痛發熱微盜汗出而反惡寒者表未解也動數變胃中空虛客氣動膈短氣躁煩心中懊憹梔子柏皮湯詳自汗發汗吐下後虛煩不得眠反復顛倒心中懊憹梔子豉湯陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯陽明病脈浮而緊咽躁口苦腹滿而喘發熱汗出不惡寒反惡熱身重若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔豉湯陽明病下之心中懊憹而煩有躁屎者大承氣湯陽明病無汗小便不利心中懊憹身必發黃或用茵陳湯梔子柏皮湯咳嗽啞附成咳則有聲無痰嗽則有聲有痰也肺主氣形寒飲冷則傷之使氣逆而不散衝擊咽膈令喉中淫淫如癢習習如梗而咳嗽也甚者連續不止坐臥不安言語不竟動引百骸聲聞四近矣咳嗽有寒者有寒者有停飲者有在表者有在裡者有在半表半裡者病各不同治亦有異如停飲與表寒相合而咳者小青龍湯停飲與裡寒相合而咳者真武湯邪熱在半表半裡而咳者小柴胡湯咳為肺疾必發散而可已然又有不可發者經曰咳而小便利不可發汗發汗則四肢厥冷又曰咳而發汗蜷而苦滿腹中復堅此為逆也又脈數者為心刑肺金則死太陽傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之水留於胃故乾嘔而噎水射肺故喘咳水停心下故渴入水腸間故利水蓄下焦故小便不利少腹滿與小青龍湯發汗散水水氣內漬則所傳不一故有或為之證隨證消息治之傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之小青龍湯方麻黃去節芍藥乾薑細辛桂枝去粗皮各三兩五味子半夏各半升湯洗甘草上八味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升加減法若微利者去麻黃加蕘花如雞子大熬令赤色下利者不可攻其表汗出必脹滿麻黃髮其陽水漬入胃必利作蕘花下十二水水去利則止若渴者去半夏加栝蔞根三兩辛燥而苦潤半夏辛而燥津液非渴者所宜故去之栝蔞味苦而生津液故加之若噎者去麻黃加附子一枚炮經曰水得寒氣冷必相搏其人即䭇加附子溫散水寒病人有寒復發汗胃中冷必吐蛔去麻黃惡發汗若小便不利少腹滿去麻黃加茯苓四兩水蓄下焦不行為小便不利少腹滿麻黃髮津液於外非所宜也茯苓泄蓄水於下加所當也若喘者去麻黃加杏仁半升去皮尖金匱要略曰其人形腫故不納麻黃納杏子以麻黃髮其陽故也喘呼形腫水氣標本之疾青龍象肝之兩歧而主兩傷之疾大青龍主榮衛之兩傷此則主表不解而又加之心下有水氣則非麻黃湯所能解桂枝湯所能散乃須小青龍始可祛除表裡之邪氣耳表不解以麻黃髮汗為君桂甘草佐麻黃髮散為臣咳逆而喘肺氣逆也內經曰肺欲收急食酸以收之故用芍藥酸寒五味子酸溫為佐以收氣逆心下有水津液不行則腎氣燥急食辛以潤之是以乾薑細辛味辛熱半夏味辛溫微熱為使以散寒水逆氣收寒水散津液通行汗出而解矣心下有水則所傳不一故又有增損之證水蓄則津液不行氣燥而渴去半夏則津液易復栝蔞根味苦微寒潤枯燥者也加之則津液通行水氣下行漬入腸間則利利者不可攻表麻黃專主發散非下利所宜故去之蕘花味苦寒為湧泄之劑水去則利止蕘花下水故加之噎者去麻黃加附子經曰水得寒氣必冷水去相搏其人則噎噎為胃氣虛竭麻黃髮汗非胃虛冷所宜故去之附子味辛熱熱則溫其氣辛則散其寒寒故用為佐以祛散冷寒之氣凡邪客於體者在外者可汗之在內者可下之在上者可湧之在下者可滲之水蓄下焦小便不利小腹滿滲泄可也非發汗所宜故去麻黃加茯苓味甘淡專行津液內經曰濕淫於內以淡滲之是也若喘者去麻黃喘為氣逆麻黃髮陽故去之合仁味苦甘溫加之以泄逆氣金匱要略曰其形腫者不用麻黃乃用杏子以麻黃髮其陽故喘逆形腫也少陽傷寒六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔身有微熱或咳者小柴胡湯去人參加五味子乾薑陽明咳而表解胃實屬陽明病若反無汗小便利而嘔手足厥者必頭痛若但頭眩不惡寒能食者必咽痛詳胃實少陰病咳而下利譫語小便難者被火氣劫故也詳下利少陰病四逆其人咳者四逆散加五味子乾薑各五分少陰病下利六七日咳而嘔渴心煩不得眠者豬苓散少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人咳者真武湯加五味子半升細辛乾薑各一兩傷寒咳逆上氣其脈散者死謂其形損故也咳而失小便者不可發汗汗出則四肢厥冷論見遺溺附云傷寒汗後喘咳不止恐傳肺痿補肺散人參一兩五味子五錢桑白皮二兩款冬花蛤蚧一對上為細末每服五錢沸湯一盞調服傷寒汗下後咳嗽肺虛聲音嘶敗者宜下方阿膠散薯蕷阿膠炒五味子麥門冬去心白朮各一兩乾薑炮桂枝各二錢杏仁去皮尖三錢上銼細每服七錢水二盞入烏梅肉一錢同煎服傷寒汗下後喘咳煩躁氣滯澀邪氣逆者用下方桔梗湯桔梗桑白皮各一兩甘草貝母訶黎勒各五錢上為細末每服五錢入五味子烏梅肉各一錢水二鍾同煎服人參石膏湯治傷寒咳嗽不已心煩及風熱頭疼精神不利昏憒宜服下方人參去蘆半錢石膏一兩半夏湯泡梔子仁黃芩各一錢川芎白朮茯苓去皮知母各一錢半甘草炙二錢上作一服水二鍾生薑三片煎至一鐘不拘時服吳凡表寒咳嗽者脈浮惡寒身疼拘急而無汗也麻黃湯或三拗湯汗之痰唾如膠者金沸草散汗之若有熱者參蘇飲去木香人參加桑白皮杏仁麻黃汗之亦佳但察天時與病情斟酌而用之也若虛弱人冒感風寒而咳嗽有痰或惡風頭疼乾嘔者宜人參杏仁湯凡傷寒二三日傳少陽經脈弦口苦發熱而咳嗽者小柴胡湯去人參大棗生薑加五味子乾薑主之若發熱胸中煩滿而咳者加炒栝蔞若胸脅痞滿發熱而咳者加枳殼桔梗主之凡陰證手足冷脈沉細而咳嗽者四逆湯加五味大抵傷寒咳嗽非比雜證同也按仲景治例有嗽者不分陰陽二證俱用五味子乾薑也蓋五味收肺氣而止嗽以乾薑之辛溫肺經散逆氣也啞射干湯治初秋暴雨冷及天行暴寒其熱喜伏於內咳嗽曲折不可得氣息喉啞失聲干嗽無唾喉中如梗射干紫菀當歸獨活麻黃甘草各一兩生薑炮橘皮肉桂去粗皮枳實炙各二兩半夏洗二兩半杏仁去皮尖炒一兩半上㕮咀每服五錢水一盞半煎至八分去滓溫服直視目中不了了成直視者視物而睛不轉動也睛轉者非也水之精為志火之精為神目者心之使也神所寓焉肝之外候也精神榮焉針經曰五臟六腑之氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑血之精為絡氣之精為白肌肉之精為拘束里擷五臟氣血調和精氣充榮則目和而明矣邪氣壅盛冒其正氣則神識不慧藏精之氣不上榮於目則目為之直視傷寒直視邪氣已極證多難治狂言直視為腎絕直視搖頭為心絕直視譫語喘滿者死下利者亦死又劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死皆邪氣盛而正氣脫經曰衄家不可發汗汗則額陷脈緊急直視不能眴以肝受血而能視亡血家肝氣已虛木氣又虛又發汗亡陽則陰陽俱虛所致也此雖逆未為甚又直視與目中不了了形證相近一可治一不可治也太陽衄家不可發汗汗出則額上陷脈急直視不能瞬不得眠詳衄汗後身猶灼熱名風溫脈陰陽俱浮自汗身重多眠語言難出若被下者小便不利直視失溲詳風溫陽明傷寒吐下後不解不大便至十餘日日晡所發潮熱不惡寒獨語如見鬼狀劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死直視譫語喘滿者死下利者亦死傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯吳若戴眼反折者此為上視絕汗乃出大如貫珠不流此膀胱絕也其目中不了了能視物但見一半而不見一半有所譫妄而胡言者是也若內實不大便者宜下之內虛者多難治也鬱冒昏憒舊以叉手冒心濫入今去之成郁為鬱結而氣不舒冒為昏冒而神不清俗謂之昏迷是也皆因虛乘寒所致經曰諸虛乘寒者則為厥鬱冒不仁此寒氣乘虛中上也駱龍吉以附子湯倍人參川芎天麻乾薑之類主之又曰太陽病先下之不解因復發汗以此表裡俱虛其人因冒冒家汗出自愈由表和也若不得汗不解者以人參三白湯加川芎天麻如下虛脈微者加附子以溫腎經乃固本也經曰滋苗者必固本伐下者枯其上此之謂也要略曰新產婦人有三病一莖二鬱冒三大便難亡血復汗寒多鬱冒又曰產婦鬱冒其脈微弱不能食大便堅者蓋由血虛而厥厥而必冒冒家欲解必大汗出觀此則鬱冒為虛寒可知矣又少陰病下利止而頭眩時時自冒者死以其虛極而脫也太陽病先下之而不愈因復發汗以此表裡俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也里未和然後復下之成氏以郁訓冒疑未瑩按說文冒字從曰從目曰即小兒及蠻夷頭衣也此致冒者謂若物矇蔽其目也是昏迷之義今以冒為郁不惟失六書之本旨且失病情及仲景之意也里未和時刻作得里和或增未字而不去得字則舛於文理今以宋本正之諸乘寒者則為厥鬱冒不仁口急不能言戰慄也太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎肺俞肝俞詳項強陽明病人小便不利大便乍難乍易時有微熱喘冒不能臥有燥屎也宜大承氣湯少陰病但欲寐下利止而頭眩時時自冒者死厥陰下利清穀脈沉遲其人面赤身有微熱必鬱冒汗出而解詳下利傷寒吐下後虛煩脈其微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿海傷寒傳至五六日間漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水稀粥與之則咽不與則不思六脈細數而不洪大心下無痞腹中不滿大小便如常或傳至十日以來形貌如醉醫見神昏不已多用大承氣湯下之則誤矣蓋不知此熱傳手少陰心經也然又未知其何經而來答曰本太陽經傷風風為陽邪傷衛陰血自燥熱結膀胱壬病逆傳於丙丙丁兄妹由是傳心心火自上迫熏肺所以神昏也蓋肺為清肅之臟內有火邪故令神昏宜梔子黃連黃芩湯若脈在丙者導赤散脈在丁者瀉心湯若誤用涼膈散此乃氣中之血藥也如右手寸脈沉滑有力者則可用之或用犀角地黃湯近於是已本方所說若無犀角以升麻代之是陽明經藥也此解陽明經血中熱藥若脈浮沉俱有力者是丙丁俱有熱可以導赤散瀉心湯各半服之則宜矣此證膀胱傳丙足傳手經者下傳上也丙傳丁者表傳裡也壬傳丁者艮傳離也越經傳者又為腑傳臟也活人云傷寒只傳足經不傳手經者此言不盡意也有從足經而傳手經者何以知之經云傷寒或止傳一經或間傳三經不可一途取之但視其脈與外證治之此活法也與食則咽者邪不在胃也不與則不思者以其神昏故也邪熱既不在裡誤用承氣下之其死也必矣脈在丙者脈浮也脈在丁者脈沉也脈丙丁俱在有熱者浮沉俱有力也余云衢太史形氣充壯飲啖無人辛卯夏六月患熱病肢體不甚熱而間揚擲手足如躁擾狀昏憒不知人事時發一二語不可了而非譫也脈微細如欲絕有謂是陰證宜溫者有謂當下者時座師陸葵曰先生與曾植齋馮琢庵二太史皆取決於余余謂是陽病見陰脈在法為不治然素稟如此又值酷暑外爍酒灸內炎宜狂熱如焚脈洪數有力而此何為者豈熱氣怫鬱不得伸而然耶且不大便七日矣姑以大柴胡湯下之時大黃止用二錢又熟煎而太醫王雷庵力爭以為太少不若用大承氣余曰如此脈證豈宜峻下待大柴胡不應而後用調胃承氣調胃承氣不應而後用小承氣以及大承氣未晚也已服藥大便即行脈已出手足溫矣余謂雷庵曰設用大承氣能免噬臍之悔哉繼以黃連解毒湯數服而平七月初遂與陸先生同典試南京不復發矣明年餘請告歸里偶得劉河間傷寒直格讀之中有云蓄熱內甚脈須疾數以其極熱蓄甚而脈道不利反致脈沉細而欲絕俗未明造化之理反謂傳為寒極陰毒者或始得之陽熱暴甚而便有此證候者或兩感熱甚者通宜解毒加大承氣下之下後熱稍退而未愈者黃連解毒湯調之或微熱未除者涼膈散調之或失下熱極以至身冷脈微而昏冒將死若急下之則殘陰暴絕而死蓋陽氣後竭而然也不下亦死宜涼膈散或黃連解毒湯養陰退陽積熱漸以宣散則心胸再暖而脈漸以生然後撫卷而嘆曰古人先得我心矣余太史所患正失下熱極以至身冷脈微而昏冒欲絕者也下與不下大下與微下死生在呼吸間不容髮嗚乎可不慎哉因表而出之以為世鑑不能言成不能言及語言難出有二證其一則太陽風溫其一則少陽咽中生瘡是皆傳經之邪熱氣壅閉所致非陰寒之證氣血通行則關節開張語言出矣太陽發汗已身猶灼熱名風溫脈尺寸俱浮自汗身重多眠鼻鼾語言難出詳風溫少陰病咽中傷生瘡不能言語聲不出者苦酒湯吳凡喑啞不言有六一者少陰病咽中傷生瘡不能言語者以雞子苦湯酒主之二者狐惑傷寒上唇有瘡咽乾聲啞者治見本條三者痙證口噤不能言者亦見本條四者熱病音啞不言三四日不得汗出者死五者熱甚火傷肺金不能言者宜清肺降火則愈六者風熱壅盛咳嗽聲啞者以消風降痰火治又有失於發散風邪伏於肺中者當發散之鼻鼾鼻鳴成風溫則鼻鼾太陽中風則鼻鳴由風氣壅塞衛氣不利所致陽明少陰三陽雖亦有中風然邪不在表故鼻不鳴而不鼾也太陽中風陽浮陰弱陽浮熱自發陰弱汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯汗已身猶灼熱脈浮自汗身重多眠鼻鼾語言難出不可下不可火
