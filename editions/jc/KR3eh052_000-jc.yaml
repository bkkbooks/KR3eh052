body:
  text: 凡例一纂傷寒書者眾矣知尊仲景書而遺後賢續法者好古之過也類證諸書是也惟俗眼之便而雅俗雜陳溜澠莫辨使世不知孰為仲景者俗工之謬也瑣言蘊要諸書是也惟婁氏綱目列六經正病於前而次合病並病汗吐下後諸壞病於後又次之以四時感異氣而變者與婦嬰終焉而每條之中備列仲景法然後以後賢續法附之既該括百家又不相淆雜義例之善無出其右此書篇目大抵因之一王叔和編次張仲景傷寒論立三陽三陰篇其立三陽篇之例凡仲景曰太陽病者入太陽篇曰陽明病者入陽明篇曰少陽病者入少陽篇其立三陰篇亦依三陽之例各如太陰少陰厥陰之名入其篇也其或仲景不稱三陽三陰之名但曰傷寒某病用某方主之而雜分其篇者則病屬陽證發熱結胸痞氣蓄血衄血之類皆混入太陽篇病屬陰證厥逆下利嘔吐之類皆混入厥陰篇也惟燥屎及屎硬不大便大便難等證雖不稱名獨入陽明篇者由此證類屬陽明胃實非太陽厥陰可入故獨入陽明也所以然者由太陽為三陽之首凡陽明少陰之病皆自太陽傳來故諸陽證不稱名者皆入其篇厥陰為三陰之尾凡太陰少陰之病皆至厥陰傳極故諸陰證不稱名皆入其篇後人不悟是理遂皆謂太陽篇諸證不稱名者亦屬太陽而亂太陽病之真厥陰篇諸證不稱名者亦屬厥陰而亂厥陰病之真為大失仲景之法也今於各證分經處尚多仍叔和之舊學者當以意神而明之一仲景立法凡曰太陽病者皆謂脈浮頭項強痛惡寒也凡曰陽明病者皆謂胃家實也凡曰少陽病者皆謂口苦咽乾目眩也凡曰太陰病者皆謂腹滿時痛吐利也凡曰少陰病者皆謂脈微細但欲寐也凡曰厥陰病者皆謂氣上撞心痛吐蛔也候如少陰病不一一逐條曰脈微細但欲寐而總用少陰病三字括之者省文也故各條或曰少陰病反發熱脈沉用麻黃附子細辛湯者謂脈沉細但欲寐而又反發熱者用其方也或曰少陰病得之二三日以上心煩不臥用黃連阿膠湯者謂得脈微細但欲寐二三日後變心煩不臥者用其方也後人不悟是理遂皆不察少陰病三字所括脈微細但欲寐之證但見發熱脈沉便用麻黃附子細辛湯見心煩不臥便用黃連阿膠湯尤為大失仲景之法也一解釋仲景書者惟成無己最為詳明雖隨文順釋自相矛盾者時或有之亦白璧微瑕固無損於連城也後此趙嗣真張兼善之流皆有發明並可為成氏忠臣張公耳孫故多采掇使學者一覽洞然而一得之愚亦時附焉其文義淺近不必訓釋者則一切省之內一字趙者嗣真也張者兼善也黃者仲理也活者朱肱活人書也龐者安時也許者叔微學士也本者許之本事方也韓者祇和也孫者兆也潔者潔古張元素也云者潔古之子云岐子也垣者李東垣也丹者朱丹溪也海者王海藏也王者履也羅者天益也戴者元禮也婁者全善也吳者綬也陶者華也其不繫姓字者自篇首辨證數語之外皆仲景論文也一仲景諸方動以斤計而又有稱升合枚者古今度量衡輕重長短不同難以遵用局方綱目又一切裁損每服五錢則失之太小陶氏吳氏書盡變古方以便時用則其失更遠矣今書方藥分兩一切仍仲景之舊增損出入又當視病情時令神而明之一切古方皆當如是施用不獨仲景書也知此則又何以輕變古法為哉陳無擇以錢譜推測度量衡法頗協時宜今引其說於此用古方者宜詳考焉凡度者分寸尺丈引本以一黍之廣為分十分為寸十寸為尺十尺為丈十丈為引觀今之尺數等不同如周尺長八寸京尺長一尺六寸淮尺長一尺二寸樂尺長一尺二寸五分並以小尺為率小尺既自三微起卻自可准唐武德年鑄開元錢徑八分當十二錢半得一尺排錢比之十一個已及一尺又不知唐用何尺顧漢唐龠量並用尺寸分布尺寸如是不齊將何憑據博古君子必有說矣凡量者龠合升斗斛本以黃鐘龠容十二銖合龠為合重二十四銖今以錢準則六銖錢四個比開元錢三個重升斗斛皆壘而成數漢唐同用至趙宋紹興升容千二百銖則古文六銖錢二百個開元錢一百五十個以紹興一升得漢五升其餘私用不足計也凡衡者銖兩斤鈞石亦以黃鐘龠所容重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石每兩則古文六銖錢四個開元錢三個至趙宋廣秤以開元錢十個為兩今之三兩得漢唐十兩明矣千金本草皆以古三兩為今一兩以古三升為今一升諸藥類例尤為難辨且如半夏一升准五兩不知用何升何兩此修合制度之要務不可不知漢銅錢質如周錢文曰半兩重如其文孝文五年錢益多而輕乃更鑄四銖其文曰半兩雜以鉛鐵錫非淆雜偽巧則不得贏而奸或盜磨錢質取熔有司言錢輕重請郡國鑄五銖錢周郭有質令不得磨取熔則知漢以二半兩錢為兩重十銖明矣漢唐例以二十四銖為一兩抑未知修史人改作唐例亦不可知觀錢譜漢無六銖錢至唐方有今以五銖錢十六個正得開元錢十個重又以六銖錢十二個正得開元錢九個重則知開元錢每個以重八銖唐武德四年鑄開元通寶徑八分重二銖四絫積十錢為兩似難考據明食貨者必有說焉按藥書漢方湯液大劑三十餘兩小劑十有餘兩水六升或七升多煎取二升三升並分三服若以古龠量水七升煎今之三十兩未淹得過況散末藥只服方寸刀圭匕丸子如梧桐大極至三十粒湯液豈得如此懸絕又以風引湯一劑計五十五兩每兩隻用三指撮水三升煮三沸去滓溫服一升觀其煮制每隻三指撮不應料劑如此之多此又可疑也今以臆說漢方當用半兩錢二枚為一兩且以朮附湯方較若用漢兩計一百八十銖得開元錢二十二個半重若分三服已是今之七錢半重一服若以唐方准計三百三十六銖得開元錢四十二個重每服計今之十四錢重大略可知若以開元錢準得一百單五個重分三服每服計三十五錢重此猶是小劑況有大劑名件兩數之多者未易概舉留心此道幸少詳焉吳綬曰凡方稱銖者二十四銖為兩一兩分為四分六銖為一分計二錢五分也稱字者一錢有四字一字計二分五釐也世有古今時有冬春地有南北藥有良獷人有強弱不可執一且如大陷胸湯用大黃六兩今用六錢足矣若人壯病大者宜之人弱病小者又當減半或只用三四之一可也芒硝一升今用二三錢足矣甘遂二兩隻可用一分或半分而已若無活法通變而膠柱鼓瑟未有不至於殺人者慎之慎之一內經云風雨寒暑不得虛邪不能獨傷人至於丹溪又云傷寒屬內傷者十居八九當以補元氣為主由是言之後人治傷寒者既皆識仲景之法不盡又不知其病本於內傷虛勞而思補養但用汗下致死者其殺人何異刀劍興言至此切骨痛心今雖以後賢補養之法附載於篇而書不盡言言不盡意尤望臨病之工重人命而懼陰譴熟玩此書無疑於心而後下手用藥即不能然寧過於謹護元氣無孟浪汗下而後庶幾乎少失也一屠鵬四時治要云凡欲知陰別陽須當觀脈論形視喘息聽音聲而治病所苦按尺寸觀權衡而知病所生然後知其虛實得其本末更精加察審徐徐取之如仲景活人書下證俱備當行大承氣湯必先以小承氣湯試之合用大柴胡必先以小柴胡試之及陰證曉然合用四逆湯必先以理中湯真武湯之屬試之此皆大賢得重敵之要學者其可不審乎按湯劑丸散生靈之司命也死生壽夭傷寒之瞬息也豈以試為言哉蓋與其躁暴而多虞寧若重敵而無失雞峰張銳者宋之神醫也療一傷寒診脈察色皆為熱極煮承氣湯欲飲復疑至於再三如有掣其肘者姑持藥以待病者忽發戰悸覆綿衾四五重始稍定有汗如洗明目脫然使其藥入口則人已斃矣由是觀之則屠氏之探試雖非仲景本旨得非粗工之龜鑑歟入門辨證訣發熱外感內傷辨凡病鮮有不發熱者而內傷外感其大關鍵也人迎脈大於氣口為外感氣口脈大於人迎為內傷外感則寒熱齊作而無間內傷則寒熱間作而不齊外感惡寒雖近烈火不能除內傷惡寒得就溫暖而必解外感惡風乃不禁一切風寒內傷惡風惟惡夫些少賊風外感證顯在鼻故鼻氣不利而壅盛有力內傷證顯在口故口不知味而腹中不和外感則邪氣有餘故發言壯厲先輕而後重內傷則元氣不足故出言懶怯先重而後輕外感頭痛常常而痛內傷頭痛時止時作外感手背熱手心不熱內傷手心熱手背不熱東垣辨法大要如此有內傷而無外感有外感而無內傷以此辨之判然矣若夫內傷外感兼病而相合者則其脈證並見而難辨尤宜細心求之若顯內證多者則是內傷重而外感輕宜以補養為先若是外證多者則是外感重而內傷輕宜以發散和解為急此又東垣未言之意也傷寒類傷寒辨冬溫溫病寒疫熱病濕溫風溫霍亂痙傷食虛煩痰腳氣內癰蓄血世傳以痰飲腳氣虛煩四證為似傷寒王叔和又以痙濕暍霍亂等證似傷寒者編入傷寒論中然以形證較之非止此數者而已其內傷勞倦之似傷寒者已前見今以冬溫等病與傷寒辨析差別臚列於下自霜降以後天令寒冱感之而病者傷寒也脈浮緊無汗為傷寒脈浮緩有汗為傷風霜降以後當寒而不寒乃更溫暖因而衣被單薄以致感寒而病者冬溫也時氣發斑與傷寒熱未已再遇溫熱為溫毒春時天道和暖有人壯熱口渴而不惡寒者溫病也以辛溫汗之則壞矣若天令尚寒冰雪未解感寒而病者亦曰傷寒三月以後八月以前天道或有暴寒感之而病者時行寒疫也夏至以後時令炎熱有人壯熱煩渴而不惡寒者熱病也熱病與中暑相似但熱病脈盛中暑脈虛夏月有病頭痛譫語自汗身不甚熱兩脛逆冷四肢沉重胸腹滿者濕溫也其人常傷於濕因而中暑濕熱相搏故發此病不可發汗頭痛身熱自汗與傷寒同而脈尺寸俱浮身重默默但欲眠鼻息鼾語言難出四肢不收者風溫也不可發汗病嘔吐而利頭痛身痛惡寒發熱或吐利止而發熱者霍亂也身熱足寒頭項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痙也惡寒無汗為剛痙惡風有汗為柔痙仰面而臥開目為陽合面而臥閉目為陰脈浮緊數為陽脈沉細澀為陰口中燥渴為陽口中和為陰陽痙易治陰痙難治頭疼發熱與傷寒同而身不痛右手氣口脈緊盛右關短滑左手反平和者傷食也必兼中脘痞悶噫氣作酸或惡聞食臭或欲吐不吐或吐之不盡等證亦有停食而又感寒者則左右手人迎氣口俱大煩熱與傷寒相似而脈不浮緊頭不疼身不痛不惡寒或煩時頭亦痛煩止而痛止者虛煩也憎寒發熱惡風自汗胸滿氣上衝咽不得息與傷寒相似而頭不痛項不強亦有時而頭痛但作止無常其脈緊而不大者痰也痰在上焦則寸口脈沉滑或沉伏痰在中焦則右手關脈滑大有氣鬱則沉而滑夾食則短而滑凡脈弦滑者有痰飲偏弦者主飲沉而弦者有懸飲內痛凡左右關大或關上脈浮而大或目下如灰煙燻者皆痰之候也發熱憎寒頭疼肢節痛嘔惡與傷寒相似而病起自腳腳膝腫痛兩痙或腫滿或枯細大便堅者腳氣也傷寒論云諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常者蓄積有膿也此言內癰也素問云肝滿腎滿肺滿皆實即為腫王注云滿謂脈氣滿實腫謂癰腫大抵口中咳即胸中隱痛心胸甲錯振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者肺癰也小腹重而強按之則痛便數似淋時時汗出復惡寒身皮甲錯腹皮急如腫狀脈滑而數者腸癰也胃脘隱隱而痛手不可近胃脈沉細人迎逆而盛者胃脘癰也內傷外感以人迎口氣口別之故內傷之脈人迎平而胃脘癰之脈人迎反盛未有不誤以為傷寒者宜辨之早也京口錢氏室女患腸癰發熱庸醫作傷寒治之禁絕飲食旬余而斃垂斃之日下膿數升方知是癰欲救已無及矣嗚呼仲景之書豈可以弗讀哉發熱如傷寒而其人有所從高墜下攧撲損傷或盛怒叫呼無何而病小便自利口不甚渴按心下或脅下或臍腹間有痛處或至手不可近者蓄血也勞逸飢飽七情房室所傷皆能瘀血不止一途友人繆仲湻每服滋補丸藥多至數兩忽發熱不已投涼解之藥有加無損沉困之極殆將不支余用蓄血法治之方烹煎次仲湻聞其氣曰一何香也飲已而熱退明日下黑糞鬥許而安然傷寒自有蓄血證當於本科求之此言雜證蓄血之類傷寒者耳
