front:
  text: 自序夫有生必有死萬物之常也然死不死於老而死於病者萬物皆然而人為甚故聖人憫之而醫藥興醫藥興而天下之人又不死於病而死於醫藥矣智者憤其然因曰病而不藥得中醫豈不信哉或曰此但為傷寒言之也雖然微獨傷寒特傷寒為甚爾蓋醫莫不宗本黃岐今其書具在然有論而無方方法之備自張仲景始仲景雖獨以傷寒著然二千年以來其間以醫名世為後學所師承者未有不從仲景之書悟入而能徑窺黃岐之壺奧者也故黃岐猶羲文也仲景其孔子乎易水師弟則濂洛諸賢金華師弟則關閩諸大儒也擬人者不倫於此矣王好古曰傷寒之法可以治雜病雜病法不可以治傷寒豈誠然哉傷寒法出於仲景故可以治雜病而為雜病法者多未嘗夢見仲景者也故不可以治傷寒也然則傷寒論可弗讀乎而世之醫有終身目不識者獨執陶氏六書以為枕中鴻寶爾夷考陶氏之書不過剽南陽唾餘尚未望見易水門牆而輒詆傷寒論為非全書聾瞽來學蓋仲景之罪人也而世方宗之夭枉可勝道哉余少而讀仲景書今老矣尚未窺其堂室平生手一編丹鉛殆遍紙敗墨渝海虞嚴道徹見而愛之欲壽諸梓而余不之許非靳之蓋慎之也丁酉戊戌間因嘉善高生請始輯雜病準繩而不及傷寒非後之蓋難之也今歲秋同年姜仲文知余所輯雜病外尚有傷寒婦嬰瘍科為準繩者四遣使來就鈔而不知余奪於幽憂冗病未屬草也因感之而先成傷寒書八帙始於八月朔而告完於重九或曰以數十萬言成於四旬不太草草乎曰余之醞釀于丹府而漁獵於書林蓋三十餘年矣不可謂草草也傷寒一病爾而數十萬言不太繁乎曰吾猶病其略也何也是書之設為因證檢書而求治法者設也故分證而不詳則慮其誤也詳則多互見而復出而又安得不繁後之注仲景書讀仲景法者或見其大全或窺其一斑皆可以為後學指南具擇而載之而又安得不繁且夫人讀一書解一語苛迷其理有礙於胸中以問知者則惟恐其不吾告與告之不詳余固駑下然學醫之資差不在人後以余所白首不能究者與天下後世共究之將讀之恐其易盡而顧患繁乎哉丹陽賀知忍中秘心乎濟物而勇於為義願為余流通書未成已鳩工庀具矣余之遄成以此因敘於篇首時萬曆三十二年歲次甲辰重九日念西居士王肯堂宇泰甫書
