body:
  text: 卷六小便不利小便難成小便不利有數種被下而小便不利者津液耗於內也因汗而小便不利者津液亡於外也發黃與痞及夫熱病小便不利者熱鬱所致風濕相搏與夫陽明風中其小便不利寒邪所乘其小便難者亦多由汗下而然宜詳辨之太陽傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯去麻黃加茯苓方見咳太陽病大發汗後胃干煩躁不得眠欲飲水小便不利者脈浮五苓散不浮者豬苓湯本以下之心下痞與瀉心湯痞不解渴而口躁煩小便不利者五苓散服桂枝湯或汗或下之仍頭項強痛翕翕發熱無汗心滿微痛小便不利者桂枝去桂加茯苓白朮湯太陽病飲水多必心下悸小便少者茯苓甘草湯方見厥若兼身黃而小腹硬脈沉結者茵陳湯方見黃若表未解反下之不結胸但頭汗出小便不利者必發黃亦茵陳湯梔子柏皮湯陽明病面合赤色不可攻之必發熱色黃小便不利也陽明病小便不利若中寒不能食手足濈然汗出大便初硬後溏者此欲作固瘕若能食大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈或無汗心中懊憹或被火額上微汗出或頭汗出身無汗劑頸而還渴引水漿皆欲發黃之候若脈浮發熱渴欲飲水小便不利者豬苓湯主之此浮字誤也活人云脈浮者五苓散脈沉者豬苓湯則知此證若脈字下脫一不字也按太陽病內五苓散乃豬苓澤瀉茯苓三味中加桂白朮也陽明篇內豬苓湯乃豬苓澤瀉茯苓三味中加阿膠滑石也桂與白朮味甘辛為陽主外阿膠滑石味甘寒為陰主內南陽之言亦可謂不失仲景之旨矣第南陽欲區別二藥分曉不覺筆下以沉對浮遂使後人致疑三陽證中不當言脈沉更不復致疑經文之有闕也更詳太陽證固當脈浮而陽明為表之裡故其脈不曰浮而曰長蓋長者不浮不沉之中脈也成氏直以脈浮釋之而朱氏卻以脈沉言之胥失之矣若曰脈浮者五苓散不浮者豬苓湯則得仲景之意矣又詳少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯一條雖不言脈沉然少陽之脈必沉也豈活人以少陰對太陽一證而言與以此推之成氏隨文誤釋明矣病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之若不大便六七日小便少者雖不能食但初頭硬後必溏須小便利屎定硬乃可用大承氣攻之少陽傷寒五六日中風往來寒熱胸脅痛不欲食心煩喜嘔或心下悸小便不利者小柴胡湯傷寒五六日已汗復下胸脅滿微結小便不利渴而不嘔但頭汗心煩往來寒熱為未解柴胡桂薑湯傷寒八九日下之胸滿煩驚小便不利譫語身重不可轉側柴胡加龍骨牡蠣湯少陰小便不利而大便自利腹痛為少陰病兼四肢沉重有水氣者真武湯兼便膿血者桃花湯兼四逆者四逆散加茯苓厥陰傷寒噦而腹滿視其前後知何部不利利之則愈前部為小便小便不利脈浮者五苓散不浮者豬苓湯小便不利關節疼痛若痛不得屈伸汗出惡風身腫者屬風濕宜甘草附子湯方見身痛若脈沉緩大便反快者屬濕痹活人用五苓散方見濕附活陰證小便不利手足厥冷脈微細者不宜服利小便冷滑藥但服返陰丹並取臍下石門穴灸之方論見陰毒集傷寒小便不通取陰谷陰陵泉吳凡傷寒小便不通刺任脈二穴在臍下一寸用長針入八分又次支溝二穴在手腕後三寸兩骨之間陷中針入二分凡傷寒小便不利當分六經治之太陰少陰詳見本條太陰腹滿自利小便不利無熱脈沉者理中湯合五苓散更加厚朴木香分利其小便而大便自止厥陰寒閉厥冷脈伏囊縮入腹小便不利宜四逆湯通草茯苓或灸氣海石門穴或以蔥尉法治之若陰虛火動小便赤澀不利者加木通生地知母黃柏丸內熱甚大便不通小便赤澀不利者八正散治之凡不渴小便不利者熱在血分也宜知母黃柏生地之類夫膀胱為津液之府氣化而能出也若汗多者津液外泄小便因少不可利之恐重亡津液待汗止小便自行又小便自利不可妄利之恐引熱入膀胱則變蓄血又為害也小便難汗後小便難若太陽發汗遂漏不止者則惡風小便難四肢難屈伸宜桂枝附子湯方論見自汗若太陽證中風以火劫發汗則邪風被火熱血氣流溢身黃陽盛陰虛欲衄小便難也方論見頭汗若少陰以火劫汗者則咳而下利譫語小便難也論見脅痛下後小便難有二若脈遲浮弱惡風寒下之者則脅滿身黃項強小便難也見脅痛若陽明胃實發熱惡寒脈浮緊下之者則腹滿小便難也論見胃實脅痛身黃小便難若陽明胃實未下者宜小柴胡湯若下後不食項強者忌柴胡論見脅痛趙傷寒小便難仲景論有發汗漏不止桂枝加附子湯者有陽明中風或脈弦浮大而潮熱噦者或脈浮而緊誤下而成腹滿者又有陽明脈浮遲飽則微煩頭眩者活人問中當以傳經邪熱與漏風亡陽分作兩條其桂枝加附子湯證乃亡陽經虛所致豈得均謂之陰虛陽湊為有熱耶要當以小柴胡證及誤下證谷疸證次於陽湊傳邪之下卻別出一條云外有汗多亡陽津液不足亦有小便難者還以桂枝加附子湯證屬之小便自利小便數成小便自利有在表者有在裡者有熱而利者有寒而利者六經俱有之證難以概治宜考經條分之可也小便數者三陽有在表者有在裡者三陰並無小便數之證宜詳察之太陽病六七日表證仍在脈微而沉反不結胸其人發狂以熱在下焦小腹當硬滿小便自利者下血乃愈抵當湯太陽病身黃脈沉結小腹硬小便自利其人如狂血證也抵當湯傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸傷寒十三日不解過經譫語小便利而大便亦下利脈反和調胃承氣證詳譫語太陽中風火劫汗後發黃欲衄小便難頭汗出腹滿微喘口乾咽爛或不大便久則譫語甚者至噦捻衣摸床小便利者可治詳譫語太陽病小便利者以飲水多必心下悸小便少者必苦裡急小便不利甘草茯苓湯傷寒八九日風濕相搏身體疼煩不能轉側不嘔不渴脈浮虛而澀者桂枝附子湯若其人小便自利去桂枝加白朮湯傷寒發熱惡寒大渴欲飲水其腹必滿自汗小便利為欲解此肝乘肺名曰橫刺期門陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛詳頭痛得病二三日脈弱無太陽柴胡證煩躁心下硬以小承氣微和之不大便六七日小便少者雖不能食但初硬後溏未可攻小便利大承氣湯傷寒脈浮而緩手足自溫系在太陽當發身黃若小便自利不能發黃至七八日大便硬為陽明病也大承氣湯陽明病自汗更發汗小便自利為津液內竭屎雖硬不可攻之宜蜜煎導而通之豬膽汁或土瓜根皆可為導太陽傷寒脈浮而緩手足自溫系在太陰當發黃小便自利不發黃至七八日雖暴煩下利者十餘行必自止按以上數條皆以小便自利為病蓋以驗病之下與不當下也若小便不利而少腹硬者尿也當滲泄之若小便自利而少腹硬者非血則糞也當通利之且病之發黃與不發黃及病之死與不死皆可於此而驗之焉少陰病二三日至四五日腹滿小便不利四肢沉重疼痛自下利者為有水氣或小便利真武湯詳下利既吐且利小便復利而大汗下利清穀內寒外熱脈微欲絶者四逆湯厥陰傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食為病愈小便數傷寒脈浮自汗小便數心煩微惡寒腳攣急者慎不可用桂枝湯甘草乾薑湯芍藥甘草湯趙太陽病自汗四肢拘急難以屈伸心煩微惡寒腳攣急若小便數者慎不可用桂枝也宜與甘草乾薑湯芍藥甘草湯此虛寒所致與上文客熱等證全不相合又多四肢拘急難以屈伸八字即系前篇小便難之證今卻添於此問小便數之下何耶又云傷寒脈浮便數若胃中不和譫語者少與調胃承氣湯蓋仲景論中此論專主胃氣不和譫語未嘗兼治脈浮自汗小便數之證何不曰若服甘草乾薑湯後胃氣不和譫語者少與調胃承氣湯不亦宜乎趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約麻仁丸太陽病汗吐下後微煩小便數大便因硬與小承氣湯和之則愈太陽病寸緩關浮尺弱其人發熱汗出惡寒不嘔但心下痞者下之早也如其不下病人不惡寒而渴者此轉屬陽明小便數者大便必硬吳凡小便數者頻欲去而不多也太陽陽明治各有條凡腎虛有熱小便頻數者清心連子飲或人參三白湯加知母黃柏麥門石蓮肉之類或服滋補丸亦佳或補中益氣加知母黃柏生地黃麥門冬主之遺溺三陽合病腹滿身重難轉側口中不仁面垢譫語遺尿自汗者不可汗不可下宜少與白虎湯詳身重風溫病脈浮自汗出體重多眠若下之則小便不利直視失溲詳風溫楊氏士瀛曰膀胱瀦水下焦不攝則亦遺溺經云邪中下焦陰氣為栗足膝逆冷便溺妄出合用四逆湯下焦蓄血小腹結急小便自利不禁輕者桃仁承氣湯重者抵當湯寸口脈微而澀微者衛氣不行澀者榮氣不逮榮衛不能相將三焦無所仰身體痹不仁榮氣不足則煩疼口難言衛氣虛則惡寒數欠三焦不歸其部上焦不歸者噫而吞酢中焦不歸者不能消穀引食下焦不歸者則遺溺咳而小便利若失小便者不可發汗汗出則四肢厥冷太陽病火尉其背大汗出譫語十餘日振栗下利欲小便不得反嘔而失溲者此為欲解也詳譫語遺溲狂言目反直視者此為腎絶吳凡遺尿者小便自出而不知也其熱盛神昏遺尿者為可治若陰證下寒逆冷遺尿脈沉微者多難治宜附子湯加乾薑益智子以溫其下也若厥陰囊縮厥冷脈微遺尿者四逆加吳茱萸湯溫之陽不回者死凡傷寒汗下後熱不解陰虛火動而遺尿者以人參三白湯加知母黃柏或補中益氣湯加知母黃柏麥門冬生地黃五味子之類主之若狂言直視譫語遺尿者此為腎絶內經言膀胱不利為癃不約則遺溺又曰水泉不止者膀胱不藏也蓋腎與膀胱為表裡腎虛則膀胱之氣不約故遺尿也要在滋補膀胱之氣也東垣謂溲便遺失為肺金虛又當補肺氣也大抵肺虛腎虛熱甚者皆可治惟腎絶遺尿則不可治此下焦氣絶不歸其部故也噫氣説文云噫飽食息也於介切俗作噯傷寒有二證皆由誤汗吐下胃氣弱而不和虛氣上逆心下痞硬故下利者生薑瀉心湯不下利者旋覆代赭石湯傷寒汗出解之後胃中不和心下痞硬幹噫食臭脅下有水氣腹滿雷鳴下利者生薑瀉心湯主之傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之附云傷寒噫氣者何氣使然答曰胸中氣不交故也少陰經至胸中交於厥陰水火相搏而有聲故噫氣也宜如聖加枳實湯如聖加枳實湯方甘草桔梗各五錢枳實炒三錢上銼細每服五錢入五味子半錢水煎服傷寒吐下後喘而噫氣者宜如聖加人參藿香杏仁湯如聖加人參藿香杏仁湯方甘草桔梗人參藿香杏仁各等分上銼細每服五錢水煎服噦即吃逆噦即俗所謂吃逆雜病辨之甚詳按説文噦氣牾也於月切又乙劣切乙劣之訛遂為吃逆亦猶俗呼團為突欒角為葛洛其故明矣名世如東垣亦謂噦是乾嘔之重者不知有聲無物皆為乾嘔豈有輕重分為二病哉至所云咳逆者即今之喘嗽是也乃與吃逆混而為一或以為噦皆不考之過而得失利害系焉不可以不辨胃寒傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也成大吐大下胃氣極虛復極發汗又亡陽氣外邪怫鬱於表則身熱醫與之水以發其汗胃虛得水虛寒相搏則噦也吳茱萸湯理中湯活人用橘皮乾薑湯羌活附子散半夏生薑湯退陰散活人云若服藥不瘥者灸之必愈其法婦人屈乳頭向下盡處骨間灸三壯丈夫及乳小者以一指為率男左女右艾炷如小豆許與乳相直間陷中動脈起胃熱陽明中風脈弦浮大短氣腹滿脅下及心痛鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦脈續浮者與小柴胡湯若不尿腹滿加噦者不治詳胃實傷寒噦而腹滿視其前後知何部不利利之則愈仲景無方活人云前部宜豬苓湯後部宜調胃承氣湯胃中虛冷不能食者飲水則噦與小承氣湯入腹中不轉失氣者不可攻之攻之必脹滿不食與水則噦詳潮熱本渴而飲水嘔者柴胡不中與也食谷則噦詳脅痛陽明病胃實不能食者攻其熱必噦濕家頭汗出背強惡寒欲覆被向火者下之早則噦詳體痛太陽病以火劫發汗血氣流溢身黃欲衄頭汗腹滿譫語甚者至噦捻衣摸床小便利者可治論見頭汗附橘皮乾薑湯橘皮通草乾薑炮桂心甘草炙各二兩人參一兩上銼如麻豆大每服四錢水一盞煎至六分去滓溫服日三羌活附子散治吃逆羌活附子炮茴香微炒各半兩木香乾薑炮各如棗許大上為細末每服二錢水一盞鹽一捻同煎一二十沸帶服一服止半夏生薑湯治噦欲死生薑二兩切半夏洗一兩二錢半上以水二盞煎至八分去滓分二服溫服失下海藏云傷寒咳逆脈散死仲景之言不虛偽大抵因原失下生咳逆喉中陰不內便軟惟宜用瀉心便硬尤宜大承氣二藥神工作者誰東垣潔古為良劑潔咳逆者火熱奔急上行而肺陰不內何其當哉故便祕者宜大承氣下之便軟者瀉心湯主之海少陰咳逆者此失下也陰消將盡陽逆上行使陰不納也然陰既盡陽亦將盡也吸入腎與肝陽逆上行陰入不納故為陽極脈微將盡者不宜下宜服瀉心湯養陰退陽而已如不用瀉心湯涼膈散去硝黃清肺散亦可若脈左浮右沉實非表也里極則反出於表也何以然咳逆舌強右脈實者知少陰里也飲水過多心下痞而渴逆者五苓散主之別無惡證是也惡證生或兼以舌攣語言不正而反昏冒與咽痛者少陰也速下之宜大承氣湯也何以脈浮為表浮之實大沉之損小是為表也浮之實大沉之亦然即非表也邪入已深矣內熱當沉反浮陽極復之表也陰證者內已伏陰陰氣太甚腎水擅權肝氣不生胃火已病丁火又消所以遊行相火寒邪迫而萃集於胸中亦欲盡也故令人發熱大渴引飲欲去蓋覆病人獨覺熱他人按熱之身體肌肉骨髓血脈俱寒此火即無根之火也故用丁香乾薑之類熱藥溫胃其火自下勻氣散用川烏大者三枚炮裂去皮臍上為細末每服三錢用黑豆二十一粒砂糖同泡湯調乘熱細細飲之治陰毒吃逆方本事川烏頭乾薑附子以上俱炮肉桂芍藥半夏炙甘草吳茱萸陳皮大黃各等分上為細末每服一錢水一盞生薑三五片煎至七分去滓服溫肉豆蔻湯治傷寒汗後吃逆噫氣肉豆蔻一個石蓮肉炒茴香各一兩人參丁香各半兩枇杷葉五片拭去毛炙上銼細用水四盞生薑十片煎二盞去滓空心溫服分二服良薑湯橘皮良薑桂枝當歸各一兩杏仁二十個麻黃甘草各半兩檳榔三個另有末上㕮咀用水四盞薑十片棗三枚同煎至二盞去渣下檳榔末再煎三沸通口服一盞未已再服龐老云傷寒吃逆不止是陰陽氣升降欲作汗升之不下故胃氣上逆為吃逆無休止宜服此方扁鵲中藏經治傷寒咳逆丁香散丁香柿蒂各一分甘草良薑各半錢沸湯點作一服乘熱猛吃極效上以上五方陰證所宜三因橘皮竹茹湯見雜病吃逆門上方陽證所宜治傷寒吃逆救急方香附子橘核炒各半兩上細銼用酒半盞先將藥置銀石器內炒漸漸滴酒炒藥焦黃色研細末每二錢水一小盞煎至八分細細旋呷服一方單用香附子末又方大蒜頭二個煨爛研爆入白薑末丸得為度研和如梧桐子大搗薤菜自然汗吞下二十丸病退再服一十五丸吳吃逆者氣上逆而為吃忒也醫方或以為咳逆者非也經曰咳逆上氣脈散者死謂其形損故也成無己注引千金方云咳逆上氣乃咳嗽也言心火以刑肺金其氣噴逆而為嗽喘也若肺絶則脈散皮毛焦折而死故曰形損也與吃逆何相干哉吃逆有因胃熱失下而作者且其氣皆從胃至胸嗌之間而為逆吃易老治法失下胃熱內實大便硬者以承氣湯下之便軟者以瀉心湯主之胃虛有熱者橘皮竹茹湯有痰飲者半夏生薑湯或茯苓半夏湯若胃冷者橘皮乾薑湯加味理中湯要略言其氣自臍下直衝於胸嗌間吃逆者此陰證也其病不在胃也且病下虛內以伏陰或誤用寒涼遂致冷極於下迫其相火上衝萃集於胸中以為吃忒亦欲盡也病人煩躁自覺甚熱他人以手按其肌膚則冷此為無根失守之火散亂為熱非實熱也乃水極似火若不識此誤用涼藥下咽則敗矣凡治須用活人羌活附子散或加味附子湯急溫其下真陽一回火降吃逆自止也如冷極吃逆不止者或兼以硫黃乳香散嗅法或灸期門中脘關元氣海但要取手足溫暖脈生陽回陰退則生矣瘧狀楊瘧狀作止有時非若寒熱往來或疏或數而作止無定時也凡感冒之人忽覺毛寒股栗筋節拘攣百骸鼓撼嘔不欲食其寒不可御未幾復轉而發熱者此即溫瘧不必謂瘧脈自弦或洪數或緊實或虛緩或刮澀皆為瘧狀但以外證別之用藥固有本條小柴胡湯如前斟酌加減亦是活法雖然血虛能生寒熱敗血亦作寒熱陰陽相勝一證雖各有一方皆當以川芎為佐太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面反有熱色者未能解也以其不能得小汗出身必癢宜桂枝麻黃半各湯服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯成經曰如服一劑病證猶在者故當復作本湯服之桂枝湯汗出後脈洪大者病猶在也若形如瘧日再發邪氣客於榮衛之間也與桂枝二麻黃一湯以解散榮衛之邪桂枝二麻黃一湯方枝桂三錢去粗皮芍藥三錢麻黃去節一錢六分生薑切三錢甘草一錢六分炙杏仁去皮尖四枚大棗二枚擘上七味以水二鍾先煮麻黃一二沸去上沫納諸藥煮取一鍾去渣分二服病人頭熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈虛浮者宜發汗下之與大承氣湯發汗宜桂枝湯雖得陽明證未可便為裡實審看脈候別內外有脈實者熱已入腑為實可與大承氣湯下之其脈浮虛者是熱未入腑猶在於表也可與桂枝湯發汗則愈婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故為瘧狀發作有時小柴胡湯主之詳婦人傷寒舌苔舌上白苔陽明病脅下硬滿不大便而嘔者小柴胡湯詳胃實陽明病脈浮緊咽噪口苦腹滿而喘發熱汗出不惡寒反惡熱身重若下之則胃中空虛客氣動膈短氣躁煩心中懊憹者梔子豉湯方見煩濕家但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利以丹田有熱胸中有寒也診脈陰陽俱緊者口中氣出唇口乾燥蜷臥足冷鼻中涕出舌上苔滑勿妄治也到七日以來其人微發熱手足溫者此為欲解或到八日以上反大熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也海藏云惡寒必欲嘔者小柴胡湯腹中痛者理中湯臟結如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊舌上白苔滑者難治也若無陽證不往來寒熱其人反靜者不可攻也論見臟結成舌者心之官法應南方火本紅而澤傷寒三四日以後舌上有膜滑如苔甚者或燥澀黃黑是數者白熱氣淺深之故也邪氣在表者舌上即無苔及邪氣傳裡津液結搏則舌上生苔矣寒邪初傳未全成熱或在半表或在半里或邪氣客於胸中者皆舌上白苔而滑也經曰舌上如苔者以丹田有熱胸上有寒邪初傳入里也陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯是邪在半表半裡也太陽病若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之是邪客於胸中也若病在臟宜若可下如舌上苔滑者則不可攻是邪未全成熱猶帶表寒故也及其邪傳為熱則其舌上之苔不滑而澀也經曰傷寒七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之是熱耗津液而滑者已干也若熱聚於胃宜下則為之舌黃是熱已深矣金匱要略曰舌黃未下者下之黃自去若舌上黑色者不治又為熱之極也針經曰熱病口乾舌黑者死以心為君主之官開竅於舌黑為腎色見於心部心部者火也腎者水也水之邪熱已極鬼賊相刑故知必死也垣下後病嗽加五味子麥門冬如舌上有苔滑者是胸中有寒勿用之胸有微寒加辛熱之劑立效舌燥澀如楊梅刺者用生薑切厚片蘸蜜於舌上揩之其刺立消神效無薄荷蜜治舌上白苔乾澀語話不真先以生薑厚片蘸蜜水揩洗次用薄荷自然汁與白蜜等分調勻敷之良陶傷寒舌上生苔不拘滑白黃黑用井華水浸青布片洗淨後用生薑切作片子時時浸水刮擦之其苔自退凡見黑苔如芒刺者必死此熱毒入深十有九死蓋腎水克心火也又舌吐不收者用冰片少許摻舌上即收附杜清碧驗證舌法舌見白苔滑者邪初入里也丹田有熱胸中有寒乃少陽半表半裡之證也宜小柴胡湯梔子豉湯治之舌見紅色熱蓄於內也不問何經宜用透頂清神散治之透頂清神散方豬牙皂骨細辛白芷當歸各等分為細末和勻令病人先噙水一口以藥少許吹入鼻內吐去水取嚏為度未嚏仍用藥吹入凡瘟疫之家不拘已未患者皆宜用之舌見紅色內有黑形如小舌者乃邪熱結於裡也君火熾盛反兼水化宜涼膈散大柴胡湯下之舌見紅色而有小黑心者熱毒乘虛入胃蓄熱則發斑矣宜用元參升麻葛根湯即元參升麻湯加葛根化斑湯解之舌見淡紅中有大紅星者乃少陰君火熱之盛也所不勝者假火勢以侮脾土將欲發黃之候也宜用茵陳五苓散治之舌見紅色尖見青黑色者水虛火實腎熱所致宜用竹葉石膏湯治之舌見淡紅色而中有一紅暈沿是純黑乃餘毒遺於心胞絡之間與邪火鬱結二水亢極故有是證也以承氣湯下之舌見紅色更有裂紋如人字形者乃君火燔灼熱毒炎上故發裂也宜用涼膈散舌見紅色更有紅點如蟲蝕之狀者乃熱毒熾甚火在上水在下不能相濟故也宜用小承氣湯下之舌見紅色內有乾硬黑色形如小長舌而有刺者此熱毒熾甚堅結大腸金受火制不能平水故也急用調胃承氣湯下之舌見紅色內有黑紋者乃陰毒厥於肝經肝主筋故舌見如絲形也用理中合四逆湯溫之舌見黑色水剋火明矣患此者百無一治治者審之薛余在留都時地官主事鄭汝東妹壻患傷寒得此舌院內醫士曾禧謂當用附子理中湯人咸驚駭遂止亦莫能療困甚治棺曾與之鄰往視之謂用前藥猶有生理其家既待以死𢬵從之數劑而愈大抵舌黑之證有火極似水者即杜學士所謂薪為黑炭之意也宜涼膈散之類以瀉其陽有水來剋火者即曾醫士所療之人是也宜理中湯以消陰翳又須以老生薑切平擦其舌色稍退者可治堅不退者不可治宏治辛酉金臺薑夢輝患傷寒此得此舌手足厥逆吃逆不止衆醫猶作火治幾致危殆院判吳仁齊用附子理中湯而愈夫醫之為道有是病必用是藥附子療寒其效可數奈為世皆以為必不可用之藥寧視人之死而不救不亦哀哉至於火極似水之證用藥得宜效應不異不可便謂百無一治而棄之也舌見尖白根黃其表證未罷須解表熱後乃可攻之如大便祕者用涼膈散加硝黃泡服小便澀者用五苓散加木通合益元散加薑汁少許以白滾湯調服舌見弦白心黑而脈沉微者難治脈浮滑者可汗沉實者可下始病即發此色乃危殆之甚也速進調胃承氣湯下之舌尖白苔二分根黑一分必有身痛惡寒如飲水不至甚者五苓散自汗渴者白虎湯下利者解毒湯此亦危證也舌見白苔中有小黑點亂生者尚有表證其病來之雖惡宜涼膈散微表之表退即當下之下用調胃承氣湯舌見如灰色中間更有黑暈兩條此熱乘腎與命門也宜急下之服解毒湯下三五次遲則難治如初服量加大黃酒浸泡舌見微黃色者初病即得之發譫語者由失汗表邪入里也必用汗下兼行以雙解散加解毒湯兩停主之雙解散加解毒湯方防風川芎當歸芍藥大黃麻黃連翹芒硝荊芥白朮梔子各半兩石膏黃芩桔梗各一兩甘草二兩滑石三兩上每服一兩水一鍾半生薑三片煎八分服不拘時一云有桂枝二兩舌中見白苔外則微黃者必作泄宜服解毒湯惡寒者五苓散舌見微黃色者表證未罷宜用小柴胡湯合天水散主之可下者大柴胡湯下之表裡雙除臨證審用之舌見黃色者必初白苔而變黃色也皆表而傳裡熱已入胃宜急下之若下遲必變黑色為惡證為亢害鬼賊邪氣深也不治宜用調胃承氣湯下之舌左白苔而自汗者不可下宜白虎加人參三錢服之舌右白苔滑者病在肌肉為邪在半表半裡必往來寒熱宜小柴胡湯和解之舌左見白苔滑此臟結之證邪併入臟難治舌見四圍白而中黃者必作煩渴嘔吐之證兼有表者五苓散益元散兼服須待黃盡方可下也舌見黃而有小黑點者邪遍六腑將入五臟也急服調胃承氣湯下之次進和解散十救四五也舌見黃而尖白者表少里多宜天水散一服涼膈散二服合進之脈弦者宜防風通聖散舌見黃而澀有隔瓣者熱已入胃邪毒深矣心火煩渴急以大承氣湯下之若身發黃者用茵陳湯下血用抵當湯水在脅內十棗湯結胸甚者大陷胸湯痞用大黃瀉心湯舌見四邊微紅中央灰黑色者此由失下而致用大承氣湯下之熱退可愈必三四下方退五次下之而不退者不治舌見黃而黑點亂生者其證必渴譫語脈實者生脈澀者死循衣摸床者不治若下之見黑糞亦不治下宜大承氣湯舌見黃中黑至尖者熱氣已深兩感見之十當九死惡寒甚者亦死不惡寒而下利者可治調胃承氣湯主之舌見外淡紅心淡黑者如惡風表未罷用雙解散加解毒湯相半微汗之汗罷急下之如結胸煩躁目直視者不治非結胸者可治舌見灰色尖黃不惡風寒脈浮者可下之若惡風惡寒者用雙解散加解毒湯主之三四下之見糞黑不治舌見灰黑色而有黑紋者脈實急用大承氣湯下之脈浮渴欲飲水者用涼膈散解之十可救其二三舌根微黑尖黃脈滑者可下之脈浮者當養陰退陽若惡風寒者微汗之用雙解散若下利用解毒湯十生七八也舌根微黑尖黃隱見或有一紋者脈實急用大承氣湯下之脈浮渴飲水者用涼膈散解之十可救其一二也以上三十六舌乃傷寒驗證之捷臨證用心處之百無一失動氣動氣者為築築然動跳於腹者是也動氣在右不可發汗發汗則衄而渴心苦煩飲即哇水活人云先服五苓散三服次服竹葉湯動氣在左不可發汗發汗則頭弦汗不止筋惕肉瞤活人云先服防風白朮牡蠣汗止次服建中湯方見自汗動氣在上不可發汗發汗則氣上衝正在心端活人云宜服李根湯方見氣上衝心動氣在下不可發汗發汗則無汗心中大煩骨節苦疼目暈惡寒食則反吐谷不能進活人云先服大橘皮湯吐止後服小建中湯動氣在右不可下之下之則津液內竭咽燥鼻乾頭眩心悸也動氣在左不可下之下之則腹內拘急食不下動氣更劇雖身有熱臥則欲蜷動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌動氣在下不可下下之則腹脹滿卒起頭眩食則下清穀心下痞也附保命集方傷寒汗下後臍左有動氣宜防葵散防葵散方防葵一兩木香不見火柴胡黃芩各半兩上銼為細末每服五錢水煎服傷寒汗下後臍上有動氣者宜枳殼散枳殼散方枳殼麩炒訶黎勒木香不見火各五錢赤茯苓當歸三稜炮各一兩上為末每服五錢沸湯點服傷寒汗下後臍右有動氣者宜前胡散前胡散方前胡赤茯苓大腹皮人參各五錢木香檳榔大黃各三錢上為細末每服五錢沸湯點服傷寒汗下後臍下有動氣者宜茯苓散茯苓散方赤茯苓一兩桂心大腹皮川茴香良薑各五錢檳榔三錢上為細末每服五錢沸湯點服如久不治傳為積熱治之難痊不可汗下也漱水不欲咽此證屬陽明凡內有熱者欲飲水今飲水而不欲咽是熱在經而里無熱也陽明經氣血俱多經中熱甚逼血妄行故知必作衄也楊仁齋曰唇燥口乾血證類有之必欲取水而灌漱也然漱水而不飲水何哉蓋渴者易為飲陽熱入里胃中液干患不與水耳惟夫上焦瘀血下焦蓄血乘肺發燥渴證獨無是以漱水而不欲下咽也漱水條例惟血證有焉陽明身熱頭疼口燥漱水不欲入咽必衄血脈微者犀角地黃湯茅花湯無表證不寒熱胸腹滿唇燥口乾漱水不咽小便多此為瘀血必發狂輕者犀角地黃湯桃仁承氣湯甚者抵當丸取盡黑物為度吳凡少陰脈沉細手足冷或時煩躁作渴欲漱水不欲咽者宜四逆湯溫之又下利厥逆無脈乾嘔煩渴欲漱水不欲咽宜白通加豬膽汁人尿主之凡厥陰蛔厥傷寒煩躁吐蛔口躁舌乾但欲涼水浸舌及唇時不可離不欲咽者宜理中湯加烏梅主之大抵陰證發躁煩渴不能飲水或有勉強飲下良久復吐或飲水而嘔或噦逆者皆內寒也蓋無根失守之火遊於咽嗌之間假作躁煩則不能飲或有能飲水不吐復欲飲者熱也衄成衄者鼻中出血也雜病衄血在裡傷寒衄血在表病源曰心主血肝藏血肺主氣開竅於鼻血得熱隨氣上從鼻出為衄是雜病衄者責其裡熱也經曰傷寒脈浮緊不發汗因致衄者麻黃湯傷寒六七日不大便頭痛有熱者與小承氣湯小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯是傷寒衄者責其表熱也衄雖為熱在經又有不可汗者經曰衄不可汗汗則額上陷脈緊急直視不能眴不得眠是也前云桂枝麻黃證者非治衄也蓋以發散經中邪氣使其不得擁盛於經迫上而妄行也衄為熱無寒是以三陰無衄經少陰病曰但厥無汗而強發之必動其血或從口鼻或從目出是名下厥上竭者死非衄也又衄但頭汗出身無汗及汗出不至足者亦死證也太陽傷寒緊脈浮不發汗因致衄者麻黃湯主之活人云衄後脈浮者宜麻黃湯衄後脈已微者不可行麻黃湯宜黃芩芍藥湯太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄乃解所以然者陽氣重故也麻黃湯主之張或謂經言衄家不可發汗汗出額上必陷今衄血之證皆贅麻黃於其下何也夫太陽脈浮緊發熱無汗自衄者愈此一定之論也何故復用麻黃湯以汗之仲景豈有前後相反之理哉然前條麻黃湯主之五字合當用於當發其汗之下蓋以漢之文法用藥諸方皆贅於外條之末且如大青龍湯證既云脈微弱汗出惡風者不可服服之厥逆筋惕肉瞤此為逆也又以大青龍湯主之皆此例也太陽中風以火劫發汗邪風被火兩陽相熏其身發黃陽盛欲衄陰虛小便難頭汗腹滿微喘口乾咽爛或不大便譫語甚者至噦捻衣摸床小便利者可治詳身黃門太陽病脈浮緊發熱無汗而衄者愈也陽明病口燥但欲漱水不欲咽者此必衄成陽明之脈起於鼻絡於口陽明裡熱則渴欲飲水此口燥但欲漱水不欲咽者是熱在經而里無熱也陽明氣血俱多經中熱甚迫血妄行必作衄也當責熱黃芩芍藥湯衄乃解脈浮發熱口乾鼻燥能食者則衄黃芩湯少陰病但厥無汗而強發之必動其血或從口鼻或從目出名下厥上竭為難治禁忌衄家不可發汗汗出必額上陷脈急緊直視不能瞬不得眠衄忌發汗者為無脈若脈浮緊身疼發熱惡寒之證宜察之動氣發汗則衄而渴飲水則吐詳動氣附海仲景言衄不可發汗者蓋為脈微也若浮緊者麻黃湯浮緩者桂枝湯脈已微二藥不可用犀角地黃湯主之仲景云衄家不可發汗汗出必額上陷脈緊直視不能瞬不得眠又云亡血不可發其表汗出即寒栗而振此二説皆為脈微不可汗也若脈浮緊及浮緩者皆當發之是也活傷寒衄血脈已微者黃芩芍藥湯犀角地黃湯主之犀角地黃湯治傷寒應發汗而不發汗內有瘀血鼻衄吐血面黃大便黑此方主消化瘀血芍藥一兩生地黃一兩半牡丹皮犀角各二錢半鎊上㕮咀每服五錢水一盞半煎去一盞有熱如狂者加黃芩一兩其人脈大來遲腹不滿自言滿者為無熱不用黃芩茅花湯治鼻衄不止用茅花尖一把以水三盞濃煎汁一盞分二服即瘥無花以根代之若衄而渴者心煩飲則吐水先服五苓散次服竹根湯本治傷寒衄血滑石丸滑石末不以多少飯丸如桐子大每服十丸微嚼破新水咽下立止用藥末一錢飯少許同嚼下亦得老幼皆可服湯晦叔云鼻衄者當汗不汗所致其血青黑時不以多少乃止宜服溫和藥以調其衛才見鮮血急以此藥治之戴古論鼻衄屬太陽經風寒皆有之既衄而表證仍在於寒當用麻黃湯於風當再用桂枝湯且謂發煩目瞑極者必衄既發煩目瞑豈純是太陽經兼陽明之脈循鼻是太陽侵入陽明汗下俱難若衄已而熱不退者惟升麻葛根湯敗毒散陽旦湯為穩衄而煩渴飲則吐水先服五苓散次服竹葉石膏湯大衄不止宜茅花湯或黃芩芍藥湯加茅花一撮若少陰初得病醫誤以止發汗之法致迫血動經妄行而衄其血非獨出於鼻或從口中或從耳目又有陽陷入陰四肢厥逆醫見其厥謂寒邪在表從而汗之當下反汗以致動血是謂下厥上逆為難治先哲云桂枝下咽陽盛則斃正以此也要之汗不出徹為陽之衄誤發其汗為陰之衄二者大不同也又云陽氣陰虛汗之則死陶傷寒衄血或成流久不止者將山梔炒黑色為細末吹入鼻內外用水濕草紙搭於鼻中其血自止須分點滴成流者其邪在經不在此法墨汁五倍子燒灰或服或吹隨用又或刺曲池合谷瀉之吳凡吐血衄血無表證脈不浮緊者不可發汗也東垣云脈微者宜黃芩芍藥湯脈滑數者犀角地黃湯如熱盛血不止者河間地黃散古方四生丸血虛者東垣麥門冬飲子三黃補血湯若不止者活人茜根散茅花湯主之也以上皆治吐血衄血之良方但在出入通變也大抵吐血衄血脈滑小者生脈實大者死或吐或衄後脈微者易治若熱反盛脈又數急者死也若衄而頭汗出或身上有汗不至足者乃難治也凡血得熱則行得冷則凝見黑則止所以犀角地黃湯中加好京墨一二匙攪藥令黑與之最效也昔陶尚文治一人傷寒四五日吐血不止醫以犀角地黃湯茅花湯治之反劇陶公切其脈浮緊而數遂服麻黃湯一服汗出而愈也可謂得仲景之心法矣若脈不浮緊而數者此法豈可施乎吐血成雜病吐血咯血責為實邪傷寒吐血咯血皆由誤汗下併火逆而致誠非寒病熱之微甚者也是為壞病宜隨其逆而調之惟少陰厥竭誤汗一證強動經血故云難治也凡服桂枝湯吐者其後必吐膿血黃芩湯麻黃升麻湯脈浮熱熱甚反灸之必咽燥唾血此火邪迫血而血上行者也茅花湯解毒湯黃芩芍藥湯少陰病但厥無汗強發之必動其血或從口鼻或從目出名下厥上竭為難治少陰證惡寒發熱無頭疼誤大汗使血從耳目口鼻出者名陰血多不語此與鼻衄陽血不同傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黃升麻湯咽痛吐血若面赤斑斑如錦紋者為陽毒宜升麻鱉甲湯附垣治一貧士病脾胃虛與補劑藥愈後繼而居曠室臥熱炕咳而吐血數次豫謂此久虛弱外有寒形而有火熱在內上氣不足陽氣外虛當補表之陽氣瀉里之虛熱蓋冬居曠室衣服單薄是重虛其陽表有大寒壅遏裡熱火邪不得舒伸故血出於口因思仲景治傷寒脈浮緊當以麻黃湯發汗而不與之遂成衄血卻與麻黃湯立愈與此甚同因與麻黃人參芍藥湯麻黃人參芍藥湯方麻黃一錢去外寒桂枝半錢補表虛白芍藥一錢黃耆一錢實表益衛炙甘草一錢補脾五味子五粒安肺氣麥門冬三分保肺氣人參三分益三焦元氣不足而實其表當歸五分和血養血上㕮咀作一服水三盞煎麻黃令沸去沫至二盞入余藥同煎至一盞去滓熱服臨臥一服愈觀此一方足以為萬世模範也蓋取仲景麻黃湯與補劑各半服之但凡虛人合用仲景方者皆當以此為則也活傷寒吐血諸陽受邪初熱在表應發汗熱毒入經結於五臟內有瘀積故吐血也瘀血甚者抵當湯也輕者桃仁承氣湯兼服犀角地黃湯三黃丸便膿血便膿血熱病也其在太陽者誤發淋家汗因便血豬苓湯此壞病也由小便淋瀝所致故利其小便而愈陽明病下血譫語此熱入血室刺期門以散其熱也無表裡證因下後協熱便膿血者熱勢下流故也其在少陰下利便膿血又有至四五日腹痛便膿血治以桃花湯成氏釋為裡寒非也桃花湯雖犯乾薑然分兩最微赤石脂粳米居多蓋調正氣澀滑脫佐用辛以散之之義又八九日一身盡熱必便血也又便膿血者可刺厥陰又傷寒先厥後熱必便膿血又傷寒厥少熱微後必便血又下利脈數而渴必清膿血是數者皆傳經之熱邪也各隨其輕重或用微涼或用疏導無不愈者誤用辛熱罔或得痊世因以為難療之疾殊不知仲景著便膿血別無死候學者宜究心焉太陽病以火熏之不得汗其人必躁再到太陽經不解必清血為火邪此火邪迫血而血下行者也太陽病下之其脈促不結胸者為欲解脈沉滑者協熱利脈浮滑者必下血淋家不可發汗發汗必便膿血太陽病外已解但少腹急結者桃仁承氣湯證也詳蓄血陽明病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解下不止協熱而便膿血也陽明病下血譫語此熱入血室但頭汗者刺期門衝脈為血海即血室也男女均有之男子下血譫語婦人寒熱似瘧皆為熱入血室迫血下行則為協熱而利挾血之脈乍澀乍數或沉或伏血熱交併則脈洪盛大抵男多在左手女多在右手見之也又有陰寒為病下利膿血者乃下焦虛寒腸胃不固清濁不分而便下膿血也二者一為血熱一為血寒臨病宜詳審之少陰病八九日一身手足盡熱以熱在膀胱必便血也少陰病下利便膿血者可刺厥陰傷寒先厥後發熱下利必自止若不止必便膿血傷寒熱少厥微指頭寒默默不欲食煩躁小便利色白者此熱除也欲得食為欲愈若厥而嘔胸脅煩滿者其後必便膿血傷寒厥少熱多其病當愈四日至七日熱不除者必便膿血下利脈數而渴者令自愈設不瘥必清膿血下利寸脈反浮數尺中自嗇者必清膿血吳凡下血便膿血有陰陽冷熱之不同要詳辨之古人云見血無寒又言血得熱而行此大概之言也大抵屬熱者常八九屬寒者才一二不可拘泥謂無寒也要略曰陽證內熱則下鮮血陰證內寒則下紫黑如豚肝也且夫陽證脈數而有力者為實熱苦寒之藥可投若數而無力者虛熱當甘溫養血藥中少佐寒藥可也若陰證則脈遲而有力者為有神可治無力者難治也凡下利膿血身熱脈大者為難治身熱脈小者為易治也蓄血身黃如狂屎黑喜忘皆蓄血之證也許學士云血在上則喜忘在下則發狂成血留下焦而瘀者蓄血也大抵傷寒先看面目次觀口舌次觀心下至少腹以手揣之若少腹硬滿若小便不利者是津液留結可利小便若小便自利者是蓄血證可下瘀血其陽明病有蓄血而喜忘者證之甚也宜抵當湯太陽有熱結膀胱如狂者證之輕也宜桃仁承氣湯經云病人無表裡證發熱七八日脈雖浮數可下之假令已下脈數不解胃熱則消穀善飢至六七日不大便者此有瘀血抵當湯主之若脈數不解而下不止必協熱而便膿血也此證當不大便六七日之際又無喜忘如狂並少腹硬滿之候與承氣下者多矣何以知為蓄血蓋脈浮而數浮則熱傷氣數則熱傷血因下之後浮數俱去則已若下後數去而脈但浮者則榮血間熱去並於衛氣間熱心中則飢也邪熱不殺穀則有潮熱發渴之證也及下之後浮去而數不解者則衛氣間熱去合於榮血間之熱熱氣合併逼血下行胃虛協熱消穀善飢血至下焦若下不止則血得以去泄必便膿血也若不大便六七日則血不得出泄蓄在下焦為瘀血須抵當湯下之此實證之奇異治法之元微也太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之成太陽經也膀胱府也此太陽瘀熱隨經入腑者也六七日者邪氣傳裡之時也脈微而沉邪氣在裡之脈也表證仍在者則邪氣猶淺當結於胸中若不結於胸中其人發狂者熱結在膀胱也經曰熱結膀胱其人如狂此發狂則熱又深也少腹硬滿小便不利者為無血也小便自利者血證諦也與抵當湯以下蓄血案坑仍在字則邪氣為不傳於裡非猶淺也膀胱為太陽本經曰熱在下焦曰少腹硬滿曰小便自利皆膀胱之證故總結曰隨經瘀熱也在裡二字要看得活非三陰之裡乃隨經膀胱之裡也太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之身黃脈沉結少腹硬小便不利者胃熱發黃也可與茵陳湯身黃脈沉結少腹硬小便自利其人如狂者非胃中瘀熱為熱結下焦而為蓄血也與抵當湯以下蓄血抵當湯方水蛭三十個熬虻蟲三十個去足翅熬桃仁二十個去皮尖大黃酒浸三兩上四味為末以水五升煮取三升去滓溫服一升不下再服苦走血咸勝血虻蟲水蛭之鹹苦以除蓄血甘緩結苦泄熱桃仁大黃之甘苦以下結熱人之所有者氣與血也氣為陽氣留而不行者則易散以陽病易治故也血為陰血蓄而不行者則難散陰病難治故也血蓄於下非大毒駛劑則不能抵當故治蓄血曰抵當湯內經曰咸勝血血蓄於下必以咸為主故以水蛭鹹寒為君苦走血血結不行必以苦為助是以虻蟲苦寒為臣肝者血之源血聚則肝氣燥肝苦急食甘以緩之散血緩肝是以桃仁味苦甘平為佐大黃味苦寒濕氣在下以苦泄之血亦濕類也蕩血逐熱是以大黃為使四物相合雖苛毒重病亦獲全濟傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸成傷寒有熱少腹滿是蓄血於下焦若熱蓄津液不通則小便不利其熱不蓄津液而蓄血不行小便自利者乃為蓄血當與桃仁承氣湯抵當湯下之然此無身黃屎黑又無喜忘發狂是未至於甚故不可與其餘駛峻之藥也可與抵當丸小可下之也案身黃屎黑喜忘發狂亦是推廣之詞若依上文只是滿而不硬耳抵當丸方水蛭二十個虻蟲二十五個桃仁二十個去皮尖大黃三兩上四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯按犀角地黃湯以治上血如吐血衄血為上血也桃仁承氣湯治中血如蓄血中焦下利膿血之類為中血也抵當湯丸治下焦血如血證如狂之類是下血也上中下三焦各有主治此條當作三證看至下者愈是一證謂其血自下也疑有缺文至當先解外是一證蓋其人如狂是下焦血非桃仁承氣證也自外解至末又是一證恐是自下只去得下焦血而中焦道遠未能盡去故尚留於少腹耳又抵當湯丸其中虻蟲水蛭性為猛厲不若四物湯加酒浸大黃各半下之妙見湯液本草水蛭條下桃核承氣湯方桃仁五十個去皮尖桂枝去粗皮芒硝甘草炙各二兩大黃四兩上五味以水七升煮取二升半去滓納芒硝更上火微沸下火先食溫服五合日三服當微利甘以緩之辛以散之少腹急結緩以桃仁之甘下焦蓄血散以桂枝辛熱之氣寒以取之熱甚搏血故加二物於調胃承氣湯中也按以上證玩之當是桂非桂枝也蓋桂枝輕揚治上桂厚重治下成氏隨文順釋未足據陽明陽明證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之成內經曰血並於下亂而喜忘此下焦本有久瘀血所以喜忘也津液少大便硬以蓄血在內屎雖硬大便反易其色黑也與抵當湯以下瘀血海初便褐色者重再便深褐色者愈重三便黑色者為尤重色變者以其火燥也如羊血在日色中須臾變褐色久則漸變而為黑色即此意也當詳察之病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈不解胃熱則消穀善飢至六七日不大便者有瘀血宜抵當湯若脈數不解血下不止必協熱而便膿血也成當不大便六七日之際無喜忘如狂之證又無少腹硬滿之候何以知其有蓄血蓋以其脈浮數故也浮則熱客於氣數則熱客於血下後浮數俱去則病已若下後數去而浮仍在則榮血中熱去而衛氣中熱在為邪氣獨留心下善飢邪熱不殺穀潮熱反渴也若下後浮去而數不解則衛氣中熱去而榮血中熱在血熱合並迫血下行胃虛協熱消穀善飢血至下焦若下不則止血得以泄必膿血也若不大便六七日則血不得出泄必蓄在下焦為瘀血故須以抵當湯下之張或問攻下之法須外無表證里有下證然後可攻上言無表裡證況脈更浮數何故言可下之曰此非風寒之所病是由內傷而致然也若外不惡寒里無譫語但七八日發熱有爍津液乃陽盛陰虛之時苟不攻之其熱不已而變生焉故云雖脈浮數可下不待沉實而攻之夫內傷者經曰趺陽脈浮而數浮則傷胃數則傷脾此非本病醫特下之所為也仲景之意不外是理凡傷寒當下之證皆從太陽陽明在經之邪而入於腑故下之今不言陽明病而止云病人無表裡證此非自表之裡而病也但為可下故編於陽明篇中學者宜詳玩焉病者胸滿痞痿舌青口燥但漱水不欲下咽無寒熱脈微大來遲腹不滿其人言我滿為有瘀血海云漱水不咽胸滿心下手不可近者桃仁承氣湯主之病者如熱狀煩滿口乾燥而渴其脈反無熱此為陰伏是瘀血也當下之活前集云傷寒失汗熱蓄在裡熱化為血其人善忘而如狂血上逆則善忘血下蓄則內急甚者抵當湯丸桃仁承氣湯犀角地黃湯取盡黑物為效又云若用抵當湯丸更宜詳慎審其有無表證若有蓄血而外不解亦未可便用宜先用桂枝湯以解外緣熱客膀胱太陽經也吳凡蓄血者瘀血留結於內蓋傷寒病在太陽當汗不汗則瘀血在裡必血結也大抵看傷寒病人心下兩脅少腹但有硬滿處以手按則痛者便當問其小便何如若小便不利乃水與氣也若小便自利者為有血也陶以手按之小腹若痛而小水自利大便黑兼或身黃譫妄燥渴脈沉實者為蓄血桃仁承氣湯下盡黑物則愈若按之小腹脹滿不硬痛小水不利則溺澀也五苓散加減利之不可大利恐耗減津液也若按小腹繞臍硬痛渴而小水短赤大便實者有燥屎也大承氣湯下之附海血證古人用藥雖有輕重之殊而無上下之別今分作上中下三等以衄血嘔血唾血吐血為上部血結胸中為中部蓄血下焦為下部夫既有三部之分故藥亦當隨其輕重也汗多為衄血脈浮灸之咽燥為唾血當汗不汗熱入於裡者為嘔血吐血此在上也犀角地黃湯主之涼膈散加生地黃亦可然衄唾嘔吐俱在上亦當以輕重分之大凡血證皆不飲水惟氣證則飲之宜詳審此證乃足太陰所主脾所不里越而上行所以有吐血嘔血之候也實者犀角地黃湯虛者黃芩芍藥湯凡病嘔吐者以脾所主故咸用芍藥主之是知太陰藥也血結胸中頭痛身痛漱水不欲咽者衄無熱胸滿漱水不欲咽者喜忘昏迷其人如狂心下手不可近者血在中也桃仁承氣湯主之蓄血下焦其人發狂小腹滿硬小便自利大便反黑及臍下疼者抵當湯丸主之如狂者在中發狂者在下抵當湯丸藥味同劑如何是二法蓋喜忘發狂身黃屎黑者疾之甚也但小腹滿硬小便利者輕也故有湯丸之別桃仁大黃等分水蛭虻蟲多者作湯三之二者作丸丸之名取其數少而緩也故湯用煎服一升丸止服七合也生地黃湯病人七八日後兩手脈沉細微膚冷臍下滿或狂或躁大便實而色黑小便自利者此蓄血證也若老幼氣虛弱者宜此丸主之生地黃取自然汁一升如無只用生乾地黃二兩乾漆半兩炒煙盡生藕自然汁半升如無藕用剌薊汁一升半藍葉一握切細乾者用末半升虻蟲二十個去翅足麩內炒黃色水蛭十個炒大黃一兩銼如豆大桃仁研碎半兩上八味同一處入水三升慢火熬及二升放冷分二服先投一服至半日許血未下再投之此湯比抵當湯丸其勢甚輕如無地黃與藕汁照升數添水同煎抵當丸恐用之太過不止損血故以此湯主之腹中雷鳴成腹中雷鳴有二證壞病也其一由傷寒反下之而致者甘草瀉心湯以誤下損陰氣故耳其一由傷寒汗出解之而生者生薑瀉心湯以誤汗損陽氣而然蓋用此二湯以復陰陽之氣耳傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬幹嘔心煩不得安醫見心下痞復下之其痞益甚此非結熱以胃虛客氣上逆故便硬也甘草瀉心湯主之詳下利傷寒汗出解之後胃中不和心下痞硬幹噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之詳痞蜷成蜷者屈縮不伸是也皆陰寒之極雖在陽經見是證者然有表證亦宜用溫經之劑桂枝附子是也況在三陰裡寒下利厥逆者乎四逆之類其可缺諸若有陰無陽者為不治少陰病下利若利自止惡寒而蜷手足溫者可治或云四逆湯真武湯少陰病惡寒而蜷時時自煩欲去衣被者可治活人用小柴胡湯少陰病惡寒身蜷而利手足逆冷者不治少陰四逆惡寒而身蜷脈不至不煩而躁者死四肢拘急成拘急者拘強難以屈伸也不拘病證在何經凡見是證皆陰寒所致寒主收引故也仲景之法雖太陽證及風濕相搏而見攣急者亦處以桂枝加附子湯甘草附子湯之類況陰經里病霍亂之候四逆之劑其可缺諸太陽病發汗漏不止其人惡風小便難四肢微急難以屈伸桂枝加附子湯方見自汗風濕相搏骨節煩疼不得屈伸汗出短氣小便不利惡風或身微腫甘草附子湯方見身體痛傷寒脈浮自汗小便數心煩微惡寒腳攣急本桂枝加附子湯反用桂枝湯攻表誤也作甘草乾薑湯以復其陽若愈足溫更作芍藥甘草湯以伸腳大汗出熱不去內拘急四肢疼又下利厥逆惡寒者四逆湯陰陽易病身體重少氣少腹裡急膝脛拘急者燒裩散附吳凡傷寒大汗已出因而露風則汗不流通風邪乘虛襲於經絡故手足攣搐不能屈伸筋脈拘急也宜牛蒡根散生之牛蒡根散方牛蒡根十段麻黃去根節川牛膝天南星各六錢上細銼於石器內入好酒一升同研細另用炭火半稱燒一黃土地坑令通赤去火掃淨投藥於坑內再用炭火燒令黑色取出研為細末每服一錢以好酒溫熱調下日三服效外以百草膏貼之良瘛瘲成瘛者筋急而縮也瘲者筋緩而伸也或伸縮而不止者瘛瘲也俗謂之搐搦乃風熱甚之病宜以祛風滌熱之涼劑或有可生若妄加灼火及發表之藥則禍不旋踵太陽發汗已身猶灼熱名風溫脈陰陽俱浮自汗身重多眠鼻鼾語言難出不可下不可火若被火者微則發黃劇則驚癇瘛瘲防風通聖散吳夫瘛瘲者一縮一伸手足相引搐搦不已大抵與嬰孩發搐相似古人以此證多屬於風蓋風主搖動也駱龍吉言心主脈肝主筋心屬火肝屬木火主熱木主風風火相扇則為瘛瘲也若夫不因汗下後所生者當平肝木降心火佐以和血脈之劑主之如羌活防風黃芩柴胡黃連芍藥生地黃當歸川芎天麻之類若兼有痰者必加竹瀝天南星半夏如風邪急搐須加全蠍白殭蠶之類若傷寒曾經汗下後多日傳變而得此證者為病勢已過多難治也蓋因虛極生風所致須用小續命湯或大建中湯增損一二味主之凡傷寒汗出露風則汗不通流遂變筋脈攣急手足搐搦者宜牛蒡根散主之又風溫被火微發黃色劇如驚癇時發瘛瘲者宜葳蕤湯主之若瘛瘲戴眼反折絶汗乃出大如貫珠著身不流者此太陽終也不可治又有四肢漐習動而不止似瘛瘲而無力抽搐者此為肝絶蓋汗下後變生此證者多死凡用小續命湯有汗去麻黃無汗去黃芩要在通變而已風濕相搏成風濕相搏有二證其一則本是傷寒至八九日復遇風濕相搏者桂枝附子湯以散表中風濕其一則只是風濕相搏骨節煩疼等證宜甘草附子湯以散濕固衛能認此證妙在脈浮虛而澀脈若沉實滑大數者非也太陽傷寒八九日風濕相搏身體煩疼不能轉側不嘔不渴脈浮虛而澀者桂枝附子湯若大便硬小便自利者桂枝去桂加白朮湯風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯奔豚奔豚有二皆壞病也一由誤汗所致一由誤加燒針所致太陽發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之方見悸燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂二兩吳夫奔豚者如豕突之狀氣從少腹上衝心而痛也凡欲作奔豚者其氣在臍下築然而動也宜茯苓大棗湯主之或理中湯去白朮加肉桂主之痛甚者更加吳茱萸亦佳凡燒針令其汗出者針處被寒核起而赤必發奔豚也宜灸其核上各一壯與桂枝加桂湯主之若痛甚手足厥逆者宜當歸四逆湯加肉桂吳茱萸主之惟桂大能泄奔豚凡藥中不可缺也茯苓桂枝甘草大棗湯方茯苓半斤甘草炙二兩大棗十五枚擘桂枝四兩上四味以甘爛水一斗先煮茯苓減二升納諸藥煮取三升去滓溫服一升日三服腫腫有三證太陽風濕相搏身微腫者宜治濕陽明中風耳前後腫者宜刺大病瘥後腰以下腫者宜利小便風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥大病瘥後從腰以下有水氣者牡蠣澤瀉散主之牡蠣澤瀉散方牡蠣煆澤瀉蜀膝商陸葶藶隔紙炒海藻栝蔞根各等分上為末每服一錢或二錢米飲調下小便利為度身虛胃弱食少者以五苓加蒼朮陳皮木香砂仁之類主之若人不甚弱者以商陸一味煮粥食之亦佳凡病瘥後足腫者不妨但節飲食胃氣強自消也一方用金毛狗脊煎湯洗之亦效身癢太陽病有身癢陽明病有身如蟲行俱為榮衛氣虛微邪在表無從而出故有為癢如蟲行之狀也悉宜各半湯太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯陽明病法多汗反無汗其身如蟲行皮中狀者此久虛故也宜桂枝麻黃各半湯活人用朮附湯黃耆建中湯趙蟲行皮中狀者即經言身癢是也久虛者以表氣不足津液不充於皮膚使腠理枯澀汗難出也若謂虛則當補畢竟陽明受邪為病邪可補乎如用朮附黃耆輩皆收汗藥則榮衛鬱閉邪無從出內熱發矣何況其病又無吐利胃虛等證病不在裡但皮膚中表氣虛之理宜和解可也莫若除中借用各半湯或有熱者柴胡桂枝湯庶乎甘辛之劑可以和其榮衛通行津液而解未審當否除中成除中者藏寒應不能食今反能食者是也有二證悉屬厥陰藏寒其一證由誤服黃芩湯涼藥而致期以必死其一則熱少厥多胃氣在者必愈恐暴來出而復去者死其熱續在者生此不因藥故也傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死眼睛不慧語言不出而穀食反多者此為除中口雖欲言舌不能言凡手足厥冷而利不當食而食者恐為除中試與索餅食之發熱者除中不發熱者非也詳見厥門下重泄利下重若少陰證欲寐四逆者四逆湯加薤白散若熱者白頭翁湯方論見下利脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也脈遲浮弱惡風寒者表證也醫反下之遂不食脅痛身黃項強小便難復與柴胡湯必下重論見脅痛下利脈沉弦者下重也身熱惡寒身寒惡熱病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也成皮膚言淺骨髓言深皮膚言外骨髓言內身熱欲得衣者表熱裡寒也身寒不欲衣者表寒裡熱也丹謹按身大熱欲得衣蓋人之身不能自溫因表氣之實足以自溫雖遇風寒無所畏憚大熱病表氣當實而喜冷今反欲得衣者表氣虛不足以自溫故欲近衣恐是病人陰弱陽無所附飛越而出發為大熱爾當作陰虛治之身大寒反不欲近衣者恐是邪在表不能自發而為熱表雖無熱邪郁膚腠表氣大實故不欲近衣爾當作郁病治之注言表熱裡寒者當是熱感得淺寒感得深而在內也言表寒裡熱者當是寒感得淺而在外熱感得深而在內也表裡之寒熱為重感病耶重感之病必有其名如傷寒重感寒為溫瘧傷寒更遇風為風溫傷寒更遇溫熱為溫毒傷寒遇溫氣為溫疫病濕更中暍為濕溫未嘗有所謂表裡寒熱也然表熱裡寒表寒裡熱何病耶竊嘗求之論意矣恐為寒熱感之深者發也內經曰亢則害承乃制謂氣盛之極則受勝已之化而為病也熱感得深外必惡寒故曰寒在皮膚非寒也熱也熱在骨髓此火極似水證仲景曰人傷於寒則為病熱熱雖甚不死寒感得深外必發熱故曰熱在皮膚非熱也寒也此傷於寒而熱甚也內經曰甚者反治又曰寒因熱用熱因寒用病氣深者正氣虛也非反治因用邪何由伏病何由安趙詳仲景論中止分皮膚骨髓而不曰表裡者蓋以皮肉脈筋骨五者素問以為五臟之合主於外而充於身者也惟曰臟曰腑方可言表裡可見皮膚即骨髓之上外部浮淺之分骨髓即皮膚之下內部深沉之分與經絡屬表臟腑屬裡之例不同況仲景出此證在太陽篇首其為表證明矣是知虛弱素寒之人感邪發熱熱邪浮淺不勝沉寒故外怯而欲得近衣此所以為熱在皮膚寒在骨髓藥宜辛溫至於壯盛素熱之人或酒客輩感邪之初寒未變熱陰邪閉於伏熱陰凝於外熱鬱於內故內煩而不欲近衣此所以寒在皮膚熱在骨髓藥宜辛涼必也一發之餘既散表邪又和正氣此仲景不言之妙若以皮膚為表骨髓為里則麻黃證骨節疼痛其可名為有表復有里之證耶活熱在皮膚寒在骨髓一條仲景無治法宜先與陽旦湯寒已次以小柴胡加桂溫其里又云表熱裡寒者脈須沉而遲手或微厥下利清穀也所以陰證亦有發熱者四逆湯通脈四逆湯主之寒在皮膚熱在骨髓一條仲景亦無治法宜先以白虎加人參湯熱除次以桂枝麻黃各半湯以解其外又云表寒裡熱者脈必滑而厥口燥舌乾所以少陰惡寒而蜷時時自煩不欲厚衣用大柴胡下之而愈此皆仲景之遺意也表熱裡寒裡熱表寒傷寒脈浮此表有熱里有寒白虎湯主之少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯方見下利既吐且利小便復利大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之成吐利無津液則小便當少小便復利而大汗出津液不禁陽氣大虛也脈微為止陽若無外熱但內寒下利清穀為純陰此以外熱為陽未絶猶可與通脈四逆湯救之下利清穀裡寒外熱汗出而厥者通脈四逆湯成下利清穀為裡寒身熱不解為外熱汗出陽氣通行於外則未當厥其汗出而厥者陽氣太虛也與通脈四逆湯以固陽氣脈浮而遲表熱裡寒下利清穀者通脈四主之成浮為表熱遲為裡寒下利清穀者裡寒甚也與四逆湯溫里散寒表熱裡寒者脈雖沉而遲手足微厥下利清穀此裡寒也所以陰證亦有發熱者此表熱也四逆湯通脈四逆湯表寒裡熱者脈必滑身厥舌乾也所以少陰惡寒而蜷此表寒也時時自煩不欲近衣此裡熱也大柴胡湯熱多寒少寒多熱少太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯劉氏云脈遲者小建中加黃耆或溫中太陽病八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈脈微惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不得小汗出身必癢宜桂枝麻黃各半湯主之趙愚詳仲景論中熱多寒少止有二證如上文一證仲景之意蓋以得病七八日如瘧狀發熱惡寒熱多寒少十六字為自初至今之證以下文乃是以後擬病防變之辭當分作三截看若其人不嘔清便欲自可一日二三度發脈微緩為欲愈此一節乃里和無病而脈微緩微者邪氣微緩者陰陽同等脈證皆向安之兆可不待汗而欲自愈也若脈微而惡寒者此陰陽俱虛不可發汗更下更吐也此一節宜溫之若面色反有熱者未欲解也以其不能得小汗出其身必癢宜各半湯此一節必待汗而後愈也活人書不詳文意卻將其人不嘔清便欲自可九字本是欲愈之證反以他證各半湯汗之又將不可汗吐下及各半湯證語句並脫略而不言反將其中欲愈之證而用彼藥汗其所不當汗何也其第二證仲景云太陽病發熱惡寒熱多寒少脈微弱者亡陽也不可發汗宜桂枝二越婢一湯活人書於脈微弱上添都大二字豈以仲景論脈為未足而加之乎其第三證尺脈遲者仲景論中無熱多寒少語句但云脈浮緊法當身疼痛宜以汗解之假令尺中遲者不可發汗以榮氣不足血少故也活人書但舉尺中遲血少之語自添寒少熱多四字加於其上因而編入此問中何邪如一證尺遲者止當收入不可汗門中劉仲景一書只有熱多寒少之條無寒多熱少之證又云不煩躁手足厥逆為傷寒脈反浮緩為傷風大青龍湯或云各半湯發斑續增趙活人云發斑有兩證有溫毒有熱病又云表虛里實熱毒乘虛出於皮膚所以發斑瘡癮疹如錦紋素問謂之疹愚詳仲景論無此證治但華他云熱毒未入於胃而下之胃虛熱入爛胃又熱已入胃不以時下之熱不得泄亦胃爛其斑如雞頭大微隱起喜著兩脅王仲弓云下之太早熱氣乘虛入胃故也下之太遲熱留胃中亦發斑或服熱藥多亦發斑微者赤五死一生劇者黑十死一生皆用白虎加人參湯一名化斑湯及阿膠大青湯又索氏新書雲陽毒病人出斑皆如灸迹指面大青黑並不免於死者古人云胃爛如此可信矣世之人或謂斑有生者非斑也皆疹耳其狀如蚊蟲咬小點而赤是也故其多生矣今此癮疹如錦紋者疹也非斑也以斑即是疹亦非也謂表虛里實者亦非也如上所言豈特兩證而已乎海陽證發斑有四有溫毒發斑有熱病發斑有時氣發斑有傷寒發斑斑斑如錦紋或發之四末或發之面部或發之胸背色紅赤者胃熱也紫黑者胃爛也一則下早一則下晚乃外感熱病而發也宜用元參升麻湯白虎等藥王朝奉云赤斑出五死一生黑斑出十死一生皆用白虎人參湯阿膠大青湯兼與紫雪散大妙可下者調胃承氣湯吳凡發斑有六一曰傷寒二曰時氣三曰溫毒四曰陽毒五曰內傷寒六曰陰證一曰傷寒發斑者蓋因當汗不汗當下不下熱毒蘊於胃中乃發斑也千金方曰紅赤者為胃熱紫赤者為熱甚紫黑者為胃爛也故赤斑出者五死一生黑斑出者十死一生也大抵鮮紅起發者吉雖大亦不妨但忌稠密成片紫赤者為難治雜黑者為尤難也凡斑既出須得脈洪數有力身溫足暖者易治若脈沉小足冷元氣弱者多難治凡斑欲出未出之際且與四味升麻湯先透其毒若脈弱者倍加人參食少大便不實者倍用白朮主之若斑已出則不宜再升發也又不可發汗汗之更增斑爛又不宜早下下之則斑毒內陷也如脈洪數熱盛煩渴者以人參化斑湯主之若消斑毒或以犀角元參湯大青四物湯之類如熱毒內甚心煩不得眠錯語呻吟者以黃連解毒湯加元參升麻大青犀角之類主之熱甚煩渴喘咳者解毒合化斑湯主之若斑勢稍退內實不大便譫語有潮熱者大柴胡湯加芒硝或調胃承氣湯下之曾治一人傷寒八九日發斑四肢強硬昏沉譫語不知人大便四五日不通以調胃承氣湯一下而愈如未可下有潮熱煩渴者且與小柴胡湯去半夏加黃連山梔黃柏栝蔞根主之或加大青亦佳如無以大藍葉代之或真青黛代之亦可大抵解胃熱胃爛之毒必以黃連大青犀角元參升麻青黛石膏知母黃芩山梔黃柏之類也要在審察病情合宜而用之二曰時氣發斑者乃天疫時行之氣也人感之則憎寒壯熱身體拘急或嘔逆或喘嗽或胸中煩悶或躁熱起臥不安或頭痛鼻乾呻吟不得眠此皆斑候也先用紙燃燈照看病人面部胸堂四肢背心有紅點起者乃發斑也易老曰凡大紅點發於皮膚之上者謂之斑小紅靨行於皮中不出起者謂之疹蓋疹輕而斑重也大抵一發鮮紅稀朗者吉若一發如針頭稠密紫赤者凶雜黑者難治有來勢急者發熱一二日便出斑來勢緩者發熱三四日而出也凡治例必察病人元氣虛實脈之有力無力為主若脈微弱元氣虛者必先以三白湯倍加人參以助真氣次察斑欲出未透者以升麻葛根湯主之如胃弱人虛者以四君子湯合而用之名曰升君湯也若斑不透者直指方加紫草茸亦佳若斑疹初出有表證憎寒壯熱頭痛骨節疼四肢拘急胸中滿悶者以三因加味羌活散主之或加紫草亦可若斑出稠密或咽喉不利者犀角消毒飲元參升麻湯之類主之凡斑出脈數大煩渴者人參化斑湯主之若發熱或潮熱不解者以小柴胡湯隨證增損用之或人參敗毒散皆可出入用之凡斑出而嘔逆者必用陳皮半夏生薑黃連之類若喘嗽不止者必用知母貝母栝蔞仁黃芩石膏之類若咽痛者必用連翹牛蒡子黑元參升麻苦桔梗甘草之類若斑出而毒盛者必用犀角大青元參黃連黃芩黃柏山梔石膏知母之類主之也北方謂之紅眼兒瘡氣等名色又多所避忌香臭蓋恐觸之也凡斑已出未出之時切不可便投寒涼之劑以攻其熱並飲涼水等物恐傷胃氣先作嘔吐也又不可發汗攻下虛其表裡之氣其害尤甚也若脈弱者必先有房事要在審問之如有夾陰者必先助真氣為要也三曰溫毒發斑者活人云初春病人肌肉發斑隱疹如錦紋或咳心悶但嘔者是也冬時觸冒寒毒至春始發初病在表或已汗吐下而表證未罷毒氣未散以此發斑宜用黑膏主之又有冬月溫暖人感乖戾之氣冬末即病至春或被積寒所折毒氣不得泄至天氣暄暖溫毒始發則肌膚髮熱而生斑嘔吐心悶但嘔有清汁宜用葛根橘皮湯主之吳冬應大寒而反大溫人感此不正之氣而為病者名曰冬溫也若發斑名曰溫毒也大抵治例與時氣同但溫毒發斑尤甚爾活人書謂溫毒斑出如錦紋者以黑膏主之或元參升麻湯犀角大青湯人參化斑湯青黛一物湯等方皆可選而用之凡溫病發於春熱病發於夏若出斑者治與傷寒同法也此由怫鬱之熱自內而發於外亦非輕也四曰陽毒發斑者其候狂言下利咽痛面赤斑出如錦紋者以陽毒升麻湯大青四物湯人參化斑湯梔子仁湯之類選而用之詳見本條五曰內傷寒者此因暑月得之先因傷暑次食涼物並臥涼處內外皆寒逼其暑火浮遊於表而發斑也海藏治完顏小將軍病寒熱間作有斑三五點鼻中微血出兩手脈沉澀皮膚按之殊大無熱此內傷寒也與調中湯數服而愈凡夾暑者加香薷扁豆主之六曰陰證發斑略例曰陰證發斑亦出胸背手足但稀少而淡紅也此人元氣素虛或先因欲事內損腎氣或誤服涼藥太過遂成陰證伏寒於下逼其無根失守之火聚於胸中上獨熏肺傳於皮膚而發斑點但如蚊蚋蚤蝨咬痕然非大紅點也與調中溫胃加以茴香炒白芍藥主之寒甚脈微者以大建中湯主之則真陽自回陰火自降而病乃愈此治本不治標也大抵發斑身溫足暖脈數大者為順身涼足冷脈微細者為逆也凡治斑不可專以斑治必察脈之浮沉病之虛實而治之則為善治斑也若孟浪不察一概論之而曰不誤於人吾未之信也侯國華病傷寒四五日身微斑渴欲飲診之沉弦欲絶厥陰脈也服溫藥數日不已又以薑附等藥覺陽微回脈生因渴私飲水一杯脈復退又見頭不舉目不開問之則犯陽易若只與燒裩散則寒而不濟矣遂更用吳茱萸湯一大服調燒裩散連進二服出大汗兩晝夜而愈治陽證發斑之劑升麻葛根湯凡發斑欲出未出者以此湯升發之若斑已出者不可用也升麻三錢葛根白芍藥各二錢甘草炙一錢上作一服水二鍾煎至一鍾去滓通口服直指方加紫草茸一錢半治斑不透出者若脈弱加人參二錢胃虛食少加白朮二錢如腹痛倍加炒白芍藥和之三因加味羌活散治斑疹初出增寒壯熱或頭痛身痛胸中不利者羌活上獨活中柴胡中前胡中枳殼中桔梗中人參中茯苓中川芎中升麻上白芍藥中甘草下生薑五片上煎法同前若斑未透者如紫草茸一錢半若脈虛者倍加人參胃弱食少者加白朮二錢大便自利者亦加白朮去枳殼若斑出盛或煩熱或咽痛者加荊芥薄荷防風牛蒡子連翹各一錢五分主之若內熱口苦心煩者加黃芩黃連各一錢半若熱甚舌燥煩渴者更加石膏二錢知母一錢若喘嗽者亦用之若有痰熱胸中煩悶加栝蔞仁一錢半若斑毒盛出者須加元參犀角各一錢以消其毒也加味小柴胡湯治發斑肌熱潮熱或往來寒熱口苦咽乾目眩耳聾脅痛胸滿心煩或乾嘔或煩渴或喘或咳嗽不止者宜服之柴胡上人參中黃芩中半夏中甘草下黃連中升麻中白芍藥中元參中生薑三片大棗二枚煎法同前若口燥渴去半夏加栝蔞根一錢半若咽痛加桔梗二錢倍用甘草若嘔者還用半夏去栝蔞根加生薑減少甘草主之若斑毒出盛加犀角屑一錢牛蒡子另炒研一錢毒甚者更加大青二錢若胸中煩悶不利加栝蔞仁一錢半若痰火上喘加桔梗一錢知母貝母各一錢半栝蔞仁一錢桑白皮一錢主之若喘而舌燥煩渴脈數大者更加石膏三錢若脅痛胸滿不利者加枳殼桔梗各一錢半若心下痞硬加枳實一錢半黃連倍之消毒犀角飲治發斑隱疹或咽喉腫痛或毒氣壅盛者真犀角屑上牛蒡子新瓦上炒香研破用中荊芥穗中防風中甘草中上用水二鍾煎至一錢去渣溫服若咽痛加苦桔梗二錢甘草倍之元參二錢主之或連翹薄荷皆可加之內熱者須用黃芩黃連各一錢主之解毒防風湯治發斑隱疹癢痛者防風上地骨皮中黃耆中赤芍藥中荊芥中枳殼中牛蒡子中炒如前上煎法同前一方加當歸黑元參各一錢犀角玄參湯治發斑毒盛心煩狂言或咽痛者犀角屑上升麻中射干中黃芩中人參中黑元參上甘草下上煎法同前大青四物湯大青一錢半如無以真青黛代之阿膠甘草各一錢淡豆豉一百粒上煎法同前犀角大青湯治斑出已盛心煩大熱錯語呻吟不得眠或咽痛不利者犀角屑上大青上元參中甘草下升麻中黃連中黃芩中黃柏中山梔子中上煎法同前當歸丸治發斑內實大便不通者當歸五錢甘草黃連大黃各一錢半上將當歸用水一鍾煎成濃膏子以三味為細末和勻為丸如梧桐子大每服五十丸溫白湯下以利為度不利再服黑膏治溫毒時氣發斑如錦紋者生地黃四兩淡豆豉半升上二味以豬脂一斤合煎之至濃汁入雄黃五分麝香一分攪勻丸如彈子大白湯化下未效再服葛根橘皮湯療冬溫未即病至春被積寒所折不得發至夏得熱其寒解冬溫始發肌中斑爛癮疹如錦紋而咳心悶但嘔吐有清汁宜服此湯即止葛根橘皮杏仁去皮麩炒知母黃芩麻黃去節湯泡甘草炙各半兩上㕮咀每服五錢水一盞半煎至一盞去滓溫服漏蘆連翹湯治熱毒發斑無汗大便實者服之漏蘆連翹黃芩麻黃白蘞升麻甘草各一錢枳實二錢大黃三錢若熱甚者加芒硝二錢用水二鍾煎至一鐘下芒硝再煎一二沸去滓溫服如人行五里地不動者再服一次以利為度豬膽雞子湯治熱毒發斑或咽痛或聲音不清或心煩不眠豬膽米醋各三合雞子一枚上三味合煎三四沸人壯者盡服之弱者須煎六七沸分為三次服之汗出乃愈黃連一物湯治熱病發豌豆瘡者以黃連一兩用水二鍾煎至一鍾去滓通口服五物木香湯治豌豆瘡煩疼者青木香二錢薰陸香丁香礬石各一錢麝香半分上用水二鍾煎至一鍾去滓溫服如熱毒甚者加犀角屑一錢如無以升麻一錢半代之若病輕者去礬石神驗孫兆山梔散治熱毒炎盛遍身發斑甚者發瘡如豌豆牡丹皮山梔仁黃芩大黃麻黃各二錢半木香五分上水二鍾煎至一鍾去渣溫服治斑出豌豆瘡塗方用芒硝為細末和豬膽汁塗瘡上勿動之待其脫落無痕仍臥黃土末上良若病小便澀有血者內壞瘡皆黑靨不出膿者死犀角大青湯治斑毒熱甚煩疼者大青五錢犀角屑二錢半梔子十枚香豉一撮上煎服法同前黃連解毒湯治發斑熱甚心煩不得眠黃連三錢黃芩黃柏山梔子各二錢上用水二鍾煎至一鍾去渣溫服若斑毒盛者加大青二錢或真青黛一錢調入湯內服之亦妙凡脈弦數內外熱甚譫語者合小柴胡湯主之若脈洪數內外熱甚舌燥煩渴者合化斑湯主之加減三黃石膏湯治熱發斑紫赤煩渴脈洪數者黃連上黃芩中黃柏中山梔子中石膏中知母中升麻中赤芍藥中元參中甘草下粳米二撮上煎法同前一方斑毒甚者加大青二錢犀角屑一錢乃消熱毒斑瘡之藥也一方時行發斑瘡以好蜜塗上良又方用蜜煎升麻塗之治內傷寒與陰證發斑之劑通脈四逆湯見下利陰毒升麻湯見陰毒調中湯蒼朮一錢半陳皮砂仁藿香白芍藥炒甘草炙桔梗半夏白芷羌活枳殼各一錢川芎七分麻黃桂枝各五分生薑三片上作一服水二鍾煎至一鍾去滓溫服大建中湯當歸中白芍藥中白朮中麥門冬上黃耆上甘草炙下肉桂中肉蓯蓉中人參上川芎中附子中半夏中熟地黃中茯苓中生薑三片大棗二枚上煎法同前人參三白湯白朮中白茯苓中白芍藥中人參上生薑三片大棗二枚若脈沉足冷加附子半枚上煎法同前治傷寒黑斑曾治一人傷寒七八日因服涼藥太過遂變身涼手足厥冷通身黑斑惟心頭溫暖乃伏火也診其六脈沉細昏沉不知人事亦不能語言狀似尸厥遂用人參三白湯加熟附子半枚乾薑二錢水二鍾煎一鍾與之服不待一時許斑色漸紅手足漸暖而蘇醒後復有餘熱不清此伏火後作也以黃連解毒竹葉石膏湯調之而愈狐惑外證欲眠目不閉聲啞狐惑之為病狀如傷寒或因傷寒而變成斯病其狀默默欲眠目牽不得閉臥起不安蟲蝕於喉咽為惑蝕於陰肛為狐不欲食惡聞食臭其面目乍赤乍黑乍白蝕於上部則聲嗄甘草瀉心湯主之方見痞蝕於下部則咽乾苦參湯洗之蝕於肛者雄黃散熏之用雄黃一味為末取二瓦合之燒向肛熏之脈經云病人或從呼吸後蝕其咽喉或從下焦蝕其肛陰蝕上為惑蝕下為狐狐惑病者豬苓散主之方未考病者脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥一本眥下有黃字黑若能食者膿已成也赤豆當歸散主之方見雜病下血門附一婦人狐惑聲嗄多眠目不閉惡聞食臭不省人事半月後又手足拘強脈數而微細先與竹瀝薑汁一盞服之忽胸中有汗腹鳴即目閉省人事遂用參朮歸陳入竹瀝薑汁飲之五六點而愈活狐惑傷寒與濕𧈟皆蟲證初得狀如傷寒或因傷寒變成此疾大抵傷寒腹內熱食少腸胃空虛三蟲行作求食蝕人五臟及下部為𧈟蟲病其候齒無色舌上盡白甚者唇黑有瘡四肢沉重忽忽喜眠蟲蝕其肛爛見五臟則死當數看其上下唇上唇有瘡蟲蝕其藏下唇有瘡蟲蝕其肛殺人甚急多因下利而得治𧈟桃仁湯黃連犀角湯雄黃鋭散主之治𧈟桃仁湯生艾桃仁去皮尖炒雙仁不用槐花子碎各一兩大棗十五個去核上水二盞煎至一盞半分三服黃連犀角湯治傷寒及諸病之後有𧈟出下部者黃連半兩犀角一兩烏梅七個沒藥二錢半上水二大盞半煎至一盞半分三服雄黃丸治傷寒狐惑微煩默默欲臥毒氣上攻咽乾聲嗄下蝕濕𧈟或便膿血雄黃研當歸炒各七錢半蘆薈研麝香研各二錢半檳榔半兩上搗研為末煮麵糊為丸如梧桐子大每服十五丸至一十丸食前溫粥飲下日三服雄黃鋭散治下部𧈟瘡雄黃苦參青葙子黃連各半兩桃仁去皮尖二錢半上為散以生艾搗汁為丸如棗核大綿裹納下部匾竹葉汁更佳冬月無艾只用散裹納亦得百合病百合病論曰百合病者謂無經絡百脈一宗悉致病也人常默默然意欲食不能食意欲臥不能臥意欲行不能行或有時聞食臭或時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥即劇吐利如有神靈者身形雖似和其人脈微數每溺時輒頭痛者六十日乃愈若溺時頭不痛淅淅然者四十日愈若溺時快然但頭眩者二十日愈體證或未病而預見或病四五日而出或病二十日或一月微見者各隨其證治之活人云此名百合傷寒多因傷寒虛勞大病之後不平復變成奇疾也百合病發汗後宜服百合知母湯百合知母湯方百合七枚劈知母三兩切上先將百合水洗浸一宿當白沫出去其水更以井水二盞煎至一盞去滓又將井水二盞另煎知母取一盞去滓和百合汁一盞同煎取一盞半分溫再服百合病下後者宜用滑石代赭湯滑石代赭湯方百合十枚劈滑石三兩捶碎綿裹代赭石彈子大碎綿裹上先將百合水洗淨浸一宿當白沫出去水更以井水二升煎取一升去滓另用水二升煎二石取一升去滓後合和同煎取一升半分溫再服百合病吐後宜用百合雞子湯百合雞子湯方百合七枚劈雞子黃一枚先將百合水洗浸如前法取一升去滓納雞子黃攪勻再煎至五分服百合病不經吐下發汗病形如初者宜百合地黃湯百合地黃湯方百合七枚劈生地黃汁一升上水洗百合浸如前法煎取一升去滓納地黃汁同煎取一升半分溫再服中病勿更服大便當如漆黑百合病一月不解變成渴者百合洗方主之上用百合一升以水一斗漬之一宿以洗身洗已食煮餅勿以鹽豉也百合病渴不瘥者宜栝蔞牡蠣散栝蔞牡蠣散方栝蔞根牡蠣煆各等分上為末白飲服方寸匕日三服百合散治傷寒百合病一月不解變如渴疾百合栝蔞根各一兩牡蠣煆成粉麥門冬去心焙山梔仁炒各七錢半甘草炙半兩上㕮咀每服五錢水一盞入生薑一錢二分竹葉二七片煎至六分不拘時溫服治百合傷寒腹中滿痛宜服上用百合一兩炒黃為細末每服二錢米飲下無時百合病變發熱一作發寒熱者宜用百合滑石散百合滑石散方百合一兩滑石三兩上為末飲服方寸匕日三服當微利止服熱則除百合病見於陰者以陽法救之見於陽者以陰法救之見陽攻陰復發其汗此為逆見陰攻陽乃復下之此亦為逆也兩感論若兩感於寒者一日太陽受之即與少陰俱病則頭痛口乾煩滿而渴二日陽明受之即與太陰俱病則腹滿身熱不欲食譫語三日少陽受之即與厥陰俱病則耳聾囊縮而厥水漿不入不知人者六日死若三陰三陽五臟六腑皆受病則榮衛不行臟腑不通而死矣活龐安常云脈沉大者太陽少陰沉長者陽明太陰沉弦者少陽厥陰也諸方書不載兩感脈安常特設以示後人素問熱論云兩感於寒而病者必不免於死法不過六日黃帝曰有三日而死者何也岐伯曰陽明者十二經脈之長也若三日而氣盡則死矣仲景亦無治法活人書五卷序云傷寒惟兩感不治仲景但一説云兩感病俱作治有先後證治論引張翼説與仲景同謂如下利清穀身體疼痛急當救里宜四逆湯身體疼痛清便自調急當救表宜桂枝湯證治論並活人書解仲景治有先後之説皆云治有先後者宜先救里內才溫則可醫矣然救表亦不可緩也以上所論並先救里然後救表愚意當消息之謂如下利不止身體疼痛則先救里如不下利身體疼痛則先救表此亦謂之治有先後也然則兩感證亦有可治之理而不可必也趙仲景論兩感為必死之證而復以治有先後發表攻裡之説繼之者蓋不忍坐視而欲覬其萬一之可活也活人書云宜救里以四逆湯後救表以桂枝湯殊不知仲景云太陽與少陰俱病則頭痛為太陽邪盛於表口乾而渴為少陰邪盛於裡也陽明與太陰俱病則身熱譫語為陽明邪盛於表不欲食腹滿為太陰邪盛於裡也少陽與厥陰俱病則耳聾為少陽邪盛於表囊縮而厥為厥陰邪盛於裡也三陽之裡頭痛身熱耳聾救表已不可緩三陰之腹滿口乾渴囊縮而厥不下可乎活人書引下利身疼痛虛寒救之例而欲施於煩渴腹滿譫語囊縮熱實之證然乎否乎蓋仲景所謂發表者葛根麻黃是也所謂攻裡者調胃承氣是也活人書所謂救里則是四逆救表則是桂枝今以救為攻豈不相背若用四逆湯是以火濟火而腹滿譫語囊縮等證何由而除臟腑何由而通榮衛何由而行而六日死者可立而待也籲兩感雖為不治之證矣然用藥之法助正除邪虛實實虛補不足損有餘之理學者不可不素有一定之法於胸中也垣問兩感從何道而入答曰經云兩感者死不治一日太陽與少陰俱病頭痛發熱惡寒口乾煩滿而渴太陽者腑也自背俞而入人所共知之少陰者臟也自鼻息而入人所不知也鼻氣通於天故寒邪無形之氣從鼻而入腎為水也水流濕故腎受之經曰傷於濕者下先受之同氣相求耳又云天之邪氣感則害人五臟以是知內外兩感臟腑俱病欲表之則有里欲下之則有表表里既不能一治故死矣故云兩感者不治然所稟有虛實所感有淺深虛而感之深者必死實而感之淺者猶或可治治之而不救者有矣未有不治而獲生者也豫嘗用此間有生者十得二三故立此方以待好生君子用之大羌活湯方防風羌活獨活防己黃芩黃連蒼朮白朮甘草炙細辛各三錢知母川芎生地黃各一兩上㕮咀每服半兩水二盞煎至一盞半去滓得清藥一大盞熱飲之不解再服三四盞解之亦可病愈則止若有餘證並依仲景隨經法治之吳兩感必死不治者乃一日傳二經陰陽俱病也欲治陽急而有陰急欲治陰急而有陽急表裡不可並攻陰陽難同一法故不治也活人書有先後之法急救里宜四逆湯次救表桂枝湯者此表裡皆寒急救之法非日傳二經之法也保命集曰內傷於寒外傷於風或內傷於食外傷於風或先傷於濕而後傷於風或先傷於風而後傷於濕或先傷於寒而後傷於風之類此亦內外俱病表裡俱傷乃為可治故宜大羌活湯間有可生者易老丹溪豈真賢於仲景哉
