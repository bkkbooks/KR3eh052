body:
  text: 卷七勞復食復女勞復龐病新瘥後氣血津液虛耗慎勿為諸勞動事凡言語思慮勞神梳浴澡頮勞力勞則生熱而復病如初也又病瘥後精髓枯燥切不可為房事犯房事勞復必死魏督郵顧子獻病瘥後華他囑之慎勿勞事餘事尚可女勞即死此是女勞復非陰陽易也又素問云病熱而有所遺者是新瘥後腸胃尚弱若多食則難消化而復病如初也此是食復新瘥強人足兩月虛弱人足百日則無復病矣大病瘥後勞復者枳實梔子湯主之若有宿食者加大黃如博棋子大五六枚成病有勞復有食復傷寒新瘥血氣未平餘熱未盡早作勞動病者名曰勞復病熱少愈而強食之熱有所藏因其穀氣留搏兩陽相合而病者名曰食復勞復則熱氣浮越與枳實梔子豉湯以解之不待虛煩懊憹也食復則胃有宿積加大黃以下之不待腹滿譫語之候也枳實梔子豉湯方枳實三枚炙梔子十四枚擘豉一升綿裹上三味以清漿水七升空煮取四升納枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗傷寒之邪自外入勞復之邪自內發發汗吐下當隨宜施治也枳實梔子豉湯則應吐劑此云覆令微似汗出者以其熱聚於上苦則吐之熱散於表者苦則發之內經曰火淫所勝以苦發之此之謂也傷寒瘥已後更發熱者小柴胡湯主之脈浮者以汗解之脈沉實者以下解之瘥後餘熱未盡更發熱者與小柴胡湯以和解之脈浮者熱在表也故以汗解脈沉者熱在裡也故以下解之海大抵勞者動也動非一種有內外血氣之異焉若勞乎氣則無力與精神者法宜微舉之若勞乎血與筋骨者以四物之類補之若勞在脾內為中州調中可已此為有形病也但見外證則謂之復病非為勞也如再感風寒是已許記有人患傷寒得汗數日忽身熱自汗脈弦數心不得寧真勞復也豫診之曰勞心之所致神之所舍未復其初而又勞傷其神榮衛失度當補其子益其脾解其勞庶幾得愈授以補脾湯佐以小柴胡湯解之或者難曰虛則補其母今補其子何也豫曰子不知虛勞之異乎難經曰虛則補其母實則瀉其子此虛當補母人所共知也千金曰心勞甚者補脾氣以益之脾旺則感之於心矣此勞則當補子人所未聞也蓋母生我者也子繼我而助我者也方治其虛則補其生我者與錦囊所謂本骸得氣遺體受蔭同義方治其勞則補其助我者與荀子言未有子富而父貧同義此治虛與勞所以異也補脾湯治傷寒得汗瘥後脾胃傷冷物胸膈不決尋常血氣不和人參白朮甘草橘皮去白青皮去白乾薑各等分上為末每服三錢水一盞煎數沸熱服入鹽點亦得海麥門冬湯治勞復氣欲絶者用之有效能起死回生麥門冬去心一兩甘草炙二兩粳米半合上為細末水二盞煎粳米令熟去米約湯一小盞半入藥五錢匕棗二枚去核新竹葉一十五片同煎至一盞去渣溫服不能服者綿滴口中又治小兒不能灌藥者宜用此綿滴法此方不用石膏以其三焦無火熱也兼自欲死之人陽氣將絶者故不用石膏若加人參大妙外牛乳飲大病後不足病虛勞補虛取七歲以下五歲以上黃牛乳一升水四升煎至一升如人飢稍稍飲不得多期十日服不住佳肘燒鱉甲散治篤病新起早勞食飲多致勞復欲死燒鱉甲服方寸匕活雄鼠屎湯治勞復梔子十四枚雄鼠屎二七粒兩頭尖者是枳殼三枚炒上為細末每服四錢水一盞半入蔥白二寸香豉三十粒同煎一盞分二服勿令病人知鼠屎七味蔥白湯治傷寒或因起動勞復或因吃食稍多皆成此候若復甚者一如傷寒初有此證宜服此方蔥白連須乾葛新豉半合生薑切一合麥門冬去心熟地黃各三錢流水四升以杓揚之上七味用清水煎三分減二去滓分二服漸漸服之取汗千金方治勞復或食復發熱者梔子仁石膏各三錢豭鼠屎十四粒豉半合上用水二鍾煎至一鍾去滓通口服之補中益氣湯治勞復發熱氣高而喘身熱而煩四肢怠惰人參二錢白朮軟苗柴胡陳皮白芍藥各一錢當歸身黃耆各一錢二分甘草升麻各五分上作一服用水二鍾煎至八分去滓溫服若下元陰火動或夢中失精或虛勞煩盛或自汗陰虛不足者加知母黃柏各一錢五味子九粒麥門冬一錢半主之若兼有宿食不消心下痞者去升麻人參加枳實黃連各一錢主之若不能眠者加遠志酸棗仁各一錢茯神一錢半主之凡脈弱人虛倍用人參自汗盜汗倍用黃耆食少胃弱倍用白朮外多倍加軟苗柴胡之類吳夫大病新瘥後血氣虛弱餘熱未盡古人所謂如大水浸牆水退則牆蘇不可犯之但宜安臥守靜以養其氣設或早起動勞則血氣沸騰而發熱也經言脈浮者以汗解之脈實者以下解之若不可汗不可下宜小柴胡湯隨證增損以和之或濈然汗出而解或寒顫汗出而解也凡新瘥後虛煩不得眠者參胡溫膽湯加酸棗仁主之凡虛羸少氣氣逆欲嘔者竹葉石膏湯主之虛熱燥渴者亦用此湯去半夏主之活人書治勞復身熱者豭鼠屎湯主之千金治勞復以麥門冬湯主之易老加人參以益元氣也若身熱食少無力者以參胡三白湯或補中益氣湯增損主之如無熱而下虛有寒者以黃耆建中湯虛甚者以大建中湯人參養榮湯之類主之若陰虛火動者必少加知母黃柏以救腎水也凡新瘥後只宜先進白稀粥湯次進濃者又次進糜粥亦須少少與之常令不足則可不可盡意過食之也其諸般肉食等物皆不可食經言病人新瘥脈已解但日暮微煩者此食谷早或多故也蓋胃弱不能消化宜減谷則愈矣經言食復發熱者以枳實梔子豉湯主之如宿食內結大便不去者加大黃如圍棋子大五六枚下之又曰食復發熱不解者以柴胡湯加減隨證用之若食少胃弱痞悶者以四君子湯為主而加味以主之如有表熱加軟苗柴胡內外有熱少佐黃芩心下痞悶心煩有內熱加枳實黃連如不眠更加酸棗仁有痰加橘紅半夏嘔吐者亦如之如米食不化加神麯麥蘖肉食不化加棠求子枳實青皮之類消克之也貴在通變而已凡男子大病瘥後早犯女色而為病者名曰女勞復也其候頭重不舉目中生花腰背疼痛或小腹裡急絞痛或憎寒發熱或時陰火上衝頭面烘熱心胸煩悶活人書以豭鼠屎湯主之有熱者以竹皮湯燒裩散主之千金方以赤衣散主之虛弱者以人參三白湯調下赤衣散為妙若小腹急痛脈沉逆冷者以當歸四逆湯加附子吳茱萸送下赤衣散救之仍以吳茱萸一升酒拌炒尉小腹為佳凡卵縮入腹離經脈見者死不可救也竹皮湯治女勞復頭重不舉目中生花腹中絞痛有熱者青竹皮刮取半升上用水二鍾煎至七分溫服之千金赤衣散治女勞復並陰易室女月經布近隱處者燒灰用白湯下日三服凡酒味苦辛乃大熱有毒者也且大寒惟酒不冰其熱可見也蓋傷寒熱病本熱未解而欲飲酒則轉加熱盛而病增劇若脈弦大者須用小柴胡湯加葛根黃連烏梅主之若脈洪大者以人參白虎湯加葛根黃連主之或竹葉石膏湯黃連解毒湯皆可用多加雞距子尤妙瘥後諸病水氣大病瘥後從腰以下有水氣者牡蠣澤瀉散主之成大病瘥後脾胃氣虛不能制約腎水歸於隧道故水溢下焦腰以下為腫也金匱要略曰腰以下腫當利小便與牡蠣澤瀉散利小便而散水也牡蠣澤瀉散方牡蠣熬澤瀉栝蔞根蜀漆洗去腳葶藶熬商陸根熬海藻洗去咸以上各等分上七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服日三鹹味湧泄牡蠣澤瀉海藻之咸以泄水氣內經曰濕淫於內平以苦佐以酸辛以苦泄之蜀漆葶藶栝蔞商陸之酸辛與苦以導腫濕喜唾大病瘥後喜唾久不了了者胃上有寒當以丸藥溫之宜理中丸成汗後陽氣不足胃中虛寒不納津液故喜唾不了了與理中丸以溫其胃加益智仁更佳千金方瘥後口乾喜唾或咽痛用大棗十枚烏梅三個共搗細入煉蜜丸如棗核大含口中徐徐咽下或咽痛不愈者以山豆根涼水浸含咽苦汁亦佳欲吐傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之成傷寒解後津液不足而虛羸餘熱未盡熱則傷氣故少氣氣逆欲吐與竹葉石膏湯調胃散熱竹葉石膏湯方竹葉二把石膏一斤半夏半斤洗人參三兩甘草二兩粳米半升麥門冬一升去心上七味以水一斗煮取六升去滓納粳米煮米熟湯成去米溫服一升日三服辛甘發散而除熱竹葉石膏甘草之甘辛以發散餘熱甘緩脾而益氣麥門冬人參粳米之甘以補不足辛者散也氣逆者欲其散半夏之辛以散逆氣日暮微煩病人脈已解而日暮微煩以病新瘥人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈陽明主於申酉戌宿食在胃故日暮微煩當小下之以損宿谷但用梔子豉湯痞硬如枳實以前俱出仲景書以後續增補遺驚悸茯神散治傷寒後虛羸心氣乏力弱驚悸多忘茯神黃耆菖蒲各一兩白芍藥人參各半兩遠志去骨七錢半上㕮咀每服五錢水一中盞入棗三枚煎至六分去滓溫服龍齒丸治傷寒後伏熱在心心虛驚悸龍齒人參生乾地黃茯神各一兩遠志去骨鐵粉細研各半兩黃連去須馬牙硝細研防風各七錢半麝香細研五分麥門冬去心焙一兩半上為細末都研令勻煉蜜和丸如梧子大每服二十丸竹葉金銀湯下不拘時服溫膽湯治傷寒瘥後調理半夏湯泡茯苓去皮陳皮去白枳實炒各二錢竹茹一錢甘草半錢上作一服水二鍾生薑三片煎至一鐘不拘時服加味溫膽湯治瘥後心膽虛怯觸事易驚夢寐不安氣鬱生涎涎與氣搏變生諸證或短氣困乏或復自汗四肢浮腫飲食無味心虛煩悶坐臥不安枳實麩炒半夏湯泡白茯苓去皮橘紅人參各一錢半竹茹香附麥門冬去心柴胡桔梗各一錢甘草半錢上作一服水二鍾生薑三片紅棗二枚煎至一鐘不拘時服煩熱柴胡湯治傷寒後夾勞五心煩熱背膊疼痛手足無力不能飲食柴胡赤茯苓鱉甲去裙襴醋浸炙黃耆各一兩秦艽地骨皮黃芩去黑心枳殼去瓤麩炒葛根各半兩甘草炙人參各七錢半上㕮咀每服四錢水一盞半煎至七分不拘時溫服虛汗鱉甲散治傷寒後虛羸盜汗不止四肢無力向晚增寒鱉甲去裙襴醋炙黃附子炮拆去皮臍甘草炙肉蓯蓉酒浸去皮炙乾人參黃耆熟地黃桃仁去皮尖雙仁麩炒枳殼去瓤麩炒杜仲炙黃五味子柴胡牛膝各七錢半牡蠣煆蒼朮炒各一兩上㕮咀每服五錢水一大盞生薑半分棗三枚煎至五分不拘時溫服治傷寒後虛羸日夜汗出不止心燥口乾咽喉不利黃雌雞一隻腸肚淨去理如常法牡蠣煆粉麻黃根各二兩肉蓯蓉一兩酒浸一宿刮去鱗甲切上先將雞麻黃根以水七大盞煮取汁三大盞去雞麻黃根後下肉蓯蓉牡蠣煎取一盞半去滓分三服空心午前夜後臨臥時服治大病瘥後多虛汗龍骨牡蠣煆粉麻黃節各等分上為末以粉身喘嗽紫菀散治傷寒後肺痿勞嗽唾膿血腥臭連連不止漸將羸瘦紫菀洗去苗土天門冬貝母煨微黃各一兩生乾地黃桔梗各一兩半百合知母各七錢半上㕮咀每服四錢水一鍾半煎六分去滓溫服無時夢泄牡蠣散治傷寒後虛損心多怔悸夜夢泄精牡蠣煆粉桂心鹿茸酥炙白芍藥龍骨各一錢甘草炙半兩上㕮咀每服五錢水一大盞生薑一錢棗三枚煎至五分去滓食前溫服羚羊角丸治傷寒夜夢精泄不禁身體枯燥瘦瘠骨立者羚羊角屑犀角屑石龍芮韭子炒龍骨硃砂細研水飛鹿茸酒浸炙澤瀉各一兩半桂心木香各一兩上為細末煉蜜和搗五七百杵丸如梧桐子大每服三十丸食前用溫酒下失音二瀝湯治傷寒失音不語竹瀝荊瀝梨汁各三合上攪令勻以綿濾過分溫四服空心日晚各一服嘔噦人參湯治傷寒後虛羸少力嘔噦氣逆人參白茯苓去皮半夏湯洗七次炒陳皮去白白朮各半兩麥門冬去心焙黃耆各一兩甘草炙二錢半上㕮咀每服五錢鹽水一盞半生薑三片棗二枚擘破同煎至八分去滓食前溫服下利訶黎勒丸治傷寒後膿血利下部疼痛訶黎勒去核炮人參各一兩白茯苓去皮當歸焙木香白芷各七錢半牡丹皮半兩上搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服三十丸食前米飲下日再服黃連丸治傷寒熱病後熱毒下利膿血黃連炒七錢半烏梅肉炒二兩上為細末煉蜜入少蠟和搗五六百杵丸如梧桐子大每服二十丸加至三十丸空心米飲下訶黎勒飲治傷寒後氣不和自利無度訶黎勒四枚二生二煨去核草豆蔻四枚二生二煨去皮上㕮咀每服二錢匕漿水一盞煎至六分去滓空心溫服燥腸丸治傷寒汗下後大小便自利腹中痛者附子一枚炮乾薑一兩龍骨吳茱萸訶黎勒去核御米殼各半兩上為細末酒糊為丸如梧桐子大每服三十丸溫水下利止勿服腰痛傷寒發汗吐下後體虛元臟積冷氣刺腰痛轉動艱難原蠶蛾半斤糯米半升上二味同炒令米色焦然後搗羅為末每用半兩以米醋調如稀糊入銚子內煎攪令稠乘熱攤於蠟紙上貼痛處以帛纏縛冷即易之杜仲酒治傷寒後體虛元臟挾風冷腰膝疼痛行履不得杜仲去粗皮炙二兩獨活半兩附子炮裂去皮臍牛膝各一兩仙靈脾七錢半上細銼用生絹袋盛以酒五升浸密封頭經七日後間每日取三二合溫服日三服未瘥再浸服不得眠梔子烏梅湯治傷寒瘥後不得眠梔子黃芩各二錢柴胡三錢甘草一錢烏梅三個去核上作一服水二鍾生薑三片竹葉十四片豆豉三十粒煎至一鐘不拘時服發豌豆瘡千金方治豌豆瘡只以黃連一味酒炒水煎服之外以赤小豆為末入真青黛以雞子清和塗瘡上其效如神遺毒凡傷寒汗出不徹邪熱結耳後一寸二三分或耳下俱腫硬者名曰發頤此為遺熱成毒之所致也宜速消散則可若緩則成膿又為害也連翹敗毒散治發頤初腫服此消之羌活中獨活中連翹上荊芥中防風中柴胡中升麻下桔梗中甘草下川芎中牛蒡子新瓦上炒研碎當歸尾酒洗中紅花酒洗下蘇木下天花粉中上用水一鐘好酒一鍾同煎一鍾去滓徐徐溫服如未消加穿山甲蛤粉炒一錢腫至面者加香白芷一錢漏蘆五分如大便燥實者加酒浸大黃一錢半壯者倍用之凡內有熱或寒熱交作者倍用柴胡加酒洗黃芩一錢酒炒黃連一錢消毒救苦散消腫散毒用米醋調塗敷四圍留頭如干即又敷大黃三錢黃芩黃連黃柏芙蓉葉大薊根白芨白蘞天南星半夏紅花檀花當歸尾赤小豆白芷各一錢半朴硝雄黃另研末各一錢一方用見腫消草生白芨白蘞土大黃生大薊根野苧麻根共搗成餅入朴硝一錢和勻貼腫上留頭勿貼如干即換之若更加生慈菰金線重樓根尤妙內托消毒散治發頤有膿不可消者已破未破服之人參中黃耆上防風中白芷中川芎中當歸中桔梗中連翹中升麻中柴胡中金銀花中甘草節中上用水一鐘好酒一鍾同煎一鍾去滓徐徐溫服瘡破者以元武膏貼之四圍赤腫不退者仍以前藥塗之兼服蠟礬丸最妙昏冒凡傷寒汗出愈後漸覺昏昏不醒如鬼祟之狀或錯語呻吟者此因汗出未盡邪熱伏於心胞所致也活人書用知母麻黃湯以汗之但慮病後血氣俱虛豈可與發汗若脈弱人虛者只宜十味溫膽湯加黃連主之若有寒熱潮熱日晡發熱者以小柴胡湯隨證增損主之傷寒瘥後虛弱治例當歸六黃湯治傷寒新瘥後虛熱盜汗不止當歸身酒洗一錢五分黃柏炒黃芩炒各七分黃連炒五分黃耆鹽水炙二錢生地黃酒洗熟地黃酒蒸各一錢上作一服水二鍾煎至八分食遠溫服之加味黃耆建中湯治陽虛無熱惡寒盜汗無力下虛者黃耆白芍藥各二錢當歸一錢半人參白朮麻黃根牡蠣粉各一錢官桂五分飴糖一匙大棗二枚上煎法同前滋陰補腎丸治病後陰虛精血不足四肢少力心神不寧夜夢遺精或虛熱盜汗飲食進少不為肌肉身體羸弱面色青黃而無血色宜服此丸滋腎水制虛火大有益也熟地黃酒蒸生地黃酒浸白朮各二兩人參麥門冬去心五味子當歸酒浸白芍藥酒炒川芎黃耆鹽水炙山藥蛤粉另研極細茯神去皮木砂仁各一兩知母炒一兩半黃柏炒二兩上十六味共為細末煉蜜和成於石臼內杵千餘下丸如梧桐子大每服五十丸空心淡鹽湯下加味補陰丸治證同前黃柏鹽酒拌炒四兩熟地黃知母鹽酒拌炒敗龜板醋炙各二兩虎脛骨鎖陽醋炙白芍藥酒炒當歸酒浸川牛膝酒洗杜仲醋炙去絲砂仁以上各一兩若冬月天寒加乾薑炮五錢上為細末煉蜜入豬脊髓五條共搗和成石臼內杵千餘下丸如梧桐子大每服五大丸空心淡鹽酒或鹽湯下硃砂安神丸治病後心神不安夜臥不寧或亂夢不得眠硃砂另研水飛二錢用一半為衣黃連炒生地黃酒洗焙乾各一錢半當歸身灑浸一錢甘草炙半錢上為細末湯浸蒸餅糊為丸如緑豆大硃砂為衣陰乾每服三十丸以口中津液咽下或燈心湯下加味枳朮丸治病後胃弱食少服此進飲食強胃氣枳實炒神麯炒大麥蘖炒棠球子陳皮各一兩人參白朮各二兩上為末荷葉燒飯和丸如梧桐子大每服七八十丸白湯下如夏有熱加姜炒黃連七錢如冬月天寒加砂仁一兩如氣鬱不舒暢加香附一兩如痰多加橘紅一兩去陳皮更加半夏曲一兩六君子湯治傷寒汗下之後將見平復宜服此調理助脾進食辟邪氣大妙人參白朮黃耆白茯苓山藥甘草各等分上㕮咀每服四錢水一盞半生薑三片棗一枚同煎至七分去滓溫服養脾湯治傷寒後脾胃虛弱不思飲食茯苓乾薑炮各一兩白朮二兩丁香人參甘草各半兩上如法合一處搗羅為末每服三錢水一盞煎至六分溫服日三不拘時候健脾散治傷寒後脾胃虛弱不欲飲食縱食不能消化訶黎勒皮白朮麥蘖炒令微黃人參各一兩乾薑炮七錢半神麯炒甘草炙枳殼麩炒大腹皮各半兩上㕮咀每服四錢水一中盞入生薑半分煎至六分去滓不拘時稍熱服陰陽易傷寒陰陽易之為病其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒褌散主之燒褌散取婦人中褌近隱處剪燒灰以水和服方寸匕日三服小便即利陰頭微腫則愈婦人病取男子褌襠燒灰用嘗治傷寒病未平復犯房室命在須臾用獨參湯調燒褌散凡服參一二斤余得愈者三四人信哉用藥不可執一也附治傷寒病新瘥陰陽未和因合房室則令人陰腫入腹絞痛婦人則裡急腰胯連腹內痛名曰陰陽易其男子病新瘥未平復而婦人與之交接得病名曰陽易婦人病新瘥未平復而男子與之交接得病名曰陰易若二男二女並不自相易所以呼為易者以陰陽相感動其毒著於人如換易然其病之狀身熱沖胸頭重不能舉眼中生花四肢拘急小腹絞痛手足拳則死亦有不即死者病苦少腹裡急熱上衝胸頭重不欲舉百節解離經脈緩弱血氣虛骨髓竭恍恍翕翕氣力轉小著床不能動搖起止仰人或牽引歲月方死宜燒裩散豭鼠糞湯竹茹湯青竹茹湯乾薑湯當歸白朮湯選用之海藏云熱者燒裩散竹皮湯寒者豭鼠屎易當歸白朮湯至於校正方妙香丸條下治雜病陰陽易中有牛黃腦麝之類是治其熱證也青竹茹湯婦人病未平復因有所動致熱氣衝胸手足拘急搐搦如中風狀宜此湯栝蔞湯一兩青竹茹刮半升淡竹是上以水二升煮取一升二合去滓分二三服妙香丸治陰陽易不瘥大便不通心神昏亂驚惕不安者辰砂另研細水飛三錢冰腦膩粉麝香牛黃各七錢半金箔五片巴豆霜二錢半上為細末入黃蠟三錢蜜一小匙同煉勻和藥為丸每藥一兩作三十丸米飲下五丸弱者三丸壯者或七丸亦可取大便通即止百一治交接勞復陰卵腫或縮入腹腹絞痛或便絶蚯蚓數條絞取汁服之良海若陰陽易果得陰脈當隨證用之若脈在厥陰當歸四逆湯送下燒裩散若脈在少陰通脈四逆湯送下燒裩散若脈在太陰四順理中丸送下燒裩散所用之藥各隨其經而效自速也豭鼠糞湯療傷寒病後男子陰易韭白根一把豭鼠糞十四粒兩頭尖者是上二味以水五升煮取半升去渣再煎三沸溫服得效未汗再服亦理諸般勞復當歸白朮湯治婦人未平復因有所動小腹急痛腰胯四肢不任舉動無力發熱者白朮當歸桂枝附子生甘草芍藥黃耆人參各二錢半生薑半兩上㕮咀水煎服食頃再服溫覆取微汗瘥李良佐子病太陽證尺寸脈俱浮數按之無力余見其內陰虛與神術加乾薑湯而愈後再病餘視之見神不舒垂頭不欲語疑其有房過問之犯房過乎犯則必頭重目眩答曰唯犯乃與大建中三四服外陽內收脈返沉小始見陰候又與已寒加芍藥茴香等丸五六服三日內約服丸六七百丸脈復生又用大建中接之遂出大汗而解山因女色病陰證傷寒者用陳皮熱鍋內炒焦以酒烹下濾酒飲之韭根散治傷寒後陰陽易頭重百節解痛翕翕氣劣著床不能起動甚者手足拳卵腫疼痛韭根栝蔞根各二兩青竹茹乾薑炮各半兩上細銼和勻分八服每服用水一大盞煎至五分去滓入鼠糞末一字攪勻不拘時服聖濟方搗篩五錢匕水一盞半煎至一盞去滓食前溫服一名豐本湯乾薑散治傷寒婦人得病雖瘥未滿百日不可與交合為陰陽易之病必身體拘急手足拳欲死丈夫病名曰陰易婦人病名曰陽易速當汗之可痊滿四日不可療宜令服此藥其病體重小腹急熱上衝胸頭重不能舉眼中生花膝脛拘急用乾薑四兩為末沸湯調連進服以衣被覆出汗方解手足伸而愈二灰散治傷寒陰陽易手足指甲二十片男病用女者女病用男者中衣襠近隱處一片男病用女女病用男者上並燒作灰研令細分三服不拘時用溫酒調下或米湯調服亦可醫林曰離經脈見多主死太過曰至一呼三至曰至不及曰損一呼一至曰損二脈惟陰陽易病有之張假如婦人病新瘥未平復而男子與之交因感外邪而卒病實非餘邪相染醫見病速謂之陰易於法何以別乎夫易病者有上條所見之證存焉其與外所感豈相侔哉設若風寒外傷當有表證安有小腹裡急引陰中拘攣者乎或又云假如男子病新瘥未平復強合陰陽而自病仍小腹裡急引陰中拘攣證同易病求其理何故不染易他人而自復未審其證治可同何法也病雖自理復與易同亦用燒裩散以誘安其氣夫易病之為合陰陽感動餘邪而其人正氣本虛故能染者不然安得受其邪哉今病自復緣正氣尚虛而餘邪因動悉非外感故與易同亦用燒裩散以安正氣正氣安餘邪自平矣四時傷寒不同論文已見首篇總例冬為傷寒春為溫病夏為暑病秋為瘧一歲長幼病相似為疫多眠多汗脈浮為風溫一身盡痛為濕身反張為痙吳夫傷寒之病自霜降之後天令大寒而感之者乃傷寒也若天令溫暖而感之者為冬溫也如至春天令溫暖有人壯熱為病者乃溫病也若天令尚寒冰雪未解而感寒者亦曰傷寒也若三月至七八月之間天道忽有暴寒而感之者此名時行寒疫也若夏至後壯熱脈洪者謂之熱病也如四時天令不正感而為病長幼相似互相傳染者謂之時行之氣也夫時氣者一曰時疫蓋受天地疫癘之氣而為病乃非寒也又有溫瘧風溫溫毒溫疫中風傷風中濕風濕中暑中暍濕溫等證一皆發熱狀似傷寒故醫家通以傷寒稱之者為發熱傳變皆相類也至於用藥則不同矣但發表解肌有差別爾蓋冬月傷寒者人之著寒而即病也若不即病至春變為溫病至夏變為熱病溫病熱病乃因伏寒為變既變不得復言其寒矣其寒疫乃天時之暴寒與冬時之嚴寒又有輕重之不同時氣自是天行疫癘之氣又非寒比也溫病乃山澤蒸氣暑病乃炎日之火風乃天之賊邪傷於人者也有中者為重傷者為輕溫瘧風溫等病又是傷寒壞證更感異氣所變各有其因不同豈可通以傷寒稱而治之如不識其名妄行治療本中暑作熱病治之濕溫作風溫治之虛實混淆是非紊亂夭人天年可不慎哉凡四時傷寒通宜補散故丹溪治傷寒多用補中益氣湯氣虛者四君子湯加發散劑血虛者四物湯加發散劑東垣治風濕用補中益氣加羌活防風升麻藁本蒼朮海藏治風濕無汗者用神術湯有汗者用白朮湯治剛痙用神術湯加羌活麻黃治柔痙用白朮湯加桂心耆朮治風濕用白朮湯隨證加藥治中暍脈弦細芤遲者用黃耆湯此皆與仲景所謂辛苦之人觸冒之病傷寒同意也丹仲景論傷寒而未及乎中寒先哲治冒大寒昏中者用附子理中湯其議藥則得之矣曰傷曰中未有議其異同者夫傷寒有即病有不即病因其舊有鬱熱風寒外束肌腠自密郁發為熱病邪循經而入由漸而深初用麻黃桂枝等微表而安以病體不甚虛也若中寒則倉卒感受其病即發而暴因其腠理疏豁一身受邪難分經終無熱可發溫補自解此氣大虛不急治則死矣傷風傷暑傷濕亦如傷寒之漸入也中風中暑中濕亦如中寒之暴受也除傷寒外雜病之治可一隅反之矣冬為傷寒從霜降以後至春分以前凡有觸冒霜露體中寒風即病者謂之傷寒也治法除暑濕瘧疾外皆傷寒法也春為溫病從立春節後其中無暴大寒又不冰雪而有人壯熱為病者此屬春時陽氣發於外冬時伏寒變為溫病春溫應常紀者有四歲少陽司天之政初之氣太陽司天之政初之氣陽明司天之政終之氣太陰司天之政二之氣皆病溫其不應常紀而反常者不可候之而隨時變易也內經曰冬傷於寒春必病溫李明之曰冬傷於寒者冬行秋令也當寒而溫火勝而水虧矣水既已虧則所勝妄行土有餘也所生受病金不足也所不勝者侮之火太過也火土合德濕熱相助故為溫病所以不病於冬而病於春者以其寒水居卯之分方得其權大寒之令復行於春腠理開泄少陰不藏房室勞傷辛苦之人陽氣泄於外腎水虧於內當春之月本當發生陽以外泄孰為鼓舞腎水內竭孰為滋養此兩者同為生化之源源既已絶木何賴以生乎身之所存者熱也時強木長故為溫病論曰太陽病發熱而渴不惡寒者為溫病釋曰太陽病者脈浮頭項痛而腰眷強也傷於寒者當惡寒若不惡寒而渴者轉屬陽明則表證已罷邪傳於裡矣今不惡寒則非傷寒證似陽明而與太陽兼見則非傷寒之陽明也故決其為溫病活人書云夏至以前發熱惡寒頭疼身體痛其脈浮緊者溫病也春月傷寒謂之溫病冬傷於寒輕者夏至以前發為溫病蓋因春間溫暖之氣而發也又非溫疫也治溫病與冬月傷寒夏月熱病不同蓋熱輕故也春初秋末陽氣在裡其病稍輕縱不用藥治之五六日亦自安升麻湯解肌湯柴胡桂枝湯最良熱多者小柴胡湯主之不渴外有微熱者小柴胡加桂枝也嗽者小柴胡加五味子也或煩渴發熱不惡寒者並竹葉石膏湯次第服之麻黃桂枝大青龍惟西北二方四時行之無有不驗若江淮間地偏暖處惟冬月及春初乃可用正方自春末至夏至以前桂枝麻黃大青龍內宜加減也按活人所云溫病有二其用升麻解肌等者乃正傷寒太陽證惡寒而不渴者特以其發於溫暖之時故謂之溫病爾其用竹葉石膏湯者乃仲景所謂渴不惡寒之溫病也要須細別勿令誤也然不惡寒而渴之溫病四時皆有之不獨春時而已溫毒陽脈洪數陰脈實大者遇溫熱變為溫毒成此前熱未已又感溫熱者也陽主表陰主裡洪數實大皆熱也兩熱相合變為溫毒活人云初春發斑咳嗽為溫毒吳冬有非節之暖名曰冬溫此即時行之氣也若發斑者又曰溫毒而亦時氣發斑也又傷寒壞病陽脈洪數陰脈實大更遇溫熱變為溫毒其病最重也蓋此因前熱多日不解更感溫熱之氣而為病故曰重也若無汗者以三黃石膏湯汗之若有自汗者宜人參白虎湯主之煩熱錯語不得眠者白虎合黃連解毒湯主之表熱又盛者更加柴胡主之若內實大便不通宜三黃瀉心湯下之或大柴胡湯加芒硝下之亦可若斑出如錦紋者多難治也宜人參化斑湯元參升麻並黑膏大青四物湯主之方論詳發斑發汗不解身灼熱為風溫其證脈浮汗自出身重多眠婁其病不獨見於春間故另立風溫門診尺膚熱甚脈盛躁者病溫也夫精者身之本也故藏於精者春不病溫針灸凡治溫病可刺五十九穴成注云所謂五十九穴者刺兩手內外側各三凡十二痏五指間各一凡八痏足亦如之頭入髮際一寸旁三分各三凡六痏巔上一總會一發際一廉泉一風池二天柱一內經雲氣口靜人迎躁者取之若氣口人迎皆靜者勿刺也人迎謂結喉動脈也王太僕注素問五十九刺云刺頭上五行五行者以越諸陽之熱逆也謂頭中行上星總會前項百會後頂五穴頭第二行兩旁五穴承光通天絡卻玉枕十穴第三行兩旁臨泣目窗正營承靈腦空十穴也大杼膺俞缺盆背俞此八者以瀉胸中之熱也氣街三里巨虛上下臁此八者以瀉胃中之熱也雲門髃骨委中髓空此八者以瀉四肢之熱也五臟俞旁五此十者以瀉五臟之熱也謂背第五行兩旁魄戶神堂魂門意舍志室十穴也附云傷寒汗下不愈而過經其證尚在而不除者亦溫病也經曰溫病之脈行在諸經不知何經之動隨其經之所在而取之如太陽證汗下後過經不愈診得尺寸俱浮者太陽溫病也如身熱目疼汗下後過經不愈診得尺寸脈俱長者陽明溫病也如胸脅痛汗下後過經不愈診得尺寸脈俱弦者少陽溫病也如腹滿嗌乾診得尺寸脈俱沉細過經不愈者太陰溫病也如口燥舌乾而渴診得尺寸俱沉過經不愈者少陰溫病也如煩滿囊縮診得尺寸俱微緩過經不愈者厥陰溫病也是故隨其經而取之隨其證而治之如發斑乃溫毒也汪愚謂溫與熱有輕重之分故仲景云若遇溫氣則為溫病更遇溫熱則為溫毒熱比溫為尤重故也苟但冬傷於寒至春而發不感異氣名曰溫病此病之稍輕者也溫病未已更遇溫氣變為溫毒亦可名曰溫病此病之稍重者也傷寒例以再遇溫氣名曰溫疫又有不因冬月傷寒至春而病溫者此特感春溫之氣可名曰春溫如冬之傷寒秋之傷濕夏之中暑相同也以此觀之是春之病溫有三種不同有冬傷於寒至春發為溫病者有溫病未已更遇溫氣則為溫病與重感溫氣相雜而為溫病者有不因冬傷於寒不因更遇溫氣只於春時感春溫之氣而病者若此三者皆可名為溫病不必各立名色只要知其病源之不同也升麻解肌湯方治傷寒溫病天行頭痛壯熱葛根一兩麻黃去節湯泡七錢半黃芩芍藥各半兩桂心甘草炙各二錢半上㕮咀每服四錢水一盞半棗一枚煮八分服日三三四日不解脈浮者宜重服取汗脈沉實者宜下之升麻葛根湯治大人小兒時氣溫疫頭痛發熱及瘡疹已發未發皆可服之升麻芍藥甘草各二錢半乾葛三錢上作一服水二鍾生薑三片煎至一鐘不拘時服柴胡升麻湯治時行瘟疫壯熱惡風頭痛體疼鼻塞咽乾咳嗽涕唾稠黏柴胡去苗乾葛荊芥去梗赤芍藥石膏各一錢半前胡去苗升麻桑白皮黃芩各一錢上作一服水二鍾生薑三片豆豉二十粒煎至一鐘不拘時服三黃石膏湯石膏四錢黃芩黃連各二錢黃柏山梔仁各一錢五分香豉百粒麻黃二錢若天寒用三錢甘草一錢上作一服用水二鍾煎至一鍾濾清通口服以衣被覆取汗而愈夏為暑病按中暍中暑中熱名雖不同實一病也若冬傷於寒至夏而變為熱病者此則過時而發自內達表之病俗謂晚發是也又非暴中暑熱新病之可比或曰新中暑病脈虛晚發熱病脈盛暍病治法有清熱有解肌太陽中熱者暍是也其人汗出惡寒身熱而渴也成汗出惡寒身熱而不渴者中風也汗出惡寒身熱而渴者中暍也白虎湯太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚成病有在表有在裡者有表裡俱病者此則表裡俱病者也發熱惡寒身重疼痛者表中暍也脈弦細芤遲者中暑脈虛也小便已灑灑然毛聳手足逆冷者太陽經氣不足也小有勞身即熱者謂勞動其陽而暍即發也口開前板齒燥者重有熱也內經曰因於暑汗煩則喘喝口開謂喘喝也以喘喝不止故前板齒乾燥若發汗以去表邪則外虛陽氣故惡寒甚若以溫針助陽則火熱內攻故發熱甚若下之以除裡熱則內虛而膀胱燥故淋甚徐氏曰此條無治法東垣以清暑益氣湯主之所謂發千古之祕也太陽中暍者身熱疼重而脈微弱此亦夏日傷於水水行皮中所致也成經曰脈虛身熱得之傷暑身熱脈微弱者暍也身體疼重者水也夏時暑熱以水灌溉而得之瓜蒂一物散或云五苓散中暍與傷寒相似而異張氏曰清邪中上濁邪中下其風寒濕者皆地之氣系濁邪所以俱中足經惟暑乃天之氣系清邪所以中手少陰心經也其證多與傷寒相似但暍與傷寒脈不同耳夫傷寒雖惡寒發熱初病未至於煩渴惟暑則不然初病即渴所以與傷寒為異也且傷寒之脈必浮盛中暑之脈必虛弱或弦細芤遲者有之經曰脈盛身寒得之傷寒脈虛身熱得之傷暑此之謂也假如太陽病項背強八八反汗出惡風若當炎暑之時豈不與中暍相似惟其不渴故與桂枝加葛湯主之凡居夏秋之令炎暑之時必當依經詳審則無差失之患矣汪以證言之傷寒惡寒傷熱惡熱以脈言之傷寒脈盛傷暑脈虛且暑脈虛細與濕痙之脈有相似者而證則不同暑則自汗而渴濕則不渴痙則身疼也脈洪身熱惡寒為熱病活人云夏月發熱惡寒頭疼身體肢節痛重其脈洪盛者熱病也冬傷於寒因暑氣而發為熱病治熱病與傷寒同有汗宜桂枝湯無汗宜麻黃湯如煩躁者宜大青龍湯然夏月藥性須帶涼不可太溫桂枝麻黃大青龍鬚用加減夏至前桂枝加黃芩半兩夏至後桂枝麻黃大青龍加知母一兩石膏二兩或加升麻半兩蓋桂枝麻黃湯性熱及暖處非西北之比夏月服之必有發黃斑出之失熱病三日外與前湯不瘥脈勢仍數邪氣猶在經絡未入臟腑者桂枝石膏湯主之此方夏至後代桂枝證用若加麻黃一兩可代麻黃青龍證用也若三月至夏為晚發傷寒梔子升麻湯亦可選用之萬曆癸卯興化李氏一壻應舉於南京時方盛暑傷寒太學生新讀仲景書自詫知醫投以桂枝湯入腹即斃大抵麻桂二湯乃隆冬正傷寒之藥施之溫病尚不可況熱病乎桂枝石膏湯治法見前論有汗脈緩為桂枝證無汗脈緊為麻黃青龍證桂枝去粗皮黃芩各半兩梔子三錢白芍藥升麻乾葛生薑以上各七錢半石膏碎甘草炙各一兩上㕮咀每服五錢半水一盞半煮至八分去滓食頃再服得汗即停後服梔子升麻湯治晚發傷寒三月至夏為晚發生地黃切碎半斤梔子十枚劈升麻一兩半柴胡石膏各二兩半上㕮咀每服五錢水一盞半煎八分頓服病不解更服吳自夏至以後時令炎暑有人壯熱煩渴而不惡寒者乃熱病也凡脈浮洪者發於太陽也洪而長者陽明也弦而數者少陽也然此發在三陽為可治若脈沉細微小足冷者發在三陰為難治也大抵熱病大熱須得脈洪大有力或滑數有力乃為脈病相應為之可治若小弱無力為之難治若人虛脈弱者宜人參湯與之而扶其元氣也不可以攻其熱如脈洪身疼壯業無汗煩亂者宜六神湯解散發汗則愈或人參羌活散加葛根淡豆豉生薑以汗之輕者只用十味芎蘇散汗之亦佳如夾暑加香薷扁豆雙解之若兼有內傷生冷飲食停滯或嘔吐噁心中脘痞悶或惡風或增寒拘急者宜藿香正氣散加香薷扁豆葛根以發汗名二香湯若發散熱不解者在太陽經宜用人參羌活散加黃芩在陽明經宜用升麻葛根湯加黃芩熱甚燥渴脈大者白虎湯加人參主之在少陽宜用小柴胡湯隨證增損治之若夾暑者加黃連香薷主之若熱而大便自利小便不利煩渴者五苓散去桂加葛根黃連香薷滑石之類主之若表裡俱熱而自利脈浮數而小便不利者小柴胡湯合四苓散主之若其不解或傳經變證或裡實可下或陰寒可溫或發斑黃等證皆從正傷寒條內治之大抵熱病一二日泄利腹滿熱甚者死三四日目昏譫語熱盛而脈小者死四五日熱盛脈小足冷者死五六日汗不出嘔吐譫語昏沉脈急促者死六七日舌本焦黑燥者死七八日衄血吐血燥熱脈大者死九日發痙搐搦昏亂者死凡熱病脈促結代沉小者皆難治也熱病不得汗而脈躁急者死以得汗而熱反盛脈躁急者死也脈虛身熱惡寒為中暑治法方論詳雜病本門及後條脛冷腹滿頭痛渴而無熱者濕溫活人云濕溫者兩脛逆冷胸腹滿多汗頭痛妄言其人常傷於濕因而中暑濕熱相搏則發濕溫其脈陽濡而弱陰小而急治在太陽不可發汗汗出必不能言耳聾不知痛所在身青面色變名曰重暍如此死者醫殺之耳白虎加蒼朮湯主之許癸丑年故人王彥龍作毗陵倉官季夏時病胸項多汗兩足逆冷譫語醫者不曉雜進藥已經旬日豫診之其脈關前濡關後數豫曰當作濕溫治之蓋先受暑後受濕暑濕相搏是名濕溫先以白虎加人參湯次白虎加蒼朮湯頭痛漸退足漸溫汗漸止三日愈此名賊邪若誤用藥無不死有人難曰何名賊邪豫曰難經云五邪有實邪虛邪正邪微邪賊邪從後來者為虛邪從前來者為實邪從所不勝來者為賊邪從所勝來者為微邪自病者為正邪又曰假令心病中暑為正邪中濕得之為賊邪今心先受暑而濕邪勝之水剋火從所不勝斯謂之賊邪五邪之中最逆也難經曰濕溫之脈陽濡而弱陰小而急濡弱見於陽部濕氣搏暑也小急見於陰部暑氣蒸濕也故經曰暑濕相搏名曰濕溫是謂賊邪也不特此也豫素有停飲之疾每至暑月兩足汗漐漐未嘗干每服此藥二三盞即愈海濕溫汗少者白虎加蒼朮汗多者白虎加桂枝白虎加桂枝方見孫保慶門外有酒家姓姜者善歌唱孫愛之忽數日不見使人問之則曰病久將命絶孫診之遍身皆潤兩足冷至膝下腹滿不省人事六脈皆小弱而急問其所服藥取而視之皆陰病藥也孫曰此非受病重藥能重病耳遂用五苓散白虎湯十餘帖病少蘇再服全愈姜氏既安詣孫謝因請問曰某得病劇蒙良藥一治而蘇願聞治法孫曰汝病傷暑也始則陽微厥而脈小無力衆醫謂陰病遂用陰藥其病愈厥豫用五苓散大利小便則腹減白虎解利邪熱則病愈凡陰病脛冷兩臂亦冷汝今脛冷臂不冷則非下厥上行所以知是陽微厥也保立夏之後至立秋處暑之間傷寒者身多微涼自汗四肢沉重謂之濕溫蒼朮石膏湯主之即白虎加蒼朮湯蒼朮石膏湯方蒼朮半兩石膏三錢知母二錢半甘草一錢上㕮咀水一盞煎至半盞溫服謂內有濕也多不欲飲水如身熱脈洪無汗多渴者熱在上焦積於胸中宜桔梗散此非濕溫病乃熱病也桔梗散方薄荷黃芩甘草梔子各一錢連翹二錢桔梗三錢上銼每服五錢水煎加竹葉如大便澀加大黃半兩脈虛身熱得之傷暑劉純曰按許學士云傷暑其脈弦細芤遲內經曰寒傷形熱傷氣蓋傷氣而不傷形則氣消而脈虛弱所謂弦細芤遲皆虛脈也仲景以弦為陰而朱肱亦曰中暑脈細弱則皆虛脈也可知矣暑證有冒有傷有中戴氏曰冒傷中三者輕重之分或腹痛水泄胃與大腸受之噁心者胃口有痰飲此二者冒暑也可用黃連香薷飲黃連退熱香薷消暑或身熱頭疼躁亂不寧者或身如針刺者此為熱傷肉分當以解毒白虎湯加柴胡氣虛加人參或咳嗽發寒熱盜汗不止脈數者熱傷肺經火乘金也此為中暑宜用清肺湯柴胡天水散之類夏月伏陰在內丹溪曰夏月陽氣盡出於地人之腹屬地氣於此時浮於肌表腹中虛矣夏月伏陰在內也陰字有虛之之義若作陰冷看誤矣前人治暑有用大順散溫熱藥者蓋以涼亭水閣寒泉冰雪所傷也非為伏陰而用火令之時爍石流金有何陰冷孫真人令人夏月服生脈散非虛而何劉氏曰潔古謂靜而得之為中暑動而得之為中熱東垣謂避暑於深堂大廈得之曰中暑宜大順散勞役得之曰中熱宜蒼朮白虎湯夫暑熱一也夏令之氣也靜居堂廈而病乃夏月傷冷之病何以中暑而別於中熱耶王氏曰竊謂暑熱者夏之令也火行於天地間人或勞役或飢餓元氣虧乏不足以御天令亢極於是受傷而為病名曰中暑亦名曰中熱其實一也今乃以動靜所得分之何哉夫中暑者固多在勞役之人勞役則虛虛則邪入邪入則病苟或不虛天令雖亢亦無由傷之彼避暑於深堂大廈得頭疼惡熱等證者蓋亦傷寒之類耳不可以中暑名之其所以煩心與肌膚大熱者非暑邪也身中陽氣受陰寒所遏而作也既非暑邪豈可以中暑名乎苟欲治之則辛溫輕揚之劑發散可也夫大順散一方甘草最多幹姜杏仁肉桂次之除肉桂外其三物皆炒其初意本為病者伏熱引飲過多脾胃受濕嘔吐水穀不分臟腑不調所立故甘草乾姜皆火炒又肉桂而非桂枝蓋溫中藥也其杏仁不過取其能下氣耳若以此藥治靜而得之之證吾恐不能解表反增內煩矣今世俗往往不明類曰夏月陰氣在內大順散為必用之藥夫陰氣非寒氣也蓋夏月陽氣發散在外而陰氣則在內耳豈空視陰氣為寒氣而用溫熱之藥乎陰果為寒何以夏則飲水乎其蒼朮白虎湯雖宜用然亦豈可視為通行之藥乎必參之治暑諸方隨所見之證而用之然後合理夫所謂靜而得之證雖當暑月即非暑病宜分出之勿使後人有似同而異之惑暑傷五臟為證不同陳氏曰暑入心則噎悶昏不知人入肝則眩暈頑痹入脾則昏睡不覺入肺則噴滿痿躄入腎則消渴徐氏曰暑暍之證變異不等非止歸五臟蓋人之形氣有虛實感有輕重輕則後時而發正秋成瘧痢是也重則即時而發如以上證至有輕變重重變輕亦自感有淺深傳有兼併況人之形志苦藥不一豈得無變異乎四時之證皆然暑病宜補元氣東垣曰脾胃虛弱遇六七月濕旺汗泄身重短氣四肢痿軟腳欹眼黑此腎與膀胱俱竭之狀也況汗大泄則亡津液津者庚大腸所主三伏庚金受囚木無可制故風濕相搏骨節煩疼也夫壬膀胱已絶於已癸腎水已絶於午今更逢濕旺助熱為邪西北方之寒清絶矣聖人立法夏宜補者為熱傷元氣以人參麥門冬五味滋水之源瀉內火補庚金益元氣也中暑發為痿厥諸證東垣曰長夏濕熱蒸人損傷元氣四肢困倦精神短少兩腳痿軟遇早晚之際則發寒厥日高之後復熱如火乃陰陽氣血俱不足也或心胸痞滿肢節沉疼或氣高而喘身熱而煩小便黃而少大便溏而頻或利或渴自汗體重此血先病而氣不病也若濕氣先搏脈必洪緩而遲病雖互換少瘥其天暑濕令則一宜以清燥之劑治之或遠行大熱而渴則熱舍於腎故水不勝火發為骨痿此濕熱成痿也或熱厥而陰虛或寒厥而氣虛四肢如火為熱厥四肢寒冷為寒厥寒厥腹中有寒熱厥腹中有熱為脾主四肢故也徐氏曰此論暑熱證候則同冬月傷寒傳變為證之不一彼為寒傷形此為熱傷氣若元氣虛甚受病忽於一時不救者與傷寒陰毒頃刻害人實同故東垣啓是病例大開後人之盲瞶也宜與痿門互看暑風賈氏曰此由火熱制金不能平木搐搦不省人事其脈虛浮者風也虛者暑也俗名暑風乃相火甚而行令也先以溫水化蘇合香丸次以黃連香薷飲加羌活或雙解散加香薷尤良治暑大法賈氏曰暑者相火行令也人感之其脈虛外證頭疼口乾面垢自汗倦怠或背惡熱甚者迷悶不省而為霍亂吐利痰滯嘔逆腹痛泄利下血發黃生斑皆是其證治法清心利小便為上汗多者不可利宜白虎湯次分表裡以治如在表頭疼惡寒雙解加香薷及二香散十味香薷散如在半表半裡瀉泄煩渴飲水吐逆五苓散熱甚煩渴益元散若表解裡熱宜半夏解毒湯下神芎丸或老人及素弱人冒暑脈微下利渴而喜溫或厥冷不省人事宜竹葉石膏湯加熟附半個冷飲次以來復丹五苓散治之凡夏月暑證不可服諸熱燥劑致斑毒發黃小便不利悶亂而死矣徐氏曰此言治暑之法可謂詳備然於暑風相火為病而用蘇合香丸至用雙解皆當審諦脈證不可差失詳蘇合丸但可用於陰寒所遏或內傷生冷及氣中或中惡者此等又不可謂暑風相火之證矣學者審之陶氏曰中暑脈虛而伏身熱背惡寒面垢自汗煩躁大渴毛聳惡寒昏冒倦怠而身不痛與傷寒諸證不同內外俱熱口燥煩渴四肢微冷而身不痛用白虎湯痰逆惡寒橘皮湯熱悶不惡寒竹葉石膏湯頭痛惡心煩躁心下不快小便不利五苓散下消暑丸中暑用小柴胡湯最良秋為瘧夏傷於暑秋必病瘧脈陰陽俱盛重於陰者變為溫瘧凡傷寒壞病前熱未除其脈陰陽俱盛重感寒邪變為溫瘧也寒熱往來口苦胸脅滿者小柴胡湯加芍藥少加桂枝主之若熱多者倍用柴胡寒多者倍用桂枝若熱甚而煩渴人參白虎湯少加薄桂主之若單熱無寒者不用桂也但有寒必少佐之如熱多者小柴胡湯合白虎湯主之痰多而熱者小柴胡合二陳湯主之若食少胃弱者加白朮心下痞加枳實黃連脈虛者必倍人參口渴者去半夏加栝蔞根主之若邪熱蘊結於裡大便祕實脈滑大有力者以大柴胡湯下之若變瘧已正宜於雜病中求之一歲長幼疾狀相似為疫春應暖反寒夏應熱反涼秋應涼反熱冬應寒反溫此非其時而有其氣是以一歲之中長幼之病多相似者為時行疫病也按說文民皆疾為疫從疒役聲今省作殳爾雅釋名厲礪也病氣流行中人如磨礪傷物也疫役也彡有鬼行役役不住也後人有溫疫寒疫時氣大頭傷寒等名其實皆疫也俗謂之瘟病即溫病之訛而名實淆矣按傷寒例云傷寒病熱未已再遇風寒濕而各變為一病也何至於溫既曰再遇溫熱變為溫毒矣又曰再遇溫氣變為溫疫是獨溫之再遇而有二病之異且疫者特感非時之氣衆人病一般也如冬應寒而反大溫人感冬溫而病則所謂溫疫如春夏應溫熱而反大寒人感暴寒而病則所謂寒疫也何待再遇於異氣耶茲云再遇溫氣變為溫疲是傷寒再遇異氣而變病也再遇異氣而變病未必衆人病相似安可以疫言傷寒例雲陽脈濡弱陰脈弦緊此溫疫之脈也活人書注此脈於冬溫條下是以溫疫冬溫合為一病殊不知冬溫特感非時之氣耳溫疫是傷寒再遇於異氣也豈可合為一病邪此理未明故書此以俟明哲愚謂感溫熱而為溫毒感溫氣而為溫疫此乃有微甚之分但疫字疑誤恐當作疾字若作疫字則冬溫又何嘗一家長幼病相似也一家病相似方可言疫況此傷寒病熱未已再遇溫氣而病何至於一家傳染病相似哉溫疫陽脈濡弱陰脈弦緊者更遇溫氣變為溫疫以此冬傷於寒發為溫病脈之變證方治如說成此前熱未已又感溫氣者也溫熱相合變為溫疫丹衆人病一般者天行時疫也有宜補宜散宜降大黃黃芩黃連人參桔梗防風滑石香附蒼朮人中黃上曲糊為丸每服五七十丸分氣血痰作湯使送下氣虛者四君子湯送下血虛者四物湯送下痰多者二陳湯送下熱甚者用童便和前藥同送下本糞清臘月截淡竹去青皮浸滲取汁治天行熱狂熱疾中毒並惡瘡菌毒取汁浸皂角甘蔗治天行熱疾丹解一切災病用粉草五兩細切微炒量病人吃得多少酒取無灰酒一處研去滓溫服須臾大瀉毒亦隨出雖十分渴亦不可飲水飲水難救柴胡石膏湯治時行溫疫壯熱惡風頭痛體疼鼻塞咽乾心胸煩滿寒熱往來痰實咳嗽涕唾稠黏柴胡石膏煆赤芍藥前胡乾葛各十五兩升麻二十五兩黃芩桑皮各三十七兩半荊芥穗三十七兩上㕮咀每服五錢水一盞生薑三片豆豉十餘粒同煎七分去滓熱服小兒分三次更量大小加減不拘時候上三方熱多里多者宜之按溫疫之治與傷寒陽證相同然經所謂溫疫者即溫病也宜參溫病條處之寒疫活人云一歲之中得病病無者長幼率皆相似此則時行之氣俗謂之天行是也老君神明散務成子螢火丸聖散子敗毒散不拘日數淺深吐下隨證施行所以聖散子不問陰陽表裡也老君神明散白朮一錢桔梗二錢半附子炮去黑皮細辛各一兩烏頭四兩炮去皮尖上五味為粗末縫絹袋盛帶之居閭里皆無病若有疫癘者溫酒服方寸匕覆取汗得吐則瘥若經三四日抄三寸匕以水一碗煮令大沸分三服聖散子蘇內翰序全文見活人書時毒流行用聖散子者一切不問陰陽之感連服取瘥不可與傷寒比也若疾疫之行平旦輒煮一釜不問老幼良賤各一盞即時氣不入草豆蔻十個麵裹煨去皮豬苓去皮石菖蒲茯苓良薑獨活去蘆附子炮製去皮臍麻黃去根厚朴去皮薑製藁本芍藥枳殼麩炒去瓤柴胡澤瀉細辛防風去叉蘆白朮藿香半夏吳茱萸湯洗蒼朮甘草各半兩上㕮咀每服五錢水一盞半煎取八分去滓熱服余渣再煎空心服之上二方治疫寒多表多者宜之按寒疫之證必與傷寒陰證同乃可用前熱藥至謂不問陰陽表裡無不取效決無此理後世以過信蘇長公故施聖散子殺人如麻者屢矣嗟乎可不慎哉吳寒疫乃天之暴寒為病也凡四時之中天令或有暴風寒之作人感冒而即病者名曰寒疫也其證與正傷寒同但暴寒為輕耳治法若初作頭疼增寒拘急或嘔逆噁心中脘痞悶或飲食停滯不化或腹中作痛未發熱者宜藿香正氣散增損一二味主之若已發熱者宜用十味芎蘇散汗之若身痛骨節疼而發熱者宜人參羌活散加蔥白葛根生薑以汗之或神術湯亦可若有自汗不宜再汗之宜九味羌活湯主之若熱不解或變別證宜從正傷寒條內治之也龐病源載從立春節後其中無暴大寒又不冰雪而人有壯熱病者此屬春時陽氣發外冬時伏寒變為溫病也從春分以後至秋分節前天有暴寒皆為時行寒疫也三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微其病與溫病暑病相似但治有殊耳其治法初用摩膏火灸惟二日法針用崔文行解散汗出愈不解三日復發汗若大汗而更不解者勿復發汗也四日服藜蘆丸微吐愈若用藜蘆丸不吐者服赤小豆瓜蒂散吐之已解視病尚未了了者復一法針之當解不解者六日熱已入胃乃與雞子湯下之愈百無不如意但當諦視節度與病耳食不消病亦如時行俱發熱頭痛食病當速下之時病當待六七日下之時病始得一日在皮二日在膚三日在肌四日在胸五日入胃乃可下也熱在胃而下外之熱乘虛而入胃然要當復下之不得下多致胃爛發斑者赤斑出五死一生劇者黑斑出十死一生人有強弱相倍也病者過日不時下之熱不得泄亦胃爛斑出矣若得病無熱但狂言煩躁不安精神言語非所人能自主者治法在可水五苓散證中此巢氏載若時行寒疫之法云與溫病暑病相似但治有殊者據溫病無摩膏火灸又有冬溫瘡豆更有四時臟腑陰陽毒又夏至後有五種熱病時令盛暑用藥稍寒故治有殊也崔文行解散治時氣不和傷寒發熱桔梗細辛各四兩白朮八兩烏頭一斤上細末傷寒服一錢五錢匕不覺復小增之以愈為度若時氣不和只服一錢五銖匕辟惡欲省病一服了去此時行寒疫通用之無病預服以闢寒為佳皆酒調下藜蘆散闢溫疫即千金赤散藜蘆躑躅乾薑各一兩牡丹皮皂角各一兩六銖細辛十八銖附子桂枝硃砂另研渣各六兩末之絳囊中帶一方寸匕男左女右臂上著之覺有病之赤小豆瓜蒂散方見雞子湯治時氣熱盛狂語欲走生雞子七枚芒硝一兩上用井花水一大升納二味同攪千遍去沫頓服之快利為度御法雄黃丸治疫不相染雄黃一兩研赤小豆炒熟丹參鬼箭羽各二兩上為細末煉蜜為丸如桐子大每日空心以溫水下五丸可與病人同狀共衣亦不相染活務成子螢火丸主闢疫疾惡氣百鬼虎狼蛇虺蜂蠆諸毒五兵白刃盜賊凶害皆闢之螢火鬼箭羽去皮蒺藜各一兩雄黃雌黃各二兩礬石一兩燒汁盡羚羊角煆龜灰鐵錘柄入鐵處燒焦各一兩半上九味搗為散以雞子黃並雄雞冠一具和之如杏仁大作三角絳囊盛五丸帶左臂上仍可掛於門戶治時疫不相傳染方用水磨雄黃塗於鼻上或以明雄黃一塊重五錢以絹帛包系頭頂心亦妙一方或以上好香油塗鼻中亦可一方以桃樹葉上蟲搗爛以涼水調服之亦可一方以赤小豆同糯米浸水缸中每日取水用之一方用貫仲浸水用之四時非時之氣時氣者乃天疫暴厲之氣流行凡四時之令不正者乃有此氣行也若人感之則長幼相似而病及能傳染於人其作與傷寒相似蓋傷寒因寒而得之此乃疫氣不可與寒同論也治法要當闢散疫氣扶正氣為主若多日不解邪熱傳變何證宜從傷寒變證條內詳而用之惟發散之藥則不同矣凡發散湯劑藿香正氣散芎芷香蘇散十神湯人參敗毒散十味芎蘇等方皆可選而用之也春溫活人曰春應溫而清氣折之責邪在肝或身熱頭疼目眩嘔吐長幼率相似升麻葛根湯解肌湯四時通用敗毒散陶氏曰交春分後至夏至前不惡寒而渴者為溫病用辛涼之藥微解肌不可大發汗里證見者用寒涼之藥急攻下不可誤汗誤下常須識此表證不與正傷寒及治里證同也夏溫活人曰夏應暑而寒氣折之責邪在心或身熱頭痛腹滿自利長幼率相似理中湯射干湯半夏桂甘湯陶氏曰交夏至後有頭疼發熱不惡寒而渴此名溫病愈加熱者名熱病止用辛涼之藥解肌不宜大汗里證見急攻下表證不與正傷寒同治里證治法同秋溫活人曰秋應涼而大熱抑之責邪在肺濕熱相搏民多病疸咳嗽喘金沸草散白虎加蒼朮湯病疸發黃茵陳五苓散陶氏曰交秋至霜降前有頭疼發熱不惡寒身體痛小便短者名濕病亦用辛涼之藥加燥以解肌亦不宜汗里證見者宜攻下表證不與正傷寒同冬溫活人曰冬應寒而反大溫折之責邪在腎宜葳蕤湯丹溪云冬溫為病非其時而有其氣者冬時嚴寒君子當閉藏而反發泄於外專用補藥帶表藥作人中黃方用竹筒兩頭留節一節中作一竅納甘草於中仍以竹木釘塞其竅冬月置大糞缸內浸一月取出曬乾用治溫毒用此藥一味入補藥帶表同煎服之活人曰仲景云冬溫之毒與傷寒大異蓋傷寒者傷寒氣而作冬溫者感溫氣而作寒疫者暴寒折人非觸冒之過其治法不同所施寒熱溫涼之劑亦異不可拘以日數發汗吐下隨證施行要之治熱以寒溫而行之治溫以清冷而行之治寒以熱涼而行之治清以溫熱而行之以平為期不可以過此為大法神效沃雪湯附治傷寒陰陽二證未辨時行疫癘惡氣相傳服之如湯沃雪此藥功力不可具述蒼朮堅者炮刮去皮乾薑炮製甘草炙各六兩厚朴去皮薑製防風嫩者白芍藥去皮乾葛各四兩上㕮咀每服四錢水二鍾煎至一鍾去滓熱服之不拘時少頃取生薑蔥作羹投之避風坐臥身體微潤即愈如疫氣正相傳染清晨進一服為佳常服每用二錢水一盞煎至八分服多眠多汗脈浮為風溫陽脈浮滑陰脈濡弱者更遇於風變為風溫此前熱未歇又感於風者也難經曰中風之脈陽浮而滑陰濡而弱風來乘熱故變風溫若發汗以身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期成傷寒發汗已則身涼若發汗已身灼熱者非傷寒為風溫也風傷於上而陽受風氣風與溫相合則傷衛脈陰陽俱浮自汗出者衛受邪也衛者氣也風則傷衛溫則傷氣身重多眠睡者衛受風溫而氣昏也鼻息必鼾語言難出者風溫外甚而氣擁不利也若被下者則傷臟氣太陽膀胱經也內經曰膀胱不利為癃不約為遺溺癃者小便不利也太陽之脈起目內眥內經曰瞳子高者太陽不足戴眼者太陽已絶小便不利直視失溲為下後竭津液損臟氣風溫外勝經絡欲絶也為難治若被火者則火助風溫成熱微者熱瘀而發黃劇者熱甚而生風如驚癇而時瘛瘲也先曾被火為一逆若更以火熏之是再逆也一逆尚猶延引時日而不愈其再逆者必致危殆故云促命期附活風溫者脈尺寸俱浮頭疼身熱常自汗出體重其息必喘四肢不收默默但欲眠治在少陰厥陰不可發汗發即譫語獨語內煩躁不得臥若驚癇目亂無精如此死者醫殺之耳風溫忌發汗宜葳蕤湯身灼熱者知母乾葛湯如渴甚者栝蔞根湯脈沉身重汗出者漢防己湯萎蕤湯治風溫兼療冬溫及春月中風傷寒發熱頭眩疼咽喉干舌強胸內疼痞腰背強葛根白芷麻黃用沸湯泡杏仁去尖皮雙仁者甘草炙各半兩萎蕤七錢半石膏杵碎羌活去蘆各一兩川芎三錢青木香一錢上㕮咀每服五錢水一盞半煎半鍾日三四服又方萎蕤白薇麻黃獨活杏仁川芎青木香甘草各一兩石膏三兩上㕮咀以水八升煮取三升去滓分三服取汗若一寒一熱加朴硝二錢半大黃三兩下之如無木香可用麝香一分小品方云葳蕤湯治冬溫春月中風傷寒則發頭腦疼痛咽喉干舌強肉疼心胸痞滿腰背強知母乾葛湯治風溫身體灼熱甚者知母葳蕤各三錢天南星生麻黃去根節防風杏仁羌活各二錢甘草黃芩木香升麻人參川芎各一錢石膏六錢葛根八錢上㕮咀每服五錢水一盞半煎至一盞去滓服防己湯治風溫脈浮身重汗出一方無人參防己四兩甘草炙黃耆蜜炙人參各一兩生薑二兩白朮三兩上㕮咀每服五錢水一盞半煮取一中盞去滓飲訖仍坐被中汗出如蟲行或被臥取汗出許學士云風溫誤汗用防己黃耆湯救之栝蔞根湯治風溫灼熱大渴石膏人參乾葛各二錢栝蔞根三錢防風知母各一錢半甘草一錢上作一服水二鍾煎至一鍾通口服滓再煎葛根龍膽湯治風溫脈弱身重汗出石膏五分甘草七分龍膽草桂枝各一錢無汗不用白芍藥大青各一錢半葛根升麻各二錢葳蕤三錢生薑三片上煎服法同前海治風溫活人本方葳蕤湯以有麻黃不敢用宜白朮湯主之方見前太陽病發熱條若頭眩汗出筋惕肉瞤者加牡蠣若腰背強硬者加羌活若舌乾發渴者加人參若身灼熱甚者加知母若身體重多汗者加黃耆若內傷冷者不加一身盡痛為濕成濕有數種有濕痹者痹者痛也濕則關節疼但當利其小便者是也有寒濕相搏其證但頭汗出背強欲得被覆向火者是也有風濕相搏者一身盡痛法當汗出而解者是也有頭中寒濕此中之淺者故鼻塞納藥鼻中者是也有先濕而後感風者身痛發熱日晡劇者此名風濕是也太陽濕家病與太陽傷寒相似其不同者脈沉而細者是也痙家脈亦沉而細疑若相似答曰脈雖相似而證有異濕則身疼痙則身不疼也脈法脈經曰沉而緩沉而細皆中濕脈大或脈浮虛而澀者皆寒濕脈來滑疾濕熱脈洪而緩陰陽兩虛濕熱自甚脈浮風濕趙氏曰仲景論風濕之脈浮虛而澀夫浮者風也澀者濕也脈經亦曰脈來甚者為病寒濕也活人書以一浮脈為風濕之疹浮可言風不可言濕當從仲景浮虛而澀可也風濕病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也成一身盡疼者濕也發熱日晡所劇者風也若汗出當風而得之者則先客濕而後感風若久傷取冷得之者則先傷風而後中濕可與麻黃杏仁薏苡仁甘草湯麻黃杏仁薏苡仁甘草湯方麻黃去節薏苡仁各半兩甘草炙二錢半杏仁十枚去皮尖炒水三盞煎至一盞半去滓分二服避風取微汗風濕相搏傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之以散表中風濕若大便硬小便自利去桂加白朮湯此條妙在脈浮虛而澀脈若沉實滑大數者非也風濕相搏一身盡痛疼法當汗出而解值天陰雨不止醫云此可發汗既汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也成值天陰雨不止明其濕勝也內經曰陽受風氣陰受濕氣又曰傷於風者上先受之傷於濕者下先受之風濕相搏則風在外而濕在內汗大出者其氣暴暴則外邪出而里邪不能出故風去而濕在汗微微而出者其氣緩緩則內外之邪皆出故風濕俱去也麻黃白朮湯桂枝附子湯風濕宜汗桂枝加白朮黃耆防己湯風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之活人用杏仁湯寒濕相搏濕家其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如苔者以丹田有熱胸中有寒渴欲得水而不能飲則口燥煩也成濕勝則多汗傷寒則無汗寒濕相搏雖有汗而不能周身故但頭汗出也背陽也腹陰也太陽之脈夾脊抵腰太陽客寒濕表氣不利而背強也里有邪者外不惡寒表有邪者則惡寒欲得被覆向火者寒濕在表而惡寒也若下之早則傷動胃氣損其津液故致噦而胸滿小便不利下后里虛上焦陽氣因虛而陷於下焦為丹田有熱表中寒乘而入於胸中為胸上有寒便舌上生白苔滑也臟燥則欲飲水以胸上客寒濕故不能飲而但口燥煩也或云小陷胸湯甘草及附子湯小便不利五苓散理中去姜加朮選用小便利者桂枝加附子理中加茯苓茯苓白朮湯選用頭中寒濕濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞納藥鼻中則愈成病有淺深證有中外此則濕氣淺者也何以言之濕家不云關節煩疼而云身上疼者是濕氣不流關節而外客肌表也不云發熱身似熏黃復云發熱面黃而喘是濕不幹於脾而薄於上焦也陰受濕氣則濕邪為深今頭痛鼻塞而煩是濕客於陽而不客於陰也濕家之脈當沉細為濕氣內流脈大者陽也則濕不內流而外在表也又以自能飲食胸腹別無滿痞為腹中和無病知其濕氣微淺納藥鼻中以宣泄頭中寒濕瓜蒂散溫熱溫家之為病一身盡疼發熱身色如熏黃也成身黃如橘子色者陽明瘀熱也此身如熏黃即非陽明瘀熱身黃髮熱者梔子柏皮湯主之為表裡有熱則身不疼痛此一身盡疼非傷寒客熱也知濕邪在經而使之脾惡濕濕傷則脾病而色見是以身發黃者為其黃如煙燻非正黃色也徐氏曰此本濕熱證而論不言熱無治法或治以白朮附子湯甘草附子湯桂枝加桂等藥愚意恐與濕熱病不宜溫痹太陽病關節疼痛而煩脈沉而細者此名濕痹濕痹之候其人小便不利大便反快但當利其小便或云甘草附子湯麻黃連翹赤小豆湯千金翼細作緩金匱曰霧傷皮腠濕流關節疼痛而煩者濕氣內流也濕同水也脈沉而細者水性趨下也痹痛也因其關節煩疼而名曰濕痹非腳氣之痹也內經曰濕勝則濡泄小便不利大便反快者濕氣內勝也但當利其小便以宣泄腹中濕氣古云治濕不利小便非其治也趙氏曰活人云一身盡疼發熱身黃小便不利大便反快此名中濕又注云脈細者非也愚詳仲景上文脈沉而細為濕痹今活人卻以脈細為非豈濕痹與中濕異歟既曰身黃又不明言其色如熏黃與黃如橘子色豈中濕與陽明瘀熱同乎至於治法既曰不可火攻不可發汗而仲景有濕家下之早則噦又下之早則額上汗出微喘小便利者死小利不止者亦死此又有不可下者也風寒濕雜合為痹為痙活人曰風寒濕雜至合而為痹身重汗出惡風痛如歷節狀防己黃耆湯經曰病身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭搖卒口噤背反張者此太陽中風重感寒濕為痙也或云白朮黃耆附子湯徐氏曰錯雜之邪合至當論其先後多少分治可也濕病與傷寒相似黃氏曰太陽濕家病與太陽傷寒相似其不同者濕脈沉而細也愚按脈經曰脈大或浮虛皆寒濕是濕脈亦不專於沉細豈可恃此以差別傷寒還當以證參之庶幾無失濕脈與痙脈亦有相似者而證則不同濕則身疼痙則身不疼也趙氏曰頭疼發熱背強身痛似與傷寒相似其不同者脈沉而細頭汗面黃能飲食所以為異也夫太陽傷寒脈必浮盛今脈沉細苟非濕證即陽證得陰脈也蓋有面黃頭汗其為濕也明矣其濕家能飲食者為病在經而不幹於裡也然大便反快而小便滯者亦經絡澀滯不能施化所致也濕溫活人曰其人傷濕又中於暑名曰濕溫兩脛逆冷胸滿頭目痛妄言多汗其脈陽浮而弱陰小而急茯苓白朮湯白虎加蒼朮湯切勿發汗汗之名重暍必死趙氏曰活人云嘗傷於濕因而中暑濕熱相搏則發濕溫許學士云先受暑後受濕雖所言感受先後不同而其證治則一也又論脈曰陽濡而弱陰小而急許學士以關前為陽關後為陰紀氏則以浮為陽沉為陰雖所言部位不同而其脈狀則一也要之二說皆通不可偏廢然於用藥則白虎加蒼朮誠為至當但活人書前不可表門兼言朮附湯此濕溫門卻但言白虎而不言朮附何耶龐氏方云愚醫昧於冷熱之脈見足脛冷多行四逆輩如此醫殺之耳濕溫脈小緊有類傷寒脈但證候有異數進白虎則脛自溫而瘥朱氏之意豈以朮附與四逆藥物相類恐犯龐氏之戒而此問不載設若濕氣勝臟腑虛大便滑朮附其可廢乎屠氏藥法見前本義云一身盡痛不能轉側者謂之濕溫吳氏曰經曰濕溫之脈陽濡而弱陰小而急活人書謂其先傷於濕後傷於暑暑濕相搏其證多汗妄言雙脛逆冷者宜朮附湯加人參香薷扁豆主之若脈大有力自汗煩渴者人參白虎湯加白朮主之輕者或十味香薷飲清暑益氣湯增損主之但在除濕益元氣清暑而已方見中暑門死證濕家下之額上汗出微喘小便利者死若下利不止者亦死成濕家發汗則愈金匱要略曰濕家身煩疼可與麻黃加朮四兩發其汗為宜若妄下則大逆額上汗出而微喘者乃陽氣上逆也小便自利或下利者陰氣下流也陰陽相離故云死矣內經曰陰陽離決精氣乃絶麻黃加朮湯方麻黃三兩去節桂枝去皮甘草炙各二兩杏仁七十枚去皮尖白朮四兩上五味以水九升先煮麻黃減二升去上沫納諸藥煮取二升半去滓溫服八合覆取微似汗此外治濕方論雜病首冊已詳不復贅敘身反張為痙有汗為柔痙無汗為剛痙證治詳見雜病五冊不復贅敘婦人傷寒婦人傷寒六經傳變治例皆與男子同法惟經水適來適斷熱入血室與夫胎前産後崩漏帶下則治有殊別也熱入血室婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之東垣云妄見妄聞夜夢亡人皆肝木太盛而為邪也刺期門與此義同許學士治一婦人患熱入血室證醫者不識用補血調氣藥延養數日遂成血結胸或勸用前藥豫曰小柴胡已遲不可行也無己則有一焉刺期門穴斯可矣豫不能針請善針者治之如言而愈或問曰熱入血室何謂而成結胸也豫曰邪氣傳入經絡與正氣相搏上下流行或遇經水適來適斷邪氣乘虛而入血室血入邪迫上入肝經肝受邪則譫語而見鬼復入膻中則血結於胸也何以言之婦人平居水當養於木血當養於肝方未受孕則下行之以為月水既妊則中蓄之以養胎及已産則上壅之以為乳皆此血也今邪氣蓄血並歸肝經聚於膻中結於乳下故手觸之則痛非湯劑可及故當刺期門也婦人傷寒發熱經水適來晝日明瞭夜則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈活人云小柴胡湯和之犯胃氣謂下之犯上二焦謂發汗也衍義云一婦人溫病已十二日診其脈六七至而澀寸稍大尺稍小發寒熱頰赤口乾不了了耳聾問之病數日經水乃行此屬少陽熱入血室也若治不對病則必死乃按其證與小柴胡湯服之二日又與小柴胡湯加桂乾薑一日寒熱遂止又云我臍下急痛又與抵當丸微利臍下痛痊身漸涼脈漸勻尚不了了仍復與小柴胡次日又云我但胸中熱燥口鼻乾又少與調胃承氣湯不得利次日又云心下痛又與大陷胸丸半服利三行次日虛煩不樂時亦有所見時復狂言雖知其尚有燥屎以其極虛不敢攻之遂與竹葉湯去其煩熱其夜大便自通至曉兩次中有燥屎數枚而狂言虛煩盡解但咳嗽唾此肺虛也恐乘虛而成肺痿遂與小柴胡去人參大棗生薑加乾薑五味子湯一日咳減二日而病悉愈以上皆用張仲景方婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故如瘧狀發作有時小柴胡湯主之附云婦人傷寒中風治法與男子無異惟熱入血室妊娠傷寒則不同也宜以四物安養胎血佐以汗下之藥治之婦人傷寒中風自汗頭痛項背強發熱惡寒脈浮而緩恐熱入血室故倍加芍藥桂枝加芍藥湯桂枝一兩半赤芍藥三兩半生薑切一兩半甘草炙一兩大棗六枚擘上銼細每服五錢水煎服婦人傷寒脈浮而緊頭痛身熱惡寒無汗發汗後恐熱入血室宜麻黃加生地黃湯麻黃二兩半桂枝一兩半甘草半兩炙生地黃二兩杏仁二十五枚去皮尖上㕮咀每服五錢水煎服活婦人傷寒經脈方來初斷寒熱如瘧狂言見鬼宜用乾薑柴胡湯柴胡四兩栝蔞根桂枝各一兩半牡蠣煆乾薑甘草炙各一兩上㕮咀每服五錢水一盞半煎至七分去滓溫服初服微煩再服汗出而愈羅小柴胡加地黃湯治婦人室女傷寒發熱經水適來適斷晝日明瞭夜則譫語如見鬼神亦治産後惡露方來忽間斷欲死柴胡一兩二錢半人參黃芩甘草炙半夏湯洗七次生地黃各七錢上為粗末每服五錢生薑三片棗二枚水煎服云婦人傷寒身熱脈長而弦屬陽明少陽往來寒熱夜躁晝寧如見鬼狀經水適斷熱入血室不實滿者小柴胡加牡丹皮湯主之大實滿者桃仁承氣湯下之小柴胡加牡丹皮湯方柴胡人參牡丹皮各二兩甘草炙生薑各七錢半半夏湯洗六錢大棗三枚擘黃芩七錢半上銼細每服一兩水煎服婦人傷寒頭痛脈浮醫反下之邪氣乘虛而傳於裡經水閉不行心下結硬口燥舌乾寒熱往來狂言如見鬼狀脈沉而數者當下之宜小柴胡加芒硝大黃湯主之柴胡二兩半夏制一兩半黃芩生薑各七錢半大黃芒硝各七錢甘草炙五錢半大棗三枚擘上銼每服一兩水煎去滓下芒硝再沸溫服若脈不沉數則不可下許辛亥中寓居毗陵學官王仲禮其妹病傷寒發寒熱遇夜則如鬼物所憑六七日忽昏塞涎響如引鋸牙關緊急瞑目不知人疾勢極危召豫視之豫曰得病之初曾值月經來否其家曰月經方來病作而經遂止一二日發寒熱晝雖靜夜則有鬼祟從昨日涎生不省人事豫曰此熱入血室之證也仲景云婦人中風發熱惡寒經水適來晝則明瞭夜則譫語如見鬼狀發作有時此名熱入血室醫者不曉以剛劑與之遂致胸膈不利涎潮上脘喘急息高昏冒不知人事當先化其痰後除其熱豫急以一呷散投之兩時頃涎下得睡省人事次授以小柴胡加地黃湯三服而熱除不汗而自解矣云婦人傷寒表虛自汗身涼四肢拘急脈沉而遲太陽標病少陽本病經水適斷桂枝加附子紅花湯桂枝二兩半芍藥生薑各一兩半甘草炙一兩附子炮紅花各五錢上銼細每服一兩水三盞煎服婦人傷寒太陽標病汗解表除邪熱內攻熱入血室經水過多無滿實者甘草芍藥湯甘草芍藥生地黃川芎各一兩上㕮咀每服一兩水三盞煎至一盞半去滓入發灰五錢調勻溫服不止者刺隱白妊娠傷寒吳凡妊娠傷寒六經治例皆同但要安胎為主凡藥中有犯胎者則不可用也如藿香正氣散十味芎蘇散參蘇飲小柴胡湯之類有半夏能犯胎如用須去之若痰多嘔逆必用之以半夏曲則可如無沸湯泡七次去皮臍生薑自然汁拌曬乾乃可用也凡川烏附子天雄側子肉桂乾薑大黃芒硝芫花甘遂大戟蜀漆水蛭虻蟲桃仁牡丹皮乾漆代赭石瞿麥牛膝等類之物皆動胎之藥凡用必須斟酌仔細而詳之也其餘詳見各條治例茲不録凡護胎之法傷寒熱病熱甚者宜用井底泥塗臍二寸干即又塗之一方以白藥子為末水調塗之一方以伏龍肝末水調塗之可護胎也大抵妊娠傷寒合用湯劑必加黃芩白朮二味能安胎也或以此二味煎湯與之或為細末白湯調下二三錢亦佳如妊婦素稟弱者藥中四物湯佐之不可缺也且如用小柴胡湯去半夏加白朮合四物湯用之可以保胎除熱也其效如神余皆仿此用之則妙矣潔黃耆解肌湯治婦人妊娠傷風自汗人參黃耆當歸川芎甘草炙各五錢芍藥六錢加蒼朮生地黃亦可上為粗末每服五錢水煎溫服無時海若妊娠傷寒中風表虛自汗頭痛項強身熱惡寒脈浮而弱太陽經病宜表虛六合湯四物湯四兩桂枝地骨皮各七錢若妊娠傷寒頭痛身熱無汗脈緊太陽經病宜表實六合湯四物湯四兩麻黃細辛各半兩若妊娠傷寒中風濕之氣肢節煩疼脈浮而熱頭痛者太陽標病也宜風濕六合湯四物湯四兩防風蒼朮制各七錢若妊娠傷寒下後過經不愈濕毒發斑如錦紋宜升麻六合湯四物湯四兩升麻連翹各七錢若妊娠傷寒胸脅滿痛而脈弦少陽證宜柴胡六合湯四物湯四兩柴胡黃芩各七錢若妊娠傷寒大便硬小便赤氣滿而脈沉數陽明太陽本病也急下之宜大黃六合湯四物湯四兩大黃桃仁去皮尖麩炒十枚若妊娠傷寒汗下後咳嗽不止者宜人參六合湯四物湯四兩人參五味子各五錢若妊娠傷寒後虛痞脹滿者陽明本虛宜厚朴六合湯四物湯四兩厚朴枳實麩炒各五錢若妊娠傷寒汗下後不得眠者宜梔子六合湯四物湯四兩梔子黃芩各五錢若妊娠傷寒大渴蒸蒸而煩脈長而大者宜石膏六合湯四物湯四兩石膏知母各五錢若妊娠傷寒小便不利太陽本病宜茯苓六合湯四物湯四兩茯苓澤瀉各五錢若妊娠傷寒太陽本病小便赤如血者宜琥珀六合湯四物湯四兩琥珀茯苓各五錢若妊娠傷寒汗下後血漏不止胎氣損動者宜膠艾六合湯四物湯四兩阿膠艾各五錢一方加甘草同上一方加甘草乾薑黃耆若妊娠傷寒四肢拘急身涼微汗腹中痛脈沉而遲少陰病也宜附子六合湯四物湯四兩附子炮去皮劑桂各五錢若妊娠傷寒蓄血證不宜墮胎藥下之宜四物大黃湯下之四物湯四兩生地黃大黃酒浸各五錢婦人妊娠或蓄血抵當桃仁勿妄施要教子母俱無損大黃四物對分之丹施孺人傷風未解兩足下脛冷嗽多不吐痰頭眩蓋其性急又當臨月黃芩半錢陳皮白朮各一錢蘇桔三分木通枳殼炒各五分麻黃三分甘草炙二分桔梗蒼朮各半錢上水煎服無時云婦人有孕傷寒脈浮頭重腹中切痛宜桂枝芍藥當歸湯桂枝芍藥當歸各一兩上銼細每服一兩水煎婦人妊娠傷寒自利腹中痛食飲不下脈沉者太陰病也宜芍藥湯芍藥白朮甘草茯苓各一兩上如前修服活治妊娠傷寒安胎宜阿膠散人參白茯苓阿膠炒桑寄生白朮各等分上搗羅為細末糯米飲調下二錢日二服治妊娠傷寒安胎宜白朮散白朮黃芩新瓦上炒香各等分上為末每服三錢水一鍾生薑三片大棗一枚擘破同煎至七分去滓溫服但覺頭疼發熱便可服二三服即瘥惟四肢厥冷陰證見者未可服治妊娠傷寒憎寒發熱當發其汗宜蔥白湯蔥白十莖生薑二兩切上銼水二盞煎至一盞連服取汗海蔥白一物湯用蔥白二把以水一升熟煮取汁令食盡亦生安胎若胎損須臾即出紫蘇散治胎氣不和揍上心腹脹滿疼痛謂之子懸能安活胎亦下損胎又治傷寒頭疼發熱遍身疼痛紫蘇葉當歸各一兩人參甘草炙各半兩大腹皮川芎白芍藥陳皮去白各一兩每服八錢水一鍾半生薑五片蔥白三莖連須煎至一鍾去滓食前熱服若心腹甚痛者加木香元胡索研同煎服芎蘇散治妊婦傷寒頭痛增寒壯熱身痛項強紫蘇葉川芎白芍藥白朮陳皮乾葛甘草麥門冬各等分銼散每服四錢姜四片蔥白三莖煎熱服治婦人傷寒妊娠服藥例若發熱惡寒不離桂枝芍藥若往來寒熱不離柴胡前胡若大渴者不離知母石膏五味子麥門冬若大便泄者不離桂附乾薑白朮若大便燥結者不離大黃黃芩若月經適來適斷者不離小柴胡若胎不安者不離人參阿膠白朮黃芩若發汗者不離煎豉生薑麻黃旋覆若頭痛者不離石膏山梔前胡若傷暑頭痛者不離柴胡甘草石膏若滿悶者不離枳實陳皮若胎氣不安者不離黃芩麥門冬人參若斑發黑者不離黃芩梔子升麻大治妊娠時氣身大熱令子不落護胎方伏龍肝研為極細末調塗臍下三寸干即易瘥即止又方井水泥塗干即易之二方出本事有效又方浮萍藍根朴硝蛤粉大黃微炒上為末水調傅臍上安胎解熱極妙又方白藥子為末水調傅腹上治妊娠霍亂二方附少陰吐利門治妊娠發斑變為黑色宜梔子大青湯黃芩升麻梔子仁各二兩大青杏仁各半兩上㕮咀每服五錢水一盞半細切蔥白三寸煎至一盞去滓溫服産後傷寒吳新産後患傷寒不可輕易發汗蓋有産時傷力發熱去血過多發熱惡露不去發熱三日蒸乳發熱或有早起動勞飲食停滯一皆發熱狀類傷寒要在仔細詳辨切不可輒便發汗大抵産後大血空虛若汗之則變筋惕肉瞤或鬱冒昏迷而不省或風搐搦而不定或大便祕澀而難去其害非輕切宜精審凡有發熱且與四物湯以川芎當歸為君最多白芍藥須炒過酒蒸熟地黃佐之如發熱加軟苗柴胡人參乾薑主之最效蓋乾薑之辛熱能引血藥入血分氣藥入氣分也且能去惡養新有陽生陰長之道以熱治熱深合內經之旨豫嘗用之取效如神故録以勸之如有惡露未盡者益母丸黑神散必兼用之若胃虛食少者必加白朮茯苓有痰嘔逆者必加陳皮半夏其餘六經各條治例皆同但藥中必加四物湯為主乃養血務本之要也産後中風數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出雖多陽旦證可與陽旦湯即桂枝湯方見太陽病産後中風發熱面赤喘而頭痛竹葉湯主之竹葉一把葛根三兩防風桔梗桂枝人參甘草炙各一兩上㕮咀每服五錢棗一枚姜五片水一盞半煎一盞去滓服溫覆使汗出若頭項強用大附子半錢煎藥揚去沫嘔者加半夏一錢丹産後發熱惡寒皆屬血氣虛左手脈不足補血右手脈不足補氣凡惡寒發熱又腹痛當去惡血惡寒發熱乳汁不通及膨者無子當消用麥芽二兩炒研細清湯作四服調下有子當下用木通通草豬蹄汁調煎服産後才見身熱不可發表並一切苦寒藥必用乾薑治之大發其熱輕則用茯苓淡滲其熱大凡産後發熱頭痛身疼不可便作感冒治之此等多是血虛或敗血作梗宜以平和之劑與服必效如玉露散或四物加北柴胡等分煎服若便以小柴胡湯及竹葉石膏湯之類竟不救者多矣玉露散治産後乳脈不行身體壯熱疼痛頭目昏痛大便澀滯悉治之涼膈壓熱下乳人參茯苓甘草各半兩苦梗炒川芎白芷各一兩當歸二錢半芍藥七錢半上㕮咀每服五錢水一盞煎至七分溫服如煩熱甚大便祕者加大黃二錢半小兒傷寒潔傷寒表裡攻發有表證惡風惡寒者當發表海藏云惡風者白朮散惡寒者神術湯如氣盛能食不大便無表證者可攻裡春主溫屬木身溫當發汗海藏云神術湯夏主長屬火身熱而煩躁合大發散海藏云神術加黃耆湯長夏主化屬土及居四季同當調其飲食海藏云四君子湯秋主收屬金身涼內溫合微下海藏云通膈丸金花丸冬主臟屬水身熱而惡寒是熱在外而寒在內身寒而惡熱是熱在內而寒在外海藏云熱在內者調胃承氣湯寒在內者調中湯丸潔凡傷寒宜依四時陰陽升降逆順剛柔而施治法氣升浮則順發之收藏則下之有汗發熱惡風脈浮緩者風傷衛桂枝湯無汗發熱惡寒不當風而自憎寒脈浮緊者寒傷榮麻黃湯有汗發熱惡風脈浮緊無汗發熱惡寒脈浮緩謂之榮衛俱傷青龍桂枝麻黃各半湯無汗發熱不惡風寒脈沉洪者可下之更詳認其厥與不厥量寒熱淺深而治之有汗四肢厥脈沉微者名陰厥四逆湯無汗四肢厥脈沉微者名陽厥大承氣湯加膩粉如四肢不厥身熱內外皆陽不動三焦宜涼藥三五服下之黃芩甘草湯黃芩白朮湯黃芩蒼朮湯黃芩梔子湯連翹飲子小柴胡湯八正散涼膈散白虎湯五黃散此上中下三焦藥宜選用之中暑脈虛背惡寒自汗而渴者白虎湯身涼脈緊熱在內者急下之口燥咽乾不大便是也無汗身大熱者可發汗升麻湯大青膏天麻膏有汗身大熱者桂枝湯惺惺散解肌湯小柴胡湯白朮防風湯可選用之發汗者量四時暄暑燥濕風寒各宜春涼夏寒秋溫冬熱而發之錢傷風貪睡口中氣熱呵缺煩悶當發散與大青膏表證也潔古補遺云小兒外感於風寒拘急呵缺煩悶皮毛澀口中氣熱者當發散秋冬用溫熱藥春夏用涼寒藥大青膏方天麻青黛研各一錢白附子生一錢半蠍尾去毒生半錢硃砂研天竺黃研麝香各一字匕烏梢蛇內酒浸焙乾取末半兩上同研細生蜜和成膏每服半皂子或一皂子大月中兒粳米大同牛黃膏薄荷水化一處服之五歲以上同甘露散服雄黃膏治傷風溫壯熱引飲雄黃小棗大研蘿蔔根水並醋一大盞煮盡甘草末川甜梢各三錢寒水石研細五錢匕腦子一字匕硃砂五分上研勻煉蜜成膏薄荷湯化下半皂子大上此及前方發散貪睡口氣熱呵缺煩悶表證者蓋為三歲以下小兒未能言者設也活尋常風壅發熱鼻涕痰嗽煩渴惺惺散主之惺惺散治小兒風熱及傷寒時氣或瘡疹發熱桔梗細辛人參白朮甘草栝蔞根白茯苓川芎各等分上為末每服二錢姜二片薄荷二葉煎服三歲以下作四五服凡小兒不問傷風傷寒風熱與此即愈海傷寒時氣風熱痰壅咳嗽及氣不和者四君子加細辛栝蔞桔梗各一分生薑薄荷煎或加防風川芎各一分分內有寒及遇天寒欲發散者則去栝蔞加桔梗多虛汗夜啼者加麥門冬傷風身熱頭痛氣促者四君子加川芎防風等分細辛羌活減半同煎活咽喉不利痰實咳嗽鼠黏子湯云人參羌活散治小兒寒邪及瘟氣時疫瘡疹頭痛體痛壯熱多眠不語潮濕煩渴痰實咳嗽羌活獨活柴胡人參芎藭枳殼炒甘草炙白茯苓去皮各二兩前胡桔梗天麻酒浸炒地骨皮各半兩上為散每服二錢水一盞入薄荷少許同煎去渣溫服不拘時候七寶散治時氣頭昏體熱小兒同乳母服大人亦可紫蘇葉香附炒各三兩陳皮甘草桔梗白芷川芎各一兩上㕮咀薑棗煎服海麻黃黃芩湯治小兒傷寒無汗頭痛身熱惡寒麻黃赤芍藥黃芩各半兩甘草炙桂枝各二錢半上為粗末水煎服升麻黃芩湯治傷風有汗頭疼發熱惡風升麻葛根黃芩芍藥各五錢半甘草一錢半上㕮咀每服二錢水煎溫服上惺惺散等藥發散頭痛發熱惡風寒表證者蓋為三歲以上小兒能言者設也能言故頭疼惡風寒可問而知也前五方通治有汗無汗惡風惡寒第五方治無汗惡寒第六方治有汗惡風錢與大青膏不解散有下證當下大黃丸主之大熱飲水不止而善食者可微下余不可下也此里證也潔古補遺云大熱飲水能食不大便用大黃丸作散子與服之如清便自調慎不可妄下恐外熱逐於內而變結胸危證多矣大黃丸治風熱裡實口中氣熱大小便祕赤飲水不止有下證者宜服之川芎半兩黑牽牛半兩半生半熟炒大黃酒蒸一兩甘草炙二錢半上為細末稀糊和丸麻子大二歲每服十丸溫蜜水下乳後服以溏利為度未利加丸數活頭額痛身體發熱大便黃赤腹中有熱四順散連翹飲三黃丸主之三方並見幼科準繩痘疹門身體潮熱頭目昏痛心神煩躁小便赤大便祕此熱劇也洗心散調胃承氣湯主之洗心散見痘門頭額身體溫熱大便白而酸臭者胃中有食積雙聖丸主之方見科幼食癖門潔如身表無大熱而小便不利是有濕熱結膀胱仍用勝濕藥白朮白茯苓之類利小便則其熱自退云小兒傷寒煩熱小便赤澀大便褐色面赤熱者導赤散錢傷風兼藏兼心則驚悸兼肺則悶亂喘息哽氣長出氣嗽兼腎則畏明各隨補母臟虛故也傷風手足冷脾臟怯也當先和脾後發散和脾益黃散發散大青膏主之此治陰厥有汗脈沉微者若陽厥無汗脈沉滑者不宜此法宜大承氣湯而加膩粉傷風自利脾臟虛怯也當補脾後發散補脾益黃散發散大青膏主之未瘥調中丸主之有下證大黃丸下之後服溫驚丸傷風腹脹脾臟虛也當補肺必不喘後發散仍補脾也去脹塌氣丸主之發散大青膏主之傷風吐瀉治見幼科準繩吐瀉門瀉門益黃散白朮散發散用大青膏湯治夾驚傷寒熱極生風薄荷散薄荷葉半兩羌活全蠍麻黃去根節甘草各一錢二分半天竺黃殭蠶白附子炮各二錢半為細末每服一錢水半盞煎至三分加竹瀝少許妙云小兒表傷寒則皮膚閉而為熱盛即生風欲為驚搐血氣未實不能勝邪故發搐也大小便依度口中氣熱當發之宜大青膏肺盛復有風冷則胸滿短氣氣急喘嗽上氣當先散肺後發散風冷散肺瀉白散散風大青膏主之若止傷寒則不胸滿腎虛則畏明宜補腎地黃丸有表者間用地黃膏發散之傷風下後虛熱以藥下之太過胃中虛熱飲水無力當生胃中津液多服白朮散小兒結熱於內口乾而渴身黃體重者宜白朮散湯傷寒發渴宜白虎湯潔大熱飲水能食不大便用大黃丸作散服之上三方白朮散治虛渴為下後而食少胃虛者設也白虎湯大黃丸治實渴為未經下而能食不大便者設也潔傷寒咳嗽吐清水哽氣長出氣是肺之不足也合用阿膠散面白如枯骨者死不治身熱咳喘吐痰者當用褊銀丸方見幼科咳嗽門上二方治咳嗽阿膠散治虛嗽為哽氣長出氣者設也褊銀丸治實嗽為痰盛喘滿者設也若有表證惡風寒而嗽者當用惺惺散加減四君子湯鼠黏子湯之類陰厥陽厥見潔身大熱吐逆不止者茯苓半夏湯即小半夏加茯苓湯方見嘔門湯傷寒嘔者枳殼半夏湯枳殼半夏各半兩上水一碗姜十片煎至半碗十歲以下作五服藿香正氣散治傷寒發嘔藿香葉厚朴制半夏制甘草炙陳皮蒼朮米泔浸各等分上㕮咀每服二錢水半盞姜三片棗一枚煎至二分去滓溫服潔大吐者當下之白餅子珍珠丸消積丸三方俱見幼科食癖門潮熱有時胸滿短氣嘔吐者桃枝丸方見幼科積熱門上七方治傷寒嘔吐前二方治痰飲而吐中一方治有表而吐後四方治有里而吐其桃枝丸治裡熱而吐餘二方治表寒而吐也湯傷寒自汗當補虛和陰陽小建中湯減桂加黃耆人參地黃黃耆一兩白芍藥三兩甘草人參熟地黃各半兩上㕮咀每二錢水半盞煎至三分去渣服小兒傷寒形證頭痛體痛鼻塞或流涕喉內喘息兩手脈洪數頰赤眼澀身上寒毛起口鼻出水眼赤黃口乾澀咳嗽山根青色噴嚏活頭目疼痛而畏人惡寒者此傷寒證也云設令小兒卒暴身壯熱惡寒四肢冷或耳尻冷鼻氣熱為斑疹也與傷寒表證相似此胎氣始發自當作斑疹治之內之外若與傷寒表證同治者誤也吳小兒傷寒六經治例皆同但有胎熱驚熱血熱客熱寒熱潮熱痰熱食熱變蒸發熱痘疹發熱傷風發熱一皆發作狀似傷寒要在明辨之耳況肌體嫩弱血氣未定脈法不同藥劑輕小之別故略其節要另開録於下以便覽焉凡小兒察面色為先要宜詳察色要略也凡小兒視虎口脈紋者以男左女右手食指第一節為初關二節為中關三節為末關即寅卯辰三位也凡脈紋見初關者輕中關者重末關者病危也以紫脈為驚熱紅脈為傷寒為熱白主疳熱少血青主驚主風主寒主腹中痛主搐搦黃主傷乳食脾虛黑主冷氣主中惡主病沉困也凡紫赤青黑脈紋直透末關者死凡小兒四五歲以一指按其三部脈六七歲以二指按切三部脈十歲以上當密排三指而切之宜詳脈訣要略也脈經曰四五歲以上者呼吸七八至細數者吉九至為熱十至為困五至為寒四至困也十歲左右者五六至為平也凡胎熱驚熱客熱血熱痰熱寒熱潮熱等治法並見幼科準繩宜詳玩之茲不具録凡食熱傷乳者則吐哯乳瓣不消口中醋氣傷食則心下滿硬噯氣作酸惡食右手氣口脈盛手心熱手背不熱發熱則肚背先熱以此別之凡治傷食發熱必以六君子湯為主或加神麯麥芽棠求子砂仁香附子之類如內實者加枳實青皮熱不解者加軟苗柴胡炒黃連或黃芩之類以解如無熱宜服香砂保和丸凡變蒸發熱者以長氣血也夫變者氣上蒸體熱也輕者發熱虛驚耳冷微汗唇中有白泡如珠子三日而愈重者寒熱脈亂腹疼啼叫不食凡乳食輒吐哯五日愈也凡傷風發熱則貪睡脾澀呵缺頓悶鼻塞噴嚏或鼻流清涕口中氣熱或咳嗽聲重或自汗怕風也宜人參羌活散加減主之其餘治例宜傷風表證之例要在詳辨而治之爾凡傷寒則怕寒拘急發熱翕翕然在表晝夜不止直待汗出方解錢氏曰男子則面黃體重女子則面赤喘急憎寒口中氣熱呵缺頓悶項急也大抵傷寒則手背熱手心不熱左手人迎脈緊盛也其餘六經為病詳見六經發熱例同但藥劑宜輕小也亦有失驚失食傷寒要在審辨而已凡痘疹發熱錢氏曰腮赤多躁噴嚏眼澀呵缺頓悶時發驚悸身重發熱耳尖鼻尖手足稍冷乍涼乍熱睡中驚惕起臥不安者乃其候也切不可認作傷寒輒用發汗或重被蓋覆取汗則大誤矣須仔細辨之凡壯熱痘疹欲出未出者宜用升麻葛根湯主之胃弱食少者必加人參白朮白茯苓主之若欲透斑更加紫草茸為妙丹溪言但見紅點便忌葛根誠恐發得表虛瘡出爛熳也錢氏治斑瘡未透者以四君子湯加糯米煎先助胃氣也一方更加升麻紫草茸以透斑出凡痘瘡三日至足謂之出齊若小大不等根窠紅活者不必服藥至五日當灌漿若漿來肥滿光澤者不必服藥若五六日漿不來便當救之以人參黃耆當歸三味為君佐以白朮陳皮白芷川芎白芍藥防風炙甘草之類必須加肉桂三分或五分能引藥入血分化膿為妙若氣逆滿悶出不快者少加木香二三分主之如噁心嘔逆不食者須加丁香三粒以透胃氣升發痘毒外出然此皆祕傳之法用之纍驗者也若有癢塌寒戰咬牙手足冷或嘔或喘或大便下利者此表裡之氣俱虛也宜加肉豆蔻訶子各五分熟附子二分或五分主之或十宣內托散加此三味亦佳凡欲靨未靨頭溫足冷或瀉渴或氣促四肢冷悶亂不寧臥則哽氣寒戰咬牙無熱證者宜陳氏十二味異功散主之凡青乾紫陷有熱者不可用此宜八珍湯加黃耆升麻紫草茸生地黃之類主之其餘詳見幼科準繩痘疹門宜詳玩而用焉一方治痘瘡未透漿不至者以烏骨白雄雞冠上取血和白酒漿溫與之最效凡有癢塌抓損宜房中常燒乳香尤妙宜多用耆歸等湯大抵痘瘡變黑或青干或紫陷漿不來昏沉汗出不止煩躁熱渴腹脹啼哭聲嗄大小便不通者皆難救也凡瘡外黑裡赤者重外白里黑者極重瘡端里黑點如針孔者難治惟裡外肥紅者最吉若一發並出及一發如針頭密者皆難治也要在詳辨而已溫病田春日溫病未滿三日先用惺惺散二服後四五日不解煩渴嘔用白朮散如自汗口燥用制白虎湯至六七日大便燥結用四順飲子下心腹大實大滿牛黃通膈丸下初覺之時疑是瘡疹只用葛根升麻湯解肌
