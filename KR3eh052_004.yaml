body:
  text: 卷四三陰總論黃三陰有傳經之邪有內感之邪傳經者自太陽傳入者是也內感者直中三陰非自陽經次第流傳而來由形寒飲冷而得損動胃氣之所致也其脈證略與傷寒外感之證相似細辨之特異耳然止系雜病非傷寒熱病受寒之證也夫邪之生也或生於陰或生於陽其生於陽者得之風雨寒暑其生於陰者得之飲食居處陰陽喜怒仲景云發熱而惡寒者發於陽也無熱而惡寒者發於陰也此三陰內感之證首尾無熱縱有熱者亦仲景所謂反發熱也反當考始得之三字則見矣內感之證始終只在一經不復傳變不傳者何陽動而陰靜故陽傳而陰不傳也若以傷寒之三陰三陽言之則所傳者表裡經絡而已況風寒六氣之邪中人或中於陽經或入於陰絡孰為之先孰為之後烏可專以太陽為受邪之始故各經皆能受邪然邪自太陽始者比各經居多蓋始雖自三陰中熱者亦傳歸陽明而後已也三陰經自中寒決無復傳變三陰無合併病者以此王嘗讀張仲景傷寒論於太陰有曰自利不渴者屬太陰以其藏有寒故也當溫之宜服四逆輩於少陰有曰少陰病得之一二日口中和其背惡寒者當灸之附子湯主之少陰病身體痛手足寒骨節痛脈沉者附子湯主之少陰病下利白通湯主之少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之少陰下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之少陰病脈沉者急溫之宜四逆湯於厥陰有曰手足厥寒脈細欲絶者當歸四逆湯主之大汗若大下利而厥冷者四逆湯主之觀仲景此論則傷寒三陰必有寒證而宜用溫熱之劑也及讀劉守真之書有曰傷寒邪熱在表腑病為陽邪熱在裡臟病為陰俗妄謂有寒熱陰陽異證誤人久矣寒病有之非汗病之謂也寒病止為雜病終莫能為汗病且造化汁液之氣者乃陽熱之氣非陰寒之所能也雖仲景有四逆湯證是治表熱里和誤以寒藥下之太早表熱入里下利不止及或表熱裡寒自利急以四逆溫里利止里和急解其表也故仲景四逆湯證復有承氣湯下之者由是傷寒汗病經直言熱病而不言寒也經言三陰證者邪熱在臟在裡以臟與里為陰當下熱者也素問論傷寒熱病有二篇名曰熱竟無寒理兼素問並靈樞諸篇運氣造化之理推之則為熱病誠非寒也觀守真此論則傷寒無問在表在裡與夫三陽三陰皆一於為熱而決無或寒者矣兩説不同其是非之判必有一居此者由是彼此反覆究詰其義而久不能得雖至神疲氣耗不捨置者自謂此是傷寒大綱領此義不明則千言萬語皆未足以為後學式況戕賊民生何有窮極也哉意謂成無己之注必有所發明者遂因而求之然亦止是隨文而略釋之竟不明言何由為熱何由為寒之故此非其不欲言也蓋止知傷寒皆是傳經故疑於六經所傳俱為熱證而熱無變寒之理遂不敢別白耳以寒為本臟之寒歟安得當熱邪傳裡入深之時反獨見寒而不見熱者且所用溫熱藥能不助傳經之熱邪乎以寒為外邪之寒歟則在三陽已成熱矣豈有傳至三陰而反為寒哉成氏能潛心乎此則必悟其所以然矣自仲景作傷寒論以來靡或遺之而弗宗至於異同之論興而漁者走淵木者走山矣宜乎後人不能決於似是而非之際故或謂今世並無真傷寒病又或以為今人所得之病俱是內傷又昧者至謂傷寒論中諸溫藥悉為傳經熱邪而用者以三陰經屬陰故也又其大謬者則曰凡論中有寒字皆當作熱字看嗚呼末流之弊一至此乎於是澄心靜慮以涵泳之一旦劃然若有所悟者然亦未敢必其當否也姑陳之以從有道之正夫三陽之病其寒邪之在太陽也寒鬱其陽陽不暢而成熱陽雖人身之正氣既鬱則為邪矣用麻黃髮表以逐其寒則腠理通而鬱熱泄故汗而愈苟或不汗不解其熱不得外泄則必里入故傳陽明傳少陽而或入腑也若夫三陰之病則或寒或熱者何哉蓋寒邪之傷人也或有在太陽經鬱熱然後以次而傳至陰經者或有太陽不傳陽明少陽而便傳三陰經者或有寒邪不從陽經而始直傷陰經者或有雖從太陽而始不及鬱熱即入少陰而獨見少陰證者或有始自太陽即入少陰而太陽不免於無傷者或有直傷即入而寒便變熱及始寒而終熱者其鬱熱傳陰與寒便變熱則為熱證其直傷陰經及從太陽即入少陰則為寒證其太陽不能無傷則少陰脈證而兼見太陽標病其始為寒而終變熱則先見寒證而後見熱證此三陰之病所以或寒或熱也苟即三陰經篇諸條展轉玩繹以求之理斯出矣夫其或傳經或直傷或即入或先寒後熱者何也邪氣暴卒本無定情而傳變不常故耳故經曰邪之中人也無有常或中於陽或中於陰夫守真者絶類離倫之士也豈好為異説以駭人哉蓋由其以溫暑為傷寒而仲景之方每不與溫暑對故略乎溫熱之劑而例用寒涼由其以傷寒一斷為熱而無寒故謂仲景四逆湯為寒藥誤下表熱里和之證及為表熱裡寒自利之證而立又謂溫里止利急解其表又謂寒病止為雜病嗟乎仲景傷寒論專為中而即病之傷寒作不兼為不即病之溫暑作故每有三陰之寒證而溫熱之劑之所以用也以病則寒以時則寒其用之也固宜後人不知此意是以愈求愈遠愈説愈鑿若知此意則猶庖丁解牛動中肯綮矣且如寒藥誤下而成裡寒者固誠為不免矣不因寒藥誤下而自為裡寒者其可謂之必無乎殊不知陰經之每見寒證者本因寒邪不由陽經直傷於此與夫雖由太陽而始不及鬱熱即入於此而致也雖或有因寒藥誤下而致者蓋亦甚少仲景所用諸溫熱之劑何嘗每為寒藥誤下而立況表熱裡寒之證亦何嘗每有急解其表之文乎夫裡寒外熱之證乃是寒邪入客於內迫陽於外或是虛陽之氣自作外熱之狀耳非真熱邪所為也觀仲景於裡寒外熱之證但以溫藥治裡寒而不治外熱則知其所以為治之意矣若果當急解其表豈不於裡和之後明言之乎且三陰寒病既是雜病何故亦載於傷寒論以惑後人乎其厥陰病篇諸條之上又何故每以傷寒二字冠之乎夫內經所敘三陰病一於為熱者言其常也仲景所敘三陰病兼乎寒熱者言其變也並行而不相悖耳後人謂傷寒本無寒證得非知常而不知變歟然世之恪守局方好用溫熱劑者乃反能幸全於寒證無他其守彼雖偏治此則是學者能知三陰固有寒邪所為之證則仲景創法之本意可以瞭然於心目之間而不為他説所奪矣或曰傷寒之病必從陽經鬱熱而傳三陰今豫謂直傷陰經即入陰經而為寒證其何據乎豫曰據夫仲景耳仲景曰病發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈夫謂之無熱惡寒則知其非陽經之鬱熱矣謂之發於陰則知其不從陽經傳至此矣謂之六日愈則知其不始太陽而止自陰經發病之日為始數之矣仲景又曰傷寒一二日至四五日而厥者必發熱傷寒病厥五日熱亦五日設六日當復厥不厥者自愈傷寒厥四日熱反三日復厥五日其病為進夫得傷寒未為熱即為厥者豈亦由傳經入深之熱邪而致此乎今世人多有始得病時便見諸寒證而並無或熱者此則直傷陰經即入陰經者也苟不能究夫仲景之心但執凡傷於寒則為病熱之語以為治其不夭人天年者幾希矣太陰病腹滿腹痛黃吐與利下三門並附入少陰病蓋此三門之病本屬太陰病因在少陰者反多故從其多者附也黃太陰之為病腹滿而吐食不下自利益甚時腹自痛者宜理中也陰經少有用桂枝湯者如此證若脈浮即用桂枝湯微汗之若惡寒甚不已者非理中四逆不可也三陰俱有惡寒但喜厚衣即惡寒也前證若下之必胸下結硬又宜瀉心湯也雖然用瀉心者由誤下而致非傳經熱邪也三陰雖皆有傳經熱邪故自有熱證與此陰證不同大宜詳究太陰經治法有汗下溫和解汗桂枝湯桂枝加芍藥湯下桂枝加大黃湯溫四逆湯理中湯和解梔子柏皮湯茵陳五苓散經云尺寸俱沉細者太陰受病也以其脈布胃中絡於嗌故腹滿而嗌乾今查太陰篇缺嗌乾證太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬成太陰為病陽邪傳裡也太陰之脈布胃中邪氣壅而為腹滿上不得降者嘔吐而食不下下不得升者自利益甚時腹自痛陰寒在內而為腹痛者則為常痛此陽邪干里雖痛而亦不常但有時腹自痛也若下之則陰邪留於胸下為結硬經曰病發於陰而反下之因作痞自利不渴者屬太陰脈浮而緩手足自溫者系在太陰下後腹滿時痛者屬太陰太陰病脈浮者可發汗宜桂枝湯在太陽則脈浮無汗宜麻黃湯此脈浮當亦無汗而不言者謂陰不得有汗不必言也不用麻黃而用桂枝者以陰病不當更發其陽也須識無汗亦有用桂枝湯本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之邪氣入里則為腹痛蓋氣傳裡而痛者其痛不常當以辛溫之劑和之陰寒在內而痛者則痛無休止時欲作利也當以熱劑溫之有燥屎宿食為痛者則不大便腹滿而痛也則須下之經曰諸痛為實痛隨利減此皆為里證而治各不同桂枝加芍藥湯方桂枝生薑各三兩半甘草二兩炙芍藥六兩大棗十二枚擘上五味以水七升煮取三升去滓分溫三服桂枝加大黃湯方桂枝一兩芍藥一兩半甘草炙半兩大黃半兩大便實痛者加一兩虛者照本方上㕮咀大棗三枚生薑四片水煎溫服張或謂太陰病用四逆等固當然復用桂枝大黃夫大黃至寒何為用之於陰經又兼桂枝大黃寒熱相雜而用何也曰夫自利而渴者屬少陰為寒在下焦自利不渴者屬太陰為寒在中焦以四逆等湯溫其臟此本經當用之藥也其太陽病反下之表邪未解乘虛傳於太陰因而腹滿時痛用桂枝芍藥湯若大實痛者桂枝加大黃以除表裡之邪以上二節雖下後而利已此兼有滿痛形證故用芍藥大黃為宜若脈浮弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱故易動也趙活人書第四問太陰經病證中雲腹滿時痛屬太陰也又云腹痛桂枝加芍藥湯痛甚桂枝加大黃湯愚詳太陰病腹滿證有三有次第傳經之邪有直入本經之邪有下後內陷之邪不可不辨也如腹滿咽乾者此非傳經之陽邪者乎法當下之腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬此非直入本經之陰邪者乎法當溫之如太陽病醫反下之因爾腹滿時痛此誤下內陷之邪也法當用桂枝加芍藥湯大實痛者桂枝加大黃湯今此問中不言桂枝加芍藥加大黃二湯為治誤下後之劑又不曰大實痛但曰痛甚設遇本經直入陰邪腹滿時痛而脈沉細者依此用桂枝加芍藥大黃等下之豈不貽胸下結硬之悔又所謂大實痛者乃胃中邪實結燥而痛則痛甚與大實證全別以是知本經陰邪腹滿者宜理中青皮陳皮傳經之邪腹滿咽乾者屬大柴胡證下後腹滿痛方見上太陰病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也太陰中風四肢煩疼脈陽微陰澀而長者為欲愈內經曰四肢皆稟氣於胃而不得至經必因於脾脾病不能為胃行其津液四肢不稟水穀氣日以就衰脈道不利筋脈血肉皆無氣以生故不用脾在時則寄旺於四季在人則應於手足故太陰病則四肢應之太陽病欲解時從亥至醜上脾為陰土旺於亥子醜向陽故云解時活古人以四日太陰證病在胸膈可吐而愈何也答曰不然有太陰證脈大胸滿多痰者可吐之脈大而無吐證者可汗而已大抵在表者汗之在裡者下之在上者湧之在下者泄之栝蔞梔豉隨證施用不可拘以日數也趙活人五十六問云陰證有發熱者乎太陰厥陰皆不發熱只少陰有發熱證愚詳仲景論中三陰皆有發熱如少陰二證外又有吐利手足不逆冷反發熱者不死少陰病一身手足盡熱以熱在膀胱必便血少陰病四逆散中用柴胡亦有發熱又厥陰病先厥後發熱而利者必自止下利脈數有微熱汗出今欲愈面赤身微熱為鬱冒嘔而發熱小柴胡與夫太陰病中風四肢煩疼是三陰皆有發熱何其言之拘耶又云太陰篇無吐法如虛煩膈實等證可吐者皆屬他經獨華他云四日在胸可吐之亦不曰太陰今活人傷寒問中雲太陰病在胸膈可吐何耶況胸中本非太陰經部分仲景雖有下之則胸結硬是誤下後壞病也而胸下乃近心腹處亦非吐藥可治也至於論脈仲景但云太陰尺寸皆沉細亦未嘗言脈大腹滿腹滿俗云肚脹有屬熱者有屬寒者陽熱則腹滿咽乾或大小便祕澀或潮熱譫語等證陰則腹滿吐食不下自利益甚時腹自痛雖然腹滿為里證又有淺深之別經曰表已解內不消非大滿猶生寒熱則病不除是未全入腑邪猶淺也若大滿大實堅有燥屎可除下之雖四五日不能為禍是已入腑邪已深也腹滿固多可下又有虛實之殊經曰腹滿不減為實可下去之若腹滿時減為虛則不可下又曰腹滿不減減不足言當下之要略曰腹滿時減復如故此虛寒從下上也當以溫藥和之蓋虛氣留滯亦為之脹但比實者不至堅痛爾諸經皆有腹滿但太陰屬脾土位中央又專主腹滿之候腹滿之證二十餘條治法有汗吐下溫刺之異又有汗吐下後成腹脹者治法亦各不同蓋胃為津液之主發汗亡陽則胃氣虛而不能數布諸氣壅滯而為脹滿是當溫散厚朴生薑甘草半夏人參湯可也吐後邪氣不去加之腹脹滿者胸中之邪下傳入胃壅而為實故生脹滿當須下之調胃承氣湯可也邪未入腑而妄下之表邪乘虛入郁胸中有虛煩氣上下不得通利腹為之滿故當吐之梔子厚朴湯可也醫者能審邪氣所起之由來真知邪氣所在之虛實發汗吐下之不瘥溫補針艾之適當則十全之功可得也又結胸從心下起至少腹硬滿而痛與腹滿類也然結胸按之則痛手不可近腹痛舉按常痛手近不甚也又痞亦從心下起至少腹亦與滿類也然痞或止留心下腹滿但在腹之中也有此為異臨證宜審太陽發汗後腹脹滿者厚朴生薑甘草半夏人參湯成吐後腹脹與下後腹滿皆為實言邪氣乘虛入里為實發汗後外已解也腹脹滿知非裡實由脾胃津液不足氣澀不通壅而為滿與此湯和脾胃而降氣張或問太陽篇中發汗後諸證不言太陽病固所當然亦合列於傷寒之上何故止言發汗後腹脹者厚朴半夏生薑人參湯主之豫曰凡言發汗後者以外無表證里無別術止有腹脹一事而已除此之外即獲全安夫傷寒二字豈可易言哉其傳變吉凶猶反掌耳可與所餘一證而並例哉其諸汗後條目不殊此意厚朴生薑人參甘草半夏湯方厚朴炙去皮生薑各半斤人參一兩半夏半升洗甘草二兩上五味以水一斗煮取三升去滓溫服一升日三服傷寒下後心煩腹滿臥起不安梔子厚朴湯主之成下後但腹滿而不心煩則邪氣入里為裡實但心煩而不腹滿則邪氣在胸中為虛煩既煩且滿則邪氣壅於胸腹間也滿者不能坐煩者不能臥故令臥起不安與梔子厚朴湯吐煩泄滿太陽病過經十餘日心下溫溫欲吐而胸痛大便反溏腹微滿鬱郁微煩先時自極吐下者調胃承氣湯若不愈不可與但欲嘔胸中痛微溏者此非柴胡證以嘔知極吐下也吳茱萸湯半夏瀉湯心詳嘔吐太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者可治傷寒腹滿譫語寸口脈浮而緊此肝乘脾名曰縱刺期門腹滿譫語者脾胃疾也浮緊者肝脈也脾病見肝脈木行乘土也經曰水行乘火木行乘土名曰縱此其類矣期門者肝之幕制之以瀉肝經盛氣傷寒發熱嗇嗇惡寒大渴引飲腹滿自汗小便利病欲愈此肝乘肺也名曰橫刺期門按傷寒發熱惡寒表病也至於自汗出則表已解矣大渴腹滿里病也至於小便利則里自和矣故曰其病欲解欲解則當俟其自愈矣刺期門三字疑衍陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也麻黃湯三陽合病腹滿身重難以轉側口不仁面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗者白虎湯陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故所以然者以脈遲故也梔柏湯傷寒吐後腹脹滿者與調胃承氣湯成內經云諸腹脹大屬於熱熱在上焦則吐吐後不解復腹脹滿者邪熱入胃也與調胃承氣湯下其胃熱發汗不解腹滿痛者急下之宜大承氣湯腹滿時減減不足言當下之宜大承氣湯滿痛即是實若時減者非實也下條是發明上文之義且言若但滿而不痛雖未可以為實若滿而不減者亦可下也張或謂減不足言復曰當下之何也此古之文法如果也言腹滿不減當下之宜大承氣湯此滿而不減之謂也若時滿時減者不可以當下而論是減不足言也然承氣湯當綴下腹滿不減處非可續於減不足言之下也假如太陽篇中雲傷寒不便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯緣桂枝當發汗而設非為治衄而用也以其文法所拘致令後世治衄有麻黃桂枝之誤其減不足言之説亦不外乎是理陽明病下之心中懊憹而煩胃中有燥屎者大承氣湯腹微滿必初硬後溏不可攻下後心中懊憹而煩者虛煩也當與梔子豉湯若胃中有燥屎者非虛煩也可與大承氣湯下之其腹微滿初硬後溏是無燥屎此熱不在胃而在上也故不可攻傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然汗出者此大便已硬也宜大承氣湯若汗多微發熱惡寒者表未解也其熱不潮未可與承氣若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下陽明病脈浮而緊口苦咽乾腹滿而喘發熱汗出不惡寒反惡熱身重五苓散白虎湯陽明病潮熱大便微硬者大承氣湯若不大便六七日恐有燥屎少與承氣湯湯入腹中不轉失氣者此但初硬後溏不可攻攻之必脹滿不能食欲飲水者飲水則噦後發熱者必大便復硬宜小承氣湯陽明中風脈弦浮大短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥身及面目悉黃小便難潮熱時噦者與小柴胡湯脈但浮無餘證者麻黃湯太陰為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬理中湯丸不渴四逆湯張或謂凡傷寒初受者皆在太陽然後傳於陽明少陽也病有自陰經而入者未審何經先受也夫太陽先受也病自陽經發者為外感風寒邪從表入故太陽先受之也病自陰經起者為內傷生冷飲食過多故從太陰入也夫太陰者脾也以飲食生冷則傷脾故腹滿而吐食不下自利不渴手足自溫等證也桂枝加芍藥桂枝加大黃二證已見前條少陰病六七日腹脹不大便者急下之宜大承氣湯成此少陰入腑也六七日少陰之邪入腑之時陽明內熱壅甚腹滿不大便也陽明病土勝腎水則乾急與大承氣湯以救腎水厥陰下利清穀不可汗汗出必腹滿四逆湯下利腹脹滿身體疼痛者先溫其里四逆湯乃攻其表桂枝湯下利腹滿者里有虛寒先與四逆湯溫里身疼痛為表未解利止里和與桂枝湯攻表傷寒噦而腹滿視其前後何部不利利之則愈成噦而腹滿氣上而不下也視其前後部有不利者則利之以降其氣前部小便也後部大便也或用五苓散小承氣湯禁忌不大便六七日少與小承氣湯不轉失氣者不可攻攻之則腹滿不能食論見不大便腹滿吐利者忌下論見太陰腹滿脈浮緊口苦咽乾者忌汗下針論見自汗腹滿脈遲者忌下論見前脈遲條腹滿脈弱自利設用大黃芍藥宜減之論見太陰病條附活若飲食不節寒中陰經胸膈不快腹滿閉塞唇青手足冷脈沉細少情緒或腹痛急作理中湯加青皮每服一二劑胸即快矣枳實理中丸五積散尤妙脹腹滿者宜桔梗半夏湯桔梗半夏湯治傷寒心腹痞滿時發疼痛桔梗微炒半夏薑製橘紅各一兩上㕮咀每服四錢生薑三片水煎服海少陰證小便遺瀝大便遺失其人病六七日身重目不能視體如冰腹脹滿與物則咽不與則不求其脈沉細而微疾按之有力宜急下之與大承氣湯腹痛邪氣入里與正氣搏則為腹痛所以痛者有異焉腹痛屬裡正太陽經腹不痛少陽有胸脅痛而無腹痛若有陽明腹滿急而痛此為裡實宜下之大柴胡湯小承氣湯三陰下利清穀而又腹痛者裡寒故也此總論太陽經陽中之陰四逆湯附子理中湯陽氣傳太陰經腹滿而痛其證有二有實痛有虛痛腸鳴泄利而痛者虛痛也此獨論太陰經陰中之陽小建中湯即桂枝加芍藥湯但桂有厚薄不瘥則小柴胡湯去芩加芍藥如數腹滿大便祕按之痛者實痛也桂枝加大黃一錢此之虛痛實痛乃是以陽邪漸消為虛陽氣正大為實太陽傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥與小柴胡湯成脈陽澀陰弦而腹中急痛者當作里有虛寒治之與小建中湯溫中散寒若不瘥者非裡寒也必由邪氣自表之裡裡氣不利所致與小柴胡湯去黃芩加芍藥以除傳裡之邪小建中湯方桂枝去粗皮生薑切各三兩芍藥六兩甘草炙二兩大棗十二枚擘膠飴一升上六味以水七升煮取三升去滓納膠飴更上微火消解溫服一升日三服嘔則不可用建中湯以甜故也內經曰肝生於左肺臟於右心位在上腎處在下脾者土也應中央居四臟之中為中州生育榮衛通行津液一有不調則榮衛失所育津液失所行必此湯溫健中臟是以建中名焉脾欲緩急食甘以緩之健脾者必以甘為主故以膠飴甘溫為君甘草甘平為臣桂辛熱辛散也潤也榮衛不足潤而散之芍藥味微寒酸收也泄也津液不逮收而行之是以芍藥桂為佐生薑味辛溫大棗味甘溫胃者衛之源脾者榮之本針經曰榮出中焦衛出上焦是矣衛為陽不足者益之必以辛榮為陰不足補之必以甘辛甘相合脾胃健而榮衛通是以薑棗為使或謂桂枝湯解表而芍藥數少建中湯溫里而芍藥數多何也皮膚為近則制小其服心腹為遠則制大其服此所以為不同也傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之成濕家下後舌上如胎者以丹田有熱胸上有寒是邪氣入里而為下熱上寒也此傷寒邪氣傳裡而為下寒上熱也胃中有邪氣使陰陽不交陰不得升而獨治於下為下寒腹中痛陽不得降而獨治於上為胸中熱欲嘔吐與黃連湯升降陰陽之氣黃連湯方黃連甘草炙乾薑炮桂枝去粗皮各三兩人參二兩半夏半升洗大棗十二枚擘上七味以水一斗煮取六升去滓溫服一升日三服夜二服上熱者泄之以苦黃連之苦以降陽下寒者散之以辛桂薑半夏之辛以升陰脾欲緩急食甘以緩之人參甘草大棗之甘以益胃傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者與小柴胡湯二陽並病太陽初得病時發汗不徹因轉屬陽明續自微汗不惡寒若太陽證不罷者不可下可少發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹其人煩躁不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹更發汗則愈以脈澀知之桂枝不惡寒大柴胡湯小汗宜葛根湯各半湯麻黃加桂枝湯陽明病人不大便五六日繞臍痛煩躁發作有時此有燥屎故使不大便也成不大便五六日者則大便必結為燥屎也胃中燥實氣不得下通故繞臍痛煩躁發作有時也大下後六七日不大便煩不解腹滿腹者有燥屎也所以然者本有宿食故也大承氣湯主之大下之後則胃弱不能消穀至六七日不大便則宿食已結不消故使煩熱不解而腹滿痛是知有燥屎也與大承氣湯以下除之發汗不解腹滿痛者急下之之少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或嘔或下利或小便利真武湯成少陰病二三日則邪氣猶淺至四五日邪氣已深腎主水腎病不能制水水飲停為水氣腹痛者寒濕內甚也四肢沉重疼痛寒濕外甚也小便不利自下利者濕勝而水穀不別也內經曰濕勝則濡泄與真武湯益陽散寒濕少陰病下利清穀裡寒外熱手足厥逆脈微欲絶反不惡寒面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之下利清穀手足厥冷脈微欲絶為裡寒身熱不惡寒面赤色為外熱此陰盛於內格陽於外不相通也與通脈四逆湯散陰通陽少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之四逆者四肢不溫也傷寒邪在三陽則手足必熱傳到太陰手足自溫至少陰則熱邪漸深故四肢逆而不溫也及至厥陰則手足厥冷是又甚於逆與四逆散以散傳經之熱也少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯二三日至四五日寒邪入里深也腹痛者裡寒也小便不利者水穀不別也下利不止便膿血者腸胃虛弱下焦不固也與桃花湯固腸止利也太陰為病腹滿吐食不下自利益甚時腹自痛若下之必胸下結硬或用理中湯丸不渴四用湯逆本太陽病醫反下之因爾腹滿時痛屬太陰也桂枝加芍藥湯大實痛者桂枝加大黃湯詳見前厥陰傷寒四五日腹中痛若轉氣下趣少腹者此欲下利也傷寒四五日邪氣傳裡之時腹中痛轉氣下趣少腹者裡虛遇寒寒氣下行欲作自利也或用附子乾薑湯四逆湯云傷寒邪在三陰內不得交通故為腹痛手足之經皆會於腹如脈弦而腹痛過在足厥陰肝手太陰肺刺太衝太淵太陵如脈沉而腹痛過在足太陰脾少陰腎手厥陰心包刺太溪太陵如脈沉細而痛過在足太陰脾手少陰心刺太白神門三陰交此刺腹痛之法也吳凡腹中痛可按可揉者內虛也不可按不可揉者內實也王海藏言中脘痛者屬脾土脈沉細內寒者理中湯或用附子理中丸主之若陽脈澀陰脈弦小建中湯主之若小腹痛屬厥陰經分宜當歸四逆湯加吳茱萸主之厥逆者四逆湯加吳茱萸主之若大實腹滿而痛或繞臍刺痛不大便脈實者以大承氣湯下之凡潮熱不大便從心下至少腹硬滿而痛手不可近者大陷胸湯下之若脈弦腹痛無熱無寒者芍藥甘草湯主之凡脈弦口苦發熱腹中痛者小柴胡去人參加炒白芍湯主之若寒熱交作腹中痛者加肉桂芍藥主之若寒多而痛者去黃芩倍肉桂芍藥也凡少陰發熱手足冷腹中痛者四逆散加附子湯肉桂炒芍藥吳茱萸主之也凡發熱脈洪弦而腹痛者芍藥黃芩湯主之大抵腹痛有虛有實有冷有熱要在脈證辨而用之凡蓄血亦令人腹痛手不可近自有本條若自利腹痛小便清白便當溫也理中四逆看微甚用輕者五積散重者四逆湯無脈者通脈四逆湯使陰退而陽復也腹痛欲吐利而煩躁者多有痧毒世俗括刺委中穴凡脈微弦少腹痛厥陰也宜刺太衝太淵太陵灸歸來關元脈沉臍腹痛少陰也宜刺太白神門三陰交灸中脘陶傷寒腹中痛用涼水飲之其痛稍可者屬熱當用涼藥不已而或繞臍硬痛大便結實煩渴屬燥屎痛急用寒藥下之或食積痛治亦如之若小腹硬痛小便自利大便黑身目黃者屬蓄血痛治亦如之加行血藥下盡黑物自愈此三者痛隨利減之法也若飲水愈痛屬寒當用溫藥不已而或四肢厥冷腹痛嘔吐泄利急用熱藥須詳脈來有力無力方可劉氏用灰包尉腹痛龐合灸不灸久則冷結氣上衝心而死活身無大熱煩渴大便實或腹痛滿及生赤癮疹者調胃承氣湯黃連橘皮湯腹痛兼頭痛發熱身痛吐利為霍亂欲吐不吐欲瀉不瀉為乾霍亂法詳雜病霍亂門黃王叔和陽明篇海藏云色如煙燻黃乃濕病也一身盡痛色如橘黃乃黃病也一身不痛成濕熱俱甚則發身黃傷寒至於發黃為病亦已甚矣邪風被火兩陽相熏其身必黃陽明病被火額上汗出小便不利必發身黃此皆由內有熱而被火攻發黃者也陽明病無汗小便不利心中懊憹必發黃者由陽明熱盛而發黃也傷寒汗已身目為黃以寒濕在裡不解故也此不可下宜於寒濕中求之是知非特濕熱發黃而寒濕亦發黃也但寒濕之黃身如熏黃色暗而不明也熱盛之黃黃如橘色氣出染衣正黃如柏也大抵黃家屬太陰太陰為濕熱蒸之而致經曰太陰當發身黃是也一或脈沉結少腹硬小便自利其人如狂者又為蓄血在下焦使之黃也發黃非止寸口近掌無脈鼻氣出冷為不治之證又若形體如煙燻直視搖頭為心絶環口黧黑柔汗發黃為脾絶是皆不治之證也太陽病身黃脈沉結少腹硬小便自利其人如狂者血也抵當湯詳蓄血得病六七日脈遲浮弱惡風寒手足溫醫數下之不能食脅下滿痛項強小便難面目及身黃茵陳五苓散詳脅痛太陽病脈浮動數頭痛發熱微盜汗出反惡寒表未解也醫反下之客氣動膈若不結胸但頭汗出小便不利身必發黃梔子柏皮湯詳頭汗太陽中風以火劫汗兩陽相熏其身發黃陽盛欲衄陰虛小便難陰陽俱虛身體枯燥防己黃耆湯梔子柏皮湯詳頭汗梔子柏皮湯方梔子十五個擘甘草一兩炙黃柏二兩上三味以水四升煮取一升半去滓分溫再服若發汗已身體灼熱者名曰風溫脈陰陽俱浮自汗身重多眠睡鼻息必鼾語言難出若被火者微發黃色太陽病已汗遂發熱惡寒復下之表裡俱虛復加燒針因胸煩面青膚瞤者難治色微黃手足溫者易愈色微黃非病也所以驗其病之易愈也陽明傷寒瘀熱在裡身必發黃麻黃連軺赤小豆湯麻黃連軺赤小豆湯方麻黃去節生薑切連軺連翹根也甘草炙四味各二兩杏仁四十粒泡去皮尖大棗十二枚擘生梓白皮一升切赤小豆一升上八味以潦水一斗先煮麻黃再沸去上沫納諸藥煮取三升去滓分溫三服半日服盡內經曰濕上甚而熱治以苦溫佐以甘辛以汗為度正此之謂也又煎用潦水者亦取其水味薄則不助濕氣陽明病發熱但頭汗出小便不利渴飲水漿此瘀熱在裡身必發黃茵陳蒿湯傷寒七八日身黃如梔子色小便不利腹微滿者茵陳蒿湯成當熱甚之時身黃如橘子色是熱毒發泄於外內經曰膀胱者州都之官津液藏焉氣化則能出矣小便不利小腹滿者熱氣甚於外而津液不得下行也與茵陳蒿湯利小便退黃逐熱茵陳蒿湯方茵陳六兩大黃二兩去皮肥梔子十四枚擘上三味以水一斗先煮茵陳減六升納二味煮取三升去滓分溫三服小便當利尿如皂角汁色正赤一宿腹減黃從小便去也成小熱之氣涼以和之大熱之氣寒以取之發黃者熱之極也非大寒之劑則不能徹其熱酸苦湧泄為陰酸以湧之苦以泄之故以茵陳蒿酸苦為君心法南方火而主熱大熱之氣必以苦寒勝之故以梔子為臣宜補必以酸宜下必以苦蕩滌邪熱必假將軍攻之故以大黃為佐雖甚熱火毒必祛除分泄前後腹得利而解矣陽明病無汗小便不利心中懊憹身必發黃陽明中風脈弦浮大而短氣腹滿脅下及心痛鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時噦耳前後腫病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治陽明病面合赤色不可攻必發熱色黃者小便不利也梔子柏皮湯陽明病被火額上微汗小便不利者必發黃五苓散梔子柏皮湯傷寒發汗已身目皆黃所以然者以寒濕在裡不解故也不可下於寒濕中求之成金匱要略謂黃家所起從濕得之汗出熱去則不能發黃發汗已身目為黃者風氣去濕氣在也脾惡濕濕氣內著脾色外奪者身目為黃若瘀血在裡發黃者則可下此以寒濕在裡故不可下當從寒濕法治之太陰傷寒脈浮而緩手足自溫系在太陰太陰當發身黃若小便自利者不能發黃以脾家實腐穢當去故也浮緩亦大之類小便不利者五苓散加茵陳主之小便自利者橘皮湯主之婁上身黃小便自利小腹硬而狂大便黑者為蓄血則宜抵當湯下之若小腹不硬其人不狂大便不黑者雖小便利非蓄血也其為證有三一者梔子柏皮湯二者麻黃連翹赤小豆湯皆治身黃小便利而身不疼者海藏所謂干黃是也三者桂枝附子湯去桂加白朮湯皆治身黃小便利而一身盡痛者活人所謂中濕是也張或謂傷寒發黃惟陽明與太陰兩經有之俱言小便利者不能發黃何也蓋黃者土之正色以太陰與陽明俱屬土故發黃也其黃之理外不能汗里不得小便脾胃之土為熱所蒸故色見於外為黃也若小便利者熱不內蓄故不能變黃也其有別經發黃者亦由脾胃之土受邪故也趙明瘀熱發黃與瘀血發黃外證及脈未嘗相似且如頭汗出劑頸而還腹微滿小便不利渴飲水漿為瘀熱證小腹急結其人如狂小腹硬滿小便自利大便黑為瘀血證此外證之不似也瘀血脈微而沉或沉結瘀熱脈則浮滑緊數此脈狀之又不相似也然則相似者但色黃耳若論黃色之相似非特瘀熱與瘀血又如風溫被火微發黃色太陽火劫發汗兩陽相熏灼其身發黃陽明被火額上微汗必發黃者是又挾火邪所致者外此亦有黃色之不相似者乎曰濕家之熏黃則異矣可不各以其似不似而明辨之歟附五苓茵陳散方以茵陳濃煎湯調五苓散二錢服之日三四黃從小便下以小便清為度橘皮湯方橘皮一兩生薑二兩細銼水一升半煎七合去滓分二服稍熱呷之未瘥再服茵陳蒿大黃湯治傷寒發黃面目悉黃小便赤宜服茵陳蒿山梔仁柴胡黃柏蜜塗炙龍膽草各半兩黃芩去黑心升麻大黃炒各一兩上㕮咀每服五錢水一盞半煎至一盞去滓早晚食後溫服茅根湯治傷寒發黃遍身如金色者茅根洗淨銼山梔仁茵陳蒿地骨皮甘草炙各半兩上㕮咀每服五錢用水一盞半生薑三片豆豉六七粒同煎至一盞去滓早晚食遠溫服附陰黃身冷汗出脈沉而黃為陰黃乃太陰經中濕亦有體痛發熱者身如熏黃終不如陽黃之明如橘子色也當叩其小便之利與不利小便自利朮附湯小便不利大便反快者五苓散海傷寒病遇太陽太陰司天若下之太過往往變成陰黃一則寒水太過水來犯土一則土氣不及水來侵之多變此疾一則茵陳茯苓湯加當歸桂枝二則茵陳橘皮湯加薑朮半夏三則茵陳附子湯四則茵陳四逆湯五則茵陳薑附湯六則茵陳吳茱萸湯方見如下發黃小便不利煩躁而渴茵陳湯加茯苓豬苓滑石當歸官桂主之韓氏名茵陳茯苓湯發黃煩躁喘嘔不渴茵陳湯加陳皮白朮生薑半夏茯苓主之韓氏名茵陳陳皮湯發黃四肢遍身冷者茵陳湯加附子甘草主之韓氏名茵陳附子湯發黃肢體逆冷腰上自汗茵陳湯加附子乾薑甘草主之韓氏名茵陳薑附湯發黃冷汗不止者茵陳湯加附子乾薑主之韓氏名茵陳附子湯發黃前服薑附諸藥未已脈尚遲者茵陳加吳茱萸附子乾薑木通當歸主之韓氏名茵陳茱萸湯趙宗顏因下之太過生黃脈沉細遲無力次第用藥至茵陳附子湯大效按海藏次第用藥者謂先投韓氏茵陳茯苓湯次投茵陳陳皮湯又次投茵陳附子湯後趙秀才次第仿此趙秀才得黃病脈寸微尺弱身冷次第用藥至茵陳四逆湯大效傷冷中寒脈弱氣虛變為陰黃仲景理中湯加茵陳服之海往來寒熱一身盡黃者小柴胡加梔子湯主之衍一僧傷寒發汗不徹有留熱身面皆黃多熱期年不愈醫作食黃治之治不對病不去問之食不減尋與此藥服五日病減三分之一十日減三分之二三十日病悉去方用茵陳梔子各三分秦艽升麻各四錢末之每用三錢水四合煎及二合去渣食後溫服以愈為度活五苓加茵陳蒿湯治發黃而渴小便不利茵陳蒿湯十分五苓湯五分上二劑拌勻每服三錢日三服水調下又方傷寒欲發黃者急用瓜蒂末口含水搐一字許入鼻中出黃水甚驗即用茵陳湯調五苓散服之甚效本治頭中濕熱發黃疸瓜蒂散瓜蒂二十枚赤小豆黍米各十四粒上為細末如大豆許一粒納鼻中縮入當出黃水慎不可吹入云結胸發黃太陽附本也以結胸法治之痞氣發黃太陰附本也以痞法治之活問白虎證亦有身熱煩渴引飲小便不利何以不發黃答曰白虎與發黃證相近遍身汗出此為熱越白虎證也頭面汗出頸以下無汗發黃證也少陰病咽痛吐吐利下利但欲寐嗜臥口燥咽乾少陰之為病但欲寐也又欲吐不吐心煩但欲寐五六日自利而渴者理中四逆輩陰證雖云不用麻黃如少陰病始得之反發熱脈沉者麻黃細辛附子湯於六經中但少陰證難辨本經但云脈沉細欲寐小便數而曰背惡寒四肢厥者可不審而知之或雖有惡寒甚者不覺寒或但喜厚衣近火善瞌睡問之則不言怕寒殊不知厚衣即惡寒也善瞌睡即但欲寐也其脈微細或沉澀雖有陰陽俱緊者蓋其人素有熱為表寒外襲故如此但當察其外證為主必以溫藥逐之其陽邪傳入及夫少陰自受熱證宜下宜吐宜和解者多矣仲景雖不言脈滑實沉數諸可下之脈然於證則可知矣脈必相符雖或有反沉微細遲脈不應證者為不可下亦宜涼劑滋陰退陽而愈者其不愈者必待脈有力而後下之可也其有證惡寒急下之者倘反有脈不應病亦宜微下之雖不敢大下亦不可緩也臨病應變之術妙自神會非俗工之所知良醫之所自得六經同法惟少陰傳變與太陽相同如通脈四逆湯四逆散真武湯證俱有加減法謂有或為之證亦猶太陽小青龍小柴胡之類罕有能知斯妙者也少陰經治法有汗下吐溫和解灸刺汗麻黃附子細辛湯麻黃附子甘草湯下大承氣湯抵當湯吐瓜蒂散溫四逆湯桂枝芍藥湯附子湯桃花湯吳茱萸湯白通湯白通加豬膽汁湯真武湯通脈四逆湯和解桂枝甘草龍骨牡蠣湯黃連阿膠湯豬膚湯甘草湯桔梗湯苦酒湯半夏散豬苓湯四逆湯灸灸少陰經云尺寸俱沉者少陰受病也以其脈貫腎絡於肺系舌本故口燥舌乾而渴少陰之為病脈微細但欲寐也少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利少陰病始得之反發熱脈沉者麻黃附子細辛湯主之張或云論傳經之邪自三陽而傳至太陰太陰則傳少陰此不言傳經而言始得之何也夫傳經者古人明理立法之意如此安可執一而論哉夫三陽傷寒多自太陽入次第而傳至厥陰者固有也其三陰傷寒亦有自利不渴始自太陰而入者今少陰病始得之反發熱此自少陰而入者故云始得之緣少陰無身熱而今有熱故言反發熱以不當發熱而熱也為初病邪淺故與麻黃附子細辛湯以發散之少陰病脈細沉數病為在裡不可發汗成少陰病始得之反發熱脈沉者為邪在經可與發汗若脈細沉數為病在裡不可發汗按陰脈沉細今帶數恐人以為熱故舉以告人蓋此數乃沉細之數如經曰數為虛者是也非熱則煩數之數也成注欠發明少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之脈微為亡陽表虛不可發汗脈弱澀為亡陰裡虛復不可下少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也謂初得病二三日常見少陰證以邪未深故須汗以無陽證故微發之而已麻黃附子甘草湯方麻黃去節甘草炙各二兩附子一枚炮去皮破八片上三味以水七升先煮麻黃一兩沸去上沫納諸藥煮取三升去滓溫服一升日三服麻黃甘草之甘以散表寒附子之辛以溫寒氣龐少陰病脈沉不知何沉也且沉緊發汗則動經細沉數為病在裡不可發汗詳此脈或沉而喘或沉而微不甚小是表中寒而里不消脈應里而發熱在表故以小辛之藥溫散而微微取汗也少陰病得之一二日口中和其背惡寒者當灸之附子湯主之背者胸中之府諸陽受氣於胸中而轉行於背內經曰人身之陰陽者背為陽腹為陰陽氣不足陰寒氣盛則背為之惡寒若風寒在表而惡寒者則一身盡寒矣但背惡寒者陰寒氣盛可知如此條是也又或乘陰氣不足陽氣內陷入陰中表陽新虛有背微惡寒者經所謂傷寒無大熱口燥渴心煩背微惡寒白虎加人參湯主之是也一為陰寒氣盛一為陽氣內陷何以明之蓋陰寒為病則不能消耗津液故於少陰病則其口中和及陽氣內陷則熱爍津液為干故於太陽病則口燥舌乾而渴也要辨陰陽寒熱不同者當於口中潤燥詳之附子湯方附子二枚炮去皮破八片白朮四兩茯苓芍藥各三兩人參二兩上五味以水八升煮取三升去滓溫服一升日三服辛以散之附子之辛以散寒甘以緩之茯苓人參白朮之甘以補陽酸以收之芍藥之酸以扶陰所以然者偏陰偏陽則為病水欲實水當平之不欲偏勝也少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之方見不得臥少陰病六七日腹脹不大便者急下之用大承氣湯少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之四逆散方甘草炙枳實破水浸炙乾柴胡芍藥各等分上四味各十分搗篩白飲和服方寸匕日三服咳者加五味子乾薑各五分並主下利悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚炮令拆泄利下重者先以水五升煮薤白三升煮取三升去滓以散三方寸匕納湯中煮取一升半分溫再服少陰病手足逆冷其人若下利後重者此條四逆散加薤白湯若下利脈絶及無脈者通脈四逆湯白通加豬膽汁湯方論見下利若身體骨節痛脈沉者宜附子湯少陰病脈沉者急溫之宜四逆湯方見下利少陰病身體痛手足寒骨節痛脈沉者附子湯主之少陰病脈沉發熱者宜麻黃附子細辛湯少陰病欲解時從子至寅上少陰病惡寒而蜷時自煩欲去衣被者可治少陰病下利止而頭眩時時自冒者死少陰中風脈陽微陰浮者為欲愈少陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得寤寐者死少陰病六七日息高者死少陰病脈緊至七八日自利脈緊變暴微厥手足反溫者欲解也論見下利少陰病八九日一身手足盡熱者以熱在膀胱必便血也少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭最難治少陰病四逆惡寒而身蜷脈不至不煩而躁者死少陰病惡寒身蜷而利手足逆冷者不可治戴若兀兀欲吐心煩喜寐或自利口燥而渴或口中和而背惡寒此屬少陰經但少陰用藥有陰陽之分自利而渴者宜豬苓湯蓋陽熱傳入腎少陰經腎系舌本故自利口燥而渴以豬苓湯利腎中之熱不愈則當自大便去之古法合用大承氣湯若難用大承氣湯則用小承氣湯或且進白頭翁湯上項諸藥為陰中涵陽者也泄利下重其人四逆先以水盞半蔥白二根煎一盞去蔥煎四逆散至七分咳加半五味子乾薑各半錢悸加桂枝一錢小便不利加茯苓一錢腹痛加熟附半錢若審是下利清穀手足四逆其人面戴赤或腹痛或乾嘔或咽痛四逆湯倍乾薑面赤者加蔥一根腹痛加芍藥一錢半嘔加生薑咽痛加桔梗一錢若口中和而背惡寒宜正方四逆湯不必加減四逆散四逆湯俱治少陰下利四肢逆冷泄利下重者與下利清穀者一涼一溫又自有陰有陽之別若初得病便見少陰證其人發熱惡寒身疼頭不痛者宜麻黃細辛附子湯微汗之或五積散加熟附半錢或五積散加以順元散但欲寐嗜臥衛氣寤則行陽寐則行陰而寐也必從足少陰始故少陰之為病脈微細但欲寐太陽病十日已去脈浮細嗜臥者外已解也胸滿脅痛者小柴胡湯脈但浮者與麻黃湯此條當是太陽少陽二經合病胸滿雖與前同而脈浮細嗜臥則為表邪已解脅痛為少陽有邪故與柴胡若脈但浮者又當先治太陽也此是設為變通之言非謂服柴胡而脈浮也成注不足遵口躁咽乾但欲寐詳口苦欲吐不吐但欲寐詳吐吐利但欲寐詳吐利下利但欲寐詳下利脈浮汗出多眠若身重息鼾者風溫詳風溫若合目則盜汗出此三陽合病詳盜汗狐惑病默默欲眠目不得閉不欲飲食惡聞食臭其面目乍赤乍黑乍白其聲嗄者甘草瀉心湯咽乾者苦參湯其肛蟲蝕雄黃熏之其脈數無熱目赤眥黑者當歸赤小豆散詳狐惑口燥咽乾已附見口苦咽乾條內咽痛太陽陽明咽痛各一證悉屬熱也太陽治以半夏散陽明治以四逆散加桔梗少陰咽痛有六證熱證者四寒證者二熱者治以豬膚湯甘草湯桔梗湯苦酒湯半夏散寒者治以桂枝幹薑湯真武湯四逆湯厥陰咽痛一法亦熱也治以桔梗湯咽痛皆熱證何獨少陰二證寒耶其一以汗多亡陽故用乾薑附子以復陽溫經也其一以陰盛格陽故用通脈四逆以散陰通陽也太陽病下之脈緊者必咽喉痛半夏湯半夏散及湯方半夏制桂枝甘草炙各等分上㕮咀水煎服少少咽之為散白湯調服方寸匕亦效日三服仲景法為散調服不㕮咀成甘草湯主少陰客熱咽痛桔梗湯主少陰寒熱相搏咽痛半夏散及湯主少陰客寒咽痛陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛詳眩少陰厥陰少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯陽邪傳於少陰為咽痛服甘草湯則瘥若寒熱相搏為咽痛者服甘草湯不瘥與桔梗湯以和少陰之氣甘草湯方甘草二兩上一味以水三升煮取一升半去滓溫服七合日三服桔梗湯方桔梗一兩甘草二兩上二味以水三升煮取一升去滓分溫再服桔梗味辛溫以散寒甘草味甘平以除熱甘梗相合以調寒熱少陰病咽中痛半夏散及湯主之少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之苦酒湯方半夏十四枚洗破棗核大雞子一枚去黃納上苦酒著雞子殼中上二味納半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不瘥更作三劑按苦酒本草注白醯也而成氏復云苦酒之酸豫則以為名義俱乘安知酒之味苦者不可以已咽瘡耶若嫌酒之性熱則下半夏湯更辛況此味苦哉下文發字與斂字自相反脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利傷寒先厥後熱者下利必自止止而反汗出者其喉為痹厥而利發熱則利必止反汗出者亡陽也咽中痛熱上衝也亡陽則陰獨復會於熱則陰陽結而為喉痹也內經曰一陰一陽結為喉痹詳下利咽痛下利兼胸痛者豬膚湯手足厥冷脈微欲絶不惡寒面赤者通脈四逆湯下後復厥逆下部脈不至者麻黃升麻湯並見下利陽毒咽痛面赤斑斑如錦紋唾膿血五日可治七日不可治宜升麻鱉甲湯活人云陽毒升麻湯主之論見陽毒條陰毒咽痛面目青身痛如被杖五日可治七日不可治升麻鱉甲去雄黃蜀椒湯活人云陰毒甘草湯主之論見陰毒條禁忌咽中閉塞不可發汗發汗則吐血氣欲絶手足厥冷欲得蜷臥不能自溫咽中閉塞不可下下之則上輕下重水漿不下臥則欲蜷身急頭眩下利日數十行張或云六經傷寒皆不言咽痛惟少陰篇中有咽痛咽傷之證何也夫少陰咽痛乃經絡所繫蓋少陰之脈上貫肝膈入肺循喉嚨系舌本故有咽傷痛之患內經曰所生病者咽腫上氣嗌乾及痛此經脈所繫邪氣循行而致然也附活半夏桂枝甘草湯治伏氣之病謂非時有暴寒中人伏氣於少陰經始不覺病旬月乃發脈更微弱先發咽痛似傷寒非喉痹之病必下利始用半夏桂枝甘草湯主之此病只二日便瘥古方謂之腎傷寒也次用四逆主之半夏桂枝甘草湯半夏湯洗甘草炙桂心各等分上㕮咀每服四錢水煎候冷少少細呷之趙活人書近來見四樣印本皆是四逆散然四逆散不主咽痛恐刊者之誤不能無疑仲景論云四逆散治少陰病傳邪作熱四肢逆而不溫者今此證蓋是伏寒於少陰經而脈微弱法當溫散既先用半夏桂甘湯溫劑何復用柴胡寒劑繼之此必是四逆湯也何況通脈四逆湯方後有咽痛加桔梗之例用此又何疑焉吳凡咽痛有陰陽二毒凡陽毒咽喉腫痛乃熱極也陰毒咽喉不利乃冷極也陽毒脈浮數而大咽痛吐膿血千金外臺用烏扇膏治之活人用黑奴丸又陽氣獨勝狂躁咽痛脈洪實滑促活人用葶藶苦酒湯治傷寒咽痛用生甘草濃煎湯與之水浸山豆根苦水含之或用鶴蝨草搗汁入米醋漱喉中亦妙劉咽痛有瘡黃柏細辛末吹之凡傷寒腮頰紅腫並咽喉腫痛者刺少商委中出血少商穴在手大指端內側去爪甲角如韭葉以三稜針刺血出愈戴亦有初得病頭痛發熱無陽毒少陰諸證而咽喉自痛者此因感冒後頓用厚衣被堆壅或用蠻法服生薑熱酒即臥遂成上壅或先有壅熱欲取涼快致為外邪所襲既有風寒又有熱壅宜參蘇飲倍桔梗加木香半錢或消風百解散或敗毒散或五積散敗毒散各半帖名交加散吐吐與嘔之別已見嘔門欲吐亦附乾嘔條內宜參考腹滿時痛而吐者太陰病論見腹滿活人云理中湯主之少陰病飲食入口則吐心中嗢嗢欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯成傷寒表邪傳裡至於少陰少陰之脈從肺出絡心注胸中邪既留於胸中而不散者飲食入口則吐心中嗢嗢欲吐陽受氣於胸中邪既留於胸中則陽氣不得宣發於外是以始得之手足寒脈弦遲此是胸中實不可下而當吐其膈上有寒飲亦使人心中嗢嗢而手足寒吐則物出嘔則物不出吐與嘔別焉胸中實則吐而物出若膈上有寒飲則但乾嘔而不吐也此不可吐可與四逆湯以溫其膈少陰病但欲臥不煩而吐五日變自利煩躁不得寐者死詳但欲寐乾嘔吐涎沫頭痛者宜下方吳茱萸湯治吐利手足厥冷煩躁欲死嘔而胸滿吳茱萸湯泡洗生薑各一兩半人參七錢半大棗三枚上㕮咀水煎去滓分二服內經曰寒淫於內治以甘熱佐以苦辛吳茱萸生薑之辛以溫胃人參大棗之甘以緩脾發熱渴欲飲水水入則吐者宜五苓散傷寒本自寒下醫復吐下之寒格更逆吐下脈經作更遂吐食入即出若食入口即吐乾薑黃連黃芩人參湯主之按本自寒下恐是本自吐下玩復字可見蓋胃寒則吐下寒則利胃寒者不宜吐醫反吐之則傷胃氣遂成寒格下文文氣不貫當有缺文乾薑黃連黃芩人參湯方乾薑黃連黃芩人參各三兩上四味以水六升煮取二升去滓分溫再服辛以散之甘以緩之乾薑人參之甘辛以補正氣苦以泄之黃連黃芩之苦以通寒格太陽病吐後汗出不惡寒發熱關脈細數欲食冷食朝食暮吐此為小逆病人脈數為熱當消穀引食而反吐者此因發汗令陽氣微膈氣虛脈乃數也數而客熱者不能消穀以胃中虛冷故也凡服桂枝湯而吐者必吐膿血也注云內熱者服桂枝湯則吐如酒客之類是也吐厥逆者用甘草乾薑湯附活吐有冷熱二證寸口脈數手心熱煩渴而吐以有熱在胃脘也五苓散主之寒多不飲水而吐者理中湯去朮加生薑主之陰證喘促及吐逆者返陰丹入口便住大橘皮湯治動氣在下不可發汗發又無汗心煩骨節疼痛目暈惡寒食則反吐谷不得入先服大橘皮湯吐止後宜服建中湯橘皮一兩半生薑一兩棗子八枚甘草炙半兩人參一錢竹茹半兩上水三大盞煮取一盞分二服病人直患嘔吐而腳弱或疼乃是腳氣當以腳氣治之治見雜病腳氣門吐利腹滿時痛吐利不渴者太陰病論見腹滿活人云理中湯主之病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利桂枝幹薑湯少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯龐云在內踝後跟骨上動脈陷中發熱謂其身發熱也余按少陰之絡非特一穴今曰少陰而不指某穴者針法當隨四時隨運氣以取井榮俞經合不可執泥也龐氏定以為太溪恐非仲景本旨少陰病吐利煩躁四逆者死少陰病下利咳而嘔渴心煩不得眠者豬苓湯主之論見下利少陰病腹痛小便不利四肢重痛自下利或嘔者真武去附子加生薑湯論見下利少陰病下利脈微澀嘔而汗出者當溫其上灸之論見欲寐溫其上謂下有寒氣當溫其上以助陽氣也既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之王叔和入霍亂篇太陽與少陽合病頭痛脅痛往來寒熱自利而嘔者黃芩加半夏生薑湯論見合病發熱汗出不解心中痞硬嘔吐下利者宜大柴胡湯論見痞發汗後水漿不得入口者為逆若更發汗必吐下不止嘔吐而利者名曰霍亂病發熱頭痛身疼惡寒吐利者此名霍亂自吐下又利止復更發熱也霍亂頭疼發熱身疼痛熱多飲水者五苓散主之寒多不飲水者宜理中湯理中湯方人參乾薑炮甘草灸各一兩白朮二兩上銼每服四錢水煎去滓溫服如寒甚者加乾薑一兩半渴欲得水者加白朮一兩半臍上築築者腎氣動也去白朮加桂枝二兩吐多者去白朮加生薑四兩下利多者倍用白朮悸者加茯苓二兩腹滿去白朮加附子一枚服湯後如食頃者飲熱粥一升許自溫勿發揭衣被活人云或四肢拘急或轉筋者亦去朮加附子吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之吐利止而身痛不休者當消息和解其外宜桂枝湯惡寒脈微利止者四逆加人參湯方論見惡寒吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆湯加豬膽汁主之甘草炙二兩乾薑三兩附子大者一枚去皮破八片豬膽汁半合上三味㕮咀水三盞煎至二盞去滓納豬膽汁分作二次溫服其脈即來吐利發汗脈平不煩者以新虛不勝穀氣故也乾嘔而利兼脅痛而表解者宜十棗湯心下痞硬而煩者宜甘草瀉心湯兼厥逆脈微者通脈四逆湯白通加豬膽汁湯詳見前乾嘔門診脈陰陽俱緊至於吐利其脈獨不解緊人惟安靜者是為欲解若脈遲至六七日不欲食此為晚發水停故也此為未解食自可者為欲解霍亂證治已詳雜病門中茲不贅下利成自利者不因攻下而自泄瀉也有表邪傳裡裡虛脅熱而利者有不應攻下而下之遂利者是皆脅熱也又三陽合病皆作自利有發表攻裡和解之不同太陽陽明合病為在表故與葛根湯以汗之太陽少陽合病為在半表半裡故與黃芩湯以和解之陽明少陽合病為少陽邪氣入里故與承氣湯下之且自利不渴者屬太陰藏寒故也下利欲飲水者有熱故也故大便溏小便自可與夫發熱後重泄色黃赤者皆為熱也自利小便色白少陰病形悉具與夫惡寒脈微自利清穀者皆有寒也夫自利固多可溫然腸胃有積結與下焦客邪又非溫劑所能止必也或分利之或攻泄之乃可也經曰理中者理中焦此利在下焦宜赤石脂禹餘糧湯不瘥當利其小便是也少陰病自利清水色純青心下必痛口乾燥與夫下利三部皆平按之心下硬或脈沉而滑或不欲食而譫語或瘥後至年月復發此數者皆腸胃有積結而須攻泄者也此則謂之通因通用又下利雖有表證不可發汗以下利為邪氣內攻走津液而胃虛也經曰下利不可攻表汗出必脹滿是也蓋三陰自利居多然自利家身涼脈靜為順身熱脈大為逆大抵下利脫氣最為難治蓋邪盛正虛邪壅正氣下脫多下利而死經曰少陰病自利復煩躁不得臥寐者死直視譫語下利者死下利日十餘行脈反實者死下利手足厥冷無脈灸之不溫脈不還者死發熱下利至甚厥不止者死此數者皆邪氣壅正氣下脫故死要略曰六腑氣絶於外手足寒五臟氣絶於內利下不禁噫疾成而後藥雖神醫莫能為氣已脫矣孰能為之六經俱有下利之病表裡寒熱治各不同學者宜審太陽傷寒汗表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯太陽和解與陽明合病必自下利葛根湯成傷寒有合病有並病太陽病不解並於陽明者謂之並病三經俱受邪相合病者謂之合病合病者邪氣甚也太陽陽明合病者與太陽少陽合病陽明少陽合病皆言必自下利者以邪氣並於陰則陰實而陽虛邪氣並於陽則陽實而陰虛寒邪氣甚客於二陽二陽方外實而不主裡則裡氣虛故必下利與葛根湯以散經中之邪其脈必浮而長也太陽病外證未除而數下之遂挾熱而利利不止心下痞硬表裡不解者桂枝人參湯張或云仲景論中太陽病桂枝證醫反下之利遂不止與葛根黃連黃芩湯上條又與桂枝人參湯且二證俱系表不解而下之成利者何故用藥有溫涼之異夫二證俱系內虛熱入協熱遂利但脈證不同故用藥有殊耳經言脈促者表未解也喘而汗出者葛根黃連黃芩湯主之夫脈促為陽盛喘而汗出為裡熱其陽盛裡熱與葛根黃連黃芩者理所宜也太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯下利而頭疼胸滿或口苦咽乾或往來寒熱其脈或大而弦是也黃芩湯方黃芩三兩芍藥甘草各二兩大棗十二枚擘上四味以水一斗煮取三升去滓溫服一升日再夜一服虛而不實者苦以堅之酸以收之黃芩芍藥之苦酸以堅斂腸胃之氣弱而不足者甘以補之甘草大棗之甘以補固腸胃之弱黃芩加半夏生薑湯黃芩湯內加半夏半升洗生薑三兩切太陽少陽並病而反下之結於胸中成為結胸心下硬下利不止水漿不下其人心煩生薑瀉心湯大黃黃連瀉心湯小陷胸湯張凡合病皆下利各從外證以別焉夫太陽病頭項痛腰脊強陽明病目痛鼻乾不得臥少陽病胸脅痛耳聾凡遇兩經陽證病齊見而下利者曰合病也雖然但見一證便是不必悉具然仲景不言脈證止言太陽與少陽合病者以前章所論包含以上之證即此理也況各經之證所見不一難為定論太陽病桂枝證反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯葛根黃芩黃連湯方葛根半斤甘草炙黃芩各二兩黃連三兩上四味以水八升先煮葛根減二升納諸藥煮取二升去滓分溫再服內經曰辛甘發散為陽表未解者散以葛根甘草之甘苦以堅裡氣弱者堅以黃芩黃連之苦太陽病下之脈促不結胸者為欲解脈沉滑者協熱利脈浮滑者必下血黃芩湯太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也黃芩湯傷寒中風反下之利遂不止穀不化腹中雷鳴心下硬滿乾嘔心煩不安醫見其痞復下之痞益甚此非結熱以胃中空虛客氣上逆故使硬也甘草瀉心湯傷寒汗解後胃中不和心下痞硬幹噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯傷寒十三日不解過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者俗醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯太陽病二日反躁反尉其背而大汗出火熱入胃水竭躁煩必發譫語十餘日振栗自下利者為欲解也傷寒醫下之續得下利清穀不止身痛者急當救里四逆湯身痛清便自調者急當救表桂枝湯成傷寒下之續得下利清穀不止身痛急當救里以裡氣不足必先救之急與四逆湯得清便自調知裡氣已和然後急與桂枝湯以救表身疼者表邪也內經曰病發而不足標而本之先治其標後治其本此以寒為本也四逆湯方甘草炙二兩乾薑一兩半附子一枚去皮破八片一用附子去皮臍先將鹽水薑汁各半盞用砂罐煮七沸後入甘草黃連各半兩再加童便半盞再煮七沸住火良久撈起入瓷器盛貯受地氣一晝夜取出曬乾以備後用庶無毒害頂圓修正一兩一枚者佳上三味㕮咀以水三升煮取一升二合去滓分溫再服強壯人可用大附子一枚乾薑三兩成四肢者諸陽之本陽氣不足陰寒加之陽氣不相順接是致手足不溫而成四逆此湯申發陽氣走散陰寒溫經暖肌故以四逆名也內經曰寒淫於內治以甘熱卻陰扶陽必以甘為主是以甘草為君內經曰寒淫所勝平以辛熱逐寒正氣必先辛熱是以乾薑為臣內經曰辛以潤之開發腠理致津液通氣也暖肌溫經必憑大熱是以附子為使此奇制之大劑也四逆屬少陰少陰者腎也腎肝位遠非大劑不能達內經曰遠而奇偶制大其服此之謂也傷寒服湯藥下利不止心下痞硬服瀉心已復以他藥下之利不止治以理中利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯復利不止當利小便或用豬苓湯赤石脂禹餘糧湯方赤石脂一斤碎禹餘糧一斤碎以上二味以水六升煮取二升去滓分三服傷寒十三日不解胸脅滿而嘔日晡潮熱已而微利此本柴胡證下之不利今反利者誤以丸藥下之也潮熱者實也先宜柴胡以解外後以柴胡加芒硝太陽病過經十餘日心下溫溫欲吐胸中痛大便反溏腹微滿鬱郁微煩先時自極吐下者調胃承氣湯陽明病潮熱大便溏小便尚可胸脅滿者小柴胡湯病人無表裡證發熱七八日雖脈浮數者可下下之脈數不解而下利不止必便膿血也黃芩湯柏皮湯陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜大承氣湯成陽明土少陽木二經合病氣不相和則必下利少陽脈不勝陽明不負是不相剋為順也若少陽脈勝陽明脈負者是鬼賊相剋為正氣失也脈經曰脈滑者為病食也又曰滑數則胃氣實下利者脈當微厥今脈滑數知胃有宿食與大承氣湯以下除之臟結如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊舌上白苔滑者難治太陰太陰為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬自利不渴者屬太陰以其臟有寒故也當溫之宜服四逆輩張經言輩字者謂藥性同類惟輕重優劣不同耳凡太陰自利不渴師言有用理中而愈者甚則理中加附子而獲安者凡言輩者蓋如此夫四逆湯甘辛相合乃大熱之劑苟輕用之恐有過度之失所以仲景不為定擬也莫若以理中循循而用之至為平穩如不得已者四逆方可為用也太陰為病脈弱其人續自便利設當行芍藥大黃者宜減之以其人胃氣弱易動故也成腹滿痛者太陰病也脈弱其人續自便利則邪雖在裡未成大實欲用大黃芍藥攻除滿痛者宜少與之以胃氣尚弱易於動利也傷寒脈浮而緩手足自溫者系在太陰當發身黃若小便自利者不發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也平胃散加穿山甲少陰病欲吐不吐但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也欲吐不吐心煩者表邪傳裡也若腹滿痛則屬太陰此但欲寐則知屬少陰五六日邪傳少陰之時也自利不渴者寒在中焦屬太陰此自利而渴寒在下焦屬少陰按寒在下焦之説不通未聞寒在下焦而渴者小便色白下焦虛寒可知惟其虛故藉外水以自救非熱而作渴也故活人云四逆湯主之若小便不白而黃赤則不在此例故厥陰篇又曰下利欲飲水者以有熱故也白頭翁湯主之少陰病下利咽痛胸滿心煩者豬膚湯豬膚湯方豬膚一斤上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和之溫分六服豬水畜也其氣先入腎少陰客熱是以豬膚解之加白蜜以潤躁除煩白粉以益氣斷利少陰病四逆或泄利下重者四逆散方見前條少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯方見渴少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯孫竇大郎患傷寒經十餘日口燥舌乾而渴心中疼自利清水衆醫皆知守但調理耳汗下皆所不敢竇氏親故相謂曰傷寒邪氣害人性命甚速安可以不決之疾投不明之醫乎召孫至曰即日不可下明日正當下投小承氣湯遂大便通得睡明日平復衆皆曰此證緣何下之而愈孫曰不深於書徒知有書耳不知書之奧也口燥舌乾而渴豈非少陰證乎少陰證固不可下豈不知少陰一證自利清水心下痛者下之而愈仲景之書明有是説也衆皆欽服少陰病下利惡寒而蜷手足溫者可治四逆湯少陰二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之詳腹痛桃花湯方赤石脂一斤一半全用一半節末乾薑一兩粳米一升上三味以水七升煮米令熟去滓溫服七合納赤石脂末方寸匕日三服若一服愈余勿服澀可去脫赤石脂之澀以固腸胃辛以散之乾薑之辛以散裡寒粳米之甘以補正氣少陰病二三日至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之詳腹痛真武湯方茯苓三兩生薑切芍藥各三兩白朮二兩附子一枚炮去皮破八片上五味以水八升煮取三升去滓溫服七合日三服脾惡濕甘先入脾茯苓白朮之甘以益脾逐水寒淫所勝平以辛熱濕淫所勝佐以酸平附子芍藥生薑之酸辛以溫經散濕加減法若咳者加五味子半升細辛乾薑各一兩氣逆咳者五味子之酸以收逆氣水寒相搏則咳細辛乾薑之辛以散水寒若小便利者去茯苓小便利無伏水故去茯苓若下利去芍藥加乾薑二兩芍藥之酸泄氣乾薑之辛散寒若嘔者去附子加生薑足前成半斤氣逆則嘔附子補氣生薑散氣千金曰嘔家多服生薑此為嘔家聖藥成真武北方水神也水氣在心下外帶表而屬陽必應發散故治以真武湯青龍湯主太陽病真武湯主少陰病少陰腎水也此湯可以和之脾惡濕腹有水氣則脾不治脾欲緩急食甘以緩之滲水緩脾以甘為主故以茯苓甘平為君白朮甘溫為臣內經曰濕淫所勝佐以酸辛除濕正氣是用芍藥酸寒生薑辛濕為佐也內經曰寒淫所勝平以辛熱溫經散濕是以附子辛熱為使也水氣內漬散行不一故有加減之方焉咳者水寒射肺也肺氣逆者以酸收之五味子酸而收也肺惡寒以辛潤之細辛乾薑辛而潤也若小便利者去茯苓茯苓專滲泄也小便不利者去芍藥以酸澀也加乾薑以散寒也氣上逆則嘔附子補氣故去之生薑散氣故加之則氣順嘔止矣少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之通脈四逆湯方此方與四逆湯同但此倍乾薑耳甘草二兩炙附子大者一枚生用去皮破八片乾薑三兩強者可用四兩上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面色赤者加蔥九莖蔥味辛以通陽氣腹中痛者去蔥加芍藥二兩芍藥之酸通寒利腹中痛為氣不通也嘔者加生薑二兩辛以散之嘔為氣不散也咽痛者去芍藥加桔梗一兩咽中如結加桔梗則能散之利止脈不出者去桔梗加人參二兩利止脈不出者亡血也加人參以補之經曰脈微而利亡血也四逆加人參主之脈病皆與方相應者乃可服之少陰病下利白通湯主之少陰主水少陰客寒不能制水故自利也白通湯溫里散寒少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯後脈暴出者死微續者生少陰病下利脈微為寒極陰勝與白通湯復陽散寒服湯利不止厥逆無脈乾嘔煩者寒氣太甚內為格拒陽氣逆亂也與白通湯加豬膽汁湯以和之內經曰逆而從之從而逆之又曰逆者正治從者反治此之謂也服湯脈暴出者正氣因會泄而脫也故死脈微續者陽氣漸復也故生白通湯方蔥白四兩乾薑一兩附子一枚生用去皮破八片上三味以水三升煮取一升去滓分溫再服內經曰腎苦燥急食辛以潤之蔥白之辛以通陽氣薑附之辛以散陰寒白通加豬膽汁湯方蔥白四莖乾薑一兩附子一枚生去皮破八片人尿五合豬膽汁一合以上三味以水三升煮取一升去滓納膽汁人尿和令相得分溫再服如無豬膽亦可用內經曰若調寒熱之逆冷熱必行則熱物冷服下嗌之後冷體既消熱性便發由是病氣隨愈嘔噦皆除情且不違而致大益此和人尿豬膽汁鹹苦寒物於白通湯熱劑中要其氣相從則可以去格拒之寒也張或謂白通湯及白通加豬膽湯真武湯與通脈四逆湯皆為少陰下利而設除用薑附相同其餘之藥俱各殊異何也蓋病殊則藥異夫少陰下利寒氣已甚非薑附則不能治然下利之理無殊而兼有之證不一用藥故不同耳亦各從其宜也如白通湯用薑附以散寒止利加蔥白以通調陽氣若利而乾嘔煩者寒氣太甚內為格拒薑附非煩者之所宜薑附必嘔而不納加人尿豬膽汁於白通湯中候溫冷而服之人尿豬膽汁皆鹹苦性寒之物是以納而不阻至其所則冷體既消熱性便發真武湯治少陰病二三日不已至四五日腹滿小便不利四肢沉重疼痛自下利者為有水氣故多或為之證夫水氣者寒濕也腎主之腎病不能制水水飲停蓄為水氣腹痛寒濕內甚也四肢沉重疼痛寒濕外甚也小便不利自下利者濕甚而水穀不能別也經曰脾惡濕甘先入脾茯苓白朮之甘可以益脾逐水寒濕所勝平以辛熱濕淫所勝佐以酸辛附子芍藥生薑之酸辛以溫經散濕太陽篇中小青龍湯證亦為有水氣故多或為之證如真武湯者不殊此理也通脈四逆治少陰下利清穀裡寒外熱手足厥逆脈微欲絶者為裡寒身熱惡寒而面色赤為外熱此陰甚於內格陽於外不相通與通脈四逆湯以散陰通陽其或為之證依法加減而治之以上四證俱云下利而兼有或為之證不一是以用藥大同而小異也又曰或云白通湯用附子凡四證惟真武湯一證熟用余皆生用何也凡附子生用則溫經散寒非乾薑佐之則不可炮熟則益陽除濕用生薑相輔以為宜矣乾薑辛熱故佐生附為用生薑辛溫少資熟附之功原佐使之元無出此理然白通等湯以下利為重其真武湯證以寒濕為先故用藥有輕重之殊耳蓋寒淫風濕大體頗同如太陽下篇桂枝附子湯治寒濕相搏附子亦用炮熟仍用生薑以佐之其生熟之用輕重之分無過此理也少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也成咳而下利者裡寒而亡津液也反以火劫強責少陰汗者津液內竭加火氣煩之故譫語小便難也少陰病下利便膿血者可刺少陰病下利脈微澀嘔而汗出必數更衣反少者當其上灸之少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈少陰病脈微沉細欲臥汗出而煩欲吐自下利復煩躁不得寐者死少陰病下利止而頭眩時時自冒者死龐此合是少陽冒昧汗濈然出脈勻小浮者生少陰無眩冒之證少陰病惡寒身蜷而利手足逆冷者不治厥陰傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也詳厥傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹下利寸脈反浮數尺中自澀者必清膿血黃連阿膠湯黃芩湯成下利者脈當沉而遲反浮數者里有熱也澀為無血尺中澀者腸胃血散也熱隨利下必便濃血清與圊通脈經曰清者廁也熱利下重者白頭翁湯主之利則津液少熱則傷氣氣虛下利致後重也與白頭翁湯散氣厚腸下利欲飲水者以有熱故也白頭翁湯主之渴自利不為臟寒與四逆以溫臟下利飲水為有熱與白頭翁湯以涼中按少陰自利而渴乃下焦虛寒而用四逆者恐不可以渴不渴分熱寒也正當以小便黃白別之耳白頭翁湯方白頭翁二兩黃柏秦皮黃連各三兩上四味以水七升煮取二升去滓溫服一升不愈更服一升內經曰腎欲堅急食苦以堅之利則下焦虛是以純苦之劑堅之下利脈數有微熱汗出今自愈設復緊為未解乾薑黃連人參湯下利脈數而渴者今自愈設不瘥必清膿血以有熱故也黃連湯下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死成沉為在裡弦為拘急裡氣不足是主下重大則病進為利未止脈微數弱者邪氣微而陽氣復為欲自止雖發熱止由陽勝非大逆也脈沉弦四逆之類脈大葛根黃芩黃連湯傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黃升麻湯主之成傷寒六七日邪傳厥陰之時大下之後下焦氣虛陽氣內陷寸脈遲而手足厥逆下部脈不至厥陰之脈貫膈上注肺循喉嚨在厥陰隨經射肺因亡津液遂成肺痿咽喉不利而唾膿血也金匱要略曰肺痿之病從何得之被快藥下利重亡津液故得之若泄利不止者為裡氣大虛故云難治與麻黃升麻湯以調肝肺之氣麻黃升麻湯方麻黃去節二兩半升麻當歸各一兩二錢半知母黃芩葳蕤各十八銖石膏碎綿裹白朮乾薑芍藥天門冬去心桂枝茯苓甘草炙各六銖上十四味以水一斗先煮麻黃一兩沸去上沫納諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈成玉函曰大熱之氣寒以取之甚熱之氣以汗發之麻黃升麻之甘以發浮熱正氣虛者以辛潤之當歸桂薑之辛以散寒上熱者以苦泄之知母黃芩之苦涼心去熱津液少者以甘潤之茯苓白朮之甘緩脾生津肺燥氣熱以酸收之以甘緩之芍藥之酸以斂逆氣葳蕤門冬石膏甘草之甘潤肺除熱厥陰病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止詳厥陰病傷寒四五日腹中痛若轉氣下趣少腹者此欲自利也詳腹痛脈浮而遲表熱裡熱下利清穀四逆湯大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯下利清穀裡寒外熱汗出而厥者通脈四逆湯大汗若大下利而厥冷者四逆湯下利清穀不可攻表汗出必脹滿四逆湯傷寒先厥後發熱而利者必自止見厥復利四逆湯下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥下虛故也四逆湯下利後脈絶手足厥冷晬時周時也脈還手足溫者生脈不還者死或用白通湯通脈四逆湯下利後更煩按之心下濡者虛煩也梔子豉湯下利譫語有燥屎也宜小承氣湯下利手足厥冷無脈者灸之不溫若脈不還反微喘者死少陰負趺陽者為順也少陰腎水趺陽脾土下利為腎邪干脾水不勝土則為微邪故為順也下利有微熱而渴脈弱者今自愈傷寒發熱下利厥逆躁不得臥者死傷寒發熱下利至甚厥不止者死金匱要略曰六腑氣絶於外者手足寒五臟氣絶於內者利下不禁傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也傷寒至七日為邪正相爭之時正勝則生邪勝則死始不下利而暴忽發熱下利汗出不止者邪氣勝正陽氣脫也故死傷寒下利日十餘行脈反實者死下利者裡虛也脈當微弱反實者邪氣勝也故死難經曰脈不應病病不應脈是為死病發熱而厥七日下利者為難治發熱而厥邪傳裡也至七日傳經盡則正氣勝邪當汗出而解反下利則邪氣勝裡氣虛為難治戴自利須辨陰陽三陽自利各於本經見之太陽與陽明合病下利頭痛腰疼肌熱目疼鼻乾宜葛根湯太陽與少陽合病下利身熱胸脅痞滿而嘔或往來寒熱目疼鼻乾宜大柴胡湯大抵陽熱之利與陰寒之利自不同陽利糞色必焦黃熱臭出作聲臍下必熱得涼藥則止得熱藥愈增陰利必洞下清穀糞色或白或淡黃臍下多寒宜溫中止瀉之劑此陰利陽利指陰陽二氣而言非曰陰陽二經也緣陰中亦自有陽利不可因下利便以為陰也又有內不大滿猶生寒熱未可下而便下之內虛熱入挾熱自利臍下必熱大便赤黃色及下腸間津汁垢膩名曰利腸宜白頭翁湯黃芩湯要知均為自利身不熱手足自溫者太陰身體四逆者少陰厥陰其餘身熱下利皆屬陽經然陰利有反發熱或初病無熱利後卻熱或初得病即身熱繼而自利此陰利非陽傳陰經之利詳見前條發熱證又有大便五六日以藥利之利遂不止用極熱劑方瘥陽有利陽有祕當更以他證別之外熱內煩下利上渴或痞或痛或嘔常法多用黃芩湯半夏瀉心湯亦可不若生薑瀉心湯之當用溫膽湯加入黃連其中枳殼去取在人吳凡自利者不因攻下而自瀉利俗言漏底傷寒是也有協熱有協寒俱宜詳辨原病式曰瀉白為寒青黃紅黑皆為熱也太抵瀉利完穀不化色不變有如驚溏或吐利腥臭小便澄徹清冷口無燥渴其脈或沉細或遲微無力或身雖熱手足逆冷惡寒蜷臥此皆為寒也凡熱證則口中燥渴小便或黃赤或澀而不利或所下如垢膩之狀其脈多數或浮或滑或弦或大或洪或有邪熱不殺穀其物不消化者當以脈證別之凡胃虛內熱煩渴瀉利脈弱者七味人參白朮散若發熱者參胡三白湯去黃芩加炒黃連若腹滿小便不利者五苓散合理中湯若嘔者加藿香半夏生薑陳皮如濕多而瀉不止者加蒼朮白朮如腹脹者加厚朴腹疼不止加炒白芍肉桂木香溫之凡傷寒作利脈浮表未解者仲景以小青龍湯去麻黃加蕘花二錢炒令赤色蓋散表邪兼治水也若小便不利大便水瀉不止者宜五苓散水甚不解亦加蕘花一錢以行水水行利自止也凡下利不可發汗當先治利止內實正氣得復邪氣得解則汗出而愈也蓋利下由內虛若加發汗則內外皆虛變證為難治也附活寒毒入胃者臍下必寒腹脹滿大便黃白或青黑或下利清穀宜四逆湯理中湯白通加附子湯四逆加薤白散挾熱利者臍下必熱大便赤黃色及腸間津液垢膩宜黃芩湯白頭翁湯三黃熟艾湯薤白湯赤石脂丸三黃熟艾湯治傷寒四日而大下熱利時作白通湯諸藥多不得止宜服此湯除熱止利黃芩黃連黃柏熟艾半雞子大上㕮咀水煎溫服薤白湯治傷寒下利如爛肉汁赤帶下伏氣腹痛諸熱悉皆主之豆豉半合綿裹薤白一握山梔七枚上㕮咀用水二升半先煮梔子十沸下薤白煎至二升下豉煎取一升二合溫服赤石脂丸治傷寒熱利赤石脂乾薑炮各一兩黃連當歸各二兩為末煉蜜丸如桐子大每服三十丸米飲下日三服濕毒氣盛者利下腹痛大便如膿血或如爛肉汁宜桃花湯地榆散黃連阿膠湯地榆散治傷寒熱毒不解日晚即壯熱腹痛便利膿血地榆犀角屑黃連炒葛根各一兩梔子半兩黃芩一兩上㕮咀每服五錢水一盞入薤白五寸同煎溫服海黃連阿膠湯治傷寒熱毒入胃下利膿血黃芩炒二兩山梔半兩阿膠炒黃柏各一兩上㕮咀每服四錢水煎服云傷寒汗下後大小便利而腹中痛者宜燥腸丸附子炮一枚龍骨半兩乾薑一兩吳茱萸粟殼訶黎皮各半兩為細末酒糊丸桐子大每服三十丸溫水下利止勿服傷寒汗下后里急後重下利者宜七宣丸大黃一兩木香檳榔柴胡訶子皮甘草各半兩桃仁三十枚去皮尖上為細末煉蜜丸如桐子大每服五十丸溫水下傷寒汗下後氣逆利不止者寒也宜枳實芍藥甘草湯芍藥甘草枳實炒乾薑炮各半兩上㕮咀每服三錢水煎服厥陰病氣上衝心飢不欲食吐蛔蟲厥少腹滿囊縮厥陰之為病煩滿囊縮其脈尺寸俱微緩若微浮為欲解不浮為未愈宜小建中湯脈浮緩者必囊不縮外證必發熱惡寒似瘧為欲愈宜桂枝麻黃各半湯若尺寸脈俱沉短者必是囊縮毒氣入臟宜承氣湯下之大抵傷寒病臟腑傳變陽經先受病故次第傳入陰經以陽主生故太陽水傳足陽明土土傳足少陽木為微邪也陰主殺故木傳足太陰土土傳足少陰水水傳足厥陰木至六七日當傳厥陰肝木必移氣克於脾土脾再受賊邪則五臟六腑皆困而危殆榮衛不通耳聾囊縮不知人而死矣速用承氣湯下之可保五死一生古人云脾熱病則五臟危又云土敗木賊則死若第六七日傳厥陰脈得微緩微浮為脾胃脈也故知脾氣全不再受克邪無所容否極泰來榮衛將覆水升火降則寒熱作而大汗解矣厥陰經治法有汗下吐溫和解灸汗麻黃升麻湯桂枝湯桂枝茯苓白朮湯下小承氣湯三黃瀉心湯吐瓜蒂散梔子豉湯溫烏梅丸真武湯當歸四逆湯當歸四逆加吳茱萸生薑湯吳茱萸湯附子乾薑湯理中湯通脈四逆湯和解甘桔湯白虎湯乾薑黃連黃芩人參湯白頭翁湯小柴胡湯灸厥陰脈促灸下利厥灸內經曰尺寸俱微緩者厥陰受病也其脈循陰器絡於肝故煩滿而囊縮查厥陰篇缺囊縮證楊仁濟曰婦人則乳縮龐氏曰微緩者囊必不縮若外證發熱惡寒似瘧為欲愈候宜桂枝麻黃各半湯也若尺寸俱沉短者囊必縮宜承氣湯下之厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食即吐蛔下之利不止成邪傳厥陰則熱已深也邪自太陽傳至太陰則腹滿而嗌乾未成渴也邪至少陰者口燥舌乾而渴未成消也至厥陰成消渴者熱甚能消水故也飲水多而小便少者謂之消渴木能生火火生於木肝氣通心厥陰客熱氣上衝心心中疼熱傷寒六七日厥陰受病之時為傳經盡則當入腑胃虛客熱飢不欲食蛔在胃中無食則動聞食臭而出得食吐蛔此熱在厥陰經也若便下之虛其胃氣厥陰木邪相乘必下利不止烏梅丸桂枝白朮茯苓湯桂枝去桂加茯苓白朮湯方芍藥茯苓白朮各二錢甘草一錢水一盞半生薑三片棗二枚煎至八分去滓服厥陰病渴欲飲水者少少與之愈厥陰中風脈微浮為欲愈不浮為未愈厥陰病欲解時從醜至卯上厥陰木也旺於醜寅卯向旺為解時戴下利清穀者陰中之陰宜進通脈四逆湯或當歸四逆湯加生薑茱萸舌卷囊縮不特陰中之陰有之陽明之熱陷入厥陰亦有之蓋陽明主宗筋宗筋為熱毒風所攻故弗榮而急引舌與睪丸故舌卷囊縮當瀉陽以救陰宜大承氣湯陽傳太陰而利故用小建中湯及小柴胡湯去黃芩加芍藥此一藥治太陰泄利腸鳴而痛已利而痛為虛虛則腸鳴蓋為傳陰之陽氣漸微不敢過用冷劑但以芍藥通壅爾氣上衝心成氣上衝者腹裡氣時時上衝也此汗吐下後之疾雖經下之邪猶在表故也痞病氣上衝咽喉亦由誤汗吐下而生又有病如桂枝證胸中痞氣上衝咽喉不得息瓜蒂散蓋未經汗吐下作膈實故宜吐也厥陰氣上撞心易病氣上衝尤宜消息按條而施治焉氣撞心疼吐蛔者厥陰本病也如氣上衝不吐蛔者為陽證若沖咽不得息者瓜蒂散吐之往來寒熱者奔脈陰拘攣者陰陽易卒口噤者剛痙與汗吐下之後各有證治方法學者詳之厥陰本病方論已見前條病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者胸有寒也當吐之宜瓜蒂散瓜蒂炒黃赤小豆各一分上研為細末取一錢用豉一合湯七合先漬之須臾煎成稀糜去渣取汁相和溫頓服不吐少少加得快吐乃止諸亡血虛家不可與服活瓜蒂散每服一錢匕藥下便臥欲吐且忍之良久不吐取三錢匕湯二合和服以手指探之便吐不吐復稍增之以吐為度若吐少病不除明日如前法再吐之不可令人虛也如藥力過時不吐飲熱湯一升以助藥力吐訖便可食無須更服若服藥過多者飲水解之奔豚氣上衝胸腹痛往來寒熱奔豚湯主之方論見雜病積聚門陰陽易少腹裡急引陰中拘攣熱上衝胸頭重不欲舉眼中生花者宜燒裩散論見陰陽易氣上衝胸口噤不得語欲作剛痙者宜葛根湯論見雜病痙門燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核各一壯與桂枝加桂湯桂枝二兩半芍藥生薑各一兩半甘草一兩大棗六枚上㕮咀每服五錢水煎溫服桂枝加桂以能泄奔豚氣也動氣發汗則氣上衝正在心端論見動氣太陽下後其氣上衝者以桂枝湯方用前法若不上衝者不可與之傷寒吐下後心下逆滿氣上衝胸頭眩脈沉緊若發汗則動經身為振搖者茯苓白朮甘草湯方見振搖傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿附活李根湯治氣上衝正在心端半夏當歸芍藥生薑茯苓桂枝黃芩甘草甘李根白皮各等分上㕮咀每服五錢水煎溫服飢不欲食飢不欲食食則吐蛔者厥陰病論見氣上衝心手足厥冷脈乍緊心煩飢不能食者邪在胸中宜瓜蒂散吐之詳厥太陽病吐發汗出發熱不惡寒關脈細數腹中飢口不能食朝食暮吐者此為小逆論見發熱陽明病下後心中懊憹飢不欲食但頭汗出者宜梔子豉湯論見煩吐蛔蟲氣上衝心疼飢不欲食吐蛔者厥陰病桂枝白朮茯苓湯理中安蛔散蛔厥者其人當吐蛔今病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之蛔厥者其人手足冷而吐蛔也臟厥者死陽氣絶也蛔厥雖厥而煩吐蛔已則靜不若臟厥之躁無暫安時也病人臟寒胃虛蛔動上膈聞食臭出因而吐蛔舌燥口乾常欲冷飲浸口不欲咽蛔上煩躁昏亂欲死兩手脈沉遲足冷至膝甚者連蛔並屎俱出大便祕而不行此證雖出多可救治也宜加味理中安蛔散烏梅丸治之病人有寒復發汗胃中冷必吐蛔活人云先服理中丸次服烏梅丸烏梅丸方烏梅三百個細辛附子炮桂枝去粗皮人參黃柏各六兩當歸蜀椒去汗各四兩乾薑十兩黃連一斤上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得納臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等肺主氣肺欲收急食酸以收之烏梅之酸以收肺氣脾欲緩急食甘以緩之人參之甘以緩脾氣寒淫於內以辛潤之以苦堅之當歸桂椒細辛之辛以潤內寒寒淫所勝平以辛熱薑附之辛熱以勝寒蛔得甘則動得苦則安黃連黃柏之苦以安蛔理中安蛔散陶尚父祕方纍用之效人參三錢白朮白茯苓乾薑各一錢半川椒十四粒烏梅三枚上作一服水二鍾煎七分服凡治蛔不可用甘草並甜物蓋蛔蟲得甘則動於上得苦則安得酸則止得川椒之辛則頭伏於下也凡吐蛔未止加黃連黃柏各五分川椒十四粒若是冷甚者必加附子半錢或三錢量病輕重斟酌之戴胃中冷必吐蛔吐蛔人皆知為陰也然亦有陽證吐蛔者蓋胃中空虛既無穀氣故蛔上而求食至咽而吐又看別證如何不可專以胃冷為説曾記一人陽黃吐蛔又大發斑陽毒證口瘡咽痛吐蛔皆以冷劑取效是亦有陽證矣厥四逆尸厥附四逆者四肢不溫厥者手足冷夫邪在三陽則手足熱傳到太陰則手足溫至少陰則逆而不溫至厥陰則為之厥甚於逆也蓋自熱至溫而四逆至厥者傳經之邪也四逆散主之始得之便厥是陰經受邪陽氣不足四逆湯主之王仲景言四逆與厥者非一或曰四逆或曰厥或曰厥逆厥冷厥寒或曰手足逆冷手足厥逆手足厥冷手足厥逆冷俱是言寒冷耳故厥逆二字每每互言未嘗分逆為不溫厥為冷也既曰不溫則為冷矣尚何異乎然四肢與手足卻有所分以四字加逆字之上者是通指手足臂脛以上言也以手足字加厥逆厥冷等上及無手足字者是獨指手足言也雖然厥逆俱為寒冷卻有陰陽之殊熱極而成厥逆者陽極似陰也仲景以四逆散寒藥治之是也寒極而成厥逆者獨陰無陽也仲景雖無四逆湯熱藥治四逆之條但四逆湯之名由四肢之冷而立今以四逆湯治手足厥冷豈非逆厥之不異乎成氏既謂四逆為熱邪至少陰病死證二條下又謂四逆為寒甚不自悖其説乎是知四逆亦猶厥之有寒有熱但四肢通冷比之手足獨冷則有間耳故仲景曰少陰病吐利煩躁四逆者死又曰少陰病四逆惡寒而蜷脈不至不煩而躁者死又曰少陰病吐利手足厥冷煩躁欲死者吳茱萸湯此三條二為死一為可治雖通由諸證兼見而然然死者以四逆言可治者以厥冷言可見四逆重於厥冷矣成氏謂厥甚於逆豈不謬耶按凡言四逆或言厥言逆者皆為重證若舉四肢而言耳言指頭寒言手足厥與逆與冷者皆為厥微蓋手之上為腕腕上為臂足之上為踝踝之上為脛也其病之輕重淺深皆寓於書法之中不可不審自熱至溫自溫至厥乃傳經之邪四逆散主之厥逆大便祕小便赤或大便黑脈沉而滑此為陽證似陰白虎湯甚者大承氣湯不可誤也太陽傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也真武湯方見下利太陽止有二證皆誤發表所致汗多亡陽故溫之甘草乾薑湯方甘草炙四兩乾薑二兩炮上㕮咀以水三升煮取一升五合去滓分溫再服內經曰辛甘發散為陽甘草乾薑相合以復陽氣陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛傷寒脈滑而厥者里有熱也白虎湯主之三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之少陰病吐利手足厥冷煩躁欲死者吳茱萸湯方見吐少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯脈暴出者死微續者生少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯俱見下利少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散方見少陰病按言四者四肢之省文也四肢者自指至肘足至膝是也其邪為深凡言手足者自指至腕足至踝而已其邪為淺仲景下字不苟得之則輕重淺深一覽瞭然矣趙仲景上文但云少陰病四逆活人第八十問中改作四肢厥逆設遇寒厥下利腹痛而咳者依其言而用四逆散之涼劑可乎夫邪自陽經入里而厥者是熱極而厥也是或可用若直入陰經之寒邪而欲厥者是為以水濟水尤當戒之學者宜詳究焉少陰病惡寒身蜷而利手足逆冷者不治少陰病吐利煩躁四逆者死少陰病四逆惡寒而身蜷脈不至不煩而躁者死少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治但厥無汗熱入里而外寒甚也當溫之而強發其汗則衛寒甚而汗不能出必內傷其榮血而妄行也諸厥者皆屬下但厥為下厥血亡於上為上竭厥陰傷寒先厥後發熱而利者必自止見厥復利四逆散張或云三陰經傷寒太陰為始則手足溫少陰則手足清厥陰則手足厥逆然病至厥陰乃陰之極也何故反有發熱之理蓋陽極則陰生陰極則陽生此陰陽推蕩必然之理也易云窮則變窮者至極之謂也陽至極而生陰故陽病有厥冷之證陰至極而生陽則厥逆者有發熱之條凡言厥深熱亦深者乃事之極而變之常經曰亢則害承乃制是也傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也成金匱要略曰水停心下甚者則悸厥雖寒勝然以心下悸為水飲內甚先與茯苓甘草湯治其厥而後治其水若先治厥則水飲浸漬入胃必作下利茯苓甘草湯方茯苓桂枝去粗皮各二兩生薑三兩切甘草炙一兩上四味以水四升煮取二升去滓分溫三服茯苓甘草之甘益津而和衛桂枝生薑之辛助陽氣而解表傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利吐膿血泄利不止者為難治麻黃升麻湯主之方見下利手足厥寒脈細欲絶者當歸四逆湯主之成手足厥寒者陽氣外虛不溫四末脈細欲絶者陰血內弱脈行不利與當歸四逆湯助陽生陰也當歸四逆湯方當歸桂枝去粗皮芍藥細辛各三兩甘草炙通草各二兩大棗二十五枚擘上七味以水八升煮取三升去滓溫服一升日三服內經曰脈者血之腑也諸血者皆屬心通脈者必先補心益血苦先入心當歸之苦以助心血心苦緩急食酸以收之芍藥之酸以收心氣肝苦急急食甘以緩之大棗甘草通草之甘以緩陰血下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死下利清穀裡寒外熱汗出而厥者通脈四逆湯大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯吐病人手足厥冷脈乍緊者邪結在胸中心中滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散方見氣上衝心傷寒下一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤傷寒一二日至四五日而厥者必發熱是傳經之邪前熱後厥者亦傳經之邪當以厥之微甚辨熱之深淺若厥熱入腑而實者須下去之若反發汗則胃中津液愈燥竭而熱故必口傷爛赤然經云諸四逆者不可下之至此又云應下最宜詳審先賢謂熱厥手足雖厥冷而或有溫時手足雖逆冷而手足掌心必暖戴院使又以指甲之暖冷別熱寒二厥臨病之工慎之諸四逆厥者禁不可下虛家亦然傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之必死傷寒灸脈促手足厥逆者可灸之診凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也成手之三陰三陽相接於手十指足之三陰三陽相接於足十指陽氣內陷陽不與陰相順接故手足為之厥冷也傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者其後必便膿血成先熱後厥者陽邪傳裡也發熱為邪氣在表至四日後厥者傳之陰也後三日復傳陽經則復熱厥少則邪微熱多為陽勝其病為愈至七日傳經盡熱除則愈熱不除者為熱氣有餘內搏厥陰之血其後必大便膿血傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也成始發熱邪在表也至六日邪傳厥陰陰氣勝者作厥而利厥反九日陰寒氣多當不能食而反能食者恐為除中除去也中胃氣也言邪氣太甚除去胃氣胃欲引食自救故暴能食此邪勝也食以索餅試之若胃氣絶得面則必發熱若不發熱者胃氣尚在也恐是寒極變熱因暴熱來而復去使之能食非除中也金匱要略曰病人索不能食而反暴思之必發熱後三日脈之其熱續在者陽氣勝也期之旦日夜半愈若旦日不愈後三日脈數而熱不罷者為熱氣有餘必發癰膿經曰數脈不時則生惡瘡傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈成陰勝則厥陽勝則熱先厥五日為陰勝至六日陽復勝熱亦五日後復厥者陰復勝若不厥為陽全勝故自愈經曰發熱四日厥反三日復熱四日厥少熱多其病為愈傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血指頭寒者是厥微熱少也默默不欲食煩躁者邪熱初傳裡也數日之後小便色白裡熱去欲得食為胃氣已和其病為愈設未欲食宜乾薑甘草湯嘔而胸脅煩滿者少陽證也少陽與厥陰為表裡邪干其府故嘔而胸脅煩滿也肝主血故後必便血少腹滿痛而厥為冷結關元詳少腹滿痛發熱不治而厥七日下利者為難治傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死厥陰六穴豈按四時灸井榮俞經合耶傷寒發熱下利厥逆躁不得臥者死傷寒發熱下利至甚厥不止者死下利手足厥冷無脈者灸之不溫若脈不還反微喘者死附活冷厥者初得病日便四肢逆冷脈沉微而不數足多攣臥時惡寒或自引衣蓋覆不飲水或下利清穀或清便自調或小便數外證多惺惺而靜脈雖沉實按之遲而弱者知其為冷厥也四逆湯理中湯通脈四逆湯當歸四逆湯當歸四逆加吳茱萸生薑湯白通加豬膽汁湯隨證用之熱厥者初中病必身熱頭痛外別有陽證二三日至四五日方發厥兼熱厥者厥至半日卻身熱蓋熱氣深方能發厥須在二三日後也若微厥卻發熱者熱深故也其脈雖伏按之而滑者為裡熱其人或畏熱或飲水或揚手擲足煩躁不得眠大便祕小便赤外證多昏憒者知其熱厥也白虎承氣湯隨證用之又有下證悉具而見四逆者是失下後血氣不通四肢便厥醫人不識卻疑陰厥復進熱藥禍如反掌大抵熱厥須脈沉伏而滑頭上有汗其手雖冷時復指爪溫須用承氣湯下之不可拘忌也諸手足逆冷皆屬厥陰不可汗下然有須汗須下者正謂手足雖逆冷時有溫時手足掌心必暖非正厥逆也當消息之海厥陰證四肢厥冷爪甲青脈沉疾按之有力者為陽則當下宜大承氣湯如脈沉遲按之無力者為陰則當溫宜四逆湯更須速灸之羅省掾曹德裕男婦二月初病傷寒八九日請豫治之脈得沉細而微四肢逆冷自利腹痛目不欲開兩手常抱腋下昏昏嗜臥口舌乾燥乃曰前醫者留白虎加人參湯可服否豫曰白虎雖云治口燥舌乾若只此一句亦未然今此證不可服白虎者有三傷寒證云立夏以前立秋以下不可妄用一也太陽證無汗而渴者不可用二也況病人陰證悉具其時春氣尚寒三也仲景云下利清穀急當救里宜四逆湯五兩人參一兩生薑十餘片連須蔥白九莖水五大盞同煎至三盞去滓分三服一日服之至夜則止手足溫翌日大汗而解繼之以理中湯數服而愈孫真人習業論云凡欲為太醫必須精讀甲乙素問黃帝針經明堂流注十二經絡三候九部本草藥性仲景叔和並須精熟如此方為太醫不則猶無目夜遊動致顛隕執此用藥者再思可矣陽證治驗真定府趙吉夫年三十三至元五月間因勞役飲食失節傷損脾胃時發煩躁而渴又食冷物過度遂病身體困倦頭痛四肢逆冷嘔吐而心下痞醫人不察見其四肢逆冷嘔吐而心下痞乃用桂枝末三錢匕熱酒調下仍以綿衣覆之作陰毒傷寒施治須臾汗大出汗後即加口乾舌澀眼白時紅項強硬肢體不柔和小便淋赤大便祕澀循衣摸床如發狂狀問之則言語錯亂視其舌則赤而欲裂朝輕暮劇凡七八日家人輩悉謂危殆不望生全鄰人吉仲完舉豫治之診其脈七八至知其熱證明矣遂用大承氣湯苦辛大寒之劑一兩作一服服之利下三行折其勝勢翌日以黃連解毒湯大苦寒之劑二兩徐徐服之以去其熱三日後病十分中減五六更與白虎加人參湯約半斤服之瀉熱補氣前證皆退戒以慎起居節飲食月餘漸得平復內經曰凡用藥者無失天時無逆氣宜無翼其勝無贊其復是謂至治又云必先歲氣無伐天和當暑氣方盛之時聖人以寒涼急救腎水之原補肺金之不足雖有客寒傷人仲景云用麻黃湯內加黃芩知母石膏之類恐發黃發斑又用桂枝湯之戒況醫以桂末熟酒調服所謂差之毫釐謬以千里逆仲景之治法經云不伐天和不讚其復不翼其勝不失氣宜不然故疾未已新病起矣用熱遠熱從乎中治友人劉巨源年六十五歲至正夏月因勞役飲食失節又傷冷飲得疾醫者往往以為四時證治之不愈逮十日請豫治診之右手三部脈沉細而微太陰證也左手三部脈微浮而弦虛陽在表也大抵陰多而陽少今所苦身體沉重四肢逆冷自利清穀引衣自覆氣難布息懶言語此脾受寒濕中氣不足故也仲景言下利清穀急當救里宜四逆湯溫之內經有用熱遠熱之戒口乾但漱水不咽早晨身涼而肌生粟午後煩躁不欲去衣昏昏睡而面赤隱隱紅斑見於皮膚此表實裡虛故也內虛則外證隨時而變詳內外之證乃飲食勞倦寒傷於脾胃非四時之證明矣治病必察其下今適當大暑之時而得內寒之病以標本論之時為標也病為本也用寒藥則順時而違本用熱藥則從本而逆時此乃寒熱俱傷必當從乎中治中治者溫之是也遂以錢氏白朮散加升麻就本方加葛根甘草以解其斑少加白朮茯苓以除濕而利小便人參藿香木香和脾胃進飲食㕮咀一兩煎服再服斑退而利止身溫而神出次服異功散治中湯辛溫之劑一二服五日得平止藥或曰病雖稍愈勿藥可乎豫曰藥攻邪也內經曰治病以平為期邪氣既去強之以藥變證隨起不若以飲食調養待其真氣來復此不藥而藥不治而治之理旬日良愈必察其下者謙甫謂時下之宜也活若病人寒熱而厥面色不澤冒昧而兩手忽無脈或一手無脈者必是有正汗也多用綿衣裹手足令溫暖急服五味子湯或兼與麻黃細辛甘草湯之類服之晬時必有大汗而解矣五味子湯治傷寒喘促脈伏而厥人參麥門冬去心杏仁去皮尖生薑陳皮各二錢半大棗二枚五味子半兩上㕮咀水煎服戴陰陽之病皆能發厥故有陽厥有陰厥皆病之深也二厥惟陽厥易誤當問其初得病如何若初得病頭不痛四肢逆冷足多攣臥而惡寒或汗自引衣蓋覆或不渴或利清穀或小便自調人多惺惺而靜此寒厥也是為陰中之陰宜四逆湯附子理中湯若初得病頭痛身熱外別有陽證至五六日方發厥其人雖厥或畏熱或飲水或揚手擲足煩躁不得眠大便祕小便赤多昏憒者此熱厥也是為陰中之陽宜白虎湯或大承氣湯熱厥雖手足冷而指甲卻暖不若寒厥並指甲俱冷此辨陰陽要法也近有陽病自腰以上極熱兩腳常冷蓋三陰脈上不至頭故頭不疼三陽脈下不至足故足冷也南陽謂傷寒手足必微冷若手足自溫者系太陰也説欠分曉若陽明手足安得微冷少陰厥陰而大冷安得言微冷但當言三陰經少陰厥陰手足厥冷惟有太陰手足自溫耳陶陰陽二厥治之一差死生立判陽厥者先自三陽氣分因感寒邪起於頭痛發熱惡寒已後傳進三陰血分變出四逆厥逆乍溫大便燥實譫語發渴揚手擲足不惡寒反怕熱或腹痛後重泄利稠黏小便赤澀脈沉有力此見傳經熱證謂之陽厥陽極發厥者即陽證似陰外雖有厥冷內有熱邪耳蓋因大便失下使血氣不通故手溫乍冷乍溫也如火鍊金熱極金反化水寒極水反成冰而能載物厥微熱亦微四逆散厥深熱亦深大承氣若不明此復投熱藥如抱薪救火夫陰厥者乃三陰血分自受寒邪初病無身熱頭痛就便惡寒四肢厥冷直至臂脛以上過乎肘膝不溫引衣蜷臥不渴兼或腹痛吐瀉小便清白或戰栗面如刀刮口吐涎沫脈沉遲無力此為陰經直中真寒證不從陽經傳入謂之陰厥也輕則理中重則四逆又有病自陽經傳入目下系陰證而厥者亦陰厥也且夫人之手足乃胃土之末凡脾胃有熱手足必熱脾胃有寒手足必寒此理之常也至於亢極反成兼化此又事之變也學者於此宜致力也吳大抵傷寒發厥正氣已極宜速加治夫陽厥者必先因熱甚不解而致劉河間謂肢體厥冷惟心胸有熱大便祕者以涼膈散養陰退陽不宜速下若大便不祕者以黃連解毒湯主之凡厥證可下者內有燥屎也以手摩病人臍腹或硬滿或痛者是也若腹中轉失氣氣出極臭者或繞臍刺痛者以有燥屎也輕則調胃承氣重則大承氣或用涼水調下元明粉一二錢亦佳或用雞清入蜜水和一甌調入好芒硝末二三錢最效大抵陽厥以脈滑別之則無差也凡陰厥者必先因腎氣虛寒或復著外寒或誤服寒涼之藥或誤下之則積陰盛於下微陽衰於上遂發厥逆其脈沉細而微按之全無者是也宜四逆湯急溫之冷甚者治例與陰毒同也凡尸厥者經言少陰脈不至腎氣微奔氣促迫宗氣反聚血結心下陽氣退下熱歸陰股而為尸厥也急宜刺期門巨闕昔扁鵲治虢太子病尸厥針三陽五會穴而愈蓋以陽脈下墜陰脈上爭宗氣聚而不通上有絶陽之絡下有破陰之紐破陰絶陽之色以發脈亂故形靜厥冷昏沉如死人之狀名曰尸厥宜陰毒例中求之凡傷寒寒熱而厥面色不澤冒昧兩手無脈或一手無脈此將有好汗出如亢陽欲雨之狀多用綿衣包暖手足急用五味子湯或兼與桂枝麻黃各半湯汗之而愈若脈不至汗不出者死針灸治傷寒手足逆冷大都一分傷寒六脈俱無復溜補大回六脈合谷中極支溝一寸半此穴和脈絶穴復溜順骨而下巨闕三寸三分氣衝灸七壯尸厥少陰脈不至腎氣微少精血奔氣促迫上入胸膈榮氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥當刺期門少腹滿少腹急臍下為少腹夫胸中滿心下滿皆氣也腹滿者多有燥屎也少腹滿者有物聚也蓋身半以上同天之陽身半以下同地之陰清陽出上竅濁陰出下竅故在上滿者氣也在下滿者物也物者溺與血爾邪結下焦則津液不通血氣不行或溺或血流滯而脹滿也若小便利者蓄血之證小便不利溺澀證也俱是熱病惟冷結膀胱少腹滿一證為寒病有手足厥冷為可辨太陽傷寒表不解乾嘔發熱而咳或小便不利少腹滿者小青龍去麻黃加茯苓湯主之詳咳太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之成太陽經也膀胱府也此太陽瘀熱隨經入腑者也六七日者邪氣傳裡之時也脈微而沉邪氣在裡之脈也表證仍在者則邪氣猶淺當結於胸中若不結於胸中其人發狂者熱結在膀胱也經曰熱結膀胱其人如狂此發狂則熱又深也少腹硬滿小便不利者為無血也小便自利者血證諦也與抵當湯以下蓄血傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸成傷寒有熱少腹滿是蓄血於下焦若熱蓄津液不通則小便不利其熱不蓄津液而蓄血不行小便自利者乃為蓄血當與桃仁承氣湯抵當湯下之然此無身黃屎黑又無喜忘發狂是未至於甚故不可與其餘駛峻之藥也可與抵當丸小可下之也太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之身黃脈沉結少腹硬小便不利者胃熱發黃也可與茵陳湯身黃脈沉結少腹硬小便自利其人如狂者非胃中瘀熱為熱結下焦而為蓄血也與抵當湯以下蓄血太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之活人曰晝夜譫語喜忘少腹滿小便不利男子為瘀血婦人為熱入血室抵當湯厥陰尺寸脈微緩者厥陰受病也當六七日發其證少腹煩滿而囊縮病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也小腹下焦所治當膀胱上口主分別清濁或用真武湯脅下素有痞連在臍旁痛引少腹入陰筋者名臟結死或云此有動氣犯汗吐下者死少腹急太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯下血抵當湯解表桂枝湯太陽膀胱經也太陽經邪熱不解隨經入腑為熱結膀胱其人如狂者為未至於狂但不寧爾經曰其人如狂者以熱在下焦太陽多熱熱在膀胱必與血相搏若血不為蓄為熱迫之則血自下血下則熱隨血出而愈若血不下者則血為熱搏蓄積於下而少腹急結乃可攻之與桃核承氣湯下熱散血內經曰從外之內而盛於內者先治其外後調其內此之謂也身重少氣少腹裡急或引陰中拘攣熱上衝胸為陰陽易病治見本門囊縮仲景無治法今採南陽海藏治法補之扁鵲曰舌卷囊縮者死孫真人曰陰陽易病卵縮則舌吐出死凡囊縮有熱極而縮者有冷極而縮者凡熱極者有可下冷極者宜急溫之下之宜大承氣湯溫之宜附子四逆加茱萸湯並艾灸關元氣海蔥尉等法治之活傷寒六七日煩滿囊縮其脈尺寸俱微緩者足厥陰肝經受病也厥陰病其脈微浮為欲愈不浮為未愈宜小建中湯脈浮緩者必囊不縮外證必發熱惡寒似瘧為欲愈宜桂枝麻黃各半湯若尺寸俱沉短者必是囊縮毒氣入腹宜承氣湯下之大抵傷寒病臟腑傳變陽經先受病故次傳入陰經以陽主生故太陽水傳足陽明土土傳足少陽木為微邪也陰主殺故木傳足太陰土土傳足少陰水水傳足厥陰木至六七日當傳厥陰肝木必移氣克於脾土脾再受邪則五臟六腑皆因而危殆榮衛不通耳聾囊縮不知人而死矣速用承氣湯下之可保五生一死古人云脾熱病則五臟危又土為木賊則死若第六七日傳厥陰脈得微緩微浮為脾胃脈也故知脾氣全不受克邪無所容否極泰來榮衛將覆水升火降則寒熱作而大汗解矣海厥陰證者煩滿囊縮大小便不通發熱引飲腹滿尺脈微緩煩者火也滿者木也雖不吐蛔囊縮但急者木也火與木相合四肢厥逆而爪甲青大小便不通道塞也發熱引飲邪氣在裡宜溫之下之以上諸證大小便俱通地道不塞不發渴不引飲邪不在裡則宜溫之灸之則裡外相接以復陽氣宜服正陽散正陽散方麝香一錢細研性辛溫治腹急滿痞風毒乾薑炮甘草炙各二錢半附子一兩炮去皮臍味辛鹹溫治風利竅療腹滿囊縮皂莢二兩酥炙去皮弦味鹹溫上為細末每服二錢白湯調溫服回陽丹硫黃半兩味酸溫大熱治心腹腫聚邪氣冷癖左脅氣咳上氣腳冷無力附子炮半兩木香半兩味辛溫療肌中偏寒生氣不足乏精全蠍半兩味甘辛治一切風蓽澄茄半兩味辛溫治皮風心腹氣脹吳茱萸洗炒半兩味辛溫大熱治中風遂邪諸食不消氣逆利五臟順氣乾薑炮二錢半上為末酒糊為丸如梧桐子大生薑湯下三五十丸並二三服並熱投之衣被取汗陰毒仲景但名陰毒主發表陰毒之為病面青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀椒主之方見陽毒王考之仲景書雖有陰毒之名然其所敘之證不過面目青身痛如被杖咽喉痛而已並不言陰寒極甚之證況其所治之方亦不過升麻甘草當歸鱉甲而已並不用大溫大熱之藥是知仲景所謂陰毒者非陰寒之病乃是感天地惡毒異氣入於陰經故曰陰毒耳後之論者遂以為陰寒極甚之證稱為陰毒乃引仲景所敘面目青身痛如被杖咽喉痛數語並而言之卻用附子散正陽散等藥以治竊謂陰寒極甚之證固亦可名為陰毒然終非仲景所以立名之本意觀後人所敘陰毒與仲景所敘陰毒自是兩般豈可混論後人所敘陰毒亦只是內傷冷物或不正暴寒所中或過服寒涼藥所變或內外俱傷於寒而成耳非天地惡毒異氣所中者也活人更名陰毒傷寒主退陰陰毒甘草湯治傷寒時氣初得病一二日便結成陰毒或服藥後六七日以上至十日變成陰毒身重背強腹中絞痛咽喉不利毒氣攻心心下堅強短氣不得息嘔逆唇青面黑四肢厥冷其脈沉細而疾身如被杖咽喉痛五六日可治七日不可治甘草炙桂枝去粗皮升麻當歸各五錢雄黃二錢半蜀椒去閉口者炒去汗及子五錢鱉甲酥炙一兩半上㕮咀水煎服如人行五里許更進一服覆取汗毒從汗出即愈若未汗再服始得陰毒脈沉細疾許陰毒本因腎氣虛冷因欲事或食冷物後傷風內既伏陰外又感寒或先感外寒而後伏陰內外皆陰則陽氣不守遂發頭痛腰重腹痛眼睛痛身體倦怠而不甚熱四肢逆冷額上及手背冷汗不止或多煩渴精神恍惚如有所失或可起行不甚覺重診之則六脈俱沉細而疾尺部短小寸口或無六脈俱浮大或沉取之大而不甚疾者非陰證也若服涼藥過多則渴轉甚躁轉急有此證者急服還陽退陰之藥即安惟補虛和氣而已宜服正元散退陰散五勝散陰證不宜發汗如氣正脈大身熱未瘥者用藥發汗無妨正元散治傷寒如覺風寒吹著四肢頭目骨節疼痛急服此藥如人行五里許再服連進三服出汗立瘥若患陰毒傷寒入退陰散五分同煎或傷冷傷食頭昏氣滿及心腹諸疾服之無有不效麻黃去節陳皮大黃生甘草乾薑肉桂芍藥附子吳茱萸半夏制各等分上㕮咀麻黃加一半茱萸減一半為末每服一錢水一盞薑三片棗一枚煎七分熱服以衣被蓋覆取汗切須候汗乾去之如陰毒不可用麻黃免更出汗退陰散治陰毒傷寒手足逆冷脈沉細頭痛腰重連服三次小小傷冷每服一字入正元散同煎入鹽一捻陰毒傷寒咳逆煎一服細細熱呷病止川烏乾薑各等分上為粗末炒令轉色放冷再搗為細末每服一錢水一盞鹽一捻煎至半盞去滓溫服五勝散治傷寒頭痛壯熱骨節疼痛昏沉困倦咳嗽鼻塞不思飲食兼治傷寒夾冷氣並慢陰毒神效白朮一兩半甘草五味子石膏各一兩乾薑三兩半上㕮咀每服五錢水一盞入鹽少許同煎服如冷氣相夾入薑棗煎或治陰毒病入艾葉少許煎服海白朮散治陰毒傷寒心悶煩躁四肢厥冷川烏炮去皮臍桔梗附子炮白朮細辛各一兩乾薑炮半兩上㕮咀或末之白湯調下一錢匕羅正陽散治陰毒傷寒手足厥冷指甲青色體冷脈沉細而微神效上用憨蔥四五枝陳蜂房四五個燒存性為細末用憨蔥搗和丸如彈子大手心內握定用手帕緊扎須臾汗出以綿被覆蓋如手心熱甚休教解開如服藥先服升麻湯五錢連須蔥三枝生薑五片水二大盞煎至一盞去滓溫服被覆取汗則愈陰毒漸深爪青面黑脈七至沉細積陰感於下則微陽消於上故其候四肢沉重逆冷腹痛轉甚或咽喉不利或心下脹滿結硬躁渴虛汗不止或時狂言爪甲面色青黑六脈細而一息七至以來有此證者速宜於氣海關元二穴灸二三百壯以手足溫暖為效仍服金液丹來蘇丹五勝散還陽散退陰散玉女散川烏去皮臍冷水浸七日薄切曬乾紙袋盛之有患者取研末一大錢入鹽一小錢水一盞煎至七分服壓下陰毒所注如豬血相似未已再進一服效還陽散治陰毒面青四肢逆冷心躁腹痛用硫黃末新汲水調下二錢良久或寒一起或熱一起更看緊慢再服汗出瘥附子回陽散良方治陰毒傷寒面青四逆及臍腹㽱痛身體如冰並一切卒暴冷氣上用附子二枚炮製去皮臍搗為細末每服三錢匕取生薑自然汁半盞冷酒攪勻共一盞調服更以冷清酒一盞送下少時更進一服良久臍下如火遍身和暖為度活返陰丹治陰毒傷寒心神煩躁頭疼四肢逆冷硫黃五兩另研附子炮去皮臍乾薑炮桂心各半兩硝石另研太陰元精石別研各二兩上用生鐵銚先鋪元精末一半次鋪硝石末一半中間下硫黃末又著硝石一半蓋硫黃卻以元精石末蓋上用小盞合好用三斤炭火燒令得所勿令煙出細研似面後三味搗羅為末與前藥同研令勻軟飯和丸如桐子大每服十五丸至二十丸煎艾湯下頻服汗出為度病重則三十丸此方甚驗喘促與吐逆者入口便住又服此藥三五服不退者更於臍下一寸灸之須是晝夜大段不住手灸不限多少壯數灸之艾炷勿令小小則不得力若其人手足冷少腹硬即於臍下兩邊各開一寸各安一道三處齊下火灸之仍與當歸四逆湯並返陰丹亦須頻服內外通透方得解若遲誤即死矣又若陰證加以少腹不通及陰囊縮入少腹絞痛欲死者更於臍下二寸石門穴急灸之仍須與返陰丹當歸四逆湯加吳茱萸生薑慎勿與尋常利小便冷滑藥火焰散治傷寒惡候舶上硫黃黑附子去皮生用新臘茶各一兩上為細末先用好酒一升調藥攤入新碗中於火上蕩干合在瓦上每一碗下燒熟艾一拳大以瓦搘起無令著火直至煙盡候冷即刮取研入瓷盒內盛每服二錢酒一盞共煎七分有火焰起勿訝傷寒陰毒者四肢冷脈沉細或吐瀉五心煩躁胸中結硬或轉早伏陰在內湯水不得下或無脈先吃一服如吐卻更進一服服後心中熱其病已瘥下至臟腑中表未解者渾身壯熱脈氣洪大便宜用發表藥或表解者更不發熱便得眠睡渾身有汗若少有痞結脈實方可用下膈行臟腑藥漸用調和元氣補治脾胃湯散服此藥三服不應者不可治也陰毒沉困脈八至附骨方有陰毒沉困之候與前後漸染之候皆同而更加沉重六脈附骨取之方有按之即無一息至以上或不可數至此則藥餌難為功矣但於臍下灼火艾如棗大三百壯以來手足不和暖者不可治也倘復和緩以前硫黃及熱藥助之若陰氣散陽氣來則漸減熱藥而和治之以取瘥也活蔥白慰法治陰虛陽脫體冷無脈氣息欲絶不省人事及傷寒陰厥百方不效者用蔥以索纏如臂大切去根及葉惟存白長二寸許如大餅樣先以火㶸一面令通熱勿令著火乃以熱面尉病人臍上連臍下又以尉斗滿貯火尉之令蔥餅中熱氣鬱入肌肉內須臾作三四餅一餅壞不可尉又易一餅良久病人當蘇手足溫有汗即瘥更服四逆湯以溫其內海治陰證諸藥不效並湯水不下身冷脈絶氣息短不知人用蔥白尉法又不若用釅醋拌麩皮炒熱注布袋中蒸尉之比上法尤速代灸塗臍膏附子馬蘭子蛇床子吳茱萸肉桂各等分上為細末可用白麵一匙藥末一匙生薑自然汁煨成膏攤紙上圓三寸許貼臍下關元氣海自晚至曉其火力可代灸百壯腰痛亦可貼之一法用丁香蓽茇乾薑牡蠣燒灰放手心中以唾津調如泥以手掩其陰至暖汗出為度陰毒傷寒四肢逆冷者用吳茱萸不拘多少為細末溫酒和勻生絹袋盛之熱尉腳心令通暢愈若以湯煎溫藥泄洗以接四肢亦可回生神膏良方治男女陰毒傷寒外接法牡蠣煆粉乾薑炮各一錢上為細末男病用女唾調手內擦熱緊掩二卵上得汗出愈女病用男唾調手內擦熱緊掩二乳上得汗出愈卵與乳男女之根蒂坎離之分也陰證大小便不通及諸雜證陰證大小便不通者並宜此外治法數日不通為急非急者勿用陰中伏陽破陰丹硫黃水銀各一兩陳皮青皮各半兩上將硫黃先入銚子內熔開次下水銀用鐵杖子打勻令無星傾入黑茶盞細研入二味麵糊丸如桐子大每服三十丸如煩躁冷鹽湯下陰證艾湯下良效有人初得病四肢逆冷臍下築痛身疼如被杖蓋陰證也急服金液破陰來復等丹其脈遂沉而滑沉者陰也滑者陽也病雖陰證而見陽脈有可生之理仲景所謂陰病見陽脈者生仍灸氣海丹田百壯手足溫溫陽回得汗而解或問滑沉之狀如何便有生理豫曰仲景云翕奄沉名曰滑何謂也沉為純陰翕為正陽陰陽和合故名曰滑古人論脈滑雖曰往來前卻流利旋轉替替然與數相似仲景三語而足也此三字極難曉翕合也言張而傷合也故曰翕為正陽沉言忽降而下也故曰沉為正陰方翕而合俄降而沉奄為忽忽間仲景云滑脈可為諦當矣其言皆有法故讀者難曉宜細思之霹靂散治傷寒陰勝隔陽其人必躁熱而不欲飲水是也上用附子一枚燒灰存性為末作一服蜜水調下而愈此逼散寒氣然後熱氣上行而汗出乃愈陶陰毒病手足指甲皆青脈沉細而急者四逆湯無脈者通脈四逆湯陰毒甘草湯真武湯厚朴丸白朮湯肉桂散皆可選用正陽回陰霹靂散正元散天雄散附子散劫金液丹熏逆冷囊縮者以炒豆投熱醋中如法熏之尉法灸法一傷寒直中陰經真寒證或陰毒證身如被杖腹中絞痛嘔逆沉重不知人事四體堅冷如石手指甲唇青藥不入口六脈沉細或無脈欲絶者將蔥一握切去根葉取白三寸許搗如餅先用麝香半分填臍中後放蔥餅臍上以火尉之連換三四餅稍醒灌入生薑汁服回陽救急湯如不醒再灸氣海關元二三十壯使熱氣通於內逼邪外出以復陽氣如用此法手足溫和汗出即醒者有生意也手足不溫汗不出不醒人事者不能起矣吳或問陰毒傷寒用附子湯冷服何也此蓋陰極於下陽浮於上之治法也豫曾治一人傷寒十餘日脈沉細手溫而足冷大便不通面赤嘔煩渴藥不能下惟喜涼水一二口或西瓜一二塊食下良久而復吐出此陰寒於內逼其浮陽失守之火聚於胸中上衝咽嗌故為面赤嘔煩也遂用附子大者一枚以生薑自然汁和白麵包里煨熟去面取附子去皮尖切作八片又以人參三錢乾薑炮三錢水二鍾煎取一鍾浸於冷水中待藥冷與之即愈按內經曰若調寒熱之逆冷熱必行則熱藥冷服下嗌之後冷體既消熱性即發由是病氣隨愈嘔煩皆除情且不違而致大益此之謂也蓋近世患陰證傷寒往往疑似參差初便不敢用附子直待陰極陽竭而用之則為遲矣大抵治法有是病投是藥豈可狐疑而誤治哉且夾陰傷寒先因欲事伏陰於內卻又著寒內外皆陰陰氣獨盛則陽氣以衰故脈沉而足冷也必須急用人參健脈以益元氣為主佐以附子溫腎經散寒邪以退陰而回陽也若舍此二味不用將何以救之哉古之諺曰傷寒偏死下虛人誠哉斯語許學士論必以真氣為主蓋真氣乃人命之根蒂也若不察真氣之虛實而欲急攻其熱或施汗下或多用寒涼之藥攻熱未愈陰寒復生病至危殆良可悲矣又方用雄雞血滴入無灰熱酒內飲之以衣被溫覆取汗
