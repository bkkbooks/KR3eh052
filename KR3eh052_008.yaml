body:
  text: 卷八脈法問曰脈有陰陽者何謂也答曰凡脈大浮數動滑此名陽也脈沉澀弱弦微此名陰也凡陰病見陽脈者生陽病見陰脈者死成陽道常饒大浮數動滑五者比之平脈也有餘故謂之陽陰道常虧沉澀弱弦微五者比之平脈也不及故謂之陰陽傷寒之為病邪在表則見陽脈邪在裡則見陰脈陰病見陽脈而主生者則邪氣自里之表欲汗而解也如厥陰中風脈微浮為欲愈不浮為未愈者是也陽病見陰脈而主死者則邪氣自表入里正虛邪勝如譫言妄語脈沉細者死是也大綱當以靜躁處言下後靜者生躁者死不可拘以陰病見陽脈邪氣外散也陽病見陰脈邪氣乘虛而入也丹謹按經言大浮數動長滑為陽沉澀弱弦短微為陰論之略去長短二脈其意何在若以傷寒為病無長短脈耶仲景之書言長短者蓋不少也脈經二十四種形狀亦無長短二脈又何耶見字恐當作得字説猶言表病得里脈里病得表脈若作自表入里説莫有礙否夫太陽病不解以漸次傳入陽明少陽又三陽經之病不解以漸次傳入於腑悉是可愈之病又有不傳經不加異氣者七日後自太陽以漸次傳入陽明少陽與三陽經亦皆為不治自愈之證非自表入里者乎初未嘗死此吾之所以不能無疑也考之論中陽病得陰脈有本病自得者有因醫而得者仲景著治法甚詳如太陽病得之八九日如瘧狀發熱惡寒熱多寒少不嘔清便欲自愈一日二三度發脈微緩者為欲愈也夫脈微而惡熱者此陰陽俱虛不可更發汗更下更吐也夫太陽病如瘧狀發熱惡寒非陽病乎曰脈微非陰脈乎又傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也汗出為陽微假令純陰結不得復有外證悉入在裡此名半在裡半在表也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭出汗故知非少陰也可與小柴胡湯夫仲景行小柴胡湯非陽病乎曰脈微曰脈沉非陰脈乎此皆陽病之得陰脈者悉是兼述證之陰陽如此者不一未暇枚舉誠思論意固是因病察脈求其所謂陰陽而為生死之辨為之傳經者必先推廣先賢之意以開後學倘非推明證之陰陽惟以脈與病參之則後學何所適從此吾之所以重有疑也張或謂經言大浮數動滑此名陽也沉澀弱弦微此名陰也夫高陽生又以弦脈編入七表而為陽者何也弦者不足之脈也乃發汗後病在表裡之候也故云弦則為減所以為陰也夫高陽生以弦為陽者因仲景云脈浮而緊者名曰弦也弦者狀如弓弦按之不移也只因一個浮字故編入表脈也殊不知脈浮而弦病尤在表當未汗之時則為緊也已經發汗之後則為弦也此一定之論大概與緊相類然其時則不同但脈候元微不若以未汗已汗為法則無差失之患矣許仲景之意以弦脈為陰者兼合乎衆脈而言之也且浮大者陽也兼之以澀弱弦微之類安得不為陰也若夫沉微而弦沉澀而弦沉細而弦皆為陰證之脈也蓋少陽之脈弦者仲景之意以一脈而言之也然少陽之氣通於春春脈弦者以應春陽時令之脈也豈得不為陽乎如浮大而弦洪長而弦浮滑而弦浮數而弦者皆為陽也仲景以弦脈分陰陽二用之理其義微矣王叔和以弦脈為陽而不言弦為陰者是以獨指一脈而為雜病也故仲景之脈不可與雜病同日而語也問曰脈有陽結陰結者何以別之答曰其脈浮而數能食不大便者此為實名曰陽結也期十七日當劇其脈沉而遲不能食身體重大便反硬名曰陰結也期十四日當劇成結者氣偏結固陰陽之氣不得而雜之陰中有陽陽中有陰陰陽相雜以為和不相雜以為結浮數陽脈也能食而不大便胃實也為陽氣結固陰不得而雜之是名陽結沉遲陰脈也不能食身體重陰病也陰病見陰脈則當下利今大便硬者為陰氣結固陽不得而雜之是名陰結傷寒之病一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰至六日為傳經盡七日當愈七日不愈者謂之再經言再經者再自太陽而傳至十二日再至厥陰為傳經盡十三日當愈十三日不愈者謂之過經言再過太陽之經亦以次而傳之也陽結為火至十七日傳少陰水水能制火火邪解散則愈陰結屬水至十四日傳陽明土土能制水水邪解散則愈彼邪氣結甚水又不能制火土又不能制水故當劇內經曰一候後則病二候後則病甚三候後則病危也一候五日受邪之初明惡寒發熱自有偏勝故下文云云問曰病有灑淅惡寒而復發熱者何答曰陰脈不足陽往從之陽脈不足陰往乘之曰何謂陽不足答曰假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也曰何謂陰不足答曰假令尺脈弱名曰陰不足陽氣下陷入陰中則發熱也成一陰一陽之謂道偏陰偏陽謂之疾陰偏不足則陽得而從之陽偏不足則陰得而乘之陽不足則陰氣上入陽中為惡寒者陰盛則寒矣陰不足陽氣下陷入陰中為發熱者陽盛則熱矣陽脈不足則惡寒也陰脈不足則發熱也丹按經言凡傷於寒則為病熱蓋寒客於經陽氣怫鬱而成熱故發熱寒傷於榮血血既受傷故惡寒屬太陽證又曰發熱惡寒發於陽也合此二者而觀明是體雖熱自惡寒宜解表則麻黃青龍等主之今曰灑淅惡寒而復發熱當是寒熱往來其屬表者宜小柴胡其屬裡者宜大柴胡其或已汗已下者宜桂枝幹薑湯此三陽證論寒熱往來之平等者如寒熱之或多或少又當輕重較量而施治法今曰陰不足則陽勝而熱陽不足則陰勝而寒又曰陽往從之陰往乘之當是陽並於陰陰並於陽岐伯曰瘧氣者更盛更虛似與經文陽盛陰勝之意合未審為傷寒立論耶為瘧立論耶孰為是否張或云經言陰脈不足陽得從之陽脈不足陰得乘之不足乃陽脈微弱之謂所以惡寒發熱也又云脈盛身寒得之傷寒夫傷寒表病未有脈不浮盛者設或微弱即陽病見陰脈也二説參差必有其理此章論所以然之理非病已發於外而言也凡病傷寒者皆因榮衛不足是以尺寸之脈皆微弱外邪因得相襲使陰陽相乘故灑淅惡寒而復發熱也凡已病之脈則不然若風並於衛則衛實而榮虛故桂枝證脈陽浮而陰弱若風寒並於榮衛則脈皆浮盛所以麻黃證當發其汗也仲景之書各有所指非淺見薄識所能知也陽脈浮陰脈弱者則血虛血虛則筋急也成陽為氣陰為血陽脈浮者衛氣強也陰脈弱者榮血弱也難經曰氣主詬之血主濡之血虛則不能濡潤筋絡故筋急也其脈沉者榮氣微也成內經云脈者血之腑也脈實則血實脈虛則血虛此其常也脈沉者知榮血內微也其脈浮而汗出如流珠者衛氣衰也成針經云衛氣者所以溫分肉充皮毛肥腠理司開闔者也脈浮汗出如流珠者腠理不密開闔不司為衛氣外衰也浮主候衛沉主候榮以浮沉別榮衛之衰微理固然矣然而衰甚於微所以於榮言微而衛言衰者以其汗出如流珠為陽氣外脫所以衛病甚於榮也榮氣微者加燒針則血流不行更發熱而躁煩也成衛陽也榮陰也燒針益陽而損陰榮氣微者謂陰虛也內經曰陰虛則內熱方其內熱又加燒針以補陽不惟兩熱相合而榮血不行必更外發熱而內躁煩也脈藹藹如車蓋者名曰陽結也成藹藹如車蓋者大而厭厭聶聶也為陽氣鬱結於外不與陰氣和雜也按車蓋言浮大即前浮數之陽結也脈纍纍如循長竿者名曰陰結也成纍纍如循長竿者連連而強直也為陰氣鬱結於內不與陽氣和雜也按長竿者緊弦也即前沉遲之陰結也脈瞥瞥如羹上肥者陽氣微也成輕浮而主微也脈縈縈如蜘蛛絲者陽氣衰也成縈縈滯也若縈縈惹惹之不利也如蜘蛛絲者至細也微為陽微細為陽衰脈要曰微為氣痞是未至於衰內經曰細則氣少以至細為陽衰宜矣按縈説文曰收卷也有回旋之義脈綿綿如瀉漆之絶者亡其血也成綿綿者連綿而軟也如瀉漆之絶者前大而後細也正理論曰天樞開發精移氣變陰陽交會胃和脈生脈復生也陽氣前至陰氣後至則脈前為陽氣後為陰氣脈來前大後細為陽氣有餘而陰氣不足是知亡血按瀉漆之絶已縱而忽收亡血之脈如之脈來緩時一止復來者名曰結脈來數時一止復來者名曰促陽盛則促陰盛則結此皆病脈結促代皆動而中止但自還為結促不能自還為代無常數為結促有常數為代結促為病脈代為死脈不可不辨雜病脈結促多有痰飲瘀血阻滯隧道而然不然者病多難治也太陽病下之脈促不結胸為欲解未必盡凶也少陰病手足厥冷脈促宜灸之非必皆陽盛也陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒者此三焦傷也若數脈見於關上上下無頭尾如豆大厥厥動搖者名曰動也陽升陰降二者交通上下往來於尺寸之內方且沖和安靜焉睹所謂動者哉惟夫陽欲降而陰逆之陰欲升而陽逆之兩者相搏不得上下鼓擊之勢隴然高起而動脈之形著矣然必見於關上者何也以三部言之寸陽也尺陰也關陰陽之中也故曰陽出陰入以關為界是為陰陽升降往來之位者關也然則相搏而動不於此見之而誰見乎內經手少陰脈動甚者為妊子謂手少陰俞神門穴中脈動甚為有妊之兆非言動脈言動脈自仲景始龐安常曰關位占六分前三分為陽後三分為陰若當陽寸口動而陰靜法當有汗而解素問曰陽加於陰謂之汗若當陰連尺動而陽靜則發熱素問曰尺粗為熱中若大汗後形冷惡寒者三焦傷此是死證按陰陽之氣寧謐則實躁動則虛或動乎陽或動乎陰陽動則陽虛矣故不能衛於膚腠而汗出陰動則陰虛矣故不能濡於肌肉而發熱仲景又云陽微則惡寒陰弱則發熱是也厥厥動搖者自為動搖不與三部脈混如人在衆中不與衆合名之厥厥也後之説脈者指下尋之似有舉之還無再再尋之不往不來曰動則與仲景之言相反矣陽脈浮大而濡陰脈浮大而濡陰脈與陽脈同等者名曰緩也緩有遲緩之意又有和緩之意獨陽獨陰緩無自而見蓋緩者非獨陰也有陽焉非獨陽也有陰焉二者合而成體緩脈之名自此而生方其陰陽雜以成和也其色黃其顏光其聲商毛髮長乃沖氣之洋溢者也若夫發而為病即為虛為痹為氣戴氏曰每居中部或下部間柔軟而慢但小於沉脈按之緩軟此有邪之證為不及之緩陰陽氣和陽寸陰尺上下同登同浮大而軟無有偏勝此無之證為陰陽和緩之緩緩與遲二脈相類遲脈一息三至緩脈一息四至脈浮而緊者名曰弦也弦者狀如弓弦按之不移也脈緊者如轉索無常也弦何以為肝脈耶肝木也以日言之甲者物始甲而未拆乙者陽尚乙屈而未伸以經言之少陽陽之少也厥陰陰之盡也以時言之春者萬物始生而未長素問曰脈軟弱輕虛以滑端直以長曰弦以陰中有陽也此曰浮而緊名曰弦浮者陽也緊者陰也陽而未離乎陰也故脈訣列之於陽而仲景列之於陰戴氏則以為半陰半陽之脈也浮字當以軟弱輕虛四字體會之脈訣泥之而曰指下尋之不足舉之有餘則是有浮弦而無沉弦也經曰脈沉而弦者主懸飲內痛是沉中亦有弦也弦緊之狀並如引繩此既以緊釋弦又恐人混而無別故又別之曰指下不移如弓弦者弦脈也無常如轉索者緊脈也狀如弓弦按之不移即所謂端直以長者不轉也轉索無常者不端也端便是有常無常便是不端直耳凡病脈弦而軟易治弦而硬難治又仲景曰脈至如轉索者其日死為其緊急不軟無胃氣也轉索一也有死生之分宜詳辨之脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名曰革婦人則半産漏下男子則亡血失精易曰革去故也革者改故從新之意夫人之脈方其水穀腐化心榮肺衛流行灌溉而充溢於百骸之中固自無變若夫虛寒停留經久不去則昔之充溢者今且改易而為勞傷枯瘁矣其脈弦而大是其體也何者弦則為減減減則陽氣不足而為寒大則為芤芤則陰血不足而為虛寒虛相搏氣血變易此名為革婦人得之則半産漏下男子得之則亡血失精也然諸脈為名多矣特此以革名之者豈非諸脈雖能為病此則既久而有改故之意歟然亦有暴而變此脈者雖名曰革但病未成有不藥而愈之道焉故經曰三部脈革長病得之死卒病得之生也脈訣云指下尋之則無按之則有此可以言革脈所見之位而失言革脈之本狀經言有似沉伏者革脈所居之位也實而長微弦者革脈之形也要之大似實而弦似長總不離乎弦之與大而已惟其雜乎沉伏實長故又有牢之意此經以革與實相類而孫真人以革為牢諸脈書有牢則無革有革則無牢者皆為是歟問曰病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出而解也若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也問曰病有不戰而汗出解者何也答曰脈大而浮數故知不戰汗出而解也問曰病有不戰不汗出而解者何也答曰其脈自微此以曾經發汗若吐若下若亡血以內無津液此陰陽自和必自愈故不戰不汗出而解也邪氣將出其人本虛邪與正爭故發戰戰已然後汗出而解其人不虛邪不能與正爭故不發戰而汗出解虛不虛以脈之芤不芤別之芤乃草之有芤者正如臥蔥管於皮中輕取重取皆有而中取則無也經云榮行脈中故以為血脫之候此所謂按即脈書所謂尋在浮舉沉按之間者也若邪氣已衰正氣又弱其脈自微則不戰不汗而解矣微脈原為吐下亡血之證凡得之者陽微禁發汗陰微禁下以陰陽不足故也或問此三者皆以脈訣不審於何時候之曰發表之脈候其始欲解之脈觀其止假如柴胡湯證六七日每見弦脈今脈反浮欲解之候也若浮而芤者戰而汗出浮而數不芤者不戰而汗出夫脈凡與邪並則浮大弦數必因汗下欲解而後微今脈自微此以曾經汗下內無津液陰液自和故不戰不汗出而解矣此三脈皆於病將解之時而候之也海藏云戰而後解者太陽也不戰有汗而解者陽明也不戰無汗而解者少陽也問曰傷寒三日脈浮數而微病人身涼和者何也答曰此為欲解也解以夜半脈浮而解者濈然汗出也脈數而解者必能食也脈微而解者必大汗出也成傷寒三日陽去入陰之時病人身熱脈浮數而大邪氣傳也若身涼和脈浮數而微者則邪氣不傳而欲解也解以夜半者陽生於子也脈浮主濈然汗出而解者邪從外散也脈數主能食而解者胃氣和也脈微主大汗出而解者邪氣微也上言脈微故不汗出而解此言脈微而解必大汗出二説相左何耶曰上以曾經吐下亡血邪正俱衰不能作汗而解此以未經汗下血氣未傷正盛邪衰故大汗出而解不相左也問曰脈病欲知愈未愈者何以別之答曰寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解者此脈陰陽為和平雖劇當愈陰陽偏而為病平而為和故雜病之脈內傷外感之不同則氣口人迎不等上下盛衰之不同則浮中沉尺寸不等況傷寒乎今寸關尺脈皆同等故為陰陽和平而自愈也針經禁服篇云寸口人迎兩者相應若引繩大小齊等者名曰平人言手之寸口脈與喉旁之人迎脈齊等為平人後條云六脈陰陽俱停必先振栗汗出而解或曰寸關尺各有本部當見之脈如前章所謂菽數輕重者春夏秋冬升降浮沉亦各有本部當見之脈各得其位而不逾其等故曰同等病當愈如成注所釋則寸浮而尺浮尺浮則反等矣何謂病愈立夏得洪大脈是其本位其人病身體苦疼重者鬚髮其汗若明日身不疼不重者不須發汗若汗濈濈自出者明日便解矣何以言之立夏得洪大脈是其時脈故使然也四時仿此此論不即病之傷寒也春弦夏洪秋毛冬石當其時得之則為平脈不治自愈非其時得之則為病脈須兼視其證而治之乃愈也夏得洪脈而其人病身體疼重此為邪客之故亦須治乃解仿此推之則春弦秋毛冬石有應脈之證者皆當治之而愈也問曰凡病欲知何時得何時愈答曰假令夜半得病明日日中愈日中得病夜半愈何以言之日中得病夜半愈者以陽得陰則解也夜半得病明日日中愈者以陰得陽則解也太陽病已至未解陽明病申至戌解少陽病寅至辰解太陰病亥至醜解少陰病子至寅解厥陰病醜至卯解三陰夜解寸口脈浮為在表沉為在裡數為在腑遲為在臟假令脈遲此為在臟也前云凡脈浮大數動滑此名陽也沉澀弱弦微此名陰也九難曰何以別知臟腑之病然數者腑也遲者臟也數則為熱遲則為寒諸陽為熱諸陰為寒故以別知臟腑之病也此傷寒分為三陽三陰證之總訣歟若夫雜病則脈之數者臟亦有熱脈之遲者腑亦有寒勿泥此也趺陽脈浮而澀少陰脈如經也其病在脾法當下利何以知之若脈浮大者氣實血虛也今趺陽脈浮而澀故知脾氣不足胃氣虛也以少陰脈弦而浮才見此為調脈故稱如經也若反滑而數者故知當屎膿也趺陽脈一名會元一名衝陽在腳背上去陷谷三寸脈動處乃足陽明胃經之動脈也胃者水穀之海五臟六腑之長若胃氣以憊水穀不進穀神以去臟腑無所稟受其脈不動而死也故必診趺陽脈以察胃氣焉切脈下指輕重以為氣血之分浮而大者輕取有餘重取不足故為氣實血虛之證也若輕取之便不大而澀知脾胃之氣不足也脾胃之氣不足則轉輸失職而下利之證見矣下利屬少陰證故云少陰脈如經也少陰之脈微細沉緊而此乃以弦而浮為調脈最宜活看應浮弦而反滑數知其便膿此桃花湯證也少陰動脈名太溪在足內踝後跟骨上寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼當發其汗也風陽物也其體在外其陽在衛飄然流行於上者其脈不得不浮也寒陰物也其體在中其傷在榮揪然繳急而斂縮者其脈不得不緊也榮衛俱病骨節煩疼當開戶以逐之故以麻黃髮汗趺陽脈遲而緩胃氣如經也趺陽脈浮而數浮則傷胃數則動脾此非本病醫特下之所為也榮衛內陷其數先微脈反但浮其人必大便硬氣噫而除何以言之本以數脈動脾其數先微故知脾氣不治大便硬氣噫而除今脈反浮其數改微邪氣獨留心中則飢邪熱不殺穀潮熱發渴數脈當遲緩脈因前後度數如法病者則飢數脈不時則生惡瘡也胃脈遲緩其本也若浮而數則病矣胃氣傷故虛虛故浮脾氣動故躁躁故數知為誤下之過也榮衛之氣脾胃之氣所為也胃傷脾動則內虛榮衛之邪乘虛而內陷則浮數二脈數脈先退而浮脈獨存其人必大便硬氣噫而除也何以言之本以數脈動脾脾雖躁動不能持久故數脈先改而微因數改微故知脾氣不治脾氣不治則孰為津液津液少胃中乾燥故知大便硬脾病善噫得後與氣乃除故知氣噫而除也本以浮脈傷胃胃傷則止於傷而已故浮脈獨存不與數脈俱退邪氣獨留於脾無與於胃胃中空虛故飢而思食也胃能納脾不能化則食而不消所以然者脾中真火乃能殺穀邪熱不能殺穀也穀不化反增胃中之熱則潮熱而渴勢所必至矣調胃承氣湯若數脈不改微而徑改為遲緩病退之後與未病之前一息四至度數如法如是而飢飢而能食食即能化不為患也若數脈不改遲緩又不改微非時而見則脾氣躁動不已脾主肌肉必生惡瘡也師曰病人脈微而澀者此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱此醫發其汗令陽氣微又大下之令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著復衣十一月之時陽氣在裡胃中煩熱以陰氣內弱不能勝熱故欲裸其身又陰脈遲澀故知血亡也大發其汗傷陽也宜其脈微而惡寒又數大下之傷陰也宜其脈澀而發熱陰陽兩傷則氣血俱損而首未獨言亡血者何也曰下之亡陰不必言汗亦血類故也內虛之人夏月陽氣在表則其內無陽也故不勝其寒冬月陽氣在裡里陰既虛不能當陽之灼爍也故不勝其熱然諸脈弦細而澀按之無力者往往惡寒若振栗不止或時發躁蒸蒸而熱如坐甑中必得去衣居寒處或飲寒水則便如故其振寒復至非必遇夏乃寒遇冬乃熱也此但立其例論其理耳王海藏曰六月大熱之氣反得大寒之病氣難布息身涼脈遲何以治之答曰病有標本病熱為本大寒為標用涼則順時而失本用熱則順本而失時故不從乎標本而從乎中治中治者何用溫是也然既曰溫則不能治大寒之病治大寒者非薑附不可若用薑附又似非溫治之例然衰其寒勢大半乃止脈得四至余病便無令治之足矣雖用薑附是亦中治也非溫而何張子和朱彥修皆嘗治六月惡寒之證以寒涼藥而愈不可拘於海藏之説大抵用藥之寒熱全視脈之遲數也此言脈遲胃冷故取海藏之説爾陰虛則發熱冬月發熱者當補其陰使濟於陽而熱自除矣茯苓補心湯之類是也若誤用寒涼之藥火無所附而升走必發躁欲坐井中宜暖藥治之脈浮而大心下反硬有熱屬臟者攻之不令發汗屬腑者不令溲數溲數則大便硬汗多則熱愈汗少則便難脈遲尚未可攻論言脈浮大應發汗反下之為逆此以心下硬有熱知傳邪入里故舍脈而從證也屬臟者宿屎在臟也屬府者小便不利也大便則許攻之小便則不許何也曰利大便則內熱除利小便則不能也徒走其津液耳故傷寒治小便不利惟汗後脈浮煩渴始用五苓散利之耳其他或溫或下或和解或泄濕熱或固下散寒或溫經散濕或解錯雜之邪或散傳陰之熱閉未嘗輕事乎分利也既言不令發汗不令溲數故又繼之曰溲數則大便硬汗多則熱愈甚汗少則大便難以發汗利小便亡其津液致有此失故不可不慎也遲為陰為寒為臟腎者至陰之臟故病之所主曰腎虛若遽攻之恐泄腎氣所以得此脈者雖具當攻之證未可遽攻徐俟之以觀其變可也或曰論言結胸脈浮大不可下下之則死而此又言宜下何矛盾也曰心下硬與結胸不同結胸又與痞不同病發於陽下之成結胸病發於陰下之成痞結胸痛痞不痛所謂發於陰者謂里已受邪但下證未全而遽下之故結而為痞視結胸為稍輕痞與結胸既有陰陽輕重之別則結胸之禁不可施之痞也故太陽病醫下之心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之則夫按之硬未經下者其當攻可知也如陽明病心下硬滿不可攻之攻之利遂不止者死要須詳審勿令誤也脈浮而洪身汗如油喘而不休水漿不下體形不仁乍靜乍亂此為命絶也火之將滅也必明脈來浮洪湧盛此將去人體之兆也然得此脈者又必兼下一二證而後可斷其命絶也又未知何臟先受其災若汗出發潤喘不休者此為肺先絶也肺主氣主皮毛故也經曰病人肺絶三日死何以知之以口張大氣但出而不還陽反獨留形體如煙燻直視搖頭此心絶也心之於卦離也陽外而陰內也陽反獨留則心血已盡而惟浮遊之火獨光耳經曰病人心絶一日死何以知之肩息回視立死一云目停停二日死唇吻反青四肢漐習者此為肝絶也肝脈支者從目系下頰裡環唇內經曰病人肝絶八日死何以知之面青但欲伏眠目視而不見人汗出如水不止一云二日死環口黧黑柔汗發黃者此為脾絶也脾其華在唇四白環口黧黑其華萎矣經曰病人脾絶十二日死何以知之口冷足腫腹熱臚脹泄利不覺出無時度一云五日死溲便遺失狂言目反直視者此為腎絶也經曰病人腎絶四日死何以知之齒為暴枯面為正黑目中黃色腰中欲折自汗出如流水一云人中平七日死又未知何臟陰陽前絶若陽氣前絶陰氣後竭者其人死身色必青陰氣前絶陽氣後竭者其人死身色必赤腋下溫心下熱也靈樞經曰人有兩死而無兩生故陰竭則身青而冷陽竭則身赤而溫又云五陰氣俱絶則目系轉轉則目運目運者為志先死志先死則遠一日半死矣六陽氣絶則陰與陽相離離則腠理發泄絶汗乃出故旦占夕死夕占旦死此所謂陰陽即臟腑也寸口脈浮大而醫反下之此為大逆浮則無血大則為寒寒氣相搏則為腸鳴醫乃不知而反飲冷水令大汗出水得寒氣冷必相搏其人必䭇趺陽脈浮浮則為虛浮虛相搏故令氣䭇言胃氣虛竭也脈滑則為噦此為醫咎責虛取實守空迫血脈浮鼻中燥者必衄也脈大病當熱而曰寒者似指所傷之邪而言也然下文曰水得寒氣冷必相搏則似又以寒為胃中之虛寒矣既是真寒而非邪熱又何以見大脈邪寒氣相搏氣是何氣浮脈也虛浮脈之因也脈與因何以相搏此皆吾所不能解也成氏亦依回釋之而不復致疑何哉䭇與噎通噦即俗謂之吃逆者是也李東垣王海藏以噦為乾嘔而陳無擇又以噦名咳逆皆失之按靈樞經云噦以草刺鼻嚏嚏而已無息而疾迎引之立已大驚之亦可已今之吃逆以此三法施之則立止若以施之乾嘔嘔不為止也且嘔自有嘔條而又別出此不已贅乎若古之所謂咳即今之所謂嗽與吃逆又無干也䭇與噦皆因妄下之後復與之水以發其汗胸中虛氣逆而作輕則為䭇重則為噦以趺陽脈候之浮則為䭇滑則為噦䭇即東垣書所載咽喉噎塞口開目瞪之證然無聲也噦則氣自臍下直衝上出於口而吃吃然作聲頻頻相續為實可治半時噦一聲為虛難治也夫䭇者止為水寒相搏以小青龍湯去麻黃加附子散其水寒而可矣至於噦則又有熱氣擁鬱氣不得通而成者輕則和解之重則有攻下之候熱病至噦則病已極非若渴煩等輕緩之候也論云脈浮發熱口乾鼻燥能食者則衄黃芩湯主之諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常者蓄積有膿也傷寒書舉類傷寒四證為腳氣為痰飲為傷食為虛煩至於癰疽之發憎寒壯熱大似傷寒仲景已論及而後人乃忽之甚可嘆也然人身有焮腫痛楚之處未有不自覺者此條所舉必是內癰故曰蓄積有膿也素問云肝滿腎滿肺滿皆實即為腫王注云滿謂脈氣滿實腫謂癰腫大抵口中咳即胸中隱痛心胸甲錯振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者肺癰也小腹重而強按之則痛便數似淋時時汗出復惡寒身皮甲錯腹皮急如腫狀脈滑而數者腸癰也胃脘隱隱而痛手不可近胃脈沉細人迎逆而盛者胃脘癰也內傷外感以人迎氣口別之故內傷之脈人迎平而胃脘癰之脈人迎反盛未有不誤以為傷寒者宜辨之早也京口錢氏室女患腸癰發熱庸醫作傷寒治之絶其飲食旬余而斃垂斃之日下膿數升方知是癰欲救已無及矣嗚呼仲景之書豈可以弗讀哉脈浮而遲面熱赤而戰惕者六七日當汗出而解反發熱者差遲遲為無陽不能作汗其身必癢也脈浮而遲陽氣虛所以遲也氣怫鬱不得越故面熱赤正與邪爭故戰惕猶天氣溽蒸而成雨豈不可以汗乎而陽氣衰微不能作汗故當六七日傳經盡當汗出而解之時而反發熱其身不痛而癢也經曰諸癢為虛是也論云太陽病如瘧狀若脈微惡寒面反有熱色而身癢者桂枝麻黃各半湯小汗之寸口脈陰陽俱緊者法當清邪中於上焦濁邪中於下焦清邪中上名曰潔也濁邪中下名曰渾也陰中於邪必內栗也表氣微虛里氣不守故使邪中於陰也陽中於邪必發熱頭痛項強頸攣腰痛脛酸所為陽中霧露之氣故曰清邪中上濁邪中下陰氣為栗足膝逆冷便溺妄出表氣微虛里氣微急三焦相溷內外不通上焦怫鬱臟氣相熏口爛蝕齦也中焦不治胃氣上衝脾氣不轉胃中為濁榮衛不通血凝不流若衛氣前通者小便赤黃與熱相搏因熱作使遊於經絡出入臟腑熱氣所過則為癰膿若陰氣前通者陽氣厥微陰無所使客氣內入嚏而出之聲嗢咽塞寒厥相逐為熱所擁血凝自下狀如豚肝陰陽俱厥脾氣孤弱五液注下下焦不闔清便下重令便數難臍築湫痛命將難全成氏注以沉浮分陰陽為太陽少陰俱有緊脈但浮而緊者太陽也沉而緊者少陰也又論文但言寸口則不得以關前為陽關後為陰故不得不以浮沉分之然古人所云寸口多兼關尺而言如難經及後章所云水下二刻一周循環當復寸口虛實見焉皆謂手太陰之經渠穴也知此則不必曲為疏解而無診下焦於寸部之謬矣此所言邪似是濕邪蓋有天之濕霧露雨是也天本乎氣故中上中表中經絡有地之濕水泥是也地本乎形故中下中里中筋骨今既明言清邪為霧露之氣矣則所謂濁邪者非地之濕氣而河內經曰風者上先受之濕者下先受之又云清濕地氣之中人也必從足始若濁邪是寒邪則足太陽當先受之不應獨中下焦而見足膝逆冷便溺妄出之證也或曰審爾則與濕痹脈證不同何也曰濕痹重而此輕惟重則濕氣內流而趨下故其脈沉細其證關節疼痛而煩身色如熏黃惟輕則所傷者陰冷之氣而已故其脈緊其證頭痛項強腰痛與傷寒同也惟濁邪中下焦則與傷寒異以其徑犯臟腑筋骨肌肉而不止於經絡故耳內栗者身不戰而但心惕惕然栗也難經論五邪以中濕為腎邪其病足脛寒而逆則此云足膝逆冷為腎中濕邪明甚其便溺妄出者則河間所謂邪客於腎部手足厥陰之經廷孔鬱結極甚而氣血不能宣通則痿痹神無所用故津液滲入膀胱而旋溺遺失不能收禁也然則治之奈何曰治天之濕當同司天法濕上甚而熱者平以苦溫佐以甘辛以汗為效而止當於傷寒法中選用治地之濕當因在泉法濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之如四逆白通之類亦可也三焦者原氣之別使主通行上中下之三氣經歷於五臟六腑也通行三氣即紀氏所謂下焦稟真元之氣即元氣也上達至於中焦中焦受水穀精悍之氣化為榮衛榮衛之氣與真元之氣通行達於上焦也三焦通則上下內外左右皆通也今表氣微虛里氣微急三焦相溷則內外不通矣上焦病則鬱熱內發而為口糜蝕齦中焦焦病則脾不能化胃之所納而胃中為之濁胃中濁則無水穀之精氣以為榮無水穀之悍氣以為衛而榮衛何由通也榮衛不通則血凝沍而不流矣夫人之所以生者榮衛耳榮衛不通而可以久乎榮行脈中衛行脈外不能一時而通必有先後欲知榮與衛之孰為先通則於何而驗之若衛氣先通者必先小便赤黃而後發癰膿若榮氣先通者必先嚏嗢咽塞而後下血如豚肝也內經謂三焦者決瀆之官水道通焉膀胱者州都之官津液藏焉氣化則能出矣夫豈獨從下焦膀胱之氣化而已肺主通調水道下輸膀胱而脾病者九竅不通小便不利是小便亦從上中二焦之氣化者也故衛氣通則小便赤黃也內經論嚏或因寒氣下臨心氣上從或因熱氣下臨肺氣上從李明之雲陽氣不得出者曰塞陰氣不得下降者曰噎又曰塞者五臟之所主陰也血也噎者六腑之所主陽也氣也二者皆由陰中伏陽而作也由此觀之則嚏塞皆陰陽寒熱相搏之候耳故曰寒厥相逐為熱所擁血凝自下狀如豚肝衛氣者溫分肉充皮膚肥腠理司開闔故其通也以潰膿榮氣者其津液注之於脈化以為血以榮四末注五臟六腑故其通也以下血也若榮衛之氣畢竟不通則陰陽俱厥脾氣孤弱不能散精上歸於肺通調水道故五臟之液注下下焦不闔數至圊而難無氣以出之故也臍中如築拘急而痛腎間動氣將絶故也故曰命將難全脈陰陽俱緊者口中氣出唇口乾燥蜷臥足冷鼻中涕出舌上苔滑勿妄治也到七日以來其人微發熱手足溫者此為欲解或到八日以上反大發熱者此為難治其惡寒者必欲嘔也腹內痛者必欲利也此脈此證表裡陰陽混淆未的疑似之間慎勿妄投藥餌徐而俟之若七日之外當解之候微熱手足溫則為邪氣解而自愈矣若八日以上當解不解反發大熱此為逆證不可治也脈陰陽俱緊至於吐利其脈獨不解緊去人始能安此為欲解若脈遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解成脈陰陽俱緊為寒氣甚於上下至於吐利之後緊脈不罷者為其脈獨不解緊去則人安為欲解若脈遲至六七日不欲食者為吐利後脾胃大虛內經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行脾胃氣強則能輸散水飲之氣若脾胃氣虛則水飲內停也所謂晚發者後來之疾也若至六七日而欲食者則脾胃已和寒邪已散故云欲解緊病脈當作三節看病六七日手足三部脈皆至大煩而口噤不能言其人躁擾者必欲解也成煩熱也傳經之時病人身大煩口噤不能言內作躁擾則陰陽爭勝若手足三部脈皆至為正氣勝邪氣微陽氣復寒氣散必欲解也若脈和其人大煩目重瞼內際黃者此為欲解也成脈經曰病人兩目眥中有黃色起者其病方愈病以脈為主若目黃大煩脈不和者邪勝也其病為進目黃大煩而脈和者為正氣已和故云欲解脈浮而數浮為風數為虛風為熱虛為寒風虛相搏則灑淅惡寒也成內經曰有者為實無者為虛氣並則無血血並則無氣風則傷衛數則無血浮數之脈風邪並於衛衛勝則榮虛也衛為陽風搏於衛所以為熱榮為陰榮氣虛所以為寒風並於衛者發熱惡寒之證具矣張古今皆以數脈為熱今仲景以數脈為虛寒何也數則為虛乃陰陽偏負之理非專寒而專熱也浮為陽浮數為陽虛沉為陰沉數為陰虛陽虛者則惡寒藥用溫熱抑陰扶陽陰虛者則發熱藥用寒涼抑陽扶陰使二氣平其病自愈且如病在表脈浮而數乃陰盛陽虛汗之則愈下之則死病在裡脈沉而數乃陽盛陰虛下之則愈汗之則死經論昭然非有差別脈浮而滑浮為陽滑為實陽實相搏其脈數疾衛氣失度浮滑之脈數疾發熱汗出者此為不治成浮為邪氣並於衛而衛氣勝滑為邪氣並於榮而榮氣實邪氣勝實擁於榮衛則榮衛行速故脈數疾一息六至曰數平人脈一息四至衛氣行六寸今一息六至則衛氣行九寸計過平人之半是脈數疾知衛氣失其常度也浮滑數疾之脈發熱汗出而當解若不解者精氣脫也必不可治經曰脈陰陽俱盛大汗出不解者死傷寒咳逆上氣其脈散者死謂其形損故也成千金方以喘嗽為咳逆上氣者肺病散者心脈是心火刑于肺金也內經曰心之肺謂之死陰死陰之屬不過三日而死以形見其損傷故也此內傷也問曰脈有三部陰陽相乘榮衛血氣在人體躬呼吸出入上下於中因息遊布津液流通隨時動作效象形容春弦秋浮冬沉夏洪察色觀脈大小不同一時之間變無常經尺寸參差或短或長上下乖錯或存或亡病輒改易進退低昂心迷意惑動失紀綱願為具陳令得分明師曰子之所問道之根源脈有三部尺寸及關成寸為上部關為中部尺為下部按此下後人以為出王叔和今按脈經載張仲景論脈止此一條則知非叔和自撰也榮衛流行不失衡銓成衡銓者稱也可以稱量輕重內經曰春應中規夏應中矩秋應中衡冬應中權榮行脈中衛行脈外榮衛與脈相隨上下應四時不失其常度也腎沉心洪肺浮肝弦此自經常不失銖分成腎北方水旺於冬而脈沉心南方火旺於夏而脈洪肺西方金旺於秋而脈浮肝東方木旺於春而脈弦此為經常銖分之不差也出入升降漏刻周旋水下二刻一周循環成人身之脈計長一十六丈二尺一呼脈行三寸一吸脈行三寸一呼一吸為一息脈行六寸一日一夜漏水下百刻人一萬三千五百息脈行八百一十丈五十度周於身則一刻之中人一百三十五息脈行八丈一尺水水下二刻人二百七十息脈行一十六丈二尺一周於身也脈經之行終而復始若循環之無端也當復寸口虛實見焉成經脈之始從中焦注於手太陰寸口二百七十息脈行一周身復還至於寸口寸口為脈之經始故以診視虛實焉經曰虛實死生之要皆見於寸口之中變化相乘陰陽相干風則浮虛寒則牢堅沉潛水蓄支飲急絃動則為痛數則熱煩成風傷陽故脈浮虛寒傷陰故脈牢堅搐積於內者謂之水蓄故脈沉潛支散於外者謂之支飲故脈急絃動則陰陽相搏相搏則痛生焉數為陽邪氣勝陽勝則熱煩焉設有不應知變所緣三部不同病各異端成脈與病不相應者必緣傳變之所致三部以候五臟之氣隨部察其虛實焉太過可怪不及亦然邪不空見中必有姦審察表裡三焦別焉知其所舍消息診看料度臟腑獨見若神為子條記傳與賢人成太過不及之脈皆有邪氣干於正氣審察在表在裡入腑入臟隨其所舍而治之師曰呼吸者脈之頭也成難經曰一呼脈行三寸一吸脈行三寸以脈隨呼吸而行故言脈之頭也此乃疹脈入門之要法初持脈來疾去遲此出疾入遲名曰內實外虛也成外為陽內為陰內經曰來者為陽去者為陰是出以候外入以候內疾為有餘有餘則實遲為不足不足則虛來疾去遲者陽有餘而陰不足故曰內虛外實來遲去疾者陽不足而陰有餘故曰內實外虛問曰上工望而知之中工問而知之下工脈而知之願聞其説師曰病家人請云病人苦發熱身體疼病人自臥師到診其脈沉而遲者知其瘥也何以知之表有病者脈當浮大今脈反沉遲故知愈也成望以觀其形證問以知其病所苦脈以別其表裡病苦發熱身疼邪在表也當臥不安而脈浮數今病人自臥而脈沉遲者表邪緩也是有里脈而無表證則知表邪當愈也假令病人云腹內卒痛病人自坐師到脈之浮而大者知其瘥也何以知之若里有病者脈當沉而細今脈浮大故知愈也成腹痛者裡寒也痛甚則不能起而脈沉細今病人自坐而脈浮大者裡寒散也是有表脈而無里證也則知里邪當愈是望證問病切脈三者相參而得之可為十全之醫針經曰知一為上知二為神知三神且明矣師曰病家人來請云病人發熱煩極明日師到病人向壁臥此熱已去也其脈已和故言已愈發熱煩極則不能靜臥今向壁靜臥知熱已去設令向壁臥聞師到不驚起而盼視若三言三止脈之咽唾者此詐病也設令脈自和處言汝病大重當須服吐下藥針灸數十百處乃愈成詐病者非善人以言恐之使其畏懼則愈醫者意也此其是歟此非治法設為詐病規模彼以詐病此以詐治師持脈病人欠者無病也成針經曰陽引而上陰引而下陰陽相引故欠陰陽不相引則病陰陽相引則和是欠者無病也脈之呻者病也成呻呻吟之聲身有所苦則然也言遲者風也成風客於中則經絡急舌強難運用也搖頭言者里痛也成里有病欲言則頭為之戰搖行遲者表強也成表強者由筋絡引急而行步不利也坐而伏者短氣也成短氣里不和也故坐而喜伏坐而下一腳者腰痛也成內經曰腰者身之大關節也腰痛為大關節不利故坐不能正下一腳以緩腰中之痛也裡實護腹如懷卵物者心痛也成心痛則不能伸仰護腹以按其痛師曰伏氣之病以意候之今月之內欲有伏氣假令舊有伏氣當須脈之若脈微弱者當喉中痛似傷非喉痹也病人云實咽中痛今復欲下利成冬時感寒伏藏於經中不即發者謂之伏氣至春分之時伏寒欲發故云今月之內欲有伏氣假令伏氣已發當須脈之審在何經得脈微弱者知邪在少陰少陰之脈循喉嚨寒氣客之必發咽痛腎司開闔少陰治在下焦寒邪內甚則開闔不治下焦不約必成下利故云雖爾咽痛復欲下利問曰人病恐怖者其脈何狀師曰脈形如循絲纍纍然其面白脫色也成內經曰血氣者人之神恐怖者血氣不足而神氣弱也脈形似循絲纍纍然面白脫色者針經曰血奪者色夭然不澤其脈空虛是知恐怖為血氣不足問曰人不飲其脈何類師曰其脈自澀唇口乾燥也成澀為陰雖主亡津液而唇口乾燥以陰為主內故不飲也此節疑有缺文問曰人愧者其脈何類師曰脈浮而面色乍白乍赤成愧者羞也愧則神氣怯弱故脈浮而面色改變不常也問曰經説脈有三菽六菽重者何謂也師曰脈者人以指按之如三菽之重者肺氣也如六菽之重者心氣也如九菽之重者脾氣也如十二菽之重者肝氣也按之至骨者腎氣也成菽豆也難經曰如三菽之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指來疾者腎部也各隨所主之分以候臟氣假令下利寸口關上尺中悉不見脈然尺中時一小見脈再舉頭者腎氣也若見損脈來至為難治成脈經曰冷氣在胃中故令脈不通下利不見脈則冷氣客於脾胃今尺中時一小見為脾虛腎氣所乘脈再舉頭者脾為腎所乘也宕尺中之脈更或減損為腎氣亦衰脾復勝之鬼賊相形故云難治是脾勝不應時也問曰脈有相乘有縱有橫有逆有順何也師曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘火名曰順也成金勝木水勝火縱者言縱任其氣乘其所勝橫者言其氣橫逆反乘所不勝也縱橫與恣縱恣橫之義通水為金子火為木子子行乘母其氣逆也母行乘子其氣順也問曰脈有殘賊何謂也師曰脈有弦緊浮滑沉澀此六者名曰殘賊能為諸脈作病也成為人病者名曰八邪風寒暑濕傷於外也飢飽勞逸傷於內也經脈者榮衛也榮衛者陰陽也其為諸經脈作病者必由風寒暑濕傷於榮衛客於陰陽之中風則脈浮寒則脈緊中暑則脈滑中濕則脈澀傷於陰則脈沉傷於陽則脈浮所以謂之殘賊者傷良曰殘害良曰賊以能傷害正氣也問曰脈有災怪何謂也師曰假令人病脈得太陽與形證相應因進湯服比進湯服後食頃病人乃大吐或下利腹中痛師曰我前來不見此證今乃變異是名災怪又問曰何緣作此吐利答曰或有舊時服藥今乃發作故名災怪耳成醫以脈證與藥相對而反變異為其災可怪故曰災怪自三菽六菽以下至災怪脈凡五段皆診治之法問曰東方肝脈其形何似師曰肝者木也名厥陰其脈微弦濡弱而長是肝脈也肝病自得濡弱者愈也成難經曰春脈弦者肝東方木也萬物始生未有枝葉故脈來濡弱而長故曰弦是肝之平脈肝病得此脈者為肝氣已和也假令得純弦脈者死何以知之以其脈如弦直是肝臟傷故知死也成純弦者謂如弦直而不軟此中無胃氣為真臟之脈內經曰死肝脈來急益徑如新張弓弦南方心脈其形何似師曰心者火也名少陰其脈洪大而長是心脈也心病自得洪大者愈也成心王於夏夏則陽外勝氣血淖溢故其脈來洪大而長也假令脈來微去大故名反病在裡也脈來頭小本大者故名覆病在表也上微頭小者則汗出下微本大者則為關格不通不得尿頭無汗者可治有汗者死成心脈來盛去衰為平來微去大是反本脈內經曰大則邪至小則平微為正氣大為邪氣來以候表來微則知表和去以候里去大則知里病內經曰心脈來不盛去反盛此為不及病在中頭小本大者即前小後大也小為正氣大為邪氣則邪氣先在裡今復還於表故名曰覆不云去而止云來者是知在表脈經曰在上為表在下為里汗者心之液上微為浮之而微頭小為前小則表中氣虛故主汗出下微沉之而微本大為後大沉則在裡大則病進內經曰心為牡臟小腸為之使今邪甚下行格閉小陽使正氣不通故不得尿名曰關格脈經曰陽氣上出汗見於頭今關格正氣不通加之頭有汗者則陽氣不得下通而上脫也其無汗者雖作關格然陽未衰而猶可治也西方肺脈其形何似師曰肺者金也名太陰其脈毛浮也肺病自得此脈若得緩遲者皆愈若得數者則劇何以知之數者南方火火克西方金法當癰腫為難治也成輕虛浮曰毛肺之平脈也緩遲者脾之脈脾為肺之母以子母相生故云皆愈數者心之脈火剋金為鬼賊相刑故劇肺主皮毛數則為熱熱客皮膚留而不去則為癰瘍經曰數脈不時則生惡瘡問曰二月得毛浮脈何以言至秋當死師曰二月之時脈當濡弱反得毛浮者故知至秋死二月肝用事肝脈屬木應濡弱反得毛浮者是肺脈也肺屬金金來剋木故知至秋死他皆仿此成當春時反見秋脈為金氣來木肺來克肝奪旺脈而見至秋肺旺肝氣則絶故知至秋死也師曰脈肥人責浮瘦人責沉肥人當沉今反浮瘦人當浮今反沉故責之成肥人肌膚厚其脈當沉瘦人肌膚薄其脈當浮今肥人脈反浮瘦人脈反沉必有邪氣相干使脈反常故當責之師曰寸脈下不至關為陽絶尺脈上不至關為陰絶此皆不治決死也若計其餘命死生之期期以月節克之也成脈經曰陽生於寸動於尺陰生於尺動於寸寸脈下不至關者為陽絶不能下應於尺也尺脈上不至關者為陰絶不能上應於寸也內經曰陰陽離決精氣乃絶此陰陽偏絶故皆決死期以月節克之者謂如陽絶死於春夏陰絶死於秋冬也師曰脈病人不病名曰行尸以無旺氣卒眩僕不識人者短命則死人病脈不病名曰內虛以有穀神雖困無苦成脈者人之根本也脈病人不病為根本內絶形雖且強卒然氣脫則眩暈僵仆而死不曰行尸而何人病脈不病則根本內固形雖且羸止內虛耳穀神者穀氣也穀氣既足自然安矣內經曰形氣有餘脈氣不足死脈氣有餘形氣不足生問曰翕奄沉名曰滑何謂也沉為純陰翕為正陽陰陽和合故令脈滑關尺自平陽明脈微沉食飲自可少陰脈微滑滑者緊之浮名也此為陰實其人必股內汗出陰下濕也成脈來大而盛聚而沉謂之翕奄沉正如轉珠之狀也沉為臟氣故曰純陰翕為腑氣故曰正陽滑者陰陽氣不為偏勝也關尺自平陽明脈微沉者當陽部見陰脈則陰偏勝而陽不足也陽明胃脈胃中陰多故食飲自可少陰脈微滑者當陰部見陽脈則陽偏勝而陰不足也以陽湊陰分故曰陰實股與陰少陰之部也今陽熱湊陰必熏發津液泄達於外股內汗出而陰下濕也許沉為純陰翕為正陽陰陽和合故名滑古人論滑脈雖云往來前卻流利宛轉替替然與數相似仲景三語而足也按翕奄沉三字狀得滑字最好夫翕者合也奄者忽也當脈氣合聚而盛之時奄忽之門即已沉去是名滑也仲景恐人誤認滑脈為沉故下文又曰滑者緊之浮名也曰沉曰浮若異而同更須慧解觀上文緊者如轉索無常也一句則知浮為轉索無常之浮非輕手便得有常之名也沉為翕奄之沉非重取乃得一定之説也仲景下字具有史筆不可草草看過故趙嗣真曰今人不解作秦漢文字觀可謂善讀仲景之書矣問曰曾為人所難緊脈從何而來師曰假令亡汗若吐以肺裡寒故令脈緊也假令咳者坐飲冷水故令脈緊也假令下利以胃中虛冷故令脈緊也陽舒緩陰縮急陰化為寒揪然收斂氣血以堅其為脈也寧得不急經曰緊脈帶數如切繩狀一曰如轉索無常故有寒則見寸口衛氣勝名曰高寸口通關尺而言高謂脈來浮而有力衛氣主表浮以候之其體在上今浮中有力是衛氣盛也以其在上故謂之高有升而不降之義焉榮氣盛名曰章章明也條也往來分明有條理也今滑脈為血實之診殆近是乎高章相搏名曰綱綱總也以榮衛俱盛故謂之總衛氣弱名曰惵舉之濡弱恍惚故謂之惵榮氣弱名曰卑榮主血為陰按以候之其脈沉而無力故謂之卑惵卑相搏名曰損惵卑相搏陰陽俱虛總謂之損舉按俱無力也衛氣和名曰緩緩為胃脈胃合衛氣衛氣和故見緩脈榮氣和名曰遲遲為脾脈脾合榮氣榮氣和故見遲脈遲緩相搏名曰強榮衛俱和故遲緩相搏不亦強乎寸口脈緩而遲緩則陽氣長其色鮮其顏光其聲商毛髮長遲則陰氣盛骨髓生血滿肌肉緊薄鮮硬陰陽相抱榮衛俱行剛柔相搏名曰強也此釋上一句之義此為平脈非病脈也趺陽脈滑而緊滑者胃氣實緊者脾氣強持實擊強痛還自傷以手把刃坐作瘡也成趺陽之脈以候脾胃滑則穀氣實是為胃實緊則陰氣勝是為脾強以脾胃一實一強而相搏擊故令痛也若一強一弱相搏則不能作痛此脾胃兩各強實相擊腑臟自傷而痛譬若以手把刃而成瘡豈非自貽其害乎按此則敦阜大過之脈也寸口脈浮而大浮為虛大為實在尺為關在寸為格寸關則不得小便格則吐逆成經曰浮為虛內經曰大則病進浮則為正氣虛大則為邪氣實在尺則邪氣關閉下焦裡氣不得下通故不得小便在寸則邪氣格拒上焦使食不得入故吐逆丹謹按難經云吸入腎與肝夫盈天地之間者一元之氣也氣之升者為陽氣之降者為陰腎足少陰也肝足厥陰也位居下主吸與入其所吸之氣不能達腎至肝而還者此陰之弱也浮大之脈屬陽見於寸者陽氣偏盛陰不得配之也為格主吐逆此無陰則嘔謂見於尺者陰血不足陽往乘之也為關主不得小便此東垣滋腎丸之意趺陽胃脈氣不宣血不濡名曰關格主水穀不化與食不得入亦陽有餘陰不足故有升而無降也何注文不之及而以邪氣關格閉拒為言歟趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格成伏則胃氣伏而不宣中焦關格正氣壅塞故吐逆而水穀不化澀則脾氣澀而不布邪氣拒於上焦故食不得入有婦人病吐逆大小便不通煩亂四逆漸無脈一日與大承氣湯二盞至半夜漸得大便煩亂觸逆耳脈漸生翌日乃安即此是關格也宜審之脈浮而大浮為風虛大為氣強風氣相搏必成癮疹身體為癢癢者名泄風久久為痂癩成痂癩者眉少發稀身有干瘡而腥臭內經曰脈風成為癘寸口脈弱而遲弱者衛氣微遲者榮中寒榮為血血寒則發熱衛為氣氣微者心內飢飢而虛滿不能食也成衛為陽榮為陰弱者衛氣微陽氣不足也遲者榮中寒經中客邪也榮客寒邪搏而發熱也陽氣內微心內雖飢飢而虛滿不能食也緩遲與弱遲雖止一字之差卻有千里之謬成氏不合注而分解無怪其上下不相同也趺陽脈大而緊者當即下利為難治成大為虛緊為寒胃中虛寒當即下利下利脈當微小反緊者邪勝也故云難治經曰下利脈大者為未止大為實大為虛上下紛紛更易不一者只要識得虛者正氣虛實者邪氣實之義以上以脈知病寸口脈弱而緩弱者陽氣不足緩者胃氣有餘噫而吞酸食卒不下氣填於膈上也成弱者陽氣不足陽能消穀陽氣不足則不能消化穀食緩者胃氣有餘則胃中有未消穀物也故使噫而吞酸食卒不下氣填於膈上也金匱要略曰中焦未和不能消穀故令噫弱緩與遲緩亦不同趺陽脈緊而浮浮為氣緊為寒浮為腹滿緊為絞痛浮緊相搏腸鳴而轉轉即氣動膈氣乃下少陰脈不出其陰腫大而虛也成浮為胃氣虛緊為脾中寒胃虛則滿脾寒則痛虛寒相搏腸鳴而轉轉則膈中之氣因而下泄也若少陰脈不出則虛寒之氣至於下焦結於少陰而聚於陰器不得發泄使陰腫大而虛也寸口脈微而澀微者衛氣不行澀者榮氣不足榮衛不能相將三焦無所仰身體痹不仁榮氣不足則煩疼口難言衛氣虛則惡寒數欠三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不能消穀引食下焦不歸者則遺溲成夫養三焦者血也護三焦者氣也榮衛俱損不能相將而行三焦無所依仰身體為之頑痹而不仁內經曰榮氣虛則不仁針經曰衛氣不行則為不仁榮為血血不足則煩疼榮屬心榮弱心虛則口難言衛為陽陽微則惡寒衛為氣虛則數欠三焦因榮衛不足無所依仰其氣不能歸其部金匱要略曰上焦竭善噫上焦受中焦氣中焦未和不能消穀故令噫耳下焦竭即遺溺失便以上焦在膈上物未化之分也不歸者不至也上焦之氣不至其部則物未能傳化故噫而詐吞中焦在胃之中主腐熟水穀水穀化則思食中焦之氣不歸其部則水穀不化故云不能消穀引食下焦在膀胱上口主分別清濁溲小便也下焦不歸其部不能約制溲便故遺溲三焦病各分其證自有三法存焉趺陽脈沉而數沉為實數消穀緊者病難治成沉為實者沉主裡也數消穀者數為熱也緊為肝脈見於脾部木來剋土為鬼賊相刑其病故云難治按緊與弦當有分別恐未可便以緊為弦也首卷曰弦則為減金匱要略曰脈緊如轉索無常者有宿食也以義求之則弦為虛而緊為實也寸口脈微而澀微者衛氣衰澀者榮氣不足衛氣衰面色黃榮氣不足面色青榮為根衛為葉榮衛俱微則根葉枯稿而寒栗咳逆唾腥吐涎沫也子能令母虛肺主氣氣虛則脾色見於面而黃心主血血衰則肝色見於面而青肺臭腥脾液涎也榮虛則寒栗衛虛則咳逆趺陽脈浮而芤浮者衛氣衰芤者榮氣傷其身體瘦肌肉甲錯浮芤相搏宗氣衰微四屬斷絶成經曰衛氣盛名曰高高者暴狂而肥榮氣盛名曰章章者暴澤而光其身體瘦而不肥者衛氣衰也肌肉甲錯而不澤者榮氣傷也宗氣者三焦歸氣也四屬者皮肉脂髓也榮衛衰傷則宗氣亦微四屬失所滋養致斷絶矣寸口脈微而緩微者衛氣疏疏則其膚空緩者胃氣實實則谷消而水化也谷入於胃脈道乃行而入於經其血乃成榮盛則其膚必疏三焦絶經名曰血崩成衛為陽微為亡陽脈微者衛氣疏衛溫分肉肥湊理衛氣既疏皮膚不得溫肥則空虛也經曰緩者胃氣有餘有餘為實故云緩者胃氣實內經曰食入於胃淫經於脈是谷入於胃脈道乃行也針經曰飲而液滲於絡合和於血是水入於經其血乃成也胃中谷消水化而為血氣今衛疏榮盛是榮氣強而衛氣弱也衛氣弱者外則不能固密皮膚而氣為之疏內則不能衛護其血而血為之崩經常也三焦者氣之道路衛氣疏則氣不循常度三焦絶其常度也按經文曰而入於經則而字乃承上文谷字水亦在其中矣注引針經水入於經乃是互文以見意仲景獨重於谷故用而字若欠理會則血為水所化也豈理也哉玩合和於三字則成氏之説欠明趺陽脈微而緊緊則為寒微則為虛微緊相搏則為短氣成中虛且寒氣自短矣少陰脈弱而澀弱者微煩澀者厥逆成煩者熱也少陰脈弱者陰虛也陰虛則發熱以陰部見陽脈非大虛也故生微煩厥逆者四肢冷也經曰陰陽不相順接便為厥厥者手足厥冷是也少陰脈澀者陰氣澀不能與陽相順而接故厥逆也此假不當作二證趺陽脈不出脾不上下身冷膚硬成脾胃為榮衛之根脾能上下則水穀消磨榮衛之氣得以行脾氣虛衰不能上下則榮衛之氣不得通榮於外故趺陽脈不出身冷者衛氣不溫也膚硬者榮血不濡也少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥當刺期門巨闕成尸厥者為其從厥而生形無所知其狀若尸故名尸厥少陰脈不出則厥氣客於腎而腎氣微少精血厥氣上奔填塞胸膈壅遏陽氣使宗氣反聚而血結心下針經曰五穀入於胃其糟粕津液宗氣分為三隧宗氣積於胸中出於喉嚨以貫心肺而行呼吸又曰榮氣者泌其津液注之於脈化而為血以榮四末今厥氣太甚宗氣反聚而不行則絶其呼吸血結心下而不流則四體不仁陽氣為厥氣所擁不能宣發退下至陰股問與陰相動仁者柔也不仁者言不柔和也為寒熱痛癢俱不覺知者也陽氣外不為使內不得通榮衛俱不能行身體不仁狀若尸也內經曰厥氣上行滿脈去形刺期門者以通心下結血刺巨闕者以行胸中宗氣血氣流通厥氣退則蘇矣寸口脈微尺脈緊其人虛損多汗知陰常在絶不見陽也成寸微為亡陽尺緊為陰勝陽微陰勝故云虛損又加之多汗則愈損陽氣是陰常在而絶不見陽也寸口諸微亡陽諸濡亡血諸弱發熱諸緊為寒諸乘寒者則為厥鬱冒不仁以胃無穀氣脾澀不通口急不能言戰而栗也成衛陽也微為衛氣微故云亡陽榮血也濡為榮氣弱故云亡血弱為陰虛虛則發熱緊為陰勝故為寒諸乘寒者則陰陽俱虛而為寒邪乘之也寒乘氣虛抑伏陽氣不得宣發遂成厥也鬱冒為昏冒不知仁也不仁為強直而無覺也為尸厥焉以胃無穀氣致脾澀不通於上下故使口急不能言其曰戰者寒在表也栗者寒在裡也問曰濡脈何以反適十一頭師曰五臟六腑相乘故令十一成濡弱者氣血也往反有十一頭頭者五臟六腑共有十一也問曰何以知乘腑何以知乘臟師曰諸陽浮數為乘腑諸陰遲澀為乘臟也成腑陽也陽脈見者為乘腑也臟陰也陰脈見者為乘臟也陽濡而弱則乘於腑陰濡而弱則乘於臟藥性傷寒方藥雖成氏注釋頗為明晰而未能盡藥性之奧故特以仲景一百一十三方中所用九十種藥性採諸家之説以發明之學者誠能熟玩而詳究焉則長沙用藥制方之遺意庶幾不昧而亦可以引而伸之觸類而長之矣風升生味之薄者陰中之陽味薄則通酸苦鹹平是也麻黃氣溫味苦辛氣味俱薄陽也升也無毒手太陽之劑入足太陽經走手少陰經陽明經藥發太陽少陰經汗垣輕可去實麻黃葛根之屬是也六淫有餘之邪客於陽分皮毛之間腠理閉拒榮衛氣血不行故謂之實二藥輕清成象故可去之麻黃微苦其形中空陰中之陽入足太陽寒水之經其經循背下行本寒而又受外寒故宜發汗去皮毛氣分寒邪以泄表實若過發則汗多亡陽或飲食勞倦及雜病自汗表虛之證用之則脫人元氣不可不禁海麻黃治衛實之藥桂枝治衛虛之藥二物雖為太陽證藥其實榮衛藥也心主榮為血肺主衛為氣故麻黃為手太陰肺之劑桂枝為手少陰心之劑傷寒傷風而咳嗽用麻黃桂枝即湯液之源也珍仲景治傷寒無汗用麻黃有汗用桂枝歷代名醫解釋皆隨文傅會未有究其精微者時珍常繹思之似有一得與昔人所解不同云津液為汗汗即血也在榮則為血在衛則為汗夫寒傷榮榮血內澀不能外通於衛衛氣閉固津液不行故無汗發熱而憎寒夫風傷衛衛氣外泄不能內護於榮榮氣虛弱津液不固故有汗發熱而惡風然風寒之邪皆由皮毛而入皮毛者肺之合也肺主衛氣包羅一身天之象也是證雖屬乎太陽而肺實受邪氣其證時兼面赤怫鬱咳嗽有痰喘而胸滿諸證者非肺病乎蓋皮毛外閉則邪熱內攻而肺氣憤郁故用麻黃甘草同桂枝引出榮分之邪達之肌表佐以杏仁泄肺而利氣汗後無大熱而喘者加以石膏朱肱活人書夏至後加石膏知母皆是泄肺火之藥是則麻黃湯雖太陽發汗重劑實為發散肺經火鬱之藥也腠理不密則津液外泄而肺氣自虛虛則鋪其母故用桂枝同甘草外散風邪以救表內伐肝木以防脾佐以芍藥泄木而固脾泄東所以補西也使以薑棗行脾之津液而和榮衛也下後微喘者加厚朴杏仁以利肺氣也汗後脈沉遲者加人參以益肺氣也朱肱加黃芩為陽旦湯以瀉肺熱也皆是脾肺之藥是則桂枝雖太陽解肌輕劑實為理脾救肺之藥也修治去蘆及根節銼細以流水煮二三沸掠去上沫不爾使人心煩服麻黃自汗不止者以冷水浸頭髮仍以根節煎湯止之凡服麻黃藥須避風不爾病復作也細辛氣溫味大辛氣厚於味陽也無毒少陰經藥手少陰引經之藥垣治少陰頭痛如神當少用之獨活為使溫陰經散水寒以去內寒治邪在裡之表故仲景少陰證用麻黃附子細辛湯也易老治少陰頭痛太陽則羌活少陰則細辛陽明則白芷厥陰則川芎吳茱萸少陽則柴胡用者隨經不可差細辛香味俱細而緩故入少陰與獨活相類修治揀去雙葉者以瓜水浸一宿曬乾鍘細用柴胡氣平味微苦氣味俱輕陽也升也無毒少陽經厥陰經引經之藥除虛勞煩熱解肌熱去往來寒熱早晨潮熱婦人産前産後必用之藥善除本經頭痛非他藥能止治心下痞胸膈痛海在經主氣在臟主血前行則惡熱卻退則惡寒惟氣之微寒味之薄者故能行經能去臟腑內外俱之既能引清氣上行而順陽道蓋以少陽之氣初出地之皮為嫩陽故以少陽當之修治去蘆鍘細竹篩齊之用葛根氣平味甘無毒陽明經引經藥足陽明經行經的藥治脾胃虛而渴除胃熱解酒毒陶生葛搗汁飲解溫病發熱頌仲景治傷寒有葛根湯以其主大熱解肌發腠理故也潔升陽生津脾虛作渴者非此不除勿多用恐傷胃氣張仲景治太陽陽明合病桂枝湯內加麻黃葛根又有葛根黃芩黃連解肌湯是用此以斷太陽入陽明之路非即太陽藥也頭顱痛如破乃陽明中風可用葛根蔥白湯為陽明仙藥若太陽初病未入陽明而頭痛者不可便服升麻葛根發之是反引邪氣入陽明為引賊破家也珍本草十劑云輕可去實麻黃葛根之屬蓋麻黃乃太陽經藥兼入肺經肺主皮毛葛根乃陽明經藥兼入脾經脾主肌肉所以二味藥皆輕揚發散而所入迥然不同也修治鍘細竹篩齊之用升麻氣平味苦甘味薄氣厚陽中之陰也無毒陽明經本經藥垣能解肌肉間熱此手足陽明經傷風之的藥也若補脾胃非此為引用不能補若得蔥白白芷之類亦能走手足陽明太陰發散本經風邪元氣不足者用此於陰中升陽氣上行升麻入足陽明若初病太陽證便服升麻葛根發出陽明經汗或失之過陽明經燥太陽經不可解必傳陽明矣投湯不當非徒無益而又害之也朱氏云瘀血入里若衄血吐血者犀角地黃湯乃陽明經聖藥也如無犀角以升麻代之升麻犀角性味相遠不同何以代之蓋以升麻止是引地黃及余藥同入陽明耳仲景云太陽病若發汗若利小便重亡津液胃中乾燥因轉屬陽明其害不可勝言又云太陽𠘧𠘧無汗者葛根湯發之若𠘧𠘧自汗者表虛也不宜用此朱氏用升麻者以表實無汗也修治刮去黑皮去腐爛里白者佳銼細竹篩齊之始可用蔥白氣平味辛無毒氣厚味薄升也陽也入手太陰足陽明經專主發散以通上下陽氣故活人書治傷寒頭痛如破用連須蔥白湯主之張仲景治少陰病下利清穀裡寒外熱厥逆脈微者白通湯主之內用蔥白若面色赤者四逆湯加蔥白腹中痛者去蔥白成無己解之曰腎惡燥急食辛以潤之蔥白辛溫以通陽氣也珍蔥乃釋家五葷之一生辛散熟甘溫外實中空肺之菜也肺病宜食之肺主氣外應皮毛其合陽明故所治之證多屬太陰陽明皆取其通氣發散之功通氣故能解毒及理血病氣者血之帥也氣通則血活矣故金瘡等用之皆有殊效瓜蒂甜瓜蒂也氣寒味苦有毒病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸中有寒也當吐之太陽中暍身熱疼重而脈微弱此夏月傷冷水水行皮中也宜吐之少陽病頭痛發寒熱脈緊不大是膈上有痰也宜吐之病胸上諸實鬱郁而痛不能食欲人按之而反有濁唾下利日十餘行寸口脈微弦者當吐之懊憹煩躁不得眠未經汗下者謂之實煩當吐之宿食在上脘者當吐之並宜以瓜蒂散主之惟諸亡血虛家不可與瓜蒂散也成高者越之在上者湧之故越以瓜蒂香豉之苦湧以赤小豆之酸酸苦湧泄為陰也垣難經云上部有脈下部無脈其人當吐不吐者死此飲食內傷填塞胸中食傷太陰風木生髮之氣伏於下宜瓜蒂散吐之素問所謂木鬱則達之也吐去上焦有形之物則木得舒暢天地交而萬物通矣若尺脈絶者不宜用此恐損真元令人胃氣不復也珍瓜蒂乃陽明經除濕熱之藥故能引去胸脘痰涎頭目濕氣皮膚水氣黃疸濕熱諸證甜瓜蒂以團而短者良若長如瓠子者此名菜瓜不可用也氣足時其蒂自然落在蔓上採得系屋東有風處吹乾用桔梗氣微溫味苦辛甘有小毒味厚氣輕陽中之陰升也入手太陰肺經氣分及足少陰經治咽喉痛利肺氣潔桔梗清肺氣利咽喉其色白故為肺部引經與甘草同行為舟楫之劑如大黃苦泄峻下之藥欲引至胸中至高之分成功須用辛甘之劑升之譬如鐵石入江非舟楫不載所以諸藥有此一味不能下沉也珍朱肱活人書治胸中痞滿不痛用桔梗枳殼取其通肺利膈下氣也張仲景傷寒論治寒實結胸用桔梗貝母巴豆取其溫中消穀破積又治肺癰唾膿用桔梗甘草取其苦辛清肺甘溫瀉火又能排膿血補內漏其治少陰證二三日咽痛亦用桔梗甘草取其苦辛散寒甘平除熱合而用之能調寒熱也後人易名甘桔湯通治咽喉口舌諸病宋仁宗加荊芥防風連翹遂名如聖湯去蘆米泔浸一宿焙乾銼片竹篩齊用熱浮長氣之厚者陽中之陽氣厚則發熱辛甘溫熱是也桂枝氣熱味甘辛有小毒陽中之陽浮也仲景傷寒論發汗用桂枝桂枝者乃桂條也非身干也取其輕薄而能發散今又有一種柳桂乃嫩小桂條也尤宜入治上焦藥用潔氣之薄者桂枝也氣之厚者桂肉也氣薄則發泄桂枝上行而發表氣厚則發熱桂肉下行而補腎此天地親上親下之道也海桂枝入足太陽經桂心入手少陰經血分桂肉入足少陰太陰經血分細薄者為枝為嫩厚脂者為肉為老去其皮與里當其中者為桂心寇素問曰辛甘發散為陽故仲景桂枝湯治傷寒表虛皆須此藥正合甘發散之意本草三種之桂不用牡桂菌桂者此二種性止於溫不可以治溫寒之病也然本經止言桂仲景又言桂枝者取枝上皮也海或問本草言桂能止煩出汗而張仲景治傷寒有當發汗凡數處皆用桂枝湯又云無汗不得服桂枝汗家不得重發汗若用桂枝是重發其汗汗多者用桂枝甘草湯此又用桂枝閉汗也一藥二用與本草之義相通否乎曰本草言桂辛甘大熱能宣導百藥通血脈止煩出汗是調其血而汗自出也仲景云太陽中風陰弱者汗自出衛實榮虛故發熱汗出又云太陽病發熱汗出者此為榮弱衛強陰虛陽必湊之故皆用桂枝發其汗此乃調其榮氣則衛氣自和風邪無所容遂自汗而解非桂枝能開腠理髮出其汗也汗多用桂枝者以其調和榮衛則邪從汗出而汗自止非桂枝能閉汗孔也昧者不知出汗閉汗之意遇傷寒無汗者亦用桂枝誤之甚矣桂枝湯下發汗字當認作出字汗自然發出非若麻黃能開腠理髮出其汗也其治虛汗亦當逆察其意可也成桂枝本為解肌若太陽中風湊理致密榮衛邪實津液禁固其脈浮緊發熱汗不出者不可與此必也皮膚疏泄自汗脈浮緩風邪干於衛氣者乃可投之發散以辛甘為主桂枝辛熱故以為君而以芍藥為臣甘草為佐者風淫所勝平以辛苦又以甘緩之以酸收之也以薑棗為使者辛甘能發散而又用之以行脾胃之津液而和榮衛不專於發散也故麻黃湯不用薑棗專於發汗不待行其津液也心桂枝氣味俱輕故能上行發散於表內寒則肉桂補陽則柳桂桂辛熱散經寒引導陽氣若正氣虛者以辛潤之散寒邪治奔豚按經云桂枝入咽陽盛則斃春夏發者為禁藥也桂能動血血熱者為禁藥也木得桂而死肝不足者為禁藥也修治桂之毒在皮故方中皆去皮用附子氣熱味辛有大毒潔大辛大熱氣厚味薄可升可降陽中之陰浮中沉無所不至為諸經引用之藥海入手少陰三焦命門之劑其性走而不守非若乾薑正而不行趙熟附配麻黃髮中有補仲景麻黃附子細辛湯麻黃附子甘草湯是也生附配乾薑補中有發仲景乾薑附子湯通脈四逆湯是也珍凡用烏附藥並宜冷服者熱因寒用也蓋陰寒在下虛陽上浮治之以寒則陰氣益甚而病增治之以熱則拒格而不納熱藥冷飲下嗌之後冷體既消熱性便發而病氣隨愈不違其情而致大益此反治之妙也昔張仲景治寒疝內結用蜜煎烏頭近效方治喉痹用蜜炙附子含之咽汁朱丹溪治疝氣用烏頭梔子並熱因寒用也東垣治馮翰林侄陰盛格陽傷寒面赤目赤煩渴引飲脈來七八至但按之則散用薑附湯加人參投半斤服之得汗而愈此則神聖之妙也吳附子乃陰證要藥凡傷寒傳變三陰及中寒夾陰雖身大熱而脈沉者必用之或厥冷腹痛脈沉細甚則唇青囊縮者急須用之有退陰回陽之力起死回生之功近世陰證傷寒往往疑似不敢用附子直待陰極陽竭而用之已遲矣且夾陰傷寒內外皆陰陽氣頓衰必須急用人參健脈以益其元佐以附子溫經散寒舍此不用將何以救之虞摶附子稟雄壯之質有斬關奪將之氣能引補氣藥行十二經以追復散失之元陽引補血藥入血分以滋養不足之真陰引發散藥開腠理以驅逐在表之風寒引溫暖藥達下焦以祛除在裡之冷濕按八味丸用桂附乃取其大辛以潤腎燥丹溪謂行地黃之滯海藏云補命門相火皆非也童子小便中浸透濕紙包裹灰火內煨熟如芋香為度去皮臍切片子用乾薑氣溫味辛無毒潔氣薄味厚半浮半沉可升可降陽中之陰也大辛大熱陽中之陽其用有四通心助陽一也去臟腑沉寒痼冷二也發諸經之寒氣三也治感寒腹痛四也腎中無陽脈氣欲絶黑附子為引水煎服之名薑附湯亦治中焦寒邪寒淫所勝以辛散之也又能補下焦故四逆湯用之乾薑本辛炮之稍苦故止而不移所以能治裡寒非若附子行而不止也理中湯用之者以其回陽也垣乾薑生辛炮苦陽也生則逐寒邪而發散炮則除胃冷而守中多用則耗散元氣辛以散之是壯火食氣故也須以生甘草緩之辛熱以散裡寒同五味子用以溫肺同人參用以溫胃也海乾薑心脾二經氣分藥也故補心氣不足或言乾薑辛熱而言補脾今理中湯用之言泄不言補何也蓋辛熱燥濕泄脾中寒濕邪氣非泄正氣也白淨結實者良宜炮用生薑氣微溫味辛氣味俱厚浮而升陽也無毒成薑棗味辛甘專行脾之津液而和榮衛藥中之不獨專於發散也垣生薑之用有四製半夏厚朴之毒一也發散風寒二也與棗同用辛溫益脾胃元氣溫中去濕三也與芍藥同用溫經散寒四也孫真人云薑為嘔家聖藥蓋辛以散之嘔乃氣遂不散此藥行陽而散氣也或問生薑辛溫入肺何以云入胃口曰俗以心下為胃口者非也咽門之下受有形之物及胃之系便是胃口與肺系同行故能入肺而開胃口也曰人云夜間勿食生薑令人閉氣何也曰生薑辛溫主開發夜則氣本收斂反開發之違天道矣若有病人則不然也生薑屑比之乾薑則不熱比之生薑則不濕以乾生薑代乾薑者以其不僭故也俗言上床蘿蔔下床薑薑能開胃羅卜消食也要熱去皮用要冷留皮用吳茱萸氣溫味辛有小毒海辛苦熱氣味俱厚陽中陰也半浮半沉入足太陰經血分少陰厥陰經氣分潔其用有三去胸中逆氣滿塞止心腹感寒㽱痛消宿酒為白豆蔻之使也垣治寒在咽嗌噎塞胸中經言噎膈不通食不下食則嘔令人口開目瞪寒邪所結氣不得上下此病不已令人寒中腹滿膨脹下利宜以吳茱萸之苦熱泄其逆氣用之如神諸藥不可代也海衛脈為病逆氣裡急宜此主之震坤合見其色緑故仲景吳茱萸湯當歸四逆湯方治厥陰病及溫脾胃皆用此也湯洗去苦味曬乾搗用蜀椒氣溫味辛有毒主邪氣溫中除寒痹堅齒髮明目利五臟戴凡人嘔吐服藥不納者必有蛔在膈間蛔聞藥則動動則藥出而蛔不出但於嘔吐藥中加炒川椒十粒良蓋蛔見椒則頭伏也觀此則仲景治蛔厥烏梅丸中用蜀椒亦此義也許學士云大凡腎氣上逆須以川椒引之歸經則安去目及閉口者炒去汗手搓細用巴豆氣溫味辛有大毒潔氣薄味厚體重而沉降陰也垣性熱味辛有大毒浮也陽中陽也潔乃斬關奪門之將不可輕用海若急治為水穀道路之劑去皮心膜油生用若緩治為消堅磨積之劑炒去煙令紫黑用可以通腸可以止瀉世所不知也張仲景治百病客忤備急丸用之厚朴氣溫味苦辛無毒氣味俱厚體重濁而微降陰中陽也垣可升可降能除腹脹若虛弱人雖腹脹宜斟酌用之寒脹是也大熱藥中兼用結者散之神藥也誤服脫人元氣須禁之海本草言厚朴治中風傷寒頭痛溫中益氣消痰下氣厚腸胃去腹滿果泄氣乎果益氣乎蓋與枳實大黃同用則能泄實滿所謂消痰下氣是也若與橘皮蒼朮同用則能除濕滿所謂溫中益氣是也與解利藥同用則治傷寒頭痛與瀉利藥同用則厚腸胃大抵其性味苦溫用苦則泄用溫則補也故成氏云厚朴之苦以泄腹滿若能下氣故泄實滿溫能益氣故散濕滿去皮鍘碎薑汁浸透微炒竹篩齊用濕化成戊濕其本氣平其兼氣溫涼寒熱在人以胃應之巳土其本味鹹其兼味辛甘鹹苦在人以脾應之人參氣溫味甘微苦氣味俱薄浮而升陽也陽中微陰無毒垣人參甘溫能補肺中元氣肺氣旺則四臟之氣皆旺精自生而形自盛肺主諸氣故也張仲景云病人汗後身熱亡血脈沉遲者下利身涼脈微血虛者並加人參古人血脫者益氣蓋血不自生須得生陽氣之藥乃生陽生則陰長血乃旺也若單用補血藥血無由而生矣素問言無陽則陰無以生無陰則陽無以化故補氣須用人參血虛者亦須用之本草十劑云補可去弱人參羊肉之屬是也蓋人參補氣羊肉補形形與氣者有無之象也李人參生用氣寒熟用氣溫味甘補陽微苦補陰氣主生物本乎夫味主成物本乎地氣味生成陰陽之造化也涼者高秋清肅之氣天之陰也其性降溫者陽春生髮之氣天之陽也其性升甘者濕土化成之味地之陽也其性浮微苦者火土相生之味地之陰也其性沉人參氣味俱薄氣之薄者生降熟升味之薄者生升熟降如土虛火旺之病則宜生人參乃涼薄之氣以瀉火而補土是純用其氣也脾虛肺怯之病則宜熟人參乃甘溫之味以補土而生金是純用其味也東垣以相火乘脾身熱而煩氣高而喘頭痛而渴脈浮而大者用黃柏佐人參孫真人治夏月熱傷元氣人汗大泄欲成痿厥用生脈散以瀉熱火而救金水君以人參之甘寒瀉火而補元氣臣以麥門冬之苦甘寒清金而滋水源佐以五味子之酸溫生腎津而收耗氣使此皆補天元之真氣非補熱火也余每治傷寒溫熱等證為庸醫妄汗誤下已成壞病死在旦夕者以人參一二兩用童子小便煎之水浸冰冷飲之立起去蘆鍘細用術氣溫味甘陰中陽也可升可降入足太陰陽明手太陰陽明太陽之經垣本經止言術未分蒼白而蒼朮別有雄壯上行之氣能除濕下安太陰使邪氣不傳入脾也以其經泔浸火炒故能出汗與白朮止汗特異用者不可以此代彼蓋有止發之異其餘主治則同潔蒼朮與白朮主治同但比白朮氣重而體沉若除上濕發汗功最大若補中焦除脾胃濕力少不如白朮腹中窄狹者須用之白朮能除濕益燥和中益氣利腰劑間血除胃中熱潔其用有九溫中一也去脾胃中濕二也除胃中熱三也強脾胃進飲食四也和胃生津液五也止肌熱六也四肢困倦嗜臥目不能開不思飲食七也止渴八也安胎九也凡中焦不受濕不能下利必須白朮以逐水益脾非白朮不能去濕非枳實不能消痞故枳朮丸以之為君搗碎紗羅子羅過用當歸氣溫味甘辛氣味俱輕陽也陽中微陰無毒入手少陰經足太陰經厥陰經和血補血尾破血身和血潔其用有三一心經本藥二和血三治諸病夜甚凡血受病必須用之血壅而不流則痛當歸之甘溫能和血辛溫能散內寒苦溫能助心散寒使氣血各有所歸海入手少陰以其心生血也入足太陰以其脾裹血也入足厥陰以其肝藏血也頭能破血身能養血尾能行血全用同人參黃耆則補氣而生血同牽牛大黃則行氣而補血從桂附茱萸則熱從大黃芒硝則寒佐使分定用者當知酒蒸治頭痛諸痛皆屬木故以血藥主之修治酒製焙曬乾去蘆鍘細用生地黃氣寒味甘微苦味厚氣薄陰中之陽無毒入手太陽經少陰經之劑垣涼血補血補腎水真陰不足錢仲暘瀉丙火與木通同用以導赤也諸經之血熱與他藥相隨亦能治之溺血便血亦治之入四散例病人虛而多熱宜加用之戴陰微陽盛相火熾強來乘陰位日漸煎熬為虛火之證者宜地黃之屬以滋陰退陽本經所謂乾地黃者或陰乾或曝乾或焙乾皆謂之乾地黃今藥肆所謂生地黃是也故本草又云生者尤良若取涼血退熱之功非新掘鮮者搗汁用之不得奇效掐碎用忌鐵器萊蔔甘草氣平味甘氣薄味厚升而浮陽也入足太陰厥陰經垣陽不足者補之以甘甘溫能除大熱故生用則氣平補脾胃不足而大瀉心火炙之則氣溫補三焦元氣而散表寒除邪熱去咽痛緩正氣養陰血凡心火乘脾腹中急痛腹皮急縮者宜倍用之其性能緩急而又協和諸藥使之不爭故熱藥得之緩其熱寒藥得之緩其寒寒熱相雜者用之得其平海五味之用苦泄辛散酸收咸軟甘上行而發而本草言甘草下氣何也蓋甘味主中有升降浮沉可上可下可外可內有和有緩有補有泄居中之道盡矣張仲景附子理中湯用甘草恐其僭上也調胃承氣湯用甘草恐其速下也皆緩之之意小柴胡湯有柴胡黃芩之寒人參半夏之溫而用甘草者則有調和之意建中湯用甘草以補中而緩脾急也鳳髓丹用甘草以緩腎急而生元氣也乃甘補之意又曰甘者令人中滿中滿者勿食甘甘緩而壅氣非中滿所宜也凡不滿而用炙甘草為之補若中滿而用生甘草為之瀉能引諸藥直至滿所甘味入脾歸其所喜此升降浮沉之理也經云以甘補之以甘瀉之以甘緩之是矣補中宜炙用瀉火宜生用萎蕤氣平味甘無毒能升能降陽中陰也主中風暴熱不能動搖趺筋結肉諸不足心腹結氣虛熱濕毒腰痛時疾寒熱去虛勞客熱頭痛不安加而用之良垣潤肺除熱珍萎蕤性平味甘柔潤可食故朱肱活人書治風溫自汗身重語言難出用萎蕤湯以之為君藥豫每用治虛勞寒熱痁瘧及一切不足之證用代參耆不寒不燥大有殊功不止於去風熱濕毒而已此昔人所未闡者也與黃精鉤吻二物相似萎蕤節上有鬚毛莖斑葉尖處有小黃點為不同採得以竹刀刮去節皮洗淨以蜜水浸一宿蒸焙乾用大棗氣平味甘無毒氣味俱厚陽也溫以補不足甘以緩陰血成邪在榮衛者辛甘以解之故用薑棗以和榮衛生髮脾胃升騰之氣張仲景治奔豚用大棗滋脾土以平腎氣也治水飲脅痛有十棗湯益土而勝水也珍素問言棗為脾之果脾病宜食之謂治病和藥棗為脾經血分藥也若無故頻食則生蟲損齒為害多矣按王好古云中滿者勿食甘甘令人滿故仲景建中湯心下痞者減餳棗與甘草同例此得用棗之方矣陶道家方藥以棗為佳餌其皮利肉補虛所以合湯皆擘之也粳米氣平味甘苦無毒有早中晚三收以晚白米為第一新熟者動氣經年者亦發病惟江南人多收火稻貯倉至春舂米食之即不發病宜人溫中益氣補下元也海本草諸家共言益脾胃如何白虎湯用之入肺以其陽明為胃之經色為西方之白故入肺也然治陽明之經即在胃也色白味甘寒入手太陰又少陰證桃花湯用此甘以補正氣竹葉石膏湯用此甘以益不足食蜜氣平味甘無毒珍蜂採無毒之花釀以大便而成蜜所謂臭腐生神奇也此入藥之功有五清熱補中解毒潤燥止痛也生則性涼故能清熱熟則性溫故能補中甘而和平故能解毒柔而濡澤故能潤燥緩可以去急故能止心腹肌肉瘡瘍之痛和可以致中故能調和百藥而與甘草同功仲景治陽明結燥大便不通蜜煎導法誠千古神方也膠飴氣溫味甘無毒入太陰經成脾欲緩急食甘以緩之膠飴之甘以緩中也海飴乃脾經氣分藥也甘能補脾之不足寇宗奭云多食動脾氣亦助胃火阿膠氣平味甘無毒氣味俱薄浮而升陽也入手少陰足少陰厥陰經得火良藏器曰諸膠皆主風止泄而驢皮主風為最寇驢皮煎膠取其發散皮膚之外也用烏者取烏色屬水以制熱則生風之義如烏蛇烏鴉烏雞之類皆然珍阿膠大要只是補血與液故能清肺益陰而治諸證按陳自明云補虛用牛皮膠去風用驢皮膠成氏云陰不足者補之以味阿膠之甘以補陰血楊氏云凡治喘嗽不論肺虛肺實可下可溫須用阿膠以安肺潤肺其性和平為肺經要藥銼如豆大或以蛤粉或以麩或以草灰皆炒成珠研末用或以湯酒熔化各從本方半夏氣平味辛有毒生微寒熟溫生令人吐熟令人下氣味俱薄沉而降陰中陽也辛厚苦輕陽中陰也入手陽明太陰少陰三經治寒痰及形寒飲冷傷肺而咳大和胃氣除胃寒進食治太陰痰厥頭痛非此不能除成辛者散也潤也半夏之辛散逆氣結氣除煩嘔發音聲行水氣而潤腎燥海經云腎主五液化為五濕自入為唾入肝為淚入心為汗入脾為痰入肺為涕有痰曰嗽無痰曰咳痰者因咳而動脾之濕也半夏能泄痰之標不能泄痰之本泄本者泄腎也咳無形痰有形無形則潤有形則燥所以為流濕潤燥也俗以半夏為肺藥非也止嘔吐為足陽明除痰為足太陰柴胡為之使故小柴胡湯中用之雖為止嘔亦助柴胡黃芩主往來寒熱是又為足少陽陽明也湯洗盡滑鍘細用諸血證及口渴者禁用為其燥津液也孕婦忌之用生薑則無害杏仁氣溫味甘苦冷利有小毒潔氣薄味厚濁而沉墜降也陰也入手太陰經其用有三潤肺也消食積也散滯氣也垣杏仁散結潤燥除肺中風熱咳嗽杏仁下喘治氣也桃仁療狂治血也俱治大便祕當分氣血晝則便難行陽氣也夜則便難行陰血也故虛人便祕不可過泄脈浮者屬氣用杏仁陳皮脈沉者屬血用桃仁陳皮手陽明與手太陰為表裡賁門主往來魄門主收閉為氣之通道故並用陳皮佐之海仲景麻黃湯及王朝奉治傷寒氣上喘逆並用杏仁者為其利氣瀉肺解肌也修治以湯浸去皮尖麩炒杵細用桃仁氣平味苦甘辛無毒垣桃仁苦重於甘氣薄味厚沉而降陰中之陽手足厥陰經血分藥也苦以泄滯血甘以生新血故破凝血者用之其功有四治熱入血室一也泄腹中滯血二也除皮膚血熱燥癢三也行皮膚凝聚之血四也成肝者血之源血聚則肝氣燥肝苦急急食甘以緩之桃仁之甘以緩肝散血故張仲景抵當湯用之以治傷寒八九日內有蓄血發熱如狂小腹滿痛小便自利者又有當汗失汗熱毒深入吐血及血結胸煩躁譫語者亦以此湯主之與虻蟲水蛭大黃同用修治行血連皮尖潤燥活血去皮尖麩炒俱搗細用麻子仁氣平味甘無毒手陽明足太陰藥也陽明病汗多胃熱便難三者皆燥也故用之以通潤也寇宗奭云麻仁極難去殼取帛包置沸湯中浸至冷出之垂井中一夜勿令著水次日日中曬乾新瓦上挼去殼簸揚取仁粒粒皆完先藏地中者食之殺人雞子黃氣溫味甘無毒本草云陰不足補之以血若咽有瘡雞子一枚去黃苦酒傾殼中以半夏入苦酒中取殼置刀環上熬微沸去滓旋旋呷之又主除熱火瘡癇痙卵白為肌肉皮毛卵黃為臟腑卵白象天卵黃象地故有陰陽表裡氣血之分焉甘瀾水水氣平味甘無毒傷寒汗後臍下悸欲作奔豚茯苓桂枝甘草大棗湯主之煎以甘瀾水揚之無力取不助腎氣也虞搏曰甘瀾水甘溫而性柔故烹傷寒陰證等藥用之潦水即霖雨後行潦之水亦取其發縱之極流而不滯不助濕也漿水氣微溫味甘酸無毒即酸泔水也或云煮粟米飲釀成主調中引氣宣和強力通關開胃解煩去睡丹漿水性涼善走故解煩渴而化滯物按漿水能止渴以其酸也能化滯以其米味之變也亦猶神麯麥芽之消食非性涼善走之謂燥降收氣之薄者陽中之陰氣薄則發泄辛甘淡平寒涼是也茯苓氣平味甘無毒潔性溫味甘而淡氣味俱薄浮而升陽也垣止渴利小便除濕益燥和中益氣利腰臍間血為主治小便不通溺黃或赤而不利如小便利或數服之則大損人目如汗多人服之損真氣夭人壽醫云赤瀉白補上古無此説淡能利竅甘以助陽除濕之聖藥也味甘平補陽益脾逐水濕淫所勝小便不利淡味滲泄陽也治水緩脾生津導氣海入足少陰手足太陽色白者入辛王癸赤者入丙丁伐腎邪小便多能止之小便澀能利之與車前子相似雖利小便而不走氣酒浸與光明硃砂同用能祕真味甘平如何是利小便去皮搗細紗羅過用澤瀉氣平味甘無毒潔沉而降陰也垣甘鹹寒降陰也海陰中微陽入足太陽少陰經除濕之聖藥也治小便淋瀝去陰間汗無此疾服之令人目盲寇澤瀉之功長於行水張仲景治水蓄渴煩小便不利或吐或瀉五苓散主之方用澤瀉故知其長於行水本草引扁鵲云多服病人眼誠為以物性能水凡服澤瀉散人未有不小便多者小便既多腎氣焉得復實今人止泄精多不敢用之仲景八味丸用之者亦不過接引桂附等歸就腎經別無他意海本經云久服明目扁鵲云多服昏目何也易老云去脾中宿垢以其味鹹能瀉伏水故也瀉伏水去留垢故明目小便利腎氣虛故昏目王寇宗奭之説王好古韙之竊謂八味丸以地黃為君余藥佐之非止補血兼補氣也所謂陽旺則能生陰血也地黃山茱萸茯苓牡丹皮皆腎經之藥附子官桂乃右腎命門之藥皆不待澤瀉之接引而後至也則八味丸之用此蓋取其瀉腎邪養五臟益氣力起陰氣補虛損五勞之功而已雖能瀉腎從於諸補藥群衆之中則亦不能瀉矣珍澤瀉氣平味甘而淡淡能滲泄氣味俱薄所以利水而泄下脾胃有濕熱則頭重而目昏耳鳴澤瀉滲去其濕則熱亦隨去而土氣得令清氣上行天氣明爽故澤瀉有養五臟益氣力治頭旋聰明耳目之功若久服則降令太過清氣不升真陰潛耗安得不目昏耶仲景地黃丸用茯苓澤瀉者乃取其瀉膀胱之邪氣非引接也古人用補藥必兼瀉邪邪去則補藥得力一闢一闔此乃元妙後世不知此理專一於補所以久服必致偏勝之害搗碎紗羅過用豬苓氣平味甘微苦無毒潔氣味俱薄升而微降與茯苓同垣淡甘平降也陽中陰也海甘重於苦陽也入足太陽足少陰經助燥除濕比諸淡滲藥大燥亡津液無濕證勿服頌仲景治消渴脈浮小便不利微熱者豬苓散發其汗病欲飲水而復吐名為水逆冬時寒嗽如瘧狀者亦與豬苓此即五苓散也豬苓茯苓朮各三兩澤瀉五分桂二分細搗篩水服方寸匕日三多飲暖水汗出即愈利水道諸湯劑無如此驗今人皆用之垣若以泄滯甘以助陽淡以利竅故能除濕利小便去黑皮里白者佳搗羅過用通草氣平味辛甘而淡無毒氣平味薄降也陽中陰也治陰竅不利行小水除水腫閉治五淋生用潔瀉肺利小便甘平以緩陰血垣本草十劑通可去滯通草防己之屬是也夫防己大苦寒能瀉血中濕熱之滯又通大便通草甘淡能助西方秋氣下降利小便專瀉氣滯也肺受熱邪津液氣化之源絶則寒水斷流膀胱受濕熱癃閉約縮小便不通宜此治之其證胸中煩熱口燥舌乾咽乾大渴引飲小便淋瀝或閉塞不通脛酸腳熱並宜通草主之凡氣味與之同者茯苓澤瀉燈草豬苓皂角瞿麥車前子之類皆可以滲濕利小便泄其滯氣也又曰木通下利泄小腸火利小便與琥珀同功無他藥可比去粗皮銼細竹篩齊之用滑石氣寒味甘無毒潔性沉重能泄上氣令下行故曰滑則利竅治前陰竅澀不利利竅不比與滲淡諸藥同海入足太陽經滑能利竅以通水道為至燥之劑豬苓湯用滑石阿膠同為滑劑以利水道蔥豉生薑同煎去滓澄清以解利淡味滲泄為陽故解表利小便也若小便自利者不宜用珍滑石利竅不獨小便也上能利毛腠之竅下能利精溺之竅蓋甘淡之味先入於胃滲走經絡遊溢津氣上輸於肺下通膀胱肺主皮毛為水之上源膀胱司津液氣化則能出故滑石上能發表下利水道為蕩熱燥濕之劑發表是蕩上中之熱利水道是蕩中下之熱發表是燥上中之濕利水道是燥中下之濕熱散則三焦寧而表裡和濕去則闌門通而陰陽利劉河間之用益元散通治表裡上下諸病蓋是此意但未發出耳白者佳搗水飛用芍藥氣微寒味酸而苦氣薄味厚陰也降也陰中之陽有小毒入手足太陰經垣補中焦之藥得得炙甘草為佐治腹中痛夏月腹痛少加黃芩如惡寒腹痛加肉桂一錢白芍藥三錢炙甘草一錢半此仲景神方也如冬月大寒腹痛加桂二錢半水二盞煎一半去皮用脾經之藥收陰氣能除腹痛酸以收之扶陰而收陰氣泄邪氣扶陽與生薑同用溫經散濕通塞利腹中痛胃氣不通肺燥氣熱酸收甘緩下利必用之藥白補赤散瀉肝補脾胃酒浸行經止中部腹痛東垣云但澀者為上或問古今方論中多以澀為收今本經有利小便一句者何也曰芍藥能停諸濕而益津液使小便自行本非通行之藥所當知之又問有緩中一句何謂緩中曰損其肝者緩其中又問當用何藥次治之曰當用四物湯以其內有芍藥故也赤者利小便下氣白者止痛散氣血入手足太陰經大抵酸澀者為上為收斂停濕之劑故主手足太陰經收降之體故又能至血海而入於九地之下後至厥陰經也後人用赤瀉白補者以其色在西方故補色在南方故泄也難經云損其肝者緩其中即調血也本草云能利小便非能利之也以其腎主大小二便既用此以益陰滋濕故小便得通也腹中虛痛脾經也非芍藥不除蓋補津液停濕之劑也修治銼片內熱者生用中寒者酒炒用五味子氣溫味酸無毒味厚氣輕陰中微陽入手太陰經血分足少陰經氣分垣收肺氣補氣不足升也酸以收逆氣肺寒氣逆則宜此與乾薑同治之又五味子收肺氣乃火熱必用之藥故治嗽以之為君但有外邪者不可驟用恐閉其邪氣必先發散而後用之乃良有痰者以半夏為佐喘者以阿膠為佐但分兩少不同耳海五味皮甘肉酸核中辛苦都有鹹味故名五味子仲景八味丸用此為腎氣丸述類象形也孫真人云五月常服五味子以補五臟氣遇溽暑之時困乏無力無氣以動與人參黃耆麥門冬少加黃柏煎湯服使人精神頓加兩足筋力湧出又云六月常服五味子以益肺金之氣在上則滋源在下則補腎故入手太陰足少陰也生敲碎用麥門冬氣寒味甘微苦陽中微陰降也無毒入手太陰經氣分垣治肺中伏火脈氣欲絶加五味子人參三味為生脈之劑補肺中元氣不足按涼而能補補而不泥無逾於麥門冬者傷寒勞復與夫溫熱病及雜病陰不濟陽而煩熱燥渴者用之以生津液濡枯而退熱最有奇功又與地黃阿膠麻仁同為潤經益血復脈通心之劑與五味子枸杞子同為生脈之劑去心不宜用湯浸天門冬氣寒味微苦氣薄味厚陰也陽中之陰無毒入手太陰足少陰經氣分之藥垣保肺氣治血熱侵肺上喘氣促加人參黃耆為主用之神效苦以泄滯血甘以助元氣及治血妄行此天門冬之功也榮衛枯涸濕劑所以潤之二門冬人參北五味子枸杞子同為生脈之劑此上焦獨取寸口之意去心鍘細用枳實氣微寒味苦辛無毒潔氣厚味薄浮而升微降陰中陽也垣沉也陰也除寒熱破結實消痰癖治心下痞逆氣脅痛海枳殼主高枳實主下高者主氣下者主血故殼主胸膈皮毛之病實主心腹脾胃之病大同小異朱肱活人書言治痞宜先用桔梗枳殼湯非用此治心下痞也果知誤下氣將陷而成痞故先用此使不致於痞也若已成痞而用此則失之晚矣不惟不能消痞反損胸中之氣先之一字有謂也珍枳實枳殼氣味功用俱同上世亦無分別魏晉以來始分實殼之用潔古東垣又分治高治下之説大抵其功皆能利氣氣下則痰喘止氣行則痞脹消氣通則刺痛止氣利則後重除故以枳實利胸膈枳殼利腸胃然仲景治胸痹痞滿以枳實為要藥諸方治下血痔利大便閉塞裡急後重又以枳殼為通用則枳實不獨治下而殼不獨治高也蓋自飛門至魄門皆肺主之三焦相通一氣而已則二物分之可也不分亦無傷麩炒去瓤搗羅過用旋覆花氣溫味鹹甘有小毒主結氣脅下滿除水去五臟間寒熱消胸上痰結唾如膠漆消堅軟痞治噫氣通血脈頌仲景治傷寒汗下後心下痞堅噫氣不除有七物旋覆代赭湯雜治婦人有三物旋覆湯胡洽居士治痰飲在兩脅脹滿有旋覆花丸用之尤多成硬則氣堅旋覆之咸以軟痞堅也貝母氣平味辛苦無毒主傷寒煩熱淋瀝邪氣風痙療腹中結實心下滿洗洗惡風寒目眩項直咳嗽上氣止煩渴安五臟利骨髓海貝母乃肺經氣分藥也仲景治寒實結胸外無熱證者三物小陷胸湯主之白散亦可以其內有貝母也成無己云辛散而苦泄桔梗貝母之苦辛用以下氣內口鼻中有一顆米許大心宜去之搗細用烏梅氣溫平味酸澀無毒海烏梅脾肺二經血分藥也能收肺氣治燥嗽肺欲收急食酸以收之珍烏梅白梅所主諸病皆取其酸收之義惟仲景治蛔厥烏梅丸及蟲𧈟中用者取蟲得酸即止之義稍有不同耳梅花開於冬而實熟於下得木之全氣故其味最酸所謂曲直作酸也肝為乙木膽為甲木人之舌下有四竅兩竅通膽液故食梅則津生者類相感應也故素問云味過於酸肝氣以津又云酸走筋筋病無多食酸不然物之味酸者多矣何獨梅能生津耶修治去核微炒用忌豬肉赤小豆氣平味甘酸辛陰中之陽無毒陶小豆逐津液利小便久服令人肌膚枯燥海治水者惟知治水而不知補胃則失之壅滯赤小豆消水通氣而健脾胃乃其藥也珍赤小豆小而色赤心之谷也其性下行通乎小腸能入陰分治有形之病故行津液利小便消脹除腫止吐而治下利腸澼解酒病除寒熱癰腫排膿散血而通乳汁下胞衣産難皆病之有形者久服則降令太過津血滲泄所以令人則體瘦而已苦酒醋氣溫味酸無毒張仲景治黃汗有黃耆芍藥桂枝苦酒湯治黃疸有麻黃醇酒湯用苦酒清酒方見金匱要略蓋取其酸收之義而又有散瘀解毒之功寒沉藏味之厚者陰中之陰味厚則泄酸苦鹹氣寒是也黃連氣寒味苦無毒氣味俱厚可升可降陰中陽也入手少陰經其用有六瀉心藏火一也去中焦濕熱二也諸瘡必用三也去風濕四也赤眼暴發五也止中部見血六也張仲景治九種心下痞五等瀉心湯皆用之海入手少陰苦燥故入心火就燥也然瀉心其實瀉脾也為子能令母實實則瀉其子治血防風為上使黃連為中使地榆為下使去須鍘細用黃芩氣寒味苦無毒可升可降陰也陰中微陽入手太陽血分潔氣涼味苦甘氣厚味薄浮而升陽中陰也入手少陽陽明經酒炒則上行垣黃芩之中枯而飄者瀉肺火利氣消痰除風熱消肌表之熱細實而堅者瀉大腸火養陰退陽補膀胱寒水滋其化源高下之分與枳實枳殼同例潔黃芩之用有九瀉肺熱一也上焦皮膚風熱風濕二也去諸熱三也利胸中氣四也消痰膈五也除脾經諸濕六也夏月須用七也婦人産後養陰退陽八也安胎九也酒炒上行主上部積血非此不能除下利膿血腹痛後重身熱久不能止者與芍藥甘草同用之凡諸瘡痛不可忍者宜黃連苦寒之藥詳上下分身稍及引經藥用之頌張仲景治傷寒心下痞滿瀉心湯凡四方皆用黃芩以其主諸熱利小腸故也又太陽病下之利不止喘而汗出者有葛根黃芩黃連湯及主妊娠安胎散亦多用之珍潔古老人言黃芩瀉肺火治脾濕東垣言片芩治肺火條芩治大腸火丹溪言黃芩治上中二焦火而仲景治少陽證小柴胡湯太陽少陽合病下利黃芩湯少陽證下後心下滿而不痛瀉心湯並用之成無己言黃芩苦而入心泄痞熱是黃芩能入手少陰陽明手足太陰少陽六經矣蓋黃芩氣寒味苦色黃帶緑苦入心寒勝熱瀉心火治脾之濕熱一則金不受刑一則胃火不流入肺即所以救肺也肺虛不宜者苦寒傷脾胃損其母也少陽之證寒熱胸脅痞滿默默不欲飲食心煩嘔或煩或痞或小便不利雖曰病在半表半裡而胸脅痞滿實兼心肺上焦之邪心煩喜嘔默默不欲飲食又兼脾胃中焦之證故用黃芩以治手足少陽相火黃芩亦少陽本經藥也成無己注傷寒論但云柴胡黃芩之苦以發傳邪之熱芍藥黃芩之苦以堅斂腸胃之氣殊昧其治火之妙楊士瀛直指方云柴胡退熱不及黃芩蓋亦不知柴胡之退熱乃苦以發之散火之標也黃芩之退熱乃寒能勝熱折火之本也仲景又云少陽病腹中痛者去黃芩加芍藥心下悸小便不利者去黃芩加茯苓似與別録治少腹絞痛利小腸之文不合成氏言黃芩寒中苦能堅腎故去之蓋亦不然至此當以意逆之辨以脈證可也若因飲寒受寒腹中痛及飲水心下悸小便不利而脈不數者是里無熱證則黃芩不可用也若熱厥腹痛肺熱而小便不利者黃芩其可不用乎故善觀書者先求其理毋徒泥其文去皮並黑腐鍘細竹篩齊用黃柏氣寒味苦無毒氣味俱厚沉而降陰也苦厚微辛陰中之陽入足少陰經為足太陽引經藥垣治腎水膀胱不足諸痿厥腳膝無力於黃耆湯中少加用之使兩膝中氣力湧出痿即去矣蜜炒此一味為細末治口瘡如神癱瘓必用之藥瀉膀胱之熱利下竅瀉膀胱經火補本經及腎不足苦寒安蛔療下焦虛堅腎經曰苦以堅之足少陰劑腎苦燥故腎停濕也梔子黃芩入肺黃連入心黃柏入腎燥濕所歸各從其類也活人書解毒湯上下內外通治之去皮鍘碎生用則降實火熟用酒製則治上鹽制則治下蜜制則治中而不傷胃梔子氣寒味苦無毒潔氣薄味厚輕清上行氣浮而味降陽中陰也垣沉也陰也入手太陰肺經血分海本草不言梔子能吐仲景用為吐藥梔子本非吐藥為邪氣在上拒而不納食今上吐則邪因以出所謂其高者因而越之也或用為利小便藥實非利小便乃清肺也肺清則化行而膀胱津液之腑得此氣化而出也本草言治大小腸熱乃辛與庚合又與丙合又能泄戊先入中州故也仲景治煩躁用梔子豉湯煩者氣也躁者血也氣主肺躁主血故用梔子以治肺煩香豉以治腎躁仲景以梔子色赤味苦入心而治煩香豉色黑味鹹入腎而治躁寇仲景治傷寒發汗吐下後虛寒不得眠若劇者必反覆顛倒心中懊憹梔子豉湯治之因其虛故不用大黃有寒毒故也梔子雖寒而無毒治胃中熱氣既亡血亡津液腑藏無潤養內生虛熱非此物不可去也又治心經留熱小便赤澀用去皮梔子火煨大黃連翹炙甘草等分末之水煎三錢服無不利也凡使須要如雀腦並須長有九路赤色者為上去心胸中熱用仁去肌表熱用皮治上焦中焦連殼用下焦去殼治血病炒黑用石膏氣寒味甘辛無毒入手太陰經少陽經足陽明經潔石膏性寒味辛而淡氣味俱薄體重而沉降也陰也乃陽明經大寒之藥善治本經頭痛牙痛止消渴中暑潮熱然能寒胃令人不食非腹有極熱者不宜輕用又陽明經中熱發熱惡寒燥熱日晡潮濕肌肉壯熱小便濁赤大渴引飲自汗苦頭痛之藥仲景用白虎湯是也若無以上諸證勿服之多有血虛發熱象白虎證及脾胃虛勞形體病證初得之時與此證同醫者不識而誤用之不可勝救也垣石膏足陽明經也故仲景治傷寒陽明證身熱目痛鼻乾不得臥身以前胃之經也胸前肺之室也邪在陽明肺受火制故用辛寒以清肺氣所以有白虎之名又治三焦皮膚大熱入手少陽也凡病脈數不退者宜用之胃弱者不可用按溫熱病煩熱而渴脈洪大而數且長者非用石膏不能取效冬月有此脈證亦宜用之仲景制白虎湯為正傷寒設也東垣處暑以後勿用之説不可拘泥此即市所謂寒水石者也亦謂之硬石膏細理白澤者良碎之如粟米大先煮數十沸乃入余藥以其氣味難出故也知母氣寒味苦氣味俱厚沉而降陰也陰中微陽腎經本藥入足陽明手太陰經氣分垣其用有四瀉無根之腎火療有汗之骨蒸止虛勞之熱滋化原之陰仲景用此入白虎湯治不得眠者煩躁也煩出於肺躁出於腎君以石膏佐以知母之苦寒以清腎之源緩以甘草粳米使不速下也又凡病小便閟塞而渴者熱在上焦氣分肺中伏熱不能生水膀胱絶其化源宜用氣薄味薄淡滲之藥以瀉肺火清肺金而滋水之化源若熱在下焦血分而不渴者乃真水不足膀胱乾涸乃無陰則陽無以化法當用黃柏知母大苦寒之藥以補腎與膀胱使陰氣行而陽自化小便自通凡用揀肥潤里白者去毛切引經上行則用酒浸焙乾下行則用鹽水潤焙忌鐵秦皮氣寒味苦無毒沉也降也海主熱利下重下焦虛經云以苦堅之故用白頭翁黃柏秦皮若苦之劑也治風寒濕痹目中青翳白膜男子少精婦人帶下小兒驚癇宜作湯洗目俗呼為白樳木取皮漬水浸出青藍色與紫草同用以增光暈尤佳大戟為之使惡吳茱萸珍梣皮色青氣寒味苦性澀乃是厥陰肝少陽膽經藥也故治目病驚癇取其平木也治下利崩帶取其收澀也又能治男子少精益精有子皆取其澀而補也故老子云天道貴澀此藥乃服食及驚癇崩利所宜而人止知其治目一節幾於廢棄良為可惋白頭翁氣寒味苦辛無毒氣厚味薄可升可降陰中陽也主溫瘧狂易寒熱癥瘕積聚逐血止痛張仲景治熱利下重用白頭翁湯主之蓋腎欲堅急食苦以堅之利則下焦虛故以純苦之劑堅之男子陰疝偏墜小兒頭禿膻腥鼻衄無此不效毒痢有此獲功亦多吳熱毒下利紫血鮮血者宜之大黃氣寒味苦無毒氣味俱厚沉而降陰也用之須酒浸煨熟者寒因熱用酒浸入太陽經酒洗入陽明經余經不用酒垣大黃苦峻下走用之於下必生用若邪氣在上非酒不至必用酒浸引上至高之分驅熱而下如物在高巔必射以取之也若用生者則遺至高之邪熱是以愈後或目赤或喉痹或頭腫或膈上熱疾生也寇仲景治心氣不足吐血衄血瀉心湯用大黃黃芩黃連或曰心氣既不足而不用補心湯更用瀉心何也答曰若心氣獨不足則當不吐衄也此乃邪熱因不足而客之故令吐衄以苦補其心蓋一舉而兩得之有是證者用之無不效惟在量其虛實而已丹大黃苦寒善泄仲景用之瀉心湯者正因少陰經不足本經之陽亢甚無輔以致陰血妄行飛越故用大黃瀉去亢甚之火使之平和則血歸經而自安夫心之陰氣不足非一日矣肺與肝俱各受火而病作故黃芩救肺黃連救肝肺者陰之主肝者心之母血之舍也肝肺之火既退則陰血復其舊矣寇氏不明説而云邪熱客之何以開悟後人也珍大黃乃足太陰手足陽明手足厥陰五經血分之藥凡病在五經血分者宜用之若在氣分用之是謂誅伐無過矣瀉心湯治心氣不足吐血衄血者乃真心之氣不足而手厥陰心包絡足厥陰肝足太陰脾足陽明胃之邪火有餘也雖曰瀉心實瀉四經血中之伏火也又仲景治心下痞滿按之軟者用大黃黃連瀉心湯主之此亦瀉脾胃之濕熱非瀉心也病發於陰而反下之則作痞滿乃寒傷榮血邪氣乘虛結於上焦胃之上脘在於心故曰瀉心實瀉脾也素問云太陰所至為痞滿又云濁氣在上則生䐜脹是矣病發於陽而反下之則成結胸乃熱邪陷入血分亦在上脘分野仲景大陷胸湯丸皆用大黃亦瀉脾胃血分之邪而降其濁氣也若結胸在氣分則只用小陷胸湯痞滿在氣分則用半夏瀉心湯矣成成氏注傷寒論亦不知分別此義頌本草稱大黃推陳致新其效最神故古方下積滯多用之張仲景治傷寒用處尤多古人用毒藥攻病必隨人之虛實寒熱而處治非一切輕用也梁武帝因發熱欲服大黃姚僧坦曰大黃乃是快藥至尊年高不可輕用帝弗從幾至委頓梁元帝常有心腹疾諸醫咸謂宜用平藥可漸宣通僧坦曰脈洪而實此有宿積非用大黃無瘥理帝從之遂愈以此言之今醫用一毒藥而攻衆病其偶中便謂此方神奇其差誤則不言用藥之失可不戒哉去皮鍘碎竹篩齊用芒硝氣大寒味鹹苦辛有小毒成內經云鹹味下泄為陰又云咸以軟之熱淫於內治以鹹寒氣堅者以咸軟之熱盛者以寒消之故張仲景大陷胸湯大承氣湯調胃承氣湯皆用芒硝以軟堅去實熱結不至堅者不可用也海本草云朴硝味辛是辛以潤腎燥也今人不用辛字只用咸字咸能軟堅也其義皆是本草言芒硝利小便而墮胎然傷寒妊娠可下者用此兼大黃引之直入大腹潤燥軟堅瀉熱而母子俱安經云有故無殞亦無殞也此之謂歟以在下言之則便溺俱陰以前後言之則前氣後血以腎言之總主大小便難溺澀祕結俱為水少火盛經云熱淫於內治以鹹寒佐之以苦故用芒硝大黃相須為使也潔芒硝氣薄味厚沉而降陰也其用有三去實熱一也滌腸中宿垢二也破堅積熱塊三也珍朴硝是初得一煎而成者故力緊急而不和止可施於粗獷之人及敷塗之劑而已芒硝是朴硝淋過煉成故其性和緩仲景治傷寒多用之以此故也硝稟太陰之精水之子也氣寒味鹹走血而潤下蕩滌三焦腸胃實熱陽強之病乃折治火邪藥也生用香豉氣寒味苦無毒陰中之陰也主傷寒頭痛煩躁滿悶生用珍黑豆性平作豉則溫既經蒸窨故能升能散得蔥則發汗得鹽則能吐得酒則治風得薤則治痢得蒜則止血炒熟則大能止汗亦麻黃根節之義也茵陳蒿氣微寒味苦辛無毒陰中微陽入足太陽經除煩熱主風濕寒熱邪氣熱結黃疸通身發黃小便不利寇張仲景治傷寒熱甚發黃身面悉黃者用之極效一僧因傷寒後發汗不徹有留熱面身皆黃多熱期年不愈醫作食治不對而食不減豫與此藥服五日病減三分之一十日減三分之二二十日病悉去方用山茵陳山梔子各三分秦艽升麻各四錢為散每用三錢水四合煎二合去滓食後溫服以知為度此藥以山茵陳為本故書之海仲景茵陳梔子大黃湯治濕熱也梔子柏皮湯治燥熱也如苗潦則濕黃旱則燥黃濕則瀉之燥則潤之可也此二藥治陽黃也韓祗和李思訓治陰黃用茵陳附子湯大抵以茵陳為君主而佐以大黃附子各隨其寒熱也去枝用葉手搓碎用栝蔞實氣寒味甘微苦無毒丹栝樓實治胸痹者以其味甘性潤甘能補肺潤能降氣胸中有痰者乃肺受火逼失其降下之令今得甘緩潤下之助則痰自降宜其為治嗽之要藥也且又能洗滌胸膈中垢膩鬱熱為治消渴之神藥珍張仲景治胸痹痛引心背咳唾喘息及結胸滿痛皆用栝蔞實乃取其甘寒不犯胃氣能降上焦之火使痰氣下降也成無己不知此意乃云苦寒以瀉熱蓋不嘗其味原不苦而隨文傅會爾肥大結實者連子連皮細切用今人止用核仁非也栝蔞根一名天花粉氣寒味甘微苦酸無毒主消渴身熱煩滿大熱補虛安中通月水消腫毒瘀血及熱狂瘡癤垣栝蔞根純陰解煩渴行津液心中枯涸者非此不能除與辛酸同用導腫氣珍栝蔞根味甘微苦酸其莖葉味酸酸能生津感召之理故能止渴潤枯微苦降火甘不傷胃昔人只言其苦寒似未深察搗細羅過用土瓜根氣寒味苦有小毒主療諸邪氣熱結逐四時骨節中水療天行熱疾酒黃病壯熱心煩悶熱勞能吐下人連軺連翹根也氣寒味甘苦有小毒主下熱氣益陰精故仲景治傷寒瘀熱在裡欲發黃用麻黃連軺赤小豆湯竹葉氣寒味甘無毒淡竹為上甘竹次之主胸中痰熱咳逆上氣寇諸筍性皆寒故知其葉一致也張仲景竹葉湯惟用淡竹潔竹葉苦平陰中微陽垣竹葉辛苦寒可升可降陽中陰也其用有二除新久風邪之煩熱止喘促氣勝之上衝梓白皮氣寒味苦無毒主熱毒去二蟲時氣溫病頭痛壯熱初得一日用生梓木削去黑皮取里白者切一升水二升五合煎汁每服八合取瘥折熱之劑必以苦為主又曰大熱之氣寒以取之是也葶藶子氣寒味辛無毒沉也陰中陽也垣葶藶大降氣與辛酸同用以導腫氣本草十劑云泄可去閉葶藶大黃之屬此二味皆大苦寒一泄血增閉一泄氣閉蓋葶藶之苦寒氣味俱厚不減大黃又性過於諸藥以泄陽分肺中之閉亦能泄大便為體輕象陽故也海苦甜二味主治不同仲景瀉肺湯用苦余方或有用甜者或有不言甜苦者大抵苦則下泄甜則少緩量病人虛實用之不可不審同糯米焙熟去米搗細用商陸氣平味辛有毒白者苦冷得大蒜良赤者有大毒忌犬肉主水腫疝瘕痹疏五臟散水氣珍苦寒沉也降也陰也其性下行專於行水與甘遂大戟異性而同功胃氣虛弱者不可用取花白者根銅刀刮去皮薄切以東流水浸兩宿漉出入甑以黑豆葉一重商陸一重蒸之從午至亥取出去豆葉暴乾銼用無豆葉以豆代之甘遂氣寒味苦有毒反甘草主下五水逐留飲宿食破癥堅積聚利水穀道潔味苦氣寒苦性泄寒勝熱直達水氣所結之處乃泄水之聖藥水結胸中非此不能除仲景大陷胸湯用之但有毒不可輕用珍腎主水凝則為痰飲溢則為腫脹甘遂能泄腎經濕氣治痰之本也不可過服但中病則止可爾仲景治心下留飲與甘草同用取其相反而立功也去莖於槐砧上細銼用生甘草湯薺苨自然汁二味攪浸三日其水如墨汁漉出用東流水淘六七次以水清為度然後用麵包煨熟用芫花氣溫味辛有毒珍仲景治傷寒太陽證表不解心下有水氣乾嘔發熱而咳或喘或利者小青龍湯主之若表已解有時頭痛出汗惡寒心下有水氣乾嘔痛引兩脅或喘或咳者十棗湯主之蓋小青龍治未發散表邪使水氣自毛竅而出乃內經所謂開鬼門法也十棗湯驅逐里邪使水氣自大小便而泄乃內經所謂潔淨府去陳莝法也夫飲有五皆由內啜水漿外受濕氣鬱蓄而為留飲流於肺則為支飲令人喘咳寒熱吐沫背寒流於肺則為懸飲令人咳唾痛引缺盆兩脅流於心下則為伏飲令人胸滿嘔吐寒熱眩運流於腸胃則為痰飲令人腹鳴吐水胸脅支滿或作泄瀉忽肥忽瘦流於經絡則為溢飲令人沉重注痛或作水氣胕腫芫花大戟甘遂之性逐水泄濕能直達水飲窠囊隱僻之處但可徐徐用之取效甚捷不可過劑泄人真元也陳言三因方以十棗湯藥為末用棗肉和丸以治水氣喘急浮腫之證蓋善變通者也楊士瀛直指方云破癖須用芫花行水後便養胃可也留數年陳久者良用時以好醋煮十數沸去醋以水浸一宿曬乾用大戟氣寒味苦辛有毒陰中微陽瀉肺損真氣得棗良治十二水腹滿急痛積聚頭疼發汗利大小腸海大戟與甘遂同為泄水之藥濕勝者苦燥除之也以漿水煮軟去骨曬乾用蜀漆常山苗也氣寒微溫味苦辛純陽有毒主傷寒寒熱溫瘧吐胸中痰飲破血成火邪錯逆加蜀漆之辛以散之熟則不甚吐人海藻氣寒味鹹有小毒反甘草潔氣味俱厚純陰沉也治癭瘤馬刀諸瘡堅而不者經云咸能軟堅榮氣不從外為浮腫隨各引經藥治之腫無不消成鹹味湧泄故海藻之咸以泄水氣也珍海藻咸能潤下寒能泄熱引水故能消癭瘤結核陰㿉之堅聚而除浮腫腳氣留飲痰氣之濕熱使邪氣自小便出也龍骨氣平味甘無毒入手足少陰厥陰經澀可去脫故成氏雲龍骨能收斂浮越之正氣固大腸而鎮驚傷寒方中只入煎宜搗碎生用忌魚及鐵器牡蠣氣平微寒味鹹無毒主治傷寒實熱瀉痢瀉泄止滑止心痛澀大小脈去脅下堅滿垣能轉積氣之痞經曰咸能軟堅入足少陰咸為軟堅之劑以柴胡引之能去脅下之硬以茶引之能消結核以大黃引之能除股間腫地黃為之使能益精收澀止小便本腎經之藥也火煆童便淬搗羅用赤石脂氣大溫味甘酸辛無毒陽中之陰固脫海澀可去脫石脂為收斂之劑赤入丙白入庚珍五石脂皆手足陽明藥也其味甘其氣溫其體重其性澀澀而重故能收濕止血而固下甘而溫故能益氣生肌而調中中者腸胃肌肉驚悸黃疸是也下者腸澼泄利崩帶失精是也五腫主療大抵相同故本經不分條目但云各隨五色補五臟別録雖分五種而性味主治亦不甚相遠但以五味配五色為異亦是強分爾赤白二種一入氣分一入血分故時用尚之張仲景用桃花湯治下利便膿血取赤石脂之重澀入下焦血而固脫乾薑之辛溫暖下焦氣分而補虛粳米之甘溫佐石脂乾薑而潤腸胃也搗細綿裹煎代赭石氣寒味苦甘無毒海入手少陰足厥陰經怯則氣浮重劑所以鎮之代赭之重以鎮虛逆故張仲景治傷寒汗吐下後心下痞硬噫氣不除者旋覆代赭湯主之珍代赭乃肝與包絡二經血分藥也故所主治皆二經血分之病生搗細羅過用禹餘糧氣寒味甘鹹無毒珍禹餘糧手足陽明血分重劑也其性澀故主下焦前後諸病生搗細羅過用鉛丹氣微寒味辛微咸無毒主吐逆胃反驚癇癲疾除熱下氣仲景龍骨牡蠣湯中用鉛丹乃收斂神氣以鎮驚也澀可去脫而固氣體重而性沉其色紅故走血分文蛤氣平味鹹無毒主惡瘡蝕五痔傷寒病在陽當以汗解反以冷水噀之或灌之其熱鬱遏不得出而反增者以文蛤散主之蛤水族也其性寒故用以利水而勝熱以為草木之液莫之能尚云爾夢溪筆談云即今吳人所食花蛤也水蛭氣平味鹹苦有毒畏石灰食鹽主逐惡血瘀血破血癥積聚利水道水蛭啖血之物也故能逐死血不用草木而用生物者以為死血非生物不能活故爾虻蟲亦此義採得以䈽竹筒盛待乾用米泔浸一夜暴乾展其身看腹中有子皆去之以各豬脂煎令焦黃然後用虻蟲氣平味苦有毒主逐瘀血破血積堅痞癥瘕寒熱通利血脈及九竅劉河間云虻食血而治血因其性而為用也成無己云苦走血血結不行者以苦攻之故治蓄血用虻蟲乃肝經血分藥也去翅足炒熟用豬膚氣寒味甘無毒入足少陰經豬水畜也其氣先入腎少陰客熱是以豬虜解之加白蜜以潤燥除煩白粉以益氣斷痢豬膽汁氣寒味苦無毒仲景白通湯加此汁與人尿鹹寒同與熱劑合去格拒之寒又與醋相合納穀道中酸苦益陰以潤燥瀉便本經云治傷寒熱渴又白豬蹄可用雜青色者不可食療疾亦不可與人尿同體補肝而和陰引置陽不被格拒能入心而通脈婦人褌襠主陰易病當陰上割燒末服方寸匕若女患陽易即男子褌也陰陽易病者人患時行病起後合陰陽便相著甚於本病其候小便赤澀寒熱甚者是服此便通利妙在復氣人尿氣寒味鹹無毒陶若人初得頭痛直飲人尿數升亦多愈合蔥豉作湯服彌佳珍小便性溫不寒飲之入胃隨脾之氣上歸於肺下通水道而入膀胱乃其舊路也故能治肺病引火下行凡人精氣清者為血濁者為氣濁之清者為津液清之濁者為小便小便與血同類也故其味鹹而走血治諸血病也成無己云傷寒少陰證下利不止厥逆無脈乾嘔欲飲水者加人尿豬膽汁鹹苦寒物於白通湯薑附藥下其氣相從可去格拒之患也
