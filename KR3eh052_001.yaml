body:
  text: 卷一總例四時傷寒不同傳變汗下大法可汗不可汗可下不可下可吐不可吐愈解死證陰陽表裡傷寒雜病類證雜論察色要略四時傷寒不同陰陽大論云春氣溫和夏氣暑熱秋氣清涼冬氣冷冽此則四時正氣之序也冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳其傷於四時之氣皆能為病即下文時行之氣以傷寒為毒者以其最成殺厲之氣也中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也內經曰先夏至日為溫病後夏至日為暑病溫暑之病本傷於寒而得之故太醫均謂之傷寒也是以辛苦之人春夏多溫熱病者皆由冬時觸寒所致非時行之氣也活人云夏月發熱惡寒頭疼身重肢節疼痛其脈洪盛者是也冬傷於寒因暑氣而發為熱病凡時行者春時應暖而反大寒夏時應熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也此辨傷寒時氣之異夫欲候知四時正氣為病及時行疫氣之法皆當按鬥歷占之四時八節二十四氣七十二候決病法立春正月節鬥指艮雨水正月中指寅驚蟄二月節指甲春分二月中指卯清明三月節指乙穀雨三月中指辰立夏四月節指巽小滿四月中指巳芒種五月節指丙夏至五月中指午小暑六月節指丁大暑六月中指未立秋七月節指坤處暑七月中指申白露八月節指庚秋分八月中指酉寒露九月節指辛霜降九月中指戌立冬十月節指乾小雪十月中指亥大雪十一月節指壬冬至十一月中指子小寒十二月節指癸大寒十二月中指醜二十四氣節有十二中氣有十二五日為一候氣亦同合有七十二候決病生死此須洞解之也九月霜降後宜漸寒向冬大寒至正月雨水節後宜解也所以謂之雨水者以冰雪解而為雨水故也至二月驚蟄節後氣漸和暖向夏大熱至秋便涼此為四時正氣從霜降以後至春分以前凡有觸冒冰雪體中寒即病者謂之傷寒也九月十月寒氣尚微為病則輕十一月十二月寒冽已嚴為病則重正月二月寒漸將解為病亦輕此以冬時不調適有傷寒之人即為病也此為四時正氣中而即病者也其冬有非節之暖者名曰冬溫冬溫之毒與傷寒大異冬溫復有先後更相重沓亦有輕重為治不同證如後章此為時行之氣前云冬時應寒而反大溫者是也冬溫應常紀者有三歲少陰司天之政五之氣陽明司天之政終之氣厥陰司天之政終之氣皆病冬溫其不應常紀而反常者則不可候之而隨時變易也從立春節後其中無暴大寒又不冰雪而有人壯熱為病此屬春時陽氣發於外冬時伏寒變為溫病此為溫病也內經曰冬傷於寒春必病溫外邪喚出內邪也春溫應常紀者有四歲少陰司天之政初之氣太陽司天之政初之氣陽明司天之政初之氣太陰司天之政二之氣皆病溫其不應常紀而反常者不可候之而隨時變易也從春分以後至秋分節前天有暴寒者皆為時行寒疫也三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微其病與溫及暑病相似但治有殊耳此辨時行與傷寒相似治法不同要在辨其病原寒熱溫三者之異則用藥冷熱之品味判然矣十五日得一氣於四時之中一時有六氣四六名為二十四氣也然氣候亦有應至而不至或有未應至而至者或有至而太過者皆成病氣也素問六微旨大論帝曰其有至而至有至而不至有至而太過何也岐伯曰至而至者和至而不至來氣不及也未至而至來氣有餘也帝曰至而不至未至而至何如岐伯曰應則順否則逆逆則變生變生則病金匱要略曰有未至而至有至而不至有至而不去有至而太過何故也師曰冬至之後甲子夜半少陽起少陽之時陽始生天得溫和以未得甲子天因溫和此為未至而至也以得甲子而天未溫和此為至而不至也以得甲子天大寒不解此為至而不去也以得甲子而天溫如盛夏五六月時此為至而太過也但天地動靜陰陽鼓擊者各正一氣耳是以彼春之暖為夏之暑彼秋之忿為冬之怒是故冬至之後一陽爻升一陰爻降也夏至之後一陽氣下一陰氣上也斯則冬夏二至陰陽合也春秋二分陰陽離也陰陽交易人變病焉此君子春夏養陽秋冬養陰順天地之剛柔也小人觸冒必嬰暴疹須知毒烈之氣留在何經而發何病詳而取之是以春傷於風夏必飧泄夏傷於暑秋必病瘧秋傷於濕冬必咳嗽冬傷於寒春必病溫此必然之道可不審明之與傷寒之病逐日淺深以施方治經曰未滿三日者可汗而已其滿三日者可泄而已今世人傷寒或始不早治或治不對病或日數久淹困乃告醫醫人又不依次第而治之則不中病皆宜臨時消息制方無不效也今採仲景舊論録其證候診脈聲色對病真方有神驗者擬防世急也仲景之書逮今千年而顯用於世者王叔和之力也又土地溫涼高下不同物性剛柔飧居亦異是故黃帝興四方之問岐伯舉四治之能以訓後賢開其未悟者臨病之工宜須兩審也龐叔和非醫方圓機孰能臻此也如桂枝湯自西北二方居人四時行之無不應驗自江淮間地偏暖處惟冬及春可行之自春末及夏至以前桂枝麻黃青龍內宜加黃芩也自夏至以後桂枝內又須隨證增知母大青升麻石膏輩取汗也若時行寒疫及病久虛寒者正方古方不待加減矣夏至以後雖宜白虎湯自非新中暍而變暑病乃汗後解表藥耳一白虎未能驅逐表邪故也或有冬及始春寒甚之時人患斯病因汗下後偶變狂躁不解須當作內熱治之不拘於時令也南方無霜雪之地不因寒氣中人地氣不藏蟲類泄毒嵐瘴間作不用此治法別有方也又一州之內有山居者為居積陰之所盛夏冰雪其氣寒腠理閉難傷於邪其人壽其有病者多中風中寒之疾也有平澤居者為居積陽之所嚴冬生草其氣溫腠理疏易傷於邪其人夭其有病者多中溫中暑之疾也王夫傷於寒有即病者焉有不即病者焉即病者發於所感之時不即病者過時而發於春夏也即病謂之傷寒不即病謂之溫與暑夫傷寒溫暑其類雖殊其所受之原則不殊也由其原之不殊故一以傷寒而為稱由其類之殊故施治不得以相混以所稱而混其治宜乎貽禍後人以歸咎於仲景之法而委廢其大半也籲可謂溺井怨伯益失火怨燧人矣夫法也方也仲景專為即病之傷寒設不兼為不即病之溫暑設也後人能知仲景之書本為即病者設不為不即病者設則尚恨其法散落所存不多而莫能御夫粗工妄治之萬變果可憚煩而或廢之乎今人雖以治傷寒法治溫暑亦不過借用耳非仲景立法之本意也雖然豈特可藉以治溫暑而已凡雜病之治莫不可借也今人因傷寒治法可藉以治溫暑遂謂其法通為傷寒溫暑設籲此非識流而昧源者與請以證之夫仲景之書三陰經寒證居熱證什之七八彼不即病之溫暑但一於熱耳何由而為寒哉夫惟後人以仲景書通為傷寒溫暑設遂致諸溫劑皆疑焉而不敢用韓祗和雖覺桂枝湯之難用但謂今昔之世不同然未悟仲景書本為即病之傷寒設也且其所著微旨一書又純以溫暑作傷寒立論而即病之傷寒反不言及又以夏至前胸膈滿悶嘔逆氣塞腸鳴腹痛身體拘急手足逆冷等證視為溫暑謂與仲景三陰寒證脈理同而證不同遂別立溫中法以治夫仲景所敘三陰寒證乃是冬時即病之傷寒故有此證今欲以仲景所敘三陰寒證求對於春夏溫暑之病不亦惛乎以余觀之其胸膈滿悶嘔逆氣塞等證若非內傷冷物則不正暴寒所中或過服寒藥所變或內外俱傷於寒之病也且祗和但曰寒而當溫然未嘗求其所以為寒之故能求其故則知溫暑本無寒證矣朱奉議作活人書纍數萬言於仲景傷寒論多有發明其傷寒即入陰經為寒證者諸家不識而奉議識之但惜其亦不知仲景專為即病者立法故其書中每每以傷寒溫暑混雜議論竟無所別況又視傷寒論為全書遂將次傳陰經熱證與即入陰經寒證牽合為一立說且謂大抵傷寒陽明證宜下少陰證宜溫而於所識即入陰經之見又未免自相悖矣夫陽明證之宜下者固為邪熱入胃其少陰證果是傷寒傳經熱邪亦可溫乎況溫病暑病之少陰尤不可溫也自奉議此說行而天下後世蒙害者多矣逮夫成無己作傷寒論注又作明理論其表章名義纖悉不遺可謂善羽翼仲景者然即入陰經之寒證又不及朱奉議能識況即病立法之本旨乎宜其莫能知也惟其莫知故於三陰諸寒證止隨文解義而已未嘗明其何由不為熱而為寒也至於劉守真出亦以溫暑作傷寒立論而遺即病之傷寒其所處辛涼解散之劑固為昧者有中風傷寒錯治之失而立蓋亦不無桂枝麻黃難用之惑也既惑於此則無由悟夫仲景立桂枝麻黃湯之有所主用桂枝麻黃湯之有其時矣故其原病式有曰夏熱用麻黃桂枝之類熱藥發表須加寒藥不然則熱甚發黃或斑出矣此說出於龐安常而朱奉議亦從而和之殊不知仲景立麻黃湯桂枝湯本不欲用於夏熱之時也苟悟夫桂枝麻黃湯本非治溫暑之劑則群疑冰泮矣何也夫寒之初客於表也閉腠理郁陽氣而為熱故非辛溫之藥不能開腠理以泄其熱此麻黃湯之所由立也至於風邪傷表雖反疏腠理而不能閉然邪既客表則表之正氣受傷而不能流通故亦發熱也必以辛甘溫之藥發其邪則邪去而腠理自密矣此桂枝湯之所由立也其所以不加寒藥者蓋由風寒在表又當天令寒冷之時而無所避故也後人不知仲景立法之意故有惑於麻黃桂枝之熱有犯於春夏之司氣而不敢用於是有須加寒藥之論夫欲加寒藥於麻黃桂枝湯之中此乃不悟其所以然故如此耳若仲景為溫暑立方必不如此必別有法但惜其遺佚不傳致使後人有多歧之患若知仲景傷寒論專為即病傷寒作則知麻黃桂枝所以宜用之故除傳經熱證之外其直傷陰經與太陽不鬱熱即傳陰經諸寒證皆有所歸著而不復疑為寒藥誤下而生矣若乃春夏有惡風惡寒純類傷寒之證蓋春夏暴中風寒之新病非冬時受傷過時而發者不然則或是溫暑將發而復感於風寒或因感風寒而動乎久郁之熱遂發為溫暑也仲景曰太陽病發熱而渴不惡寒者為溫病觀此則知溫病不當惡寒而當渴其惡寒而不渴者非溫病矣仲景雖不言暑病然暑病與溫病同但復過一時而加重與溫病耳其不惡寒而渴則無異也春夏雖有惡風惡寒表證其桂枝麻黃二湯終難輕用勿泥於發表不遠熱之語也於是用辛涼解散庶為得宜苟不慎而輕用之誠不能免夫狂躁斑黃衄血之變而亦無功也雖或者行桂枝麻黃於春夏而效乃是因其辛甘發散之力偶中於萬一斷不可視為常道而守之今人以敗毒散參蘇飲通解散百解散之類不問四時中風傷寒一例施之雖非至正之道較之不慎而輕用麻黃桂枝於春夏以致變者較必近理然敗毒散等若用於春夏亦止可治暴中風寒之證而已其冬時受傷過時而發之溫病暑病則不宜用也用則非徒無益亦反害之矣若夫仲景於三陰經每用溫藥正由病之所必須與用之有其時耳若概以三陰寒證視為雜病而外之得無負於仲景濟人利物之至仁而誤後世乎自近代先覺不示傷寒溫暑異治之端緒但一以寒涼為主而諸溫熱之劑悉在所略致使後之學者視仲景書欲仗焉而不敢以終決欲棄焉則猶以為立法之祖而莫能外甚則視為文具又甚則束之高閣而謂其法宜於昔而不宜於今由治亂動靜之殊治靜屬水亂動屬火故其溫熱之藥不可用於今屬火之時也噫斯言也其果然耶否耶但能明乎仲景本為即病者設法則桂枝麻黃自有所用諸溫熱之劑皆不可略矣若謂仲景法不獨為即病者設則凡時行及寒疫溫瘧風溫等病亦通以傷寒六經病諸方治之乎傷寒例曰冬溫之毒與傷寒大異為治不同又曰寒疫與溫及暑病相似但治有殊耳是則溫暑及時行寒疫溫瘧風溫等仲景必別有治法今不見者亡之也觀其所謂為治不同所謂溫瘧風溫溫毒溫疫脈之變證方治如說豈非亡其法乎決不可以傷寒六經病諸方通治也叔和搜採仲景舊論之散落者以成書功莫大矣但惜其既以自己之說混於仲景所言之中又以雜脈雜病紛紜並載於卷首故使玉石不分主客相亂若先備仲景之言而次附己說明書其名則不致惑於後人而纍仲景矣余嘗欲編類其書以傷寒例居前而六經病次之相類病又次之瘥後病又次之診察治法治禁治誤病解未解等又次之其雜脈雜病與傷寒有所關者採以附焉其與傷寒無相關者皆刪去如此庶幾法度純一而玉石有分主客不亂矣然有志未暇姑敘此以俟他日傷寒溫病熱病說有病因有病名有病形辨其因正其名察其形三者俱當始可以言治矣且如傷寒此以病因而為病名者也溫病熱病此以天時與病形而為病名者也由三者皆起於感寒或者通以傷寒稱之夫通稱傷寒者原其因之同耳至於用藥則不可一例而施也何也夫傷寒蓋感於霜降後春分前然不即發鬱熱而發於春夏者也傷寒即發於天令寒冷之時而寒邪在表閉其腠理故非辛甘溫之劑不足以散之此仲景桂枝麻黃等湯之所以必用也溫病熱病後發於天令暄熱之時怫熱自內而達於外郁其腠理無寒在表故非辛涼或苦寒或酸苦之劑不足以解之此仲景桂枝麻黃等湯獨治外者之所以不可用而後人所處水解散大黃湯千金湯防風通聖散之類兼治內外者之所以可用也夫即病之傷寒有惡風惡寒之證者風寒在表而表氣受傷故也後發之溫病熱病有惡風惡寒之證者重有風寒新中而表氣亦受傷故也若無新中之風寒則無惡風惡寒之證故仲景曰太陽病發熱而渴不惡寒者為溫病溫病如此則知熱病亦如此是則不渴而惡寒者非溫熱病矣然或有不因新中風寒亦見惡風惡寒之證者蓋病人表氣本虛熱達於表又重傷表氣故不禁風寒非傷風惡風傷寒惡寒也但衛虛則惡風榮虛則惡寒耳且溫病熱病亦有先見表證而後傳裡者蓋怫熱自內達外熱鬱腠理不得外泄遂復還里而成可攻之證非如傷寒從表而始也或者不悟此理乃於春夏溫病熱病而求浮緊之脈不亦疏乎殊不知緊為寒脈有寒邪則見之無寒邪則不見也其溫病熱病或見緊脈者乃重感不正之暴寒與內傷過度之冷食也豈其本然哉又或者不識脈形但見弦便呼為緊斷為寒而妄治蓋脈之盛而有力者每每兼弦豈可錯認為緊而斷為寒夫溫病熱病之脈多在肌肉之分而不甚浮且右手反盛於左手者誠由怫熱在內故也其或左手盛或浮者必有重感之風寒否則非溫病熱病自是暴感風寒之病耳凡溫病熱病若無重感表證雖間見而里病為多故少有不渴者斯時也法當治裡熱為主而解表兼之亦有治里而表自解者余每見世人治溫熱病雖誤攻其里亦無大害誤發其表變不可言此足以明其熱之自內達外矣其間有誤攻裡而致大害者乃春夏暴寒所中之疫證邪純在表未入於裡故也不可與溫病熱病同論夫惟世以溫病熱病混稱傷寒故每執寒字以求浮緊之脈以用溫熱之藥若此者因名亂實而戕人之生名其可不正乎又方書多言四時傷寒故以春夏之溫病熱病與秋冬之傷寒一類視之而無所別夫秋冬之傷寒真傷寒也春夏之傷寒寒疫也與溫病熱病自是兩塗豈可同治籲此弊之來非一日矣雖然傷寒與溫病熱病其攻裡之法若果是以寒除熱固不必求異其發表之法斷不可不異也況傷寒之直傷陰經與太陽雖傷不及鬱熱即傳陰經為寒證而當溫者又與溫病熱病大不同其可妄治乎或者知一不知二故謂仲景發表藥今不可用而攻裡之藥乃可用嗚呼其可用不可用之理果何在哉若能辨其因正其名察其形治法其有不當者乎彼時行不正之氣所作及重感異氣而變者則又當觀其何時何氣參酌傷寒溫熱病之法損益而治之尤不可例以仲景即病傷寒藥通治也傳變凡傷於寒則為病熱熱雖甚不死內經曰風寒客於人使人毫毛畢直皮膚閉而為熱是傷寒為病熱也針經曰多熱者易已多寒者難已是熱雖甚不死內經熱論甚詳宜熟玩之若兩感於寒而病者必死表裡俱病謂之兩感尺寸俱浮者太陽受病也當一二日發以其脈上連風府故頭項痛腰脊強太陽多血少氣為三陽之長其氣浮於外故尺寸俱浮是邪氣初入皮膚外在表也當一二日發風府穴名也項中央太陽之脈從巔入絡腦還出別下項是以上連風府其經循肩膊內俠脊抵腰中故病頭項痛腰脊強尺寸俱長者陽明受病也當二三日發以其脈俠鼻絡於目故身熱目疼鼻乾不得臥陽明血氣俱多尺寸俱長者邪並陽明而血氣淖溢也太陽受邪不已傳於陽明是當二三日發其脈俠鼻者陽明脈起於鼻交額中絡於目陽明之脈正上䪼頞還出系目系身熱者陽明主身之肌肉針經曰陽明氣盛則身以前皆熱目疼鼻乾者經中客邪也不得臥者胃氣逆不得從其道也內經曰胃不和則臥不安尺寸俱弦者少陽受病也當三四日發以其脈循脅絡於耳故胸脅痛而耳聾內經曰陽中之少陽通於春氣少血多氣春脈弦尺寸俱弦者知少陽受邪也二三日陽明之邪不已傳於少陽是當三四日發胸脅痛而耳聾者經壅而不利也高文莊本作脈從巔入絡腎還出別下項夾脊抵腰中凡太陽傳至厥陰自表至里其汗下必因次第有不經三陽便自少陰太陰厥陰者詳後則各依本經治之此三經皆受病未入於府者可汗而已三陽受邪為病在表法當汗解然三陽亦有便入腑者入腑則宜下故云未入於府者可汗而已按府字素問作藏字理勝蓋府為陽藏為陰也又況傳陽明者非入腑而何尺寸俱沉細者太陰受病也當四五日發以其脈布胃中絡於嗌故腹滿而嗌乾陽極則陰受之邪傳三陽既遍次乃傳於陰經在陽為在表在陰為在裡邪在表則見陽脈邪在裡則見陰脈陽邪傳陰邪氣內陷故太陰受病而脈尺寸俱沉細也自三陽傳於太陰是當四五日發也邪入於陰則漸成熱腹滿而嗌乾者脾經壅而成熱也尺寸俱沉者少陰受病也當五六日發以其脈貫腎絡於肺系舌本故口燥舌乾而渴少陰腎水也性趨下少陰受病脈尺寸俱沉也五日太陰之邪不已至五六日則傳於少陰也是少陰病當五六日發人傷於寒則為病熱謂始為寒而終成熱也少陰病口燥舌乾而渴邪氣入裡熱氣漸深也活人云經云一二日少陰者謂初中病時便入少陰不經三陽也大抵傷寒發於陽則太陽也發於陰則少陰也凡病一日至十二三日太陽證不能罷者俱治太陽有初得病便見少陰證者宜攻少陰不必先自巨陽蓋寒入太陽即發熱而惡寒入少陰即惡寒而不熱尺寸俱微緩者厥陰受病也當六七日發以其脈循陰器絡於肝故煩滿而囊縮緩者風脈也厥陰脈微緩者邪傳厥陰熱氣已劇近於風也六七日發以少陰邪傳於厥陰煩滿而囊縮者熱氣聚於內也婁煩滿謂少腹煩滿也下文云十二日厥陰病衰囊縱少腹微下謂嚮者囊之縮者今復病少腹之煩滿故令微下也此三經皆受病已入於府可下而已三陰受邪為病在裡於法當下然三陰亦有在經者在經則宜汗故云已入於府者可下而已經曰臨病之工宜須兩審按已入於府二句恐是陽明經條下之錯簡蓋素問不如此說但曰三陰三陽五臟六腑皆受病榮衛不行五臟不通則死矣蓋三陰經汗下溫三法俱有不特可下而已也若兩感於寒者一日太陽受之即與少陰俱病則頭痛口乾煩滿而渴二日陽明受之即與太陰俱病則腹滿身熱不欲食譫語三日少陽受之即與厥陰俱病則耳聾囊縮而厥水漿不入不知人者六日死若三陰三陽五臟六腑皆受病則榮衛不行腑臟不通而死矣陰陽俱病表裡俱傷者為兩感以其陰陽兩感病則兩證俱見至於傳經則亦陰陽兩經俱傳也始得一日頭痛者太陽口乾煩滿而渴者少陰至二日則太陽傳於陽明而少陰亦傳於太陰身熱譫語者陽明腹滿不欲食者太陰至三日陽明傳於少陽而太陰又傳於厥陰耳聾者少陽囊縮而厥者厥陰水漿不入不知人者胃氣不通也內經曰五臟已傷六腑不通榮衛不行如是之後三日乃死何也岐伯曰陽明者十二經脈之長也其血氣盛故云不知人三日其氣已盡故死矣謂三日六經俱病榮衛之氣不得行於內外腑臟之氣不得通於上下至六日腑臟之氣俱盡榮衛之氣俱絶則死矣按太陰可傳於少陰少陰不可傳於太陰逆故也此說未善蓋太陽為膀胱少陰為腎腎與膀胱為合太陰為脾陽明為胃胃與脾合少陽為膽厥陰為肝肝與膽合陰道從陽譬之妯娌但以夫年為次不以己齒為序也傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也太陽主表一日則太陽受邪至二日當傳陽明若脈氣微則不傳陽明胃經受邪則喜吐寒邪傳裡者則變熱若頗欲吐若煩躁脈急數者為太陽寒邪變熱傳於陽明也傷寒二三日陽明少陽證不見者為不傳也傷寒二三日無陽明少陽證知邪不傳止在太陽經中也傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也四日表邪傳裡里不和則不能食而嘔今反之故知不傳陰但在陽也問曰傷寒三日脈浮數而微病人身涼和者何也答曰此為欲解也解以夜半脈浮而解者濈然汗出也脈數而解者必能食也脈微而解者必大汗出也三日少陽脈小欲已也論見口苦舌乾其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈也八日陽明病衰身熱少歇也九日少陽病衰耳聾微聞也十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止舌乾已而嚏也十二日厥陰病衰囊縱少腹微下大氣皆去病人精神爽慧也太陽病頭痛至七日以上自愈者行其經盡故也若欲再傳經者針足陽明使不傳則愈六七日脈至皆大煩而口噤不言躁擾者必欲解也傷寒六七日無大熱其人躁煩此為陽去入陰故也若過十三日以上不間間謂病已尺寸陷者大危若更感異氣變為他病者當依舊壞證而治之若脈陰陽俱盛重感於寒者變為溫瘧尺寸俱盛先熱後寒宜小柴胡先寒後熱宜加桂但寒柴胡加桂薑湯但熱白虎加桂湯有汗多煩渴小便赤澀素有瘴氣及不服水土嘔吐甚者五苓散陽脈浮滑陰脈濡弱者更遇於風變為風溫風溫主四肢不收頭痛身熱常自汗出不解氣喘尺寸俱浮默默欲睡治在少陰厥陰不可發汗陽脈洪數陰脈實大者遇溫熱變為溫毒為病最重也溫毒必發斑陽脈濡弱陰脈弦緊者更遇溫氣變為溫疫以冬傷於寒發為溫病脈之變症方治如後說見後條戴傷寒先犯太陽以次而傳此特言其概耳然其中變證不一有發於陽即少陰受之者有夾食傷寒食動脾脾太陰之經一得病即腹滿痛者亦有不循經而入如初得病徑犯陽明之類不皆始於太陽也亦有首尾止在一經不傳他經亦有止傳一二經而止者不必盡得諸經也至如病之逾越不可泥於次序當隨證施治所以傷寒得外證為多仲景云日數雖多有表證者猶宜汗日數雖少有里證者即宜下海陽中之陽水太陽是也為三陽之首能循經傳亦能越經傳陽中之陽土陽明是也陽明為中州之主主納而不出如太陽傳至此名曰循經傳也陽中之陽木少陽是也上傳陽明下傳太陰如太陽傳至此為越經傳陰中之陰土太陰是也上傳少陽為順下傳少陰為逆如傳少陰為上下傳也如太陽傳太陰為誤下傳也陰中之陰水少陰是也上傳太陰為順下傳厥陰為逆如太陽傳至此乃表傳裡也陰中之陰木厥陰是也上傳少陰為實再傳太陰為自安海太陽者巨陽也為諸陽之首膀胱經病若渴者自入於本也名曰傳本太陽傳陽明胃土者名曰循經傳為發汗不徹利小便餘邪不盡透入於裡也太陽傳少陽膽木者名曰越經傳也為元受病脈浮無汗宜用麻黃湯而不用故也太陽傳太陰脾土者名曰誤下傳為元受病脈緩有汗當用桂枝而反下之所致也當病腹痛四肢沉重太陽傳少陰腎水名曰表傳裡為病急當發汗而反下汗不發所以傳裡也太陽傳厥陰肝木者為陰不至於首惟厥陰與督脈上行與太陽相接名循經得度傳吳夫傷寒六經為病陰陽虛實或冷或熱者無非客邪之所為也內經言人傷於寒則為病熱者言常而不言變也仲景謂或寒或熱而不一者備常與變而弗遺也蓋陽邪傳者常也陰邪傳者變也且夫陽邪以日數次第而傳者一二日太陽二三日陽明三四日少陽四五日太陰五六日少陰六七日厥陰也七日經盡當汗出而解七日不解謂之再經二七日不解謂之過經過經不解則為壞病華他云傷寒一日在皮二日在膚三日在肌四日在胸五日在腹六日在胃乃傳裡也其治例曰在皮膚者汗之在肌肉者和之在胸者吐之在腹入里者下之也傷寒賦曰一二日可發表而散三四日可和解而痊五六日便實方可議下其例頗同也殊不知此皆大約之法言常而不言變也蓋寒之傷人初無定規或中於陰或中於陽也經言一二日發熱脈沉者少陰病也又一二日口中和背惡寒者少陰病也此皆直中陰經之寒非常而為變也活人書曰凡寒邪自背而入者或中太陽或中少陰自面而入者則中陽明之類亦不專主於太陽也又曰寒邪首尾只在一經而不傳者有之有間傳一二經者有傳過一經而不再傳者亦有足經冤熱而傳入手經者有誤服藥而致傳變者多矣故經曰一日太陽受之脈靜者為不傳也若脈數急躁煩欲吐者傳也又曰二三日陽明少陽病不見者為不傳又曰太陽病脈浮緊身疼痛發熱七八日不解此表證仍在當發其汗又少陰病得之二三日口燥咽乾者急下之宜大承氣湯此皆不以日數而言也守真曰誰敢二三日便以大承氣下之蓋聖人書不盡言言不盡意說其大概而已蓋太陽為諸經之首傳變居多且熱邪乘虛入經則傳也若經實則不受邪而不傳也且夫太陽水傳陽明土乃妻傳夫謂之微邪陽明土傳少陽木亦曰妻傳夫乃微邪也少陽木傳太陰土乃夫傳妻謂之賊邪太陰土傳少陰水亦曰夫傳妻乃賊邪也少陰水傳厥陰木母傳子謂之虛邪太陽水間傳少陽木乃母傳子亦曰虛邪也太陽水越經而傳太陰土謂之微邪又曰誤下傳也太陽水傳少陰水此乃陰陽雙傳即兩感也太陽水傳厥陰木乃母傳子謂之虛邪又曰首尾傳也夫傷寒傳至厥陰肝經為尾蓋厥者盡也正氣將復而邪氣將解水升火降寒熱作而大汗解也若正氣不復邪無從解陰氣勝極則四肢厥冷舌卷耳聾囊縮不知人而死矣趙氏曰大抵邪在陽經則易治傳入陰經則危殆蓋陽微而陰盛正虛而邪實也況誤下內陷汗虛別經則壞異傾危可立而待凡治傷寒之要須讀仲景之書求其立法之意不然則疑信相雜未免通此而礙彼也熟讀詳玩其例自見則治法不差矣若不得其例而執論專方膠柱鼓瑟謬誤其可免哉許氏有曰讀仲景書用仲景法未嘗守仲景方可謂得古人心矣學者可不於片言隻字玩索其意與幸相與勉之陶氏曰傷寒傳足不傳手經者俗醫之謬論也夫人之氣自平旦會於膻中朝行手太陰肺以次分布諸經所以一脈愆和則百脈皆病彼云傳足不傳手者何所據乎蓋傷寒者乃冬時感寒即病之名也在時則足太陽少陰正司其令觸冒之者則二經受病其次則少陽厥陰繼冬而司春令而亦受傷何也蓋風木之令起於大寒節正當十二月中至春分後方行溫令故風寒亦能傷之足陽明太陰中土也與冬時無預而亦傷之何也紫陽朱子曰土無定位無成名無專氣寄旺於四季能終始萬物則四時寒熱溫涼之氣皆能傷之也況表邪傳裡必歸於脾胃而成燥糞用承氣湯以除去之胃氣和矣手之六經主於夏秋故不傷之足之六經蓋受傷之方分境界也若言傷足不傷手則可以為傳足不傳手則不可也況風寒之中人先入榮衛晝夜循環無所不至豈間斷於手經哉發明曰傷寒受病之由皆出熱論一篇而已何獨傳足而不傳手何也蓋傷寒病冬月得之足太陽膀胱為首次至足厥陰肝經為尾此病惟傷北方及東方與戊土上有足陽明胃濕之專位兼醜上有足太陰脾土之專位蓋足之六經皆在東北之方經云冬傷於寒即發者為傷寒春發於溫病夏發於溫疫為病最重此之謂也仲景云無奇經則無傷寒緣奇經皆附足六經不附手經是以寒邪只傷足經也長夏為大熱病者夏火既旺火之方與秋之分皆手經居之水方與春之分皆足經不足及夏火旺客邪助於手經則不足者愈不足矣故所用之藥皆泄有餘而非足經藥何者泄有餘則不足者補矣此傷寒先言足經而不言手經也大意如此至於傳手經者亦有之矣此事難知曰傷寒傳至五六日間漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水稀粥與之則咽終日不與則不思六脈細數而不洪大心下不痞腹中不滿大小便如常或傳十日以來形貌如醉人醫見神昏不已多用承氣湯下之誤矣蓋不知此熱傳手少陰心經也然又未知自何經而來答曰本太陽經傷風風為陽邪陽邪傷衛陰血自燥熱蓄膀胱壬病逆傳於丙丙丁兄妹由是傳心心火自上迫而熏肺所以神昏也謂肺為清虛之臟內有火邪致令神昏宜梔子黃芩黃連湯若脈在丙者導赤散脈在心者瀉心湯若誤用涼膈散乃氣中之血藥也如左手寸脈沉滑有力者則可用之或用犀角地黃湯近於是也本方所說若無犀角以升麻代之是陽明經藥也此解陽明經血中熱藥若脈浮沉俱有力者是丙丁中俱有熱也可以導赤瀉心各半服之則宜矣此證膀胱傳丙足傳手經也下傳上也丙傳丁也表傳裡也壬傳丁者坎傳離也越經傳也又謂腑傳臟也活人云傷寒傳足不傳手此言不盡意也有從足經而傳手經者何以知之經云傷寒或止傳一經或間傳一二經不可拘以始太陽終厥陰也但憑脈與外證治之此活法也與食則咽者邪不在胃也不與則不思者以其神昏故也熱邪既不在胃誤與承氣湯下之其死也必矣按傷寒本只傳足經以上又例傳手經之義可謂發病機之祕矣蓋只是邪蘊日久因足經實手經虛故冤熱耳有因汗下差誤而傳有因七情或勞倦等而致者有之大抵傳手經必有所因所以古人有救逆復脈等法豈但切中病情實啓後人之義例耳汗下大法凡傷寒之病多從風寒得之始表中風寒入里則不消矣未有溫覆而當不消散者不在證治擬欲攻之猶當先解表乃可下之若表已解而內不消非大滿猶生寒熱則病不除若表已解而內不消大滿大實堅有燥屎自可除下之雖四五日不能為禍也若不宜下而便攻之內虛熱入協熱遂利煩躁諸變不可勝數輕者困篤重者必死矣夫陽盛陰虛汗之則死下之則愈陽虛陰盛汗之則愈下之則死夫如是則神丹安可以誤發甘遂何可以妄攻虛盛之治相背千里吉凶之機應若影響豈容易哉況桂枝下咽陽盛即斃承氣入胃陰盛以亡死生之要在乎須臾視身之盡不暇計日此陰陽虛實之交錯其候至微發汗吐下之相反其禍至速而醫術淺狹懵然不知病源為治乃誤使病者殞沒自謂其分至令冤魂塞於冥路死尸盈於曠野仁者鑑此豈不痛歟凡兩感病俱作治有先後發表攻裡本自不同而執迷用意者乃云神丹甘遂合而飲之且解其表又除其裡言雖巧似其理實違夫智者之舉錯適成夫愚者之動作也設此法必果而速安危之變豈可詭哉世上之士但務彼俗習之榮而莫見此傾危之敗惟明者居然能護其本近取諸身夫何遠之有焉凡發汗溫服湯藥其方雖言日三服若病劇不解當促其間可半日中盡三服若與病相阻即便有所覺病重者一日一夜當晬時觀之如服一劑病證猶在故當復作本湯服之至有不肯汗出服三劑乃解若汗不出者死病也服桂枝湯大汗出脈洪大者復與桂枝湯如前法發汗解半日許復煩脈浮數者可更發汗活人云乙發汗病證仍在者三日內可二三汗之令腰以下周遍為度按此等處極要精審不可孟浪凡服湯藥發汗中病即止不必盡劑吐下亦如之許記一鄉人傷寒身熱大便不通煩渴鬱冒醫者用巴豆下之頃得溏利病宛然如舊豫觀之陽明結熱在裡非大柴胡承氣不可巴豆止去積不能蕩滌邪熱蘊毒亟進大柴胡等三服得汗而解嘗謂仲景一百一十三方為丸者有五理中陷胸抵當烏梅麻仁是以理中陷胸抵當皆大如彈子煮化而服與湯散無異至於麻仁治脾約烏梅治濕䘌皆用小丸以達下部其他逐邪毒破堅癖導瘀血潤燥糞之類皆憑湯劑未聞用巴豆小丸藥以下邪氣也既下而病不除不免重以大黃芒硝下之安能無損也哉凡病若發汗若吐若下若亡津液陰陽自和者必自愈重亡津液則不能作汗故必待自和乃愈太陽病三日已發汗若吐若下若溫針仍不解者此為壞證桂枝不中與也觀其脈證知犯何逆隨證治之活未滿三日可汗而已滿三日者可泄而已此大略言之耳凡病人有虛有實邪氣傳受遲速不同豈可拘以日數仲景云日數雖多但有表證而脈浮者猶宜發汗日數雖少若有里證而脈沉者即宜下之正應隨脈治之又況六氣之邪乘虛入經如自背得之則入太陽或入少陰自面感之則入陽明之類不必皆始於太陽也兼寒邪有首尾止在一經或間傳一二經不可以一理推但視脈與外證治之此活法也假令有人脈浮頭項強痛發熱而惡寒每日如此不以日數多少正是太陽經受之其餘經皆仿此大抵傷寒惟憑脈與外證以汗下之若過日多脈尚大浮數按之不足者尚責太陽也可發汗而愈若按之實者汗之必死須下之而愈也若始病脈沉細數外證或腹滿咽乾或口燥舌乾而渴為熱正責屬裡可下之而愈若無此證表熱脈沉誤下者必死須用麻黃附子甘草湯麻黃細辛附子湯少發汗以治之此皆仲景之確論也戴傷寒要緊處在分表裡而為汗下有病人自汗自下者有醫用藥汗之下之者中間節目頗多汗藥宜早下藥宜遲此亦大綱之論耳且如失血家不可發汗淋家不可發汗如此等類豈宜遽用表劑當徐徐解散苟或不當汗而強汗則津液耗竭變生百病因茲夭傷豈可一以汗藥宜早為說陽明汗出而多宜急下少陰下利而渴宜急下厥陰舌卷囊縮宜急下如此等證當用速利之劑苟或當下而不下則熱毒轉深遂致失下不可救療豈可一以下藥宜遲為說潔傷寒之法先言表裡及有緩急三陽表當急里當緩三陰表當緩里當急又曰脈浮當汗脈沉當下脈浮汗急而下緩謂三陽表也脈沉下急而汗緩謂三陰里也麻黃湯謂之急麻黃附子細辛湯謂之緩內經云有漬形以為汗謂汗之緩里之表也又云在皮者汗而發之謂汗之急表之表也急汗者太陽緩汗者少陰是臟腑之輸應也假令附子麻黃細辛湯是少陰證始得發熱脈沉里和無汗故漬形為汗今麻黃湯是太陽證頭項痛腰脊強脈浮無汗里和是也在皮者汗而發之可也經曰治主以緩治客以急此之謂也麻黃湯方見太陽病假令得肝脈其外證善潔面青善怒其三部脈俱弦而浮惡寒里和清便自調麻黃湯內加羌活防風各三錢謂肝主風是膽經受病也大便祕或泄下赤水無數皆里不和也假令得心脈其外證面赤口乾善笑其尺寸脈俱浮而洪惡寒里和清便自調麻黃湯內加黃芩石膏各三錢謂心主熱是小腸受病也假令得脾脈其外證面黃善噫善思善味尺寸脈俱浮而緩里和惡寒麻黃湯內加白朮防風各三錢謂脾主濕是胃經受病也假令得肺脈其外證面白善嚏悲愁不樂欲哭其尺寸脈俱浮而澀里和惡寒麻黃湯內加桂枝生薑各三錢謂肺主燥是大腸受病也假令得腎脈其外證面黑善恐缺尺寸脈俱沉而里和惡寒麻黃湯內加附子生薑各三錢謂腎主寒是膀胱受病也以上五證皆表之表也謂在皮者急汗而發之皆腑受病也表之裡者下之當緩謂隨臟表證外顯尺寸脈俱浮而復有里證謂發熱飲水便利赤色或泄下赤水其脈浮按之內實或痛麻黃湯方去麻黃杏仁隨臟元加藥同煎分作五服每下一證初一服加大黃五分如邪未盡又加大黃一錢未盡再加大黃一錢半直候邪盡則止此先緩而後急是表之裡宜下之當緩也假令得肝脈其內證滿悶淋瀝便難轉筋其尺寸脈俱沉而弦里和惡寒肝經受病麻黃附子細辛湯內加羌活防風各三錢假令得心脈其內證煩心心痛掌中熱而噦其尺寸脈俱沉洪里和惡寒心經受病於前湯內加黃芩石膏各三錢假令得脾脈其內證腹滿脹食不消怠惰嗜臥其尺寸脈俱沉緩里和惡寒肺經受病加白朮防己各三錢假令得肺脈其內證喘嗽灑淅寒熱其尺寸脈俱沉澀里和惡寒肺經受病加生薑桂枝各三錢假令得腎脈其內證泄瀉下重足脛寒而逆其尺寸脈俱沉里和惡寒此腎經受病加姜附各三錢以上五證里之表也宜清形以為汗皆臟受病也里之裡者下之當急謂隨臟內證已顯尺寸脈俱沉而復有里證謂小便赤大便祕澀或瀉下赤水或瀉或咳不能飲食不惡風寒發熱引飲其脈俱沉按之內實而痛此謂裡實宜速下之麻黃附子細辛湯內去麻黃隨臟元加藥同煮分作三服每下一證初一服加大黃三錢邪盡即止如邪未盡第二服加大黃二錢又未盡第三服加大黃一錢此先急而後緩是里之裡也宜速下之可汗大法春夏宜汗凡發汗欲令手足俱周時出似漐漐然一時間許益佳不可令如水流漓若病不解當重發汗汗多者必亡陽陽虛不得重發汗也凡服湯發汗中病便止不必盡劑也凡云可發汗無湯者丸散亦可用要以汗出為解然不如湯隨證良驗太陽病外證未解脈浮弱者當以汗解脈浮而數者可發汗陽明病脈遲汗出多微惡寒者表未解也可發汗夫病脈浮大問病者但言便硬耳設利者為大逆硬為實汗出而解何以故脈浮當以汗解傷寒其脈不弦緊而弱弱者必渴被火必譫語弱者發熱脈浮解之當汗出愈病人煩熱汗出即解又如瘧狀日晡所發熱者屬陽明也脈浮虛者當發汗病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣諧和故爾以榮行脈中衛行脈外復發其汗榮衛和則愈病人臟無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈太陽病不解熱結膀胱其人如狂血自下下者愈其外未解者尚未可攻當先解其外太陰病脈浮者可發汗傷寒不大便六七日頭痛有熱者與承氣湯其小便清者一云大便青知不在裡續在表也當鬚髮汗若頭痛者必衄下利腹脹滿身體疼痛者先溫其里乃攻其表下利後身疼痛清便自調者急當救表太陽病頭痛發熱汗出惡風寒者太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者太陽病發熱汗出者此為榮弱衛強故使汗出欲救邪風者太陽病下之後其氣上衝者以上並屬桂枝湯證太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上撞心者灸其核上各一壯與桂枝加桂湯太陽病下之微喘者表未解也宜桂枝加厚朴杏子湯脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼可發其汗傷寒脈浮緊不發汗因致衄者陽明病脈浮無汗而喘者太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在當復發汗服湯已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也脈浮者病在表可發汗太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者太陽與陽明合病喘而胸滿者陽明中風脈但浮無餘證者太陽病十日以去脈但浮者以上並屬麻黃湯證少陰病始得之反發熱脈沉者麻黃附子細辛湯少陰病得之二三日麻黃附子甘草湯微發汗以二三日無證故微發汗也太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服之服之則厥逆筋惕肉瞤此為逆也傷寒脈浮緩身不疼但重乍有輕時無少陰證者可與大青龍湯發之傷寒表不解心下有水氣乾嘔發熱喘咳或渴或利或噎或小便不利少腹滿宜小青龍湯傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也宜小青龍湯太陽病項背強𠘧𠘧反汗出惡風者宜桂枝加葛根湯太陽病項背強𠘧𠘧無汗惡風者宜葛根湯太陽與陽明合病必自下利不嘔者宜葛根湯太陽與陽明合病不下利但嘔者葛根加半夏湯太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者宜葛根黃芩黃連湯陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解過十日脈續浮者與小柴胡湯太陽病十日之後脈浮而細嗜臥者外已解也設胸滿脅痛者與小柴胡湯中風往來寒熱傷寒五六日以後胸脅苦滿默默不欲飲食煩心喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者宜小柴胡湯傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者宜小柴胡湯傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之脈浮小便不利微熱消渴者與五苓散利小便發汗張仲景之書曲盡其妙凡為汗證關防無所不備且如太陽中風桂枝湯主之如喘者桂枝加厚朴杏子湯主之𠘧𠘧有汗惡風者桂枝加葛根湯主之若形如瘧狀日二三度發者桂枝麻黃各半湯主之日再發者桂枝二麻黃一湯主之脈微弱者不可汗桂枝二越婢一湯主之至於傷風𠘧𠘧無汗惡風者葛根湯主之惡風無汗而喘者麻黃湯主之復加煩躁者大青龍湯主之隨其所感輕重具衆理以應之可見汗證中間其周詳整密無所不至矣活傷寒脈浮而緊身體拘急惡寒無汗寒多熱少面色慘而不舒腰脊疼痛手足四肢微厥此麻黃證也傷寒脈浮而緩寸大而尺弱自汗體熱頭疼惡風寒多熱少其面光而不慘煩躁手足不冷此桂枝證也傷寒者脈緊而澀傷風者脈浮而緩傷寒無汗傷風有汗傷寒畏寒不畏風傷風畏風不畏寒大抵太陽病者必脈浮發熱惡風惡寒惡寒者不當風而日憎寒惡風者當風而憎寒也六經皆有傷風傷寒其證各異太陽脈浮有汗為中風脈緊無汗為傷寒陽明善飢為中風不食為傷寒少陽兩耳聾目赤胸滿而煩為中風口苦咽乾目眩為傷寒若三陰傷風無變異形證但四肢煩疼餘證同傷寒也傷寒見寒脈者發熱惡風煩躁手足溫而脈反浮緊蓋發熱惡風煩躁手足溫為中風候脈浮緊為傷寒脈也傷寒見風脈者寒多熱少不煩躁手足微厥而脈反浮緩蓋寒多熱少不煩躁手足微厥為傷寒候脈浮緩為中風脈也傷風見寒傷寒見風大青龍證也婁傷寒發表須當隨證輕重而汗之故仲景有發汗者有和解者發汗如麻黃湯桂枝湯大青龍湯是也和解如小青龍湯桂枝麻黃各半湯白虎湯桂枝二越婢一湯柴胡桂枝之類是也後人不能深究寒邪淺深藥性緊慢一概用藥因致夭傷其間縱或生全往往汗後虛之遂至勞復或變成百病淹引歲月卒至不救此皆由汗下過度陰陽並竭血氣羸損以致此禍如遇病輕但當和解之所謂和其榮衛以通津液令其和解可也丹溪治傷寒表證用補中益氣湯發散海藏用神術湯白朮湯九味羌活散發散此皆和解之意不使真氣散失也傷寒連服湯劑而汗不出者如中風法蒸之使溫熱之氣於外迎之無不得汗其法用薪火燒地良久掃去以水灑之取蠶砂桑葉桃葉糠麩皆鋪燒地上厚可寸許上鋪席令病人上臥溫覆之移時汗立至使周身至腳心漐漐然乃用溫粉撲之汗止上床最得力者蠶砂桃柏葉也糠麩乃助其厚多少隨用凡感冒風寒頭痛憎寒拘急者用蔥白連根一握生薑五片陳皮一塊細茶一撮白梅一個用水二鍾煎至一鍾乘熱熏頭目飲下以衣溫覆取汗如急用以白沸湯泡蓋定候味出服之亦佳或蔥白一握淡豆豉半合湯泡服之佳或紫蘇蔥白生薑湯亦可或只一味紫蘇煎湯與之亦能發汗也又方七沸湯用水七碗燒鍋令赤熱投水於中取起再燒熱又以水投之如此七次取湯一碗乘熱飲之以衣被溫覆取汗神效治傷寒汗不出搐腳法用海蛤粉烏頭各二兩穿山甲三兩為末酒糊和丸大一寸許捏扁置患人足心下擘蔥白蓋藥以帛纏定於暖室用熱湯浸腳至膝下久則水溫又添熱水候遍身汗出為度凡一二日一次浸腳以愈為度不可汗脈沉為在裡而反發其汗則津液越出大便難表虛里實久則譫語也論見譫語脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之以榮氣不足血少故也活人云先以小建中湯加黃耆如尺脈尚遲再作一劑卻服桂枝柴胡二越婢一湯其湯分小劑和解之愈許一鄉人邱生者病傷寒發熱頭疼煩渴脈雖浮數而無力尺以下遲而弱豫曰此雖麻黃證而尺遲弱仲景云尺中遲者榮氣不足血氣微少未可發汗豫於建中湯加當歸黃耆令飲翌日脈尚爾其家煎迫日夜督發汗藥幾不遜矣余忍之但用建中調榮而已至五日尺部方應遂投麻黃湯啜二服發狂須臾稍定略睡已中汗矣信知此事誠難仲景雖云不避晨夜即宜便治醫者亦須顧其表裡虛實待其時日若不循次第暫時得安損虧五臟以促壽限亦何足貴哉南史載範云病傷寒恐不得預武帝九錫之慶召徐文伯診視以實懇之曰可便得愈乎文伯曰便瘥甚易但恐二年後不復起耳云曰朝聞道夕死猶可況二年乎文伯以火燒地布桃葉設席置云於其上頃刻汗解撲以溫粉翼日果愈云甚喜文伯曰不足喜也後二年果卒夫取汗先期尚促壽限況不顧表裡不待時日便欲速效乎每見病家不耐病未三四日晝夜促汗醫者隨情順意鮮有不敗事者豫故書此以為戒少陰病脈細沉數病為在裡不可發汗少陰病脈微不可發汗亡陽故也脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微發汗躁不得眠動氣在右不可發汗發汗則衄而渴心苦煩飲即吐水動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤動氣在上不可發汗發汗則氣上衝正在心端動氣在下不可發汗發汗則無汗心中大煩骨節苦疼目連惡寒食則反吐谷不得前咽中閉塞不可發汗發汗則吐血氣微絶手足厥冷欲得倦臥不能自溫諸脈得數動微弱者不可發汗發汗則大便難腹中乾一云小便難胞中干胃躁而煩其形相象根本異源脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛不可發汗發汗則寒栗不能自還咳者則劇數吐涎沫咽中必干小便不利心中飢煩晬時而發其形似瘧有寒無熱虛而寒栗咳而發汗蜷而苦滿腹中復堅厥脈緊不可發汗發汗則聲亂咽嘶舌萎聲不得前諸逆發汗病微者難瘥劇者言亂目眩者死一云譫言目眩睛亂者死命將難全太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便續自可一日二三度發脈微而惡寒者此陰陽俱虛不可更發汗也太陽病發熱惡寒熱多寒少脈微弱者無陽也不可發汗咽喉乾燥者不可發汗亡血不可發汗發汗則寒栗而振衄家不可發汗汗出必額上陷脈急緊直視不能眴不得眠汗家不可發汗發汗必恍惚心亂小便已陰疼宜禹餘糧丸方本闕淋家不可發汗發汗必便血瘡家雖身疼痛不可發汗汗出則痙下利不可發汗汗出必脹滿咳而小便利若失小便者不可發汗汗出則四肢厥逆冷傷寒一二日至四五日厥者必發熱前厥者後必熱厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗傷寒頭痛翕翕發熱形象中風常微汗出自嘔者下之益煩心懊憹如飢發汗則致痙身強難以伸屈熏之則發黃不得小便久則發咳唾太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者不可發汗太陽病發汗因致痙少陰病咳而下利譫語者此被火氣劫故也小便必難以強責少陰汗也少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出者是名下厥上竭最為難治永類鈐方云傷寒發汗有四難凡發熱頭疼有汗而非無汗惡風而非惡寒例發其汗汗不止為漏風間有發而為痙者此分外證發汗之一難也至於發熱頭痛尺脈遲者為榮虛血少不可發汗發熱頭痛脈弦細屬少陽不可汗汗則譫語此分脈發汗之二難也動氣在左不可汗汗則頭眩汗不止則筋惕肉瞤動氣在右不可汗汗則衄而渴心煩飲則吐水動氣在上不可汗汗則氣衝心動氣在下不可汗汗則無汗心煩骨節疼此分內證發汗之三難也春宜汗不可大發以陽氣尚微冬不大汗以陽氣伏藏汗之必吐利口爛生瘡此知時發汗之四難也云太陽證非頭痛項強不可發汗非身熱惡寒不可發汗非脈浮不可發汗活其脈微弱或尺脈遲者不可表其人當汗而衄血下血者不可表壞病者不可表婦人經水適來者不可表風溫者不可表濕溫者不可表虛煩者不可表病人腹間左右上下有築觸動氣者不可表太陽咽乾鼻衄淋漓小便不利皆不當汗已經發汗不得重發如無以上忌證雖經發汗邪氣未盡亦當重發之當汗不汗則生黃其證為風寒所傷陽氣下陷入內而與寒水上行於經絡之間本當發汗以徹其邪醫失汗之故生黃也脾主肌肉四肢寒濕與內熱相合故生黃也不當汗而汗為蓄血之證燥火也當益津液為上而反汗以亡之其毒擾陽之極則侵陰也故燥血蓄於胸中也當汗而發汗過多腠理開泄汗漏不止故四肢急難以屈伸也可下大法秋宜下凡可下者用湯勝丸散中病便止不必盡劑也下利三部脈皆平按之心下硬者急下之下利脈遲而滑者內實也利未欲止當下之少陰病得之二三日口燥咽乾者急下之少陰病六七日腹滿不大便者急下之陽明少陽合病必下利其脈不負者為順也負者失也互相剋賊名為負也脈滑而數者有宿食當下之問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀故知有宿食當下之下利不欲食者以有宿食故也當下之下利瘥至其年日月時復發者以病不盡故也當下之下利脈反滑當有所去下乃愈脈雙弦而遲者必心下硬脈大而緊者陽中有陰也可下之陽明病譫語有潮熱反不能食者胃中有燥屎五六枚也若飲食者但硬耳得病二三日脈弱無太陽柴胡證煩躁心下痞至四五日雖能食以承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不大便但初頭硬後必溏此未定成硬也攻之必溏須小便利屎定硬乃可攻之陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然汗出者此大便已硬也二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈病人小便不利大便乍難乍易時有微熱喘胃不能臥者有燥屎也大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也以上俱屬大承氣湯證陽明病發熱汗多者急下之傷寒後脈沉沉者內實也下之解太陽病未解脈陰陽俱停必先振栗汗出而解但尺脈實者下之而解病人無表裡證發熱七八日雖脈浮數者可下之傷寒發熱汗出不解心中痞硬嘔吐而下利者傷寒十餘日熱結在裡復往來寒熱者以上俱屬大柴胡湯證少陰病下利清水色純青心下必痛口乾燥者可下之病腹中滿痛者此為實也當下之腹滿不減減不足言當下之傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之汗出譫語者以有燥屎在胃中此為風也須下者過經乃可下之下之若早者語言必亂以表虛里實故也下之愈病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者可下之以上俱屬大柴胡大承氣證下利譫語者有燥屎也陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語以上俱屬小承氣湯證陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然汗出者此大便已硬也大承氣湯主之若汗出多微發熱惡寒者外未解也桂枝湯主之其熱不潮未可與承氣湯若腹大滿不通者與小承氣湯微和胃氣勿令至大泄下陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎也乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者大便必復硬而少也宜以小承氣湯和之不轉失氣者慎不可攻也陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉氣者更服一升若不轉氣者勿更與之明日又不大便脈反微澀者裡虛也為難治不可更與承氣湯陽明病不吐不下心煩者屬調胃承氣湯太陽病不解熱結膀胱其人如狂血自下者愈其外未解者尚未可攻當先解其外外解已但少腹急結者乃可攻之宜桃核承氣湯太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿而小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也宜下之太陽病身黃脈沉結少腹硬滿小便不利者為無血也小便自利其人如狂者血證也陽明證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑以上俱抵當湯證傷寒有熱少腹滿應小便不利今反利者為有血也當下之宜抵當丸陽明病發熱汗出者此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者以瘀熱在裡身必發黃宜下之以茵陳蒿湯傷寒七八日身黃如橘子色小便不利腹微滿者亦屬茵陳蒿湯證但結胸無大熱者以水結在胸脅也但頭微汗出者傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者俱屬大陷胸湯結胸者項亦強如柔痙狀下之則和大陷胸丸太陽病中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔則短氣汗出不惡寒者此表解里未和也屬十棗湯吳經言太陽病發熱汗出不解其人蒸蒸發熱者屬胃也調胃承氣湯下之凡潮熱腹痛者大柴胡加厚朴下之凡陽明病汗多胃中必燥大便必硬硬則譫語小承氣湯若譫語脈滑而疾發潮熱者大柴胡湯凡譫語有潮熱不食者胃中必有燥屎五六枚小承氣湯若能食大便硬者大承氣湯凡汗出譫語必有燥屎調胃承氣湯凡潮熱手足漐漐然汗出大便難而譫語者大承氣湯凡五六日不大便繞臍痛煩躁發作有時者此有燥屎也調胃承氣湯凡曾經下後又六七日不大便煩熱不解腹滿痛者此有燥屎也大承氣湯病人小便不利大便乍難乍易時有微熱喘滿不能臥者有燥屎也大承氣湯凡吐後腹脹滿者調胃承氣湯凡汗吐下後微煩小便數而大便硬者小承氣湯凡腹滿不減者小承氣湯凡下利脈滑而數者有宿食也小承氣湯凡病腹中滿痛者有宿食也小承氣湯凡脈沉有力內實潮熱不解者大柴胡湯大抵下藥必切脈沉實或沉滑沉疾有力者方可以下再以手按臍腹硬或叫痛不可按者則下之無疑凡下後不解者再按臍腹有無硬處如有手不可按下未盡也復再下之若下後腹中虛軟脈無力者此為虛也以參胡三白湯和之若發熱或潮熱或往來寒熱不解者宜小柴胡湯增損和之若煩熱不得眠者宜竹葉石膏湯或十味溫膽湯活傷寒里證須看熱氣淺深故仲景有宜下之者如大小承氣十棗大柴胡湯是也有微和其胃氣者如調胃承氣湯脾約丸少與小承氣微和之之類是也虛者十補勿一瀉強實者瀉之虛實等者雖瀉勿大泄之此金匱語也故王叔和序傷寒有承氣之戒垣藥用大承氣湯最緊小承氣湯次之調胃承氣又次之大柴胡湯又次之海大承氣湯治大實大滿滿則胸腹脹滿狀若合瓦大實則不大便也痞滿燥實四證俱備則用之雜病則進退用之大黃治大實芒硝治大燥此二味治有形血藥也厚朴治大滿枳實治痞此二味治無形氣藥也小承氣湯治痞實而微滿狀若飢人食飽飯腹中無轉失氣即大承氣只去芒硝心下痞大便或通熱甚須可下宜此方調胃承氣湯治實而不滿者腹如仰瓦腹中有轉失氣有燥糞不大便而譫語堅實之證宜用之上以上三法不可差差則無者生之有者遺之假令調胃承氣證用大承氣下之則愈後元氣不復以其氣藥犯之也若大承氣證用調胃承氣下之則愈後神癡不清以其無氣藥也小承氣證若用芒硝下之則或利不止變而成虛矣垣三一承氣湯辨實則瀉之人所共知如緩急輕重之劑則臨時消息焉如不惡寒反惡熱發渴譫語腹滿而喘手足濈然汗出急下之宜大承氣湯如邪未深恐有燥糞少腹痛小承氣湯試之腹中轉失氣者有燥糞也乃可攻之不轉失氣者初硬後溏尚未可攻攻之則腹滿不能食若腹不通止與小承氣湯微和胃氣勿令大泄如發汗不惡寒但實者胃實也當和胃氣調胃承氣湯主之成大熱結實者與大承氣湯小熱微結者與小承氣湯以熱不大甚故於大承氣湯中去芒硝又以結不至堅故減厚朴枳實如不至大堅然邪熱已甚而須攻下者亦未可投大承氣湯必以輕緩之劑攻之於大承氣湯中減厚朴枳實加甘草乃輕緩之劑以調胃也設若大承氣湯證反用調胃承氣湯下之則邪氣不伏小承氣湯證反用大承氣湯下之則過傷正氣而腹滿不能食故有勿大泄之戒此仲景所以分而治之未嘗越聖人之制度後之醫者以此三藥合而為一且云通治三藥之證及傷寒雜病內外一切所傷若如此說與仲景之方甚相背戾且失軒岐緩急之旨由是紅紫亂失迷惑世人一唱百和使病者暗受其弊將何所咎哉倘有公心審是者當於內經仲景方中求之責使藥證相對以聖賢之心為心則方之真僞自可得而知矣海傷寒外證全是下證而脈反細不可下者瀉心湯主之脈有力者黃連瀉心湯無力者半夏瀉心湯不可下脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微則不可下下之則心下痞硬動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸也動氣在左不可下下之則腹內拘急食不下動氣更劇雖有身熱臥則欲蜷動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌動氣在下不可下下之則腹脹滿卒起頭眩食則清穀心下痞也咽中閉塞不可下下之則上輕下重水漿不下臥則欲蜷身急痛下利日數十行諸外實者不可下下之則發微熱亡脈厥者當齊握熱諸虛者不可下下之則大渴求水者易愈惡水者劇脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛虛者不可下也微則為咳咳則吐涎下之則咳止而利因不休利不休則胸中如蟲齧粥入則出小便不利兩脅拘急喘息為難頸背相引臂則不仁極寒反汗出身冷若冰眼睛不慧語言不休而穀氣多入此為除中一名消中口雖欲言舌不得前脈濡而弱弱反在關濡反在巔浮反在上數反在下浮為陽虛數為無血浮為虛數生熱浮為虛自汗出而惡寒數為痛振而寒栗微弱在關胸下為急喘汗而不得呼吸呼吸之中痛在於脅振寒相搏形如瘧狀醫反下之故令脈數發熱狂走見鬼心下為痞小便淋漓少腹甚硬小便則尿血也脈濡而緊濡則衛氣微緊則榮中寒陽微衛中風發熱而惡寒榮緊胃氣冷微嘔心內煩醫謂有大熱解肌而發汗亡陽虛煩躁心下苦痞堅表裡俱虛竭卒起而頭眩客熱在皮膚悵怏不得眠不知胃氣冷緊寒在關元技巧無所施汲水灌其身客熱應時罷栗栗而振寒重被而覆之汗出而冒巔體惕而又振小便為微難寒氣因水發清穀不容間嘔變反腸出巔倒不得安手足為微逆身冷而內煩遲欲從後救安可復追還脈浮而大浮為氣實大為血虛血虛為無陰孤陽獨下陰部者小便當赤而難胞中當虛今反小便利而大汗出法應衛家當微今反更實津液四射榮竭血盡干煩而不眠血薄肉消而成暴一作黑液醫復以毒藥攻其胃此為重虛客陽去有期必下如汙泥而死脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼當發其汗而不可下也趺陽脈遲而緩胃氣如經也趺陽脈浮而數浮則傷胃數則動脾此非本病醫特下之所為也榮衛內陷其數先微脈反但浮其人必大便硬氣噫而除何以言之本以數脈動脾其數先微故知脾氣不治大便硬氣噫而除今脈反浮其數改微邪氣獨留心中則飢邪熱不殺穀潮熱發渴數脈當遲緩脈因前後度數如法病者則飢數脈不時則生惡瘡也脈數者久數不止止則邪結正氣不能復正氣卻結於臟故邪氣浮之與皮毛相得脈數者不可下下之必煩利不止少陰病脈微不可發汗亡陽故也陽已虛尺中弱澀者復不可下之脈浮大應發汗醫反下之此為大逆也脈浮而大心下反硬有熱屬臟者攻之不令發汗屬腑者不令溲數溲數則大便硬汗多則熱愈汗少則便難脈遲尚未可攻二陽並病太陽初得病時而發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽證不罷者不可下下之為逆結胸證脈浮大者不可下下之即死太陽與陽明合病喘而胸滿者不可下太陽與少陽合病者心下硬頸項強而眩者不可下諸門逆厥者不可下之虛家亦然病欲吐者不可下太陽病有外證未解不可下下之為逆病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞病脈浮而緊而復下之緊反入里則作痞夫病陽多者熱下之則硬本虛攻其熱必噦無陽陰強大便硬者下之必清穀腹滿太陰之為病腹滿而吐食不下自利益甚時腹自痛下之必胸下結硬厥陰之為病消渴氣上撞心中疼熱飢而不欲食食則吐蛔下之利不止少陰病飲食入口則必吐心中嗢嗢欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也傷寒五六日不結胸腹濡脈虛復厥者不可下此亡血下之死傷寒發熱頭痛微汗出發汗則不識人熏之則喘不得小便心腹滿下之則短氣小便難頭痛背強加溫針則衄傷寒脈陰陽俱緊惡寒發熱則脈欲厥厥者脈初來大漸漸小更來漸大是其候也如此者惡寒甚者翕翕汗出喉中痛若熱多者目赤脈多睛不慧醫復發之咽中則傷若復下之則兩目閉寒多便清穀熱多便膿血若熏之則身發黃若尉之則咽燥其小便利者可救若小便難者則危殆矣傷寒發熱口中勃勃氣出頭痛目黃衄不可制貪水者必嘔惡水者厥若下之咽中生瘡假令手足溫者必下重便膿血頭痛目黃者若下之則目閉貪水者若下之其脈必厥其聲嚶咽喉塞若發汗則戰栗陰陽俱虛惡水者若下之則里冷不嗜食大便完穀出若發汗則口中傷舌上白苔煩躁脈數實不大便六七日後必便血若發汗則小便自利也得病二三日脈弱無太陽柴胡證煩躁心下痞至四日雖能食以承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少雖不大便但頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之藏結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也傷寒嘔多雖有陽明證不可攻之陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎也乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者大便必復硬而少也宜小承氣湯和之不轉失氣者慎不可攻也傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心中痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯下利脈大者虛也以強下之故也設脈浮革因爾腸鳴者當歸四逆湯陽明病身合色赤不可攻之必發熱色黃者小便不利也陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻也須自欲大便宜蜜煎導而通之若土瓜根及豬膽汁皆可為導云非陽明之本病不可下陽明本病胃家實故也非痞滿燥實不可下非潮熱發渴不可下非罵詈親疏不可下非脈沉數不可下非棄衣而走登高而歌如見鬼狀不可下活脈浮者不可下脈虛者不可下惡寒者不可下嘔吐者不可下大便失氣者不可下轉失氣者下泄也小便清者不可下大便堅小便數者不可用承氣湯乃脾約丸證也大便硬小便少者未可攻陽明病自汗出若發汗小便自利者不可下宜用蜜煎導之吳凡有惡風惡寒腹滿時減時滿腹脹滿可揉可按虛軟陰虛勞倦或手足逆冷尺脈弱脈在於表脈沉不實不疾按之無力亡血虛家以及婦人經水適來適斷或熱入血室與夫胎前産後崩血小便頻數小便清而大便祕等證俱不可下戴陽明下證已具其人喘嗽或微惡寒為太陽陽明或往來寒熱為少陽陽明於陽明證中而有太陽少陽證未罷此非正陽明也慎未可遽下所以古注陽明有三當須識此可吐大法春宜吐凡用吐湯中病即止不必盡劑也病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上撞咽喉不得息者此為有寒當吐之一云此以內有久痰宜吐之病胸上諸實一作寒胸中鬱郁而痛不能食欲使人按之而反有涎唾下利日十餘行其脈反遲寸口脈微滑此可吐之吐之利則止少陰病飲食入口則吐心中嗢嗢欲吐復不能吐者宜吐之又宿食在上脘手足逆冷脈乍結以客氣在胸中心下滿而煩欲食不能食者病在胸中皆當吐之吳凡病在膈上者脈大胸滿多痰者食在胃口脈滑者俱宜吐之華他謂傷寒三四日邪在胸中者宜吐之凡吐用瓜蒂散或淡鹽湯或溫茶湯與之如人弱者以人參蘆湯吐之亦可若痰多者以二陳湯一甌乘熱與之以指探喉中即吐也凡老人怯弱與病勞內傷虛人並婦人胎前産後血虛脈弱小者皆不可吐凡藥發吐者如防風桔梗山梔只有一味煎湯溫服之則吐蓋誤吐則損人上焦元氣為患非輕可不慎哉不可吐太陽病當惡寒發熱今自汗出反不惡寒發熱關上脈細數者以醫吐之過也若得病一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣者此為吐之內煩也少陰病飲食入口則吐心中嗢嗢欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也若膈上有寒飲乾嘔者不可吐也當溫之少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚四肢厥虛家新産脈微皆不可吐愈解問曰脈病欲知愈未愈者何以別之答曰寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解者此脈為陰陽和平雖劇當愈針經禁服篇云寸口人迎兩者相應若引繩大小齊等者名曰平人言手之寸口脈與喉旁之人迎脈等齊為平人後條云六脈陰陽俱停必先振栗汗出而解者是也凡得病厥脈動數服湯藥更遲脈浮大減小初躁後靜此皆愈證也脈浮數而微病人身溫和者欲解也凡病反能飲水者為欲愈太陰中風脈陽微陰澀而長者為欲愈少陰中風脈陽微陰浮者欲愈厥陰中風脈微浮者欲愈不浮未愈太陽病已至未解陽明病申至戌解少陽病寅至辰解太陰病亥至醜解少陰病子至寅解厥陰病醜至卯解問曰凡病欲知何時得何時愈答曰假令日中得病夜半愈者以陽得陰則解也夜半得病日中愈者以陰得陽則解也病家人請云病人苦發熱身體疼病人自臥師到診其脈沉而遲者知其瘥也何以知之表有病者脈當浮大今反沉遲故知愈也假今病人云腹內卒痛病人自坐師到脈之浮而大者知其瘥也何以知之若里有病者脈當沉而細今脈浮大故知愈也問曰病有戰而汗出者因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出而解也若脈浮而數按之不芤此人本不虛若欲自解但出汗耳不發戰也問曰病有不戰而汗出解者何也答曰脈大而浮數故知不戰汗出而解也問曰病有不戰不汗出而解者何也答曰其脈自微以其曾經發汗若吐若下若亡血以內無津液待陰陽自和必自愈故不戰不汗出而解也上海藏云戰而後解者太陽也不戰有汗而解者陽明也不戰無汗而解者少陽也太陽病未解脈陰陽俱停必先戰栗汗出而解陽微者汗解陰微者下解海太陽傳陽明其中或有下證陽明證反退而無熱與不渴卻顯少陽證是知可解也太陽證知可解者為頭不痛項不強肢節不痛則知表易解也陽明證知可解者為無發熱惡熱則知里易解也少陽知可解者寒熱日不移時而作邪未退也若用柴胡而移其時早移之於晏晏移之於早氣移之於血血移之於氣是邪無可容之地知可解也可解之脈浮而虛不可解之脈浮而實浮而虛者只在表浮而實者知已在裡也汗多不解者轉屬陽明也死證結胸證其脈浮大者不可下下之則死結胸證悉具煩躁者亦死陽明病心下硬滿者不可攻攻之利遂不止者死直視譫語喘滿者死下利者亦死發汗多重發汗者亡其陽譫語氣短者死傷寒若吐若下不解不大便五六日至十餘日日晡所發潮熱不惡寒獨語如見鬼狀者發則不識人循衣摸床惕而不安微喘直視脈澀者死脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽即絶少陽病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治少陰病惡寒身蜷而利手足厥冷者不治少陰病六七日息高者死傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中當冷不能食今反能食此名除中必死傷寒六七日脈微手足厥冷煩躁灸厥陰脈不還者死傷寒發熱下利厥逆躁不得臥者死傷寒發熱下利至甚厥不止者死傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死發熱而厥七日下利者為難治傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治下利手足厥逆無脈者灸之不溫若脈不還反微喘者死下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死傷寒下利十餘行脈反實者死嘔而脈弱小便復利身有微熱見厥者為難治濕家下之額上汗出微喘小便利者死若下利不止者亦死附死證歌兩感傷寒不須治陰陽毒過七朝期黑斑下厥與上竭陽病見陰脈者危舌卷耳聾囊更縮陰陽交及摸尋衣重暍除中皆不治唇吻青兮面黑黧咳逆不已並臟結溲便遺尿便難醫汗出雖多不至足口張目陷更何為喘不休與陰陽易離經脈見死當知結胸證具煩躁甚直視搖頭是死時少陽證與陽明合脈弦長大救時遲汗後反加脈躁疾須知臟厥命難追蝦游屋漏並雀啄魚翔彈石解繩推更有代脈皆不救以上諸證死無疑附陰陽戴凡治傷寒須辨陰陽二候不可誤也陽經有三太陽陽明少陽是也陰經亦有三太陰少陰厥陰是也經之陰陽以臟腑言腑為陽膀胱胃膽是也臟為陰脾腎肝是也病之陰陽乃是外邪之陰陽陰氣陽氣是也病在太陽則熱在皮膚之分翕翕然怫怫然而熱便有頭痛惡寒體疼其脈必浮而緊病在陽明則熱在肌肉之分或壯熱或熇熇而熱或蒸蒸而熱便有頭額痛或潮熱自汗其脈必長而數病在少陽則必半表半裡之熱或往來寒熱便有頭角痛口苦嘔而胸滿脅痛其脈必弦而數病在太陰則手足漸冷脈息漸沉或自利腹滿嘔吐不渴病在少陰雖然發熱手足自冷脈必沉細病在厥陰則手足厥冷脈微而緩甚則唇青舌卷囊縮陽證面紅光彩唇紅口乾舌燥能飲水漿其人身輕易以轉動常欲開眼見人目睛了了喜語言其聲響亮口鼻之氣呼吸出入能往而能來小便或赤或黃大便或祕或硬手足自溫暖爪甲俱紅活陰證面青黑或有虛陽泛上雖亦赤色而不紅活光彩其人身重難以轉側或喜向壁臥或蜷臥欲寐或閉目不欲見人目睛不了了懶言語語無聲氣難布息鼻中呼不出吸不入往來口與鼻中氣冷不欲飲水面上惡寒有如刀刮唇口或青或紫舌色或青或紫或白苔鋪滿而滑不見紅色手足自冷爪甲或青或紫血自不紅活小便清白或有淡黃大便不實或瀉雖肌表有熱以手按之則不甚熱陰甚者則冷透手也陰陽二氣皆能犯臟腑故陽氣犯太陽則為傷風惡風而有汗陰氣犯太陽則為傷寒惡寒而無汗在太陽未得解轉入陽明少陽二經則純乎陽不如太陽之易治若陽氣未能罷以次傳入陰經則為陰中之陽蓋緣陽經之陽氣來入陰經雖有自利欲寢唇青手足厥冷舌卷囊縮等證亦不可妄投熱藥宜瀉其陽之在陰經也若陽病下之太過陽氣已脫遂變為陰所謂害熱未已寒病復起或初得病便是陰證此是陰中之陰蓋緣陰氣攻陰經陰自得傳非自傳諸陽經來只當以溫藥回其陽故陽入陰者變陽以救陰陰入陽者用陽以救陽二者不可不辨活太陽陽明少陽皆屬陽證也太陽者膀胱也發熱惡寒頭疼腰痛而脈浮也陽明者胃也不惡寒反惡熱濈濈汗出大便祕潮熱而脈長也少陽者膽也口苦咽乾脅下滿發熱而嘔或往來寒熱而脈弦也麻黃湯大青龍湯桂枝湯治太陽傷風寒也大柴胡湯調胃承氣湯小承氣湯大承氣湯治陽明傷寒也小柴胡湯治少陰傷寒也其他藥皆發汗吐下後證也若陽氣獨盛陰氣暴絶即為陽毒必發躁狂走妄言面赤咽痛身斑斑如錦紋或下利黃赤脈洪實或滑促當以酸苦之藥投之令陰氣復而大汗解矣古人云酸苦湧泄為陰謂苦參大青葶藶苦酒之類皆復其陰氣也微用苦甚則兼用酸苦折熱復陰若熱極發厥陽證似陰者學者當以脈別之太陰少陰厥陰皆屬陰證也何謂太陰證太陰脾之經主胸膈䐜脹何謂少陰證少陰腎之經主脈細心煩但欲寐或自利而渴何謂厥陰證厥陰肝之經主消渴氣上衝心心中疼肌熱不欲食食則吐蛔下之利不止也三陰中寒微則理中湯稍厥或中寒下利即乾薑甘草湯大段重者用四逆湯無脈者用通脈四逆湯若陰氣獨盛陽氣暴絶則為陰毒其證四肢逆冷臍腹築痛身如被杖脈沉疾病或吐或利當急灸臍下服以辛熱之藥令陽氣復而大汗解矣古人云辛甘發散為陽謂桂枝甘草乾姜附子之類能復其陽氣也微用辛甘甚則用辛苦若陰極發躁陰證似陽學者亦當以脈別之羅陰證陽證辨靜江府提刑李君長子年十九歲四月病傷寒九日醫者作陰證治之與附子理中丸數服其證增劇別易一醫又作陽證議論差互不敢服藥李君邀豫往視座間有數人豫不欲直言其證但細為分解令自忖度之凡陽證者身大熱而手足不厥臥則怛然起則有力不惡寒反惡熱不嘔不瀉渴而飲水煩躁不得眠能食而多語其脈浮大而數者陽證也凡陰證者身不熱而手足厥冷惡寒蜷臥惡聞人聲或自引衣蓋覆不煩渴不飲食小便自利大便反快其脈沉細而微遲者陰證也今診其脈數得六七至其母曰夜來叫呼不絶全不睡又喜飲水豫聞其言知陽證悉具且三日不見大便宜急下之豫遂以酒煨大黃六錢甘草炙二錢芒硝五錢煎服至夕下數行燥糞二十餘塊是夜汗大出明日往視之身涼脈靜矣豫思素問熱論云治之各通其臟腑故仲景述傷寒論云六經各異傳變不同活人亦云凡治傷寒先須明經絡其義一也昧者不察經絡不問病源按寸握尺妄意病證不知邪氣之所在動致顛覆真盲醫哉昔韓子云醫之病病在少思真理致之言也學者審之吳夫陰證似陽者乃水極似火也蓋傷寒傳變誤服涼劑攻熱太速其人素本腎氣虛寒遂變陰證冷甚於內逼其浮陽之火發於外其人面赤煩躁身有微熱渴欲飲水復不能飲大便祕結不通小便淡黃或嘔逆或氣促或難言或咽喉痛所以狀似陽證或見面赤煩渴大便祕結作陽證妄投寒涼之藥下咽遂斃可不慎哉切其脈沉細遲微者急以通脈四逆湯倍加人參附子以接其真陽之氣設或差遲遂致陰盛陽衰參附亦不能救矣此與陰盛隔陽例同王太僕所謂身熱脈數按之不鼓擊者此名陰盛隔陽非熱也婁素問云脈從而病反言證似陽者脈亦從證似陽而其病反是寒也證似陰者脈亦從證似陰而其病反是熱也故皆反其脈證施治如身熱微熱煩躁面赤其脈沉而微者陰證似陽也身熱者裡寒故也煩躁者陰盛故也面戴陽者下虛故也若醫者不知脈誤謂實熱反與涼藥則氣消成大病矣外臺祕要云陰盛發躁名曰陰躁欲坐井中宜以熱藥治之故仲景少陽證面赤者四逆湯加蔥白治之垣寒涼之藥入腹周身之火得水則升走陰躁之極故欲坐井中是陽已先亡醫猶不悟復認為熱重以寒藥投之其死何疑焉垣或因吐因嘔因嗽而發躁蒸蒸身熱如坐甑中欲得去衣居寒處或飲寒水則便如故振寒復至則氣短促速胸中滿悶欲絶甚則口開目瞪聲聞於外而淚涕涎痰大作其發躁須臾而已如前六脈細弦而澀按之而虛此大寒證也以辛寒甘溫之劑大瀉南方北方則愈馮內翰侄因病傷寒目赤而煩渴脈息七至按之不鼓經曰脈至而從按之不鼓諸陽皆然此陰盛格陽於外非熱也與姜附之劑汗出愈許傷寒六七日無熱脈沉緊而細煩躁不飲水此陰盛格陽也當用附子霹靂散飲水者不可與服吳夫陽證似陰乃火極似水也蓋傷寒熱甚失於汗下陽氣亢極鬱伏於內反見勝已之化於外故身寒逆冷神氣昏昏狀若陰證也大抵唇焦舌燥能飲水大便祕硬小便赤澀設有稀糞水利出者此內有燥屎結聚乃旁流之物非冷利也再審有失氣極臭者是也其脈雖沉切之必滑有力或時躁熱不欲衣被或揚手擲足或譫語有力此陽證也輕者人參白虎湯或小柴胡合解毒湯主之內實者須下之以調胃承氣湯或有潮熱者以大柴胡加芒硝若大實大滿祕而不通者以大承氣湯下之必須審察輕重酌量用之蓋此與陽盛拒陰亦同王太僕所謂病人身寒厥冷其脈滑數按之鼓擊於指下者此名陽盛拒陰非寒也活手足逆冷大便祕小便赤或大便黑色脈沉而滑者陽證似陰也輕者白虎湯重者承氣湯傷寒失下血氣不通令四肢逆冷此是伏熱深故厥亦深速以大承氣湯加膩粉下之汗出立愈蓋熱厥與陰厥自不同熱厥者微厥卻發熱陰厥即不發熱四肢逆冷惡寒脈沉細大小便滑泄上二節言證似陽而脈病屬陰證似陰而脈病屬陽故反其證而治之蓋證似陽而脈病屬陰者世尚能辨若脈證俱是陰而病獨屬陽者舉世莫辨而致夭折者滔滔皆是許學士云熙寧中邠守宋迪因其猶子病傷寒見其煩渴而汗多以涼藥治之遂成陰毒數日卒迪痛悼之遂著陰毒形證訣三篇蓋傷世之意深矣論曰陰盛則外寒陽虛則外寒屬表故表證條云外寒者汗之則愈也陽盛則內熱陰虛則內熱內熱屬裡故里證條云內熱者下之則愈也趙活人第三十三問引素問雲陽虛則外寒陰虛則內熱陽盛則內熱陰盛則外寒故治傷寒者陽虛陰盛汗之則愈下之則死陰虛陽盛下之則愈汗之則死陰陽虛盛非謂分尺寸也難經云陰陽虛盛者說脈也素問云陰陽虛盛者說表裡也仲景論傷寒汗下故引素問表裡之說與外臺所論合矣外臺雲表病里和汗之則愈表和里病下之則愈愚詳素問論陰陽虛盛四證者雜病也難經六難之文論脈也外臺所述之文論傷寒表裡也但仲景所論陰陽虛盛之意理實奧焉經曰邪氣盛則實精氣脫則虛因正氣先虛以致邪氣客之而為盛實於是有陰虛陽盛陽虛陰盛二證之別今活人書卻將素問所論雜病陰陽虛盛四證合而引證仲景傷寒四證之法又改陽盛內熱作外熱陰感內寒作外寒所論初未嘗確合愚因拓仲景所主陰陽虛盛之理而詳說之蓋盛者指邪氣而言虛者指正氣而言陰陽虛盛邪正消長之機也且正氣在人陽主表而陰主裡邪氣中人表為陰而里為陽若夫表之真陽先虛故陰邪乘陽而盛實表受邪者陽虛也脈浮緊者陰邪盛於外也是謂陽虛陰盛所以用桂枝辛甘之溫劑汗之則陰邪消溫之則真陽長使邪去正安故愈又若里之真陰先虛故陽邪入陰而盛實里受邪者陰虛也脈沉實者陽邪盛於內也是謂陰虛陽盛所以用承氣酸苦之寒劑下之則陽邪消寒之則真陰長邪去正安故愈如其不然陽盛而用桂枝下咽即斃陰盛而用承氣入胃即亡是皆盛盛虛虛而致邪失正也以是知仲景所主陽虛陰盛陰虛陽盛二證之意深蓋指一為表證一為里證邪正消長而言非兼言表和里病里和表病而謂之陰陽虛盛也況和者無病處也以和字訓虛字恐礙於理王難經曰傷寒陽虛陰盛汗出而愈下之即死陽盛陰虛汗出而死下之則愈嗟乎其傷寒汗下之樞機乎夫邪之傷於人也有淺深焉淺則居表深則入里居表而閉腠理髮怫熱見惡寒惡風頭痛等證於斯時也惟辛溫解散而可愈入里則為燥屎作潮熱形狂言譫語大渴等證於斯時也惟鹹寒攻下而可平夫寒邪外客非陰盛而陽虛乎熱邪內熾非陽盛而陰虛乎汗下一差生死反掌籲是言也謂之傷寒汗下樞機其不然歟惜乎釋者旁求厥義滋隱外臺祕要曰此陰陽指身之表裡言病者為虛不病者為盛表病里和是陽虛陰盛也表和里病是陽盛陰虛也竊意陰陽之在人均則寧偏則病無過不及之謂均過與不及之謂偏盛則過矣虛則不及矣其可以盛為和乎故內經云邪氣盛則實精氣奪則虛且謂陽虛當汗陰虛當下乃遺邪氣而反指正氣為言得無晦乎傷寒微旨曰此陰陽指脈之尺寸言尺脈實大寸脈短小名陰盛陽虛可汗寸脈實大尺脈短小名陽盛陰虛可下苟汗證已具而脈未應必待尺脈力過於寸而後行下證已具而脈未應必待寸脈力過於尺而後用竊意越人設難以病不以脈其所答也何反以脈不以病乎且脈固以候病也倘汗下之證已急不可少緩待脈應而未應欲不待則惑於心欲待之則慮其變二者之間將從病歟將從脈歟吾不得無疑於此也或詰豫曰仲景傷寒論引此而繼以桂枝下咽陽盛則斃承氣入胃陰盛以亡之語夫桂枝表藥承氣里藥反則為害是固然矣然麻黃湯亦表藥也其不言之何歟且子以陰盛為寒邪寒邪固宜用麻黃也今反舉桂枝又何歟豫曰何不味仲景之言乎其曰凡傷寒之病多從風寒得之又曰脈浮而緊浮則為風緊則為寒又桂枝湯條而曰嗇嗇惡寒淅淅惡風麻黃湯滌而曰惡風夫風寒分言則風陽而寒陰風苟行於天地嚴凝凜冽之時其得謂之陽乎是則風寒常相因耳故桂枝麻黃皆溫劑也以溫劑為治足以見風寒之俱為陰邪矣但傷衛則桂枝傷榮則麻黃榮衛雖殊其為表則一耳仲景此言但以戒汗下之誤為主不為榮衛設也舉桂枝則麻黃在其中矣所謂陽盛即斃者是言表證已罷而里證既全可攻而不可汗所謂陰盛以亡者是言里證未形而表證獨具可汗而不可攻由此觀之則越人仲景之本旨庶乎暢然於其中矣表裡王海藏云治傷寒須分表裡若表裡不分汗下差誤豈非大誤且如均是發熱身熱不渴為表有熱小柴胡加桂枝主之厥而脈滑為里有熱白虎加人參主之均是水氣乾嘔微利發熱而咳為表有水小青龍加芫花主之體涼表證罷咳而脅下痛為里有水十棗湯主之均是惡寒有熱而惡寒者發於陽也麻黃桂枝小柴胡主之無熱而惡寒者發於陰也附子四逆主之均是身體痛脈浮發熱頭痛身體痛者為表未解麻黃湯主之脈沉自利身體痛者為里不和四逆湯主之以此觀之仲景表裡之法甚詳學者宜深究心焉活人云發熱惡寒身體痛而脈浮者表證也表證者惡寒是也惡寒者屬太陽宜汗之不惡寒反惡熱手掌心並腋下濈濈汗出胃中燥糞結聚潮熱大便硬小便如常腹滿而喘或譫語脈沉而滑者里證也里證者內熱是也內熱者屬陽明宜下之傷寒始發熱惡寒今汗後不惡寒但倍發熱而躁始脈浮而大今脈洪實或沉數細始惺靜今狂語此為胃實陽盛再汗即死須下之則愈亦有始得病便變陽盛之證須便下之不可拘以日數更有心胸連臍腹大段疰悶腹中痛坐臥不安冒悶喘急極者亦不問他證便下之若不下則氣血不通四肢便厥醫人不知反疑是陰厥復進熱藥禍如反掌不可不察也成無己曰邪之客於表者為寒邪與陽相爭則為寒矣邪之入於裡者為熱邪與陰相爭則為熱矣邪在半表半裡外與陽爭而為寒內與陰爭而為熱是以往來寒熱邪居表多則多寒邪居里多則多熱邪半在表半在裡則寒熱亦半矣邪在表者必漬形以為汗邪在裡者必蕩滌以取利其餘不外不內半表半裡又非發汗之所宜亦非吐下之所對是當和解則可矣小柴胡為和解之劑也李東垣曰邪在榮衛之間謂之半表半裡也太陽陽明之間少陽居身之半表半裡也五苓散分陰陽膀胱經之半表半裡也理中湯治吐泄上下之半表半裡也活傷寒表證當汗里證當下不易之法也發表攻裡本自不同甘遂神丹不可合飲桂枝承氣安可並進然而假令病人脈浮而大是表證當汗其人發熱煩渴小便赤卻當下此是表裡俱見五苓散主之假令傷寒不大便六七日頭痛有熱者是里證當下其人小便清者知不在裡仍在表也當鬚髮汗此是兩證俱見即未可下宜與桂枝湯假令病人心下滿口不欲食大便硬脈沉細是里證當下其人頭汗出微惡寒手足冷卻當汗此兩證俱見者仲景所謂半在表半在裡也小柴胡主之假令太陽病表證未除而醫數下之遂挾熱而利不止心中痞硬仲景謂之表裡不解桂枝人參湯主之本太陽病醫反下之因爾腹痛是有表復有里仲景用桂枝加芍藥湯痛甚者桂枝加大黃又云太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根芩連湯主之煩躁口苦腹滿而喘發熱汗出不惡寒反惡熱此陽明證也則脈反浮而緊是其表裡俱見不可汗下宜梔子湯吐之此仲景治傷寒有表復有里之法也王海藏云大柴胡湯治表裡內外俱熱之證治有表者或脈浮或頭痛或惡風或惡寒四證中或有一二尚在者乃十三日過經不解是也治有里者或譫語或妄語或擲手揚視此皆里之急者也若欲汗之則里證已急欲下之則表證尚在通宜大柴胡湯傷寒四五日後以至過經無表證又於裡證未可卜者皆可用小柴胡隨證加減用之以至十餘日亦可用十餘日外用小柴胡不愈者若大便硬看證可下則用大柴胡下之以過經其人稍虛當下者用大柴胡湯則穩當恐承氣太緊病人不能禁也仲景云六七日目中不了了睛不和無表裡證大便難身微熱此為實也當下之宜大承氣湯又云病人無表裡證發熱七八日脈雖浮數可用大柴胡下之假令已下脈數不解至六七日不大便者有瘀血也屬抵當湯傷寒雜病海藏王好古曰世之治傷寒有法療雜病有方是則然矣然猶未也吾謂治傷寒亦有方療雜病亦有法方即法也豈有異哉要當全識部分經絡表裡臟腑豈有二哉以其後世才智之不及古也所以分傷寒雜病為二門故有長於此而短於彼者逮夫國家取士分科為七宜乎愈學而愈陋愈專而愈粗也試以傷寒雜症二科論之傷寒從外而之內者法當先治外而後治內雜病從內而之外者法當先治內而後治外至若於中外不相及則治主病其方法一也亦何必分之為二哉大抵雜病之外不離乎表傷寒之內不離乎里表則汗里則下中則和不易之法劑之寒熱溫涼在其中矣戴有傷寒雜病有傷寒正病傷寒雜病者難以正病治如病人證狀不一有冷有熱陰陽顯在目前當就其中大節先治其餘證則徐治然亦不可用獨熱獨寒之劑又如嘔渴煩熱進小柴胡湯嘔渴煩熱止矣而下利不休以小柴胡湯為非則嘔渴煩熱不應止以為是則下利不應見吐利厥逆進姜附湯吐利厥逆止矣而熱渴譫語昏不知人以姜附為非則吐利厥逆不應止以為是則熱渴譫語不應見此亦傷寒雜病雖無前項冷熱二證顯然並見之跡而陰中有陽陽中有陰潛伏其間未即發見用藥一偏此衰彼盛醫者當於有可疑之處能反復體認無致舉一廢一則盡善矣類證雜論三陽證有合陽有純陽三陰證有盛陰有純陰合陽者經所謂合病者是也純陽者經所謂脈陰陽俱盛大汗出不解者死又曰凡發汗服湯藥至有不肯汗者死謂陽熱甚而陰氣絶也故不能作汗二者俱是有陽而無陰故曰純陽也三陰有盛陰者如少陰病身體痛手足寒骨節痛脈沉者附子湯主之謂手足寒身體痛脈沉者寒盛於陰也純陰者如少陰病惡寒身蜷而利手足逆冷者不治謂無陽也有寒客三陰極而生熱則傳陽明凡邪初中三陰則寒故宜溫藥發汗及寒極變熱則復宜寒藥下之蓋三陰三陽皆能自受邪不止自太陽經傳也故經曰陽明居中土也萬物所歸無所復傳如太陽入胃則不傳陽明陽明入胃則不傳少陽少陽入胃則不傳三陰若三陰又有自受邪變熱入胃者故經曰傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至七八日大便硬者為陽明病也此太陰之邪入陽明也又少陰病六七日腹脹不大便者急下之宜大承氣湯此少陰之邪入腑也經曰下利有譫語者燥屎也宜小承氣湯此厥陰之邪入腑也三陰變熱入腑者往往有之不可不察有一陽中寒者太陽十六證云傷寒脈浮自汗出小便數心煩微惡寒攣急此邪中膀胱經虛寒也宜桂枝加附子湯則愈醫以其證象於陽旦若反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯以復其陽厥愈足溫更作芍藥甘草湯以伸其腳若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之觀仲景此治其於壞病何有此先汗而後下之法也又如下利清穀裡寒外熱身體疼痛急當救里四逆湯利止里和清便自調急當救表桂枝湯此先溫而後汗之法也孫兆曰本是陽病熱證為醫吐下過多遂成陰病者卻宜溫之有本是陰病與溫藥過多致胃中熱實或大便硬有狂言者亦宜下也論中有稱太陽經病者太陰經病者有稱傷寒者中風者有但稱厥者下利者有但稱病者凡稱某經者蓋以邪中其經故以經名之非特謂傷寒之候謂兼有雜病也凡云傷寒而不云經者故非雜病也謂六經俱有之證難以一經拘之中風之病亦然凡云下利及厥與夫稱病人等名證者謂六經傷寒中風雜病等候俱有是證也叔和類證編入各經故其有所未當者如下利有譫語者有燥屎也宜小承氣湯叔和編入厥陰下利條內若以證言之正當屬陽明也似此者非一致令後人拘於六經妄分寒熱有乖聖道夫善治病者須要詳辨太陽傳經之邪各經直中之邪曾無汗吐下之證火逆水噴之證結胸發黃血諦痞利厥逆之證如中風傷寒雜病之候一切之疾不拘六經但分表裡蓋六經俱有表裡二證但有表證即當汗之但有里證即宜下之或表裡二證俱見則宜以攻裡之藥發汗分表裡病證多少用之病在半里半表者和解之此傳經之治也雜病寒證在表者辛溫汗之寒中里者大熱之劑救之亦不過明其表裡而已豈有他哉大凡初服藥時無是證服藥後而生新證者故經曰若吐若汗若下後之證是也即壞病也當救何逆而治之若初服藥有是證服藥後只是原證如故不見新有證候者只是病未退仲景所謂服湯一劑盡病證猶在者更須服之汗下同法清碧杜先生曰陽熱病難療陰寒病易治蓋熱者傳經變態不一陰寒不傳治之亦一定法耳仁安嚴先生云凡醫他人治過傷寒須究前證曾服何藥倘證交雜先以重者為主次論輕者假如傳經之邪治有三法在皮膚者汗之在表裡兩間者和解之在裡者下之此自外入內之治也至若虛體之人交接陰陽飲食不節則裡虛中邪又非在表可汗之法必用大熱之劑溫散經曰陰中於邪必內栗也表氣微虛里氣失守故使邪中於陰也方其裡氣不守而為邪中正氣怯弱故成栗也故經言寒則傷榮榮者血也血寒則凝而不行致四肢血氣不接而厥身體冷而惡風寒附子乾薑適得其當若寒退而熱毒內攻目中不了了下利清水腹滿又有急下之法此論少陰經之治法也若寒退而手足厥其厥乍熱乍凜腹中痛而小便不利又有四逆散之治法所謂少陰傳變與太陽相同者此也大抵治傷寒必須審證施治有脈與證相合者則易於識別若脈證不相符卻宜審的急緩治之但憑證亦不可但憑脈亦不可務要脈證兩得方為盡善上工治尤甚者為急故雖有但憑證而不憑脈者有但憑脈而不憑證者如經曰脈浮大心下硬有熱屬臟者攻之不令發汗此又非表邪可汗之脈法也如促脈為陽盛若下利喘而汗出用葛根黃芩黃連湯若厥冷脈促為虛脫非灸非溫不可此又非陽盛之脈法也如陽明脈遲不惡寒身體濈濈汗出則用大承氣此又非諸遲為寒之脈法也少陰病始得之反發熱脈沉宜麻黃細辛附子湯微汗之此又非脈沉在裡之脈法也但不惡寒三字為主經雖云桂枝下咽陽盛則斃此定法也如譫語而惡寒必用桂枝先解之已而下之但以有表無里為辨耳此仲景但憑證不憑脈之治法也如經所謂結胸證宜下之其脈浮者不可下此又非發熱七八日雖脈浮數者可下之證也譫語發潮熱脈滑而疾者小承氣因與一升明日不大便脈反微澀者不可更與承氣也此又非湯入腹中轉失氣者乃可攻之之證也發熱惡寒脈微弱尺中遲者俱不可汗此又非在表宜汗之證也此仲景憑脈不憑證之治法也蓋以脈而知病之淺深其證之必然者也圓機之士臨病消息脈證既決又何難焉醫之玄微其在斯乎凡經云某陽某陰病者卻要辨認疑似之間商確得病證明白然後用藥庶免差誤經曰病有發熱而惡寒者發於陽也無熱而惡寒者發於陰也謂如傷寒或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者謂繼之以發熱此則發於陽也其初未發熱與無熱而惡寒發於陰者相似有不同者頭痛項強陰證無頭痛故也若惡寒而蜷脈沉而緊者此發於陰也在陽者可發汗在陰者宜溫里如少陰脈沉始得之反發熱似乎太陽乃有不同者其熱不翕翕然證無頭疼少陰腹痛下利與太陰相似有不同者太陰不渴少陰則渴手足有溫厥之殊溫病與痙病皆與太陽相似有不同者痙脈沉細溫病不惡風寒而渴傷寒與中暍相似其不同者傷風不渴中暍即渴傷寒與冬溫相似其不同者傷寒脈浮緊冬溫脈不浮時行傳染傷寒相似其不同者時行傳染脈不浮傷寒則脈浮太陽中濕與太陽傷寒相似有不同者濕脈沉而細也答曰脈雖相似而痙則不同痙則身不疼而濕則身疼也暑脈虛細又曰微弱又曰弦細芤遲諸如此者與痙脈濕脈頗相似雖然脈似而證不同暑則自汗而渴濕則不渴身疼痙則身不疼也太陽中風見寒脈用大青龍其證與太陽傷寒相似有不同者中風見寒脈有煩躁也麻黃證則無煩躁太陽傷寒見風脈用大青龍其證與中寒濕相似有不同者其脈浮緩寒濕則脈沉細微經云無少陰里證者蓋太陽與少陰為表裡今脈證俱屬太陽表經故云無少陰里證也小青龍證與小柴胡證相似有不同者小青龍無往來寒熱胸脅滿硬痛之證但有乾嘔發熱而咳此則為表不解水停心下也雖有或為之證與小柴胡相似終無半表半裡之證為異耳察色要略凡看傷寒必先察其色內經曰聲合五音色合五行聲色符同然後可以知五臟之病也然肝色青其聲呼肺色白其聲哭心色赤其聲笑脾色黃其聲歌腎色黑其聲呻也且夫四時之色相生則吉相剋則凶有如青赤見於春赤黃見於夏黃白見於長夏白黑見於秋黑青見於冬此乃相生之色也若肝病之色青而白心病之色赤而黑脾病之色黃而青肺病之色白而赤腎病之色黑而黃此皆五行之相剋為難治矣且以五臟之熱色見於面者肝熱則左頰先赤肺熱則右頰先赤心熱則顏先赤脾熱則鼻先赤腎熱則頤先赤也至於面黑者為陰寒面青為風寒青而黑主風主寒主痛黃而白為濕為熱為氣不調青而白為風為氣滯為寒為痛也大抵黑氣見於面多凶為病最重若黑氣暗中明準頭年壽亮而滋潤者生黑而枯夭者死也此乃略舉其要內經以五色微診可以目察難經曰望而知之謂之神故色不可不察也凡看傷寒必先察色然後切脈審證參合以決生死吉凶夫色有青黃赤白黑見於面部皮膚之上氣有如亂絲亂髮之狀隱於皮里也蓋五臟有五色六經有六色皆見於面以應五行相生者吉相剋者凶滋榮者生枯夭者死自準頭年壽命宮法令人中皆有氣色其滋潤而明亮者吉暗而枯燥者凶也又當分四時生克之理而通察之茲略具五色傷寒之要者列於下以便覽焉青色屬木主風主寒主痛乃足厥陰肝經之色也凡面青唇青者陰極也若舌卷囊縮者宜急溫之如夾陰傷寒小腹痛則面青也內經曰青如翠羽者生青如草茲者死青而黑青而紅相生者生如青白而枯燥相剋者乃死也脾病見青氣多難治赤色屬火主熱乃手少陰心經之色在傷寒見之而有三陽一陰之分也如足太陽屬水寒則本黑熱則紅也經曰面色緣緣正赤者陽氣怫鬱在表汗不徹故也當發其汗若脈浮數表熱不汗出者面色紅赤而光彩也經言陽明病面合赤色者不可攻之合者通也謂表邪未解不可攻裡也若陽明內實惡熱不惡寒或蒸蒸發熱或日晡潮熱大便祕結譫語面赤者此實熱在裡可攻之也如表裡俱熱口燥舌乾飲水脈洪面赤里未實者且未可下宜人參白虎湯和之也如少陽經病熱在半表半裡面紅脈弦者宜小柴胡湯和之不可下也經言少陰病下利清穀裡寒外熱面赤者四逆湯加蔥白主之此陰寒內極逼其浮火上行於面故發赤色非熱也若不察仔細誤投寒涼之劑即死可不謹哉又夾陰傷寒虛陽泛上者亦面赤也但足冷脈沉者是又煩躁面赤足冷脈沉不能飲水者此陰極也宜溫之若久病虛人午後面兩頰顴赤者此陰火也不可作傷寒治之然三陽之氣皆會於頭額其從額上至巔頂絡腦後者太陽也從額至鼻下於面者陽明也從頭角下耳中出耳之前後者少陽也但有紅氣或赤腫者以分之蓋大頭傷寒證正要知此部分可也內經曰心熱則顏先赤脾熱則鼻先赤肝熱則左頰先赤肺熱則右頰先赤腎熱則頤先赤若赤而青赤而黃為相生則吉如赤而黑為相剋則凶經言赤如雞冠者生如衃血者死蓋準頭印堂有赤氣枯夭者死明潤者生也如肺病見赤氣者則難治黃色屬土主濕乃足太陰脾經之色黃如橘子明者熱也黃如熏黃而暗者濕也凡黃而白黃而紅相生則吉若黃而青相剋者則凶也內陽曰黃如蟹膏者生黃如枳實者死若準頭年壽印堂有黃氣明潤者病退而有喜兆也若枯燥而夭者死凡病欲愈目眥黃也長夏見黃白則吉若黃青則凶也白色屬肺金主氣血不足也乃手太陰肺經之色肝病見之難治內經曰白如豕膏者生白如枯骨者死凡印堂年壽白而枯夭者凶白而光潤者吉若白而黑白而黃相生吉也若白而赤相剋則凶矣凡傷寒面白無神者發汗過多或脫血所致也黑色屬水主寒主痛乃足少陰腎經之色也凡黑而白黑而青相生則吉若黑而黃相剋則凶內經曰黑如烏羽者生黑如炱者死若準頭年壽印堂黑氣枯夭者死黑中明潤者生也黑氣自魚尾相牽入太陰者死黑氣自法令人中入口者死耳目口鼻黑氣枯夭者死凡面準頭命宮明潤者生枯暗者死若心病見黑氣在頭者死也華他曰凡病人面色相等者吉不相等者凶如面青目白麵赤目青面黃目青面赤目白麵白目黑麵黑目白麵白目青皆為不相等故曰凶也相等者面目俱青俱紅之類也察目凡目睛明能識見者可治睛昏不識人或反目上視或瞪目直視或目睛正圓或戴眼反折或眼胞陷下者皆不治也凡開目而欲見人者陽證也閉目而不欲見人者陰證也凡目中不了了睛不和熱甚於內也凡目疼痛者屬陽明之熱目赤亦熱甚也目瞑者必將衄血也白睛黃者將發身黃也凡病欲愈目眥黃鼻準明山根亮也察鼻鼻頭色青者腹中痛苦冷者死微黑者水氣黃色者小便難白色者為氣虛赤色者為肺熱鮮明者有留飲也鼻孔乾燥者屬陽明之熱必將衄血也鼻孔乾燥黑如煙煤陽毒熱深也鼻孔冷滑而黑者陰毒冷極也鼻息鼾睡者風溫也鼻塞濁涕者風熱也鼻孔扇張者為肺風肺絶而不治也察口唇凡口唇焦乾為脾熱焦而紅者吉焦而黑者凶唇口俱赤腫者熱甚也唇口俱青黑者冷極也口苦者膽熱也口中甜者脾熱也口燥咽乾者腎熱也舌乾口燥而欲飲水者陽明之熱也口噤難言者痙風也凡唇上有瘡為狐蟲食其藏下唇有瘡為惑蟲食其肛也若唇青舌卷唇吻反青環口黧黑口張氣直口如魚口口唇顫搖不止氣出不返皆不治也察耳凡耳輪紅潤者生黃或白或黑或青而枯燥者死薄而白薄而黑皆為腎敗凡耳聾耳中疼皆屬少陽之熱尚為可治若耳聾舌卷唇青此屬厥陰為難治也察舌凡舌鮮紅者吉青為冷青而紫者為陰為寒也赤而紫者為陽為熱也黑者亢極為難治凡舌上苔白而滑者表有寒也又曰丹田有熱而胸中有寒也苔黃而燥渴者熱盛也苔黑而燥渴者熱甚而亢極也若不燥渴舌上黑苔而滑者為寒為陰也舌卷而焦黑而燥者陽毒熱極也舌青而苔滑者陰毒冷極也凡舌腫脹舌上燥裂舌生芒刺皆熱甚也凡舌硬舌強舌短縮神氣昏亂語言不清者死也又陰陽易病吐舌數寸者死也舌乃心之竅屬火而色紅者吉惟黑者乃水剋火故難治也察身凡病人身輕自能轉側者易治若身體沉重不能轉側者難治蓋陰證則身重必足冷而蜷臥惡寒常好向壁臥閉目不欲嚮明懶見人也又陰毒身如被杖之疼身重如山而不能轉側也又中濕風濕皆主身重疼痛不可轉側要當辨之大抵陽證身輕而手足和暖開目而欲見人者可治若頭重視身此天柱骨倒而元氣敗也凡傷寒傳變循衣摸床兩手撮空此神去而魂亂也總之病人皮膚潤澤者生而枯燥者死經曰脈浮而洪身汗如油喘而不休形體不仁乍靜乍亂此為命絶也
