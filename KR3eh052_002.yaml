body:
  text: 卷二太陽病發熱惡寒惡風頭痛項強身體痛黃經曰太陽之為病頭項強痛而惡風寒不傳經者固有之然而傳者多矣如經言傷寒一日太陽受之脈若靜者為不傳頗欲吐及煩躁脈數急者為傳也又曰傷寒二三日陽明少陽證不見者為不傳也太陽經治法有汗吐下溫和解調並刺俱有之蓋太陽所感非一傳變多端故也雖發汗解肌一法證有輕重脈有浮沉用藥必宜隨脈證用之庶造仲景之深意如發熱惡寒脈浮緊麻黃湯自汗惡風脈浮緩桂枝湯此脈證相應之定法也又如項背強八八反汗出惡風桂枝加葛根脈微而惡寒桂枝麻黃各半湯發熱惡寒熱多寒少脈微弱者桂枝二越婢一湯脈浮緊自汗出小便數心煩微惡寒腳攣急桂枝加附子湯又如汗後復宜汗者發汗遂漏不止惡風小便難四肢微急難以屈伸桂枝加附子湯服桂枝大汗出脈洪大者與桂枝如前法若如瘧狀日再發宜桂枝二麻黃一湯仲景汗劑二十七湯所治五十九證大宜精別如何而用青龍湯如何而用五苓散如何而用茯苓甘草湯之類蓋病有輕重治有急緩故也清碧杜先生曰傷寒陽熱之證傳經之邪變態不一辨之不精則汗吐下三法之治一差死生反掌矣非比陰寒之邪中在一經不復傳變易於治也不過隨寒邪輕重用溫藥治之一定之法耳今之庸工好用熱劑而不知涼藥之妙且難也汗桂枝湯桂枝加葛根湯桂枝加厚朴杏子湯桂枝加附子湯桂枝去芍藥湯桂枝去芍藥加附子湯桂枝麻黃各半湯桂枝二越婢一湯桂枝二麻黃一湯桂枝去桂加茯苓白朮湯葛根湯葛根加半夏湯葛根黃連黃芩湯麻黃湯大青龍湯小青龍湯桂枝加芍藥人參新加湯麻黃杏仁甘草石膏湯五苓散桂枝去芍藥加蜀漆龍骨牡蠣救逆湯桂枝加桂湯桂枝甘草龍骨牡蠣湯桂枝附子湯茯苓甘草湯文蛤散去桂加白朮湯甘草附子湯吐梔子豉湯梔子甘草豉湯梔子生薑豉湯梔子厚朴湯梔子乾薑湯瓜蒂散下調胃承氣湯大柴胡湯承氣湯柴胡加芒硝湯桃仁承氣湯抵當丸大陷胸湯抵當湯大陷胸丸白散十棗湯大黃黃連瀉心湯附子瀉心湯溫甘草乾薑湯芍藥甘草湯四逆湯乾薑附子湯茯苓桂枝甘草大棗湯厚朴生薑甘草半夏人參湯茯苓桂枝白朮甘草湯芍藥甘草附子湯茯苓四逆湯桂枝甘草湯真武湯小建中湯炙甘草湯和解小柴胡湯柴胡加龍骨牡蠣湯小陷胸湯柴胡桂枝幹薑湯半夏瀉心湯生薑瀉心湯甘草瀉心湯柴胡桂枝湯桂枝人參湯白虎湯白虎加人參湯黃芩湯黃芩加半夏生薑湯調赤石脂禹餘糧湯旋覆代赭石湯黃連湯刺縱橫刺期門服桂枝刺風池風府太少並病刺期門熱入血室刺期門太少並病刺大椎肺俞太陽之為病脈浮頭項強痛而惡寒成經曰尺寸俱浮者太陽受病太陽主表為諸陽主氣脈浮頭項強痛而惡寒者太陽表病也但有一毫頭痛即為在表太陽病發熱汗出惡風脈緩者名為中風太陽病上條所揭云云者是也後皆仿此成風陽也寒陰也風則傷衛發熱汗出惡風者衛中風也榮病則發熱無汗不惡風而惡寒衛病則發熱汗出不惡寒而惡風以衛為陽衛外者也病則不能衛固其外而皮腠疏故汗出而惡風也傷寒脈緊傷風脈緩者寒性徑急而風性解緩故也太陽病頭痛發熱汗出惡風者桂枝湯主之太陽病發熱汗出者此為榮弱衛強故使汗出欲救邪風者宜桂枝湯成太陽中風風並於衛則衛實而榮虛榮者陰也衛者陽也發熱汗出陰弱陽強也內經曰陰虛者陽必湊之故少氣時熱而汗出與桂枝湯解散風邪調和榮衛太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出瑟瑟惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之成陽以候衛陰以候榮陽脈浮者衛中風也陰脈弱者榮氣弱也風並於衛則衛實而榮虛故發熱汗自出也經曰太陽病發熱汗出者此為榮弱衛強者是也瑟瑟者不足也惡寒之貌也淅淅者瀟淅也惡風之貌也衛虛則惡風榮虛則惡寒榮弱衛強惡寒復惡風者以自汗出則皮膚緩腠理疏是亦惡風也翕翕者熇熇然而熱也若合羽所覆言熱在表也鼻鳴乾嘔者風擁而氣逆也與桂枝湯和榮衛而散風邪也病人臟無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯主之時發熱自汗出謂有時而發熱自汗出有時而止惟其時作時止故病留連而不愈也當其發熱自汗之時不可與藥當先其時作候其時止而後與之故曰先其時也素問曰當其盛而必毀因其衰也事必大昌其是之謂歟桂枝湯方桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水淋漓病必不除若一服汗出病瘥停後服不必盡劑若不汗更服依前法又不汗後服小促其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物小促宋板作少從容成經云桂枝本為解肌若脈浮緊發熱汗不出者不可與之常須識此勿令誤也蓋桂枝湯本專主太陽中風必也皮膚疏湊又自汗風邪干於衛氣者乃可投之也仲景以解肌為輕以發汗為重故發汗吐下後身疼不休者津液內耗也雖有表邪而止可解肌故須桂枝湯少和之也桂味辛熱用之為君桂猶圭也宣導諸藥為之先聘是謂辛甘發散為陽之意蓋發散風邪必以辛為主內經所謂風淫所勝平以辛佐以苦以甘緩之以酸收之是以芍藥為臣而甘草為佐也內經曰風淫於內以甘緩之以辛散之生薑味辛溫大棗味甘溫是用以為使而此又不特專於發散以脾主為胃行其津液薑棗之用專行脾之津液而和榮衛者也麻黃湯不用薑棗者謂專於發汗不待行化而津液得通矣龐凡桂枝湯病證者常自汗出小便不數手足溫和或手足指稍露之則微冷覆之則溫渾身熱微煩而又憎寒始可行之若病者無汗小便數或手足逆身冷不惡寒反惡熱或飲酒後慎不可行桂枝湯也脈緊必無汗設有汗不可誤作桂枝證許有人病發熱惡寒自汗脈微弱而浮三服湯而愈此方在仲景一百十三方內獨冠其首今人全不用何也仲景云太陽中風陽浮而陽弱陽浮者云云至翕翕發熱宜桂枝湯此脈與證仲景說得甚明後人看不透所以不敢用也假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也尺脈弱名曰陰不足陽氣下陷入陰中則發汗也此謂元氣受病而然也又曰陽微則惡寒陰微則發熱醫既汗之使陽氣微又大下之令陰氣弱此謂醫所使也大抵陰不足陽往從之故內陷而發熱陽不足陰往乘之故陰上入陽中則惡寒舉此二端明白易曉何憚而不用桂枝湯哉垣仲景治表虛制此湯桂枝味辛熱發散助陽體輕本乎天者親上故桂枝為君芍藥甘草佐之如陽脈澀陰脈弦法當腹中急痛乃制小建中湯以芍藥為君桂枝甘草佐之一則治其表虛一則治其裡虛故各有主用也後學當觸類而長之以桂枝易肉桂治寒腹痛神品藥也如夏中熱腹疼少加黃芩去桂痛立止桂於春夏二時為禁藥陶桂枝麻黃湯為當時傷寒設與過時之溫暑者何預焉若以此二湯通治春溫夏暍之病則誤之甚矣太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒成經曰凡傷於寒則為病熱為寒氣客於經中陽經怫結而成熱也中風即發熱者風為陽也及傷寒云或已發熱或未發熱以寒為陰邪不能即熱鬱而方變熱也風則傷衛寒則傷榮衛虛者惡風榮虛者惡寒榮傷寒者必惡寒也氣病者則麻血病者則痛風令氣緩寒令氣逆體痛嘔逆者榮中寒也經曰脈盛身寒得之傷寒脈陰陽俱緊者知其傷寒也但見惡寒即為在表此是要訣太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之成寒則傷榮頭痛身疼腰痛以至牽連骨節疼痛者太陽經榮血不利也內經曰風寒客於人使人毫毛畢直皮膚閉而為熱者寒在表也風並於衛衛氣而榮虛者自汗出而惡風寒也寒並於榮榮實而衛虛者無汗而惡風也以榮強衛弱故氣逆而喘與麻黃湯以發其汗麻黃湯方麻黃三兩去節桂枝二兩去皮甘草一兩炙杏仁七十個泡去皮尖上四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微汗不須啜粥余如桂枝法凡用麻黃去節先滾醋湯略浸片時撈起以備後用庶免大發如冬月嚴寒腠理致密當生用一用麻黃後汗出不止者將病人發披水盆中足露出外用炒糯米一升龍骨牡蠣藁本防風各一兩研為細末周身撲之隨後祕方用藥免至亡陽而死此良法也吳或云發汗必用麻黃亦有禁用者何也凡傷寒發於天令寒冷之時且其寒邪在表閉其腠理身疼拘急惡寒而無汗者須用麻黃辛苦之藥為能開發腠理逐寒邪汗出而解也惟夏月炎暑之時為禁用之藥故宜辛涼之劑以發之乃葛根蔥白豆豉之類是也若麻黃加涼劑在內亦可用如通解散是也成本草言輕可去實即麻黃葛根之屬實謂寒邪在表汗不出而腠密邪氣勝而表實輕劑所以揚之麻黃味甘苦用以為君者以麻黃為輕劑而專主發散也風邪在表而膚理疏者必以桂枝解其肌今寒邪在經表實而腠密非桂枝所能獨散必專麻黃以發汗而桂枝所以為臣也內經曰寒淫於內治以甘熱佐以辛苦者茲是類歟內經曰肝苦急急食甘以緩之肝者榮之主也傷寒榮勝衛固血脈不流必用味甘之物以緩之故以甘草味甘平杏仁味苦溫為之佐使且桂枝湯主中風風則傷衛風邪並於衛則衛實而榮弱仲景所謂汗出惡風者此為榮弱衛強故桂枝湯佐以芍藥用和榮也麻黃湯主傷寒寒則傷榮邪並於榮則榮實而衛虛內經所謂氣之所併為血虛血之所併為氣虛者是也故麻黃湯佐以杏仁用利氣也太陽中風脈浮緊發熱惡寒身疼痛汗不出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也成此中風見寒脈也浮則為風風則傷衛緊則為寒寒則傷榮榮衛俱病故發熱惡寒身疼痛也風並於衛者為榮弱衛強寒並於榮者為榮強衛弱今風寒兩傷則榮衛俱實故不汗出而煩躁也與大青龍湯發汗以除榮衛風寒若脈微弱汗出惡風者為榮衛俱虛反服青龍湯則必亡陽故生厥逆筋惕肉瞤此治之逆也傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之成此傷寒見風脈也傷寒者身疼此以風勝故身不疼中風者身重此以兼風故乍有輕時不發厥吐利無少陰里證者為風寒外甚也與大青龍湯以發散表中風寒大青龍湯方麻黃六兩去節桂枝二兩去皮甘草二兩炙杏仁四十枚去皮尖生薑三兩切大棗十二枚擘石膏雞子大碎上七味以水九升先煮麻黃減一升去上沫納諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗者停後服若復服汗多亡陽遂一作逆虛惡風煩躁不得眠也成青龍東方甲乙木神也應春而主肝專發生之令為敷榮之主萬物出甲開則有兩岐肝有兩葉以應之謂之青龍者以發散榮衛兩傷之邪是應肝木之體耳桂枝湯主中風麻黃湯主傷寒中風脈浮緊為中風見寒脈傷寒脈浮緩為傷寒見風脈是風寒兩傷也風兼寒寒兼風雖欲與桂枝湯解肌以祛風而不能已其寒或欲以麻黃湯發汗以散寒而不能去其風茲仲景所以特處青龍湯而兩解也麻黃味甘溫桂枝味辛熱寒則傷榮必以甘緩之風則傷衛必以辛散之此風寒兩傷榮衛俱病故以甘辛相合而為發散之劑表虛膚腠疏則以桂枝為主此為表實腠理密者則以麻黃為主是先麻黃為君後桂枝為臣也甘草味甘平杏仁味甘苦苦甘為助佐麻黃以發表大棗甘溫生薑味辛溫辛甘相合佐桂枝以解肌風陽邪寒陰邪風則傷陽寒則傷陰榮衛陰陽為風寒兩傷則非輕劑可獨除散也必須輕重之劑以同散之乃得陰陽之邪俱已榮衛之氣俱和是以石膏味苦辛微寒質重而又專達肌表為使也大青龍發汗之重劑用之稍過則有亡陽之失經曰若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也又曰一服汗者停後服若再服汗多亡陽遂致惡風煩躁不得眠也用者宜詳審之吳大青龍湯仲景治傷寒發熱惡寒煩躁者則用之夫傷寒邪氣在表不得汗出其人煩躁不安身心無如之奈何如脈浮緊或浮數者急用此湯發汗則愈乃仲景之妙法也譬若亢熱已極一雨而涼其理可見也若不曉此理見其躁熱投以寒涼之藥其害豈勝言哉若脈不浮緊而數無惡風惡寒身疼者亦不可用之也如誤用之其害亦復不淺所以脈證不明者多不敢用也許仲景治傷寒一則桂枝二則麻黃三則青龍桂枝治中風麻黃治傷寒青龍治中風見寒脈傷寒見風脈三者如鼎立人皆能言之而不曉前人處方用藥之意故醫遂多不用無足怪也且脈緩而浮則中風也故嗇嗇惡風淅淅惡寒翕翕發熱仲景以桂枝對之脈浮緊而澀者傷寒也故頭痛發熱身疼腰痛骨節疼痛惡寒無汗而喘仲景以麻黃對之至於中風脈浮緊傷寒脈浮緩仲景皆以青龍對之何也豫嘗深究三旨若證候與脈相對無不應手而愈何以言之風傷衛衛氣也寒傷榮榮血也榮行脈中衛行脈外風傷衛則風邪干陽陽氣不固發越而為汗是以自汗是表虛故仲景用桂枝以發其邪芍藥以和其血蓋中風則病在脈之外其病稍輕雖同曰發汗特解肌之藥耳故仲景於桂枝證云令半身漐漐微似有汗不可如水淋漓病必不除是知中風不可大發汗汗過則反動榮血邪氣乘虛襲之故病不除也寒傷榮則寒邪入陰血而榮行脈中者也寒邪居脈中非特榮受病邪自內作則並於衛氣犯之久則浸淫及骨是以汗不出而熱齒乾而煩冤仲景以麻黃髮其汗又以桂枝甘草助其發散欲滌除內外之邪榮衛之病耳大抵二藥皆發汗以桂枝則發其衛之邪麻黃並榮與衛治之亦自有淺深也何以驗之仲景桂枝第十九證云病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣諧和故爾以榮行脈中衛行脈外復發其汗榮衛和則愈宜桂枝湯又四十七證云發熱汗出此為榮弱衛強故使汗出欲救邪風者宜桂枝湯是知中風汗出者榮和而衛不和又第一卷云寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼當發其汗是知傷寒浮緊者榮衛俱病也麻黃湯中並用桂枝此仲景之意也至於青龍雖治傷風見寒脈傷寒見風脈之病然仲景又云汗出惡風者不可服之服之厥逆便有筋惕肉瞤之證故青龍一證尤難用藥須是形證諦當然後可行故王實夫證止用桂枝麻黃各半湯治之蓋慎之也陶熱盛而煩手足自溫脈浮而緊此傷風見寒脈也不煩少熱四肢微厥脈浮而緩此傷寒見風脈也二者為榮衛俱病法宜大青龍湯但此湯險峻須風寒俱甚又加煩躁乃可與之否則不如桂枝麻黃各半湯為穩尤不若九味羌活湯加石膏知母枳殼也溫粉方白朮藁本川芎白芷各等分上研為細末每末一兩入米粉三兩和勻撲周身止汗若汗過多恐亡陽遂厥逆惡風煩躁不得眠故宜以此粉止之太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之按詩幽風狼跋云赤寫𠘧𠘧注云𠘧𠘧絢貌絢謂拘著舄屨頭為行戒狀如刀衣鼻在屨頭言拘者取自拘持使低目不妄顧視按此所以想見項強拘強之狀若作鳥羽釋則𠘧當音殊而於拘強之義反不切矣後證葛根湯者乃桂枝湯中加麻黃葛根也其證無汗故以麻黃髮之此證有汗故去麻黃而曰桂枝加葛根湯也若有麻黃則亦葛根湯矣成氏不當設疑於注以眩後學故辨之桂枝葛根湯方葛根四兩芍藥二兩甘草二兩生薑三兩切桂枝二兩去皮大棗十二枚擘上七味以水一斗煮取三升去滓溫服一升太陽病項背強𠘧𠘧無汗惡風葛根湯主之葛根湯方葛根四兩麻黃三兩去節桂二兩去皮芍藥二兩切甘草二兩炙生薑三兩切大棗十二枚擘上七味㕮咀以水一斗先煮麻黃葛根減二升去沫納諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌本草云輕可去實麻黃葛根之屬是也此以中風表實故加二物於桂枝湯中也太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自調一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯成傷寒八九日則邪傳再經又遍三陽欲傳二陰之時也傳經次第則三日傳遍三陽至四日陽去入陰不入陰者為欲解其傳陰經第六日傳遍三陰為傳經盡而當解其不解傳為再經者至九日又遍三陽陽不傳陰則解如瘧發作有時也寒多者為病進熱多者為病退經曰厥少熱多其病為愈寒多熱少為病退故為進也今雖發熱惡寒而熱多寒少為陽氣進而邪氣少也里不和者嘔而利今不嘔清便自調者里和也寒熱間日發者邪氣深也日一發者邪氣復宋本作有常也日再發者邪氣淺也日二三發者邪氣微也內經曰大則邪至小則平言邪甚則脈大邪少則脈微今日數多而脈微緩者是邪氣微緩也故云欲愈脈緩而惡寒者表裡俱虛也陽表也陰里也脈微為裡虛惡寒為表虛以表裡俱虛故不可更發汗更下更吐也陰陽俱虛則面色青白反有熱色者表未解也熱色為赤色也得小汗則和不得汗則邪氣外散皮膚亦為癢也與桂枝麻黃各半湯小發其汗以除表邪首一節至寒少止為自初至今之證下文皆擬病防變之辭當分作三截看至欲愈也是不須治至吐也是宜溫之至末是小汗之麻黃髮桂枝止一發一止則汗不得大出矣桂枝麻黃各半湯方桂枝一兩十六銖去皮芍藥生薑切甘草炙麻黃去節各一兩大棗四枚擘杏仁二十四枚湯浸去皮尖及雙仁者上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取一升八合去滓溫服六合太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯前脈微緩面有熱色身癢以桂麻各半小汗之者猶未弱也此微而加弱焉則又虛於前證矣雖小汗亦不宜故云不可發汗決詞也然病在太陽表證未罷桂枝發散之藥終不可無但不令汗而已桂枝二越婢一湯方桂枝去皮芍藥甘草各七錢半生薑一兩二銖切大棗四枚擘麻黃去節七錢半石膏一兩碎綿裹上七味㕮咀以水五升先煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升本方當裁為越婢湯桂枝湯合飲一升今合為一方桂枝二越婢一胃為十二經之主脾治水穀為卑臟若婢內經曰脾主為胃行其津液是湯所以謂之越婢者以發越婢氣通行津液外臺方一名越脾湯即此義凡仲景稱太陽病者皆表證發熱惡寒頭項強痛也若脈浮大則與證相應宜發汗今見表證而脈反微不與證應故不可發汗但用一二各半湯等和之可也若太陽中暍發熱惡寒脈微弱手足逆冷而渴者白虎加人參湯方論見暑病太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀血在裡故也抵當湯主之方論見蓄血太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也亦抵當湯主之詳蓄血凡仲景稱太陽證脈沉者皆謂發熱惡寒頭項強痛而脈反沉也其證兼發狂小腹硬者為蓄血此條抵當湯是也兼關節痛小便不利身黃者為濕痹論見濕兼卒口噤反張者為痙若無汗惡寒名剛痙宜葛根湯若有汗不惡寒名柔痙宜栝蔞桂枝湯詳雜病痙門病發熱頭痛脈反沉若不癢身體疼痛當救其里宜四逆湯少陰病始得之反發熱脈沉者麻黃附子細辛湯主之趙竊詳太陽病發熱頭痛法當脈浮今反沉少陰脈沉法當無熱今反熱仲景於此兩證各言反者謂反常也蓋太陽病脈似少陰少陰脈病似太陽所以皆謂之反而治之當異也今究其旨均是脈沉發熱以其有頭痛故為太陽病陽證當脈浮今反不能浮者以裡虛久寒正氣衰微所致又身體疼痛故宜救里使正氣內復逼邪出外而乾薑生附子亦能出汗而解假使里不虛寒則脈當見浮而正屬太陽麻黃證也均是脈沉發熱以其無頭痛故名少陰病陰病當無熱今反熱則寒邪在表未傳於裡但以皮腠鬱閉為熱而在裡無熱故用麻黃細辛以發表間之熱附子以溫少陰之經假使寒邪入里則外必無熱當見吐利厥逆等證而正屬少陰四逆湯也由此觀之表邪浮淺發熱之反猶輕正氣衰微脈沉之反為重此四逆湯不為不重於麻黃附子細辛湯也又可見熟附配麻黃髮中有補生附配乾薑補中有發仲景之旨微矣麻黃附子細辛湯方麻黃二兩去節細辛二兩附子一枚泡去皮破八片上三味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升日再服成內經曰寒淫於內治以甘熱佐以苦辛以辛潤之麻黃之甘以解少陰之寒細辛附子之辛以溫少陰之經趙詳仲景發汗湯劑各分輕重不同如麻黃桂枝湯青龍各半越婢等湯各有差等至於少陰發汗二湯雖同用麻黃附子亦有加減輕重之別故以加細辛為重加甘草為輕辛散甘緩之義也其第一證以少陰本無熱今發汗故云反也蓋發熱為邪在表而當汗又兼脈沉屬陰而當溫故以附子溫經麻黃散寒而熱須汗解故加細辛是汗劑之重者第二證既無裡寒之可溫又無裡熱之可下求其所以用麻黃附子之義則是脈亦沉方可名曰少陰病身亦發熱方行發汗藥又得之二三日病尚淺比之前證亦稍輕故不重言脈證而但曰微發汗所以去細辛加甘草是汗劑之輕者凡仲景稱太陽病不惡寒者皆謂發熱頭項強痛脈浮而反不惡寒也其證兼渴者為溫病兼汗出者為柔痙方論見溫病柔痙傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡加桂枝湯主之成傷寒六七日邪當傳裡之時也支散也嘔而心下結者里證也法當攻裡發熱微惡寒支節煩疼為外證未去不可攻裡與柴胡桂枝湯以和解之按支字訓散字未瑩支節支結復不同支節猶云枝節古字通也支結猶云支撐而結當活看不可拘泥文字若調作散則不能結也南陽云外證未解心下妨悶者非痞也謂之支結柴胡加桂枝湯方桂枝去皮黃芩人參各一兩半甘草炙一兩芍藥生薑切各一兩半大棗六枚擘柴胡四兩半夏二合半上九味以水七升煮取三升去滓溫服凡仲景稱表不解者者謂太陽病發熱惡寒頭項強痛脈浮也蓋病雖屬太陽表證而有里證兼之者則不言太陽病但稱表不解也其兼心下支結者此條柴胡桂枝湯是也兼心下有水氣乾嘔而咳者小青龍也方論見咳兼脅痛手足溫而渴者小柴胡也兼心下痞者先用桂枝解表後以瀉心攻痞也方論見痞兼下利腹滿脹者先以四逆溫里後以桂枝攻表也方論見下利太陽病欲解時從已至未解太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出而解陰脈微者下之而解若欲下之調胃承氣湯主之太陽病脈浮緊發熱身無汗自衄者愈太陽外證未解不可下之下之為逆欲解外者宜桂枝湯主之經云本發汗而欲下之為逆也若先發汗治不為逆海大小調胃三承氣湯必須脈浮頭痛惡風惡寒表證盡罷而反發熱惡熱譫語不大便方可用之若脈浮緊下之必結胸若脈浮緩下之必痞氣許常記一親戚病傷寒身熱頭痛無汗大便不通已四五日豫訊問之醫者治大黃朴硝等欲下之豫曰子姑少待豫為視之脈浮緩居密室中自稱甚惡風豫曰表證如此惟大便不通數日腹且不脹別無所苦何遽便下之大抵仲景法須表證盡罷方可下不爾則邪乘虛而入不為結胸則為熱利也豫作麻黃桂枝各半湯繼以小柴胡漐漐汗出大便亦通而解仲景云凡傷寒之病多從風寒得之始則表中風寒入里則不消矣擬欲攻之先當解表乃可下之若表已解而內不消大滿大堅實有燥糞者自可除下之雖四五日不能為禍也若不宜下而便攻之內虛熱入為挾熱自利煩躁之變不可勝數輕者困篤重者必死矣原本正文重疊豫刪正此段其理甚明大抵風寒入里不消必有燥糞或大便堅祕須是脈不浮不惡風表證罷乃可下之大便雖四五日不通亦無害若不顧表而下遂為挾熱利也上桂枝麻黃為長沙入手第一方而粗工以之殺人者往往而是故易水師弟以他藥代之不知者謂長沙有遺巧余謂此正易水師弟不及長沙處而婆心切矣中醫守之可以萬全今具托為後賢表證治例及補養兼發散二條於後臨病之工宜詳玩焉發熱發熱者無休止時也寒熱者寒已而熱熱已而寒相繼而發也潮熱者有時熱有時止如潮汛之不失其期也若發熱不惡寒而渴為溫病發汗已身體灼熱者為風溫若發熱手或微厥下利清穀此為陰證也夫下血氣不通四肢逆冷卻發熱此熱深厥亦深也頭痛發熱惡寒身不疼痛此傷食證也不惡寒身不痛知非傷寒頭不疼脈不緊知非裡實但煩熱者煩虛也中風即發熱者風傷衛也傷寒不即發熱者寒傷榮也經云傷寒一二日或已發熱或未發熱是也凡翕翕發熱而有惡風惡寒頭痛脈浮者表證也此由風寒客於皮膚陽氣怫鬱所致宜汗之若小便黃非在外凡蒸蒸發熱而兼有譫語大便祕小便赤腹滿惡熱脈滑實者裡熱也此由陽氣下陷入陰中所致宜下之若小便清非在內也其在少陰厥陰發熱者謂之反發熱惟太陰無發熱之候若脈陰陽俱盛熱不止者死下利發熱汗後復發熱脈躁疾不為汗衰狂言不能食陰陽不交者死蘭臺治例曰邪在三陽太陽證多與潮熱若同而異邪在三陰少陰證多與煩躁相類而非發熱惡寒脈浮者屬表即太陽證也方論見前太陽病條發熱汗出不惡寒反惡熱者屬裡即陽明證也方論見自汗發熱脈弦細頭痛者屬半表半裡即少陽證也論見口苦咽乾發熱而嘔者小柴胡湯論見嘔發熱咳嗽表不解者小青龍湯兼脅痛喜嘔者小柴胡加乾薑五味子湯方論見咳發熱而喘表不解者小青龍去麻黃加杏仁湯兼胸滿者麻黃湯方論見喘發熱口渴有屬表者有屬裡者治法方論甚衆並見渴門發熱汗解半日許復煩躁脈浮數大者可更發汗宜桂枝湯詳煩發汗後惡風寒者虛故也不惡寒但惡熱者實也當和胃氣宜調胃承氣湯經曰汗出不惡寒者此表解里未和與調胃承氣湯以和胃氣太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之海大黃泄實芒硝軟堅甘草和中必燥實堅三證全者可用調胃承氣湯方大黃一兩海宜酒浸蓋邪氣居高非酒不到譬如物在高巔人跡所不及必射而取之故用酒浸引上若生用苦泄峻下則遺高分之邪熱所以愈後或目赤或喉閉或頭腫膈上反生熱證甘草半兩炙海甘以緩之芒硝九錢海辛以潤之咸以軟之上㕮咀水一盞煮大黃甘草至七分去滓入芒硝更上火微煮令沸少少溫服成內經曰熱淫於內治以鹹寒佐以苦甘芒硝鹹寒以除熱大黃苦寒以蕩實甘草甘平助二物推陳而緩中發熱汗出不解心下痞硬嘔吐而利者大柴胡湯論見痞發汗後身灼熱脈浮汗出身重多眠鼻鼾者風溫論見風溫發汗後仍發熱心悸頭眩身瞤動振振欲劈地者宜真武湯論見下利汗出熱不去內拘急四肢疼下利厥逆惡寒者宜四逆湯論見下利大汗出脈陰陽俱盛不解者死內經云溫病汗徹復熱而脈躁疾不為汗衰狂言不能食謂之陰陽交者必死也太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈桂枝湯主之汗下後仍頭痛發熱心下滿小便不利者桂枝去桂加茯苓白朮湯論見結胸大下後身熱不去心中結痛者梔子豉湯主之論見心大下後身熱不去微煩者梔子乾薑湯方論見煩陽明病下之其外有熱手足溫心中懊憹飢不能食但頭汗出者梔子豉湯論見煩太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以誤吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以誤吐之所致也此為小逆成惡寒發熱為太陽表病自汗出不惡寒發熱者陽明證本太陽表病醫反吐之傷動胃氣表邪乘虛傳於陽明也以關脈細數知誤吐之所致病一二日為表邪尚寒而未成熱吐之則表寒傳於胃中胃中虛寒故腹中飢而口不能食病三四日則表邪已傳成熱吐之則表熱乘虛入胃胃中虛熱故不喜糜粥欲食冷食朝食暮吐也朝食暮吐者晨食入胃胃虛不能克化故停久而復吐出者知為醫誤吐之胃虛所致本太陽病吐不為逆以傳陽明故以為逆然陽明雖為入腑猶是陽經故不為大逆而曰小逆也瘥後更熱者小柴胡湯脈浮者以汗解脈沉者以下解詳勞復傷寒脈浮滑此表有熱里有寒白虎湯主之前篇云熱結在裡表裡俱熱者白虎湯主之又云其表不解不可與白虎湯此云脈浮滑表有熱里有寒者必表裡字差矣又陽明一證云脈浮遲表熱裡寒四逆湯主之又少陰一證云裡寒外熱通脈四逆湯主之以此見差明矣又陽明篇曰脈滑而疾者小承氣湯既用承氣是為裡熱也又厥陰篇曰脈滑而厥者里有熱白虎湯主之是謂滑為裡熱明矣況知母石膏性皆大寒豈應以水濟水成氏隨文釋之非也白虎湯方知母六兩石膏一斤甘草二兩糯米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服成白虎西方金神也應秋而歸肺熱甚於內者以寒下之熱甚於外者以涼解之其有中外俱熱內不得泄外不得發非是湯則不能解暑暍之氣得秋而止故曰處暑是湯以白虎名謂能止熱也內經曰熱淫所勝佐以苦甘又曰熱淫於內以苦發之欲徹表熱必以苦為主故以知母苦寒為君熱則傷氣寒以勝之甘以緩之熱勝其氣必以甘寒為助是以石膏甘寒為臣脾苦濕急食甘以緩之熱氣內余消爍津液必以甘平之物緩其中故以甘草粳米為使是太陽中暍得此湯則頓除即熱見白虎而盡矣立秋後不可服白虎為大寒劑秋時服之必多為噦逆虛羸者矣垣身以前胃之經也胸胃肺之室也邪在陽明肺受火制故用辛寒以清肺所以號為白虎湯也海夫傷寒表證發熱惡熱而渴與下雜證同但頭痛身熱目痛鼻乾不得臥白虎主之乃陽明經病也正陽陽明氣病脈洪大先無形也雜病里證發熱惡熱而渴但目赤者病藏也手太陰氣不足不能管領陽氣也宜以枸杞生地黃熟地黃之類主之脈洪大甚則嘔血先有形也氣病在裡誤用血藥無傷寒也為安血而益陰也血在裡誤用氣藥如白虎湯者非也為瀉肺而損陰也垣辨誤服白虎變證昔西臺掾葛君瑞二月中病傷寒發熱以白虎湯主之病者面黑如墨本證遂不復見脈沉細小便不禁東垣初不知也及診之曰此立夏以前誤服白虎白虎大寒非行經之藥止能寒臟腑不善用之則傷善氣本病曲隱於經絡之間或投以大熱之藥求以去陰邪他證必起非所以救白虎也可用溫藥升陽行經有難者曰白虎大寒非大熱何以救君之治奈何東垣曰病隱經絡間陽道不升則經不行經行而本證見矣果如其言而愈張活人謂白虎湯治中暍並汗後一解表藥耳非正傷寒藥也而夏月陰氣在內白虎尤宜戒之夫白虎湯俱載仲景之書證治昭然明白何為言非正傷寒之藥也況傷寒論言無表證者可與白虎湯今云汗後一解表藥耳於法既無表證何解之有又曰夏月陰氣在內白虎尤宜戒之而明理論又云立秋後不可服秋則陰氣半矣而白虎大寒若不能禁服之而為噦逆不能食或虛羸者多矣夫傷寒之法有是證則投是藥安可拘於時而為治哉假如秋冬之間患傷寒身無表證而大煩渴於法合用白虎湯苟拘其時何以措手若以白虎為大寒其承氣又何行於冬令乎既以夏宜戒秋後不可行然則宜乎何時也雖然經云必先歲氣無伐天和此言常也假如賊邪變出陰陽寒熱亦當舍時從證豈可以時令拘哉傷寒脈浮發熱無汗其表不解者不可與白虎湯若大渴欲飲水無表證者白虎加人參湯主之成傷寒脈浮發熱無汗其表不解不渴者宜麻黃湯渴者宜五苓散非白虎所宜大渴欲水無表證者乃可與白虎加人參湯以散裡熱臨病之人大宜精別張經言可與某湯或言不可與者此設法御病也又云宜某湯此臨證審決也言某湯主之乃對證施治也此三者方法之條目也包藏深理非一言可以具述脈浮而遲表熱裡寒下利清穀者四逆湯論見下利下利厥逆汗出熱不去者四逆湯少陰病下利清穀厥逆裡寒外熱者通脈四逆湯方論見下利身熱手足逆冷而脈虛當夏月發者為中暑論見中暑傷寒表不解乾嘔發熱而咳下利者小青龍去麻黃加芫花湯論見咳太陽與陽明合病必下利其證頭痛腰疼身熱鼻乾脈浮大而長者宜葛根湯論見合病發熱下利脈微遲厥逆者通脈四逆湯太陽與少陽合病自下利其證頭寒胸滿往來寒熱脈浮大而弦者宜黃芩湯論見合病下利清穀脈沉遲其人面赤微熱而厥者必鬱冒汗出自解發熱下利厥逆躁不得臥者死發熱而利汗不止者死二論俱見下利發熱吐利心下痞硬者大柴胡湯渴者五苓散不渴者理中湯論並見痞及吐利門發熱經水適來適斷小柴胡湯刺期門論見譫語瘧狀發熱脈數消穀不大便者有瘀血宜抵當湯論見蓄血戴諸陽發熱已見前三陽經陰不發熱惟少陰能發熱然少陰發熱有二證初得病即見少陰證發熱惡寒頭不疼宜麻黃細辛附子湯若下利清穀身熱躁擾裡寒外熱仲景謂之反發熱此乃陰盛隔陽宜四逆湯附子理中湯蓋陽氣傳陰經而下利者乃是熱利陽陷入裡外所以無熱陰氣入陰經而下利者乃是裡寒自利寒既在裡為主而陽氣必客於外所以外反熱要知陰證發熱自是不同發於陽而發熱者頭必疼發於陰而發熱者頭不痛此為驗也又發汗後只惡寒者為虛虛乃表虛發汗後只惡熱者為實實乃里實只惡寒者是發其汗或汗出太過所謂陽微則惡寒宜芍藥甘草附子湯只發熱者是表已解而里不消所謂陰微則發熱宜大柴胡湯或小承氣湯又有汗下後陰陽不相入水火不相濟致餘熱未退不可更用冷藥內外俱未可故宜小建中湯若其人已虛虛能生熱宜小建中湯加當歸一錢或四君子湯加黃耆半錢或十全大補湯調其榮衛虛者四柱湯真武湯審其是邪熱未解雖經汗下卻不畏虛而養病宜竹葉石膏湯宋元諸賢表證發熱治例潔有汗不得服麻黃無汗不得服桂枝然春夏汗孔疏雖有汗不當服桂枝宜用黃耆湯和解之秋冬汗孔閉雖無汗不當服麻黃宜用川芎湯和解之春夏有汗脈微而弱惡風惡寒者乃太陽證秋冬之脈也宜用黃耆湯無汗亦用川芎湯秋冬有汗脈盛而浮發熱惡熱者乃陽明證春夏之脈也宜用黃耆湯無汗亦用川芎湯大抵有汗皆宜黃耆湯無汗皆宜川芎湯主之黃耆湯有汗則能止之白朮黃耆防風各等分上㕮咀每服五七錢至一兩水煎溫服汗多惡風甚者桂枝川芎湯無汗則能發之川芎蒼朮羌活各等分上㕮咀每服五七錢至一兩水煎熱服無汗惡風甚者加麻黃一二錢海神術湯治內傷冷飲外感寒邪無汗者蒼朮制防風各二兩甘草一兩炒上㕮咀加蔥白生薑同煎服如太陽證發熱惡寒脈浮而緊者加羌活二錢如太陽證脈浮緊中帶弦數者是兼少陽也加柴胡二錢如太陽證脈浮緊中帶洪者是兼陽明也加黃芩二錢婦人服者加當歸或加木香湯或加藁本湯各二錢如治吹奶煎調六一散三五錢神效又神術六氣加減例太陽寒水司天加羌活桂枝餘歲非時變寒亦加冬亦加陽明燥金司天加白芷升麻餘歲非時變涼濕亦加秋亦加少陽相火司天加黃芩地黃餘歲非時變雨濕亦加夏亦加太陰濕土司天加白朮藁本餘歲非時變熱濕亦加夏末秋初亦加少陰君火司天加細辛獨活餘歲非時變熱亦加夏末夏初亦加厥陰風木司天加川芎防風餘歲非時變溫和亦加夏亦加以上神術湯六氣加減法非止為司天之氣設也至於歲之主氣與月建日時同前應見者皆當隨聽見依上例加減之按海藏此論與戴人云病如不是當年氣看與何年運氣同便向此中求妙法方知皆在至真中之歌相表裡實發前人之所未發也蓋海藏此論所謂某氣司天加某藥者治常氣之法也所謂隨所應見加減者治變氣之法也戴人所謂看與何年同氣求治法者亦治變氣之法也能將二公之法擴充行之則內經運氣之本義燦然矣夫同經綸運氣有常氣有變氣常氣者有定紀如某年屬某氣司天當寒某年屬某氣司天當熱是也變氣者無定紀如某年屬某氣司天當寒反熱當熱反寒是也王氏注文釋以經無定紀之變氣作有定紀之常氣使後學者皆以年歲占運氣而其應者十無一二是以人莫之信而其道湮晦久矣二公生數千百里之後復啓其端而續之與程朱續孔孟不傳之緒同功也今僕謹於海藏逐年司天加藥之後申明餘歲變常之義同志者幸究心焉白朮湯治內傷冷物外感風寒有汗者白朮三兩防風二兩甘草一兩炙上㕮咀每服五錢水一盞姜三片煎至七分溫服一日止一二服待二三日漸漸汗少為解又白朮湯治傷寒上解三陽下安太陰白朮如汗之改用蒼朮防風各二兩每服五錢水煎七分溫服用後方加減若發熱引飲加黃芩甘草頭疼惡風者加羌活散三錢羌活一兩半川芎七錢細辛二錢半去蘆若身熱目痛者加石膏湯四錢石膏二兩知母半兩白芷七錢腹中痛加芍藥湯三錢芍藥二兩桂枝半兩往來寒熱而嘔者加柴胡散三錢柴胡一兩半夏半兩心下痞加枳實一錢若有里證加大黃一錢次二錢又次三錢邪去止之潔古云有汗不得服麻黃無汗不得服桂枝若未瘥則其變不可勝言故立此法使不犯三陽禁忌解表神方九味羌活湯陶尚文注云不問四時但有頭疼骨節痛發熱惡寒無汗脈浮緊者宜用此湯以代麻黃為穩當如頭痛發熱惡風自汗脈浮緩者宜用加減沖和湯即羌活湯中減蒼朮細辛加白朮黃耆是也羌活一兩半治太陽肢骨痛君主之藥也然非無為之主乃攪亂反正之君也故大無不通小無不入關節痛者非此不除防風一兩半治一身盡痛乃卒伍卑賤之下職聽君命將令而行隨所使所引而至蒼朮一兩半雄壯上行之藥能除濕下安太陰使邪氣不內傳之於足太陰脾細辛半兩治足少陰腎苦頭痛川芎一兩治厥陰頭痛在腦白芷一兩治陽明頭痛在額生地黃一兩治少陰心熱在內黃芩一兩治太陰肺熱在胸甘草一兩能緩裡急調和諸藥故有國老之稱以上九味雖為一方然亦不可執當視其經絡前後左右之不同從其多少大小輕重之不一增損用之其效如神㕮咀水煎服若急欲汗者須熱服以熱湯助之若緩欲汗者溫服不用湯助也脈浮而不解者先急後緩脈沉而不解者先緩後急此湯不獨解利治雜病亦神中風行經者加附子中風祕澀者加大黃中風並三氣合而成痹等證各隨十二經上下內外寒熱溫涼四時六氣加減補瀉用之煉蜜作丸亦可加生地黃各半治兩感傷寒如神用豆淋酒煎治破傷風解表雜方和解散和劑治四時傷寒頭痛煩躁自汗咳嗽吐利平胃加藁桔陳皮洗厚朴去粗皮薑汁炙各四兩藁本桔梗甘草各半斤蒼朮去皮一斤上為粗末每服三錢水一盞半姜三片棗二個煎七分不拘時熱服十味芎蘇散淡寮亦名芎芷香蘇散治四時傷寒發熱頭痛川芎七錢紫蘇葉乾葛柴胡茯苓各半兩半夏六錢陳皮三錢半枳殼炒三錢桔梗二錢半甘草二錢上㕮咀每服三錢水一盞姜三片棗一枚煎七分溫服無時養胃湯和劑治外感風寒內傷生冷憎寒壯熱頭目昏疼不問風寒二證夾食停痰俱能治之但感風邪者當以微汗為好半夏湯洗七次厚朴去粗皮薑汁炒蒼朮米泔浸一宿洗切炒各一兩橘紅七錢半藿香葉洗去土草果去皮膜茯苓去黑皮人參去蘆各半兩炙甘草二錢半上㕮咀每服四錢水一盞半姜七片烏梅一個煎六分熱服兼治飲食傷脾發為痎瘧寒多者加附子為十味名不換金散五積散和劑治陰經傷寒脾胃不和及感寒邪白芷川芎炙甘草茯苓去皮當歸去蘆肉桂去粗皮芍藥半夏湯洗七次各三兩陳皮去白枳殼去瓤麩炒麻黃去根節各六兩乾薑爁厚朴去粗皮薑製各四兩蒼朮米泔浸去皮二十四兩桔梗去蘆十二兩上除肉桂枳殼二味別為粗末將一十三味慢火炒令色轉攤冷次入枳桂令勻每服三錢水一盞半姜三片蔥白三段煎一鐘不拘時熱服胃寒用煨姜挾氣加茱萸調經催生入艾醋服若脾胃不和內傷冷物渾身疼痛頭昏無力胸膈不利飲食不下氣脈不和四肢覺冷或睡裡虛驚至晚心躁困倦即入鹽少許同煎若陰經傷寒手足逆冷及虛汗不止脈細疾面青而嘔更宜加附子同煎加減多少並在臨時消息之海麻桂芍藥甘草即麻黃桂枝各半湯也蒼朮甘草陳皮厚朴即平胃也枳桔陳茯半即枳梗半夏等湯也加芎歸治血又加乾薑為厚朴散此數藥相合為解表溫中之劑消痞調經之方雖為內寒外感表裡之分所制實非仲景表裡麻黃桂枝姜附之的方也惟在活法者變而通之人參敗毒散和劑治傷寒頭痛壯熱惡寒及風痰咳嗽鼻塞聲重風濕身腫體痛惡風疫癘四時通用傷風有汗夏至後用羌活獨活前胡柴胡芎藭枳殼白茯苓桔梗人參以上各一兩甘草半兩上為末每服三錢水一盞生薑三片薄荷少許同煎至七分去滓溫服參蘇飲元戌治內外感一切發熱主藥又云前胡葛根自能解肌枳殼陳皮自能寬膈大治中焦滿痞凡有熱不得拘其所見小兒室女尤宜服之木香半兩紫蘇葉乾葛半夏湯洗七次薑汁炒前胡去苗人參去蘆茯苓去皮各七錢半枳殼去瓤麩炒桔梗去蘆甘草炙陳皮去白各半兩上㕮咀每服四錢水一盞半生薑七片棗一枚煎不拘時稍熱服若素有痰者候熱退以二陳六君子湯間服此方治痰飲停積中脘閉塞眩暈嘈煩忪悸嘔逆及痰飲中人停留關節手腳葰曳口眼喎斜半身不遂食已則嘔頭疼發熱狀如傷寒者悉治之一法用此藥三兩加四物湯二兩和合名茯苓補心湯大治男子婦人虛勞發熱或五心煩熱並衄血吐血便血及婦人下血過多致虛熱者並宜服之或因用心太過發虛熱者及往來寒熱者用之神效加味香蘇散拔粹香附子三兩紫蘇梗二兩陳皮一兩甘草半兩上為銼散每服四錢水一盞半煎一盞生薑三片連根蔥白二莖同煎熱服頭痛加川芎白芷頭痛如斧劈加石膏連須蔥頭偏正頭風加細辛石膏薄荷太陽穴痛加荊芥穗石膏傷風自汗加桂枝傷寒無汗加麻黃去節乾薑傷風惡寒加蒼朮傷風咳嗽不止加半夏杏仁去皮尖傷風胸膈痞塞加制枳殼傷風發熱不退加漳柴胡黃芩傷風鼻塞聲重咽膈不和加苦梗旋覆花傷風痰涎壅盛加白附子天南星傷風鼻內出血加茅花傷風氣促不安加大腹皮桑白皮傷風鼻塞不通頭昏加羌活荊芥傷風不散吐血不時加生地黃傷風不解耳內出膿疼痛加羌活荊芥傷風不解咽喉腫痛加苦梗傷風中脘寒不思飲食加去白青皮枳殼傷風嘔吐噁心不止加丁香半夏傷風頭暈眼花顛倒支持不住加熟附子傷風時作寒栗加桂枝傷風痰壅嘔惡不止加白附子旋覆花半夏傷風后時時作虛熱不退加人參傷風飲食不能消化加縮砂仁青皮傷風一向不解作潮熱白日至日中不退日日如是加地骨皮漳柴胡人參庵蕳初感風頭痛作熱鼻塞聲重加羌活川芎感風腰疼不能伸屈加官桂桃仁感風渾身痛不止加赤芍藥紫金皮感風頸項強急不能轉頭加羌活官桂腹肚疼痛加木香腹肚疼刺不可忍加薑黃茱萸七粒小腹疼痛無時不可忍加木香薑棗婦人忽然大便痛腫不能下地加木香木瓜茱萸婦人被氣所苦胸膈痞疼脅肋刺痛小便急疼加木香枳殼婦人被氣疼所苦加木香縮砂仁脾胃不和中脘不快加穀芽神麯傷風吐嘔泄瀉腹痛加乾薑木香心卒痛者加延胡索酒一盞飲酒太過忽遍身發疽或兩目昏黃加山茵陳山梔子中酒吐惡加烏梅丁香婦人經水將行先作寒熱加蘇木紅花婦人産後作虛熱不退煩渴加人參地黃産後發熱不退加人參黃耆産後腰疼不已加當歸官桂冷嗽不已加乾薑五味子杏仁脾寒加良薑青皮草果腳氣加木香木瓜牛膝紫金皮茱萸川楝子感風寒發熱頭疼加不換金正氣散感寒頭痛壯熱惡寒身痛不能轉動加生料五積散飲食不下欲吐不吐加丁香羅卜子感寒頭痛發熱身疼分陰陽加敗毒石膏婦人産後風腳手疼痛生料五積散人參敗毒散加木瓜不換金正氣散加生地黃川芎同煎十神湯和劑治時令不正瘟疫妄行感冒發熱或欲出疹此藥不問陰陽兩感風寒並宜服之川芎甘草麻黃去根節乾葛紫蘇升麻赤芍白芷陳皮香附子各等分上㕮咀每服五錢薑蔥煎如頭痛甚更加蔥白三莖中滿氣實加枳殼煎並熱服吳此湯用升麻葛根能解利陽明經瘟疫時氣發散之藥也非正傷寒之藥若太陽經傷寒發熱用之則引入陽明經傳變發癍矣慎之藿香正氣散和劑治傷寒頭痛憎寒壯熱或感濕氣霍亂吐瀉常服除山嵐瘴氣伏暑吐瀉腳轉筋加香薷扁豆黃連名藿薷湯大腹皮白芷茯苓去皮紫蘇莖葉藿香各三兩厚朴去粗皮薑製白朮陳皮去白苦梗半夏曲各二兩甘草炙一兩上㕮咀每服三錢姜三片棗一枚煎熱服吳此方宋人所制治內傷飲食外感寒邪憎寒拘急頭痛嘔逆胸膈滿悶與夫傷食傷冷傷濕中暑霍亂山嵐瘴氣不伏水土寒熱作瘧並宜增損用之非正傷寒之藥若病在太陽經頭疼發熱骨節痛者此方全無相干如妄用之先虛正氣逆其經絡雖出汗亦不解變成壞證者多矣凡傷寒發熱脈沉與元氣虛人並夾陰傷寒發熱者皆不可用切宜戒之大白朮湯保命和解四時傷寒混解六經不犯禁忌白朮石膏各二兩防風羌活川芎各一兩甘草五錢或一兩黃芩枳實去瓤各五錢知母七錢白芷一兩半細辛三錢上為粗末每服半兩水一盞半煎至一盞大溫服未解更一服兩服藥渣又作一服春倍防風羌活夏倍黃芩知母季夏雨淫倍術白芷秋加桂枝五錢冬加桂八錢或一兩上以上諸方皆為元氣不虛者設也如芎蘇香蘇散則內傷少而外感多者宜之和解散養胃湯則外感少而內傷多者宜之五積散則寒多者宜之冬亦宜之大白朮湯則熱多者宜之春夏亦宜之敗毒散則宜於挾濕者參蘇飲則宜於挾痰者十神正氣則吳氏之議當矣大抵證兼表裡邪由錯雜似傷寒而非正傷寒者乃可於諸方中斟酌選用若脈證與麻黃桂枝吻合自當遵仲景法治即元氣素虛或平素有熱不宜麻桂者亦必如潔古海藏法緩緩消減庶幾無誤爾人命至重死不復生臨病之工宜詳審焉戴院使元禮治法傷風傷寒法初得病時並宜和解散芎芷香蘇散或養胃湯加草芎各半錢熱服溫覆若的是傷風有前自汗惡風等證可用桂枝湯令其熱服溫覆喘加杏仁一錢咳加五味子一錢渴加人參半錢外熱未止者敗毒散熱而有汗者敗毒散加桂枝半錢或陽旦湯嘔者不宜用桂枝湯合於本方加半夏一錢添姜煎此非合病之嘔系傷寒雜病即非正寒故可用也風寒二證理當發汗而其人虛不可汗者宜桂枝湯加黃耆半錢若的是傷寒有前惡寒無汗等證可用五積散厚被覆之取汗喘嗽者杏子湯加麻黃半錢欲汗而不得汗者再進已汗而身熱不退者參蘇散或敗毒散加桂枝半錢嘔者養胃湯此非治合病之嘔若風寒俱傷或惡風而無汗或惡寒而無汗疑似之間只宜五積散半帖加敗毒散半帖名交加散喘嗽者小青龍湯有初得病太陽證具但寒而未即為熱至一二日後方熱此傷於寒若傷風即有熱矣但寒未熱者五積散發汗有已服解表藥不惡風不惡寒諸表證已罷於里又未躁未渴小便亦未赤大便如常獨身熱未除者宜香蘇散敗毒散小柴胡湯加桂枝半錢有已服解表藥證已罷又無里證其人體痛不減者恐是發汗多榮衛不和所致宜小建中湯用半厚半薄之桂河間劉氏治法傷寒表實無汗頭項痛腰脊強身熱惡寒肩背拘急手足指末微厥脈浮緊而澀當以清解散加天水散汗之傷風表虛自汗頭項強痛肢節煩疼鼻鳴乾嘔惡風手足溫脈浮緩當以通解散或天水散解之或表虛或表實但口乾煩渴者悉宜雙解散汗之汗後餘熱不解以涼膈散退之或日深或日淺但有表證而脈沉數者先以天水連翹飲之清之待脈浮而裡熱減然後以雙解散汗之傷寒表汗解脈浮小便不利微熱口乾五苓散分之表熱多里熱少益元一涼膈半和解之裡熱多表熱少涼膈一益元半調之若表裡俱熱頭痛口乾自汗不止白虎湯治之或半在表半在裡往來寒熱口苦舌乾耳聾乾嘔胸脅痞痛小柴胡湯和解之或膈熱嘔吐不止者半夏橘皮湯治之或飲水不止以成濕熱大便泄瀉小便赤澀腹滿急痛頭痛口乾者桂苓甘露飲主之或濕熱內余而成下痢頻並少腹而痛者黃連解毒湯治之傷寒日深表裡熱勢極甚心下急郁微煩或發熱汗出不解心下痞硬嘔吐下利或陽明病多汗或太陰腹滿實痛或少陰下利清水心下痛而口乾或無表裡證但發熱七八日脈雖浮數宜雙除表裡之熱大柴胡湯微下之或加小承氣湯尤妙傷寒日深裡熱極甚日晡潮熱譫言妄語發狂腹滿實痛法當大承氣湯下之或用三一承氣湯尤良上戴氏用藥偏熱劉氏用藥偏寒於世運風土稟質感受各有所宜臨病者詳審而酌施之方許親見長沙耳劉氏所用諸方前條無之今列於後通聖散輕劑治風熱鬱結憎寒發熱筋脈攣痹肢體焦痿頭目昏眩耳鳴鼻塞口苦舌乾咽喉不利涕唾稠黏咳嗽上氣腸胃燥澀便血瘀血瘡瘍腫痛痎瘧不痊婦人産後血滯腹痛小兒驚風積熱並墜馬跌僕疼痛或傷寒傷風等並皆治之防風芒硝連翹川芎麻黃薄荷白芍藥當歸大黃各五錢黃芩桔梗石膏各一兩甘草二兩荊芥山梔白朮各一錢滑石三兩上㕮咀每服一兩或二兩水一盞生薑三片同煎七分去滓溫服不拘時如發散風寒加蔥白三莖如治痰嗽每服加半夏少許涼膈散清劑治心火上盛膈熱有餘目赤頭眩口瘡唇裂鼻衄吐血咳嗽痰涎淋閉不利大小便不通或傷寒半表半裡及胃熱發癍及陰耗陽竭用以養陰退陽或汗下後餘熱不解並小兒瘡痘黑陷並皆治之連翹一兩甘草山梔黃芩大黃薄荷各五錢朴硝二錢半上㕮咀每服一兩水一鍾竹葉三十片同煎七分去滓入生蜜少許食後溫服加黃連五錢名清心湯天水散淡劑治傷寒表裡俱熱煩渴口乾小便不通及霍亂吐瀉下利腸澼偏主石淋及婦人産難催生下乳神仙之妙藥也桂府滑石膩白者六兩粉草一兩半上為極細末每服三錢白湯調下新汲水亦得加薄荷末少許名雞蘇散加青黛末少許名碧玉散治療並同但以避世俗之輕侮爾三一承氣湯治傷寒大承氣湯證腹滿實痛調胃承氣證譫語下利小承氣湯證內熱不便三乙承氣湯合而為一也及治中風僵仆風癇發作並皆服之此下劑也大黃芒硝厚朴枳實各一兩甘草五錢宣明論方甘草倍於四味上㕮咀分作三服每服水二盞生薑三片同煎七分去滓溫服不拘時候以利為度雙解散治傷寒傷風或有汗或無汗表證悉具內熱口乾通聖天水各一半上為㕮咀每服二兩水二大鐘生薑三片蔥白三根同煎七分去滓微熱服以取其汗清解散治一切感冒蒼朮炒荊芥各二兩甘草一兩麻黃一兩半上四味㕮咀每服一兩水二鍾生薑三片蔥白一莖同煎七分去滓微熱服以被蓋覆以汗出為度半夏橘皮湯治一切嘔吐不止人參白朮白茯苓甘草黃芩半夏厚朴藿香葉葛根橘皮各等分上為㕮咀每服一兩水一碗煎七分去滓入生薑自然汁少許溫服不拘時補養兼發散例丹溪云有卒中天地之寒氣者有口食生冷之物者故傷寒為病必身犯寒氣口食寒物者是以從補中益氣湯加發散藥屬內傷者十居八九其法邪之所湊其氣必虛只用補中益氣湯中從所見之證出入加減氣虛甚者少用附子以行參朮之氣補中益氣湯方見雜病勞倦門內傷之病專主東垣內外傷辨甚詳世之病此者為多但有挾痰挾外邪者鬱熱於內而發者皆以補元氣為主宜看其所挾而兼用藥一男子素嗜酒因暴風寒衣薄遂覺倦怠不思飲食半日至睡後大發熱遍身疼痛如被杖微惡寒天明診之六脈浮大按之豁然左為甚豫作極虛受風寒治之人參為君黃耆白朮歸身為臣蒼朮甘草木通乾葛為佐使大劑與之至五帖後通身汗如雨凡三易被得睡醒後諸證悉除盧兄年四十九歲自來大便下血脈來沉遲澀面黃神倦者二年矣九月間因勞倦發熱自服參蘇飲二帖熱退早起小勞遇寒兩手背與面紫黑昏僕少時卻醒身大熱妄語口乾身痛至不可眠脈之三部不調微帶數重取虛豁左手大於右手以人參二錢半帶節麻黃黃耆各一錢白朮二錢當歸五分與三五帖得睡醒來大汗如雨即安兩日後再發脅痛咳嗽若睡時嗽不作而妄語且微惡寒診其脈似前而左略帶緊豫曰此體虛再感寒也再以前藥加半夏茯苓至十餘帖再得大汗而安後身倦不可久坐不思飲食用補中益氣去涼藥加神麯半夏砂仁五七十帖而安杭州葉君章臘月因齊素中飢而冒寒作勞遂患發熱頭痛醫與小柴胡湯遂自汗神昏耳聾目不見物豫診其脈大如指似有力熱不退與人參黃耆白朮熟附子炙甘草作大劑服之一日而汗少二日而熱減半耳微有聞目能視物初用藥至四帖前藥中加蒼朮與兩服再得汗而熱除本日遂去蒼朮附子又與前藥作小劑服三日而安呂仲修年六十六歲正月間因忍飢冒寒作勞頭痛惡寒發熱骨節皆疼無汗至次日妄語熱愈甚而妄語時止時作熱亦不為十分自服參蘇飲兩帖汗不出又再進一服以衣覆取汗大出而熱不退至第四日豫診其脈兩手皆洪數而右為甚此因飢而冒寒加之作勞陽明經雖受寒氣不可攻擊宜急以大劑補之以回其虛俟胃氣充實自能出汗而解遂以參耆白朮歸身陳皮炙甘草每帖加熟附子一片一晝夜服五帖至第三日口稍干言語有次諸證雖解而熱未退遂去附子加白芍又兩日思食卻作肉羹間與之又三日精神全二日許自汗出而熱退診其脈不數洪脈卻尚有些洪脈作大脈論年高而誤汗此後必有虛證見又與前藥至次日言我大便自病來不曾更衣今穀道逼痛虛坐努責狀如不堪醫者必欲投大黃巴豆等劑豫謂大便非實祕為是氣因誤汗而虛不得充腹無力可努仍與前補藥以肉粥及蓯蓉與之一日半煎濃蔥椒湯浸下體下大便軟塊者五六枚診其脈仍舊大未斂此因氣血未得回覆又與前藥兩帖經兩日小便不通少腹下妨悶頗為所苦但仰臥則點滴而出豫曰補藥服之未盡於前藥內倍加參耆大劑服兩日小便方利而安汪機治一人年三十餘因冒寒發熱醫用發表不愈繼用小柴胡熱熾汗多遂昏昏憒憒不知身之所在臥則如雲之停空行則如風之飄毛兼有消穀善飢多遺諸證觀其形類肥者曰此內火燔灼而然虛極矣診其脈皆浮洪如指曰脈經云脈不為汗衰者死在法不治所幸者脈雖大按之不鼓形雖長而色尚蒼可救也醫以外感治之所謂虛其虛誤矣經云邪之所湊其氣必虛宜以內傷為重遂用參耆歸術大劑少加桂附服十餘帖病減十之二三再減桂附加芍藥黃芩服十餘貼病者始知身臥於床足履於地喜曰可不死矣服久果起薛院使已治一人年七十九仲冬將出少妾入房致頭痛發熱眩暈喘急痰涎壅盛小便頻數口乾引飲偏舌生刺縮斂如荔枝然下唇黑裂面目俱赤煩躁不寐或時喉間如煙火上衝急飲涼茶少解已瀕於死脈洪大而無倫且有力捫其身烙手此腎經虛火遊行於外投以十全大補加山茱萸澤瀉丹皮山藥麥門五味附子一鍾熟寐良久脈證各減三四再與八味丸服之諸證悉退後畏冷物而痊本事方黃耆建中加當歸湯治發熱頭疼脈浮數而尺中遲弱者宜先服此藥補血卻與麻黃桂枝輩黃耆當歸各一兩半白芍藥桂枝甘草各一兩上為㕮咀每服五錢姜三片棗一枚水煎日三夜二服如脈尚沉少遲再進一服海黃耆湯治傷寒兩感拘急三焦氣虛自汗及手足汗出或手背偏多或肢體振搖腰腿沉重面赤目紅但欲睡眠頭面壯熱兩脅熱甚手足自溫兩手心熱自利不渴大便或難或如常度或口乾咽燥或渴欲飲湯不欲飲水或少欲飲水嘔噦將作心下滿悶腹中疼痛或時喜笑或時悲哭或時太息或時語言錯亂疑作譫語狂言者非也神不守舍耳始得病於寤寐之間或恐悸頭項不甚痛行步只如舊此陰盛陽虛之故也兩手脈浮沉不一或左或右往來不定有沉澀弱微弦五種陰脈形狀按之全無力浮之損小沉之亦損小皆陰脈也宜先緩而後急緩宜用黃耆湯黃耆湯方人參生薑黃耆白茯苓白朮白芍藥各一兩甘草七錢嘔者加藿香陳皮各五錢甚者加乾薑炮一錢上㕮咀水煎量證加減多少用之如大便祕結者調中丸主之調中丸方人參白朮白茯苓乾薑甘草各等分上為末煉蜜丸每兩作十丸或五丸每服一二丸水少許煎服若病急者黃耆湯每服加乾薑一錢大便結者理中丸主之理中丸方人參白朮乾薑炮恐熱以生薑代之甘草炙上等分為末煉蜜丸每兩作五丸白湯化下先緩後急也若尤急者無汗宜附子乾薑甘草湯若自汗者宜白朮附子甘草湯量脈證可於四逆湯或真武湯或通脈四逆湯選用之丹潔矩新書謂有雜合邪者當以雜合法治之譬如惡寒發熱得之感冒明是外合之邪已得浮數之脈而氣口又緊盛明為食所傷病者又倦怠脈重按俱有豁意而胸膈痞滿間引兩脅其脈輕取又似乎弦此又平昔多怒肝邪之所為也細取左尺大細沉弱此又平時房勞之過也治法宜以感冒一節且放後先視其形色強弱厚薄且以補中化食行滯清涼胃火而以薑辣行之則中氣稍回傷滯稍行津液得和通體得汗外感之邪自解醫者不肯詳審求之只顧表散外邪又不推究兼見之邪脈亦不窮問所得之病因與性情之執著巧施雜合治法將見正氣自虛邪氣愈固皆拙工之過也婁此篇集丹溪海藏諸賢治傷寒皆以補養兼發散之法實本經成敗倚伏生於動動而不已則變作及風雨寒熱不得虛邪不能獨傷人之旨也蓋凡外傷風寒者皆先因動作煩勞不已而內傷體虛然後外邪得入故一家之中有病者有不病者由體虛則邪入而病體不虛則邪無隙可入而不病也是故傷寒為病屬內傷者十居八九後學無知舉世皆謂傷寒無補法但見發熱不分虛實一例汗下而致夭橫者滔滔皆是此實醫門之罪人也今集此法於仲景之後其應如響使人遵之不犯虛虛實實之戒也上綱目之文余見世醫泥於傷寒無補法多犯虛虛實實之戒故備述之而刪其純內傷者及丹溪醫按之庸蕪者又增近代二醫按以為虛人感寒之活例云爾神而明之存乎其人不可泥也余嘗治一刻字工人新婚冬月冒寒表證悉具令以人參紫蘇莖葉各一兩煎湯飲之汗出而愈一孕婦春夏之交患溫病頭痛發熱不惡寒而渴未及療治胎墮去血無算昏眩欲絶余令以麥門冬斤許入淡竹葉香豉頻頻飲之亦汗出而愈蓋用勞復法治之得此活法則於是病庶幾可十全矣韓祗和氏和解因時法傷寒病有可汗者論中但統言其可汗證及可汗脈或云脈浮而數或云脈浮緊或云脈浮無汗而喘或云脈浮為在表今略舉數條後人但憑其脈之大概並不分脈浮有陰陽虛盛之理又不知有可汗不可汗之證誤投發表藥則多變成陽毒之患矣今舉病人有汗惡風無汗惡寒分二等及據立春以後立秋以前氣候輕重各立方治之庶學者易為開悟耳一病人二三月以前兩手脈浮數或緩或緊按之差軟寸關尺若力齊等其力不甚大不甚小者亦未可便投解表藥此是見里證未見表脈也宜候寸脈力小如關尺即可投解表藥大抵治傷寒病見證不見脈未見投藥見脈未見證雖少投藥亦無害也凡治雜病以證為先脈為後治傷寒病以脈為先證為後一病人兩手脈浮數而緊名曰傷寒若關前寸脈力小關後尺脈力大雖不惡風不自汗出此乃陰氣已盛先見於脈也若不投藥和之後必惡風及自汗出若立春以後至清明以前宜調脈湯主之清明以後至芒種以前宜葛根柴胡湯主之芒種以後至立秋以前宜人參桔梗湯主之調脈湯方葛根一兩前胡去苗防風各七錢半甘草炙半兩為粗末每服五錢水一盞生薑一塊如小指大劈破煎七分去滓溫服如寸脈依前力小加棗三枚同煎葛根柴胡湯葛根一兩半柴胡去蘆一兩芍藥桔梗甘草炙各七錢半厚朴半兩上㕮咀每服五錢水一盞生薑二片煎至七分去滓熱服如寸脈依前力小加蔥白三寸同煎服人參桔梗湯人參桔梗各七錢半麻黃去節一兩石膏三兩甘草炙七錢半上每服五錢水一盞荊芥五穗同煎至七分去滓熱服如寸脈依前力小加麻黃二分去節同煎服一病人兩手脈浮數而緩名曰中風若寸脈力小尺脈力大雖不惡風不自汗此乃陰氣已盛先見於脈也若不投藥和之後必惡風自汗出若立春以後清明以前宜薄荷湯主之清明以後芒種以前宜防風湯主之芒種以後至立秋以前宜香芎湯主之薄荷湯薄荷一兩葛根人參甘草炙各半兩防風去蘆二兩上㕮咀每服五錢水一盞煎至七分去滓熱服如三五服寸脈力尚小加薄荷二分同煎防風湯防風去蘆一兩桔梗三錢甘草炙旋覆花各半兩厚朴三分上㕮咀每服五錢水二盞姜二塊同煎熱服如三五服寸脈力尚小加荊芥穗五七莖同煎香芎湯川芎二錢半石膏二兩升麻三兩甘草炙厚朴制各半兩上㕮咀每服五錢水二盞煎七分溫服如三五服後寸脈力尚小加細辛二分同煎前二段文將中風傷寒各立法者何蓋謂病人始得病三日以前或因中風脈緩或因傷寒脈緊然脈雖先見而證猶未見尚可以藥解之故立方耳一病人兩手脈浮數或緩緊寸脈短反力小於關尺脈者此名陰盛陽虛也若自汗出惡風是邪氣在表陰氣有餘也素問云陰氣有餘為多汗身寒即可投消陰助陽表劑以治之若立春以後清明以前宜六物麻黃湯主之清明以後芒種以前宜七物柴胡湯主之芒種以後立秋以前宜發表湯主之六物麻黃湯麻黃去節一兩葛根蒼朮各七錢半人參甘草炙各半兩上㕮咀每服五錢水一盞棗二枚煎七分熱服如三五服後汗未止惡風者加荊芥七錢三五服後不惡風猶汗者加丁香皮半兩七物柴胡湯柴胡蒼朮各二兩荊芥麻黃各一兩甘草炙七錢上㕮咀每服五錢水一盞姜一塊棗二枚同煎七分熱服如三五服後汗未止惡風者入蔥白三寸如三五服後汗再未止加當歸一兩同煎發表湯麻黃去節一兩蒼朮二兩人參當歸各半兩炙甘草丁香皮各七錢上㕮咀每服五錢水一盞入姜一塊棗三枚同煎至七分去滓熱服如三五服汗未止猶惡風者加桂枝七錢如汗未止更加細辛半兩以汗止為度一病人脈浮數或緊或緩其脈上出魚際寸脈大於關尺者此名陽盛陰虛也若發冒悶口燥咽乾者乃是邪氣在表陽氣獨有餘也素問曰陽氣有餘為身熱無汗是也可投消陽助陰藥以解表若立春以後清明以前宜人參湯主之清明以後至芒種以前宜前胡湯主之芒種以後至立秋以前宜石膏湯主之人參湯人參半兩柴胡一兩芍藥炙甘草各七錢半石膏二兩上㕮咀每服五錢水一盞姜一塊煎七分熱服如三五服後熱不解者入豉三十粒同煎服前胡湯前胡一兩石膏二兩甘草炙半兩桔梗豉各七錢半上每服五錢水一盞姜五片煎七分去滓熱服如三五服熱尚未解加豉三十粒煎再服石膏湯石膏三兩芍藥柴胡各一兩升麻黃芩炙甘草各七錢半上㕮咀每服五錢水一盞半豉一合煎八分熱服如三五服後熱未解者加知母一兩又未解加大黃一兩一病人兩手脈浮數或緊或緩三部俱有力無汗惡風者此是陰陽氣俱有餘素問曰陰陽有餘則無汗而寒是也可用藥平之若立春以後至清明以前宜解肌湯主之清明以後至芒種以前宜芍藥湯主之芒種以後至立秋以前宜知母湯主之解肌湯石膏二兩麻黃去節七錢半甘草炙升麻各半兩上㕮咀每服五錢水一盞入豉半合煎至八分去滓熱服如三五服後猶惡風者加麻黃半兩石膏一兩芍藥湯甘草炙半兩芍藥一兩石膏三兩荊芥穗一兩上㕮咀每服五錢水一盞生薑一塊煎至七分去滓熱服如三五服後猶惡風者每服加生薑一塊同煎服知母湯知母一兩石膏二兩麻黃升麻各一兩炙甘草半兩上㕮咀每服五錢水一盞入生薑一塊同煎至七分去滓溫服如三五服後猶惡風者加麻黃升麻各半兩前三段文將中風傷寒一法治者因病人始得病後脈證俱見若投解劑必不能愈故立前方同法治之仲景云傷寒為病脈緩者為中風脈緊者名傷寒今分此二端何也始因冬寒毒之氣中人其內伏之陽沉潛於骨髓之內每至春夏發時或因外傷寒而引內邪出或因外傷風而引內邪出及乎內邪既出而為病一也古人云立此二端恐後人疑其緊脈與緩脈治別也若中風與傷寒脈異何故仲景無別法治之此乃後人不究仲景之心也病人始得病一二日至五六日尚有表脈及表證亦可依脈證投藥凡投解表及發表藥每一日可飲三服病證甚可至五服外不可頓服藥也如證未解次日依前再投如證依前未解可作熱粥投之粥內加蔥白亦可如有汗出勿厚衣蓋覆恐汗出太過作亡陽證也海藏云韓氏微旨可汗一篇有和解因時法言傷寒之脈頭小尾大傷風之脈頭大尾小李思訓保命新書亦分尺寸與仲景同之非若前人總言尺寸脈俱浮而緊尺寸脈俱浮而緩緊則為傷寒無汗緩則為傷風自汗又有傷風有汗者傷寒無汗者脈亦互差與證不同前人已盡之矣惟韓李所言頭小尾大即為傷寒尾小頭大即為傷風人病間有脈證未顯於尺寸者故韓李述為和解因時法也又恐後人疑其不與前聖合遂於本方內又立加減法數條亦不越前人之意何其當哉蓋二公者當宋全盛之時故又戒麻黃桂枝不可輕用改用石膏升麻葛根柴胡之平劑當時則可非百代當行之道時世移遷之法也可汗一篇若隨湯液隨證應見自有定規雖明哲不可逾也又寸口脈小飲冷與霧露所傷同作中焦治法今韓李云傷寒寸小者勿認與飲冷霧露同恐傷一體也飲冷霧露所傷寸口舉按全無是陰氣在胃不和陽氣不能升越也傷寒寸口小者只於關部下至膀胱本部見之寸口雖小隻是舉之微小沉得之有也非若飲冷舉按全無也若果寸口舉按全無即不可解表只宜溫中不可不知惡寒此門系初稿故仲景法與後人續法混列以其頗有條理不復改正讀者詳之惡寒者風寒客於榮衛非寒熱之寒又非惡風也故不待見風而後怯寒雖身大熱亦不欲去衣被也甚則向火增被不能遏其寒所以然者由陰氣上入陽中或陽微或風虛相搏之所致也惡寒一切屬表雖里證悉具而微惡寒者亦表未解猶當先解其外俟不惡寒乃可攻也經云發熱惡寒發於陽可發汗無熱惡寒而蜷脈沉細發於陰可可溫里惡寒雖悉屬表亦有虛實之分若汗出而惡寒為表虛無汗而惡寒為表實表虛可解肌表實可發汗傷寒太陽病在表故惡寒少陽半在表半在裡亦微惡寒陽明在裡本不惡寒或惡寒者與太陽合病也太陽惡寒發熱脈浮方論見前太陽病發熱門陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊亦麻黃湯證也陽明病脈遲汗多微惡寒者表未解亦桂枝湯證也三時用代藥如前例少陽證頭汗出微惡寒小柴胡加桂湯三陰惟少陰經有惡寒之證太陰厥陰皆不惡寒然少陰惡寒又有二證發於少陰者無熱而惡寒宜溫之屬理中湯四逆湯少陰無熱惡寒似與前太陽經未即熱一條相似所謂寒未即熱者為太陽證具而未熱耳此之無熱惡寒蓋無太陽頭痛等證知為少陰也少陰病下利惡寒而蜷四逆湯真武湯小建中湯若惡寒而蜷時時自煩欲去衣被者活人用大柴胡湯下之趙氏以為宜溫散陰邪導引真陽汗而解可也若下之非惟不能表解反虛其里使惡寒之邪乘虛內陷縱使其脈沉滑而實亦未可遽用大柴胡必須先解表使惡寒證罷而後可用也少陰病惡寒身蜷而利手足逆冷者不治無陽故也少陰四逆惡寒而身蜷脈不至不煩而躁者死外有太陰自利不渴厥陰下利厥逆俱或惡寒太陰宜理中湯厥陰宜四逆湯前既言二陰不惡寒今又言或惡寒要知太陰厥陰皆不惡寒者此陽傳陰者也三陰皆能惡寒者陰入陰者也特在少陰為多耳惡寒脈微而復利利止亡血也四逆加人參湯主之成惡寒脈微而利者陽虛陰盛也利止則津液內竭故云亡血金匱玉函曰水竭則無血與四逆湯溫經助陽加人參生津液益血四逆加人參湯方人參乾薑甘草各一兩附子一枚去皮煨上㕮咀每服五錢水煎溫服日三次發汗病不解反惡寒者虛故也芍藥甘草附子湯主之成發汗病解則不惡寒發汗病不解表實者亦不惡寒今發汗病且不解又反惡寒者榮衛俱虛也汗出則榮虛惡寒則衛虛與芍藥甘草附子湯以補榮衛芍藥甘草附子湯方芍藥炙甘草各三兩附子一枚炮去皮破八片以上三味以水五升煮取一升五合去滓分溫服疑非仲景意成芍藥之酸收斂津液而益榮附子之辛熱固陽氣而補衛甘草之甘調和辛酸而安正氣下後復發汗心振寒脈微細者此內外俱虛也當歸四逆湯真武湯太陽病下後脈促胸滿者桂枝去芍藥湯主之桂枝去芍藥湯方桂枝去粗皮生薑切各一兩半甘草炙一兩大棗六枚上㕮咀每服五錢水煎溫服若微惡寒者去芍藥加附子湯主之前方加附子半個去皮炮活人云芍藥味酸脈促胸滿恐成結胸故云芍藥單用辛甘之味發散毒氣也傷寒汗下後心下痞而惡寒者表未解也先用桂枝湯解表用大黃黃連瀉心湯攻痞若痞而汗出惡寒者表已解也附子瀉心湯主之方論見痞背惡寒背負陽抱陰背寒者陽弱也然有陰陽二證少陰一證以陰寒氣盛不能消耗津液故口中和三陽合病以陽氣陷入津液為之涸故舌乾口燥以此別之思過半矣口中和而背惡寒者屬少陰宜附子湯見欲寐嗜臥舌乾口燥內有熱證口中不仁背惡寒者為三陽合病宜白虎湯見發熱經云腹滿身重面垢譫語遺尿口中不仁為三陽合病白虎加人參湯主之見渴若自汗者亦用白虎加人參湯又陽明證背微惡寒無大熱口中燥渴者亦用白虎加人參湯中暑亦有背惡寒證但面垢自汗脈虛而伏詳見雜病中凡脾胃素虛之人遇暑月間飲冷冰水或啖生冷寒氣蓄聚陰上乘陽故寒從背起冷如掌大此當以溫藥主之大順散之類惡風衛氣者所以溫分肉充皮膚肥腠理司開闔者也故風邪中於衛也則必惡風惡風惡寒俱為表證但惡風比惡寒為輕耳惡寒者雖不當風而時自怯寒惡風者居密室之中幃幕之內則無所畏或當風或揮扇則淅淅然而惡也惡寒則有陰陽之分惡風惟屬陽耳所以三陰之證並無惡風惡風雖在表而發散又自不同若無汗惡風則為傷寒當發其汗故用麻黃湯若汗出惡風則為中風當解其肌故用桂枝湯里證雖具而惡風未罷皆當先解其外也發熱惡風為表虛屬太陽病見發熱太陽病條發汗後遂汗漏不止其證似風濕相搏證背惡風汗出小便不利四肢難以屈伸但心下不滿者身不痛用桂枝加附子湯見自汗風濕相搏者骨節煩疼掣痛用甘草附子湯方見體痛身熱惡風項強脅滿手足溫而渴者用小柴胡湯見脅痛頭痛傷寒頭痛雖屬三陽惟太陽經獨多蓋太陽為病屬表而頭痛專為主表雖有傷寒六七日頭痛不大便有熱而與承氣湯下之者卻云若小便清者知熱不在裡仍在表是知頭痛屬表明矣太陰少陰二經之脈從足至胸而還不上循頭故無頭痛惟厥陰脈循喉嚨之後上連目系與督脈會於巔亦有頭痛乾嘔吐涎沫吳茱萸湯一證卻無身熱亦與陽證不同也然風溫病在少陰濕溫病在太陰而頭反痛至於陰毒亦然是又不可拘拘為者內因頭痛作止有時外因頭痛常常有之直須傳入里方罷發熱頭痛惡風屬太陽方論見太陽病發熱大便汗不利六七日頭痛身熱小便赤者宜承氣湯若小便利者知不在裡仍在表鬚髮汗若頭痛者必衄宜桂枝湯論見胃實服和解桂枝湯或下之仍頭項強痛翕翕發熱兼心下滿微痛小便不利者桂枝去桂加茯苓白朮湯方論見項強太陽下中風下利嘔逆表解者可攻之其人漐漐汗出發作有時頭痛心下痞硬引脅下痛乾嘔短氣汗出不惡寒者表解里未和也十棗湯方論見脅滿痛張或謂十棗湯與桂枝去桂加茯苓白朮湯二者皆屬飲傢俱有頭項強痛之病何也此經絡所繫非偶爾而言也針經曰太陽膀胱之脈起於目內眥皆上額交巔上其支者從巔上至耳上角直者從巔入絡腦還出至下項循肩膊內俠脊抵腰中入循膂絡腎屬膀胱上文所絡腎者即三焦也夫三焦者為陽氣之父決瀆之官引導陰陽開通閉塞水道出以化氣而言也緣太陽經多血少氣既病則氣愈弱其時表病而裡熱未甚微渴而恣飲水漿為水多氣弱不能施化遂停伏於內則本經血氣因而凝滯致有頭痛項強之患矣若伏飲流行經絡疏利而頭痛自愈矣病溫發熱頭痛脈反沉若不瘥身痛當救里四逆湯論見發熱太陽病刺頭痛至七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈傷寒自一日至六日傳三陽三陰經盡至七日當愈經曰七日太陽病衰頭痛少愈若七日不愈則太陽之邪再傳陽明針足陽明為迎而奪之使經不傳則愈吳脈浮頭痛太陽也須刺腕骨京骨又云表證頭疼惡寒發熱刺合谷陽明和解身熱頭痛漱水不欲咽必發衄脈數者犀角地黃湯茅花湯見鼻衄陽明病表裡大熱煩渴引飲頭痛如破者宜竹葉石膏湯陽明頭痛不惡寒反惡熱大便實調胃承氣湯陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛內經曰巨陽受邪少陰為里得熱則上從之厥也太陽與少陰為合此證當是太陽未全罷耳經又曰陽明則喘而啘啘則惡人小便利者寒邪內攻肢厥頭痛者寒邪外攻也吳陽明頭痛額前目疼鼻乾脈長也無汗者葛根加蔥白白芷汗之若有汗曾經發汗頭痛不解者宜葛根蔥白湯主之若不惡風而反惡熱自汗煩渴脈洪數飲水頭疼者白虎加白芷湯主之若內有燥屎蒸蒸發熱頭痛者調胃承氣湯主之凡陽明頭痛無汗者葛根麻黃蔥白白芷石膏之屬也有汗則白芷石膏葛根川芎湯也傷寒和解脈弦細頭痛發熱者屬少陽不可發汗汗之則譫語此屬胃胃和則愈胃不和則煩而悸宜小柴胡湯論見口苦吳少陽經頭痛頭角或耳中痛脈弦數口苦發熱往來寒熱者並用小柴胡湯和之一方加川芎尤妙蓋川芎亦膽經藥也凡少陽頭痛不分有汗無汗皆以柴胡湯主之不時頭痛及發寒熱脈緊不大即是上膈有痰瓜蒂散吐之頭痛乾嘔吐涎沫者吳茱萸湯方論見吐活人云厥陰頭痛為欲愈小建中湯活若已發汗或未發汗頭痛如破者用連須蔥白湯連須蔥白湯方蔥白連須切半升生薑二兩上以水二升煮取一升分二次溫服再不止者宜服後方葛根蔥白湯方葛根芍藥知母各半兩川芎蔥白生薑各一兩上以水三升煎至一升熱服若不時頭疼胸中滿及發寒熱脈緊而不大者即是膈上有涎宜用瓜蒂末一錢暖水調下吐涎立愈云傷寒汗下後頭痛起目眩者宜獨活湯防風獨活旋覆花當歸各七錢上㕮咀姜水同煎服傷寒熱病後頭痛不止者用石膏川芎湯石膏川芎各一兩上㕮咀每服五錢水煎服海太陽頭痛有汗桂枝湯無汗麻黃湯陽明頭痛白虎湯少陽頭痛小柴胡湯太陰頭痛脈浮桂枝湯脈沉理中湯俱加川芎細辛少陰頭痛小柴胡湯麻黃附子細辛湯厥陰頭痛外傷本經桂枝麻黃各半湯嘔而微吐苦水者吳茱萸湯垣太陰頭痛者必有痰也少陰頭痛者足寒而氣逆也蓋太陰少陰二經雖不至頭然痰與氣逆壅於膈中則頭上氣不得暢降而為痛也云如脈浮而頭痛過在手足太陽刺完骨京骨如脈浮而長過在手足陽明刺合谷衝陽如脈浮而弦過在手足少陽刺陽池邱墟風府風池此刺頭痛之法也集傷寒頭痛刺谷攢竹項強發熱惡風項強者屬太陽方論見太陽病發熱太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之太陽病項背𠘧𠘧無汗而惡風者葛根湯主之皆發散之劑也而有輕重不同者蓋發熱汗出惡風為表虛表虛者可解肌無汗惡風者為表實表實者可發汗是以為治不同也太陽傷寒項背強其或太陽中風加之寒濕而成莖者亦項強也經曰病者身熱足寒頸項強急惡風時頭熱面赤目脈赤獨頭面搖動卒口噤背反張者痙病也金匱曰太陽病項背強𠘧𠘧然脈反沉遲者此為痙桂枝加栝蔞湯主之服桂枝湯汗或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯張或問上條所云頭項強痛此邪氣仍在表也雖經汗下而未解猶宜解散之何故去桂加茯苓白朮湯主之是無意於表也豫曰此非桂枝證乃屬飲家也夫頭項強痛既經汗下而不解心下滿而微痛小便不利此為水飲內蓄邪不在表故云去桂枝加茯苓白朮若得小便利水飲行腹滿減而熱自除則頭項強痛悉愈矣且如十棗湯證頭亦痛乃邪熱內蓄而有伏飲故頭痛其飲水頭痛不須攻表但宜逐飲飲盡則病安矣傷寒和解四五日身熱惡風頭項強脅下滿手足溫而渴者小柴胡湯若下後不能食身黃小便難者與柴胡湯必反重方論俱見脅痛結胸下者項強如柔痙狀下之則和大陷胸丸方論見結胸太陽刺與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞不可汗汗則譫語脈弦五六日譫語不止刺期門成太陽之脈絡頭下項頭項強痛者太陽表病也少陽之脈循胸絡脅如結胸狀心下痞硬者少陽里病也太陽少陽相併為病不純在表故頭項不但強痛而或眩冒亦未全入里故時如結胸心下痞硬此邪在半表半裡之間也刺大椎第一間肺俞以瀉太陽之邪刺肝俞以瀉少陽之邪邪在表則可發汗邪在半表半裡則不可發汗發汗亡津液損動胃氣少陽之邪因干於胃土為木刑則發譫語脈弦至五六日傳經盡邪熱去而譫語當止若不止為少陽邪熱甚也刺期門以瀉肝膽之氣宜柴胡桂枝栝蔞實柴胡加龍骨湯太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞慎勿下之成心下痞硬而眩者少陽也頸項強者太陽也刺大椎肺俞以瀉太陽之邪以太陽脈下項夾脊故爾肝俞以瀉少陽之邪以膽為肝之府故爾太陽為在表少陽為在裡即是半表半裡證前證云不可發汗汗則譫語是發汗攻太陽之邪少陽之邪益甚於胃必發譫語此云慎勿下之攻少陽之邪太陽之邪乘虛入里必作結胸經曰太陽少陽並病而反下之成結胸小柴胡加桂亦可桂枝去桂加茯苓白朮湯方芍藥生薑白茯苓白朮各一兩半甘草一兩大棗六枚上㕮咀每服五錢水煎溫服小便利即愈心下滿痛小便利者成結胸小便不利為停飲故加苓朮以行之項強卒口噤背反張為痙方論見雜病痙門體痛體痛乃六經俱有之證有表有里有寒有熱有風有濕如太陽傷寒榮血不利身疼者宜發汗若汗後脈沉遲體痛者又宜溫之中晦身疼者白虎湯解之裡寒外熱身疼者先當救里而後攻表寒在三陰則脈沉身痛風在三陽則支節煩疼四逆柴胡之劑可不審哉太陽身痛但拘急耳中濕身痛不可轉側陰毒身痛體勢沉重宛如被杖以此別之太陽汗發熱惡寒身體痛者屬太陽病麻黃湯大青龍湯是也方論見太陽病發熱下同若和解兼心下支結者柴胡加桂枝湯若兼下利清穀腹脹者先以四逆溫里後以桂枝發表若尺脈遲者血少榮氣不足活人先以黃耆建中湯養其血俟尺脈回卻用柴胡等湯和解之黃耆建中湯方黃耆桂枝各一錢半白芍藥三錢甘草一錢上四味以水一鍾半姜五片棗二枚煎至八分去滓入稠餳一大匙再煎服舊有微溏或嘔者不用餳按熱多寒少尺脈遲者榮血不足黃耆建中湯夫血不足而用黃耆者黃耆味甘加以甘草大能生血此仲景之妙法蓋稼穡作甘甘能補胃胃為氣血之海氣血所從以生又內經曰無陽則陰無以生以甘益胃而生血旨哉今人但知參耆為氣藥故表而出之發汗後身體痛脈沉遲者桂枝加芍藥生薑人參新加湯主之桂枝人參各一兩半芍藥生薑各二兩甘草一兩大棗六枚上㕮咀每服五錢水煎溫服成汗後身痛邪氣未盡也脈沉遲榮血不足也經云其脈沉者榮氣微也又云遲者榮血不足血少故也與桂枝湯以解未盡之邪加芍藥生薑人參以益不足之血張或云經言表邪盛脈浮而緊法當身疼痛宜以汗解之況身疼皆系表邪未盡此又加人參芍藥生薑以益血何也豫曰表邪盛則身疼血虛則身亦疼其脈浮緊者邪盛也其脈沉微者血虛也盛者損之則安虛者益之則愈仲景凡言發汗後以外無表證里無熱證止余身疼一事而已若脈稍浮盛則為表邪未盡解今言脈沉遲此血虛而致然也故加人參生薑芍藥以益血病溫發熱頭痛脈反沉若不瘥身痛當救里四逆湯論見發熱傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之成傷寒與中風家至七八日再經之時則邪氣多在裡身必不苦疼痛今日數多復身體疼煩不能自轉側者風濕相搏也煩者風也身疼不能自轉側者濕也經曰風則浮虛脈經曰脈來澀者為病寒濕也不嘔不渴里無邪也脈得浮虛而澀身骨疼煩知風濕但在經也與桂枝附子湯以散表中風濕桂枝附子湯方桂枝去粗皮四兩附子三枚炮去皮破八片生薑三兩切甘草炙二兩大棗十二枚擘上五味以水六升煮取二升去滓分溫三服成風在表者散以桂枝甘草之辛甘濕在經者逐以附子之辛熱薑棗辛甘行榮衛通津液以和表也若其人大便硬小便自利者去桂枝加白朮湯主之成桂發汗走津液此小便利大便硬為津液不足去桂加朮風濕相搏骨節煩疼掣痛不能屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之甘草白朮各一兩桂枝二兩附子一枚炮上㕮咀作四劑水煎溫服活人云身腫者加防風一兩悸氣小便不利者加白茯苓一兩半陽明病欲食小便反不利大便自調其人骨節疼翕翕如有熱奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈桂枝湯太陰中風四肢煩疼陽微陰澀而長者為欲愈少陰病身痛手足寒骨節痛脈沉者附子湯少陰病至四五日腹痛小便不利四肢沉重疼痛自下利者有水氣用真武湯厥陰大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者用四逆湯身體痛下利方論見下利條身體痛吐利為霍亂方論見吐利條身體痛手足寒若脈沉但欲寐者附子湯方論見但欲寐若大汗出熱不去內拘急自利惡寒者四逆湯方論見下利若夏月中暑脈虛而渴者白虎加人參湯方論見中暑身痛如被杖面目青咽痛者為陰毒升麻鱉甲去雄黃蜀椒湯方論見陰毒垣風濕相搏一身盡痛者補中益氣湯加羌活防風升麻藁本蒼朮治之如病去勿再服以諸風藥損人元氣而益其病故也海神術湯治風濕惡寒脈緊無汗白朮湯治風濕惡風脈緩有汗俱見傷寒發熱條上二術湯治風濕又當隨證加減其詳並見痙條及白朮湯神術湯二湯後活杏仁湯治風濕身體疼痛惡風微腫桂枝二兩麻黃去節湯泡干芍藥天門冬去心各一兩生薑一兩半杏仁二十五枚去皮尖炒上㕮咀每服五錢水煎溫服垣麻黃復煎湯治陰室中汗出懶語四肢困倦乏力走疰疼痛乃下焦伏火不得伸浮而躁熱汗出一身疼痛蓋風濕相搏也以麻黃髮汗漸漸發之在經者亦宜發汗況值季春之月脈緩而遲尤宜發之令風濕去而陽氣升困倦乃退血氣俱得生旺也麻黃去節用水五盞先煎令沸去上沫渣再煎至三盞方入下藥黃耆各二錢白朮人參柴胡根防風生地黃各五分羌活黃柏各一錢甘草杏仁三個去皮尖上㕮咀作一服入麻黃湯煎至一盞臨臥服勿飽服當歸拈痛湯治濕熱為病身體疼痛方見雜病身體痛門
