body:
  text: 卷三陽明病胃實不大便自汗不得臥潮熱譫語狂亂循衣摸床渴嘔黃陽明之為病胃家實是也謂之正陽陽明屬下證輕則大柴胡湯重則大小承氣湯此邪自陽明經傳入腑者經曰陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿有潮熱者此欲解可攻裡也手足濈然汗出者此是大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹滿不通者可與小承氣湯微和胃氣勿令大泄下謂陽明亦有在經者未全入腑猶宜解外縱有大滿大府不通亦不過小承氣湯微下之入胃在經猶宜兩審也其陽明一證少有自病多因太陽傳入兼與太陽陽明合病用葛根湯者是也少陽陽明合病用黃芩芍藥湯者是也自少陽傳入陽明及未合併病者亦然陽明經治法有汗吐下溫和解刺汗桂枝湯麻黃湯五苓散此亦作汗劑麻黃連翹赤小豆湯吐梔子豉湯下調胃承氣湯大承氣湯抵當湯麻仁丸茵陳蒿湯小承氣湯溫吳茱萸湯四逆湯和解白虎湯白虎加人參湯豬苓湯小柴胡湯蜜導煎豬膽汁土瓜根梔子柏皮湯刺熱入血室刺期門問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也經曰趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約麻仁丸主之太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中躁煩熱大便難是也宜小承氣湯微溏之蓋少陽復不可下也按本草大黃酒浸入太陽經酒洗入陽明經病之高下全在酒之多少以引之耳又按太陽陽明正陽陽明承氣湯中俱用酒浸惟少陽陽明為下經故小承氣湯中不用酒浸也以此推之則太陽陽明當用調胃承氣湯蓋以調胃承氣既附在太陽篇中而大黃下注曰酒浸正陽陽明當用大承氣其大黃注曰酒洗少陽陽明當用小承氣湯不惟大黃不用酒浸洗而少陽禁汗下故去芒硝之峻劑而且當少少與之也書此以駁成氏之誤又須識太陽陽明脾約丸少陽陽明又可大柴胡也又有説在不大便之條問曰何緣得陽明病答曰太陽病發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也成本太陽病不解因發汗利小便亡津液胃中乾燥太陽之邪入腑轉屬陽明古人登廁必更衣不更衣者通為不大便不更衣則胃中物不得泄故為內實胃無津液加之蓄熱大便則難為陽明裡實也傷寒脈浮而緩手足自溫者是系在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也成浮為陽邪緩為脾脈傷寒脈浮緩太陰客熱邪在三陽則手足熱邪在太陰則手足溫邪在少陰厥陰則手足寒今手足自溫是知系在太陰也太陰土也為邪蒸之則色見於外當發身黃小便自利者熱不內蓄不能發黃至七八日大便硬者即太陰之邪入腑轉屬陽明也陽明病若能食名中風不能食名中寒成陽明病以飲食別受風寒者以胃為水穀之海風為陽邪陽氣殺穀故中風者能食寒為陰邪陰邪不殺穀故傷寒者不能食陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛按目眩之眩其字從目從玄謂其眼中黑暗也頭眩之眩當作若藥不瞑眩之眩訓之謂眩憒亂也謂其頭岑岑然憒亂而不寧也凡書皆當活看不可拘執成陽明病身不重痛但頭眩而不惡寒者陽明中風而風氣上攻也經曰陽明病若能食名中風風邪攻胃胃氣上逆則咳咽門者胃之系咳甚則咽傷故必咽痛若胃氣不逆則不咳其咽亦不痛也胃氣主嘔肺氣主咳成氏以胃氣上逆則咳恐非蓋風邪侵肺也肺雖不為足經肺主氣風為氣類陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦成不能食胃中本寒攻其熱復虛其胃虛寒相搏故令噦也經曰關脈弱胃氣虛有熱不可大攻之熱去則寒起此之謂也陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也成陽明病脈遲則邪方入里未化為熱也胃中有寒食難用飽飽則微煩而頭眩者穀氣與寒氣相搏也寒熱相搏必小便難利者不能發黃言谷熱得泄也小便不利則穀氣醞釀成熱不得泄出身必發黃疸黃也以其發於穀氣之熱故名谷疸熱實者下之則愈脈遲為寒故雖下之只益其寒腹滿亦不減也經曰脈遲尚未可攻陽明病欲解時從申至酉止陽明燥金旺於申酉戌向旺時是為欲解傷寒嘔多雖有陽明證不可攻也見嘔陽明病面合赤色不可攻攻必發熱色黃小便不利也成合通也陽明病面色通赤者熱在經也不可下之下之虛其胃氣耗其津液經中之熱乘虛入胃必發熱色黃小便不利也張夫陽明病理必近於可下但以面赤其熱猶在經故云不可攻若攻之則經中之熱悉入於胃郁蓄而發黃色譬如下之太早成結胸之類陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈陽明病腹滿者為邪氣入腑可下之心下硬滿則邪氣尚淺未全入腑不可便下之得利止者為邪氣去正氣安正氣安則愈若因下利不止者為正氣脫而死尚淺淺字不如高字胃實不大便大便難大便硬燥屎成不大便大便難大便硬燥屎悉屬裡證宜下者多矣然而有表未罷風濕相搏尤宜先解表已而下之可也如經曰傷寒不大便六七日頭疼有熱者小便清知不在裡仍在表是也其證多見於陽明蓋胃土萬物所歸無所復傳自太陽少陽傳入者衆所共知而於三陰傳入者鮮或能識若能熟視其微則三陰有急下之證多矣豈非仲景之微意歟胃實有表者先解表傷寒兼太陽不大便六七日有汗桂枝頭痛有熱者與承氣湯其小便清者知不在裡仍在表也須當發汗若頭痛者必衄宜桂枝湯三時羌活湯成不大便六七日頭痛有熱者故宜當下若小便清者知里無熱則不可下經曰小便數者大便必硬不更衣十日無所苦也況此不大便六七日小便清者不可責邪在裡是仍在表也與桂枝湯以解外若頭痛不已為表不罷郁甚於經迫血妄行上為衄也丹謹按外證未解不可下下為逆今頭痛有熱宜解表反與承氣正是責其妄下之過也故下文又言小便清者知其無里邪不當行承氣又繼之曰當鬚髮汗日頭痛必衄血宜桂枝湯反復告戒論意甚明而注反直曰故當宜下想因六七日不大便爾雖不大便他無所苦候表解然後攻之正仲景法也注意似未瑩陽明病無汗麻黃脈浮無汗而喘者發汗則愈宜麻黃湯陽明病兼少陽脅下硬滿大便不利而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然汗出而解也陽明病腹滿不大便舌上苔黃者為邪熱入腑可下若脅下硬滿雖不大便而嘔舌上白苔者為邪未入腑在表裡之間與小柴胡湯以和解之上焦得通則嘔止津液得下則胃氣因和汗出而解陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治成脈浮大為陽風在表也弦則為陰風在裡也短氣腹滿脅下及心痛風熱壅於腹中而不通也若寒客於內而痛者按之則寒氣散而痛止此以風熱內壅故雖久按而氣亦不通陽明病鼻乾不得臥自汗出者邪在表也此鼻乾不得汗而嗜臥者風熱內攻不於裡也一身及面目悉黃小便難有潮熱時時噦者風熱攻於胃也陽明之脈出大迎循頰車上耳過客主人熱勝則腫此風熱在經故耳前後腫刺之經氣通腫則小瘥如此者外證罷則可攻若外證不解雖過十日脈續浮者邪氣猶在半表半裡與小柴胡湯若其脈但浮而不弦又無諸里證者是邪但在表也可與麻黃湯如發其汗若不尿腹滿加噦者關格之疾也故云不治難經曰關格者不得盡其命而死口苦咽乾脈浮緊宜和陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也發熱惡寒表未解也而誤下之則亡陰無陰則陽無以化故腹滿小便難也許學士云宜小柴胡湯陽明腹滿脈浮緊口苦咽乾而喘若發熱汗出不惡寒反惡熱身重者忌發汗忌加燒針忌下論見自汗陽明病脈浮而緊者潮熱作有時但浮者必盜汗出上胃家實不大便雖三尺之童亦知可下也殊不知仲景之法雖有胃實證若表未解及有半表者亦先用桂枝柴胡以解外然後視虛實消息之也胃實表解無證者忌攻大便硬者導之陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便時宜用蜜煎導而通之若土瓜根及入豬膽汁皆可導之蜜煎導法用蜜七合入銅器中微火熬稍凝似飴狀攪之勿令焦候可丸以手捻作挺子令頭鋭大如指長二寸許乘熱急作之納穀道中用手急捺住欲大便時乃去之又豬膽汁方用大豬膽一個瀉汁和醋少許和勻灌入穀道中如飯時頃大便自去便硬無所苦者俟之太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散成太陽病脈陽浮陰弱為邪在表今寸緩關浮尺弱邪氣漸傳裡則發熱汗出復惡寒者表未解也傳經之邪入裡裡不和者必嘔此不嘔但心下痞者醫下之早邪氣留於心下也如其不下者必漸不惡寒而渴太陽之邪轉屬陽明也若吐若下若發汗後小便數大便硬者當與小承氣湯和之此不因吐下發汗後小便數大便硬者是無滿實雖不更衣十日無所苦也候津液還入胃中小便數少大便必自出也渴欲飲水者少少與之以潤胃氣但審邪氣所在以法救之如渴不止與五苓散是也張或問上條云小便數者大便必硬不更衣十數日無所苦也嘗有四五日六七日不大便者即為攻之今言十日不更衣而不用攻伐何也曰此非結熱乃津液不足雖十日不更衣亦無所苦也經曰陽明病本自汗出醫更重發汗病已瘥尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行本小便日三四行今日再行故知大便不久為出不便數少以津液當還胃中故知不久大便也夫不便者若有潮熱譫語可下之證者然後可以攻之其不大便而無諸下證者此津液不足當須自審慎勿以日數久而輒為攻下也陽明病本自汗出醫更重發汗病已瘥尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也胃實表解有證者隨證攻之陽明病潮熱不大便六七日恐有燥糞欲知之法少與小承氣湯轉失氣者有燥屎可攻若不轉失氣者無燥屎不可攻方論見潮熱陽明病汗出大便硬而譫語者宜小承氣湯方見譫語不大便腹滿者宜下之若但繞臍痛者則為燥屎宜承氣湯若心下至小腹滿痛者則為結胸宜陷胸湯論見腹痛陽明病不吐不下心煩者可與調胃承氣湯成注吐後心煩謂之內煩下後心煩謂之虛煩今陽明病不吐不下心煩則是胃有鬱熱也與調胃承氣湯以下鬱熱按陽明一證分為太陽正陽少陽三等而以調胃大小承氣下之者按本草曰大黃酒浸入太陽經酒洗入陽明經浸久於洗得酒氣為多故能引之於至高之分若物在山巔人迹不及必射以取之也故仲景以調胃承氣收入太陽門而大黃下注曰酒浸及詳其用本湯一則曰少少溫服二則曰當和胃氣與調胃承氣湯又詳本湯之證則曰不吐不下心煩者又發汗不解蒸蒸發熱又吐後腹脹滿是太陽陽明去表未遠其病在上不當攻下故宜緩劑以調和之也及至正陽陽明則皆曰急下之與大承氣湯而大承氣湯中大黃下注曰酒洗是洗輕於浸微升其走下之性以治其中也至少陽陽明則去正陽而逼太陰其分為下故小承氣湯中大黃不用酒製少陽不宜下故又曰少與曰微溏之勿令大泄下此仲景之妙法也東垣不審胃之云者乃仲景置調胃承氣於太陽篇太陽不宜下故又稱胃以別之卻踵成氏之謬以小承氣治太陽脾約之證以調胃承氣治正陽陽明大承氣之證余故不能無辨小便不利大便乍難乍易有微熱喘冒不臥者宜大承氣湯論見不得臥傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯成諸脈皆屬於目傷寒六七日邪氣入里之時目中不了了睛不和者邪熱內甚上熏於目也無表裡證大便難者裡實也身大熱者表熱也身微熱者裡熱也針經曰熱病目不明熱不已者死此目中不了了睛不和則證近危惡也須急與大承氣湯下之趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約麻仁丸主之成趺陽者脾胃之脈診浮為陽知胃氣強澀為陰知脾為約約者儉約之約又約束之約內經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行是脾主為胃行其津液者也今胃強脾弱約束津液不得四布但輸膀胱致小便數大便難與脾約丸通腸潤燥麻仁丸方麻子仁二升芍藥半斤枳實半斤炒大黃去皮一斤厚朴去粗皮炙一尺杏仁一斤去皮尖別熬作脂上六味為末煉蜜丸如桐子大飲服十丸日三服漸加以愈為度成內經曰脾欲緩急食甘以緩之麻子杏仁之甘緩脾而潤燥津液不足以酸收之芍藥之酸以斂津液腸燥胃強以苦泄之枳實厚朴大黃之苦下燥結而泄胃強也陽明證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易去聲其色必黑宜抵當湯主之方見蓄血無表裡證下後脈數不解消穀易飢六七日不大便者有瘀血宜抵當湯許有一士家病者二人皆旬日矣一則身熱無汗大便不通小便如澀神昏而睡診其脈長大而實豫用承氣下之而愈一則陽明自汗大便不通小便利津液少口乾燥其脈亦大而虛作蜜煎三進之下燥糞得溏利而解其家曰皆大便不通何以治之異豫曰二證雖相似然自汗小便利者不可蕩滌五臟為無津液也然則傷寒大證相似兩證稍有不同宜豫細斟酌正如格局看命雖年月日時皆同而貴賤窮通不相侔者於一時中有淺深故知不可不謹便初硬後溏仲景論中有四證內有二證不言小便一證言小便不利一證言小便少其二證不言小便者陽明病潮熱不大便六七日與小承氣湯不轉失氣者此但初硬後必溏不可攻之此胃中邪熱未作實者也又太陽病下之心中懊憹而煩腹滿者初硬後必溏此虛煩熱在上胃中無燥屎者也其一證小便不利者陽明病中寒不能食小便不利手足濈然汗出此欲作痼瘕必大便初硬後溏所以然者以胃中水穀不別故也又一證言小便少者服承氣湯一升若不大便六七日小便少者雖不能食但初硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之是知仲景測大便法皆以小便覘之如小便清知不在裡利不止者利其小便小便數少津液當還入胃中必大便皆可驗者然小便利屎定硬固為可攻亦有小便自利大便硬而不可攻者何哉陽明病自汗或發汗小便自利此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導蓋非裡實故不可攻也太陽病又一證云若吐若下若發汗微煩小便數大便硬與小承氣湯和之此兩證汗後大便硬小便利皆同而治法不同者後證為有傳邪故微煩又因發汗吐下後小便數內亡津液大便硬是熱邪入里故以小承氣利之至若前證小便自利以無傳邪故無煩證大便雖硬不得為裡熱但腸頭乾燥正可用蜜導也讀仲景書者宜詳究焉不得臥不得眠陰陽皆有之正病於不得眠者陽明也若少陰當病於欲寐今乃不得眠緣陽氣入少陰經非少陰正病也有因汗下而然者有不因汗下而然者有因火逆而然者治見本條但不得眠皆為熱證其有太陽汗下之後晝日燥躁不得眠一證雖用乾薑附子湯蓋復其汗下所亡之陽非治其所感之寒病也不得眠為常證然少陰脈沉細自利煩躁不得眠者死傷寒發熱下利厥逆煩躁不得臥者亦死俱為正氣弱陽不能復故也活人云汗為火之液汗多則神昏故不眠大熱則神不清故不眠大下則動血心主血故不眠瘥後熱氣未散陰氣未復故不眠太陽病二三日不得臥但欲起心下必結脈微弱者此有寒分也桂枝加厚朴杏子湯傷寒脈浮以火劫之驚狂起臥不得安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯下後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱乾薑附子湯衄家不可汗汗則額上陷脈急緊直視不眴不得眠黃芩芍藥湯傷寒下後心煩腹滿臥起不安者梔子厚朴湯發汗吐下後虛煩不得眠反覆顛倒心中懊憹梔子豆豉湯太陽病發汗後胃中乾燥不得眠欲飲水者少與之則愈陽明身熱目疼鼻乾不得臥尺寸脈俱長者陽明受病也病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若加燒針必怵惕煩躁不眠宜梔子豉湯少陰病欲寐二三日後心煩不得臥者黃連阿膠湯主之黃連阿膠湯方黃連四兩黃芩二兩芍藥二兩阿膠三兩雞子黃二枚上五味以水五升先煮三物取二升去滓納膠熔盡少冷納雞子黃攪令和溫服七合日三服成陽有餘以苦除之黃連黃芩之苦以除熱陰不足以甘補之雞子黃阿膠之甘以補血酸收也泄也芍藥之酸收陰氣而泄邪熱也然服雞子黃其病有不愈者今議加當歸人參茯苓白朮各等分與前藥四味服之立效少陰病下利欲寐六七日後咳而嘔渴心煩不得眠者宜豬苓湯論見下利少陰病但欲寐脈沉細不煩欲吐至五六日自利復煩躁不得寐者死發熱下利厥逆煩躁不得臥者死吳太陽脈浮數身疼無汗煩躁不眠者宜汗之則愈陽明標熱頭額痛目疼身熱鼻乾不得臥脈長者宜葛根解肌湯汗之若自汗脈洪數表裡俱熱煩渴舌燥飲水者白虎加人參湯主之若蒸蒸發熱大便祕硬者調胃承氣湯下之外有傷寒已解或因食復劇煩悶乾嘔口燥呻吟錯語不得眠者黃連解毒湯主之若表裡大熱舌燥飲水者人參白虎湯合解毒湯主之凡少陽發熱口苦心煩不得眠脈弦數者小柴胡加黃連山梔子之類若虛弱人津液不足者加麥門冬酸棗仁之類太陽病發汗後不得眠脈浮數微熱煩渴小便不利者五苓散主之脈數大者人參白虎湯或竹葉石膏湯不可用五苓也凡汗下後虛煩不得眠者加味溫膽湯酸棗仁湯梔子烏梅湯硃砂安神丸之類選而用之附酸棗仁湯治虛煩擾奔氣在胸中不得眠者酸棗仁炒人參茯苓各一錢半桂心五分石膏二錢半知母甘草各一錢生薑三片上作一服水二鍾煎至一鍾去滓臨臥服千金流水湯治虛煩不得眠麥門冬去心半夏甘草黃連遠志人參萆薢以上各一錢茯神酸棗仁各一錢半桂心五分生薑三片米一合上用長流水二鍾半先煮水令蟹目沸以杓揚萬遍取湯二鍾煎藥至一鍾去滓溫服加味溫膽湯治太陽病後虛煩不得眠此膽寒也半夏洗酸棗仁炒各一錢半緑枳實陳皮甘草各一錢人參二錢半茯神二錢竹茹一團生薑三片上用水二鍾煎至一鍾去滓溫服若心煩內熱者倍加黃連麥門冬若口燥舌乾者去半夏加麥門冬五味子天花粉若表熱未清者加軟苗柴胡若內虛大便自利者去枳實加白朮茯苓若內實心煩顛倒者加山梔仁酸棗湯治吐下後晝夜不得眠酸棗仁炒二錢半麥門冬茯神當歸身各二錢甘草知母川芎各一錢半乾薑三分生薑三片上煎法同前梔子烏梅湯梔子黃芩甘草人參麥門冬各一錢柴胡二錢烏梅二枚生薑三片竹葉十四片上煎法同前黃連解毒湯治大熱乾嘔錯語呻吟不得眠黃連二錢半黃芩黃柏各半兩梔子四個水二盞半煎至一盞半去滓分二服自汗附盜汗頭汗手足汗無汗不得汗衛氣者護衛皮膚肥實腠理禁固津液不得妄泄邪氣干之則不能衛固於外由是津液妄泄濈濈然潤漐漐然出不因發散而自汗出也傷風則發熱自汗中暍則汗出惡風而渴風濕甚者則汗多而濡是風與暑濕為邪皆令自汗惟寒邪傷榮而不傷衛是以膚腠閉密汗不出也始雖無汗及傳入里而為熱則榮衛通腠理開亦令汗自出矣自汗又有表裡之別虛實之異若汗出惡風及微惡寒者皆表未解宜發散至於漏不止而惡風及發汗後惡寒者表虛也宜溫之此皆邪氣在表若汗出不惡風寒者此表解里病下之則愈如陽明發熱汗出此為熱越及陽明發熱汗多急下之者是也自汗雖常證或汗出發潤如油如貫珠著身不流皆為不治必手足俱周遍身悉潤漐漐然一時汗出熱已身涼乃為佳兆身熱汗出惡寒屬表病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣和諧故爾以榮行脈中衛行脈外復發其汗榮衛和則愈宜桂枝湯風則傷衛寒則傷榮衛受風邪而榮不病者為榮氣和也衛既客邪則不能與榮氣和諧亦不能衛護皮腠是以常自汗出與桂枝湯解散風邪調和榮衛則愈余詳見前太陽病條兼項強痛者桂枝加葛根湯項強兼骨節煩疼不得屈伸小便不利者甘草附子湯論見風濕身熱條若發汗後遂漏不止惡風者桂枝附子湯論見後條汗出而渴者五苓散不渴者茯苓甘草湯活人云傷風自汗桂枝湯難用鬚子細消息之假令傷風自汗若脈浮而弱設當行桂枝服湯後無桂枝脈息證候而煩者即不可再服也若傷風自汗出而小便數者切不可與桂枝也又太陽病自汗四肢拘急難以屈伸若小便難者可桂枝湯內加附子服之若小便數者慎不可與桂枝附子湯宜服芍藥甘草湯若誤行桂枝附子攻表便咽乾煩躁厥逆嘔吐作甘草乾薑湯與之以復其陽若厥愈足溫更作芍藥甘草湯與之其腳即伸趙有發汗漏風小便難與自汗小便數二證相近似溫仲景亦恐後人誤認故重出一章問答以明之前一證云太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸桂枝附子湯主之蓋是因邪發汗遂漏不止乃服汗藥太過非自汗也惡風者餘邪未盡也小便難四肢急為亡津液筋失所養也乃汗多亡陽外虛經氣病帶表邪不在裡也故宜附子溫經桂枝解表芍藥益血舒筋也此又一證云蓋是脈浮為虛也汗自出微惡寒者陽虛無以衛外也小便數為下焦虛寒不能制水也心煩為陰虛血少也腳攣急乃血為汗奪筋無以潤養也此初得病便自表裡俱虛外無陽證病不在表固不得與桂枝同法設若誤用桂枝攻表重發其汗是虛虛也固得之便厥咽乾煩躁吐逆厥為亡陽不能與陰相順接咽乾為津液寡煩躁吐逆為寒格而上也故宜乾薑以溫里復陽甘草芍藥益其汗奪之血然後可以復陰陽不足之氣得腳伸後或譫語者由自汗小便數胃中先自津液干少又服乾薑性燥之藥以致陽明內結譫語雖然非邪實大滿故但用調胃承氣以調之仍少與之也原其芍藥甘草湯乃是厥愈足溫後專治兩脛攣急之藥非正治脈浮自汗出小便數之藥也今活人書卻云芍藥甘草湯主脈浮自汗出小便數者何也又云通治誤服桂枝湯後病證仍存者愚不知病證何似可用如上仲景藥法蓋嘗復玩味而細繹焉自常人觀之豈不曰自汗小便數證又無自利遽用乾薑溫之因而以致結燥譫語後卻用芒硝大黃寒藥以解其熱似若失次病家遇此必咎醫者以為誤用乾薑熱燥之失後藥先解之差矣殊不知仲景之意不患乎乾薑之熱燥惟患乎正氣之虛正氣之長邪氣之所由消也且自汗小便數等證為表裡俱虛治法必先復其陰陽不足之正氣然非乾薑芍藥甘草不可至於正氣陰陽已復而內有所主則雖胃燥譫語不過大便內結大黃芒硝潤滑而去之而正氣內強不至下脫結燥而正氣安矣以上用藥次第先熱後寒先補後瀉似逆而實順非仲景之妙孰能至是哉後之學者可不以此推廣而應變又何暇辨病家之謬謗也耶若夏月中暑自汗身熱惡寒脈微弱口渴足冷者白虎加人參湯主之治法詳見雜病中暑門身熱汗出不惡寒屬裡為陽明本證問曰陽明外證云何答曰身熱汗自出不惡寒反惡熱也大承氣湯問曰病有得之一日不發熱而惡寒何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也問曰惡寒何故自罷答曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也傷寒轉屬陽明者其人濈然微汗出也中風則有汗傷寒無汗惟入陽明乃有汗故經曰陽明病法多汗兼便硬譫語者下之汗出身熱不惡寒便硬譫語者宜承氣湯論見譫語陽明病發熱汗多者急下之宜大承氣湯許有人患傷寒目痛鼻乾不得臥大便不通尺寸脈俱大已數日一夕汗出豫謂速以大柴胡湯下之醫駭曰陽明自汗津液已涸法當用蜜煎何須苦用下藥豫謂曰子雖知蜜煎為穩當還用大柴胡湯此仲景不傳之妙公安能知之豫力爭竟投大柴胡湯二帖愈仲景論陽明之病多汗者急下之人多謂已是自汗若又下之豈不表里俱虛又如論少陰雲少陽病一二日口乾燥者急下之人多謂病發於陰得之日淺但見乾燥若更下之豈不陰氣愈甚舉此二端則其可疑者不可勝數此仲景之書世人罕能讀也豫謂仲景稱急下之者亦猶急當救表急當救里之説凡稱急者有三變謂才覺汗未至津液乾燥便速下之則為精捷免致用蜜煎也若胸中識得了了自無可疑若未能了誤用之反不若蜜煎之為穩也兼脈浮緊口苦者忌汗不針宜和解陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則心憒憒反譫語若加燒針必怵惕躁不得眠若下則胃中空虛客氣動膈心中懊憹舌上有苔者梔子豉湯主之若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之注云脈浮發熱口苦者邪在表脈緊自汗腹滿不惡寒者邪在裡此表裡俱有邪宜和解兼小便不利者分欲食不欲食陽明欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解此水不勝穀氣與汗共並脈緊則愈桂枝湯羌活湯之類陽明病若中寒不能食小便不利手足濈然汗出此欲作痼瘕必大便初硬後溏以胃中冷水穀不別故也厚朴生薑甘草半夏人參湯吳茱萸湯理中湯之類兼心下痞汗出心下痞滿有二證其痞按之濡軟不通而惡寒者宜附子瀉心湯其痞按之硬引脅痛而身體不惡寒者宜十棗湯方論見痞門兼下利汗出下利熱不去厥逆惡寒者四逆湯下利清穀者通脈四逆湯汗出下利有微熱者其脈數自愈脈緊未愈六七日後發熱而利其人汗出不止者死俱見下利兼吐利脈緊反汗出而咽痛吐利者少陰病亡陽吐利汗出手足厥冷脈微欲絶四逆湯吐利止汗出而厥脈微欲絶者通脈四逆加豬膽汁湯俱見吐利海太陽自汗桂枝湯陽明自汗白虎湯少陰自汗四逆湯陽明證身熱目痛鼻乾不得臥不惡寒而自汗或惡熱而尺寸俱浮者白虎湯主之傷寒尺寸脈俱長自汗大出身表如冰石脈傳至於里細而小及瘧疾但寒不熱其人動作如故此陽明傳入少陰戊合癸即夫傳婦也白虎加桂枝主之然脈雖細小當以遲疾別之此證脈疾而非遲故用此法白虎加桂枝湯方見雜病瘧門如中暑自汗微惡寒者亦宜服之活傷寒應發汗而動氣在左不可發汗發汗則頭眩汗出筋惕肉瞤此為逆難治先服防風白朮牡蠣散次服建中湯防風白朮牡蠣散治發汗多頭眩汗出筋惕肉瞤防風牡蠣炒成粉白朮各等分上為細末每服二錢以酒調下米飲亦得日二三服汗止後服小建中湯集傷寒汗多不止內庭瀉合谷瀉復溜瀉似陽明外證太陽病吐後汗出不惡寒發熱關上脈細數曰小逆吐後似陽明而關脈細太陽病發熱汗出不惡寒者為柔痙柔痙似陽明而身反張發汗已身灼熱者名風溫風溫為病脈浮汗出身重多眠汗吐下後自汗二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也成太陽病未解傳併入陽明而太陽證未罷者名曰並病續自微汗出不惡寒者為太陽證罷陽明證具也法當下之若太陽證未罷者為表未解則不可下當小發其汗先解表也陽明之脈循面面色緣緣正赤者陽氣怫鬱在表也當解之熏之以取其汗若發汗不徹者不足言陽氣怫鬱止是當汗不汗陽氣不得越散邪無從出擁甚於經故躁煩也邪循經行則痛無常處或在腹中或在四肢按之不可得而短氣但責以汗出不徹更發汗則愈內經曰諸過者切之澀者陽氣有餘為身熱無汗是以脈澀知陽氣擁鬱而汗出不徹凡經文言或言若言設言假令者皆更端之詞即成氏所謂或為之證也不徹不足言正與可小字相反因太陽故當汗因並陽明故當小發先字最有次第仲景之樞機也下後不可更行桂枝湯若汗出而喘無大熱者與麻黃杏仁甘草石膏湯發汗後不可更行桂枝湯汗出而喘無大熱者麻黃杏仁甘草石膏湯服桂枝大汗出脈洪大者仍與桂枝若形如瘧日再發者汗出必解桂枝二麻黃一湯太陽病發汗後大汗出胃中乾燥不得眠欲飲水者少少與之胃和則愈若脈浮小便不利微熱消渴者五苓散傷寒五六日嘔而發熱柴胡證具而以他藥下之柴胡證仍在者復與柴胡湯雖下之不為逆必蒸蒸而振發熱汗出而解太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之成經言不宜下而便攻之內虛熱入挾熱遂利桂枝證者邪在表也而反下之虛其腸胃為熱所乘遂利不上邪在表則見陽脈邪在裡則見陰脈下利脈微遲邪在裡也促為陽盛雖下利而脈促者知表未解也病有汗出而喘者為自汗而喘也即邪氣外甚所致喘而汗出者為因喘而汗出也即裡熱氣逆所致與葛根黃連黃芩湯以散表邪除裡熱清肌脈促有此證者宜用此方厥陰證脈促手足厥即以當歸四逆湯加吳茱萸主之脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裡虛須表裡實津液自和便自汗出愈成經云諸脈浮數當發熱而淅灑惡寒言邪氣在表也是當汗出愈若下之身重心悸者損其津液虛其胃氣若身重心悸而尺脈實者則下后里虛邪氣來虛傳裡也今尺脈微身重心悸者知下后里虛津液不足邪氣不傳裡但在表也然以津液不足則不可發汗須裡氣實津液足便自汗出而愈宜麻黃湯桂枝加白朮茯苓甘草湯下後桂枝加芍藥湯太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之過也詳發熱太陽病寸緩關浮尺弱其人發熱汗出惡寒不嘔但心下痞者此以醫下之也如不應下病人不惡寒而渴者此轉屬陽明渴欲飲水少少與之宜五苓散傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也詳噦亡陽傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之發汗多若重發汗亡其陽譫語脈短者死脈自和者不死亡陽胃燥譫語者脈短津液已絶不可復治脈自和為正氣未衰而猶可生也宜小柴胡加桂脈陽微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過為陽絶於里亡津液大便因硬也少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之脈微為亡陽表虛不可發汗脈弱澀為亡陰裡虛復不可下宜桂枝芍藥炙甘草湯四逆湯病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利或用桂枝加乾薑湯四逆湯盜汗盜汗者謂睡而汗出也方其睡熟湊湊然出覺則止而不復出矣睡則胃氣行里表中陽氣不致故津液得泄覺則氣行於表而汗止矣雜病盜汗責其陰虛傷寒盜汗由邪氣在半表半裡使然也若邪氣在表則又謂之自汗矣經曰微盜汗出反惡寒者表未解也又陽明當作裡實而脈浮者云必盜汗是猶有表邪也又三陽合病目合則汗是知盜汗邪在表裡之間而悉屬和解明矣非若自汗有表裡虛實之別也太陽病脈浮動數頭痛發熱微盜汗出反惡寒者表未解也詳見結胸陽明病脈浮而緊必潮熱發作有時但浮者必盜汗出活人云脈浮盜汗黃芩湯或柴胡薑桂湯桂枝茯苓白朮湯三陽合病脈浮大上關上但欲眠睡目合則汗成關脈以候少陽之氣太陽之脈浮陽明之脈大脈浮上關上知三陽合病膽熱則睡少陰病但欲眠睡目合則無汗以陰不得有汗但欲眠睡目合則汗知三陽合病膽有熱也小柴胡湯瀉心湯張或謂此證俱屬少陽篇中亦可用小柴胡否答曰可用夫三陽合病其邪發見於脈也浮者太陽也大者陽明也上關上者少陽也但欲眠睡目合則汗此膽有熱脈證相符故出於少陽篇下蓋浮脈無證不可汗大脈無證不可下浮大之脈俱上關知三陽合病而熱在膽也然膽居在半表半裡用小柴胡亦當頭汗頭乃諸陽之會熱蒸於陽故但頭汗出也三陰無頭汗其經不上頭故也遍身有汗謂之熱越但頭汗出而身無汗者熱不得越而上達也如瘀熱在裡身必發黃及熱入血室與其虛煩或陽明被火及水結胸數者皆頭汗出俱是熱不得越故或吐或下以除其熱也且邪但在表則無頭汗之證必也寒濕相搏與邪在半表半裡乃有頭汗如傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩及傷寒五六日頭汗微惡寒手足冰冷心下滿口不欲食大便硬脈細者此皆邪在表裡兩間令頭汗出也濕家但頭汗出欲得被覆向火者寒濕相搏故頭汗也此皆不得謂之逆然小便不利而成關格若頭汗者乃陽脫也經云關格不通不得尿頭無汗者生有汗者死又濕家下後頭額汗出而微喘者亦陽脫也經云濕家下之額上汗出小便不利者死下利不止者亦死二者乃頭汗之逆太陽傷寒十餘日熱結在裡復往來寒熱大柴胡湯但結胸無大熱者此水結胸但頭微汗者大陷胸湯傷寒五六日已汗復下胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解宜柴胡桂枝幹薑湯太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰盛則小便難陰陽俱虛竭則身體枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者其人可治成風為陽邪因火熱之氣則邪氣愈甚迫於血氣使血氣流溢失其常度風與火氣謂之兩陽兩陽相熏灼熱發於外必發身黃若熱搏於經絡為陽盛外熱迫血上行必衄熱搏於內者為陰虛內熱必小便難若熱消血氣血氣少為陰陽俱虛血氣虛少不能榮於身體為之枯燥三陽經絡至頸三陰經絡至胸中而還但頭汗劑頸而還者熱氣炎上搏陽而不搏於陰也內經曰諸腹脹大皆屬於熱腹滿微喘者熱氣內郁也內經曰火氣內發上為口乾咽爛者火熱上熏也熱氣上而不下者則大便不硬若熱氣下入胃消耗津液則大便硬故云或不大便久則胃中燥熱必發譫語內經曰病深者其聲噦火氣大甚正氣逆亂則噦又曰四肢者諸陽之本也陽盛則四肢實火熱太甚故手足躁擾捻衣摸床擾亂也小便利者為火未劇津液未竭而猶可治也宜黃芩梔子柏皮湯衄黃芩湯小便難五苓散小便利津液未竭其不利者上干下竭故名不治大柴胡湯承氣湯太陽病脈浮動數頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲陽氣內陷心中因硬則為結胸若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃趙頭汗出有數種如發黃頭汗出者熱不得越而上泄也背強惡寒頭汗出者寒濕客摶經絡也下血譫語頭汗出者熱入血室虛煩懊憹頭汗出者邪客胸中熏發於上也水結胸頭汗出者水氣停蓄不得外行也陽微結與往來寒熱頭汗出者邪在半表半裡也發黃鼻衄小便難頭汗出者邪風火熱熏灼上炎也此數者皆為邪風所幹而然今活人書卻稱病人表實裡虛元府不開五內乾枯胞中空虛津液寡所致於上數證皆非也外有二證又為頭汗出之逆經云關格不通不得尿頭無汗者生有汗者死又濕家下之額上汗出微喘小便利者死下利不止者亦死以陽氣上脫故也活人書此問不言何以為可治不可治之別陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿此為瘀熱在裡身必發黃茵陳湯主之或用茵陳五苓散三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯陽明病被火額上微汗出小便不利必發黃成陽明病則為內熱被火則火熱相合而甚若遍身汗出而小便利者熱得泄越不能發黃今額上微汗出而小便不利則熱不得越鬱蒸於胃必發黃也茵陳五苓散梔子柏皮湯陽明病下之其外有熱手足溫者不結胸心中憹憹飢不能食但頭汗出梔子豉湯陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈濈然汗出而愈成陽明病熱入血室迫血下行使下血譫語陽明病法多汗以奪血者無汗故但頭汗出也刺期門以散血室之熱隨其實而瀉之以除陽明之邪熱散邪除則榮得通津液得復濈然汗出而解傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦在裡也頭汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯若不了了者得屎而解成傷寒五六日邪當傳裡之時頭汗出微惡寒者表仍未解也手足冷心下滿口不欲食大便硬脈細邪結於裡也大便硬為陽結此邪熱雖傳於裡然以外帶表邪則熱結猶淺故曰陽微結脈沉雖為在裡若純陰結則更無頭汗惡寒之表證諸陰脈皆至頸胸中而還不頭循而上今頭汗出知非少陰也與小柴胡湯以除半表半裡之邪服湯已外證罷而不了了者為裡熱未除與湯取其微利則愈故云得屎而解孫凡水結胸脅間頭必有汗治以半夏茯苓湯活病人表實裡虛元府不開則陽氣上出汗見於頭凡頭汗出者五臟乾枯胞中空虛津液少也慎不可下下之則重虛海頭汗出劑頸而還血證也額上偏多者屬心部為血證也獨益中州脾土以血藥治之其法無以加矣手足汗胃主四肢為津液之主故病則手足汗出也手足汗出為熱聚於胃是津液之旁達也經曰手足濈然汗出大便已硬又曰手足漐漐汗出大便難而譫語二者俱宜下之又陽明中寒不能食小便不利手足濈然汗出此欲作痼瘕不下為宜二者俱手足汗出一則大便初硬後溏胃中冷水穀不別故不可下一則大便難譫語為陽明證具故宜下也二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語下之則愈用大承氣湯陽明病脈遲雖汗出不惡寒身重短氣腹滿而喘潮熱者此外欲解可攻裡也手足濈然而汗出此大便已硬也亦大承氣湯主之詳潮熱陽明病若中寒不能食小便不利手足濈然汗出此欲作痼瘕必大便初硬後溏以胃中冷水穀不別故也厚朴生薑甘草半夏人參湯吳茱萸湯理中湯無汗有數種寒邪在表而無汗者邪氣行於里而無汗者水飲內蓄而無汗者陽虛無汗者經謂太陽病無汗而喘及脈浮緊無汗發熱及不出汗而煩躁陽明病反無汗而小便利二三日嘔而咳手足厥若頭痛及鼻乾不得汗脈浮無汗而喘與其剛痙無汗是數者皆寒邪在表而無汗者也經謂陽明病無汗小便不利心中懊憹身必發黃及傷寒發熱無汗渴欲飲水無表證者白虎加人參湯與夫三陰為病不得有汗惟少陰亡陽一證有得汗是轉屬少陰者也是數者皆邪行於里而無汗者也其水飲內蓄無汗者經謂服桂枝湯或下之仍頭痛項強翕翕發熱無汗心滿微痛小便不利桂枝去桂加茯苓白朮是也其陽虛無汗者經謂脈浮而遲遲為無陽不能作汗其身必癢是也太陽發熱惡寒身疼無汗而喘麻黃湯證發熱惡寒身疼不汗出而煩躁大青龍湯證服桂枝或下之仍頭項強痛發熱無汗心下微痛小便不利桂枝去桂加茯苓白朮湯證項背強𠘧𠘧無汗惡風葛根湯證陽明脈浮無汗而喘麻黃湯證以上俱前見傷寒脈浮發熱無汗其表不解不可與白虎湯渴欲飲水無表證者白虎加人參湯陽明病法多汗反無汗身如蟲行皮中狀者久虛故也胃為津液之主病人久虛津液竭不能為汗胃主肌肉實則為痛虛則為癢宜用黃耆建中湯得津液既和而陽明證仍在以小柴胡湯徐解之陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛陽明病無汗小便不利心中懊憹者必發黃成陽明病無汗而小便不利熱蘊於內而不得越心中懊憹者熱氣鬱蒸欲發於外而為黃也宜茵陳五苓散桂枝柏皮湯少陰病但厥無汗強發之必動其血或從口鼻或從目出名下厥上竭為難治成但厥無汗熱行於里也而強發汗虛其經絡熱乘經虛迫血妄行從虛而出或從口鼻或從目出諸厥者皆屬於下但厥為下厥血亡於上為上竭傷氣損血邪甚正虛故為難治也不得汗太陽病以火熏之不得汗其人必躁到經不解必清血名為火邪成此火邪迫血而血下行也太陽病用火熏之不得汗則熱無從出陰虛被火必發躁也六日傳經盡至七日再到太陽經則熱氣當解若不解熱氣迫血下行必清血清廁也柏皮湯犀角地黃湯太陽病八九日如瘧狀發熱惡寒熱多寒少其人不嘔則便便欲清一日二三度發脈微緩者為欲愈脈微惡寒者此陰陽俱虛不可更汗吐下也面色反有熱色者以不得小汗出身必癢宜桂麻各半湯太陽病二日反燥乃尉其背而大汗出火熱入胃胃中水竭躁煩必發譫語十餘日振栗自下利者為欲解從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數反不數及多大便已頭卓然痛足心必熱穀氣下流故也或云汗多先服桂枝湯後用調胃承氣湯穀氣下流小和之小承氣湯陽明中風脈弦浮大而短氣腹滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身面目悉黃小便難有潮熱時時噦者柴胡湯但脈浮無餘證者麻黃湯或當汗而汗之服湯至三劑而不得汗者死病也或熱病脈躁盛而不得汗者黃帝謂陽脈之極也死此二者為真病不治然有當和解之證汗之而不得汗者和解之力到汗自出而解矣慎莫錯會作死證也潮熱潮熱者若潮汛之來不失其時一日一發按時而發者謂之潮熱若日三五發者是即發熱非潮熱也潮熱屬陽明陽明旺於未申必於日晡時發乃為潮熱太陽病重發汗而復下之不大便五六日舌上燥而渴日晡小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之成重發汗而復下之則內外重亡津液而熱內結致不大便五六日舌上燥而渴也日晡潮熱者屬胃此日晡小有潮熱非但在胃從心下至少腹硬滿而痛不可近者是一腹之中上下邪氣俱甚者也宜陷胸湯以下其邪丹謹按太陽病已重發汗表則虛矣而復下之裡又虛矣不大便五六日可見津液之耗矣非若前章之未曾發汗而但下之傷於早爾今雖有硬痛而可以迅攻之乎若曰潮熱於申酉系陽明屬調胃承氣證既又曰小有潮熱猶可疑待之間將無他法以緩取之乎潮熱本屬陽明也太陽潮熱惟此一證耳雜病太陽潮熱則在己午更玩一小字則知邪太陽為多陽明為少陽明病潮熱大便微硬可與大承氣湯不硬者不與之若不大便六七日恐有燥糞欲愈之可少與小承氣湯入腹中轉失氣者此有燥糞須當攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與之則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉失氣者慎不可攻也陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬爾宜大承氣湯下之胃熱當消穀引食反不能食者胃中有燥屎而實也若能食者胃中虛熱雖硬不得為有燥屎玩但字則末句恐當在若能食者之上燥屎在大腸而曰胃中者傷寒傳胃不傳大腸治病必求其本故仲景從本言之況承氣能下燥大腸同為燥金也二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯成本太陽並病於陽明名曰並病太陽證罷是無表證但發潮熱是屬陽明一身汗出為熱越今手足漐漐汗出是熱聚於胃也必大便難而譫語經曰手足漐然而汗出者必大便已硬也與大承氣湯以下胃中實熱陽明病譫語發潮熱脈滑而疾者小承氣湯主之與湯一升腹中轉失氣者更服一升不轉失氣勿更與之明日不大便脈反微澀者裡虛也最為難治不可更與承氣湯成陽明病譫語發潮熱若脈沉實者內實也則可下若脈滑疾為裡熱未實則未可下先與小承氣湯和之湯入腹中轉失氣者中有燥屎可更與小承氣湯一升以除之若不轉失氣者是無燥屎不可更與小承氣湯至明日邪氣傳時脈得沉實緊牢之類是裡實也反得微澀者裡氣大虛也若大便利後脈微澀者止為裡虛而猶可此不曾大便脈反微澀是正氣內衰為邪勝也故曰難治大承氣湯方海藏云厚朴去痞枳實泄滿芒硝軟堅大黃泄實必痞滿燥實四證全者方可用之大黃四兩酒洗厚朴炙去粗皮半斤枳實五枚炙芒硝七錢半上四味以水一斗先煮二物取五升去滓納大黃煮取二升去滓納芒硝更上火微煎一二沸分溫再服得下余勿服成承順也傷寒邪入胃者謂之入腑腑之為言聚也胃為水穀之海榮衛之原水穀會聚於胃變化為榮衛邪氣入胃胃氣鬱滯糟粕祕結壅而為實是正氣不得舒順也本草云通可去滯泄可去閉塞而不利閉而不通以湯蕩滌使塞者利而閉者通正氣得以舒順故曰承氣也王冰曰宜下必以苦宜補必以酸潰堅破結苦寒為主是以枳實為君內經曰燥淫於內治以苦溫泄滿除燥苦溫為輔是以厚朴為臣內經曰熱淫於內治以鹹寒人傷於寒則為病熱熱氣聚於胃則謂之實鹹寒之物以消實熱故以芒硝鹹寒為佐內經曰燥淫所勝以苦下之熱氣內勝則津液消而腸胃燥苦寒之物以蕩滌其燥熱故以大黃為使是以大黃有將軍之號也承氣湯下藥也用之尤宜審如大滿大實有燥屎乃可投也如非大滿則生寒證而結胸痞氣之屬由是而生矣小承氣湯方海藏云大黃泄實厚朴去痞必痞實全者可用大黃四兩厚朴炙去粗皮二兩枳實三枚大者炙以上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿再服大熱結實者與大承氣湯小熱微結與小承氣湯熱不大甚故大承氣去芒硝結不至堅故不減朴枳也吳或問承氣湯仲景有大小調胃之名何也然傷寒邪熱傳變入里謂之入腑腑者聚也蓋邪熱與糟粕蘊而為實也實則潮熱譫語手心濈濈汗出此燥屎所為也如人壯大熱大實者宜大承氣湯下之小熱小實者與小承氣湯下之又熱結不堅滿者故減去厚朴枳實加甘草而和緩之故曰調胃承氣也若病大而以小承氣攻之則邪氣不伏病小而以大承氣攻之則過傷正氣耳不及還可再攻過則不能復救可不謹哉仲景曰凡欲行大承氣先與小承氣一鍾服之腹中轉失氣乃有燥屎也可以大承氣攻之若不轉失氣慎不可攻攻之則腹脹不能食而難治又曰服承氣湯得利慎勿再服此諄諄告誡也凡用攻法必須妙算料量合宜則應手而效若不料量孟浪攻之必且殺人傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死但發熱譫語者大承氣湯主之一服利止後服詳循衣摸床陽明病發潮熱大便溏小便自利胸脅滿不去者小柴胡湯主之陽明為病胃實是也今便溏而言陽明病者謂陽明外證身熱汗出不惡寒反惡熱之病也陽明中風脈弦浮大短氣腹滿脅下及心痛鼻乾不得汗嗜臥身黃小便難時時噦而潮熱者小柴胡加茯苓主之傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之柴胡加芒硝湯方柴胡一兩黃芩人參甘草炙生薑各五錢半夏湯浸三個大棗三枚芒硝一兩每服五錢水一盞半煎至八分去滓納芒硝更微沸溫服陽明病脈浮而緊必潮熱發作有時但浮者必盜汗出成脈浮在經緊者裡實脈浮緊者表熱裡實也必發潮熱發作有時若脈但浮而不緊者止是表熱也必盜汗出盜汗者睡而汗出也陽明病裡熱者自汗表熱者盜汗活人書冬月陽明潮熱脈浮而緊者發作有時但脈浮者必盜汗黃芩湯主之方見下利譫語陽明為疾胃家實是也胃實則譫語故譫語宜入陽明門成譫者謂呢喃而語也又作譫謂妄有所見而言也斯皆胃中熱盛上乘於心心為熱胃則神識昏亂而語言謬妄也輕者睡中呢喃重者寤亦謬語經謂譫語獨語狂語及語言不休與言亂者由其熱之有輕重也譫語錯妄若與人言有次與獨語如見鬼者熱之輕也狂言無所知識甚則至於喊叫與語言不休者熱之甚也逮夫言亂乃狂言罵詈不避親疏此為神明已亂難可復製其猖狂也譫語之由又自不同有火劫有汗出有下利有下血有燥屎在胃有三陽合病有過經有亡陽等譫語者俱已條具於後茲不及贅諸如此者脈短則死脈自和則愈又身微熱脈浮大者生逆冷脈沉不過一日死或氣上逆而喘滿或氣下奪而自利皆為逆也陽明胃實潮熱宜下陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一盞腹中轉失氣者更服一盞若不轉失氣勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚若能食者但硬爾宜大承氣湯下之二陽並病太陽病罷但發熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯陽明病其人多汗以津液出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止勿更服胃實汗多宜下汗出譫語者必有燥糞在胃中此為風也須下之必過經乃可下下之若早語言為亂以表虛里實故下之則愈宜大承氣湯夫實則譫語虛則鄭聲譫語者謂亂言無次數數更端也鄭聲者謂鄭重頻煩也只將一句舊言重疊頻言之終日殷勤不換他聲也蓋神有餘則能機變而亂語數數更端神不足則無機變而只守一聲也傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語成氏謂鄭聲為鄭衛之聲非是前已辨明火後形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出愈太陽病火劫汗後身黃小便難身體枯燥頭汗腹滿微喘或不大便久則譫語論見頭汗太陽病二日反躁乃尉其背而大汗出火熱入胃胃中水竭躁煩必發譫語十餘日振栗自下利者此為欲解少陰病咳咳而下利譫語小便難者被火氣劫汗故也吐下汗溫針後譫語柴胡證罷者此為壞病知犯何逆以法治之詳見壞證汗後傷寒脈浮自汗小便數心煩微惡寒腳攣急反與桂枝欲攻其表此誤也若胃氣不和譫語者少與調胃承氣湯方論見厥三陽合病腹滿身重難以轉側口不吃而面垢譫語遺尿發汗則譫語下之則額上生汗生則逆冷若自汗出者白虎湯主之論見身重傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語大承氣湯見不大便傷寒脈弦頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸見少陽病發汗多亡陽譫語者不可下與柴胡桂枝湯和其榮衛以通津液後自愈發汗多又重發汗者亡其陽譫語脈短者死脈自和者不死諸逆發汗病微者瘥劇者言亂目眩者死下後傷寒八九日下之胸滿煩驚小便不利譫語一身盡痛不可轉側者柴胡加龍骨牡蠣湯方論見驚熱入血室陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實瀉之濈然汗出則愈腹滿譫語脈浮緊者亦刺期門太陽少陽並病發汗則譫語脈弦五六日譫語不止者宜刺期門婦人中風發熱惡寒經水適來得之七八日熱除脈遲者身涼胸滿如結胸狀者刺期門若晝則明瞭暮則譫語者無犯胃氣及上二焦必自愈活人以小柴胡湯主之論見婦人傷寒傷寒十三日不解過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下之脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之成傷寒十三日再傳經盡謂之過經譫語者陽明胃熱也當以諸承氣湯下之若小便利者津液偏滲大便當硬反下利者知醫以丸藥下之也下利脈微而厥者虛寒也今脈調和則非虛寒由腸虛胃熱協熱而利也與調胃承氣湯以下胃熱經文內實之實當作熱注偏滲偏當作漏此段有五反一對熱與厥反湯與丸反便硬與下利反脈微與脈和反藥下與自利反小便與大便硬為一對讀者宜細詳之上下利譫語其曰脈調和而手足和小便利者陽也故用承氣下之其脈當微厥及少陰但欲寐被火氣劫汗譫語小便難者陰也故當用補劑和之但欲寐下利譫語俱見下利少陰條許有人病傷寒下利身熱神昏多困譫語不得眠或者見下利便以譫語為陰虛證豫曰此亦小承氣證衆駭曰下利而服小承氣仲景之法乎豫曰此仲景之法也仲景云下利而譫語者有燥糞也屬小承氣湯而得解豫嘗讀素問云微者逆之甚者從之逆者正治從者反治從多從少視其事也帝曰何謂反治岐伯曰塞因塞用通因通用王冰注云大熱內結注瀉不止熱宜寒療結復須除以寒下之結散利止則通因通用也正合於此又何疑焉活大便祕小便赤手足溫脈洪數者必譫語也調胃承氣湯譫語不惡寒反惡熱白虎湯已得汗身和譫語者柴胡桂枝湯火迫而致譫語亦白虎湯海治老幼及虛人傷寒五六日昏冒言妄小便或淋或澀起臥無度或煩而不得眠並宜白虎湯加山梔一錢鬥治熱病及時疫心躁狂亂奔走狀似癲癇言語不定久不得汗及時疫不知人事者以人中黃不拘多少入罐內泥封固武火煆半日去火候冷取出於地上以盆蓋半日許研如面新汲水調下三錢或未退再服愈人中黃即屎也吳治傷寒熱甚心煩有痰神昏譫語者以竹瀝一盞生天花粉汁一盞服之或加好金子三五錢同煎妙按此諸方內熱不禁下者可用補虛素問云譫語者氣虛獨言也婁全善云余用參耆歸術等劑治譫語得愈者百十數豈可不分虛實一概用黃連解毒大小承氣等湯以治之乎難經云脫陽者見鬼仲景謂亡陽譫語亦此義海黃耆湯治傷寒或時悲哭或時嬉笑或時太息或語言錯亂失次世人疑作譫語狂言者非也蓋神不守室耳兩手脈浮沉不一舉按全無力浮之損小沉之亦損小皆陰脈也之病甚者用調中丸或理中丸方見前補養條丹浦江鄭兄年二十歲九月間發熱頭痛妄言見鬼醫與小柴胡湯數帖熱愈甚豫視之形肥面色帶白卻喜筋骨稍露診其脈弦大而數實脈本不實涼藥所致此因勞倦成病與溫補藥自安遂以參朮為君苓芍為臣黃耆為佐附子一片為使與一帖而證不減或曰脈既數大狂熱而又大渴用附子誤矣豫曰此虛證而誤投寒涼之藥人肥而脈左大於右事急矣非加附子參朮焉能有急效再與一帖乃去附子作大劑與服至五十帖得大汗而愈自後又補養兩月氣體方始平復一人五月內患譫語大發熱肢體不能舉喜冷飲診其脈洪大而數用黃耆茯苓濃煎如膏卻用涼水調與之三四服後病者昏瞶如死狀但顏色不改氣息如常至次早方醒諸證悉退而安盧兄汗後再發熱妄言呂仲修汗後熱不退亦妄言陶明節熱退後不識人言語謬妄皆用參耆朮歸等補劑而愈信哉譫語屬虛者十居八九陰證手足冷脈細微而譫語用四逆湯活人用白通湯海藏用黃耆加乾薑湯侯輔之脈極沉細外熱內寒肩背胸脅斑出十數點語言狂亂或曰發斑譫語非熱乎豫曰非也陽為陰逼上入於肺傳之皮毛故斑出神不守舍故錯語如狂非譫語也肌表雖熱以手按之須臾冷透如冰與薑附等藥數日約二十餘兩得大汗而愈後因再發脈又沉遲三四日不大便與理中丸三日內約半斤其病全愈以此知侯公之狂非陽狂之狂乃失神之狂即陰虛也診直視譫語喘滿者死下利者亦死譫語妄言身微熱脈浮大手足溫者生逆冷脈沉細者不過一日死矣鄭聲鄭字書曰鄭重頻煩也又曰殷勤也鄭聲謂止將一事頻煩殷勤言之蓋神氣不足不能更易而但守一聲與譫語之錯出不倫者異矣此虛實之分也成氏以為鄭衛之聲迂而鑿矣治法於前補虛條求之吳大抵鄭聲乃因內虛正氣將脫而言皆不足之貌如手足並冷脈息沉細口鼻氣息短少所語言語輕微無力氣少難以應息者皆元氣將脫也或吃逆不止神昏氣促不知人事者死如氣息不促手足頗溫其脈沉細而微者急以附子渴倍人參主之或以接氣丹黑錫丹兼進一二服以助其真氣或濃煎人參徐徐與之或未可用附子者以三白湯倍人參主之戴譫語屬陽鄭聲屬陰經雲實則譫語虛則鄭聲譫語者顛倒錯亂言出無倫常對空獨語如見鬼狀鄭聲者鄭重頻煩語雖謬而諄諄不已老年人遇事則誶語不休以陽氣虛故也此譫語鄭聲虛實之所以不同也二者本不難辨但陽盛裡實與陰盛隔陽皆能錯語須以他證別之大便祕小便赤身熱煩渴而妄言者乃里實之譫語也小便如常大便洞下或發躁或反發熱而妄言者乃陽膈陽之譫語也裡實宜下調胃承氣湯熱躁甚而妄言不休大渴喜飲宜理中湯熱躁甚而妄言不休大渴喜飲宜理中湯陰隔陽宜溫理中湯又有不繫正陽明似困非困間時有一二聲譫語者此是汗出後津液不和慎不可下乃非陽非陰者宜小柴胡湯和建中湯各半帖和榮衛通津液若陽傳入陰自利手足厥逆語或錯亂此雖已自利其中必有燥屎猶當下之陰中之陽宜調胃承氣湯瘀血在裡大便黑小便利小腹痛其人如狂譫語者桃核承氣湯婦人傷寒發熱經水適斷此熱入血室其血必結亦能譫語宜小柴胡湯病後血氣未復精神未全多於夢寐中不覺失聲如魘此不繫譫語鄭聲宜溫膽湯去竹茹入人參半錢或用六君子湯狂亂經曰邪入於陽則狂又曰重陽則狂諸經之狂為陽盛也傷寒熱毒在胃並於心至於發狂為邪熱極矣狂之發作少臥不飢妄語笑妄起行棄衣而走登高而歌甚則逾垣上屋皆獨陽亢極使之非吐下不能已亦有當汗不汗瘀熱在裡下焦畜血而如狂者小便必利特如狂而未至於狂耳其或熏尉迫汗灼艾燒針令人煩躁臥起不安則謂之火邪驚狂凡是數者各有條例其或狂言目反直視為腎絶汗出輒復熱狂言不能食皆死證也非藥石所能及矣陽明病欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈成陽明病客熱初傳於胃胃熱則消穀而欲食陽明病熱為實者則小便當數大便當硬今小便反不利大便自調者熱氣散漫不為實也欲食則胃中谷多內經曰食入於陰長血氣於陽谷多則陽氣勝熱消津液則水少經曰水入於經其血乃成水少則陰血弱金匱要略曰陰氣不通則骨痛其人骨節疼者陰氣不足也熱甚於表者翕翕發熱熱甚於里者蒸蒸發熱此熱氣散漫不專著於表裡故翕翕如有熱狀奄忽也忽然發狂者陰不勝陽也內經曰陰不勝其陽者則脈流薄疾並乃狂陽明蘊熱為實者須下之愈熱氣散漫不為實者必待汗出而愈故云濈然汗出而解也水穀之等者陰陽氣平也水不勝穀氣是陰不勝陽也汗出則陽氣衰脈緊則陰氣生陰陽氣平兩無偏勝則愈故云與汗共並脈緊則愈入腑見表證汗出解理順見汗脈緊首尾如初爾桂枝湯主之此段發汗則愈汪按水陰氣則谷陽氣傷寒以陽為主水不勝谷乃陰不勝陽病漸向安故陰氣與汗共並而散因見脈緊緊者陰寒脈也此則變熱入腑何以脈緊蓋由陰氣與汗共並然也且緊亦與長類長為陽明本脈成氏所注汗出陽衰脈緊陰生陽衰陰生則陰陽不平矣下文乃云陰陽氣平兩無偏勝不知何謂太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之或云桃仁承氣湯太陽病不解熱結膀胱其人如狂血自下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃仁承氣湯張或云上二條證俱系下焦蓄血中汗未得其宜或當汗不汗或汗遲或脈盛汗微或覆蓋不周而不汗其太陽之邪無從而出故隨經入腑結於膀胱今小腹硬滿若小便不利者血不蓄若小便利者乃蓄血證也血或不蓄為熱迫之血則自下血下則熱隨血出而愈若蓄血而不下其處不解者尚未可攻當先解外外已解但少腹急結者乃用桃仁承氣湯攻之此如狂者之所處也其發狂者則不然表證雖在脈已沉微邪氣傳裡其可已乎下之則愈故以抵當湯主之太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之傷寒脈浮以火迫劫之亡陽必驚狂起臥不安者桂枝湯去芍藥加蜀漆龍骨牡蠣救逆湯方論見驚汗家重發汗必恍惚心亂小便已陰痛與禹餘量丸方見痞附陽毒活人云凡病人煩躁狂走妄言叫罵面赤咽痛鼻如煙煤或身斑如錦或下利赤黃此陽毒也表者陽毒升麻湯黑奴丸里者大黃散楊仁齋用葶藶苦酒湯梔子仁湯三黃湯大黃散升麻葛根湯加大黃狂走者水調瓜蒂末吐痰本治傷寒發狂棄衣奔走逾牆上屋鵲石散黃連寒水石各等分上為細末每服二錢濃煎甘草湯候冷調下云傷寒心風狂妄者宜防風黃連湯黃連大黃防風遠志茯神各半兩上為細末每服一兩水煎服海黃耆湯治傷寒或歌或笑或悲哭譫言妄語方見發熱陳志仁傷寒狂妄每欲狂走四五人扶捉不定脈虛數用柴胡湯反劇以參耆歸術甘草陳皮煎湯一服狂定再服安睡脫陽者見鬼脫陰者發狂宜峻補其陰天地煎之類是也天門冬地黃煎膏為之陰證乃是病發於少陰不當正發汗醫見其惡寒遂強發之汗因漏不止其人亡陽故狂大與陰極發躁同當用陰躁之藥加以收汗之劑玉屏風散入熟附子一錢仍外以溫粉敷之或冷汗自出手足逆冷其人狂不止者宜四逆湯冷進發狂而肌表雖或熱以手按之冷透手或肩背胸膈有斑十數點脈極沉細用乾薑附子湯以人參冷進循衣摸床循衣摸床危惡之候也有二證其一由太陽中風以火劫汗因成壞病捻衣摸床小便利者生不利者死其一由陽明裡熱之極循衣摸床脈弦者生澀者死太陽中風以火發汗邪風被火兩陽相熏其身發黃陽盛則欲衄陰虛則小便難但頭汗出口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸慶小便利者可治詳頭汗傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利止後服成若吐若下皆傷胃氣不大便五六日上至十餘日者亡津液胃氣虛邪熱內結也陽明旺於申酉戌日晡所發潮熱熱者陽明熱甚也不惡寒者表證罷也獨語如見鬼狀者陽明內實也以為熱氣有餘若劇者是熱氣太甚也熱太甚於內昏冒正氣使不識人至於循衣摸床惕而不安微喘直視傷寒陽勝而陰絶者死陰勝而陽絶者死熱劇者為陽勝脈弦為陰有餘脈澀為陰不足陽熱雖劇脈弦知陰未絶而猶可生脈澀則絶陰故不可治其邪熱微而未至於劇者但發熱譫語可與大承氣湯以下胃中熱經曰凡服下藥中病即止不必盡劑此以熱未劇故云若一服利則止後服趙此段當分作三截看自傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀止為上一截是將潮熱譫語不惡寒不大便對為現證下文又分作一截以辨劇者微者之殊微者但發熱譫語但字為義以發熱譫語之外別無他證其用承氣湯日一服利止後服見其熱輕猶恐下之太過也至於劇者發則不識人循衣摸床惕而不安微喘直視如此熱極證危不可不決其死生以斷之以脈弦者生澀者死此陽熱已極若脈弦為陰未絶猶可下之以復其陰若脈澀為陰絶不可藥而必死矣今活人書但言劇者而去其微者二字混兩證通作一證總目用承氣湯又將脈弦者生澀者死本劇者斷語移而繼於微者服藥之後豈有但發熱譫語無別惡候遽然脈澀而致於死耶仲景論中雖別有潮熱譫語脈澀難治一證乃是服承氣湯後未曾得大便蘊毒不泄脈反微澀為正衰邪勝故難治此論中病微者服湯得利後則邪熱因泄而解矣尚何生死之議耶又云弦者陽也澀者陰也腸病見陰脈者生在仲景法中弦澀者屬陰不屬陽得無疑乎許有人病傷寒大便不利日晡發潮熱手循衣縫兩手撮空直視喘急更數醫矣見之皆走此誠惡候得之者十中九死仲景雖有證而無法但云脈弦者生澀者死已經吐下難以下藥謾且救之若大便得通而脈弦者庶可治也與小承氣湯一服而大便利諸疾漸退脈且微弦半月愈或問曰下之而脈弦者生此何意也豫曰金匱玉函云循衣妄撮怵惕不安微喘直視脈弦者生澀者死微者但發熱譫語者承氣湯主之豫嘗觀錢仲陽小兒直訣雲手尋衣領及捻物者肝熱也此證在玉函列於陽明部蓋陽明者胃也肝有熱邪淫於胃經故以承氣瀉之且得弦脈則肝平而胃不受克此所謂有生之理讀仲景論不能博通諸醫書以發明其隱奧吾未之見也海藏云許學士作循衣撮空是肝熱風淫末疾此論誠當然莫若以為肺熱之邪其人必妄言亂語難經云肺邪入心為譫語附婁嘗治循衣摸床數人皆用大補氣虛之劑惟一人兼瞤振脈代遂於補劑中略加桂二分亦振止脈和而愈渴經云病人不惡寒而渴者此轉屬陽明也又曰服脈柴胡湯已渴者屬陽明也故以渴入陽明門成傷寒邪傳裡則渴邪在表則不渴夫三陽雖或有渴不如三陰之甚也故太陰腹滿嗌乾少陰口燥舌乾而渴厥陰則消渴消渴者飲水多而小便少謂其熱能消水也蓋初傳則熱微而渴微傳深則熱甚而渴甚也凡渴與水勿令極意三陽微渴者五苓散大渴者白虎湯三陰熱甚而渴者順下之其或渴微而強多飲之則成悸動支結喘咳䭇噦乾嘔腫滿下利小便不利皆由此也太陽病發汗後大汗出胃中干煩躁不得眠欲飲水者少少與之令胃氣和則愈若脈浮小便不利微熱消渴者五苓散張煩渴用白虎湯宜也其用五苓散滲津液何哉曰白虎乃表證已解邪傳裡而煩渴者用之今脈尚浮身有微熱而渴乃表邪未全解故用桂枝之辛和肌表白術茯苓之甘淡以潤虛燥也按此説亦未瑩太陽經也膀胱腑也膀胱者溺之室也五苓散者利溺藥也膀胱者津液之府故東垣以渴為膀胱經本病然則治渴者當瀉膀胱之熱瀉膀胱之熱者利小便而已矣發汗已脈浮數煩渴者五苓散本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散中風發熱六七日不解而煩有表裡證渴欲飲水水入即吐名曰水逆五苓散五苓散方豬苓去皮十八銖澤瀉一兩六銖半茯苓十八銖桂去粗皮半兩白朮十八銖上五味為末以白飲和服方寸匕日三服多飲暖水汗出愈苓者令也通行津液克伐腎邪專為號令者苓之功也五苓之中茯苓為主故曰五苓散內經曰淡味滲泄為陽水飲內蓄鬚滲泄之必以甘淡為主故以茯苓甘平為君豬苓甘平為臣雖甘也終歸甘淡脾惡濕水飲內蓄則脾氣不治益脾勝濕必以甘溫為助故以白朮甘溫為佐內經曰鹹味滲泄為陰泄飲導溺必以咸為助故以澤瀉為使水蓄不行則腎氣燥內經曰腎惡燥急食辛以潤之散濕潤燥必以桂枝辛熱為使多飲暖水令汗出而愈者以辛散而水氣外泄故解服桂枝湯大汗後大煩渴不解脈洪大者白虎加人參湯太陽病發熱而渴不惡寒者為溫病柴胡白虎桂枝去桂加人參傷寒無大熱口燥渴心煩背微惡寒白虎加人參湯傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之渴欲飲水無表證者太陽證罷轉屬陽明也下條意亦同皆太陽轉屬陽明故渴也傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之王注云若純在表則惡風無時今表裡無熱故時時惡風也白虎加人參湯治渴而脈洪小便利者石膏六兩知母六兩半甘草二兩粳米六合人參三錢上㕮咀每服一兩水煎溫服許有人初病嘔吐俄為醫者下之已七八日而內外發熱豫診之曰當用白虎加人參湯或曰既吐復下且重虛矣白虎可用乎豫曰仲景云若吐下後七八日不解熱結在裡表裡俱熱者白虎加人參湯正相當也蓋始吐者熱在胃脘而脈至今虛大三投湯而愈仲景既云傷寒若吐若下後七八日不解表裡俱熱者白虎加人參湯主之又云傷寒脈浮發熱無汗其表不解不可與白虎又云脈浮滑此以表有熱里有寒白虎加人參湯主之林億校正謂張仲景於此表裡目差矣豫謂不然大抵白虎能除傷寒中渴表裡發熱故前後二證或云表裡俱熱或云表熱裡寒皆可服之一種脈浮無汗其表不解全是麻黃與葛根證安可行白虎也林億見所稱表裡不同便謂之差是亦不思之過也張用藥有遲速之弊故設法以關防法有關防不盡者則著方以拯治也假如上二條前條乃仲景設法以關防也後條及傷寒病若吐若下後七八日不解結熱在裡表裡俱熱時時惡風大渴口舌乾燥而煩欲水數升者以白虎加人參湯主之此二條則著方以拯治也夫白虎湯專治大煩大渴古人設法之意惟恐表證未罷而輒用之治有太速之弊若背微惡寒及時時惡風二證其中煩渴已甚非白虎不能遏也必候表邪俱盡未免有太遲之愆也此乃法之關防不盡者故著方以拯治也苟不著方必然違法此方法之妙所以不可偏廢也吳或問白虎湯仲景以表不解者不可與又時時惡風背上惡寒者此有表也又以白虎主之何也蓋石膏辛寒解足陽明經本熱蒸蒸發熱潮熱表裡皆熱舌燥煩渴之聖藥也且時時者時或惡風而不常也背上惡者但覺微惡而不甚也所有盛熱燥渴而用則無疑矣若夫表證惡寒常在背上惡寒而不燥渴者切不可用也又太陽經發熱而渴無汗者不可與之但汗後脈洪大而渴者則可與也如陰傷寒面赤煩躁身熱與其胃虛噁心大便不實脈弱食少無大熱者切不可用也如誤用之則傾危可立而待矣太陽病重發汗而復下之不大便五六日舌上燥而渴日晡小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯傷寒發熱惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥復利其小便故也白虎加人參湯小柴胡湯去半夏加栝蔞竹葉張其陽明汗多此陽明病未解而渴胃中津液乾燥若與豬苓湯復利其小便是為實實虛虛之弊也陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之少陽傷寒中風往來寒熱胸脅滿默默不欲飲食心煩喜嘔或渴或咳者小柴胡湯若渴者去半夏加人參栝蔞根傷寒四五日身熱惡風項強脅下滿手足溫而渴者小柴胡湯得病六七日脈遲浮弱惡風手足溫醫二三下之不能食而脅下滿痛面目及身頸項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡不中與也或云下重渴欲飲水嘔者五苓加茵陳蒿湯少陰渴而下利屬少陰其病但兼欲寐小便白者四逆湯兼咳嘔不得眠小便不白者豬苓湯兼自利純青色水者大承氣湯有熱者白頭翁湯方論見下利厥陰消渴氣上衝心心疼飢不欲食食則吐蛔若下之則利不止若欲飲水少少與之愈邪傳厥陰則熱已深也邪自太陽傳至太陰則腹滿而咽乾未成渴也邪至少陰者口燥舌乾而渴未成消也至厥陰而消渴者熱甚能消水故也飲水多而小便少者謂之消渴木生於火肝氣通心厥陰客熱氣上撞心心中疼熱傷寒六七日厥陰受病之時為傳經盡則當入腑胃虛客熱飢不欲食蛔在胃中無食則動聞食氣而出得食蛔出此熱在厥陰經也設使下之虛其胃氣厥陰木邪相乘必吐下不止按成氏為表陽邪傳裡者非也消渴心中疼熱也隨病治例渴而頭汗小便不利兼脅滿往來寒熱者柴胡桂枝幹薑湯兼發黃者茵陳蒿湯論見頭汗表不解心下有水氣乾嘔發熱咳嗽或渴或利或噎或小便不利少腹滿或喘小青龍湯又心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯俱宜去半夏加栝蔞根夏月汗出惡寒身熱足冷而渴者為中暑白虎加人參湯及酒黃連主之方見中暑惡寒身熱者證似表也足冷者不可表發熱惡寒腹滿汗出小便利而渴者為肝乘脾刺期門論見腹滿表解不惡寒而渴者宜白虎湯渴而脅滿及往來寒熱其證未經汗者小柴胡去半夏加人參栝蔞湯若汗下後者柴胡桂枝幹薑湯詳見脅滿痛並往來寒熱渴而心下硬痛日晡潮熱不大便者為結胸宜大陷胸湯若但硬不痛者為痞與瀉心湯不解反渴而小便不利者宜五苓散詳見結胸痞氣二門病在陽明應汗之反以冷水噀之灌之其熱益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥與五苓湯論見結胸文蛤散方文蛤一兩即海蛤粉也河間丹溪多用之大能治痰上一味為散沸湯調服方寸匕渴欲飲水而不能飲者丹田有熱胸中有寒論見濕痹中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆五苓散主之渴欲飲水若太陽發汗後大汗出煩躁不得眠及厥陰病氣起衝心心疼吐蛔者少少與之愈論見前條及氣上衝凡得時氣病至五六日而渴欲飲水不能多不當與之何者以腹中熱尚少不能消之更與水作病也至七八日大渴欲飲水者猶當依證與之與之常令不足勿極意也言能飲一斗與五升若飲而腹滿小便不利若喘若噦不可與之忽然大汗出是為自愈也活人云凡病非大渴不可飲水若小渴咽乾者少少呷潤之令其胃中和乃佳凡得病反能飲水此欲愈也但聞病飲水自愈小渴者亦強與之飲因成其禍不可復救活人云強飲水致飲停心下滿結喘者當以五苓散或陷胸湯主之下利脈弱脈數而渴者自愈論見下利渴而發熱其脈不弦緊而浮弱者汗出愈論見譫語婁活人云切戒太陽證無汗而渴者不可與白虎湯陽明證汗多而渴者不可與豬苓湯然太陽渴終不可與白虎耶太陽證得汗後脈洪大而渴者方可與之也陽明渴終不可與五苓散耶陽明證小便不利汗少脈浮而渴者方可與之也趙活人切戒太陽證無汗而渴者不可與白虎湯陽明證汗多而渴者不可與五苓散愚詳仲景論治渴藥有不可與之戒有二傷寒脈浮發熱無汗渴欲飲水無表證者白虎加人參湯表不解不可與活人不雲表不解但云無汗不可與則誤矣經雲陽明汗多而渴不可與豬苓湯活人改作五苓散蓋豬苓專滲泄五苓兼汗利安得而改之經既云汗多而渴者不可與豬苓湯而太陽傷寒汗出而渴復用五苓散者蓋渴雖同汗之多寡則異太陽屬表未至汗多胃躁故用五苓滲熱和表非若陽明屬裡汗多而胃躁也經又云陽明發熱汗多急下之均是陽明汗多前證戒利小便此證不戒利大便何也蓋渴者邪氣散漫在經未收斂入胃作實此證不渴則內已作實外又發熱恐熱內竭津液故急下之且豬苓五苓又有可疑者太陽病脈浮小便不利微熱消渴者五苓散陽明脈浮發熱渴欲飲水小便不利者豬苓湯脈證皆同何故用藥之不同耶然太陽邪在表發汗不解故用五苓和表行津液陽明邪已入裡熱客下焦故用豬苓滲瀉其熱噫白虎豬苓五苓等藥若能證察於機微治明於權變則可與不可與庶得仲景之妙外有自利而渴條下注云傷寒熱入於臟流於少陰之經少陰主腎腎惡燥故渴而引飲注用豬苓湯白頭翁湯又後下利問中重出自利而渴條下卻云腎虛故引水自救通用白通四逆豬苓等湯一問以渴為熱一問以渴為虛冰炭不侔何憑分別又且分隸兩門設使後人臨病檢閲前後兩不相聞疑誤豈小今詳定少陰病咳而下利嘔渴心煩不得眠及厥陰證下利欲飲水是皆傳經之邪熱脈必沉細數仲景故以滑石黃連等清利之其或少陰自利而渴欲吐不吐心煩但欲寐是直入本經之陰邪也脈必沉微仲景故以附子乾薑溫之本問何不如此明示脈證合為一門而明辨之庶一見而兩得焉清之溫之隨其攸利又何疑誤之有吳凡渴當分六經而治太陽經標熱在表則不渴若熱傳入膀胱之本則煩渴脈浮數小便不利也五苓散切不可與白虎湯凡陽明病脈長標熱無汗而渴者葛根解肌湯或六神通解散倍葛根以汗解之若陽明熱傳於胃中本熱惡熱濈濈汗出而渴脈浮洪數者人參白虎湯五苓不中與也若陽明本熱或蒸蒸而熱潮熱燥濕舌燥口乾飲水大便實者大柴胡湯或調胃承氣湯下之若內未實尚未可下宜小柴胡增損用之少陽脈弦數口苦咽乾發熱而渴者小柴胡去半夏加栝蔞根余見本條太陰自利則不渴惟少陰有口苦飲水小便色白者此下有寒也脈沉者附子湯若身寒厥逆脈滑而口渴者此里有熱也人參白虎湯凡陰證煩躁口渴不能用水脈沉足冷者宜四逆湯冷飲之凡傷寒時氣等證欲飲水者為欲愈蓋得水則能和其胃氣汗出而解不與水則乾燥無由而作汗遂致悶亂而死也凡與水須察病人勇怯邪熱輕重多少與之寧從不及不可太過恐水多不能滲化停蓄為害多矣其水須用新汲井中者為良凡熱病熱甚大便實者以元明粉一二錢加入水中飲之最妙凡中暑煩渴者加辰砂天水散調水中飲之尤良如虛人煩渴不飲水以燈心煎湯浸水中與之凡口渴細茶湯白梅湯緑豆湯皆可飲香水梨雪梨嫩藕西瓜皆可食凡用冰須以涼水洗去鹽味方可戴凡渴問其所飲欲冷欲熱欲多欲少若飲多而欲冷者陽渴也更須審其有何證在經也其太陽證小便不利而渴者五苓散其陽明證大便不利而渴者宜於前本經求之已利猶渴宜白虎湯其少陽證寒熱往來而渴者小柴胡湯去半夏加栝蔞根如其數陰亦有自利而渴各已見本經但陰有渴古人多用冷劑以其皆挾陽氣耳經雖陰而病則陽也然亦有下清穀不繫熱利純是陰證而反見渴者此是陰在下隔陽於上兼因泄瀉津液既去枯燥而渴其人雖引飲所飲自少而常喜溫不可投冷劑宜理中湯或四逆湯加人參一錢渴甚連理湯有陽證不渴陰證反渴者陽明不甚渴太陰乃大渴不可不知治渴一也有堅腎水而渴止者有利小便而渴愈者堅腎水則用天花粉之屬利小便則用茯苓豬苓之類蓋太陰以利小便為先陽明以利小便為戒少陽以膽經半表半裡未可下之其人或大渴不止當以小柴胡湯加天花粉之屬堅其腎水腎水既堅自還滲入大腸大便微通熱去而渴解若病在太陽太陽在膀胱腎經非利小便則熱無從去渴何由愈外有非太陽證煩躁發渴此乃陰盛隔陽不當潤其渴維當治其陰附羅傷寒食少而渴者當以和胃之藥止之不可用涼藥止之也恐復損胃氣愈不能食白朮茯苓是也海秦二母病太陰病三日不解後嘔逆噁心而脈不浮與之半硫丸二三服不止復與黃耆建中湯脈中極緊無表裡病胸中大熱發渴引飲皆曰陽證欲飲之水豫反與薑附等藥緊脈反沉細陽猶未生以桂附薑烏之類酒丸與百丸接之二日中十餘服病人身熱煩躁不寧欲作汗也又以前丸接之覆以厚衣陽脈方出而作大汗翌日大小便始通下瘀血一盆如豬肝然用胃風湯加桂附三服血止其寒甚如此亦世所未見也少陰證口燥舌乾而渴尺寸脈俱沉沉遲則四逆湯沉疾則大承氣湯少陰口燥舌乾而渴身表涼脈沉細而虛者瀉心湯主之此有形無形藥也人參湯治傷寒七八日汗後心煩燥渴人參黃芩柴胡葛根各一兩山梔甘草炙各半兩上為粗末每服五錢薑棗煎溫服活陽毒倍常燥盛大渴者黑奴丸主之方見陽毒風溫如渴甚者宜栝蔞湯方見風溫中暑伏熱屢治不瘥其人發渴不已酒蒸黃連丸主之方見中暑脈熱病在腎令人渴口乾舌焦黃赤晝夜欲飲水不止腹大而脹尚不厭飲目無精光者死不治嘔乾嘔欲升成嘔者聲物兼出也俗謂之啘非也夫啘與噦蓋字異而音義俱同吐者但吐出其物而無聲故有乾嘔而無干吐嘔有責為熱者責為寒者至於吐家則悉言虛冷也嘔又有停飲者有胃脘有膿者皆當明辨之嘔而發熱者柴胡湯詳具與其嘔不止心下急鬱郁微煩大柴胡湯主之者是邪熱為嘔也膈上有寒飲乾嘔者不可吐也當溫之與其乾嘔吐涎沫頭痛者吳茱萸湯主之是寒邪為嘔也先嘔後渴者此為欲解先渴後嘔者為水停心下此屬飲家是停飲嘔者嘔家有癰膿不須治膿儘自愈是胃脘有膿而嘔也諸如此者雖有殊別大抵傷寒表邪欲傳裡裡氣上逆則為嘔也是以半表半裡證多雲嘔也傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪是知邪氣傳裡者必致嘔也至於乾薑附子湯證云不嘔不渴為里無熱十棗湯證云乾嘔短氣汗出不惡寒者此表解里未和也即此視之其嘔為裡熱明矣嘔家之為病氣逆者必散之痰飲者必下之千金曰嘔家多服生薑此是嘔家聖藥是要散其逆氣也金匱要略曰嘔家用半夏以去其水水去嘔則止是要下其痰飲也嘔多雖有陽明證不可攻也謂其氣逆而未收斂為實也其嘔而脈弱小便復利身有微熱見厥者已為難治蓋謂其虛寒之甚也醫者必審其邪氣之虛實疾證之逆順為施藥劑治則當矣太陽病汗或已發熱未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒麻黃湯太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者為未解也與大柴胡湯下之則愈按仲景雖曰嘔家雖有陽明證不可攻攻之為逆然陽明伏熱熏蒸清道而嘔且煩者非以苦寒直折之不可也故用大柴胡下之傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也成心下溫溫欲吐鬱郁微煩胸中痛當責邪熱客於胸中大便反溏腹微滿則邪熱已下於胃也日數雖多若不經吐下止是傳邪亦未可下當與柴胡湯以除上中二焦之邪若曾吐下傷損胃氣胃虛而邪乘虛入胃為實非柴胡湯所能去調胃承氣湯下胃熱以嘔知胃氣先曾傷動也按經文溫溫當作嗢嗢又以嘔下當有缺文蓋嘔家正為柴胡證也豈逸微溏字耶嘔而發熱者和小柴胡湯主之傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡加桂枝湯主之太陽與陽明合病不下利但嘔者葛根加半夏湯主之活人云頭疼身熱痛肌熱目疼鼻乾脈浮而長是也葛根半夏湯方葛根半夏各二錢麻黃生薑各一錢半甘草芍藥桂枝各一錢大棗十二枚擘上㕮咀以水一斗先煎麻黃葛根減二升去白沫納諸藥煎取三升溫服一升覆取微汗陽明傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也大柴胡湯食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也葛根半夏湯傷寒和嘔多雖有陽明證不可攻之黃芩生薑半夏湯小柴胡湯活人用桔梗湯陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯陽明病溫反無汗而小便利二三日嘔而咳手足厥者必苦頭痛或用真武湯去茯苓少陽嘔而往來寒熱胸脅苦滿者宜小柴胡若兼下利者乃太陽少陽合病宜黃芩加半夏生薑湯論見往來寒熱及下利太陽陽明合病自下利為在表當與葛根湯發汗陽明少陽合病自下利者為在裡可與承氣湯下之此太陽少陽合病自下利為在半表半裡非汗下所宜故與黃芩湯以和解之嘔者胃氣逆也故加半夏生薑以散逆氣傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯血弱氣盡腠理開邪氣因入與正氣相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也小柴胡湯主之邪氣外甚陽不主裡裡氣不和氣下而不上者但下利而不嘔裡氣上逆而不下者但嘔而不下利也與小柴胡湯以解半表半裡之邪渴而飲水嘔者柴胡不中與也活人云宜治膈間水赤茯苓湯主之方見後太陰太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯去附子加生薑厥陰傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血黃芩芍藥湯抵當湯嘔而脈弱小便復利身有微熱見厥者難治四逆湯傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯傷寒邪自傳表為本自寒下醫反吐下損傷正氣寒氣內為格拒經曰格則吐逆食入口即吐謂之寒格更復吐下則重虛而死是更逆吐下與乾薑黃芩人參湯以通寒格趙仲景之意以本因寒下醫復吐下因成寒格吐證經云格則吐逆若更復吐下治之為逆故用乾薑以溫里黃連黃芩反佐以取之人參補正氣也今活人卻言關脈遲故用此藥何耶雖然脈遲為胃中虛冷而吐者固也又有脈數為胃中虛冷而吐者仲景嘗言之矣病人脈數數為客熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也今以其脈異證同故引此以為診視之別蛔厥者其人當吐蛔今病者靜而復時煩此為臟寒蛔上入膈故煩須臾復上得食而嘔又煩者蛔聞食臭出其人當自吐蛔烏梅丸詳吐蛔渴先渴卻嘔者為水停心下此屬飲家活人云赤茯苓湯主之先嘔卻渴者此為欲解候也金匱云嘔思水者急與之下利嘔而下利有寒熱者為陽宜黃芩湯大柴胡湯無熱者為陰宜豬苓湯真武湯並見吐利門煩嘔而心煩若汗吐下後者梔子生薑豉湯若未曾吐汗下後兼咳而渴者宜豬苓湯詳見不得眠嘔家有癰膿者不必治膿儘自愈服桂枝嘔者酒客病戴陽明證具雖顯然有可下證者兼之嘔多猶屬上焦未可遽下宜小柴胡湯若太陽不與少陽陽明合病而獨見太陽證或吐瀉者恐病人膈間素有痰飲停飲傷滯且以二陳湯定之候嘔吐定徐進解太陽經藥若先嘔卻渴者宜豬苓湯先渴卻嘔者宜治膈間之水小半夏茯苓湯渴欲飲水水入即吐吐已復渴名曰水逆由心經受熱而小腸不利也宜五苓散若少陰不渴而吐或乾嘔者理中湯去白朮加生薑嘔而吐涎沫者吳茱萸湯太陰厥陰間有嘔吐太陰宜理中湯厥陰宜四逆湯並加生薑煎以上陰證乃陰中之陰宜用熱劑陽入陰者能為利而不為嘔嘔屬上而近於外也陽之所入者深故利也又有陽證病新瘥後見嘔別無所因此餘熱在胃脘也宜竹葉石膏湯或橘皮竹茹湯大凡得之太陽而嘔者必是合病嘔乃病漸入內非正太陽也曾記有人初得病太陽證有嘔吐不住藥投暖劑莫能治之知太陽已汗解固當用冷劑是太陽見嘔非合陽明則合少陽其嘔為熱用暖劑非矣又記有人初病具太陽證而嘔一家少長患狀悉類與養胃湯各服無不立效此時行之氣適然如此是為傷寒雜病又非可以正經傷寒律之也吳初得之嘔逆嘔噦清水嘔吐飲食者皆著寒傷胃也如惡寒拘急未發熱而嘔逆或吐食者宜加減藿香正氣散或人參養胃湯若已發熱者十味芎蘇散發散或葛根湯加生薑半夏若自汗者不可發汗宜正氣散去紫蘇以和之凡發熱口苦脈弦數而嘔心煩而嘔胸脅滿而嘔往來寒熱而嘔日晡發熱而嘔皆屬少陽並小柴胡倍加半夏生薑主之熱少減黃芩口乾加葛根栝蔞根心煩加薑汁炒黃連心下痞滿加枳實若潮熱內實不大便嘔不止心下鬱郁微煩者大柴胡下凡嘔吐胃家有熱脈弦數口苦煩渴胃有寒脈弦遲逆冷不食有水氣先渴後嘔腹滿怔忡有膿血喉中腥氣奔逆上衝不煩治之嘔膿儘自愈此四者不可不辨凡太陰腹滿吐食不下或腹痛嘔吐脈沉者理中湯加半夏陳皮藿香厚朴生薑之類寒甚加附子凡少陰飲食入口即吐心下溫溫欲吐復不能吐手足寒脈沉細者四逆湯加半夏生薑橘皮之類凡厥陰嘔吐涎沫逆冷脈沉微者吳茱萸四逆湯加半夏生薑陳皮之類乾嘔欲吐太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯張或問小青龍與小柴胡證皆嘔而發汗表裡之證大概倣佛何故二方用藥之不同曰夫傷寒表不解裡熱未甚而渴欲飲水不能多不當與之以腹中熱尚少而不能消水飲停蓄故作諸證然水寒作病非溫熱之劑不能解故用小青龍湯發汗散水原其理初無里證因水寒以致然也夫小柴胡證系傷寒發熱熱邪傳裡在於半表半裡之間熱氣內攻故生諸證緣二證雖曰表裡俱病其中寒熱不同故用藥有薑桂柴苓之異也傷寒中風醫反下之其人下利日十數行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非熱結但以胃中虛客氣上逆故便硬也甘草瀉心湯傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也宜與麻黃湯表罷小柴胡白虎湯傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯太陽中風下利嘔逆表解者可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯張或云乾嘔脅痛小柴胡十棗湯皆有之一和解一攻伐何也蓋小柴胡病在半表半裡間外有寒熱往來內有乾嘔諸病所以不可攻下宜和解以散表裡之邪夫十棗湯證外無寒熱其人漐漐汗出此表已解也但頭痛心下痞硬滿引脅下痛乾嘔短氣者邪熱內蓄而有伏飲是里未和也與十棗湯以下熱逐飲以上二證宜從表證以決有表證而乾嘔脅痛者乃柴胡湯證也無表證而乾嘔脅痛即十棗湯證也上文所言頭痛者而飲家有此證不可以常法拘仲景所以述此者恐後學見其頭痛以為表不解而不敢用也食谷欲吐者屬陽明也吳茱萸湯得湯反劇者屬上焦也小柴胡湯梔子豉湯黃芩湯食谷欲吐者胃不受也與吳茱萸湯以溫胃得湯反劇者上焦不納也少陰病飲食入口即吐心中嗢嗢欲吐不能吐始得之手足寒脈弦遲者此胸中實不可下當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯少陰病下利不止厥逆無脈乾嘔煩者白通加豬膽汁湯少陰病下利清穀裡寒外熱手足厥冷脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也太陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥者死病解後虛羸少氣欲吐者竹葉石膏湯附赤茯苓湯治傷寒嘔噦心下滿胸膈有停水頭眩心悸赤茯苓人參各一兩半夏薑製橘紅芎藭白朮各半兩上㕮咀每服四錢薑五片水煎服葛根湯治傷寒乾嘔不止葛根人參麥門冬去心炙甘草各一兩半夏薑製黃耆各七錢半白茯苓白朮各半兩上㕮咀每服三錢生薑三片棗二枚同煎服少陽病口苦咽乾眩往來寒熱胸脅痛胸滿胸痛耳聾少陽經治法雖悉屬和解然有誤汗譫語屬胃一證宜調胃下之少陽雖無汗解之法然有小柴胡加薑桂者亦溫解微汗之意又此經本證胸脅痛耳聾寒熱往來乾嘔或嘔苦水宜小柴胡湯和解之倘不解者卻宜大柴胡湯下之若胸脅多痰瓜蒂散吐之斯仲景之微旨也和解小柴胡湯小柴胡加桂湯吐瓜蒂散下調胃承氣湯大柴胡湯少陽之為病口苦咽乾目眩也足少陽者膽經也內經曰有病口苦者名曰膽疸甲乙經曰膽者中精之府五臟取決於膽咽為之使少陽之脈起於目鋭眥少陽受邪故口苦咽乾目眩活人云宜小柴胡湯尺寸俱弦者少陽受病也以其脈循脅絡於耳故胸脅痛而耳聾查少陽篇有胸脅滿而無痛證或云少陽病耳聾目赤胸滿而煩為中風口苦咽乾目眩為傷寒少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚誤吐氣虛者悸誤下血虛者驚傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸成經曰三部俱弦者少陽受病脈細者邪漸傳裡雖頭痛發熱為表未解以脈弦細知邪客少陽為半在表半在裡故不可發汗發汗亡津液胃中乾燥少陽之邪因傳入胃必發譫語當與調胃承氣湯下之胃和則愈不下則胃為少陽木邪干之故煩而悸凡頭痛俱為在表惟此頭痛為少陽者何以脈弦細也可汗不可汗當以此為法此少陽陽明重則宜小承氣輕則宜大柴胡蓋少陽不可下陽明不可不下故以小承氣湯少少與之取微利也成氏以調胃承氣主之誤矣調胃承氣太陽陽明藥也不可不審傷寒三日少陽脈小者欲已也成內經曰大則邪至小則平傷寒三日邪傳少陽脈當弦緊今脈小者邪氣微而欲已也少陽病欲解時從寅至辰上內經曰陽中之少陽通於春氣寅卯辰少陽木旺之時海辨表裡中三説假令少陽證頭痛往來寒熱脈浮三證但有其一即為表也口失滋味腹中不和大小便或閉而不通或泄而不調但有其一即為里也如無上下表里證余皆虛熱也是病在其中矣張若謂少陽膽經縈紆盤屈皆多於各經及觀少陽篇中治證至簡又不聞何藥為本經之正法何也夫經絡所據太陽在後以為表陽明在前以為里少陽在側夾於表裡之間故曰半表半裡治法在表者宜汗在裡者宜下既居兩間非汗下所宜故治療無正法也經曰少陽中風兩耳無聞目赤胸中滿而煩者不可吐下吐下則悸而驚上條又云不可發汗似此其汗下吐三法皆少陽所忌其劑不過和解而已所以仲景止以小柴胡湯而為用至當也然而經絡支別雖多所行非由正道故為病亦不能多矣口苦咽乾口乾舌乾咽不利口爛成咽乾口燥舌澀俱為熱證但有微甚耳惟太陽中寒桂枝附子湯證由誤汗咽乾作甘草乾薑湯以復其陽者隨其逆治壞病者也非治其本寒也然咽乾之由有由汗下後而得者有不因汗下而得者其間治法或和解或微汗或急下或微下當考兼有之證而施輕重之治然其為熱則一也蓋經謂咽喉乾燥亦不可汗以其多有里證故也實無寒病善治者尤宜互考渴條乃獲全功太陽咽喉乾燥者不可發汗津液不足也傷寒脈浮自汗小便數心煩微惡寒腳攣急本桂枝附子湯證反與桂枝湯攻表得之便厥咽乾煩躁吐逆者甘草乾薑湯傷寒吐下後七八日不解表裡俱熱時時惡風大渴舌上乾燥而煩者白虎加人參湯本下之心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散太陽病重發汗復下之不大便五六日舌上燥渴日晡小有潮熱從心下至小腹硬滿而痛者大陷胸湯陽明病腹滿脈浮緊口苦咽乾而喘若其人發熱惡寒誤下之則腹滿小便難若其人發熱不惡寒反惡熱誤下之則胃空虛為懊憹誤下之則譫語誤加燒針則不得眠許學士云宜小柴胡湯陽明病口燥漱水不欲咽者必衄或用黃芩芍藥湯犀角地黃湯陽明病汗若下後渴欲飲水口乾舌燥者白虎加人參湯脈浮發熱口乾鼻燥能食者必衄或用黃芩湯陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊或用麻黃小柴胡湯少陽口苦咽乾目眩宜小柴胡湯少陰病自利清水色純青心下痛口乾燥者急下之宜大承氣湯少陰病得之二三日口燥咽乾者急下之大承氣湯成傷寒傳經五六日邪傳少陰則口燥舌乾而渴為邪漸深也今少陰病得之二三日邪氣未深入之時便作口燥咽乾者是邪熱已甚腎水乾也急與大承氣湯下之以全腎也正經自病其深入宜急下之若躁則死腎水乾燥故也張或云承氣湯陽明當下之證宜用今少陰病亦用何也蓋胃為水穀之海主養四旁四旁有病皆能傳之入胃其胃土燥則腎水乾以二三日則口燥咽乾是熱之深傳之速也故曰急下之以全腎水夫土實則水清謂水穀不相混故自利清水而口乾燥此胃土實熱而致然也下利色青青肝也乃肝邪傳腎緣腎之經脈從肺出絡心注胸中由是而心下痛故急下以去實熱逐腎邪其六七日腹脹不大便以入腑之邪壅甚胃土勝則腎涸故急下以逐胃熱滋腎水蓋陽明與少陰皆有急下之條然而證雖不同其入腑之理則一是以皆用大承氣也按舌乾輕咽乾重者蓋咽舌雖皆通於少陰之絡而舌又為心之苗也傷寒喜陽而惡陰故舌乾為輕也厥陰傷寒六七日大下後寸脈沉而遲手足厥冷下部脈不至咽喉不利唾膿血泄利不止者難治麻黃升麻湯傷寒一二日至四五日而厥者必發熱應下之反發其汗必口傷爛赤吳少陰脈疾可下脈沉附子湯加知母黃柏麥門冬五味子天花粉若虛熱病後煩熱不解者以竹葉石膏湯須去半夏加天花粉潤之凡發汗吐下後口燥咽乾此津液衰少腎水不升虛火上炎也宜生津益氣湯或竹葉石膏湯若脈沉微足冷舌燥者多難治其少陰有急下以救腎水之例若虛人水竭火燥不可下者以補中益氣湯倍加人參五味麥門冬天花粉黃柏知母以滋水也狐惑病亦咽乾默默不欲眠目不能閉聲嗄咽乾為狐惑但蟲蝕下部者為狐其咽乾下唇有瘡黃連犀角湯趙活人謂脾臟有熱則津液枯少故令口燥而咽乾津液枯少固也然非獨脾臟有熱脾主太陰太陰腹滿而咽乾此可言脾熱特一證耳餘皆非也如白虎加人參湯證口舌乾燥者表裡俱熱也口苦咽乾者少陽經熱或陽明中風也口燥咽乾急下之自利清水色純青心下痛口乾燥者少陰經熱也咽乾煩躁吐逆者誤汗津液少而欲作陽明內熱者也如上數證豈亦脾臟有熱哉眩凡傷寒頭眩者莫不因汗吐下虛其上焦元氣之所致也眩者目無常主頭眩者俗謂頭旋眼花是也眩冒者昏冒是也少陽口苦咽乾目眩者少陽居表裡之間以表邪漸入於裡表中陽虛故目眩也太陽少陽並病或眩者責其虛也傷寒有起則頭眩與眩冒者皆汗吐下後所致是知其陽虛也故針經曰上虛則眩下虛則厥眩雖為虛又陽明中風但頭眩不惡寒者此又風主眩也凡此皆非逆候及其諸逆發汗劇者言亂目眩者死噫病勢已成可得半愈及病已劇神醫莫為也太陽傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之吐下后里虛氣上逆心下逆滿氣上衝胸表虛陽不足起則頭眩脈浮緊邪在表當發汗脈沉緊邪在裡不可汗汗則外動經絡損傷陽氣則不能主持諸脈身為振振搖也與此湯以和經益陽真武湯主之汗後補不止用以密腠理未能止汗傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿傷寒吐下後發汗則表裡之氣俱虛虛煩脈甚微為正氣內虛邪氣獨在至七八日正氣當復邪氣當罷尚心下痞脅下滿氣上衝咽喉眩冒者是正氣未復而邪留也經脈動惕者經絡之氣虛極久則熱氣還經必成痿弱或用真武湯桂枝茯苓白朮甘草湯太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞禁下太陽少陽並病頭項強痛眩冒時如結胸心下痞硬刺大椎第一間肺俞肝俞禁發汗汗則譫語脈弦五六日譫語不止刺期門陽明病脈遲食難用飽飽則微煩頭眩必小便難欲作谷疸須下之腹滿如故所以然者脈遲故也見前陽明病陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛陽明病身不重但頭眩而不惡寒者陽明中風而風內攻也經曰陽明病若能食名中風風邪攻胃胃氣上逆則咳咽門者胃之系咳甚則咽傷故咽痛若胃氣不逆則不咳其咽亦不痛也四逆散加桔梗小柴胡乃本經中風非傷寒小承氣湯少陽少陽之病口苦咽乾目眩也小柴胡湯加天麻川芎少陰病下利止而頭眩時時自冒者死下利則水穀竭眩冒則陽氣脫故死動氣在左誤汗則頭眩汗不止筋惕肉瞤方論見動氣活人云宜小建中湯諸逆誤汗而言亂目眩者死論見譫語吳太陽中風頭眩頭搖者脈浮弦而急也羌活神術湯加防風天麻之類若血虛頭眩者以四物湯加人參天麻之類若痰火上攻者加酒芩竹瀝之類若內傷勞役陰虛頭眩者宜補中益氣湯加川芎天麻防風蔓荊子之類若下焦元氣虛脫者宜人參養榮湯或大建中湯加天麻曾治一婦人服藿香正氣三劑汗出過多頭眩身搖發熱脈虛數遂用人參養榮湯倍加人參為主加天麻少佐酒炒黃柏二服而愈易老曰頭旋目黑非天麻不能除故加之少加黃柏以救腎水也往來寒熱成往來寒熱者寒已而熱作熱已而寒起蓋寒為陰熱為陽里為陰表為陽邪客於表與陽爭則發寒矣邪入於裡與陰爭則發熱矣表邪多則寒多而熱少里邪多則熱多而寒少邪在半表半裡之間外與陽爭而為寒內與陰爭而為熱表裡之不拘內外之無定由是寒熱往來而無常也故以小柴胡立諸加減法以和解之又寒熱如瘧與夫往來寒熱似是而非也如瘧者止作有時正氣與邪爭則作分則止矣往來寒熱則止作無時或往或來日有三五發或者十數發此其與瘧異也雖然往來寒熱屬半表半裡當和解之又有病至十餘日熱結在裡復往來寒熱亦宜大柴胡下而愈趙傷寒百問歌第五十九問中以陰陽相勝陽不足則先寒後熱陰不足則先熱後寒此特論陰陽雜病二氣自相乘勝然也非可以語傷寒傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者與小柴胡湯主之成病有在表者有在裡者有在表裡之間者此邪氣在表裡之間謂之半表半裡證五六日邪氣自表傳裡之時中風者或傷寒至五六日也玉函曰中風五六日傷寒往來寒熱即是或中風或傷寒非是傷寒再中風中風復傷寒也經曰傷寒中風有柴胡證但見一證便是不必悉具者正是謂或中風或傷寒也邪在表則寒邪在裡腹熱今邪在半表半裡之間未有定處是以寒熱往來也邪在表則心腹不滿邪在裡則心腹脹滿今止言胸膈苦滿知邪氣在表裡之間少陽行身之側胸脅為少陽之部故經曰其脈循脅絡於耳故胸脅痛而耳聾默默靜也邪在表則呻吟不安邪在裡則心煩悶亂內經曰陽入之陰則靜默默者邪方自表之裡在表裡之間也邪在表則能食邪在裡則不能食不欲飲食者邪在表裡之間未至於必不能飲食者也邪在表則不煩不嘔邪在裡則煩滿而嘔心煩喜嘔者邪在表方傳裡也邪初入里未有定處則所傳不一故有或為之證有柴胡證但見一證便是即是此或為之證本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯成太陽轉入少陽是表邪入於裡脅下硬滿不能食往來寒熱邪在半表半裡之間若已經吐下脈沉緊者邪氣入腑為裡實尚未經吐下脈沉緊為傳裡雖深未全入腑外猶未解與小柴胡湯以和解之若已吐下發汗溫針譫語柴胡湯證罷此為壞病知犯何逆以法治之成少陽之邪在表裡之間若妄吐下發汗溫針損耗津液胃中乾燥木邪干胃必發譫語若柴胡證不罷者則不為逆柴胡證罷者壞病也詳其因何治之逆以法救之救壞病助榮衛生津液桂枝湯求之傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之難知曰若用柴胡而移時於早晚氣移於血血移於氣是邪無所容之地故知其欲自解也傷寒五六日已經汗下之後則邪當解今胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者則邪氣猶在半表半裡之間為未解也胸脅滿微結寒熱心煩者邪在半表半裡之間也小便不利而渴者汗下後亡津液內燥也若熱消津液令小便不利而渴者其人必嘔今渴不嘔知非裡熱也傷寒汗出則和今但頭汗出余處無汗者津液不足而陽虛於上也與柴胡桂枝幹薑湯以解表裡之邪復津液以助陽也血弱氣盡腠理開邪氣因入與正氣相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也小柴胡湯主之按血弱氣盡至結於脅下是釋胸脅苦滿句正邪分爭三句是釋往來寒熱句倒裝法也默默不欲飲食兼上文滿痛而言臟腑相連四句釋心煩喜嘔也小柴胡湯方柴胡半斤半夏湯洗半升人參甘草黃芩生薑各三兩大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服成內經曰熱淫於內以苦發之柴胡黃芩之苦以發傳邪之熱里不足者以甘緩之人參甘草之甘以緩中和之氣邪半入里則裡氣逆辛以散之半夏以除嘔邪在半表則榮衛爭之辛甘解之薑棗以和榮衛加減法少陽邪在胸中用此加減法若胸中煩而不嘔去半夏人參加栝蔞實一枚胸中煩而不嘔熱聚而氣不逆也甘者令人中滿方熱聚無用人參之補辛散逆氣既不嘔無用半夏之辛溫熱宜寒療聚宜苦栝蔞苦寒泄胸中蘊熱若渴者去半夏加人參合前成四兩半栝蔞根四兩半夏燥津液非渴者所宜人參甘而潤栝蔞根苦而涼徹熱生津二物為當若腹中痛者去黃芩加芍藥三兩去黃芩惡寒中加芍藥以通壅通壅功少止痛功大若脅下痞硬去大棗加牡蠣四兩甘令人中滿痞者去大棗之甘鹹以軟之痞硬者加牡蠣之咸若心下悸小便不利者去黃芩加茯苓四兩飲而水蓄不行為悸小便不利內經曰腎欲堅急食苦以堅腎得苦則水益腎故去黃芩淡味滲泄為陽茯苓甘淡以泄伏水若不渴外有微熱者去人參加桂三兩溫覆取微汗愈不渴者里和也故去人參外有微熱表未解也加桂以發汗若咳者去人參大棗生薑加五味子半升乾薑二兩咳者氣逆也甘則壅氣故去人參大棗內經曰肺欲收急食酸以收之五味子之酸以收逆氣肺寒則咳散以辛熱故易生薑以乾薑之熱也傷寒邪氣在表者必漬形以為汗邪氣在裡者必蕩滌以取利其於不外不內半表半裡是當和解則可也小柴胡和解表裡之劑內經曰熱淫於內以苦發之邪在半表半裡則半成熱矣熱氣內傳變不可測須迎而奪之必先散熱是以苦寒為主故以柴胡為君黃芩為臣以成徹熱發表之劑邪氣傳裡則裡氣不治故用人參甘草為主以扶正氣而復之也邪初入裡氣必逆也是以辛散之物為之助故用半夏為佐以順逆氣而散邪也裡氣平正則邪氣不得深入是以三味佐柴胡以和里內經曰辛甘發散為陽表邪未已迤邐內傳既未作實宜當兩解其在外者必以辛甘發散故用生薑大棗為使輔柴胡以和表也七物相合兩解之劑當矣邪氣自表未斂為實乘虛而湊則所傳不一故有增損以御之胸中煩而不嘔煩者熱也嘔者氣逆也煩而不嘔則熱聚而氣不逆邪氣欲漸成實也人參甘補去之使不助熱也半夏辛散去之以無逆氣也除熱必以寒泄熱必以苦加栝蔞實以通胸中之鬱熱若渴者津液不足半夏味辛性燥滲津液物也去之則津液易生人參味甘而潤栝蔞根味苦而堅堅潤相合津液生而渴自已邪氣入裡裡氣不足則壅寒而腹中痛黃芩苦寒而寒中去之則氣易和芍藥酸泄而利中加之則裡氣得通而痛自已內經曰甘者令人中滿大棗甘溫去之則硬滿散咸以軟堅牡蠣味酸鹹寒加之則痞者消而硬者軟若心下悸小便不利水蓄而不行也內經曰腎欲堅急食苦以堅之堅腎則水益堅黃芩苦寒去之則蓄水浸行內經曰淡味滲泄為陽茯苓甘淡加之則津液通流若不渴外有微熱不渴則津液足去人參以人參為主內之物也外有微熱則表證多加桂枝以取汗發散表邪也若咳者肺氣逆也甘補中則氣愈逆故去人參大棗之甘肺欲收急食酸以收之氣逆不收故加五味子之酸蓋咳本於寒寒氣內淫則散以乾薑之辛熱生薑乾薑一物也生者溫乾者熱故以干易生也吳或問小柴胡湯近世治傷寒發熱不分陰陽而用之何也然柴胡之苦平乃足少陽經傷寒發熱之藥半表半裡之熱除往來寒熱小有日晡潮熱也佐以黃芩之苦寒以退熱半夏生薑之辛以退寒人參大棗之甘溫以助正氣解渴生津液則陰陽和而邪氣解矣但太陽經之表熱陽明經之標熱皆不能解也如用之豈曰無害若夫令陽寒面赤發熱脈沉足冷者服之立至危殆可不慎哉及內虛有寒大便不實脈息小弱與婦人新産發熱皆不可用也凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解成邪在半表半裡之間為柴胡證即未作裡實醫便以藥下之若柴胡證仍在者雖下之不為逆可復與柴胡湯以和解之得湯邪氣還表者外作蒸蒸而熱先經下里虛邪氣欲出內則振振然也正氣勝陽氣生卻復發熱汗出而解也傷寒中風有柴胡證但見一證便是不必悉具柴胡證是邪氣在表裡之間也或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳但見一證便宜與柴胡湯隨或為證以法治之不必待其證候全具也傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出大陷胸湯主之詳結胸大柴胡湯方柴胡半斤半夏半升洗黃芩芍藥各三兩生薑切五兩大棗十二枚擘枳實炙四枚上七味以水一斗二升煮取六升去滓再煎溫服一升日三服一方有大黃二兩若不加大黃恐不為大柴胡湯也成方有峻緩輕重醫當臨時斟酌如大滿大實堅有燥屎者非駛劑則不能泄是以有大小承氣湯之峻也如不至大堅滿惟邪熱甚而須攻下者又非承氣湯之可投必也輕緩之劑乃大柴胡湯用以逐邪熱也經曰傷寒發熱七八日雖脈浮數可下之宜大柴胡湯又曰太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡嘔不止心下急鬱郁微煩者為未解可與大柴胡下之則愈是知大柴胡為下劑之緩也傷寒主於可下則為熱有餘應火而歸心苦先入心折熱必以苦為主故以柴胡苦平微寒為君黃芩苦寒為臣內經曰酸苦湧泄為陰泄實折熱必以酸苦故以芍藥枳實為佐辛者散也散逆氣者必以辛甘者緩也緩正氣者必以甘故用半夏生薑之辛溫大棗之甘溫為之使也一方加大黃以大黃有將軍之號而功專蕩滌必應以大黃為使許有人病傷寒心煩喜嘔往來寒熱醫以小柴胡與之不除豫曰脈洪大而實熱結在裡小柴胡安能去之仲景云傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯三服而病除蓋大黃蕩滌蘊熱傷寒中要藥王叔和云若不用大黃恐不名大柴胡須酒洗生用有力張或問大柴胡若內煩裡實者固宜用也其嘔而下利者亦用之何也夫治病節目虛實二者而已裡虛者雖便難而勿攻裡實者雖吐利而可下經曰汗多則便難脈遲尚未可攻以遲為不足即裡氣未實故也此以大柴胡主之凡吐利心腹濡軟為裡虛嘔吐而下利心下痞硬者是裡實也下之當然況太陽病過經十餘日反二三下之後四五日柴胡證仍在者先以小柴胡湯嘔不止心下急鬱郁微煩者為未解也與大柴胡湯下之則愈然嘔不止而微煩裡熱已甚結於胃中故下之則愈二節病證雖有參差其裡實同一機耳皆與大柴胡者宜也傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之已發汗而復下之雖不失先發後攻之序及當汗而反下之宜然既汗之邪當自散若不待其全解及內實而復下之是猶傷於早也烏得不結然已發汗則邪勢已衰雖或失之下早故結亦當微也成注欠明故著之柴胡桂枝幹薑湯方柴胡半斤栝蔞根四兩桂枝去粗皮三兩牡蠣煅乾薑黃芩各二兩甘草炙一兩上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩再服汗出便愈成內經曰熱淫於內以苦發之柴胡黃芩之苦以解傳裡之邪辛甘發散為陽桂枝甘草之辛甘以散在表之邪咸以軟之牡蠣之咸以消胸脅之滿辛以潤之乾薑之辛以固陽虛之汗津液不足而為渴苦以堅之栝蔞之苦以生津液病人脈微而澀者此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱此醫發其汗令陽氣微又大下之令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著復衣十一月之時陽氣在裡胃中煩熱以陰氣內弱不能勝熱故欲裸其身又陰脈遲澀故知血亡也上脈微因大發汗所致故病當惡寒之時雖盛夏亦欲著復衣脈澀因大下所致故病當惡寒後發熱之時雖盛冬亦欲裸其體是皆亡血陽微陰弱不能勝冷勝熱非是盛夏牽延至盛冬也脅滿痛邪氣傳裡必先自胸而脅以次經心腹而入胃也是以胸滿多帶表證脅滿多帶半表半裡證如下後脈促胸滿者桂枝去芍藥湯又太陽與陽明合病喘而胸滿者不可下宜麻黃湯二者屬表須汗之蓋胸中至表猶近也及脅則更不言發汗但和解而已經曰設胸滿脅痛者及胸脅滿不去者與夫本太陽病不解傳入少陽脅下硬滿乾嘔往來寒熱脈沉緊者俱宜小柴胡和解之也大抵邪初入里尚未停留為實但鬱積生滿者和解斯可矣若留於胸中聚而為實者又非吐下之不可已如發汗若下之煩熱胸中窒者梔子豉湯若胸中痞硬氣上衝咽喉不得息者此胸中有寒瓜蒂散二者均是吐劑又當知梔子吐虛煩客熱瓜蒂吐痰實宿寒也太陽病十日已去脈浮細而嗜臥者外已解也若胸滿脅痛者與小柴胡湯脈浮者與麻黃湯傷寒四五日身熱惡風頭項強脅下滿手足溫而渴者小柴胡去半夏加人參栝蔞根主之傷寒五六日中風往來寒熱胸脅苦滿不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中滿或脅下痞硬或心中悸小便不利或不渴身有微熱或咳小柴胡湯主之傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之得病六七日脈遲浮弱惡風寒手足溫醫數下之不能食脅滿痛面目及身黃項強小便難者與柴胡湯必下重傳經熱邪脅滿乾嘔大柴胡湯太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也宜十棗湯十棗湯方芫花炒黑甘遂大戟各等分上為細末和合之再入臼中杵二三百下先以水一升煮肥棗十枚取五六合去渣納藥末強人一錢虛人半錢單飲棗湯送下平旦服若下少病不除者明日更服加五分利後米粥調養若合下不下令人脹滿遍身浮腫也昔杜壬問孫兆曰十棗湯畢竟治甚病孫曰治太陽中風表解里未和杜曰何以知里未和孫曰頭痛心下痞滿脅下痛乾嘔汗出此知里未和也杜曰公但言病證而所以里未和之故要緊總未言也孫曰某嘗於此未決願聽開喻杜曰里未和者蓋痰與燥氣壅於中焦故頭疼乾嘔短氣汗出是痰膈也非十棗不治但此湯不宜輕用恐損人於倏忽用藥者慎之陽明病潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之陽明病脅下硬滿不大便而嘔舌上白苔者小柴胡湯陽明中風脈弦浮大短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及目悉黃小便難有潮熱時時噦者小柴胡湯脈但浮無餘證者麻黃湯本渴而飲水欲嘔者柴胡不可與也食谷者噦不欲飲水而嘔者柴胡證也若因水而嘔者水停心下也少陽脅滿乾嘔往來寒熱者屬少陽方論見往來寒熱厥陰傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者熱除也欲得食為病愈若厥而嘔胸脅煩滿者必便血黃芩芍藥湯小柴胡湯抵當湯吳綬治脅下痛加枳殼青皮桔梗芍藥脅下硬加牡蠣粉若增寒拘急往來寒熱而胸脅滿者加桂枝白芍藥俱小柴胡湯內加之婦人發熱惡寒經水適來熱除脈遲身涼脅滿如結胸狀譫語者刺期門論見譫語吐下汗後脈微心下痞脅痛氣上衝咽眩冒脈動惕者成痿論見痞下後脈弦者必兩脅拘急脅下素有痞連在臍旁痛引少腹入陰筋者名臟結死左右者陰陽之道路脅之部也宿痞在脅則陰陽之道路不通故邪不得傳經而直入於臟是以死也胸滿論見前脅滿痛條內兼脅病者已前見太陽太陽與陽明合病喘而胸滿者不可下宜麻黃湯陽受氣於胸中喘而胸滿者陽氣不宣發壅而逆也心下滿腹滿皆為實當下之此以為胸滿非裡實故不可下雖有陽明然與太陽合病為屬表是與麻黃湯發汗發汗若下之而煩熱胸中窒者梔子豉湯陽受氣於胸中發汗若下使陽氣不足邪熱客於胸中結而不散故煩熱而胸中窒塞與梔子豉湯以吐胸中之邪病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散病如桂枝證為發熱汗出惡風言邪在表也頭痛項強為桂枝證具若頭項不痛強則邪不在表而傳裡也浮為在表沉為在裡今寸脈微浮則邪不在表亦不在裡而在胸中胸中與表相應故知邪在胸中者猶如桂枝證而寸脈微浮也以胸中痞硬上衝咽喉不得息知寒邪客於胸中而不在表也千金曰氣浮上部填塞胸心胸中滿者吐之則愈與瓜蒂散以吐胸中之邪若氣不上衝則不可用也太陽病下之脈促胸滿者桂枝去芍藥湯方論見惡寒若脈促不結者欲解也下後胸滿小便不利若兼煩驚譫語身重不可轉側者柴胡加龍骨牡蠣湯方論見驚門若兼噦而舌苔者為濕痹陽明潮熱大便溏小便可胸脅滿屬陽明見脅滿痛少陽中風兩耳無所聞目赤胸中滿而煩者若吐下之則悸而驚救逆小柴胡去黃芩加茯苓湯少陽之脈起於目眥走於耳中其支者下胸中貫膈風傷氣風則為熱少陽中風氣壅而熱故耳聾目赤胸滿而煩邪在少陽為半表半裡以吐除煩吐則傷氣氣虛者悸以下除滿下則亡血血虛者驚太陰太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬太陰為病陽邪傳裡也太陰之脈布胃中邪氣壅而為腹滿上不得降者嘔吐而食不下下不得升者自利益甚時腹自痛陰寒在內而為腹痛者則為常痛此陽邪干里雖痛而亦不常痛但時時腹自痛也若下之則陰邪留於胸下為結硬經曰病發於陰而反下之因作痞瀉心湯理中湯元不渴四逆湯趙活人第十八問中雲太陰者脾之經主胸膈䐜脹愚嘗觀成氏明理論云胸中至表猶近所以仲景云喘而胸滿者麻黃湯是屬表而可汗者也又云胸脅滿者小柴胡湯屬半表半裡而可和解者也至於太陰止云腹滿而吐食不下時腹自痛或腹滿而咽乾由此觀之可見太陰不主胸上者明矣少陰病下利咽痛胸滿心煩者豬膚湯少陰之脈從腎上貫肝膈入肺中而循喉嚨其支別者從肺出絡心注胸中邪自陽經傳於少陰陰虛客熱下利咽痛胸滿心煩也與豬膚湯調陰散熱咽痛五方大能解厥陰病人手足厥冷脈乍緊者邪結在胸中心中滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散手足厥冷者邪氣內陷也脈緊牢者為實邪氣入腑則脈沉今脈乍緊知邪結在胸中為實故心下滿而煩胃中無邪則喜飢以病在胸中雖飢而不能食與瓜蒂散以吐胸中之邪手足厥冷非脈緊胸痛別之熱少厥微胸脅煩滿一證已前見吳胸滿多用吐法實者宜瓜蒂散虛者宜人參蘆或以香蘇散飲下一甌以手探喉中吐之亦可凡傷寒三四日已傳少陽經脈弦口苦發熱而胸滿宜小柴胡湯若胸中滿悶者加枳殼桔梗各二錢以利之若胸脅滿而煩者加栝蔞實三錢黃連一錢半活人治胸滿氣痞不寬只用枳殼桔梗各二錢生薑五片名曰枳殼湯凡心之上胸之分宜枳殼心之下胃之分宜枳實蓋枳殼能泄至高之氣枳實能泄至低之氣其栝蔞仁能瀉肺洗滌胸中痰垢之要藥也故胸滿而煩必加之一法治氣痞胸滿用小麥麩一二升以生枳殼切半同炒令熱去枳殼以帛包熱麩尉胸中頓易熱之則氣易散而愈矣胸痛胸脅痛耳聾尺寸脈俱弦者少陽受病也論見大法活人云柴胡湯主之病胸中諸實胸中鬱郁而痛不能食欲使人按之而反有涎唾下利十餘行其脈反遲寸口脈微滑此可吐之利則止吐下後嗢嗢欲吐胸中痛大便溏腹滿而煩者宜調胃承氣湯詳嘔耳聾耳聾有二一由重發汗虛一由少陽中風胸脅痛耳聾尺寸脈俱弦者少陽受病也未持脈時病人又手自冒心試教令咳而不咳者此必耳聾無聞所以然者以重發汗虛故如此黃耆建中湯少陽中風兩耳無聞目赤胸滿而煩者不可吐下吐下則悸而驚或用小柴胡湯少陽與厥陰俱病耳聾囊縮而厥者此兩感證厥陰榮衛不通耳聾囊縮不知人危矣濕溫證治在太陰不可汗汗則不能言耳聾不知病處身青面色變名曰重暍白虎加蒼朮湯陽毒陽毒之證初受病時所加邪毒深重加以當汗失汗當下失下或吐下後邪熱乘虛而入誤服熱藥使毒熱散漫如抱薪救火無不延燎至於六脈沉實舌卷焦黑鼻中如煙煤身面錦斑狂言直走逾垣上屋登高而歌棄衣而走皆其證也五日可治六七日不可治升麻鱉甲湯治陽毒為病面赤斑斑如錦紋咽喉痛唾膿血升麻二兩當歸蜀椒炒去汗甘草各一兩鱉甲手指大一片雄黃研半兩上六味以水四升煮取一升頓服之取汗愈肘後千金方陽毒升麻湯有桂無鱉甲陰毒甘草湯無雄黃附活陽毒升麻湯治傷寒一二日便成陽毒或服藥吐下之後變成陽毒腰背痛煩悶不安面赤狂言奔走或見鬼或下利脈浮大數面赤斑斑如錦紋咽喉痛下膿血五日可治六七日不可治升麻犀角鎊射干黃芩人參甘草各等分上㕮咀水煎服食頃再服溫覆手足出汗解不解重作陽毒梔子湯治陽毒傷寒發熱百節疼痛升麻黃芩杏仁石膏各二錢梔子赤芍藥知母大青各一錢甘草五分柴胡一錢半上㕮咀每服半兩薑五片豉百粒同煎大黃散治陽毒傷寒未解熱在內恍惚如狂大黃一兩半桂心七錢半甘草炙芒硝大腹皮木通各一兩桃仁二十一枚上㕮咀水煎服以利為度海葛根散治陽毒身熱如火頭痛躁渴咽喉干痛葛根七錢半黃芩大黃醋炒甘草梔子朴硝各半兩上㕮咀水煎服活黑奴丸治時行病六七日未得汗脈洪大或數面赤目痛身體大熱煩躁狂言欲走大渴甚又五六日以上不解熱在胸中口噤不能言為壞傷寒醫所不治或人精魄已竭心下尚暖撥開其口灌藥下咽即活兼治陽毒及發斑麻黃去節泡三兩大黃二兩釜底煤研黃芩芒硝灶突墨研梁上塵小麥奴各一兩上為末煉蜜丸如彈子大新汲水研下一丸渴者與冷水盡飲之須臾當寒寒竟汗出便瘥若無汗再服一丸須微利效小麥奴即小麥未熟時叢中不成麥捻之成黑勃是也此藥須是病人大渴倍常躁盛者乃可與之若不渴者服之反為禍耳脈洪大內外結熱舌卷焦黑鼻中如煙煤以水漬布薄之疊布數重新水漬之稍挼去水搭於胸上須臾蒸熱又漬冷如前薄之仍換新水數十易熱甚者置病人於水中勢才退則已亦一良法也丹砂丸治傷寒陰陽二毒危惡形證舶上硫水銀太陰元精石太陽石各一兩硝石半兩上為末用無油銚子以文武火炒上項藥令勻如灰色研極細生薑自然汁浸炊餅丸如緑豆大每服五丸龍腦生薑蜜水下壓其躁也若陽毒棗湯下陰毒白湯下不許於屋底炒白虎加人參名化斑湯斑盛者青黛一物湯咽痛元參升麻湯青黛一物湯青黛如棗大一塊用新汲水研服玄參升麻湯升麻玄參甘草各半兩水三盞煎一盞半去滓服陶陽毒傷寒服藥不效斑爛皮膚手足皮俱脫身如塗朱眼珠如火躁渴欲死脈洪大而有力昏不知人宜三黃石膏湯主之或升麻梔子湯吐之若熱甚時狂時昏口噤咬牙藥不可下者用水漬法候牙寬狂亂稍定投藥亦良如黑奴丸不可輕用活陽氣獨勝陰氣暴絶必發躁狂走妄言面赤咽痛發斑或下者利赤黃脈洪實或滑促宜酸苦之藥救陰陽毒輕者桔梗大黃湯陽毒升麻湯梔子仁湯又龍膽草一物湯趙陽根於陰陰根於陽無陽則陰無以化無陰則陽無以生可見兩者不能相無也又仲景云陽氣先絶陰氣後絶此人死身色必青陰氣前絶陽氣後竭此人死身色必赤則知陰陽二氣在人身中不可偏絶絶則無復生之理今活人書論陰毒而曰陽氣絶論陽毒而曰陰氣絶既絶矣是為不治之證又何藥焉蓋陰陽二證之深重也又挾毒氣是為陰毒陽毒故其藥皆用升麻犀角雄黃大青輩以解其毒然後陽毒泄而陰氣復陰毒泄而陽氣復大汗出而解矣活人書何不曰陽氣極盛陰氣極微為陽毒陰氣極盛陽氣極微為陰毒庶不為極絶之證
